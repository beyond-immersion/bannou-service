openapi: 3.0.4
info:
  title: Collection Service Configuration
  description: |
    Configuration schema for Collection service.
    Properties are bound to environment variables with BANNOU_ prefix.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
paths: {}
x-service-configuration:
  properties:
    maxCollectionsPerOwner:
      type: integer
      env: COLLECTION_MAX_COLLECTIONS_PER_OWNER
      default: 20
      minimum: 1
      description: Maximum number of collections a single owner entity can have
    maxEntriesPerCollection:
      type: integer
      env: COLLECTION_MAX_ENTRIES_PER_COLLECTION
      default: 500
      minimum: 1
      description: Maximum number of unlocked entries per collection instance
    lockTimeoutSeconds:
      type: integer
      env: COLLECTION_LOCK_TIMEOUT_SECONDS
      default: 30
      minimum: 1
      description: Distributed lock TTL for collection mutations in seconds
    collectionCacheTtlSeconds:
      type: integer
      env: COLLECTION_CACHE_TTL_SECONDS
      default: 300
      minimum: 0
      description: Redis TTL for collection state cache in seconds
    defaultPageSize:
      type: integer
      env: COLLECTION_DEFAULT_PAGE_SIZE
      default: 20
      minimum: 1
      maximum: 100
      description: Default page size for paginated queries
    maxConcurrencyRetries:
      type: integer
      env: COLLECTION_MAX_CONCURRENCY_RETRIES
      default: 3
      minimum: 0
      description: Maximum retry attempts for optimistic concurrency conflicts
    instanceEventBatchIntervalSeconds:
      type: integer
      env: COLLECTION_INSTANCE_EVENT_BATCH_INTERVAL_SECONDS
      default: 5
      minimum: 1
      maximum: 300
      description: Interval in seconds between collection instance lifecycle batch event flushes
    instanceEventBatchStartupDelaySeconds:
      type: integer
      env: COLLECTION_INSTANCE_EVENT_BATCH_STARTUP_DELAY_SECONDS
      default: 10
      minimum: 0
      maximum: 300
      description: Startup delay before collection instance lifecycle batch event publishing begins
    instanceEventBatchMaxSize:
      type: integer
      env: COLLECTION_INSTANCE_EVENT_BATCH_MAX_SIZE
      default: 500
      minimum: 10
      maximum: 10000
      description: Maximum entries per batch event before forced flush
