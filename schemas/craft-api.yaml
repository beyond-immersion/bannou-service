        - entityId
        - entityType
        - domain
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity to check proficiency for
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity
        domain:
          type: string
          minLength: 1
          maxLength: 100
          description: Proficiency domain code

    ListProficienciesRequest:
      type: object
      additionalProperties: false
      description: Request to list all proficiencies for an entity
      required:
        - entityId
        - entityType
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity to list proficiencies for
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity

    GrantExperienceRequest:
      type: object
      additionalProperties: false
      description: Request to grant crafting experience
      required:
        - entityId
        - entityType
        - domain
        - amount
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity to grant experience to
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity
        domain:
          type: string
          minLength: 1
          maxLength: 100
          description: Proficiency domain code
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Experience amount to grant

    SetProficiencyRequest:
      type: object
      additionalProperties: false
      description: Request to set proficiency to a specific value
      required:
        - entityId
        - entityType
        - domain
        - targetValue
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity to set proficiency for
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity
        domain:
          type: string
          minLength: 1
          maxLength: 100
          description: Proficiency domain code
        targetValue:
          type: number
          format: double
          minimum: 0
          description: Target proficiency value to set

    RegisterStationRequest:
      type: object
      additionalProperties: false
      description: Request to register a crafting station
      required:
        - gameServiceId
        - stationType
        - quality
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service this station belongs to
        stationType:
          type: string
          minLength: 1
          maxLength: 100
          description: Station type code
        locationId:
          type: string
          format: uuid
          nullable: true
          description: Physical location (null for portable stations)
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Owning entity (null for unowned)
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Type of the owning entity (must be set when ownerId is set)
        quality:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Station quality (0-1)

    GetStationRequest:
      type: object
      additionalProperties: false
      description: Request to get a station by ID
      required:
        - stationId
      properties:
        stationId:
          type: string
          format: uuid
          description: Station to retrieve

    ListStationsRequest:
      type: object
      additionalProperties: false
      description: Request to list stations with filters
      properties:
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Filter by game service
        stationType:
          type: string
          nullable: true
          description: Filter by station type
        locationId:
          type: string
          format: uuid
          nullable: true
          description: Filter by location
        isActive:
          type: boolean
          nullable: true
          description: Filter by active status

    DeregisterStationRequest:
      type: object
      additionalProperties: false
      description: Request to deregister a station
      required:
        - stationId
      properties:
        stationId:
          type: string
          format: uuid
          description: Station to deregister

    AttemptDiscoveryRequest:
      type: object
      additionalProperties: false
      description: Request to attempt recipe discovery through experimentation
      required:
        - entityId
        - entityType
        - gameServiceId
        - materialItemIds
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity attempting discovery
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity
        gameServiceId:
          type: string
          format: uuid
          description: Game service to discover recipes for
        materialItemIds:
          type: array
          items:
            type: string
            format: uuid
          description: Item instance IDs being used for experimentation
        stationType:
          type: string
          nullable: true
          description: Station type being used (if any)

    ListKnownRecipesRequest:
      type: object
      additionalProperties: false
      description: Request to list recipes known by an entity
      required:
        - entityId
        - entityType
        - gameServiceId
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity to list known recipes for
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity
        gameServiceId:
          type: string
          format: uuid
          description: Game service to list recipes for

    TeachRecipeRequest:
      type: object
      additionalProperties: false
      description: Request to teach a recipe to an entity
      required:
        - recipeId
        - entityId
        - entityType
        - gameServiceId
      properties:
        recipeId:
          type: string
          format: uuid
          description: Recipe to teach
        entityId:
          type: string
          format: uuid
          description: Entity to teach the recipe to
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity
        gameServiceId:
          type: string
          format: uuid
          description: Game service context

    CanCraftRequest:
      type: object
      additionalProperties: false
      description: Request to check if an entity can craft a recipe
      required:
        - recipeId
        - entityId
        - entityType
      properties:
        recipeId:
          type: string
          format: uuid
          description: Recipe to check
        entityId:
          type: string
          format: uuid
          description: Entity to check
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity

    EstimateCraftQualityRequest:
      type: object
      additionalProperties: false
      description: Request to estimate crafting quality
      required:
        - recipeId
        - entityId
        - entityType
        - materialItemIds
      properties:
        recipeId:
          type: string
          format: uuid
          description: Recipe to estimate quality for
        entityId:
          type: string
          format: uuid
          description: Entity performing the craft
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity
        materialItemIds:
          type: array
          items:
            type: string
            format: uuid
          description: Item instance IDs of materials to use
        toolItemId:
          type: string
          format: uuid
          nullable: true
          description: Tool item instance to use

    GetRecipeOutputPreviewRequest:
      type: object
      additionalProperties: false
      description: Request to preview recipe outputs at various quality levels
      required:
        - recipeId
      properties:
        recipeId:
          type: string
          format: uuid
          description: Recipe to preview outputs for

    CleanupByGameServiceRequest:
      type: object
      additionalProperties: false
      description: Resource cleanup request for game service deletion
      required:
        - gameServiceId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service whose craft data should be cleaned up

    CleanupByEntityRequest:
      type: object
      additionalProperties: false
      description: Resource cleanup request for entity deletion
      required:
        - entityId
        - entityType
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity whose craft data should be cleaned up
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity

    CleanupByLocationRequest:
      type: object
      additionalProperties: false
      description: Resource cleanup request for location deletion
      required:
        - locationId
      properties:
        locationId:
          type: string
          format: uuid
          description: Location whose stations should be deactivated

    CompleteSessionRequest:
      type: object
      additionalProperties: false
      description: Prebound API request called by Contract on final milestone completion
      required:
        - sessionId
      properties:
        sessionId:
          type: string
          format: uuid
          description: Session to complete

    # =========================================================================
    # Response Models
    # =========================================================================

    CreateRecipeResponse:
      type: object
      additionalProperties: false
      description: Response after creating a recipe
      required:
        - recipeId
      properties:
        recipeId:
          type: string
          format: uuid
          description: ID of the newly created recipe

    GetRecipeResponse:
      type: object
      additionalProperties: false
      description: Response containing a full recipe definition
      required:
        - recipe
      properties:
        recipe:
          $ref: '#/components/schemas/RecipeDefinitionInfo'
          description: Full recipe definition

    ListRecipesResponse:
      type: object
      additionalProperties: false
      description: Paged list of recipe definitions
      required:
        - items
        - page
        - pageSize
        - totalCount
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecipeDefinitionInfo'
          description: Recipe definitions for this page
        page:
          type: integer
          description: Current page number
        pageSize:
          type: integer
          description: Items per page
        totalCount:
          type: integer
          description: Total recipe count matching filters

    UpdateRecipeResponse:
      type: object
      additionalProperties: false
      description: Response after updating a recipe
      required:
        - recipe
      properties:
        recipe:
          $ref: '#/components/schemas/RecipeDefinitionInfo'
          description: Updated recipe definition

    DeprecateRecipeResponse:
      type: object
      additionalProperties: false
      description: Response after deprecating a recipe
      required:
        - recipe
      properties:
        recipe:
          $ref: '#/components/schemas/RecipeDefinitionInfo'
          description: Deprecated recipe definition

    SeedRecipesResponse:
      type: object
      additionalProperties: false
      description: Response after bulk seeding recipes
      required:
        - createdCount
        - skippedCount
      properties:
        createdCount:
          type: integer
          description: Number of recipes successfully created
        skippedCount:
          type: integer
          description: Number of recipes skipped (code already exists)

    ListDomainsResponse:
      type: object
      additionalProperties: false
      description: List of distinct proficiency domains with recipe counts
      required:
        - domains
      properties:
        domains:
          type: array
          items:
            $ref: '#/components/schemas/DomainSummary'
          description: Domain summaries

    StartSessionResponse:
      type: object
      additionalProperties: false
      description: Response after starting a crafting session
      required:
        - sessionId
        - firstStepCode
      properties:
        sessionId:
          type: string
          format: uuid
          description: Session identifier (equals contractInstanceId)
        firstStepCode:
          type: string
          description: Code of the first step to complete
        participants:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SessionParticipant'
          description: Confirmed participants for multi-entity sessions

    AdvanceSessionResponse:
      type: object
      additionalProperties: false
      description: Response after advancing a session step
      required:
        - qualityContribution
      properties:
        qualityContribution:
          type: number
          format: double
          description: Quality contribution from this step (0 if no skill check)
        nextStepCode:
          type: string
          nullable: true
          description: Code of the next step (null if session completed)

    CancelSessionResponse:
      type: object
      additionalProperties: false
      description: Empty response. HTTP 200 confirms the cancellation succeeded.
      properties: {}

    GetSessionResponse:
      type: object
      additionalProperties: false
      description: Response containing session state
      required:
        - session
      properties:
        session:
          $ref: '#/components/schemas/SessionInfo'
          description: Current session state

    ListSessionsResponse:
      type: object
      additionalProperties: false
      description: List of active sessions for an entity
      required:
        - sessions
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionInfo'
          description: Active sessions

    GetProficiencyResponse:
      type: object
      additionalProperties: false
      description: Proficiency state for a domain
      required:
        - proficiency
      properties:
        proficiency:
          $ref: '#/components/schemas/ProficiencyInfo'
          description: Proficiency information

    ListProficienciesResponse:
      type: object
      additionalProperties: false
      description: All proficiencies for an entity
      required:
        - proficiencies
      properties:
        proficiencies:
          type: array
          items:
            $ref: '#/components/schemas/ProficiencyInfo'
          description: Proficiency information across all domains

    GrantExperienceResponse:
      type: object
      additionalProperties: false
      description: Response after granting experience
      required:
        - newExperience
        - levelChanged
      properties:
        newExperience:
          type: number
          format: double
          description: New total experience after grant
        levelChanged:
          type: boolean
          description: Whether the experience grant triggered a level change
        newLevel:
          type: integer
          nullable: true
          description: New level if levelChanged is true

    SetProficiencyResponse:
      type: object
      additionalProperties: false
      description: Empty response. HTTP 200 confirms the proficiency was set.
      properties: {}

    RegisterStationResponse:
      type: object
      additionalProperties: false
      description: Response after registering a station
      required:
        - stationId
      properties:
        stationId:
          type: string
          format: uuid
          description: ID of the registered station

    GetStationResponse:
      type: object
      additionalProperties: false
      description: Response containing a station definition
      required:
        - station
      properties:
        station:
          $ref: '#/components/schemas/StationInfo'
          description: Station definition

    ListStationsResponse:
      type: object
      additionalProperties: false
      description: List of stations matching filters
      required:
        - stations
      properties:
        stations:
          type: array
          items:
            $ref: '#/components/schemas/StationInfo'
          description: Matching stations

    DeregisterStationResponse:
      type: object
      additionalProperties: false
      description: Empty response. HTTP 200 confirms the station was deregistered.
      properties: {}

    AttemptDiscoveryResponse:
      type: object
      additionalProperties: false
      description: Response from a discovery attempt
      required:
        - discovered
      properties:
        discovered:
          type: boolean
          description: Whether a recipe was discovered
        recipeCode:
          type: string
          nullable: true
          description: Code of the discovered recipe (null if not discovered)
        hintProgression:
          type: number
          format: double
          nullable: true
          description: Progress toward discovery hint threshold (null if discovered)

    ListKnownRecipesResponse:
      type: object
      additionalProperties: false
      description: List of recipes known by an entity
      required:
        - recipes
      properties:
        recipes:
          type: array
          items:
            $ref: '#/components/schemas/KnownRecipeInfo'
          description: Known recipes with craftability context

    TeachRecipeResponse:
      type: object
      additionalProperties: false
      description: Empty response. HTTP 200 confirms the recipe was taught.
      properties: {}

    CanCraftResponse:
      type: object
      additionalProperties: false
      description: Craftability check result
      required:
        - canCraft
        - breakdown
      properties:
        canCraft:
          type: boolean
          description: Whether the entity can currently craft this recipe
        breakdown:
          $ref: '#/components/schemas/CraftabilityBreakdown'
          description: Detailed breakdown of each prerequisite

    EstimateCraftQualityResponse:
      type: object
      additionalProperties: false
      description: Quality estimate result
      required:
        - breakdown
      properties:
        breakdown:
          $ref: '#/components/schemas/QualityEstimateBreakdown'
          description: Quality estimate with per-factor breakdown

    GetRecipeOutputPreviewResponse:
      type: object
      additionalProperties: false
      description: Output preview at various quality levels
      required:
        - bands
      properties:
        bands:
          type: array
          items:
            $ref: '#/components/schemas/OutputPreviewBand'
          description: Output previews at different quality bands

    CleanupResponse:
      type: object
      additionalProperties: false
      description: Empty response. HTTP 200 confirms cleanup completed.
      properties: {}

    CompleteSessionResponse:
      type: object
      additionalProperties: false
      description: Empty response. HTTP 200 confirms the session completed.
      properties: {}
