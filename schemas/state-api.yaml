openapi: 3.0.4
info:
  title: Bannou State Service API
  version: 1.0.0
  description: |
    Repository pattern state management with Redis and MySQL backends.

    NOTE: This is an INTERNAL service API using empty x-permissions (internal-only).
    Service-to-service calls within the cluster are always permitted (per FOUNDATION TENETS).

    All endpoints use POST-only pattern per FOUNDATION TENETS to enable
    zero-copy WebSocket routing with static endpoint GUIDs.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
x-service-layer: Infrastructure
servers:
- url: http://localhost:5012

paths:
  /state/get:
    post:
      operationId: getState
      summary: Get state value by key
      tags:
      - State
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetStateRequest'
      responses:
        '200':
          description: State value retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStateResponse'
        '404':
          description: Key not found

  /state/save:
    post:
      operationId: saveState
      summary: Save state value
      tags:
      - State
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveStateRequest'
      responses:
        '200':
          description: State saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveStateResponse'

  /state/delete:
    post:
      operationId: deleteState
      summary: Delete state value
      tags:
      - State
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteStateRequest'
      responses:
        '200':
          description: State deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteStateResponse'

  /state/query:
    post:
      operationId: queryState
      summary: Query state (MySQL JSON queries or Redis with search enabled)
      tags:
      - State
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryStateRequest'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryStateResponse'
        '400':
          description: Query not supported (Redis store without search enabled)
        '404':
          description: Store not found

  /state/bulk-get:
    post:
      operationId: bulkGetState
      summary: Bulk get multiple keys
      tags:
      - State
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkGetStateRequest'
      responses:
        '200':
          description: Bulk results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkGetStateResponse'

  /state/bulk-save:
    post:
      operationId: bulkSaveState
      summary: Bulk save multiple key-value pairs
      tags:
      - State
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSaveStateRequest'
      responses:
        '200':
          description: Bulk save results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkSaveStateResponse'

  /state/bulk-exists:
    post:
      operationId: bulkExistsState
      summary: Check existence of multiple keys
      tags:
      - State
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkExistsStateRequest'
      responses:
        '200':
          description: Bulk exists results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkExistsStateResponse'

  /state/bulk-delete:
    post:
      operationId: bulkDeleteState
      summary: Delete multiple keys
      tags:
      - State
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteStateRequest'
      responses:
        '200':
          description: Bulk delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteStateResponse'

  /state/list-stores:
    post:
      operationId: listStores
      summary: List configured state stores
      tags:
      - State
      x-permissions: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListStoresRequest'
      responses:
        '200':
          description: List of stores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStoresResponse'

  /state/migrate/dry-run:
    post:
      operationId: migrateDryRun
      summary: Analyze a store and report what can and cannot be migrated
      tags:
      - State
      x-permissions:
        - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateDryRunRequest'
      responses:
        '200':
          description: Dry-run analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrateDryRunResponse'
        '404':
          description: Store not found

  /state/migrate/execute:
    post:
      operationId: migrateExecute
      summary: Perform actual data migration between backends for a store
      tags:
      - State
      x-permissions:
        - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateExecuteRequest'
      responses:
        '200':
          description: Migration completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrateExecuteResponse'
        '400':
          description: Same backend (no-op) or store uses incompatible-only features
        '404':
          description: Store not found

  /state/migrate/verify:
    post:
      operationId: migrateVerify
      summary: Compare key counts between source and destination backends
      tags:
      - State
      x-permissions:
        - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateVerifyRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrateVerifyResponse'
        '404':
          description: Store not found

components:
  schemas:
    GetStateRequest:
      description: Request to retrieve a single state value by key from a state store
      type: object
      additionalProperties: false
      required:
      - storeName
      - key
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store
        key:
          type: string
          minLength: 1
          maxLength: 255
          description: Key to retrieve

    GetStateResponse:
      description: Response containing a retrieved state value with its ETag for optimistic concurrency
      type: object
      additionalProperties: false
      properties:
        value:
          type: object
          additionalProperties: true
          nullable: true
          description: The stored value (null if not found)
        etag:
          type: string
          nullable: true
          description: ETag for optimistic concurrency

    SaveStateRequest:
      description: Request to save a state value to a state store with optional TTL and optimistic concurrency
      type: object
      additionalProperties: false
      required:
      - storeName
      - key
      - value
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store
        key:
          type: string
          minLength: 1
          maxLength: 255
          description: Key to save
        value:
          type: object
          additionalProperties: true
          description: Value to store
        etag:
          type: string
          minLength: 1
          maxLength: 100
          nullable: true
          description: Expected ETag for optimistic concurrency - save fails with 409 Conflict if mismatch
        options:
          nullable: true
          $ref: '#/components/schemas/StateOptions'
          description: Optional settings for the save operation including TTL

    SaveStateResponse:
      description: Response from a save operation containing the new ETag
      type: object
      additionalProperties: false
      required:
      - etag
      properties:
        etag:
          type: string
          minLength: 1
          maxLength: 100
          description: New ETag after save

    DeleteStateRequest:
      description: Request to delete a state value by key from a state store
      type: object
      additionalProperties: false
      required:
      - storeName
      - key
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store
        key:
          type: string
          minLength: 1
          maxLength: 255
          description: Key to delete

    DeleteStateResponse:
      description: Response from a delete operation indicating whether the key was removed
      type: object
      additionalProperties: false
      properties:
        deleted:
          type: boolean
          description: Whether the key was deleted (false if not found)

    StateOptions:
      description: Configuration options for state save operations including TTL
      type: object
      additionalProperties: false
      properties:
        ttl:
          type: integer
          minimum: 1
          maximum: 31536000
          nullable: true
          description: TTL in seconds (Redis only). Maximum 1 year (31536000 seconds).

    QueryStateRequest:
      description: Request to query state entries with filtering, sorting, and pagination support for MySQL and Redis
        backends
      type: object
      additionalProperties: false
      required:
      - storeName
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store (MySQL or Redis with search enabled)
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/QueryCondition'
          maxItems: 50
          nullable: true
          description: |
            Query conditions for MySQL JSON queries. Multiple conditions are combined with AND.
            For Redis search, use indexName and query properties instead.
        indexName:
          type: string
          minLength: 1
          maxLength: 100
          nullable: true
          description: |
            Redis search index name. Defaults to "{storeName}-idx".
            Only used for Redis stores with search enabled.
        query:
          type: string
          minLength: 1
          maxLength: 1000
          nullable: true
          description: |
            RedisSearch query string (e.g., "@name:John", "@age:[18 +inf]", "*").
            Defaults to "*" (match all). Only used for Redis stores with search enabled.
        sort:
          type: array
          items:
            $ref: '#/components/schemas/SortField'
          maxItems: 10
          nullable: true
          description: Sort order (first field only is used) (null for default ordering)
        page:
          type: integer
          minimum: 0
          default: 0
          description: Page number (0-indexed)
        pageSize:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
          description: Items per page (max 1000)

    SortField:
      description: Specifies a field and direction for sorting query results
      type: object
      additionalProperties: false
      required:
      - field
      properties:
        field:
          type: string
          minLength: 1
          maxLength: 200
          description: Field name to sort by (JSON path for MySQL, field name for Redis)
        order:
          type: string
          enum:
          - Asc
          - Desc
          default: Asc
          description: Sort direction

    QueryCondition:
      type: object
      additionalProperties: false
      description: A single query condition for MySQL JSON queries
      required:
      - path
      properties:
        path:
          type: string
          minLength: 1
          maxLength: 200
          description: JSON path to query (e.g., "$.name", "$.address.city", "$.tags[0]")
        operator:
          $ref: '#/components/schemas/QueryOperator'
          description: Comparison operator to use for the condition
        value:
          description: Value to compare against. Not required for exists/notExists operators.

    QueryOperator:
      type: string
      description: Comparison operator for query conditions
      enum:
      - Equals
      - NotEquals
      - GreaterThan
      - GreaterThanOrEqual
      - LessThan
      - LessThanOrEqual
      - Contains
      - StartsWith
      - EndsWith
      - In
      - Exists
      - NotExists
      - FullText
      default: Equals

    QueryStateResponse:
      description: Response containing paginated query results with total count information
      type: object
      additionalProperties: false
      required:
      - results
      - totalCount
      - page
      - pageSize
      properties:
        results:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Query results
        totalCount:
          type: integer
          minimum: 0
          description: Total matching items (for pagination)
        page:
          type: integer
          minimum: 0
          description: Current page number
        pageSize:
          type: integer
          minimum: 1
          maximum: 1000
          description: Items per page

    BulkGetStateRequest:
      description: Request to retrieve multiple state values by key in a single operation
      type: object
      additionalProperties: false
      required:
      - storeName
      - keys
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store
        keys:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 255
          minItems: 1
          maxItems: 1000
          description: Keys to retrieve

    BulkGetStateResponse:
      description: Response containing the results of a bulk get operation for multiple keys
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BulkStateItem'
          description: Results for each key

    BulkStateItem:
      description: A single item result from a bulk get operation including the key, value, ETag, and found status
      type: object
      additionalProperties: false
      required:
      - key
      - found
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 255
          description: The key
        value:
          type: object
          additionalProperties: true
          nullable: true
          description: The value (null if not found)
        etag:
          type: string
          minLength: 1
          maxLength: 100
          nullable: true
          description: ETag for this item
        found:
          type: boolean
          description: Whether the key was found

    BulkSaveStateRequest:
      description: Request to save multiple key-value pairs in a single operation
      type: object
      additionalProperties: false
      required:
      - storeName
      - items
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store
        items:
          type: array
          items:
            $ref: '#/components/schemas/BulkSaveItem'
          minItems: 1
          maxItems: 1000
          description: Items to save
        options:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/StateOptions'
          description: Optional settings applied to all items

    BulkSaveItem:
      description: A single item to save in a bulk operation
      type: object
      additionalProperties: false
      required:
      - key
      - value
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 255
          description: The key to save
        value:
          type: object
          additionalProperties: true
          description: The value to store

    BulkSaveStateResponse:
      description: Response from a bulk save operation with ETags for each saved item
      type: object
      additionalProperties: false
      required:
      - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkSaveResult'
          description: Results for each saved item

    BulkSaveResult:
      description: Result for a single item in a bulk save operation
      type: object
      additionalProperties: false
      required:
      - key
      - etag
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 255
          description: The key that was saved
        etag:
          type: string
          minLength: 1
          maxLength: 100
          description: New ETag after save

    BulkExistsStateRequest:
      description: Request to check existence of multiple keys
      type: object
      additionalProperties: false
      required:
      - storeName
      - keys
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store
        keys:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 255
          minItems: 1
          maxItems: 1000
          description: Keys to check for existence

    BulkExistsStateResponse:
      description: Response indicating which keys exist in the store
      type: object
      additionalProperties: false
      required:
      - existingKeys
      properties:
        existingKeys:
          type: array
          items:
            type: string
          description: Keys that exist in the store

    BulkDeleteStateRequest:
      description: Request to delete multiple keys
      type: object
      additionalProperties: false
      required:
      - storeName
      - keys
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store
        keys:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 255
          minItems: 1
          maxItems: 1000
          description: Keys to delete

    BulkDeleteStateResponse:
      description: Response from a bulk delete operation
      type: object
      additionalProperties: false
      required:
      - deletedCount
      properties:
        deletedCount:
          type: integer
          minimum: 0
          description: Number of keys actually deleted

    ListStoresRequest:
      type: object
      additionalProperties: false
      description: Optional filters for store listing (empty object returns all)
      properties:
        backendFilter:
          type: string
          enum:
          - Redis
          - Mysql
          nullable: true
          description: Filter stores by backend type
        includeStats:
          type: boolean
          default: false
          description: Include key counts (may be slow for large stores)

    ListStoresResponse:
      description: Response containing the list of configured state stores
      type: object
      additionalProperties: false
      required:
      - stores
      properties:
        stores:
          type: array
          items:
            $ref: '#/components/schemas/StoreInfo'
          description: List of configured stores

    StoreInfo:
      description: Information about a configured state store including its name, backend type, and optional key count
      type: object
      additionalProperties: false
      required:
      - name
      - backend
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Store name
        backend:
          type: string
          enum:
          - Redis
          - Mysql
          description: Backend type
        keyCount:
          type: integer
          minimum: 0
          nullable: true
          description: Number of keys (only if includeStats=true)

    MigrationBackend:
      type: string
      enum:
        - Redis
        - Mysql
      description: Target backend type for state store migration

    MigrateDryRunRequest:
      description: Request to analyze a store for migration feasibility
      type: object
      additionalProperties: false
      required:
        - storeName
        - destinationBackend
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store to analyze
        destinationBackend:
          $ref: '#/components/schemas/MigrationBackend'
          description: Target backend to migrate to

    MigrateDryRunResponse:
      description: Dry-run analysis result showing migration feasibility and potential issues
      type: object
      additionalProperties: false
      required:
        - storeName
        - currentBackend
        - destinationBackend
        - incompatibleFeatures
        - warnings
        - canMigrate
      properties:
        storeName:
          type: string
          description: Name of the analyzed store
        currentBackend:
          $ref: '#/components/schemas/MigrationBackend'
          description: Current backend of the store
        destinationBackend:
          $ref: '#/components/schemas/MigrationBackend'
          description: Requested target backend
        keyValueEntryCount:
          type: integer
          minimum: 0
          nullable: true
          description: Count of key-value entries (null if Redis source — cannot enumerate efficiently)
        incompatibleFeatures:
          type: array
          items:
            type: string
          description: Features that cannot be migrated (e.g., sorted sets, TTL-bearing keys)
        warnings:
          type: array
          items:
            type: string
          description: Advisory messages (e.g., ETag format will change)
        canMigrate:
          type: boolean
          description: Whether migration can proceed (false if same backend, store not found, or incompatible-only)

    MigrateExecuteRequest:
      description: Request to execute a state store migration between backends
      type: object
      additionalProperties: false
      required:
        - storeName
        - destinationBackend
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store to migrate
        destinationBackend:
          $ref: '#/components/schemas/MigrationBackend'
          description: Target backend to migrate to

    MigrateExecuteResponse:
      description: Result of a successful state store migration
      type: object
      additionalProperties: false
      required:
        - storeName
        - entriesMigrated
        - durationMs
      properties:
        storeName:
          type: string
          description: Name of the migrated store
        entriesMigrated:
          type: integer
          minimum: 0
          description: Number of key-value entries copied
        durationMs:
          type: integer
          format: int64
          minimum: 0
          description: Total elapsed time in milliseconds

    MigrateVerifyRequest:
      description: Request to verify migration by comparing key counts between backends
      type: object
      additionalProperties: false
      required:
        - storeName
        - destinationBackend
      properties:
        storeName:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the state store to verify
        destinationBackend:
          $ref: '#/components/schemas/MigrationBackend'
          description: Backend to compare against current

    MigrateVerifyResponse:
      description: Verification result comparing key counts between source and destination backends
      type: object
      additionalProperties: false
      required:
        - storeName
      properties:
        storeName:
          type: string
          description: Name of the verified store
        sourceKeyCount:
          type: integer
          minimum: 0
          nullable: true
          description: Key count in source backend (null if Redis source — cannot enumerate)
        destinationKeyCount:
          type: integer
          minimum: 0
          nullable: true
          description: Key count in destination backend (null if Redis destination)
        countsMatch:
          type: boolean
          nullable: true
          description: Whether counts match (null if either side cannot enumerate)
