openapi: 3.0.4
info:
  title: Resource Lifecycle Events
  description: |
    Event models for Resource service RabbitMQ pub/sub.
    Handles cleanup coordination, grace period, compression, and snapshot events.

    **Note**: Reference registration/unregistration is handled via direct API calls
    (IResourceClient.RegisterReferenceAsync/UnregisterReferenceAsync), not events.
    Higher-layer services call the Resource API directly for reliable reference tracking.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-event-subscriptions: []
  x-event-publications:
    # Cleanup failure event for monitoring
    - topic: resource.cleanup.callback-failed
      event: ResourceCleanupCallbackFailedEvent
      description: Published when a cleanup callback fails during resource deletion
    # Grace period started event
    - topic: resource.grace-period.started
      event: ResourceGracePeriodStartedEvent
      description: Published when a resource's refcount reaches zero and grace period begins
    # Migration events
    - topic: resource.migrated
      event: ResourceMigratedEvent
      description: Published when a resource migration completes successfully
    - topic: resource.migrate.callback-failed
      event: ResourceMigrateCallbackFailedEvent
      description: Published when a migration callback fails during resource migration
    # Compression events
    - topic: resource.compressed
      event: ResourceCompressedEvent
      description: Published when a resource is successfully compressed
    - topic: resource.compress.callback-failed
      event: ResourceCompressCallbackFailedEvent
      description: Published when a compression callback fails
    - topic: resource.decompressed
      event: ResourceDecompressedEvent
      description: Published when a resource is decompressed
    # Snapshot events (for living entities)
    - topic: resource.snapshot.created
      event: ResourceSnapshotCreatedEvent
      description: Published when an ephemeral snapshot of a living resource is created
    # Transaction lifecycle events (provisioning coordination)
    - topic: resource.transaction.created
      event: ResourceTransactionCreatedEvent
      description: Published when a provisioning transaction is begun (orchestration in progress)
    - topic: resource.transaction.committed
      event: ResourceTransactionCommittedEvent
      description: Published when a transaction is successfully committed (provisions become permanent references)
    - topic: resource.transaction.aborted
      event: ResourceTransactionAbortedEvent
      description: Published when a transaction is fully aborted (all compensations complete or retries exhausted)
    - topic: resource.transaction.auto-committed
      event: ResourceTransactionAutoCommittedEvent
      description: Published when the recovery worker auto-commits a transaction via TTL validation check
    - topic: resource.transaction.auto-aborted
      event: ResourceTransactionAutoAbortedEvent
      description: Published when the recovery worker auto-aborts a transaction after TTL validation fails
    - topic: resource.transaction.commit-failed
      event: ResourceTransactionCommitFailedEvent
      description: Published when commit reference registration exhausts retries and falls back to abort
    - topic: resource.transaction.compensation-exhausted
      event: ResourceTransactionCompensationExhaustedEvent
      description: Published when compensation retries are exhausted for one or more provisions (error event for admin)
    - topic: resource.transaction.validation-exhausted
      event: ResourceTransactionValidationExhaustedEvent
      description: Published when TTL validation retries are exhausted and the transaction requires admin intervention

paths: {}  # Events don't have HTTP paths

components:
  schemas:
    # =========================================================================
    # Events this service PUBLISHES
    # =========================================================================

    ResourceCleanupCallbackFailedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when a cleanup callback fails during resource deletion.
        Used for monitoring and alerting on cleanup failures.
      required:
      - eventName
      - eventId
      - timestamp
      - resourceType
      - resourceId
      - sourceType
      - serviceName
      - endpoint
      - statusCode
      properties:
        eventName:
          type: string
          default: resource.cleanup.callback-failed
          description: 'Event type identifier: resource.cleanup.callback-failed'
        resourceType:
          type: string
          description: Type of resource being cleaned up (opaque identifier)
        resourceId:
          type: string
          format: uuid
          description: ID of the resource being cleaned up
        sourceType:
          type: string
          description: Type of entity whose cleanup failed (opaque identifier)
        serviceName:
          type: string
          description: Service whose callback failed
        endpoint:
          type: string
          description: Endpoint that failed
        statusCode:
          type: integer
          description: HTTP status code returned (0 if connection failed)
        errorMessage:
          type: string
          nullable: true
          description: Error details

    ResourceGracePeriodStartedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when a resource's reference count reaches zero.
        The resource enters a grace period before becoming eligible for cleanup.
      required:
      - eventName
      - eventId
      - timestamp
      - resourceType
      - resourceId
      - gracePeriodEndsAt
      properties:
        eventName:
          type: string
          default: resource.grace-period.started
          description: 'Event type identifier: resource.grace-period.started'
        resourceType:
          type: string
          description: Type of resource entering grace period (opaque identifier)
        resourceId:
          type: string
          format: uuid
          description: ID of the resource entering grace period
        gracePeriodEndsAt:
          type: string
          format: date-time
          description: When the grace period ends and cleanup becomes eligible

    # =========================================================================
    # Migration Events
    # =========================================================================

    ResourceMigratedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when a resource migration completes successfully.
        All registered migrate callbacks were invoked to reassign dependents
        from the source resource to the target resource.
      required:
      - eventName
      - eventId
      - timestamp
      - resourceType
      - sourceResourceId
      - targetResourceId
      - callbackCount
      properties:
        eventName:
          type: string
          default: resource.migrated
          description: 'Event type identifier: resource.migrated'
        resourceType:
          type: string
          description: Type of resource migrated (opaque identifier)
        sourceResourceId:
          type: string
          format: uuid
          description: ID of the source resource whose dependents were migrated
        targetResourceId:
          type: string
          format: uuid
          description: ID of the target resource dependents were migrated to
        callbackCount:
          type: integer
          description: Number of migration callbacks that were executed
        succeededSourceTypes:
          type: array
          items:
            type: string
          description: Source types whose migration callbacks succeeded
        failedSourceTypes:
          type: array
          items:
            type: string
          description: Source types whose migration callbacks failed (empty on full success)

    ResourceMigrateCallbackFailedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when a migration callback fails during resource migration.
        Used for monitoring and alerting on migration failures.
      required:
      - eventName
      - eventId
      - timestamp
      - resourceType
      - sourceResourceId
      - targetResourceId
      - sourceType
      - serviceName
      - endpoint
      - statusCode
      properties:
        eventName:
          type: string
          default: resource.migrate.callback-failed
          description: 'Event type identifier: resource.migrate.callback-failed'
        resourceType:
          type: string
          description: Type of resource being migrated (opaque identifier)
        sourceResourceId:
          type: string
          format: uuid
          description: ID of the source resource
        targetResourceId:
          type: string
          format: uuid
          description: ID of the target resource
        sourceType:
          type: string
          description: Type of entity whose migration failed (opaque identifier)
        serviceName:
          type: string
          description: Service whose callback failed
        endpoint:
          type: string
          description: Endpoint that failed
        statusCode:
          type: integer
          description: HTTP status code returned (0 if connection failed)
        errorMessage:
          type: string
          nullable: true
          description: Error details

    # =========================================================================
    # Compression Events
    # =========================================================================

    ResourceCompressedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when compression completes successfully.
        Services can subscribe to perform post-compression actions.
      required:
      - eventName
      - eventId
      - timestamp
      - resourceType
      - resourceId
      - archiveId
      - sourceDataDeleted
      properties:
        eventName:
          type: string
          default: resource.compressed
          description: 'Event type identifier: resource.compressed'
        resourceType:
          type: string
          description: Type of resource compressed (opaque identifier)
        resourceId:
          type: string
          format: uuid
          description: ID of the resource compressed
        archiveId:
          type: string
          format: uuid
          description: ID of the created archive
        sourceDataDeleted:
          type: boolean
          description: Whether source data was deleted after archival
        entriesCount:
          type: integer
          description: Number of services that contributed data to the archive

    ResourceCompressCallbackFailedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when a compression callback fails.
        Used for monitoring and alerting on compression failures.
      required:
      - eventName
      - eventId
      - timestamp
      - resourceType
      - resourceId
      - sourceType
      - serviceName
      - endpoint
      - statusCode
      properties:
        eventName:
          type: string
          default: resource.compress.callback-failed
          description: 'Event type identifier: resource.compress.callback-failed'
        resourceType:
          type: string
          description: Type of resource being compressed (opaque identifier)
        resourceId:
          type: string
          format: uuid
          description: ID of the resource being compressed
        sourceType:
          type: string
          description: Type of data whose compression failed (opaque identifier)
        serviceName:
          type: string
          description: Service whose callback failed
        endpoint:
          type: string
          description: Endpoint that failed
        statusCode:
          type: integer
          description: HTTP status code returned (0 if connection failed)
        errorMessage:
          type: string
          nullable: true
          description: Error details

    ResourceDecompressedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when decompression completes with at least one successful callback.
        Includes per-source-type success/failure arrays so consumers can assess partial
        restoration state without querying the full API response.
      required:
      - eventName
      - eventId
      - timestamp
      - resourceType
      - resourceId
      - archiveId
      - entriesCount
      - succeededSourceTypes
      - failedSourceTypes
      properties:
        eventName:
          type: string
          default: resource.decompressed
          description: 'Event type identifier: resource.decompressed'
        resourceType:
          type: string
          description: Type of resource decompressed (opaque identifier)
        resourceId:
          type: string
          format: uuid
          description: ID of the resource decompressed
        archiveId:
          type: string
          format: uuid
          description: ID of the archive that was restored
        entriesCount:
          type: integer
          description: Total number of decompression callbacks attempted
        succeededSourceTypes:
          type: array
          items:
            type: string
          description: Source types whose decompression callbacks succeeded
        failedSourceTypes:
          type: array
          items:
            type: string
          description: Source types whose decompression callbacks failed (empty on full success)

    # =========================================================================
    # Snapshot Events (Living Entity Snapshots)
    # =========================================================================

    ResourceSnapshotCreatedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when an ephemeral snapshot of a living resource is created.
        Unlike ResourceCompressedEvent, this indicates a non-destructive capture
        of data from a resource that continues to exist.

        **Use Case**: Storyline Composer and Actor behaviors need compressed
        data from living entities to seed emergent narratives without affecting
        the source data.
      required:
      - eventName
      - eventId
      - timestamp
      - resourceType
      - resourceId
      - snapshotId
      - snapshotType
      - expiresAt
      - entriesCount
      properties:
        eventName:
          type: string
          default: resource.snapshot.created
          description: 'Event type identifier: resource.snapshot.created'
        resourceType:
          type: string
          description: Type of resource snapshotted (opaque identifier)
        resourceId:
          type: string
          format: uuid
          description: ID of the resource snapshotted
        snapshotId:
          type: string
          format: uuid
          description: ID of the created snapshot (for retrieval)
        snapshotType:
          type: string
          description: Label for snapshot purpose (e.g., "storyline_seed")
        expiresAt:
          type: string
          format: date-time
          description: When this snapshot will expire
        entriesCount:
          type: integer
          description: Number of services that contributed data to the snapshot

    # =========================================================================
    # Transaction Lifecycle Events (Provisioning Coordination)
    # =========================================================================

    ResourceTransactionCreatedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when a provisioning transaction is begun.
      required:
      - eventName
      - eventId
      - timestamp
      - transactionId
      - ownerService
      - parentResourceType
      - parentResourceId
      - ttlSeconds
      properties:
        eventName:
          type: string
          default: resource.transaction.created
          description: 'Event type identifier: resource.transaction.created'
        transactionId:
          type: string
          format: uuid
          description: Unique transaction identifier
        ownerService:
          type: string
          description: Service that owns the transaction (e.g., "genesis", "craft")
        parentResourceType:
          type: string
          description: Type of entity being provisioned (opaque identifier)
        parentResourceId:
          type: string
          format: uuid
          description: ID of the entity being provisioned
        ttlSeconds:
          type: integer
          description: Transaction TTL before validation check

    ResourceTransactionCommittedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when a transaction is successfully committed. All provisions are now permanent references.
      required:
      - eventName
      - eventId
      - timestamp
      - transactionId
      - ownerService
      - parentResourceType
      - parentResourceId
      - provisionCount
      properties:
        eventName:
          type: string
          default: resource.transaction.committed
          description: 'Event type identifier: resource.transaction.committed'
        transactionId:
          type: string
          format: uuid
          description: Transaction identifier
        ownerService:
          type: string
          description: Service that owns the transaction
        parentResourceType:
          type: string
          description: Type of entity that was provisioned
        parentResourceId:
          type: string
          format: uuid
          description: ID of the entity that was provisioned
        provisionCount:
          type: integer
          description: Number of provisions converted to permanent references

    ResourceTransactionAbortedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when a transaction is fully aborted. All compensations completed or retries exhausted.
      required:
      - eventName
      - eventId
      - timestamp
      - transactionId
      - ownerService
      - parentResourceType
      - parentResourceId
      - compensatedCount
      - failedCount
      properties:
        eventName:
          type: string
          default: resource.transaction.aborted
          description: 'Event type identifier: resource.transaction.aborted'
        transactionId:
          type: string
          format: uuid
          description: Transaction identifier
        ownerService:
          type: string
          description: Service that owns the transaction
        parentResourceType:
          type: string
          description: Type of entity whose provisioning was aborted
        parentResourceId:
          type: string
          format: uuid
          description: ID of the entity whose provisioning was aborted
        compensatedCount:
          type: integer
          description: Number of provisions successfully compensated
        failedCount:
          type: integer
          description: Number of provisions whose compensation failed after max retries

    ResourceTransactionAutoCommittedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when the recovery worker auto-commits a transaction after TTL validation confirms the parent entity exists.
      required:
      - eventName
      - eventId
      - timestamp
      - transactionId
      - ownerService
      - parentResourceType
      - parentResourceId
      properties:
        eventName:
          type: string
          default: resource.transaction.auto-committed
          description: 'Event type identifier: resource.transaction.auto-committed'
        transactionId:
          type: string
          format: uuid
          description: Transaction identifier
        ownerService:
          type: string
          description: Service that owns the transaction
        parentResourceType:
          type: string
          description: Type of entity whose provisioning was auto-committed
        parentResourceId:
          type: string
          format: uuid
          description: ID of the entity whose provisioning was auto-committed

    ResourceTransactionAutoAbortedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when the recovery worker auto-aborts a transaction after TTL validation confirms the parent entity does not exist.
      required:
      - eventName
      - eventId
      - timestamp
      - transactionId
      - ownerService
      - parentResourceType
      - parentResourceId
      properties:
        eventName:
          type: string
          default: resource.transaction.auto-aborted
          description: 'Event type identifier: resource.transaction.auto-aborted'
        transactionId:
          type: string
          format: uuid
          description: Transaction identifier
        ownerService:
          type: string
          description: Service that owns the transaction
        parentResourceType:
          type: string
          description: Type of entity whose provisioning was auto-aborted
        parentResourceId:
          type: string
          format: uuid
          description: ID of the entity whose provisioning was auto-aborted

    ResourceTransactionCommitFailedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when commit reference registration exhausts retries. The transaction falls back to abort and compensation.
      required:
      - eventName
      - eventId
      - timestamp
      - transactionId
      - ownerService
      - parentResourceType
      - parentResourceId
      - registeredCount
      - failedCount
      properties:
        eventName:
          type: string
          default: resource.transaction.commit-failed
          description: 'Event type identifier: resource.transaction.commit-failed'
        transactionId:
          type: string
          format: uuid
          description: Transaction identifier
        ownerService:
          type: string
          description: Service that owns the transaction
        parentResourceType:
          type: string
          description: Type of entity whose commit failed
        parentResourceId:
          type: string
          format: uuid
          description: ID of the entity whose commit failed
        registeredCount:
          type: integer
          description: Number of provisions that were successfully registered as references
        failedCount:
          type: integer
          description: Number of provisions that failed reference registration

    ResourceTransactionCompensationExhaustedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when compensation retries are exhausted for one or more provisions.
        The transaction moves to Aborted but some provisions may remain uncompensated.
        Requires admin investigation.
      required:
      - eventName
      - eventId
      - timestamp
      - transactionId
      - ownerService
      - parentResourceType
      - parentResourceId
      - failedProvisionCount
      properties:
        eventName:
          type: string
          default: resource.transaction.compensation-exhausted
          description: 'Event type identifier: resource.transaction.compensation-exhausted'
        transactionId:
          type: string
          format: uuid
          description: Transaction identifier
        ownerService:
          type: string
          description: Service that owns the transaction
        parentResourceType:
          type: string
          description: Type of entity whose compensation was exhausted
        parentResourceId:
          type: string
          format: uuid
          description: ID of the entity whose compensation was exhausted
        failedProvisionCount:
          type: integer
          description: Number of provisions whose compensation retries were exhausted

    ResourceTransactionValidationExhaustedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Published when TTL validation retries are exhausted. The completion validation
        endpoint is unreachable or returning 5xx consistently. The transaction remains
        Active for admin investigation — it is NOT auto-aborted because the parent
        entity might exist but be temporarily unreachable.
      required:
      - eventName
      - eventId
      - timestamp
      - transactionId
      - ownerService
      - parentResourceType
      - parentResourceId
      - validationAttempts
      properties:
        eventName:
          type: string
          default: resource.transaction.validation-exhausted
          description: 'Event type identifier: resource.transaction.validation-exhausted'
        transactionId:
          type: string
          format: uuid
          description: Transaction identifier
        ownerService:
          type: string
          description: Service that owns the transaction
        parentResourceType:
          type: string
          description: Type of entity whose validation was exhausted
        parentResourceId:
          type: string
          format: uuid
          description: ID of the entity whose validation was exhausted
        validationAttempts:
          type: integer
          description: Total number of validation attempts made before giving up
