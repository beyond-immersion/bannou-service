openapi: 3.0.4
info:
  title: Permission Service Events
  description: |
    Event models for Permission service RabbitMQ pub/sub via MassTransit.
    Handles session state management and capability compilation.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-event-subscriptions:
    # Session updates from Auth service (role/authorization changes).
    # This is the only remaining event subscription. Session connected/disconnected
    # are now handled via ISessionActivityListener DI listener pattern (GH#392)
    # since Connect and Permission are both L1 AppFoundation (always co-located).
    - topic: session.updated
      event: SessionUpdatedEvent
      handler: HandleSessionUpdated
  x-event-publications:
    # Permission capability updates sent to Connect service
    - topic: permission.capability-update
      event: PermissionCapabilityUpdate
      description: Published when session capabilities are compiled or updated
    # Bulk observability event for service registration patterns
    - topic: permission.services-registered
      event: PermissionServicesRegistered
      description: Published periodically with accumulated service registrations for observability

paths: {}  # Events don't have HTTP paths

components:
  schemas:
    # NOTE: Events the Permission service subscribes to (ServiceRegistrationEvent, SessionConnectedEvent, etc.)
    # are defined in their canonical locations and accessed via BeyondImmersion.BannouService.Events namespace

    PermissionServicesRegistered:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Bulk observability event published periodically containing accumulated service
        permission registrations. Fire-and-forget for Analytics aggregation of startup
        patterns. Each node publishes independently (per IMPLEMENTATION TENETS
        multi-instance safety acknowledgment).
      required:
        - eventName
        - eventId
        - timestamp
        - registrations
        - registrationCount
        - windowStartedAt
      properties:
        eventName:
          type: string
          default: "permission.services-registered"
          description: 'Event type identifier: permission.services-registered'
        registrations:
          type: array
          items:
            $ref: '#/components/schemas/PermissionRegistrationEntry'
          description: List of service registrations accumulated during the batch window
        registrationCount:
          type: integer
          minimum: 0
          description: Number of registrations in this batch
        windowStartedAt:
          type: string
          format: date-time
          description: When the accumulation window started for this batch

    PermissionRegistrationEntry:
      type: object
      additionalProperties: false
      description: Individual service registration entry within a bulk registration event
      required:
        - serviceId
        - registeredAt
      properties:
        serviceId:
          type: string
          description: Service identifier that registered its permission matrix
        version:
          type: string
          nullable: true
          description: Service version string at registration time
        registeredAt:
          type: string
          format: date-time
          description: When this individual service registration occurred

    PermissionCapabilityUpdate:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Event published to specific Connect service instances (CONNECT_{session_id} channel).
        Contains compiled permission capabilities for a session with optional delta updates.
      required:
        - eventName
        - eventId
        - timestamp
        - sessionId
        - version
        - updateType
      properties:
        eventName:
          type: string
          default: "permission.capability-update"
          description: Fixed event type identifier
        sessionId:
          type: string
          format: uuid
          description: Session ID that had capability changes
        version:
          type: integer
          minimum: 0
          description: New capability version number (increments on each update)
        updateType:
          $ref: 'common-api.yaml#/components/schemas/CapabilityUpdateType'
          description: Type of update — full capabilities or delta changes
        fullCapabilities:
          type: object
          nullable: true
          additionalProperties:
            type: array
            items:
              type: string
          description: |
            Complete capability map (for full updates or initial connection).
            Key: service_id, Value: array of allowed endpoints.
        addedCapabilities:
          type: object
          nullable: true
          additionalProperties:
            type: array
            items:
              type: string
          description: |
            New capabilities added to the session (for delta updates).
            Same format as fullCapabilities.
        removedCapabilities:
          type: object
          nullable: true
          additionalProperties:
            type: array
            items:
              type: string
          description: |
            Capabilities removed from the session (for delta updates).
            Same format as fullCapabilities.
        generatedAt:
          type: string
          format: date-time
          nullable: true
          description: When these capabilities were compiled
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: When these capabilities expire and need refresh
        reason:
          $ref: 'common-api.yaml#/components/schemas/CapabilityUpdateReason'
          nullable: true
          description: Reason for the capability update

