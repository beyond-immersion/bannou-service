components:
  schemas:
    TemperatureCurveShape:
      type: string
      description: Shape of the intra-day temperature curve for hourly interpolation
      enum:
      - Sinusoidal
      - Plateau
      - Spike
    PrecipitationType:
      type: string
      description: Form of precipitation. Temperature crossover rules apply (Rain below 0C becomes Snow, Snow above 5C 
        becomes Rain, between 0-5C becomes Sleet)
      enum:
      - None
      - Rain
      - Snow
      - Sleet
      - Hail
    WeatherEventScopeType:
      type: string
      description: Scope level of a weather event override, determining geographic reach and precedence
      enum:
      - Realm
      - Location
      - LocationSubtree
    WeatherEventSourceType:
      type: string
      description: Origin type of a weather event, tracking who or what created it
      enum:
      - Divine
      - Scheduled
      - GameEvent
      - Admin
    ConditionRefreshMode:
      type: string
      description: Strategy for the background worker's per-realm condition refresh cycle
      enum:
      - AllLocations
      - ActiveOnly
    WeatherEventEndReason:
      type: string
      description: Reason a weather event ended
      enum:
      - Cancelled
      - SourceRemoved
      - Expired
    TemperatureCurve:
      type: object
      additionalProperties: false
      description: Seasonal temperature curve definition controlling base min/max temperature and intra-day variation
      required:
      - seasonCode
      - baseMinTemp
      - baseMaxTemp
      properties:
        seasonCode:
          type: string
          minLength: 1
          maxLength: 64
          description: References a Worldstate calendar season code (game-configurable)
        baseMinTemp:
          type: number
          format: double
          description: Minimum daily temperature in abstract units (typically Celsius-like)
        baseMaxTemp:
          type: number
          format: double
          description: Maximum daily temperature in abstract units
        hourlyShape:
          $ref: '#/components/schemas/TemperatureCurveShape'
          nullable: true
          description: Curve shape for intra-day variation (null defaults to Sinusoidal)
        peakHour:
          type: integer
          default: 14
          minimum: 0
          maximum: 23
          description: Game-hour of maximum temperature
        troughHour:
          type: integer
          default: 4
          minimum: 0
          maximum: 23
          description: Game-hour of minimum temperature
    WeatherPattern:
      type: object
      additionalProperties: false
      description: Individual weather pattern definition within a seasonal distribution
      required:
      - weatherCode
      - weight
      - durationGameHours
      - temperatureModifier
      - visibilityMultiplier
      - precipitationIntensity
      - precipitationType
      - cloudCover
      - resourceImpactModifier
      properties:
        weatherCode:
          type: string
          minLength: 1
          maxLength: 64
          description: Weather pattern code (e.g., clear, cloudy, storm, fog)
        weight:
          type: number
          format: double
          minimum: 0
          description: Relative probability weight for this season
        durationGameHours:
          type: integer
          minimum: 1
          description: Typical duration in game-hours before re-rolling
        temperatureModifier:
          type: number
          format: double
          description: Additive temperature modifier while this weather is active
        visibilityMultiplier:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Visibility multiplier (1.0 = normal, 0.1 = blizzard)
        precipitationIntensity:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Precipitation intensity (0.0 = none, 1.0 = maximum)
        precipitationType:
          $ref: '#/components/schemas/PrecipitationType'
          description: Form of precipitation for this weather pattern
        cloudCover:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Cloud coverage (0.0 = clear sky, 1.0 = fully overcast)
        resourceImpactModifier:
          type: number
          format: double
          description: Additive impact on resource availability (rain=+0.05, storm=-0.15, drought=-0.3)
    WeatherDistributionSeason:
      type: object
      additionalProperties: false
      description: Seasonal weather distribution containing weighted patterns for a season
      required:
      - seasonCode
      - patterns
      properties:
        seasonCode:
          type: string
          minLength: 1
          maxLength: 64
          description: References a Worldstate calendar season code
        patterns:
          type: array
          items:
            $ref: '#/components/schemas/WeatherPattern'
          description: Weighted weather patterns for this season
    AtmosphericBaselineSeason:
      type: object
      additionalProperties: false
      description: Seasonal atmospheric baseline values for humidity, wind, and wind direction
      required:
      - seasonCode
      - baseHumidity
      - baseWindSpeed
      - windDirectionBias
      - windVariance
      properties:
        seasonCode:
          type: string
          minLength: 1
          maxLength: 64
          description: References a Worldstate calendar season code
        baseHumidity:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Baseline humidity (0.0-1.0)
        baseWindSpeed:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Normalized baseline wind speed (0.0-1.0)
        windDirectionBias:
          type: number
          format: double
          minimum: 0
          maximum: 360
          description: Prevailing wind direction in degrees
        windVariance:
          type: number
          format: double
          minimum: 0
          maximum: 360
          description: Degrees of random deviation from prevailing wind direction
    ResourceAvailabilitySeason:
      type: object
      additionalProperties: false
      description: Seasonal resource availability values for ecological abundance
      required:
      - seasonCode
      - abundanceLevel
      - forageModifier
      - huntModifier
      properties:
        seasonCode:
          type: string
          minLength: 1
          maxLength: 64
          description: References a Worldstate calendar season code
        abundanceLevel:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Base ecological abundance (0.0 = barren, 1.0 = abundant)
        forageModifier:
          type: number
          format: double
          minimum: 0
          description: Multiplier for forageable resource generation
        huntModifier:
          type: number
          format: double
          minimum: 0
          description: Multiplier for wildlife activity
    GetConditionsRequest:
      type: object
      additionalProperties: false
      description: Request to get environmental conditions at a specific location
      required:
      - realmId
