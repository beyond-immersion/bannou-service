        ,\n    \"$defs\": {\n        \"GetConditionsRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to get environmental conditions at a specific location\",\n     \
        \       \"required\": [\n                \"realmId\",\n                \"locationId\"\n            ],\n          \
        \  \"properties\": {\n                \"realmId\": {\n                    \"type\": \"string\",\n                \
        \    \"format\": \"uuid\",\n                    \"description\": \"Realm containing the location\"\n             \
        \   },\n                \"locationId\": {\n                    \"type\": \"string\",\n                    \"format\"\
        : \"uuid\",\n                    \"description\": \"Location to get conditions for\"\n                }\n        \
        \    }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/ConditionSnapshotResponse\"\
        ,\n    \"$defs\": {\n        \"ConditionSnapshotResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Full environmental condition snapshot for a location at a point in time\"\
        ,\n            \"required\": [\n                \"locationId\",\n                \"realmId\",\n                \"\
        biomeCode\",\n                \"weatherCode\",\n                \"temperature\",\n                \"feelsLike\",\n\
        \                \"isFreezing\",\n                \"isHot\",\n                \"precipitationType\",\n           \
        \     \"precipitationIntensity\",\n                \"windSpeed\",\n                \"windDirection\",\n          \
        \      \"humidity\",\n                \"visibility\",\n                \"cloudCover\",\n                \"resourceAvailability\"\
        ,\n                \"isDrought\",\n                \"isAbundant\",\n                \"hasActiveEvent\",\n        \
        \        \"computedAt\"\n            ],\n            \"properties\": {\n                \"locationId\": {\n      \
        \              \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"Location this snapshot is for\"\n                },\n                \"realmId\": {\n                    \"type\"\
        : \"string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"Realm containing
        the location\"\n                },\n                \"biomeCode\": {\n                    \"type\": \"string\",\n\
        \                    \"description\": \"Resolved biome code for this location\"\n                },\n            \
        \    \"weatherCode\": {\n                    \"type\": \"string\",\n                    \"description\": \"Current
        weather pattern code\"\n                },\n                \"temperature\": {\n                    \"type\": \"number\"\
        ,\n                    \"format\": \"double\",\n                    \"description\": \"Computed temperature in abstract
        units\"\n                },\n                \"feelsLike\": {\n                    \"type\": \"number\",\n       \
        \             \"format\": \"double\",\n                    \"description\": \"Wind-chill adjusted temperature\"\n\
        \                },\n                \"isFreezing\": {\n                    \"type\": \"boolean\",\n             \
        \       \"description\": \"True when temperature is below zero\"\n                },\n                \"isHot\": {\n\
        \                    \"type\": \"boolean\",\n                    \"description\": \"True when temperature exceeds
        the biome heat threshold\"\n                },\n                \"precipitationType\": {\n                    \"$ref\"\
        : \"#/$defs/PrecipitationType\",\n                    \"description\": \"Current precipitation form\"\n          \
        \      },\n                \"precipitationIntensity\": {\n                    \"type\": \"number\",\n            \
        \        \"format\": \"double\",\n                    \"description\": \"Current precipitation intensity (0.0-1.0)\"\
        \n                },\n                \"windSpeed\": {\n                    \"type\": \"number\",\n              \
        \      \"format\": \"double\",\n                    \"description\": \"Normalized wind speed (0.0-1.0)\"\n       \
        \         },\n                \"windDirection\": {\n                    \"type\": \"number\",\n                  \
        \  \"format\": \"double\",\n                    \"description\": \"Wind direction in degrees (0.0-360.0)\"\n     \
        \           },\n                \"humidity\": {\n                    \"type\": \"number\",\n                    \"\
        format\": \"double\",\n                    \"description\": \"Humidity level (0.0-1.0)\"\n                },\n   \
        \             \"visibility\": {\n                    \"type\": \"number\",\n                    \"format\": \"double\"\
        ,\n                    \"description\": \"Visibility level (0.0 = zero, 1.0 = perfect)\"\n                },\n   \
        \             \"cloudCover\": {\n                    \"type\": \"number\",\n                    \"format\": \"double\"\
        ,\n                    \"description\": \"Cloud coverage (0.0-1.0)\"\n                },\n                \"resourceAvailability\"\
        : {\n                    \"type\": \"number\",\n                    \"format\": \"double\",\n                    \"\
        description\": \"Composite ecological resource abundance (0.0-1.0)\"\n                },\n                \"isDrought\"\
        : {\n                    \"type\": \"boolean\",\n                    \"description\": \"True when resource availability
        is below the drought threshold\"\n                },\n                \"isAbundant\": {\n                    \"type\"\
        : \"boolean\",\n                    \"description\": \"True when resource availability is above the abundance threshold\"\
        \n                },\n                \"hasActiveEvent\": {\n                    \"type\": \"boolean\",\n        \
        \            \"description\": \"Whether any weather event affects this location\"\n                },\n          \
        \      \"activeEventCode\": {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n\
        \                    \"description\": \"Event code of the highest-severity active event (null if none)\"\n       \
        \         },\n                \"activeEventSeverity\": {\n                    \"type\": \"number\",\n            \
        \        \"format\": \"double\",\n                    \"nullable\": true,\n                    \"description\": \"\
        Severity of the active event (null if none)\"\n                },\n                \"computedAt\": {\n           \
        \         \"type\": \"string\",\n                    \"format\": \"date-time\",\n                    \"description\"\
        : \"When this snapshot was computed\"\n                }\n            }\n        },\n        \"PrecipitationType\"\
        : {\n            \"type\": \"string\",\n            \"description\": \"Form of precipitation. Temperature crossover
        rules apply (Rain below 0C becomes Snow, Snow above 5C becomes Rain, between 0-5C becomes Sleet)\",\n            \"\
        enum\": [\n                \"None\",\n                \"Rain\",\n                \"Snow\",\n                \"Sleet\"\
        ,\n                \"Hail\"\n            ]\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Get environmental conditions at a location\",\n    \"description\": \"\
        Returns the full condition snapshot for a location, computing on cache miss.\",\n    \"tags\": [\n        \"Conditions\"\
        \n    ],\n    \"deprecated\": false,\n    \"operationId\": \"getConditions\"\n}"
