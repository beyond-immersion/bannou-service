openapi: 3.0.4
info:
  title: Bannou Environment Service API
  description: |
    Weather simulation, temperature modeling, atmospheric conditions, and ecological resource
    availability for game worlds. Consumes temporal data from Worldstate (L2) and translates
    it into environmental conditions that affect NPC behavior, production, trade, and player
    experience. Internal-only, never internet-facing.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-references:
  - target: realm
    sourceType: environment
    field: realmId
    onDelete: cascade
    cleanup:
      endpoint: /environment/cleanup-by-realm
      payloadTemplate: '{"realmId": "{{resourceId}}"}'
  - target: game-service
    sourceType: environment
    field: gameServiceId
    onDelete: cascade
    cleanup:
      endpoint: /environment/cleanup-by-game-service
      payloadTemplate: '{"gameServiceId": "{{resourceId}}"}'
  - target: location
    sourceType: environment
    field: locationId
    onDelete: cascade
    cleanup:
      endpoint: /environment/cleanup-by-location
      payloadTemplate: '{"locationId": "{{resourceId}}"}'
x-service-layer: GameFeatures
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)
paths:
  /environment/conditions/get:
    post:
      operationId: getConditions
      tags:
      - Conditions
      summary: Get environmental conditions at a location
      description: Returns the full condition snapshot for a location, computing on cache miss.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetConditionsRequest'
      responses:
        '200':
          description: Condition snapshot retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConditionSnapshotResponse'
        '404':
          description: No resolvable climate template for this location
