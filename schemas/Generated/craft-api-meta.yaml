    CraftabilityBreakdown:
      type: object
      additionalProperties: false
      description: Detailed breakdown of why an entity can or cannot craft a recipe
      required:
      - recipeKnown
      - proficiencyMet
      - materialsAvailable
      - currencyAvailable
      - stationAvailable
      - toolAvailable
      properties:
        recipeKnown:
          type: boolean
          description: Whether the entity knows this recipe
        proficiencyMet:
          type: boolean
          description: Whether the entity meets proficiency requirements
        materialsAvailable:
          type: boolean
          description: Whether the entity has required materials
        currencyAvailable:
          type: boolean
          description: Whether the entity has sufficient currency
        stationAvailable:
          type: boolean
          description: Whether a required station is available
        toolAvailable:
          type: boolean
          description: Whether a required tool is available
    QualityEstimateBreakdown:
      type: object
      additionalProperties: false
      description: Detailed breakdown of a quality estimate
      required:
      - materialContribution
      - proficiencyContribution
      - toolContribution
      - estimatedQuality
      properties:
        materialContribution:
          type: number
          format: double
          description: Material quality contribution to final score
        proficiencyContribution:
          type: number
          format: double
          description: Proficiency contribution to final score
        toolContribution:
          type: number
          format: double
          description: Tool quality contribution to final score
        estimatedQuality:
          type: number
          format: double
          description: Final estimated quality score (0-1)
    OutputPreviewBand:
      type: object
      additionalProperties: false
      description: Preview of recipe output at a specific quality level
      required:
      - qualityLevel
      - outputs
      properties:
        qualityLevel:
          type: string
          description: Quality band label (e.g., low, medium, high)
        qualityValue:
          type: number
          format: double
          nullable: true
          description: Representative quality value for this band
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/OutputPreviewItem'
          description: Predicted outputs at this quality level
    OutputPreviewItem:
      type: object
      additionalProperties: false
      description: A single predicted output item in an output preview
      required:
      - itemTemplateCode
      - quantity
      properties:
        itemTemplateCode:
          type: string
          description: Item template code
        quantity:
          type: number
          format: double
          description: Predicted quantity at this quality level
    SessionStepInfo:
      type: object
      additionalProperties: false
