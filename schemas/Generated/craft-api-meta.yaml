      - recipeId
      - domain
      - recipeType
      - canCraftNow
      properties:
        recipeCode:
          type: string
          description: Recipe code
        recipeId:
          type: string
          format: uuid
          description: Recipe identifier
        domain:
          type: string
          description: Proficiency domain
        recipeType:
          type: string
          description: Recipe paradigm
        canCraftNow:
          type: boolean
          description: Whether the entity can currently craft this recipe
    ProficiencyInfo:
      type: object
