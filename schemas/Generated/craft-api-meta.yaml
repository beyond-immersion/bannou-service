      - entityType
      - role
      properties:
        entityId:
          type: string
          format: uuid
          description: Participant entity identifier
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the participant entity
        role:
          type: string
          minLength: 1
          maxLength: 100
          description: Participant role (e.g., master, apprentice, assistant)
    StationInfo:
      type: object
      additionalProperties: false
      description: Crafting station definition
      required:
      - stationId
      - gameServiceId
      - stationType
      - quality
      - isActive
      properties:
        stationId:
          type: string
          format: uuid
          description: Unique station identifier
        gameServiceId:
          type: string
          format: uuid
          description: Game service this station belongs to
        stationType:
          type: string
          description: Station type code
        locationId:
          type: string
          format: uuid
          nullable: true
          description: Physical location of the station (null means portable)
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Entity that owns this station (null means unowned)
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Type of the owning entity (null when unowned)
        quality:
          type: number
          format: double
