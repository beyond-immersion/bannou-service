      description: |
        Marks a recipe as deprecated with a reason. Deprecated recipes cannot
        be used to start new sessions. Idempotent — returns OK if already deprecated.
      operationId: deprecateRecipe
      tags:
      - Recipe Management
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateRecipeRequest'
