components:
  schemas:
    AchievementType:
      type: string
      description: Type of achievement
      enum:
      - Standard
      - Progressive
      - Hidden
      - Secret
    Platform:
      type: string
      description: External platform for achievement sync
      enum:
      - Steam
      - Xbox
      - PlayStation
      - Internal
    SyncStatus:
      type: string
      description: Status of platform synchronization
      enum:
      - Pending
      - Synced
      - Failed
      - NotLinked
    PlatformMapping:
      type: object
      description: Maps an achievement to a platform-specific ID
      additionalProperties: false
      required:
      - platform
      - platformAchievementId
      properties:
        platform:
          $ref: '#/components/schemas/Platform'
          description: External platform
        platformAchievementId:
          type: string
          minLength: 1
          maxLength: 200
          description: Platform-specific achievement identifier
    CreateAchievementDefinitionRequest:
      type: object
      description: Request to create a new achievement
      additionalProperties: false
      required:
      - gameServiceId
      - achievementId
      - displayName
      - description
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service owning this achievement
        achievementId:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z0-9_-]+$"
          description: Unique identifier for this achievement (lowercase, no spaces)
        displayName:
          type: string
          minLength: 1
          maxLength: 100
          description: Human-readable name
        description:
          type: string
          minLength: 1
          maxLength: 500
          description: Description of how to earn this achievement
        hiddenDescription:
          type: string
          maxLength: 500
          nullable: true
          description: Description shown before achievement is earned (for hidden types)
        achievementType:
          $ref: '#/components/schemas/AchievementType'
          default: Standard
          description: Classification of the achievement (affects visibility and progress behavior)
        entityTypes:
          type: array
          items:
            $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Which entity types can earn this achievement
        progressTarget:
          type: integer
          nullable: true
          description: Target value for progressive achievements
        points:
          type: integer
          default: 10
          description: Point value of this achievement
        iconUrl:
          type: string
          nullable: true
          description: URL to achievement icon
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/Platform'
          nullable: true
          description: Platforms where this achievement exists
        platformMappings:
          type: array
          items:
            $ref: '#/components/schemas/PlatformMapping'
          nullable: true
          description: Platform-specific achievement ID mappings
        prerequisites:
          type: array
          items:
            type: string
          nullable: true
          description: Achievement IDs that must be unlocked first
        scoreType:
          type: string
          maxLength: 100
          nullable: true
          description: Score type code for matching analytics.score.updated events (progressive achievements)
        milestoneType:
          type: string
          maxLength: 100
          nullable: true
          description: Milestone type code for matching analytics.milestone.reached events
        milestoneValue:
          type: number
          format: double
          nullable: true
          description: Expected milestone value for matching analytics.milestone.reached events
        milestoneName:
          type: string
          maxLength: 200
          nullable: true
          description: Expected milestone name for matching analytics.milestone.reached events
        leaderboardId:
          type: string
          maxLength: 100
          nullable: true
          description: Leaderboard ID for matching leaderboard.rank.changed events
        rankThreshold:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Rank threshold for leaderboard achievements (unlock when rank <= threshold)
        category:
          type: string
          maxLength: 100
          nullable: true
          description: Game-defined category for UI grouping and filtering (e.g. Combat, Exploration, Social)
        isActive:
          type: boolean
          default: true
          description: Whether this achievement can be earned
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Client-only metadata. No Bannou plugin reads specific keys from this field by convention.
    GetAchievementDefinitionRequest:
      type: object
      description: Request to get an achievement definition
      additionalProperties: false
      required:
      - gameServiceId
      - achievementId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        achievementId:
          type: string
          minLength: 1
          maxLength: 64
          description: ID of the achievement
    ListAchievementDefinitionsRequest:
      type: object
      description: Request to list achievement definitions
      additionalProperties: false
      required:
      - gameServiceId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        category:
          type: string
          maxLength: 100
          nullable: true
          description: Filter by game-defined category
        platform:
          $ref: '#/components/schemas/Platform'
          nullable: true
          description: Filter by platform
        achievementType:
          $ref: '#/components/schemas/AchievementType'
          nullable: true
          description: Filter by achievement classification
        isActive:
          type: boolean
          nullable: true
          description: Filter by active status
        includeHidden:
          type: boolean
          default: false
          description: Include hidden achievements in response
        includeDeprecated:
          type: boolean
          default: false
          description: Whether to include deprecated definitions in results
    ListAchievementDefinitionsResponse:
      type: object
      description: Response containing achievement definitions
      additionalProperties: false
      required:
      - achievements
      properties:
        achievements:
          type: array
          items:
            $ref: '#/components/schemas/AchievementDefinitionResponse'
          description: List of achievement definitions
    UpdateAchievementDefinitionRequest:
      type: object
      description: Request to update an achievement definition
      additionalProperties: false
      required:
      - gameServiceId
      - achievementId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        achievementId:
          type: string
          minLength: 1
          maxLength: 64
          description: ID of the achievement to update
        displayName:
          type: string
          maxLength: 100
          nullable: true
          description: New display name
        description:
          type: string
          maxLength: 500
          nullable: true
          description: New description
        category:
          type: string
          maxLength: 100
          nullable: true
          description: New category for UI grouping
        isActive:
          type: boolean
          nullable: true
          description: New active status
        platformMappings:
          type: array
          items:
            $ref: '#/components/schemas/PlatformMapping'
          nullable: true
          description: Updated platform ID mappings
        scoreType:
          type: string
          maxLength: 100
          nullable: true
          description: Score type code for matching analytics.score.updated events (progressive achievements)
        milestoneType:
          type: string
          maxLength: 100
          nullable: true
          description: Milestone type code for matching analytics.milestone.reached events
        milestoneValue:
          type: number
          format: double
          nullable: true
          description: Expected milestone value for matching analytics.milestone.reached events
        milestoneName:
          type: string
          maxLength: 200
          nullable: true
          description: Expected milestone name for matching analytics.milestone.reached events
        leaderboardId:
          type: string
          maxLength: 100
          nullable: true
          description: Leaderboard ID for matching leaderboard.rank.changed events
        rankThreshold:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Rank threshold for leaderboard achievements (unlock when rank <= threshold)
    DeprecateAchievementDefinitionRequest:
      type: object
      description: Request to deprecate an achievement definition
      additionalProperties: false
      required:
      - gameServiceId
      - achievementId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        achievementId:
          type: string
          minLength: 1
          maxLength: 64
          description: ID of the achievement to deprecate
        deprecationReason:
          type: string
          maxLength: 500
          nullable: true
          description: Audit reason for deprecation, explaining why this achievement is being phased out
    AchievementDefinitionResponse:
      type: object
      description: Achievement definition details
      additionalProperties: false
      required:
      - gameServiceId
      - achievementId
      - displayName
      - description
      - achievementType
      - points
      - isActive
      - isDeprecated
      - earnedCount
      - createdAt
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the owning game service
        achievementId:
          type: string
          description: Unique identifier
        displayName:
          type: string
          description: Human-readable name
        description:
          type: string
          description: How to earn this achievement
        hiddenDescription:
          type: string
          nullable: true
          description: Description for hidden achievements
        achievementType:
          $ref: '#/components/schemas/AchievementType'
          description: Classification of the achievement
        category:
          type: string
          nullable: true
          description: Game-defined category for UI grouping and filtering
        entityTypes:
          type: array
          items:
            $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Allowed entity types
        progressTarget:
          type: integer
          nullable: true
          description: Target for progressive achievements
        points:
          type: integer
          description: Point value
        iconUrl:
          type: string
          nullable: true
          description: Achievement icon URL
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/Platform'
          nullable: true
          description: Available platforms
        platformMappings:
          type: array
          items:
            $ref: '#/components/schemas/PlatformMapping'
          nullable: true
          description: Platform-specific achievement ID mappings
        prerequisites:
          type: array
          items:
            type: string
          nullable: true
          description: Required achievements
        scoreType:
          type: string
          maxLength: 100
          nullable: true
          description: Score type code for matching analytics.score.updated events (progressive achievements)
        milestoneType:
          type: string
          maxLength: 100
          nullable: true
          description: Milestone type code for matching analytics.milestone.reached events
        milestoneValue:
          type: number
          format: double
          nullable: true
          description: Expected milestone value for matching analytics.milestone.reached events
        milestoneName:
          type: string
          maxLength: 200
          nullable: true
          description: Expected milestone name for matching analytics.milestone.reached events
        leaderboardId:
          type: string
          maxLength: 100
          nullable: true
          description: Leaderboard ID for matching leaderboard.rank.changed events
        rankThreshold:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Rank threshold for leaderboard achievements (unlock when rank <= threshold)
        isActive:
          type: boolean
          description: Whether achievement is earnable
        isDeprecated:
          type: boolean
          description: Whether this definition is deprecated and should not be used for new progress
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: When deprecation occurred, null if not deprecated
        deprecationReason:
          type: string
          nullable: true
          maxLength: 500
          description: Audit reason for deprecation, null if not deprecated
        earnedCount:
          type: integer
          format: int64
          description: How many entities have earned this
        createdAt:
          type: string
          format: date-time
          description: When the achievement was created
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Client-only metadata. No Bannou plugin reads specific keys from this field by convention.
    GetAchievementProgressRequest:
      type: object
      description: Request to get achievement progress
      additionalProperties: false
      required:
      - gameServiceId
      - entityId
      - entityType
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        entityId:
          type: string
          format: uuid
          description: ID of the entity
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type whose progress is requested
        achievementId:
          type: string
          nullable: true
          description: Specific achievement ID (null for all)
    AchievementProgressResponse:
      type: object
      description: Achievement progress for an entity
      additionalProperties: false
      required:
      - entityId
      - entityType
      - progress
      - totalPoints
      - unlockedCount
      properties:
        entityId:
          type: string
          format: uuid
          description: ID of the entity
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type that owns this progress summary
        progress:
          type: array
          items:
            $ref: '#/components/schemas/AchievementProgress'
          description: Progress for each achievement
        totalPoints:
          type: integer
          description: Total points from unlocked achievements
        unlockedCount:
          type: integer
          description: Number of unlocked achievements
    AchievementProgress:
      type: object
      description: Progress toward a single achievement
      additionalProperties: false
      required:
      - achievementId
      - displayName
      - isUnlocked
      properties:
        achievementId:
          type: string
          description: Achievement identifier
        displayName:
          type: string
          description: Achievement display name
        currentProgress:
          type: integer
          nullable: true
          description: Current progress (for progressive)
        targetProgress:
          type: integer
          nullable: true
          description: Target progress (for progressive)
        percentComplete:
          type: number
          format: double
          nullable: true
          description: Completion percentage (0-100)
        isUnlocked:
          type: boolean
          description: Whether achievement is unlocked
        unlockedAt:
          type: string
          format: date-time
          nullable: true
          description: When achievement was unlocked
    UpdateAchievementProgressRequest:
      type: object
      description: Request to update achievement progress
      additionalProperties: false
      required:
      - gameServiceId
      - achievementId
      - entityId
      - entityType
      - increment
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        achievementId:
          type: string
          minLength: 1
          maxLength: 64
          description: ID of the achievement
        entityId:
          type: string
          format: uuid
          description: ID of the entity
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type receiving the progress increment
        increment:
          type: integer
          minimum: 1
          description: Amount to increment progress
    UpdateAchievementProgressResponse:
      type: object
      description: Response after updating progress
      additionalProperties: false
      required:
      - previousProgress
      - newProgress
      - targetProgress
      - unlocked
      properties:
        previousProgress:
          type: integer
          description: Progress before update
        newProgress:
          type: integer
          description: Progress after update
        targetProgress:
          type: integer
          description: Target to unlock
        unlocked:
          type: boolean
          description: Whether this update unlocked the achievement
        unlockedAt:
          type: string
          format: date-time
          nullable: true
          description: Unlock timestamp (if unlocked)
    UnlockAchievementRequest:
      type: object
      description: Request to directly unlock an achievement
      additionalProperties: false
      required:
      - gameServiceId
      - achievementId
      - entityId
      - entityType
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        achievementId:
          type: string
          minLength: 1
          maxLength: 64
          description: ID of the achievement to unlock
        entityId:
          type: string
          format: uuid
          description: ID of the entity
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type to unlock the achievement for
        skipPlatformSync:
          type: boolean
          default: false
          description: Skip syncing to external platforms
    UnlockAchievementResponse:
      type: object
      description: Response after unlocking an achievement
      additionalProperties: false
      required:
      - unlockedAt
      properties:
        unlockedAt:
          type: string
          format: date-time
          description: Unlock timestamp
        platformSyncStatus:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SyncStatus'
          nullable: true
          description: Sync status by platform
    ListUnlockedAchievementsRequest:
      type: object
      description: Request to list unlocked achievements
      additionalProperties: false
      required:
      - gameServiceId
      - entityId
      - entityType
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        entityId:
          type: string
          format: uuid
          description: ID of the entity
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type whose unlocked achievements are listed
        platform:
          $ref: '#/components/schemas/Platform'
          nullable: true
          description: Filter by platform
        includeDeprecated:
          type: boolean
          default: false
          description: Whether to include achievements earned from deprecated definitions
    ListUnlockedAchievementsResponse:
      type: object
      description: Response containing unlocked achievements
      additionalProperties: false
      required:
      - entityId
      - entityType
      - achievements
      - totalPoints
      properties:
        entityId:
          type: string
          format: uuid
          description: ID of the entity
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type for the returned unlocked achievements
        achievements:
          type: array
          items:
            $ref: '#/components/schemas/UnlockedAchievement'
          description: List of unlocked achievements
        totalPoints:
          type: integer
          description: Total points earned
    UnlockedAchievement:
      type: object
      description: An unlocked achievement instance
      additionalProperties: false
      required:
      - achievementId
      - displayName
      - description
      - points
      - unlockedAt
      properties:
        achievementId:
          type: string
          description: Achievement identifier
        displayName:
          type: string
          description: Achievement name
        description:
          type: string
          description: Achievement description
        points:
          type: integer
          description: Point value
        iconUrl:
          type: string
          nullable: true
          description: Achievement icon
        unlockedAt:
          type: string
          format: date-time
          description: When it was unlocked
    SyncPlatformAchievementsRequest:
      type: object
      description: Request to sync achievements with external platform
      additionalProperties: false
      required:
      - gameServiceId
      - entityId
      - entityType
      - platform
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        entityId:
          type: string
          format: uuid
          description: ID of the entity (must be account for platform sync)
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type to sync (must be account for platform links)
        platform:
          $ref: '#/components/schemas/Platform'
          description: External platform to sync achievements to
    SyncPlatformAchievementsResponse:
      type: object
      description: Response after platform sync attempt
      additionalProperties: false
      required:
      - platform
      - synced
      - failed
      properties:
        platform:
          $ref: '#/components/schemas/Platform'
          description: Platform targeted by the sync attempt
        synced:
          type: integer
          description: Number of achievements successfully synced
        failed:
          type: integer
          description: Number of sync failures
        errors:
          type: array
          items:
            type: string
          nullable: true
          description: Error messages for failed syncs
    GetPlatformSyncStatusRequest:
      type: object
      description: Request to get platform sync status
      additionalProperties: false
      required:
      - gameServiceId
      - entityId
      - entityType
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        entityId:
          type: string
          format: uuid
          description: ID of the entity
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type whose platform sync status is requested
        platform:
          $ref: '#/components/schemas/Platform'
          nullable: true
          description: Specific platform (null for all)
    PlatformSyncStatusResponse:
      type: object
      description: Platform sync status for an entity
      additionalProperties: false
      required:
      - entityId
      - entityType
      - platforms
      properties:
        entityId:
          type: string
          format: uuid
          description: ID of the entity
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type for the reported platform status
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/PlatformStatus'
          description: Sync status per platform
    PlatformStatus:
      type: object
      description: Sync status for a single platform
      additionalProperties: false
      required:
      - platform
      - isLinked
      - syncedCount
      - failedCount
      properties:
        platform:
          $ref: '#/components/schemas/Platform'
          description: Platform this status entry describes
        isLinked:
          type: boolean
          description: Whether entity is linked to this platform
        externalId:
          type: string
          nullable: true
          description: External platform user ID
        syncedCount:
          type: integer
          description: Achievements successfully synced
        pendingCount:
          type: integer
          nullable: true
          description: Achievements pending sync (null when retry queue is not active)
        failedCount:
          type: integer
          description: Achievements that failed to sync
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
          description: Last successful sync timestamp
        lastError:
          type: string
          nullable: true
          description: Most recent sync error
    CleanupByCharacterRequest:
      type: object
      description: Request to delete all achievement progress for a character
      additionalProperties: false
      required:
      - characterId
      properties:
        characterId:
          type: string
          format: uuid
          description: Character whose achievement progress should be deleted
    CleanupByCharacterResponse:
      type: object
      description: Response from cleanup-by-character operation
      additionalProperties: false
      required:
      - progressRecordsDeleted
      properties:
        progressRecordsDeleted:
          type: integer
          minimum: 0
          description: Number of progress records deleted across all game services
