openapi: 3.0.4
info:
  title: Bannou Achievement Service API
  description: |
    Achievement and trophy system with progress tracking and platform synchronization.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU-DESIGN.md for architectural rationale.

    **Polymorphic Entity Model**: Achievements can be earned by accounts, characters,
    guilds, or actors using `entityId + entityType`.

    **Platform Sync**: Supports synchronization with Steam, Xbox, and PlayStation
    achievement systems. Platform-specific achievement IDs are mapped via association tables.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-references:
  - target: character
    sourceType: achievement-progress
    field: entityId
    onDelete: cascade
    cleanup:
      endpoint: /achievement/cleanup-by-character
      payloadTemplate: '{"characterId": "{{resourceId}}"}'
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)
x-service-layer: GameFeatures
paths:
  /achievement/definition/create:
    post:
      summary: Create a new achievement definition
      description: |
        Create a new achievement with specified criteria and platform mappings.
        Developer-only endpoint.
      operationId: createAchievementDefinition
      tags:
      - Definitions
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAchievementDefinitionRequest'
      responses:
        '200':
          description: Achievement created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementDefinitionResponse'
        '409':
          description: Achievement with this ID already exists
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/CreateAchievementDefinitionRequest\"\
        ,\n    \"$defs\": {\n        \"CreateAchievementDefinitionRequest\": {\n            \"type\": \"object\",\n      \
        \      \"description\": \"Request to create a new achievement\",\n            \"additionalProperties\": false,\n \
        \           \"required\": [\n                \"gameServiceId\",\n                \"achievementId\",\n            \
        \    \"displayName\",\n                \"description\"\n            ],\n            \"properties\": {\n          \
        \      \"gameServiceId\": {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n\
        \                    \"description\": \"ID of the game service owning this achievement\"\n                },\n   \
        \             \"achievementId\": {\n                    \"type\": \"string\",\n                    \"minLength\":
        1,\n                    \"maxLength\": 64,\n                    \"pattern\": \"^[a-z0-9_-]+$\",\n                \
        \    \"description\": \"Unique identifier for this achievement (lowercase, no spaces)\"\n                },\n    \
        \            \"displayName\": {\n                    \"type\": \"string\",\n                    \"minLength\": 1,\n\
        \                    \"maxLength\": 100,\n                    \"description\": \"Human-readable name\"\n         \
        \       },\n                \"description\": {\n                    \"type\": \"string\",\n                    \"\
        minLength\": 1,\n                    \"maxLength\": 500,\n                    \"description\": \"Description of how
        to earn this achievement\"\n                },\n                \"hiddenDescription\": {\n                    \"type\"\
        : \"string\",\n                    \"maxLength\": 500,\n                    \"nullable\": true,\n                \
        \    \"description\": \"Description shown before achievement is earned (for hidden types)\"\n                },\n\
        \                \"achievementType\": {\n                    \"$ref\": \"#/$defs/AchievementType\",\n            \
        \        \"default\": \"Standard\",\n                    \"description\": \"Classification of the achievement (affects
        visibility and progress behavior)\"\n                },\n                \"entityTypes\": {\n                    \"\
        type\": \"array\",\n                    \"items\": {\n                        \"type\": \"object\"\n             \
        \       },\n                    \"nullable\": true,\n                    \"description\": \"Which entity types can
        earn this achievement\"\n                },\n                \"progressTarget\": {\n                    \"type\":
        \"integer\",\n                    \"nullable\": true,\n                    \"description\": \"Target value for progressive
        achievements\"\n                },\n                \"points\": {\n                    \"type\": \"integer\",\n  \
        \                  \"default\": 10,\n                    \"description\": \"Point value of this achievement\"\n  \
        \              },\n                \"iconUrl\": {\n                    \"type\": \"string\",\n                   \
        \ \"nullable\": true,\n                    \"description\": \"URL to achievement icon\"\n                },\n    \
        \            \"platforms\": {\n                    \"type\": \"array\",\n                    \"items\": {\n      \
        \                  \"$ref\": \"#/$defs/Platform\"\n                    },\n                    \"nullable\": true,\n\
        \                    \"description\": \"Platforms where this achievement exists\"\n                },\n          \
        \      \"platformMappings\": {\n                    \"type\": \"array\",\n                    \"items\": {\n     \
        \                   \"$ref\": \"#/$defs/PlatformMapping\"\n                    },\n                    \"nullable\"\
        : true,\n                    \"description\": \"Platform-specific achievement ID mappings\"\n                },\n\
        \                \"prerequisites\": {\n                    \"type\": \"array\",\n                    \"items\": {\n\
        \                        \"type\": \"string\"\n                    },\n                    \"nullable\": true,\n \
        \                   \"description\": \"Achievement IDs that must be unlocked first\"\n                },\n       \
        \         \"scoreType\": {\n                    \"type\": \"string\",\n                    \"maxLength\": 100,\n \
        \                   \"nullable\": true,\n                    \"description\": \"Score type code for matching analytics.score.updated
        events (progressive achievements)\"\n                },\n                \"milestoneType\": {\n                  \
        \  \"type\": \"string\",\n                    \"maxLength\": 100,\n                    \"nullable\": true,\n     \
        \               \"description\": \"Milestone type code for matching analytics.milestone.reached events\"\n       \
        \         },\n                \"milestoneValue\": {\n                    \"type\": \"number\",\n                 \
        \   \"format\": \"double\",\n                    \"nullable\": true,\n                    \"description\": \"Expected
        milestone value for matching analytics.milestone.reached events\"\n                },\n                \"milestoneName\"\
        : {\n                    \"type\": \"string\",\n                    \"maxLength\": 200,\n                    \"nullable\"\
        : true,\n                    \"description\": \"Expected milestone name for matching analytics.milestone.reached events\"\
        \n                },\n                \"leaderboardId\": {\n                    \"type\": \"string\",\n          \
        \          \"maxLength\": 100,\n                    \"nullable\": true,\n                    \"description\": \"Leaderboard
        ID for matching leaderboard.rank.changed events\"\n                },\n                \"rankThreshold\": {\n    \
        \                \"type\": \"integer\",\n                    \"format\": \"int64\",\n                    \"nullable\"\
        : true,\n                    \"minimum\": 1,\n                    \"description\": \"Rank threshold for leaderboard
        achievements (unlock when rank <= threshold)\"\n                },\n                \"category\": {\n            \
        \        \"type\": \"string\",\n                    \"maxLength\": 100,\n                    \"nullable\": true,\n\
        \                    \"description\": \"Game-defined category for UI grouping and filtering (e.g. Combat, Exploration,
        Social)\"\n                },\n                \"isActive\": {\n                    \"type\": \"boolean\",\n     \
        \               \"default\": true,\n                    \"description\": \"Whether this achievement can be earned\"\
        \n                },\n                \"metadata\": {\n                    \"type\": \"object\",\n               \
        \     \"additionalProperties\": true,\n                    \"nullable\": true,\n                    \"description\"\
        : \"Client-only metadata. No Bannou plugin reads specific keys from this field by convention.\"\n                }\n\
        \            }\n        },\n        \"AchievementType\": {\n            \"type\": \"string\",\n            \"description\"\
        : \"Type of achievement\",\n            \"enum\": [\n                \"Standard\",\n                \"Progressive\"\
        ,\n                \"Hidden\",\n                \"Secret\"\n            ]\n        },\n        \"Platform\": {\n \
        \           \"type\": \"string\",\n            \"description\": \"External platform for achievement sync\",\n    \
        \        \"enum\": [\n                \"Steam\",\n                \"Xbox\",\n                \"PlayStation\",\n  \
        \              \"Internal\"\n            ]\n        },\n        \"PlatformMapping\": {\n            \"type\": \"object\"\
        ,\n            \"description\": \"Maps an achievement to a platform-specific ID\",\n            \"additionalProperties\"\
        : false,\n            \"required\": [\n                \"platform\",\n                \"platformAchievementId\"\n\
        \            ],\n            \"properties\": {\n                \"platform\": {\n                    \"$ref\": \"\
        #/$defs/Platform\",\n                    \"description\": \"External platform\"\n                },\n            \
        \    \"platformAchievementId\": {\n                    \"type\": \"string\",\n                    \"minLength\": 1,\n\
        \                    \"maxLength\": 200,\n                    \"description\": \"Platform-specific achievement identifier\"\
        \n                }\n            }\n        }\n    }\n}"
