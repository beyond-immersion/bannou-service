components:
  schemas:
    SaveCategory:
      type: string
      enum:
      - QuickSave
      - AutoSave
      - ManualSave
      - Checkpoint
      - StateSnapshot
      description: |
        Category of save with predefined behaviors.
        QuickSave: Single-slot fast save, overwritten frequently (max 1 version).
        AutoSave: System-triggered periodic saves (max 5 versions, rolling).
        ManualSave: User-initiated named saves (max 10 versions, no auto-cleanup).
        Checkpoint: Progress markers (max 20 versions, rolling).
        StateSnapshot: Full state captures for debugging (max 3 versions, rolling).
    CompressionType:
      type: string
      enum:
      - None
      - Gzip
      - Brotli
      description: Compression algorithm used for save data
    ConflictResolution:
      type: string
      enum:
      - Skip
      - Overwrite
      - Rename
      - Fail
      description: Strategy for handling conflicts during import
    CircuitBreakerState:
      type: string
      enum:
      - Closed
      - Open
      - HalfOpen
      description: |
        State of the storage circuit breaker.
        Closed: Normal operation, requests flow through.
        Open: Too many failures, requests are rejected.
        HalfOpen: Testing recovery, limited requests allowed.
    JsonPatchOperationType:
      type: string
      enum:
      - Add
      - Remove
      - Replace
      - Move
      - Copy
      - Test
      description: JSON Patch operation type per RFC 6902
    SaveSortField:
      type: string
      enum:
      - CreatedAt
      - Size
      - VersionNumber
      description: Field to sort save query results by
    SortOrder:
      type: string
      enum:
      - Asc
      - Desc
      description: Sort direction for query results
    StatsGroupBy:
      type: string
      enum:
      - OwnerType
      - Category
      - SchemaVersion
      description: Field to group storage statistics by
    JsonPatchOperation:
      type: object
      additionalProperties: false
      required:
      - op
      - path
      description: |
        JSON Patch operation per RFC 6902.
        Uses JsonPatch.Net library (MIT licensed).
      properties:
        op:
          $ref: '#/components/schemas/JsonPatchOperationType'
          description: Operation type
        path:
          type: string
          description: JSON Pointer to target location
        from:
          type: string
          nullable: true
          description: Source path (for move/copy operations)
        value:
          nullable: true
          description: Value to use (for add/replace/test operations, null for remove/move/copy)
    CreateSlotRequest:
      description: Request to create a new save slot for an entity.
      type: object
      additionalProperties: false
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      - category
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-z][a-z0-9-]*$'
          description: Game identifier for namespace isolation (e.g., "game-1", "game-2")
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          description: Slot name (lowercase alphanumeric with hyphens, single char like "q" allowed)
        category:
          $ref: '#/components/schemas/SaveCategory'
          description: Save category determining retention and cleanup behavior
        maxVersions:
          type: integer
          nullable: true
          minimum: 1
          maximum: 100
          description: Override default max versions for this category (null = use category default)
        retentionDays:
          type: integer
          nullable: true
          minimum: 1
          description: Days to retain versions (null = indefinite)
        compressionType:
          allOf:
          - $ref: '#/components/schemas/CompressionType'
          nullable: true
          description: Compression algorithm to use for save data (null = use category default)
        tags:
          type: array
          nullable: true
          items:
            type: string
            maxLength: 32
          maxItems: 20
          description: Searchable tags for slot categorization (e.g., "boss-fight", "chapter-3")
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Client-only metadata for the slot. No Bannou plugin reads specific keys from this field by 
            convention.
    GetSlotRequest:
      type: object
      additionalProperties: false
      description: Request to retrieve metadata for a specific save slot
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: "^[a-z][a-z0-9-]*$"
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Slot name
    ListSlotsRequest:
      type: object
      additionalProperties: false
      description: Request to list all save slots belonging to a specific owner
      required:
      - gameId
      - ownerId
      - ownerType
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: "^[a-z][a-z0-9-]*$"
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns the save slots to list
        category:
          allOf:
          - $ref: '#/components/schemas/SaveCategory'
          nullable: true
          description: Optional filter by save category
        includeVersionCount:
          type: boolean
          default: true
          description: Include version count in response
    DeleteSlotRequest:
      type: object
      additionalProperties: false
      description: Request to permanently delete a save slot and all its versions
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: "^[a-z][a-z0-9-]*$"
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Slot name
    SlotResponse:
      type: object
      additionalProperties: false
      description: Complete metadata for a save slot including version statistics
      required:
      - slotId
      - ownerId
      - ownerType
      - slotName
      - category
      - maxVersions
      - compressionType
      - versionCount
      - totalSizeBytes
      - createdAt
      - updatedAt
      properties:
        slotId:
          type: string
          format: uuid
          description: Unique slot identifier
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          description: Slot name
        category:
          $ref: '#/components/schemas/SaveCategory'
          description: Save category determining retention and cleanup behavior
        maxVersions:
          type: integer
          description: Maximum versions to retain
        retentionDays:
          type: integer
          nullable: true
          description: Days to retain versions (null = indefinite)
        compressionType:
          $ref: '#/components/schemas/CompressionType'
          description: Compression algorithm used for save data
        versionCount:
          type: integer
          description: Current number of versions in slot
        latestVersion:
          type: integer
          nullable: true
          description: Latest version number (null if empty)
        totalSizeBytes:
          type: integer
          format: int64
          description: Total storage used by all versions
        createdAt:
          type: string
          format: date-time
          description: Slot creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last modification timestamp
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Client-only metadata (null if none set). No Bannou plugin reads specific keys from this field by 
            convention.
    ListSlotsResponse:
      type: object
      additionalProperties: false
      description: Response containing a list of save slots for an owner
      required:
      - slots
      properties:
        slots:
          type: array
          items:
            $ref: '#/components/schemas/SlotResponse'
          description: List of slots
        totalCount:
          type: integer
          description: Total number of slots for owner
    DeleteSlotResponse:
      type: object
      additionalProperties: false
      description: Result of a slot deletion operation with cleanup statistics
      required:
      - versionsDeleted
      - bytesFreed
      properties:
        versionsDeleted:
          type: integer
          description: Number of versions deleted
        bytesFreed:
          type: integer
          format: int64
          description: Storage freed in bytes
    SaveRequest:
      type: object
      additionalProperties: false
      description: Request to save game state data to a slot with optional compression and metadata
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      - data
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-z][a-z0-9-]*$'
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Slot name (auto-created if doesn't exist)
        category:
          allOf:
          - $ref: '#/components/schemas/SaveCategory'
          nullable: true
          description: Category for auto-created slots (defaults to MANUAL_SAVE)
        data:
          type: string
          format: byte
          description: Base64-encoded save data
        schemaVersion:
          type: string
          nullable: true
          description: Schema version identifier for migration tracking
        displayName:
          type: string
          nullable: true
          maxLength: 128
          description: Human-readable name for this save
        thumbnail:
          type: string
          format: byte
          nullable: true
          description: |
            Optional preview image (JPEG/WebP). Max size configurable
            (default 256KB). Used for save slot previews in game UI.
        deviceId:
          type: string
          maxLength: 64
          nullable: true
          description: |
            Optional device identifier for cloud save conflict detection.
            When provided, saves are prefixed/tagged with device info,
            enabling opt-in cross-device sync with collision awareness.
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Client-only metadata (e.g., level, playtime, location). No Bannou plugin reads specific keys from
            this field by convention.
        pinAsCheckpoint:
          type: string
          nullable: true
          maxLength: 64
          description: If provided, pin this version with checkpoint name
    SaveResponse:
      type: object
      additionalProperties: false
      description: Result of a save operation including version info and conflict detection
      required:
      - slotId
      - versionNumber
      - contentHash
      - sizeBytes
      - pinned
      - conflictDetected
      - versionsCleanedUp
      - uploadPending
      - createdAt
      properties:
        slotId:
          type: string
          format: uuid
          description: Slot identifier
        versionNumber:
          type: integer
          description: Assigned version number
        contentHash:
          type: string
          description: SHA-256 hash of save data
        sizeBytes:
          type: integer
          format: int64
          description: Size of save data in bytes
        compressedSizeBytes:
          type: integer
          format: int64
          description: Compressed size (if compression applied)
        compressionRatio:
          type: number
          format: double
          description: Compression ratio (0-1)
        pinned:
          type: boolean
          description: Whether version was pinned
        checkpointName:
          type: string
          nullable: true
          description: Checkpoint name if pinned
        thumbnailUrl:
          type: string
          nullable: true
          description: Pre-signed URL to retrieve thumbnail (if provided)
        conflictDetected:
          type: boolean
          description: |
            True if this save overwrote a version from a different device.
            Only relevant when deviceId is used for cloud sync.
        conflictingDeviceId:
          type: string
          nullable: true
          description: Device ID of the overwritten version (if conflict)
        conflictingVersion:
          type: integer
          nullable: true
          description: Version number that was overwritten (if conflict)
        createdAt:
          type: string
          format: date-time
          description: Save timestamp
        versionsCleanedUp:
          type: integer
          description: Number of old versions cleaned up by rolling policy
        uploadPending:
          type: boolean
          description: |
            True if async upload is enabled and data is queued for MinIO upload.
            Save is immediately loadable from Redis cache, but not yet durable.
    LoadRequest:
      type: object
      additionalProperties: false
      description: Request to load save data from a specific slot and version
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: "^[a-z][a-z0-9-]*$"
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          description: Slot name
        versionNumber:
          type: integer
          nullable: true
          description: Specific version to load (defaults to latest)
        checkpointName:
          type: string
          nullable: true
          description: Load by checkpoint name instead of version number
        includeMetadata:
          type: boolean
          default: true
          description: Include version metadata in response
    LoadResponse:
      type: object
      additionalProperties: false
      description: Response containing loaded save data with integrity verification
      required:
      - slotId
      - versionNumber
      - data
      - contentHash
      - pinned
      - createdAt
      properties:
        slotId:
          type: string
          format: uuid
          description: Slot identifier
        versionNumber:
          type: integer
          description: Version number loaded
        data:
          type: string
          format: byte
          description: Base64-encoded save data (decompressed)
        contentHash:
          type: string
          description: SHA-256 hash for integrity verification
        schemaVersion:
          type: string
          nullable: true
          description: Schema version of this save
        displayName:
          type: string
          nullable: true
          description: Human-readable name
        pinned:
          type: boolean
          description: Whether this version is pinned
        checkpointName:
          type: string
          nullable: true
          description: Checkpoint name if pinned
        createdAt:
          type: string
          format: date-time
          description: Save timestamp
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Client-only metadata (null if none set). No Bannou plugin reads specific keys from this field by 
            convention.
    ListVersionsRequest:
      type: object
      additionalProperties: false
      description: Request to list all versions within a save slot with pagination
      required:
