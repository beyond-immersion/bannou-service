  /save-load/slot/delete:
    post:
      tags:
      - Slots
      operationId: DeleteSlot
      summary: Delete slot and all versions
      description: |
        Permanently deletes a slot and all save versions within it.
        This is irreversible. Requires owner access or admin role.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSlotRequest'
      responses:
        '200':
          description: Slot deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSlotResponse'
        '404':
          description: Slot not found
        '403':
          description: Not authorized to delete this slot
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/DeleteSlotRequest\"\
        ,\n    \"$defs\": {\n        \"DeleteSlotRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to permanently delete a save slot and all its versions\",\n     \
        \       \"required\": [\n                \"gameId\",\n                \"ownerId\",\n                \"ownerType\"\
        ,\n                \"slotName\"\n            ],\n            \"properties\": {\n                \"gameId\": {\n  \
        \                  \"type\": \"string\",\n                    \"minLength\": 1,\n                    \"maxLength\"\
        : 32,\n                    \"pattern\": \"^[a-z][a-z0-9-]*$\",\n                    \"description\": \"Game identifier
        for namespace isolation\"\n                },\n                \"ownerId\": {\n                    \"type\": \"string\"\
        ,\n                    \"format\": \"uuid\",\n                    \"description\": \"ID of the owning entity\"\n \
        \               },\n                \"ownerType\": {\n                    \"type\": \"object\",\n                \
        \    \"description\": \"Type of entity that owns this save slot\"\n                },\n                \"slotName\"\
        : {\n                    \"type\": \"string\",\n                    \"minLength\": 1,\n                    \"maxLength\"\
        : 64,\n                    \"description\": \"Slot name\"\n                }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/DeleteSlotResponse\"\
        ,\n    \"$defs\": {\n        \"DeleteSlotResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Result of a slot deletion operation with cleanup statistics\",\n        \
        \    \"required\": [\n                \"versionsDeleted\",\n                \"bytesFreed\"\n            ],\n     \
