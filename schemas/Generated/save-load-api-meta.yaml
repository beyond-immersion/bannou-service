openapi: 3.0.4
info:
  title: Save-Load Service API
  version: 1.0.0
  description: |
    Generic save/load system for game state persistence.
    Supports polymorphic ownership, versioned saves, and schema migration.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
servers:
- url: http://localhost:5012
x-service-layer: GameFeatures
tags:
- name: Slots
  description: Save slot management
- name: Saves
  description: Save/load operations
- name: Versions
  description: Version management
- name: Query
  description: Search and filtering
- name: Migration
  description: Schema migration operations
paths:
  /save-load/slot/create:
    post:
      tags:
      - Slots
      operationId: CreateSlot
      summary: Create or configure a save slot
      description: |
        Creates a new save slot or updates configuration of an existing slot.
        Slots are auto-created on first save, but pre-creation allows setting
        custom configuration (max versions, retention policy, etc.).
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSlotRequest'
      responses:
        '200':
          description: Slot created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotResponse'
        '400':
          description: Invalid request
        '409':
          description: Slot already exists with different owner
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/CreateSlotRequest\"\
        ,\n    \"$defs\": {\n        \"CreateSlotRequest\": {\n            \"description\": \"Request to create a new save
        slot for an entity.\",\n            \"type\": \"object\",\n            \"additionalProperties\": false,\n        \
        \    \"required\": [\n                \"gameId\",\n                \"ownerId\",\n                \"ownerType\",\n\
        \                \"slotName\",\n                \"category\"\n            ],\n            \"properties\": {\n    \
        \            \"gameId\": {\n                    \"type\": \"string\",\n                    \"minLength\": 1,\n   \
        \                 \"maxLength\": 32,\n                    \"pattern\": \"^[a-z][a-z0-9-]*$\",\n                  \
        \  \"description\": \"Game identifier for namespace isolation (e.g., \\\"game-1\\\", \\\"game-2\\\")\"\n         \
        \       },\n                \"ownerId\": {\n                    \"type\": \"string\",\n                    \"format\"\
        : \"uuid\",\n                    \"description\": \"ID of the owning entity\"\n                },\n              \
        \  \"ownerType\": {\n                    \"type\": \"object\",\n                    \"description\": \"Type of entity
        that owns this save slot\"\n                },\n                \"slotName\": {\n                    \"type\": \"\
        string\",\n                    \"minLength\": 1,\n                    \"maxLength\": 64,\n                    \"pattern\"\
        : \"^[a-z0-9]([a-z0-9-]*[a-z0-9])?$\",\n                    \"description\": \"Slot name (lowercase alphanumeric with
        hyphens, single char like \\\"q\\\" allowed)\"\n                },\n                \"category\": {\n            \
        \        \"$ref\": \"#/$defs/SaveCategory\",\n                    \"description\": \"Save category determining retention
        and cleanup behavior\"\n                },\n                \"maxVersions\": {\n                    \"type\": \"integer\"\
        ,\n                    \"nullable\": true,\n                    \"minimum\": 1,\n                    \"maximum\":
        100,\n                    \"description\": \"Override default max versions for this category (null = use category
        default)\"\n                },\n                \"retentionDays\": {\n                    \"type\": \"integer\",\n\
        \                    \"nullable\": true,\n                    \"minimum\": 1,\n                    \"description\"\
        : \"Days to retain versions (null = indefinite)\"\n                },\n                \"compressionType\": {\n  \
        \                  \"allOf\": [\n                        {\n                            \"$ref\": \"#/$defs/CompressionType\"\
        \n                        }\n                    ],\n                    \"nullable\": true,\n                   \
        \ \"description\": \"Compression algorithm to use for save data (null = use category default)\"\n                },\n\
        \                \"tags\": {\n                    \"type\": \"array\",\n                    \"nullable\": true,\n\
        \                    \"items\": {\n                        \"type\": \"string\",\n                        \"maxLength\"\
        : 32\n                    },\n                    \"maxItems\": 20,\n                    \"description\": \"Searchable
        tags for slot categorization (e.g., \\\"boss-fight\\\", \\\"chapter-3\\\")\"\n                },\n               \
        \ \"metadata\": {\n                    \"type\": \"object\",\n                    \"nullable\": true,\n          \
        \          \"additionalProperties\": {\n                        \"type\": \"string\"\n                    },\n   \
        \                 \"description\": \"Client-only metadata for the slot. No Bannou plugin reads specific keys from
        this field by convention.\"\n                }\n            }\n        },\n        \"SaveCategory\": {\n         \
        \   \"type\": \"string\",\n            \"enum\": [\n                \"QuickSave\",\n                \"AutoSave\",\n\
        \                \"ManualSave\",\n                \"Checkpoint\",\n                \"StateSnapshot\"\n           \
        \ ],\n            \"description\": \"Category of save with predefined behaviors.\\nQuickSave: Single-slot fast save,
        overwritten frequently (max 1 version).\\nAutoSave: System-triggered periodic saves (max 5 versions, rolling).\\nManualSave:
        User-initiated named saves (max 10 versions, no auto-cleanup).\\nCheckpoint: Progress markers (max 20 versions, rolling).\\
        nStateSnapshot: Full state captures for debugging (max 3 versions, rolling).\\n\"\n        },\n        \"CompressionType\"\
        : {\n            \"type\": \"string\",\n            \"enum\": [\n                \"None\",\n                \"Gzip\"\
        ,\n                \"Brotli\"\n            ],\n            \"description\": \"Compression algorithm used for save
        data\"\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/SlotResponse\"\
        ,\n    \"$defs\": {\n        \"SlotResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Complete metadata for a save slot including version statistics\",\n     \
        \       \"required\": [\n                \"slotId\",\n                \"ownerId\",\n                \"ownerType\"\
        ,\n                \"slotName\",\n                \"category\",\n                \"maxVersions\",\n              \
        \  \"compressionType\",\n                \"versionCount\",\n                \"totalSizeBytes\",\n                \"\
        createdAt\",\n                \"updatedAt\"\n            ],\n            \"properties\": {\n                \"slotId\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"\
        description\": \"Unique slot identifier\"\n                },\n                \"ownerId\": {\n                  \
        \  \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"ID of
        the owning entity\"\n                },\n                \"ownerType\": {\n                    \"type\": \"object\"\
        ,\n                    \"description\": \"Type of entity that owns this save slot\"\n                },\n        \
        \        \"slotName\": {\n                    \"type\": \"string\",\n                    \"description\": \"Slot name\"\
        \n                },\n                \"category\": {\n                    \"$ref\": \"#/$defs/SaveCategory\",\n \
        \                   \"description\": \"Save category determining retention and cleanup behavior\"\n              \
        \  },\n                \"maxVersions\": {\n                    \"type\": \"integer\",\n                    \"description\"\
        : \"Maximum versions to retain\"\n                },\n                \"retentionDays\": {\n                    \"\
        type\": \"integer\",\n                    \"nullable\": true,\n                    \"description\": \"Days to retain
        versions (null = indefinite)\"\n                },\n                \"compressionType\": {\n                    \"\
        $ref\": \"#/$defs/CompressionType\",\n                    \"description\": \"Compression algorithm used for save data\"\
        \n                },\n                \"versionCount\": {\n                    \"type\": \"integer\",\n          \
        \          \"description\": \"Current number of versions in slot\"\n                },\n                \"latestVersion\"\
        : {\n                    \"type\": \"integer\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Latest version number (null if empty)\"\n                },\n                \"totalSizeBytes\": {\n         \
        \           \"type\": \"integer\",\n                    \"format\": \"int64\",\n                    \"description\"\
        : \"Total storage used by all versions\"\n                },\n                \"createdAt\": {\n                 \
        \   \"type\": \"string\",\n                    \"format\": \"date-time\",\n                    \"description\": \"\
        Slot creation timestamp\"\n                },\n                \"updatedAt\": {\n                    \"type\": \"\
        string\",\n                    \"format\": \"date-time\",\n                    \"description\": \"Last modification
        timestamp\"\n                },\n                \"metadata\": {\n                    \"type\": \"object\",\n    \
        \                \"nullable\": true,\n                    \"additionalProperties\": {\n                        \"\
        type\": \"string\"\n                    },\n                    \"description\": \"Client-only metadata (null if none
        set). No Bannou plugin reads specific keys from this field by convention.\"\n                }\n            }\n  \
        \      },\n        \"SaveCategory\": {\n            \"type\": \"string\",\n            \"enum\": [\n             \
        \   \"QuickSave\",\n                \"AutoSave\",\n                \"ManualSave\",\n                \"Checkpoint\"\
        ,\n                \"StateSnapshot\"\n            ],\n            \"description\": \"Category of save with predefined
        behaviors.\\nQuickSave: Single-slot fast save, overwritten frequently (max 1 version).\\nAutoSave: System-triggered
        periodic saves (max 5 versions, rolling).\\nManualSave: User-initiated named saves (max 10 versions, no auto-cleanup).\\
        nCheckpoint: Progress markers (max 20 versions, rolling).\\nStateSnapshot: Full state captures for debugging (max
        3 versions, rolling).\\n\"\n        },\n        \"CompressionType\": {\n            \"type\": \"string\",\n      \
        \      \"enum\": [\n                \"None\",\n                \"Gzip\",\n                \"Brotli\"\n           \
        \ ],\n            \"description\": \"Compression algorithm used for save data\"\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Create or configure a save slot\",\n    \"description\": \"Creates a new
        save slot or updates configuration of an existing slot.\\nSlots are auto-created on first save, but pre-creation allows
        setting\\ncustom configuration (max versions, retention policy, etc.).\\n\",\n    \"tags\": [\n        \"Slots\"\n\
        \    ],\n    \"deprecated\": false,\n    \"operationId\": \"CreateSlot\"\n}"
