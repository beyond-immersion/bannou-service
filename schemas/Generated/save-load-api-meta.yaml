        description\": \"Optional filter by save category\"\n                },\n                \"includeVersionCount\":
        {\n                    \"type\": \"boolean\",\n                    \"default\": true,\n                    \"description\"\
        : \"Include version count in response\"\n                }\n            }\n        },\n        \"SaveCategory\": {\n\
        \            \"type\": \"string\",\n            \"enum\": [\n                \"QuickSave\",\n                \"AutoSave\"\
        ,\n                \"ManualSave\",\n                \"Checkpoint\",\n                \"StateSnapshot\"\n         \
