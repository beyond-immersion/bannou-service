        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Slot name
        versionNumber:
          type: integer
          nullable: true
          description: Specific version to migrate (null = latest)
        targetSchemaVersion:
          type: string
          minLength: 1
          maxLength: 32
          description: Target schema version to migrate to
        dryRun:
          type: boolean
          default: false
          description: Validate migration without saving
    MigrateSaveResponse:
      type: object
      additionalProperties: false
      description: Result of a schema migration operation with version path details
      required:
      - fromSchemaVersion
      - toSchemaVersion
      properties:
        fromSchemaVersion:
          type: string
          description: Original schema version
        toSchemaVersion:
          type: string
          description: Target schema version
        newVersionNumber:
          type: integer
          nullable: true
          description: New version number (null if dry run)
        migrationPath:
          type: array
          nullable: true
          items:
            type: string
          description: Migration path applied (list of versions, null if dry run failed)
        warnings:
          type: array
          nullable: true
          items:
            type: string
          description: Non-fatal migration warnings (null if none)
    RegisterSchemaRequest:
      type: object
      additionalProperties: false
      description: Request to register a new save data schema with optional migration rules
      required:
      - namespace
      - schemaVersion
      - schema
      properties:
        namespace:
          type: string
          minLength: 1
          maxLength: 64
          description: Schema namespace (e.g., game identifier)
        schemaVersion:
          type: string
          minLength: 1
          maxLength: 32
          description: Schema version identifier
        schema:
          type: object
          additionalProperties: true
          description: JSON Schema definition for validation
        previousVersion:
          type: string
          nullable: true
          description: Previous version this migrates from
        migrationPatch:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JsonPatchOperation'
          maxItems: 1000
          description: |
            JSON Patch (RFC 6902) operations to migrate from previousVersion.
            Uses JsonPatch.Net library (MIT licensed).
    SchemaResponse:
      type: object
      additionalProperties: false
      description: Registered schema definition with version lineage information
      required:
      - namespace
      - schemaVersion
      - hasMigration
      - createdAt
      properties:
        namespace:
          type: string
          description: Schema namespace
        schemaVersion:
          type: string
          description: Schema version
        schema:
          type: object
          additionalProperties: true
          description: JSON Schema definition
        previousVersion:
          type: string
          nullable: true
          description: Previous version
        hasMigration:
          type: boolean
          description: Whether migration script is registered
        createdAt:
          type: string
          format: date-time
          description: Registration timestamp
    ListSchemasRequest:
      type: object
      additionalProperties: false
