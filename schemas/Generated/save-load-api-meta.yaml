          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns the saves to export
        slotNames:
          type: array
          nullable: true
          items:
            type: string
            maxLength: 64
          maxItems: 100
          description: Specific slots to export (null = all slots)
    ExportSavesResponse:
      type: object
      additionalProperties: false
      description: Response with pre-signed URL for downloading exported save archive
      required:
      - downloadUrl
      - expiresAt
      - sizeBytes
      properties:
        downloadUrl:
          type: string
          description: Pre-signed URL to download export archive
        expiresAt:
          type: string
          format: date-time
          description: When the download URL expires
        sizeBytes:
          type: integer
          format: int64
          description: Archive size
    ImportSavesRequest:
      type: object
      additionalProperties: false
      description: Request to import saves from an uploaded archive
      required:
      - archiveAssetId
      - targetGameId
      - targetOwnerId
      - targetOwnerType
      properties:
        archiveAssetId:
          type: string
          format: uuid
