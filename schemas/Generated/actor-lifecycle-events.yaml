    ActorTemplateCreatedEvent:
      allOf:
      - $ref: ../common-events.yaml#/components/schemas/BaseServiceEvent
      type: object
      additionalProperties: false
      description: Published to actor.template.created when a actortemplate is created
      required:
      - eventName
      - eventId
      - timestamp
      - templateId
      - category
      - behaviorRef
      - createdAt
      - updatedAt
      properties:
        eventName:
          type: string
          default: actor.template.created
          description: 'Event type identifier: actor.template.created'
        templateId: &id001
          type: string
          format: uuid
          description: Unique identifier for the actor template
        category: &id002
          type: string
          description: Category identifier for the template
        behaviorRef: &id003
          type: string
          description: Reference to behavior in lib-assets
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the actor template was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the actor template was last updated (set to createdAt on creation)
    ActorTemplateUpdatedEvent:
      allOf:
      - $ref: ../common-events.yaml#/components/schemas/BaseServiceEvent
