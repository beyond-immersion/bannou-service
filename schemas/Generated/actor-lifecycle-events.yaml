          description: 'Event type identifier: actor.template.updated'
        templateId: *id001
        category: *id002
        behaviorRef: *id003
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the actor template was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the actor template was last updated (set to createdAt on creation)
        changedFields:
          type: array
          items:
            type: string
          description: List of field names that were modified
    ActorTemplateDeletedEvent:
