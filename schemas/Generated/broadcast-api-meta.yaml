components:
  schemas:
    PlatformType:
      type: string
      description: Streaming platform type
      enum:
      - Twitch
      - YouTube
      - Custom
    SentimentCategory:
      type: string
      description: Fixed sentiment categories for audience analysis. Intentionally a finite enum (not opaque strings) 
        because lib-showtime needs deterministic audience behavior mapping.
      enum:
      - Excited
      - Supportive
      - Critical
      - Curious
      - Surprised
      - Amused
      - Bored
      - Hostile
    TrackedViewerType:
      type: string
      description: Category of tracked viewers who receive opaque tracking GUIDs. Returner type requires cross-session 
        detection (not available in v1).
      enum:
      - Subscriber
      - Moderator
      - RaidLeader
      - VIP
      - HighEngager
      - Returner
    BroadcastSourceType:
      type: string
      description: Type of broadcast input source
      enum:
      - Camera
      - GameAudio
      - VoiceRoom
    BroadcastState:
      type: string
      description: Current state of a broadcast output
      enum:
      - Active
      - Failed
      - Stopped
    PlatformSessionState:
      type: string
      description: Current state of a platform streaming session
      enum:
      - Active
      - Ended
    AudioCodec:
      type: string
      description: Audio codec for RTMP output. Only LGPL-compliant codecs are valid per FOUNDATION TENETS (licensing).
      enum:
      - Aac
      - Mp3
      - Opus
    VideoCodec:
      type: string
      description: Video codec for RTMP output. Only LGPL-compliant codecs are valid per FOUNDATION TENETS (licensing). 
        GPL codecs (libx264, libx265) are excluded.
      enum:
      - LibVpx
      - LibVpxVp9
    BroadcastHealth:
      type: string
      description: Health status of a broadcast output FFmpeg process
      enum:
      - Healthy
      - Degraded
      - Down
      - Unknown
    PlatformLinkInfo:
      type: object
      additionalProperties: false
      description: Platform link summary (tokens never exposed)
      required:
      - linkId
      - platform
      - linkedAt
      properties:
        linkId:
          type: string
          format: uuid
          description: Platform link identifier
        platform:
          $ref: '#/components/schemas/PlatformType'
          description: Streaming platform type
        displayName:
          type: string
          nullable: true
          description: Platform display name (from OAuth profile or user-provided)
        linkedAt:
          type: string
          format: date-time
          description: When the platform was linked
    PlatformSessionInfo:
      type: object
      additionalProperties: false
      description: Platform session summary
      required:
      - platformSessionId
      - linkId
      - platform
      - state
      - viewerCount
      - startTime
      properties:
        platformSessionId:
          type: string
          format: uuid
          description: Platform session identifier
        linkId:
          type: string
          format: uuid
          description: Associated platform link
        platform:
          $ref: '#/components/schemas/PlatformType'
          description: Streaming platform type
        state:
          $ref: '#/components/schemas/PlatformSessionState'
          description: Current session state
        viewerCount:
          type: integer
          description: Current approximate viewer count
        peakViewerCount:
          type: integer
          description: Peak viewer count during this session
        startTime:
          type: string
          format: date-time
          description: When the session started
        streamSessionId:
          type: string
          format: uuid
          nullable: true
          description: Associated in-game stream session ID (opaque, from lib-showtime)
        endedAt:
          type: string
          format: date-time
          nullable: true
          description: When the session ended (null if still active)
        duration:
          type: integer
          nullable: true
          description: Session duration in seconds (null if still active)
    OutputInfo:
      type: object
      additionalProperties: false
      description: Broadcast output summary (RTMP URL always masked)
      required:
      - broadcastId
      - sourceType
      - maskedRtmpUrl
      - state
      - startedAt
      - health
      properties:
        broadcastId:
          type: string
          format: uuid
          description: Broadcast output identifier
        sourceType:
          $ref: '#/components/schemas/BroadcastSourceType'
          description: Type of broadcast input source
        sourceId:
          type: string
          nullable: true
          description: Source identifier (camera ID or voice room ID, depending on source type)
        maskedRtmpUrl:
          type: string
          description: RTMP destination URL with stream key masked
        state:
          $ref: '#/components/schemas/BroadcastState'
          description: Current broadcast state
        currentVideoSource:
          type: string
          nullable: true
          description: Current active video source in the fallback cascade
        owningInstanceId:
          type: string
          description: Mesh instance ID of the node running this broadcast
        startedAt:
          type: string
          format: date-time
          description: When the broadcast started
        health:
          $ref: '#/components/schemas/BroadcastHealth'
          description: FFmpeg process health status
    SentimentPulseInfo:
      type: object
      additionalProperties: false
      description: Batched anonymous sentiment data from a platform session
      required:
      - platformSessionId
      - timestamp
      - intervalSeconds
      - approximateViewerCount
      - sentiments
      properties:
        platformSessionId:
          type: string
          format: uuid
          description: Platform session that produced this pulse
        streamSessionId:
          type: string
          format: uuid
          nullable: true
          description: Associated in-game stream session (if linked)
        timestamp:
          type: string
          format: date-time
          description: When this pulse was assembled
        intervalSeconds:
          type: integer
          description: Configured pulse interval
        approximateViewerCount:
          type: integer
          description: Platform-reported viewer count (approximate)
        sentiments:
          type: array
          items:
            $ref: '#/components/schemas/SentimentEntry'
          description: Batched anonymous sentiment entries
    SentimentEntry:
      type: object
      additionalProperties: false
      description: Individual anonymous sentiment data point
      required:
      - category
      - intensity
      properties:
        category:
          $ref: '#/components/schemas/SentimentCategory'
          description: Sentiment classification
        intensity:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Strength of sentiment (0.0 to 1.0)
        trackingId:
          type: string
          format: uuid
          nullable: true
          description: Opaque tracking GUID for important viewers (null for anonymous)
        viewerType:
          allOf:
          - $ref: '#/components/schemas/TrackedViewerType'
          nullable: true
          description: Category of tracked viewer (null for anonymous)
    SentimentDistribution:
      type: object
      additionalProperties: false
      description: Distribution of sentiment categories from recent pulse data
      properties:
        excited:
          type: integer
          default: 0
          description: Count of Excited sentiments
        supportive:
          type: integer
          default: 0
          description: Count of Supportive sentiments
        critical:
          type: integer
          default: 0
          description: Count of Critical sentiments
        curious:
          type: integer
          default: 0
          description: Count of Curious sentiments
        surprised:
          type: integer
          default: 0
          description: Count of Surprised sentiments
        amused:
          type: integer
          default: 0
          description: Count of Amused sentiments
        bored:
          type: integer
          default: 0
          description: Count of Bored sentiments
        hostile:
          type: integer
          default: 0
          description: Count of Hostile sentiments
    LinkPlatformRequest:
      type: object
      additionalProperties: false
      description: Request to link a streaming platform account
      required:
      - webSocketSessionId
      - platform
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID for server-side identity resolution
        platform:
          $ref: '#/components/schemas/PlatformType'
          description: Streaming platform to link
        rtmpUrl:
          type: string
          nullable: true
          maxLength: 2048
          description: RTMP URL for Custom platform type. Required when platform is Custom, ignored otherwise.
    LinkPlatformResponse:
      type: object
      additionalProperties: false
      description: Platform link response. Contains oauthRedirectUrl for OAuth platforms or linkId for Custom RTMP.
      properties:
        linkId:
          type: string
          format: uuid
          nullable: true
          description: Platform link ID. Present when platform type is Custom (link created immediately).
        oauthRedirectUrl:
          type: string
          nullable: true
          description: OAuth redirect URL. Present when platform type requires OAuth (Twitch, YouTube).
    PlatformCallbackRequest:
      type: object
      additionalProperties: false
      description: OAuth callback completion request
      required:
      - webSocketSessionId
      - platform
      - authorizationCode
      - state
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID for server-side identity resolution
        platform:
          $ref: '#/components/schemas/PlatformType'
          description: Streaming platform being linked
        authorizationCode:
          type: string
          maxLength: 2048
          description: OAuth authorization code from platform callback
        state:
          type: string
          maxLength: 512
          description: OAuth state token for CSRF verification
    PlatformCallbackResponse:
      type: object
      additionalProperties: false
      description: OAuth callback completion response
      required:
      - linkId
      properties:
        linkId:
          type: string
          format: uuid
          description: Platform link ID created by OAuth flow completion
    UnlinkPlatformRequest:
      type: object
      additionalProperties: false
      description: Request to unlink a streaming platform
      required:
      - webSocketSessionId
      - linkId
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID for server-side identity resolution
        linkId:
          type: string
          format: uuid
          description: Platform link to remove
    ListPlatformsRequest:
      type: object
      additionalProperties: false
      description: Request to list linked platforms for the current account
      required:
      - webSocketSessionId
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID for server-side identity resolution
    PlatformListResponse:
      type: object
      additionalProperties: false
      description: List of linked platforms
      required:
      - links
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/PlatformLinkInfo'
          description: Linked platform accounts (tokens never exposed)
    StartSessionRequest:
      type: object
      additionalProperties: false
      description: Request to start a platform streaming session
      required:
      - webSocketSessionId
      - linkId
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID for server-side identity resolution
        linkId:
          type: string
          format: uuid
          description: Platform link to start streaming on
    StartSessionResponse:
      type: object
      additionalProperties: false
      description: Platform session start response
      required:
      - platformSessionId
      properties:
        platformSessionId:
          type: string
          format: uuid
          description: Created platform session identifier
    StopSessionRequest:
      type: object
      additionalProperties: false
      description: Request to stop a platform streaming session
      required:
      - webSocketSessionId
      - platformSessionId
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID for server-side identity resolution
        platformSessionId:
          type: string
          format: uuid
          description: Platform session to stop
    AssociateSessionRequest:
      type: object
      additionalProperties: false
      description: Request to associate a platform session with an in-game stream session
      required:
      - webSocketSessionId
      - platformSessionId
      - streamSessionId
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID for server-side identity resolution
        platformSessionId:
          type: string
          format: uuid
          description: Platform session to associate
        streamSessionId:
          type: string
          format: uuid
          description: In-game stream session ID (opaque, stored without validation)
    GetSessionStatusRequest:
      type: object
      additionalProperties: false
      description: Request to get platform session status
      required:
      - webSocketSessionId
      - platformSessionId
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID for server-side identity resolution
        platformSessionId:
          type: string
          format: uuid
          description: Platform session to query
    SessionStatusResponse:
      type: object
      additionalProperties: false
      description: Platform session status with sentiment distribution
      required:
      - platformSessionId
      - state
      - viewerCount
      properties:
        platformSessionId:
          type: string
          format: uuid
          description: Platform session identifier
        state:
          $ref: '#/components/schemas/PlatformSessionState'
          description: Current session state
        viewerCount:
          type: integer
          description: Current approximate viewer count
        streamSessionId:
          type: string
          format: uuid
          nullable: true
          description: Associated in-game stream session ID
        sentimentDistribution:
          allOf:
          - $ref: '#/components/schemas/SentimentDistribution'
          nullable: true
          description: Recent sentiment distribution (null if no data yet)
    ListSessionsRequest:
      type: object
      additionalProperties: false
      description: Request to list platform sessions
      required:
      - webSocketSessionId
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID for server-side identity resolution
        page:
          type: integer
          default: 1
          minimum: 1
          description: Page number
        pageSize:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
          description: Items per page
    SessionListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of platform sessions
      required:
      - sessions
      - totalCount
      - page
      - pageSize
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/PlatformSessionInfo'
          description: Platform sessions for the account
        totalCount:
          type: integer
          description: Total number of sessions
        page:
          type: integer
          description: Current page number
        pageSize:
          type: integer
          description: Items per page
    AnnounceCameraRequest:
      type: object
      additionalProperties: false
      description: Camera source announcement with TTL heartbeat
      required:
      - cameraId
      - rtmpInputUrl
      properties:
        cameraId:
          type: string
          maxLength: 256
          description: Unique camera identifier from the game engine
        rtmpInputUrl:
          type: string
          maxLength: 2048
          description: RTMP input URL where the camera publishes its stream
        resolution:
          type: string
          nullable: true
          maxLength: 32
          description: Video resolution (e.g., 1920x1080)
        codec:
          type: string
          nullable: true
          maxLength: 64
          description: Video codec used by the camera source
    CameraAnnounceResponse:
      type: object
      additionalProperties: false
      description: Empty response. 200 OK confirms the camera was announced or refreshed.
    RetireCameraRequest:
      type: object
      additionalProperties: false
      description: Request to retire a camera source
      required:
      - cameraId
      properties:
        cameraId:
          type: string
          maxLength: 256
          description: Camera to retire
    StartOutputRequest:
      type: object
      additionalProperties: false
      description: Request to start a broadcast output
      required:
      - sourceType
      - rtmpUrl
      properties:
        sourceType:
          $ref: '#/components/schemas/BroadcastSourceType'
          description: Type of broadcast input source
        rtmpUrl:
          type: string
          maxLength: 2048
          description: RTMP destination URL (encrypted for storage, masked in responses)
        cameraId:
          type: string
          nullable: true
          maxLength: 256
          description: Camera source ID (required when sourceType is Camera)
        roomId:
          type: string
          format: uuid
          nullable: true
          description: Voice room ID (required when sourceType is VoiceRoom)
        backgroundVideoUrl:
          type: string
          nullable: true
          maxLength: 2048
          description: Primary video background URL for audio-only sources
        fallbackStreamUrl:
          type: string
          nullable: true
          maxLength: 2048
          description: Fallback stream URL if primary video fails
        fallbackImageUrl:
          type: string
          nullable: true
          maxLength: 2048
          description: Fallback image URL if fallback stream fails
    StartOutputResponse:
      type: object
      additionalProperties: false
      description: Broadcast output start response
      required:
      - broadcastId
      properties:
        broadcastId:
          type: string
          format: uuid
          description: Created broadcast output identifier
    StopOutputRequest:
      type: object
      additionalProperties: false
      description: Request to stop a broadcast output
      required:
      - broadcastId
      properties:
        broadcastId:
          type: string
          format: uuid
          description: Broadcast output to stop
    UpdateOutputRequest:
      type: object
      additionalProperties: false
      description: Request to update a broadcast output configuration
      required:
      - broadcastId
      properties:
        broadcastId:
          type: string
          format: uuid
          description: Broadcast output to update
        rtmpUrl:
          type: string
          nullable: true
          maxLength: 2048
          description: New RTMP destination URL (validated via FFprobe before committing)
        backgroundVideoUrl:
          type: string
          nullable: true
          maxLength: 2048
          description: New primary video background URL
        fallbackStreamUrl:
          type: string
          nullable: true
          maxLength: 2048
          description: New fallback stream URL
        fallbackImageUrl:
          type: string
          nullable: true
          maxLength: 2048
          description: New fallback image URL
    GetOutputStatusRequest:
      type: object
      additionalProperties: false
      description: Request to get broadcast output status
      required:
      - broadcastId
      properties:
        broadcastId:
          type: string
          format: uuid
          description: Broadcast output to query
    OutputStatusResponse:
      type: object
      additionalProperties: false
      description: Broadcast output status (RTMP URL always masked)
      required:
      - broadcastId
      - sourceType
      - maskedRtmpUrl
      - state
      - startedAt
      - health
      properties:
        broadcastId:
          type: string
          format: uuid
          description: Broadcast output identifier
        sourceType:
          $ref: '#/components/schemas/BroadcastSourceType'
          description: Type of broadcast input source
        maskedRtmpUrl:
          type: string
          description: RTMP destination URL with stream key masked
        state:
          $ref: '#/components/schemas/BroadcastState'
          description: Current broadcast state
        currentVideoSource:
          type: string
          nullable: true
          description: Current active video source in the fallback cascade
        duration:
          type: integer
          nullable: true
          description: Broadcast duration in seconds (null if not active)
        startedAt:
          type: string
          format: date-time
          description: When the broadcast started
        health:
          $ref: '#/components/schemas/BroadcastHealth'
          description: FFmpeg process health status
    ListOutputsRequest:
      type: object
      additionalProperties: false
      description: Request to list broadcast outputs
      properties:
        page:
          type: integer
          default: 1
          minimum: 1
          description: Page number
        pageSize:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
          description: Items per page
        activeOnly:
          type: boolean
          default: false
          description: Filter to active broadcasts only
    OutputListResponse:
      type: object
      additionalProperties: false
      description: Paginated list of broadcast outputs
      required:
      - outputs
      - totalCount
      - page
      - pageSize
      properties:
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/OutputInfo'
          description: Broadcast outputs (RTMP URLs always masked)
        totalCount:
          type: integer
          description: Total number of outputs
        page:
          type: integer
          description: Current page number
        pageSize:
          type: integer
          description: Items per page
    WebhookPayload:
      type: object
      additionalProperties: true
      description: External platform webhook payload. Validated by platform-specific HMAC/token before processing. Not a
        cross-service data contract.
    WebhookResponse:
      type: object
      additionalProperties: false
      description: Webhook acknowledgement response
      properties:
        challenge:
          type: string
          nullable: true
          description: Twitch webhook verification challenge echo (present only for verification requests)
    GetLatestPulseRequest:
      type: object
      additionalProperties: false
      description: Request to get the latest sentiment pulse
      required:
      - platformSessionId
      properties:
        platformSessionId:
          type: string
          format: uuid
          description: Platform session to query
    LatestPulseResponse:
      type: object
      additionalProperties: false
      description: Latest sentiment pulse for a session
      properties:
        pulse:
          allOf:
          - $ref: '#/components/schemas/SentimentPulseInfo'
          nullable: true
          description: Most recent sentiment pulse (null if no pulses published yet)
    TestSentimentRequest:
      type: object
      additionalProperties: false
      description: Request to test sentiment classification
      required:
      - text
      properties:
        text:
          type: string
          maxLength: 4096
          description: Text to classify
    TestSentimentResponse:
      type: object
      additionalProperties: false
      description: Sentiment classification result
      required:
      - category
      - intensity
      properties:
        category:
          $ref: '#/components/schemas/SentimentCategory'
          description: Classified sentiment category
        intensity:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Strength of sentiment (0.0 to 1.0)
    CleanupByAccountRequest:
      type: object
      additionalProperties: false
      description: Account cleanup request (T28 Account Deletion Cleanup Obligation)
      required:
      - accountId
      properties:
        accountId:
          type: string
          format: uuid
          description: Account whose broadcast data should be cleaned up
