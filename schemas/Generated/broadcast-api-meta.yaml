openapi: 3.0.4
info:
  title: Bannou Broadcast Service API
  description: |
    Platform streaming integration and RTMP output management service (L3 AppFeatures).
    Links external streaming platforms (Twitch, YouTube, custom RTMP), ingests real audience data
    as anonymous sentiment pulses, and broadcasts server-side content via FFmpeg.

    **Privacy Boundary**: Raw audience data (chat messages, usernames, platform IDs) never leaves
    this service as identifiable data. Only anonymous sentiment values are published externally.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
x-service-layer: AppFeatures
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)
paths:
  /broadcast/platform/link:
    post:
      summary: Link a streaming platform account
      description: |
        Initiates platform linking. For OAuth platforms (Twitch, YouTube), returns an OAuth
        redirect URL. For Custom RTMP, stores the URL directly and returns a link ID.
        One link per account per platform enforced.
      operationId: linkPlatform
      tags:
      - BroadcastPlatform
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkPlatformRequest'
      responses:
        '200':
          description: Platform link initiated or created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkPlatformResponse'
        '400':
          description: Broadcast disabled, platform credentials not configured, or invalid request
        '404':
          description: Account not found
        '409':
          description: Platform already linked for this account, or lock acquisition failed
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/LinkPlatformRequest\"\
        ,\n    \"$defs\": {\n        \"LinkPlatformRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to link a streaming platform account\",\n            \"required\"\
        : [\n                \"webSocketSessionId\",\n                \"platform\"\n            ],\n            \"properties\"\
        : {\n                \"webSocketSessionId\": {\n                    \"type\": \"string\",\n                    \"\
        format\": \"uuid\",\n                    \"description\": \"WebSocket session ID for server-side identity resolution\"\
        \n                },\n                \"platform\": {\n                    \"$ref\": \"#/$defs/PlatformType\",\n \
        \                   \"description\": \"Streaming platform to link\"\n                },\n                \"rtmpUrl\"\
        : {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n                    \"maxLength\"\
        : 2048,\n                    \"description\": \"RTMP URL for Custom platform type. Required when platform is Custom,
        ignored otherwise.\"\n                }\n            }\n        },\n        \"PlatformType\": {\n            \"type\"\
        : \"string\",\n            \"description\": \"Streaming platform type\",\n            \"enum\": [\n              \
        \  \"Twitch\",\n                \"YouTube\",\n                \"Custom\"\n            ]\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/LinkPlatformResponse\"\
        ,\n    \"$defs\": {\n        \"LinkPlatformResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Platform link response. Contains oauthRedirectUrl for OAuth platforms or
        linkId for Custom RTMP.\",\n            \"properties\": {\n                \"linkId\": {\n                    \"type\"\
        : \"string\",\n                    \"format\": \"uuid\",\n                    \"nullable\": true,\n              \
        \      \"description\": \"Platform link ID. Present when platform type is Custom (link created immediately).\"\n \
        \               },\n                \"oauthRedirectUrl\": {\n                    \"type\": \"string\",\n         \
        \           \"nullable\": true,\n                    \"description\": \"OAuth redirect URL. Present when platform
        type requires OAuth (Twitch, YouTube).\"\n                }\n            }\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Link a streaming platform account\",\n    \"description\": \"Initiates
        platform linking. For OAuth platforms (Twitch, YouTube), returns an OAuth\\nredirect URL. For Custom RTMP, stores
        the URL directly and returns a link ID.\\nOne link per account per platform enforced.\\n\",\n    \"tags\": [\n   \
        \     \"BroadcastPlatform\"\n    ],\n    \"deprecated\": false,\n    \"operationId\": \"linkPlatform\"\n}"
  /broadcast/platform/callback:
    post:
      summary: Complete OAuth platform linking
      description: |
        Completes OAuth flow after platform redirect. Exchanges authorization code for tokens,
        encrypts and stores them. Creates the platform link.
      operationId: platformCallback
      tags:
      - BroadcastPlatform
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformCallbackRequest'
      responses:
        '200':
          description: OAuth flow completed, platform linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformCallbackResponse'
        '400':
          description: Token encryption key not configured or invalid authorization code
        '409':
          description: Platform already linked (race condition) or lock acquisition failed
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/PlatformCallbackRequest\"\
        ,\n    \"$defs\": {\n        \"PlatformCallbackRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"OAuth callback completion request\",\n            \"required\": [\n     \
        \           \"webSocketSessionId\",\n                \"platform\",\n                \"authorizationCode\",\n     \
        \           \"state\"\n            ],\n            \"properties\": {\n                \"webSocketSessionId\": {\n\
        \                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"WebSocket session ID for server-side identity resolution\"\n                },\n                \"platform\":
        {\n                    \"$ref\": \"#/$defs/PlatformType\",\n                    \"description\": \"Streaming platform
        being linked\"\n                },\n                \"authorizationCode\": {\n                    \"type\": \"string\"\
        ,\n                    \"maxLength\": 2048,\n                    \"description\": \"OAuth authorization code from
        platform callback\"\n                },\n                \"state\": {\n                    \"type\": \"string\",\n\
        \                    \"maxLength\": 512,\n                    \"description\": \"OAuth state token for CSRF verification\"\
        \n                }\n            }\n        },\n        \"PlatformType\": {\n            \"type\": \"string\",\n \
        \           \"description\": \"Streaming platform type\",\n            \"enum\": [\n                \"Twitch\",\n\
        \                \"YouTube\",\n                \"Custom\"\n            ]\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/PlatformCallbackResponse\"\
        ,\n    \"$defs\": {\n        \"PlatformCallbackResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"OAuth callback completion response\",\n            \"required\": [\n    \
        \            \"linkId\"\n            ],\n            \"properties\": {\n                \"linkId\": {\n          \
        \          \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\":
        \"Platform link ID created by OAuth flow completion\"\n                }\n            }\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Complete OAuth platform linking\",\n    \"description\": \"Completes OAuth
        flow after platform redirect. Exchanges authorization code for tokens,\\nencrypts and stores them. Creates the platform
        link.\\n\",\n    \"tags\": [\n        \"BroadcastPlatform\"\n    ],\n    \"deprecated\": false,\n    \"operationId\"\
        : \"platformCallback\"\n}"
  /broadcast/platform/unlink:
    post:
      summary: Unlink a streaming platform
      description: |
        Removes a platform link. Stops any active session, revokes OAuth tokens (best-effort),
        and deletes all associated data including tracking IDs.
      operationId: unlinkPlatform
      tags:
      - BroadcastPlatform
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlinkPlatformRequest'
      responses:
        '200':
          description: Platform unlinked
        '403':
          description: Link does not belong to the requesting account
        '404':
          description: Platform link not found
        '409':
          description: Lock acquisition failed
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/UnlinkPlatformRequest\"\
        ,\n    \"$defs\": {\n        \"UnlinkPlatformRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to unlink a streaming platform\",\n            \"required\": [\n\
        \                \"webSocketSessionId\",\n                \"linkId\"\n            ],\n            \"properties\":
        {\n                \"webSocketSessionId\": {\n                    \"type\": \"string\",\n                    \"format\"\
        : \"uuid\",\n                    \"description\": \"WebSocket session ID for server-side identity resolution\"\n \
        \               },\n                \"linkId\": {\n                    \"type\": \"string\",\n                   \
        \ \"format\": \"uuid\",\n                    \"description\": \"Platform link to remove\"\n                }\n   \
        \         }\n        }\n    }\n}"
      x-response-schema-json: '{}'
      x-endpoint-info-json: "{\n    \"summary\": \"Unlink a streaming platform\",\n    \"description\": \"Removes a platform
        link. Stops any active session, revokes OAuth tokens (best-effort),\\nand deletes all associated data including tracking
        IDs.\\n\",\n    \"tags\": [\n        \"BroadcastPlatform\"\n    ],\n    \"deprecated\": false,\n    \"operationId\"\
        : \"unlinkPlatform\"\n}"
  /broadcast/platform/list:
    post:
      summary: List linked platforms for the current account
      description: |
        Returns all platform links for the authenticated account. Token fields are
        never exposed in responses (stream key masking is absolute).
      operationId: listPlatforms
      tags:
      - BroadcastPlatform
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListPlatformsRequest'
      responses:
        '200':
          description: Platform links retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformListResponse'
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/ListPlatformsRequest\"\
        ,\n    \"$defs\": {\n        \"ListPlatformsRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to list linked platforms for the current account\",\n           \
        \ \"required\": [\n                \"webSocketSessionId\"\n            ],\n            \"properties\": {\n       \
        \         \"webSocketSessionId\": {\n                    \"type\": \"string\",\n                    \"format\": \"\
        uuid\",\n                    \"description\": \"WebSocket session ID for server-side identity resolution\"\n     \
        \           }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/PlatformListResponse\"\
        ,\n    \"$defs\": {\n        \"PlatformListResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"List of linked platforms\",\n            \"required\": [\n              \
        \  \"links\"\n            ],\n            \"properties\": {\n                \"links\": {\n                    \"\
        type\": \"array\",\n                    \"items\": {\n                        \"$ref\": \"#/$defs/PlatformLinkInfo\"\
        \n                    },\n                    \"description\": \"Linked platform accounts (tokens never exposed)\"\
        \n                }\n            }\n        },\n        \"PlatformLinkInfo\": {\n            \"type\": \"object\"\
        ,\n            \"additionalProperties\": false,\n            \"description\": \"Platform link summary (tokens never
        exposed)\",\n            \"required\": [\n                \"linkId\",\n                \"platform\",\n           \
        \     \"linkedAt\"\n            ],\n            \"properties\": {\n                \"linkId\": {\n               \
        \     \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"Platform
        link identifier\"\n                },\n                \"platform\": {\n                    \"$ref\": \"#/$defs/PlatformType\"\
        ,\n                    \"description\": \"Streaming platform type\"\n                },\n                \"displayName\"\
        : {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Platform display name (from OAuth profile or user-provided)\"\n                },\n                \"linkedAt\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n                 \
        \   \"description\": \"When the platform was linked\"\n                }\n            }\n        },\n        \"PlatformType\"\
        : {\n            \"type\": \"string\",\n            \"description\": \"Streaming platform type\",\n            \"\
        enum\": [\n                \"Twitch\",\n                \"YouTube\",\n                \"Custom\"\n            ]\n\
        \        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"List linked platforms for the current account\",\n    \"description\":
        \"Returns all platform links for the authenticated account. Token fields are\\nnever exposed in responses (stream
        key masking is absolute).\\n\",\n    \"tags\": [\n        \"BroadcastPlatform\"\n    ],\n    \"deprecated\": false,\n\
        \    \"operationId\": \"listPlatforms\"\n}"
  /broadcast/session/start:
    post:
      summary: Start a platform streaming session
      description: |
        Starts tracking a platform streaming session. Verifies the account is live on
        the platform (best-effort). One active session per account enforced.
      operationId: startSession
      tags:
      - BroadcastSession
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '200':
          description: Platform session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartSessionResponse'
        '403':
          description: Link does not belong to the requesting account
        '404':
          description: Platform link not found
        '409':
          description: Session already active for this account, or lock acquisition failed
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/StartSessionRequest\"\
        ,\n    \"$defs\": {\n        \"StartSessionRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to start a platform streaming session\",\n            \"required\"\
        : [\n                \"webSocketSessionId\",\n                \"linkId\"\n            ],\n            \"properties\"\
        : {\n                \"webSocketSessionId\": {\n                    \"type\": \"string\",\n                    \"\
        format\": \"uuid\",\n                    \"description\": \"WebSocket session ID for server-side identity resolution\"\
        \n                },\n                \"linkId\": {\n                    \"type\": \"string\",\n                 \
        \   \"format\": \"uuid\",\n                    \"description\": \"Platform link to start streaming on\"\n        \
        \        }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/StartSessionResponse\"\
        ,\n    \"$defs\": {\n        \"StartSessionResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Platform session start response\",\n            \"required\": [\n       \
        \         \"platformSessionId\"\n            ],\n            \"properties\": {\n                \"platformSessionId\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"\
        description\": \"Created platform session identifier\"\n                }\n            }\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Start a platform streaming session\",\n    \"description\": \"Starts tracking
        a platform streaming session. Verifies the account is live on\\nthe platform (best-effort). One active session per
        account enforced.\\n\",\n    \"tags\": [\n        \"BroadcastSession\"\n    ],\n    \"deprecated\": false,\n    \"\
        operationId\": \"startSession\"\n}"
  /broadcast/session/stop:
    post:
      summary: Stop a platform streaming session
      description: |
        Stops an active platform session. Deletes all tracking ID mappings and
        publishes session deleted event with duration and peak viewer count.
      operationId: stopSession
      tags:
      - BroadcastSession
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopSessionRequest'
      responses:
        '200':
          description: Platform session stopped
        '403':
          description: Session does not belong to the requesting account
        '404':
          description: Platform session not found
        '409':
          description: Lock acquisition failed
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/StopSessionRequest\"\
        ,\n    \"$defs\": {\n        \"StopSessionRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to stop a platform streaming session\",\n            \"required\"\
        : [\n                \"webSocketSessionId\",\n                \"platformSessionId\"\n            ],\n            \"\
        properties\": {\n                \"webSocketSessionId\": {\n                    \"type\": \"string\",\n          \
        \          \"format\": \"uuid\",\n                    \"description\": \"WebSocket session ID for server-side identity
        resolution\"\n                },\n                \"platformSessionId\": {\n                    \"type\": \"string\"\
        ,\n                    \"format\": \"uuid\",\n                    \"description\": \"Platform session to stop\"\n\
        \                }\n            }\n        }\n    }\n}"
      x-response-schema-json: '{}'
      x-endpoint-info-json: "{\n    \"summary\": \"Stop a platform streaming session\",\n    \"description\": \"Stops an active
        platform session. Deletes all tracking ID mappings and\\npublishes session deleted event with duration and peak viewer
        count.\\n\",\n    \"tags\": [\n        \"BroadcastSession\"\n    ],\n    \"deprecated\": false,\n    \"operationId\"\
        : \"stopSession\"\n}"
  /broadcast/session/associate:
    post:
      summary: Associate a platform session with an in-game stream session
      description: |
        Links a platform session with a lib-showtime stream session ID. The stream
        session ID is stored as an opaque GUID (no validation against lib-showtime;
        L3 cannot call L4).
      operationId: associateSession
      tags:
      - BroadcastSession
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssociateSessionRequest'
      responses:
        '200':
          description: Session associated with stream session
        '403':
          description: Session does not belong to the requesting account
        '404':
          description: Platform session not found
        '409':
          description: ETag mismatch or lock acquisition failed
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/AssociateSessionRequest\"\
        ,\n    \"$defs\": {\n        \"AssociateSessionRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to associate a platform session with an in-game stream session\"\
        ,\n            \"required\": [\n                \"webSocketSessionId\",\n                \"platformSessionId\",\n\
        \                \"streamSessionId\"\n            ],\n            \"properties\": {\n                \"webSocketSessionId\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"\
        description\": \"WebSocket session ID for server-side identity resolution\"\n                },\n                \"\
        platformSessionId\": {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n   \
        \                 \"description\": \"Platform session to associate\"\n                },\n                \"streamSessionId\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"\
        description\": \"In-game stream session ID (opaque, stored without validation)\"\n                }\n            }\n\
        \        }\n    }\n}"
      x-response-schema-json: '{}'
      x-endpoint-info-json: "{\n    \"summary\": \"Associate a platform session with an in-game stream session\",\n    \"\
        description\": \"Links a platform session with a lib-showtime stream session ID. The stream\\nsession ID is stored
        as an opaque GUID (no validation against lib-showtime;\\nL3 cannot call L4).\\n\",\n    \"tags\": [\n        \"BroadcastSession\"\
        \n    ],\n    \"deprecated\": false,\n    \"operationId\": \"associateSession\"\n}"
  /broadcast/session/status:
    post:
      summary: Get platform session status
      description: |
        Returns the current status of a platform session including viewer count,
        stream session association, and recent sentiment distribution.
      operationId: getSessionStatus
      tags:
      - BroadcastSession
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetSessionStatusRequest'
      responses:
        '200':
          description: Session status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatusResponse'
        '403':
          description: Session does not belong to the requesting account
        '404':
          description: Platform session not found
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/GetSessionStatusRequest\"\
        ,\n    \"$defs\": {\n        \"GetSessionStatusRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to get platform session status\",\n            \"required\": [\n\
        \                \"webSocketSessionId\",\n                \"platformSessionId\"\n            ],\n            \"properties\"\
        : {\n                \"webSocketSessionId\": {\n                    \"type\": \"string\",\n                    \"\
        format\": \"uuid\",\n                    \"description\": \"WebSocket session ID for server-side identity resolution\"\
        \n                },\n                \"platformSessionId\": {\n                    \"type\": \"string\",\n      \
        \              \"format\": \"uuid\",\n                    \"description\": \"Platform session to query\"\n       \
        \         }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/SessionStatusResponse\"\
        ,\n    \"$defs\": {\n        \"SessionStatusResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Platform session status with sentiment distribution\",\n            \"required\"\
        : [\n                \"platformSessionId\",\n                \"state\",\n                \"viewerCount\"\n       \
        \     ],\n            \"properties\": {\n                \"platformSessionId\": {\n                    \"type\": \"\
        string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"Platform session identifier\"\
        \n                },\n                \"state\": {\n                    \"$ref\": \"#/$defs/PlatformSessionState\"\
        ,\n                    \"description\": \"Current session state\"\n                },\n                \"viewerCount\"\
        : {\n                    \"type\": \"integer\",\n                    \"description\": \"Current approximate viewer
        count\"\n                },\n                \"streamSessionId\": {\n                    \"type\": \"string\",\n \
        \                   \"format\": \"uuid\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Associated in-game stream session ID\"\n                },\n                \"sentimentDistribution\": {\n   \
        \                 \"allOf\": [\n                        {\n                            \"$ref\": \"#/$defs/SentimentDistribution\"\
        \n                        }\n                    ],\n                    \"nullable\": true,\n                   \
        \ \"description\": \"Recent sentiment distribution (null if no data yet)\"\n                }\n            }\n   \
        \     },\n        \"PlatformSessionState\": {\n            \"type\": \"string\",\n            \"description\": \"\
        Current state of a platform streaming session\",\n            \"enum\": [\n                \"Active\",\n         \
        \       \"Ended\"\n            ]\n        },\n        \"SentimentDistribution\": {\n            \"type\": \"object\"\
        ,\n            \"additionalProperties\": false,\n            \"description\": \"Distribution of sentiment categories
        from recent pulse data\",\n            \"properties\": {\n                \"excited\": {\n                    \"type\"\
        : \"integer\",\n                    \"default\": 0,\n                    \"description\": \"Count of Excited sentiments\"\
        \n                },\n                \"supportive\": {\n                    \"type\": \"integer\",\n            \
        \        \"default\": 0,\n                    \"description\": \"Count of Supportive sentiments\"\n              \
        \  },\n                \"critical\": {\n                    \"type\": \"integer\",\n                    \"default\"\
        : 0,\n                    \"description\": \"Count of Critical sentiments\"\n                },\n                \"\
        curious\": {\n                    \"type\": \"integer\",\n                    \"default\": 0,\n                  \
        \  \"description\": \"Count of Curious sentiments\"\n                },\n                \"surprised\": {\n      \
        \              \"type\": \"integer\",\n                    \"default\": 0,\n                    \"description\": \"\
        Count of Surprised sentiments\"\n                },\n                \"amused\": {\n                    \"type\":
        \"integer\",\n                    \"default\": 0,\n                    \"description\": \"Count of Amused sentiments\"\
        \n                },\n                \"bored\": {\n                    \"type\": \"integer\",\n                 \
        \   \"default\": 0,\n                    \"description\": \"Count of Bored sentiments\"\n                },\n    \
        \            \"hostile\": {\n                    \"type\": \"integer\",\n                    \"default\": 0,\n   \
        \                 \"description\": \"Count of Hostile sentiments\"\n                }\n            }\n        }\n\
        \    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Get platform session status\",\n    \"description\": \"Returns the current
        status of a platform session including viewer count,\\nstream session association, and recent sentiment distribution.\\\
        n\",\n    \"tags\": [\n        \"BroadcastSession\"\n    ],\n    \"deprecated\": false,\n    \"operationId\": \"getSessionStatus\"\
        \n}"
  /broadcast/session/list:
    post:
      summary: List platform sessions for the current account
      description: |
        Returns paginated platform session history for the authenticated account,
        ordered by start time descending.
      operationId: listSessions
      tags:
      - BroadcastSession
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListSessionsRequest'
      responses:
        '200':
          description: Sessions retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
