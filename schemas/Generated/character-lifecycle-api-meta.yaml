openapi: 3.0.4
info:
  title: Bannou Character Lifecycle Service API
  description: |
    Generational cycle orchestration and genetic heritage service (L4 GameFeatures).
    Manages character aging, marriage, procreation, death processing, and cross-generational
    trait inheritance. The temporal engine that drives the content flywheel by ensuring
    characters are born, live, age, reproduce, and die -- producing archives that feed
    future content generation.

    Internal-only: never internet-facing. Called by god-actors via ABML action handlers,
    behavior systems, and other L4 services.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-references:
  - target: character
    sourceType: lifecycle
    field: characterId
    onDelete: cascade
    cleanup:
      endpoint: /character-lifecycle/cleanup-by-character
      payloadTemplate: '{"characterId": "{{resourceId}}"}'
  - target: realm
    sourceType: lifecycle
    field: realmId
    onDelete: cascade
    cleanup:
      endpoint: /character-lifecycle/cleanup-by-realm
      payloadTemplate: '{"realmId": "{{resourceId}}"}'
  x-compression-callback:
    resourceType: character
    sourceType: character-lifecycle
    compressEndpoint: /character-lifecycle/get-compress-data
    compressPayloadTemplate: '{"characterId": "{{resourceId}}"}'
    priority: 25
    templateNamespace: lifecycle
    description: Lifecycle summary (stages, marriages, children, fulfillment) and heritage profile (genetics, 
      bloodlines, aptitudes)
    decompressEndpoint: /character-lifecycle/restore-from-archive
    decompressPayloadTemplate: '{"characterId": "{{resourceId}}", "data": "{{data}}"}'
x-service-layer: GameFeatures
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)
paths:
  /character-lifecycle/marriage/initiate:
    post:
      summary: Initiate marriage between two characters
      description: |
        Validates eligibility, creates marriage contract, SPOUSE relationship,
        household integration (if Organization available), and Disposition feeling seeds.
        Self-healing with degraded success for L4 soft dependencies.
      operationId: initiateMarriage
      tags:
      - CharacterLifecycle
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateMarriageRequest'
      responses:
        '200':
          description: Marriage successfully initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiateMarriageResponse'
        '400':
          description: Characters not eligible for marriage (wrong stage, prohibited relationship, species 
            incompatibility)
        '404':
          description: One or both character lifecycle profiles not found
        '409':
          description: Could not acquire marriage lock (concurrent operation)
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/InitiateMarriageRequest\"\
        ,\n    \"$defs\": {\n        \"InitiateMarriageRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to initiate marriage between two characters\",\n            \"required\"\
        : [\n                \"characterAId\",\n                \"characterBId\",\n                \"gameServiceId\"\n   \
        \         ],\n            \"properties\": {\n                \"characterAId\": {\n                    \"type\": \"\
        string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"First character in the
        marriage\"\n                },\n                \"characterBId\": {\n                    \"type\": \"string\",\n \
        \                   \"format\": \"uuid\",\n                    \"description\": \"Second character in the marriage\"\
        \n                },\n                \"gameServiceId\": {\n                    \"type\": \"string\",\n          \
        \          \"format\": \"uuid\",\n                    \"description\": \"Game service scope for template resolution\"\
        \n                },\n                \"householdResolution\": {\n                    \"type\": \"string\",\n    \
        \                \"nullable\": true,\n                    \"description\": \"How to resolve household (join_a, join_b,
        create_new). Null uses default from cultural norms.\",\n                    \"maxLength\": 50\n                }\n\
        \            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/InitiateMarriageResponse\"\
        ,\n    \"$defs\": {\n        \"InitiateMarriageResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Result of marriage initiation\",\n            \"required\": [\n         \
        \       \"contractId\"\n            ],\n            \"properties\": {\n                \"contractId\": {\n       \
        \             \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"Marriage contract ID created via IContractClient\"\n                },\n                \"householdOrgId\": {\n\
        \                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"nullable\"\
        : true,\n                    \"description\": \"Household organization ID (null if Organization was unavailable)\"\
        \n                }\n            }\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Initiate marriage between two characters\",\n    \"description\": \"Validates
        eligibility, creates marriage contract, SPOUSE relationship,\\nhousehold integration (if Organization available),
        and Disposition feeling seeds.\\nSelf-healing with degraded success for L4 soft dependencies.\\n\",\n    \"tags\"\
        : [\n        \"CharacterLifecycle\"\n    ],\n    \"deprecated\": false,\n    \"operationId\": \"initiateMarriage\"\
        \n}"
  /character-lifecycle/procreation/initiate:
    post:
      summary: Initiate procreation between two characters
      description: |
        Validates eligibility, fertility check, creates pending pregnancy record.
        Actual birth occurs when pregnancy worker detects due date via worldstate.day-changed.
      operationId: initiateProcreation
      tags:
      - CharacterLifecycle
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateProcreationRequest'
      responses:
        '200':
          description: Pregnancy successfully initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiateProcreationResponse'
        '400':
          description: Characters not eligible for procreation (wrong stage, fertility failure, child limits exceeded)
        '404':
          description: One or both character lifecycle profiles not found
        '409':
          description: Could not acquire procreation lock (concurrent operation)
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/InitiateProcreationRequest\"\
        ,\n    \"$defs\": {\n        \"InitiateProcreationRequest\": {\n            \"type\": \"object\",\n            \"\
        additionalProperties\": false,\n            \"description\": \"Request to initiate procreation between two characters\"\
        ,\n            \"required\": [\n                \"parentAId\",\n                \"parentBId\",\n                \"\
        gameServiceId\"\n            ],\n            \"properties\": {\n                \"parentAId\": {\n               \
        \     \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"First
        parent (convention: birth parent for Maternal dominance)\"\n                },\n                \"parentBId\": {\n\
        \                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"Second parent\"\n                },\n                \"gameServiceId\": {\n                    \"type\": \"string\"\
        ,\n                    \"format\": \"uuid\",\n                    \"description\": \"Game service scope for template
        resolution\"\n                }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/InitiateProcreationResponse\"\
        ,\n    \"$defs\": {\n        \"InitiateProcreationResponse\": {\n            \"type\": \"object\",\n            \"\
        additionalProperties\": false,\n            \"description\": \"Result of procreation initiation\",\n            \"\
        required\": [\n                \"pregnancyId\",\n                \"expectedBirthDate\"\n            ],\n         \
        \   \"properties\": {\n                \"pregnancyId\": {\n                    \"type\": \"string\",\n           \
        \         \"format\": \"uuid\",\n                    \"description\": \"Identifier for the pending pregnancy\"\n \
        \               },\n                \"expectedBirthDate\": {\n                    \"type\": \"integer\",\n       \
        \             \"description\": \"Expected birth date as game day number\"\n                }\n            }\n    \
        \    }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Initiate procreation between two characters\",\n    \"description\": \"\
        Validates eligibility, fertility check, creates pending pregnancy record.\\nActual birth occurs when pregnancy worker
        detects due date via worldstate.day-changed.\\n\",\n    \"tags\": [\n        \"CharacterLifecycle\"\n    ],\n    \"\
        deprecated\": false,\n    \"operationId\": \"initiateProcreation\"\n}"
  /character-lifecycle/death/record:
    post:
      summary: Record a character death and execute the death processing pipeline
      description: |
        External death reporting. Executes full death pipeline: fulfillment calculation,
        guardian spirit contribution, archive compression, inheritance processing,
        afterlife pathway determination. Idempotent (returns existing result if already dead).
      operationId: recordDeath
      tags:
      - CharacterLifecycle
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordDeathRequest'
      responses:
        '200':
          description: Death recorded and processed (or already processed, idempotent return)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordDeathResponse'
        '404':
          description: Character lifecycle profile not found
        '409':
          description: Could not acquire death processing lock (concurrent operation)
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/RecordDeathRequest\"\
        ,\n    \"$defs\": {\n        \"RecordDeathRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to record a character death\",\n            \"required\": [\n   \
        \             \"characterId\",\n                \"deathCause\"\n            ],\n            \"properties\": {\n  \
        \              \"characterId\": {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\"\
        ,\n                    \"description\": \"Character who died\"\n                },\n                \"deathCause\"\
        : {\n                    \"type\": \"string\",\n                    \"description\": \"Game-extensible death cause
        code (e.g., natural, combat, disease)\",\n                    \"minLength\": 1,\n                    \"maxLength\"\
        : 100\n                }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/RecordDeathResponse\"\
        ,\n    \"$defs\": {\n        \"RecordDeathResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Result of death processing\",\n            \"required\": [\n            \
        \    \"fulfillmentScore\",\n                \"afterlifePath\"\n            ],\n            \"properties\": {\n   \
        \             \"fulfillmentScore\": {\n                    \"type\": \"number\",\n                    \"format\":
        \"float\",\n                    \"description\": \"Calculated fulfillment from Disposition drives (0.0-1.0)\",\n \
        \                   \"minimum\": 0.0,\n                    \"maximum\": 1.0\n                },\n                \"\
        afterlifePath\": {\n                    \"type\": \"string\",\n                    \"description\": \"Determined afterlife
        pathway code\",\n                    \"maxLength\": 100\n                }\n            }\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Record a character death and execute the death processing pipeline\",\n\
        \    \"description\": \"External death reporting. Executes full death pipeline: fulfillment calculation,\\nguardian
        spirit contribution, archive compression, inheritance processing,\\nafterlife pathway determination. Idempotent (returns
        existing result if already dead).\\n\",\n    \"tags\": [\n        \"CharacterLifecycle\"\n    ],\n    \"deprecated\"\
        : false,\n    \"operationId\": \"recordDeath\"\n}"
