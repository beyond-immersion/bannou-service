  /character-lifecycle/template/clean-deprecated-lifecycle:
    post:
      summary: Clean deprecated lifecycle templates with zero remaining profiles
      description: |
        Category B cleanup sweep (per IMPLEMENTATION TENETS). Iterates all deprecated
        lifecycle templates and permanently removes those with zero remaining
        LifecycleProfile instances referencing them, subject to an optional grace period.
        Publishes lifecycle-template.deleted events for each removed template. Idempotent
        and safe to call at any frequency. Supports dry-run mode for admin panel preview.
      operationId: cleanDeprecatedLifecycleTemplates
      tags:
      - CharacterLifecycle
      x-permissions:
      - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'common-api.yaml#/components/schemas/CleanDeprecatedRequest'
      responses:
        '200':
          description: Cleanup sweep completed
          content:
            application/json:
              schema:
                $ref: 'common-api.yaml#/components/schemas/CleanDeprecatedStringKeyResponse'
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"type\": \"object\"\n\
        }"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"type\": \"object\"\n\
