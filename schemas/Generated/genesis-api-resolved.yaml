openapi: 3.0.4
info:
  title: Bannou Genesis Service API
  description: |
    Template-driven entity awakening lifecycle service (L2 GameFoundation). Manages entities
    that progressively grow from inert objects into autonomous agents with personalities,
    memories, and the full cognitive stack. A single CreateEntity call provisions the seed,
    currency wallets, inventories, and resource registrations from a template definition,
    then manages the Dormant to CharacterBrain cognitive progression automatically as
    currency accumulates.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-references:
  - target: character
    sourceType: genesis
    field: characterId
    onDelete: cascade
    cleanup:
      endpoint: /genesis/cleanup-by-character
      payloadTemplate: '{"characterId": "{{resourceId}}"}'
  - target: realm
    sourceType: genesis
    field: realmId
    onDelete: cascade
    cleanup:
      endpoint: /genesis/cleanup-by-realm
      payloadTemplate: '{"realmId": "{{resourceId}}"}'
  x-resource-lifecycle:
    resourceType: genesis-entity
    cleanupPolicy: BEST_EFFORT
  x-compression-callback:
    resourceType: character
    sourceType: genesis
    compressEndpoint: /genesis/get-compress-data
    compressPayloadTemplate: '{"characterId": "{{resourceId}}"}'
    priority: 10
    description: Genesis entity state (lifecycle, wallets, capabilities, cognitive stage)
    decompressEndpoint: /genesis/restore-from-archive
    decompressPayloadTemplate: '{"archive": "{{data}}"}'
x-service-layer: GameFoundation
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)

paths:
  # ===========================================================================
  # Template Management (developer-facing)
  # ===========================================================================

  /genesis/template/register:
    post:
      summary: Register a new genesis template
      description: |
        Registers a template that defines the full lifecycle configuration for a genesis
        entity type. Idempotent: returns existing template if templateCode already registered.
        Validates seed structure, system realm existence, and species availability.
      operationId: registerTemplate
      tags:
      - Genesis Templates
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterTemplateRequest'
      responses:
        '200':
          description: Template registered successfully (or already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisTemplateResponse'
        '400':
          description: Invalid template structure, system realm not found, or species not found

  /genesis/template/get:
    post:
      summary: Get a genesis template by code
      operationId: getTemplate
      tags:
      - Genesis Templates
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetTemplateRequest'
      responses:
        '200':
          description: Template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisTemplateResponse'
        '404':
          description: Template not found

  /genesis/template/list:
    post:
      summary: List genesis templates for a game service
      operationId: listTemplates
      tags:
      - Genesis Templates
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListTemplatesRequest'
      responses:
        '200':
          description: Templates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTemplatesResponse'

  /genesis/template/update:
    post:
      summary: Update a genesis template
      description: |
        Updates template configuration. Only affects new entities created after the update.
        Existing entities retain the configuration snapshot from their creation time.
      operationId: updateTemplate
      tags:
      - Genesis Templates
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: Template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisTemplateResponse'
        '400':
          description: Invalid template structure or validation failure
        '404':
          description: Template not found

  /genesis/template/deprecate:
    post:
      summary: Deprecate a genesis template
      description: |
        Marks a template as deprecated. Idempotent: returns OK if already deprecated.
        Deprecated templates cannot be used to create new entities. Existing entities
        are unaffected. Category B deprecation per IMPLEMENTATION TENETS.
      operationId: deprecateTemplate
      tags:
      - Genesis Templates
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateTemplateRequest'
      responses:
        '200':
          description: Template deprecated successfully (or already deprecated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisTemplateResponse'
        '404':
          description: Template not found

  /genesis/template/clean-deprecated:
    post:
      summary: Clean deprecated templates with no remaining entities
      description: |
        Category B cleanup sweep (per IMPLEMENTATION TENETS). Removes deprecated templates
        that have zero remaining genesis entities, subject to an optional grace period.
        Supports dry-run for admin preview. Idempotent.
      operationId: cleanDeprecated
      tags:
      - Genesis Templates
      x-permissions:
      - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../common-api.yaml#/components/schemas/CleanDeprecatedRequest'
      responses:
        '200':
          description: Cleanup sweep completed
          content:
            application/json:
              schema:
                $ref: '../common-api.yaml#/components/schemas/CleanDeprecatedStringKeyResponse'

  # ===========================================================================
  # Entity Lifecycle (service-to-service)
  # ===========================================================================

  /genesis/entity/create:
    post:
      summary: Create a genesis entity from a template
      description: |
        Provisions a complete genesis entity from a template definition: creates seed,
        currency wallets, inventories, and resource registrations. The entity starts
        at the Dormant cognitive stage and progresses automatically as currency accumulates.
      operationId: createEntity
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityRequest'
      responses:
        '200':
          description: Entity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisEntityResponse'
        '400':
          description: Template deprecated or game service not found
        '404':
          description: Template not found
        '409':
          description: Entity code already in use within game/realm scope

  /genesis/entity/get:
    post:
      summary: Get a genesis entity by ID
      description: Retrieves entity state with optional wallet balance inclusion via read-through cache.
      operationId: getEntity
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetEntityRequest'
      responses:
        '200':
          description: Entity retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisEntityResponse'
        '404':
          description: Entity not found

  /genesis/entity/list:
    post:
      summary: List genesis entities by template and realm
      operationId: listEntities
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListEntitiesRequest'
      responses:
        '200':
          description: Entities retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEntitiesResponse'

  /genesis/entity/get-capabilities:
    post:
      summary: Get capability manifest for a genesis entity
      description: Returns the entity's current seed capability manifest via read-through cache.
      operationId: getCapabilities
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCapabilitiesRequest'
      responses:
        '200':
          description: Capabilities retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCapabilitiesResponse'
        '404':
          description: Entity not found

  /genesis/entity/destroy:
    post:
      summary: Destroy a genesis entity
      description: |
        Hard-deletes a genesis entity: stops actor, archives character if configured,
        dissolves bond, cascades cleanup to provisioned infrastructure (seed, wallets,
        inventories), and removes all state and indexes.
      operationId: destroyEntity
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DestroyEntityRequest'
      responses:
        '200':
          description: Entity destroyed successfully
        '404':
          description: Entity not found

  /genesis/entity/bind-physical-form:
    post:
      summary: Bind a physical form to a genesis entity
      description: |
        Associates the entity with a physical form (item instance, location, or none).
        Validates that the form type matches the template configuration and that
        the referenced item or location exists.
      operationId: bindPhysicalForm
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindPhysicalFormRequest'
      responses:
        '200':
          description: Physical form bound successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisEntityResponse'
        '400':
          description: Physical form type mismatch or referenced entity not found
        '404':
          description: Entity not found

  /genesis/entity/create-bond:
    post:
      summary: Create a bond between a genesis entity and a target entity
      description: |
        Stores bond intent on the entity. If the entity is already awakened
        (CharacterBrain), creates the Relationship immediately. If pre-awakened,
        the Relationship is created automatically at awakening. Cardinality
        enforced per template bond configuration.
      operationId: createBond
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBondRequest'
      responses:
        '200':
          description: Bond created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisEntityResponse'
        '400':
          description: Bonds not enabled, target not found, or cardinality None
        '404':
          description: Entity not found
        '409':
          description: Entity already has a bond (single-bond cardinality)

  /genesis/entity/get-bond:
    post:
      summary: Get bond information for a genesis entity
      operationId: getBond
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetBondRequest'
      responses:
        '200':
          description: Bond information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisBondResponse'
        '404':
          description: Entity not found or no active bond

  /genesis/entity/dissolve-bond:
    post:
      summary: Dissolve a bond on a genesis entity
      description: |
        Removes bond intent and deletes the materialized Relationship if one exists.
        Pre-awakened entities have bond fields cleared. Post-awakened entities also
        have the lib-relationship record deleted.
      operationId: dissolveBond
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DissolveBondRequest'
      responses:
        '200':
          description: Bond dissolved successfully
        '404':
          description: Entity not found or no active bond

  # ===========================================================================
  # Resource Cleanup & Compression (service-to-service, called by lib-resource)
  # ===========================================================================

  /genesis/cleanup-by-character:
    post:
      summary: Cascade-delete genesis entities linked to a character
      description: Called by lib-resource during character deletion. Destroys all genesis entities whose characterId 
        matches the deleted character.
      operationId: cleanupByCharacter
      tags:
      - Genesis Cleanup
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupByCharacterRequest'
      responses:
        '200':
          description: Cleanup completed

  /genesis/cleanup-by-realm:
    post:
      summary: Cascade-delete genesis entities in a realm
      description: Called by lib-resource during realm deletion. Destroys all genesis entities scoped to the deleted 
        realm in batches.
      operationId: cleanupByRealm
      tags:
      - Genesis Cleanup
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupByRealmRequest'
      responses:
        '200':
          description: Cleanup completed

  /genesis/get-compress-data:
    post:
      summary: Get compression archive data for genesis entities linked to a character
      description: Called by lib-resource during character compression. Returns genesis entity state snapshots including
        wallet balances and capability manifests.
      operationId: getCompressData
      tags:
      - Genesis Cleanup
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCompressDataRequest'
      responses:
        '200':
          description: Compress data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisArchive'

  /genesis/restore-from-archive:
    post:
      summary: Restore genesis entities from a compressed archive
      description: |
        Re-provisions genesis entities from archive data: creates new seeds, wallets,
        and inventories from the template, restores archived balances, and rebuilds
        all indexes. Cognitive stage resets to Dormant (actor/character re-emerge via growth).
      operationId: restoreFromArchive
      tags:
      - Genesis Cleanup
      x-permissions:
      - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreFromArchiveRequest'
      responses:
        '200':
          description: Entities restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreFromArchiveResponse'
        '400':
          description: Referenced template no longer exists

components:
  schemas:
    # =========================================================================
    # Enums
    # =========================================================================

    CognitiveStage:
      type: string
      description: Cognitive progression stage of a genesis entity
      enum:
      - Dormant
      - EventBrain
      - CharacterBrain

    GenesisEntityStatus:
      type: string
      description: Operational status of a genesis entity
      enum:
      - Active
      - Dormant
      - Archived

    PhysicalFormType:
      type: string
      description: Type of physical form a genesis entity can be bound to
      enum:
      - Item
      - Location
      - None

    GrowthDirection:
      type: string
      description: Which currency transaction direction drives growth for a mapping
      enum:
      - Credit
      - Debit
      - Both

    BondCardinality:
      type: string
      description: Maximum number of bonds a genesis entity template allows
      enum:
      - None
      - OptionalOne
      - RequiredOne
      - Many

    # =========================================================================
    # Template Sub-Configuration Types
    # =========================================================================

    GenesisSeedConfig:
      type: object
      additionalProperties: false
      description: Seed lifecycle configuration within a genesis template
      required:
      - seedTypeCode
      - domains
      - phases
      properties:
        seedTypeCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Seed type code registered with the Seed service
        domains:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GenesisSeedDomain'
          description: Growth domains that this seed type tracks
        phases:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GenesisSeedPhase'
          description: Ordered growth phases with thresholds and cognitive stage assignments
        capabilityRules:
          type: array
          items:
            $ref: '#/components/schemas/GenesisCapabilityRule'
          description: Rules defining which capabilities unlock at which growth thresholds

    GenesisSeedDomain:
      type: object
      additionalProperties: false
      description: A growth domain tracked by the seed
      required:
      - domainCode
      - displayName
      properties:
        domainCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique domain code within the seed type
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable domain name

    GenesisSeedPhase:
      type: object
      additionalProperties: false
      description: A growth phase with threshold and cognitive stage assignment
      required:
      - phaseName
      - threshold
      - cognitiveStage
      properties:
        phaseName:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique phase name within the seed type
        threshold:
          type: number
          format: float
          minimum: 0
          description: Total growth threshold required to enter this phase
        cognitiveStage:
          $ref: '#/components/schemas/CognitiveStage'
          description: Cognitive stage assigned when entity enters this phase
        behaviorRef:
          type: string
          nullable: true
          maxLength: 500
          description: ABML behavior document reference for actor spawning at this phase. Required when cognitiveStage 
            is EventBrain or CharacterBrain.
        capabilityRules:
          type: array
          items:
            $ref: '#/components/schemas/GenesisCapabilityRule'
          description: Phase-specific capability rules (unlocked when this phase is reached)

    GenesisCapabilityRule:
      type: object
      additionalProperties: false
      description: Rule defining when a capability is unlocked based on growth domain depth
      required:
      - capabilityCode
      - domain
      - threshold
      properties:
        capabilityCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Capability code that is unlocked when conditions are met
        domain:
          type: string
          minLength: 1
          maxLength: 100
          description: Growth domain that must reach the threshold
        threshold:
          type: number
          format: float
          minimum: 0
          description: Minimum domain depth required to unlock this capability

    GenesisEconomyConfig:
      type: object
      additionalProperties: false
      description: Economy configuration within a genesis template (wallets and growth mappings)
      required:
      - wallets
      - growthMappings
      properties:
        wallets:
          type: array
          items:
            $ref: '#/components/schemas/GenesisWalletConfig'
          description: Currency wallets provisioned for each entity created from this template
        growthMappings:
          type: array
          items:
            $ref: '#/components/schemas/GenesisGrowthMapping'
          description: Mappings from wallet currency transactions to seed growth domains

    GenesisWalletConfig:
      type: object
      additionalProperties: false
      description: Currency wallet configuration within a genesis template
      required:
      - walletCode
      - currencyCode
      properties:
        walletCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique wallet code within the template (used as key in walletIds map)
        currencyCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Currency code for this wallet (must be registered with Currency service)
        autogainEnabled:
          type: boolean
          default: false
          description: Whether this wallet accumulates currency automatically over time
        autogainBaseRate:
          type: number
          format: double
          nullable: true
          description: Base rate of automatic currency gain per tick. Required when autogainEnabled is true.
        autogainCap:
          type: number
          format: double
          nullable: true
          description: Maximum balance for autogain accumulation. Required when autogainEnabled is true.

    GenesisGrowthMapping:
      type: object
      additionalProperties: false
      description: Maps a wallet currency transaction to seed growth in a specific domain
      required:
      - walletCode
      - domain
      - ratio
      - direction
      properties:
        walletCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Wallet code that triggers growth (must reference a wallet in the template)
        domain:
          type: string
          minLength: 1
          maxLength: 100
          description: Seed growth domain to apply growth to (must reference a domain in the seed config)
        ratio:
          type: number
          format: double
          minimum: 0
          description: Multiplier applied to the currency transaction amount before recording as seed growth
        direction:
          $ref: '#/components/schemas/GrowthDirection'
          description: Which transaction direction triggers this mapping

    GenesisStorageConfig:
      type: object
      additionalProperties: false
      description: Storage configuration within a genesis template (inventory containers)
      required:
      - inventories
      properties:
        inventories:
          type: array
          items:
            $ref: '#/components/schemas/GenesisInventoryConfig'
          description: Inventory containers provisioned for each entity created from this template

    GenesisInventoryConfig:
      type: object
      additionalProperties: false
      description: Inventory container configuration within a genesis template
      required:
      - inventoryCode
      - constraintModel
      - capacity
      properties:
        inventoryCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique inventory code within the template (used as key in inventoryIds map)
        constraintModel:
          type: string
          minLength: 1
          maxLength: 50
          description: Container constraint model (e.g., SlotOnly, WeightOnly, SlotAndWeight, Grid, Volumetric, 
            Unlimited). Stored in template and passed through to Inventory at entity creation.
        capacity:
          type: integer
          minimum: 0
          description: Container capacity (interpretation depends on constraintModel)
        allowedCategories:
          type: array
          nullable: true
          items:
            type: string
          description: Allowed item categories for this container (null allows all categories). Passed through to 
            Inventory at container creation.

    GenesisAwakeningConfig:
      type: object
      additionalProperties: false
      description: Awakening configuration for CharacterBrain cognitive stage transition
      required:
      - systemRealmCode
      - characterSpeciesCode
      properties:
        systemRealmCode:
          type: string
          minLength: 1
          maxLength: 100
          description: System realm code where the character is created at awakening. Must be a valid system realm.
        characterSpeciesCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Species code for the character created at awakening. Must exist in the system realm.
        initialPersonalityTraits:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/GenesisPersonalityTraitSeed'
          description: Personality trait values to seed on the character at awakening. Null if no traits should be 
            seeded.

    GenesisPersonalityTraitSeed:
      type: object
      additionalProperties: false
      description: A personality trait value to seed on a character at awakening
      required:
      - traitCode
      - value
      properties:
        traitCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Personality trait axis code to set
        value:
          type: number
          format: float
          minimum: -1.0
          maximum: 1.0
          description: Initial trait value on the bipolar axis (-1.0 to 1.0)

    GenesisBondConfig:
      type: object
      additionalProperties: false
      description: Bond configuration within a genesis template
      required:
      - enabled
      - cardinality
      properties:
        enabled:
          type: boolean
          description: Whether bonding is enabled for entities of this template
        cardinality:
          $ref: '#/components/schemas/BondCardinality'
          description: Maximum bond cardinality for entities of this template
        relationshipTypeCode:
          type: string
          nullable: true
          minLength: 1
          maxLength: 100
          description: Relationship type code used when creating Relationship at awakening. Required when enabled is 
            true.

    # =========================================================================
    # Template Request Models
    # =========================================================================

    RegisterTemplateRequest:
      type: object
      additionalProperties: false
      description: Request to register a new genesis template
      required:
      - templateCode
      - gameServiceId
      - displayName
      - description
      - seed
      - economy
      - storage
      - awakening
      - physicalFormType
      - bond
      - archiveOnDestruction
      properties:
        templateCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique template identifier (primary key)
        gameServiceId:
          type: string
          format: uuid
          description: Game service this template is scoped to
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable template name
        description:
          type: string
          minLength: 1
          maxLength: 2000
          description: Template description
        seed:
          $ref: '#/components/schemas/GenesisSeedConfig'
          description: Seed lifecycle configuration
        economy:
          $ref: '#/components/schemas/GenesisEconomyConfig'
          description: Economy configuration (wallets and growth mappings)
        storage:
          $ref: '#/components/schemas/GenesisStorageConfig'
          description: Storage configuration (inventories)
        awakening:
          $ref: '#/components/schemas/GenesisAwakeningConfig'
          description: Awakening configuration for CharacterBrain transition
        physicalFormType:
          $ref: '#/components/schemas/PhysicalFormType'
          description: Type of physical form entities of this template can be bound to
        bond:
          $ref: '#/components/schemas/GenesisBondConfig'
          description: Bond configuration
        archiveOnDestruction:
          type: boolean
          default: true
          description: Whether to archive the character via lib-resource compression before destroying the entity

    GetTemplateRequest:
      type: object
      additionalProperties: false
      description: Request to get a genesis template by code
      required:
      - templateCode
      properties:
        templateCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Template code to retrieve

    ListTemplatesRequest:
      type: object
      additionalProperties: false
      description: Request to list genesis templates for a game service
      required:
      - gameServiceId
      properties:
