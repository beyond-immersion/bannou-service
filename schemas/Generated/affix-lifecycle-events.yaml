    AffixDefinitionCreatedEvent:
      allOf:
      - $ref: ../common-events.yaml#/components/schemas/BaseServiceEvent
      type: object
      additionalProperties: false
      description: Published to affix.definition.created when a affixdefinition is created
      required:
      - eventName
      - eventId
      - timestamp
      - definitionId
      - gameServiceId
      - code
      - slotType
      - modGroup
      - tier
      - statGrants
      - spawnWeight
      - requiredItemLevel
      - displayOrder
      - createdAt
      - updatedAt
      - isDeprecated
      properties:
        eventName:
          type: string
          default: affix.definition.created
          description: 'Event type identifier: affix.definition.created'
        definitionId: &id001
          type: string
          format: uuid
          description: "Unique definition identifier"
        gameServiceId: &id002
          type: string
          format: uuid
          description: "Game service scope"
        code: &id003
          type: string
          description: "Unique code within game service"
        slotType: &id004
          type: string
          description: "Slot type (prefix, suffix, implicit, enchant, or custom)"
        modGroup: &id005
          type: string
          description: "Exclusivity group"
        tier: &id006
          type: integer
          description: "Power tier within mod group (1 = best)"
        category: &id007
          type: string
          nullable: true
          description: "Broad classification"
        tags: &id008
          type: array
          items: {type: string}
          nullable: true
          description: "Generation tags"
        statGrants: &id009
          type: array
          items: {$ref: '../affix-api.yaml#/components/schemas/StatGrant'}
          description: "Stat contributions"
        spawnWeight: &id010
