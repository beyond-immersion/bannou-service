          description: "Base weight for generation"
        spawnTagModifiers: &id011
          type: array
          items: {$ref: '../affix-api.yaml#/components/schemas/SpawnTagModifier'}
          nullable: true
          description: "Per-tag weight multipliers"
        requiredItemLevel: &id012
          type: integer
          description: "Minimum item level to spawn"
        requiredInfluences: &id013
          type: array
          items: {type: string}
          nullable: true
          description: "Required influence types"
        validItemClasses: &id014
          type: array
          items: {type: string}
          nullable: true
          description: "Item classes this appears on"
        displayName: &id015
          type: string
          nullable: true
          description: "Human-readable display name"
        displayOrder: &id016
          type: integer
          description: "Sorting priority"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the affix definition was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the affix definition was last updated (set to createdAt on creation)
        isDeprecated:
          type: boolean
          description: Whether this affix definition is deprecated
