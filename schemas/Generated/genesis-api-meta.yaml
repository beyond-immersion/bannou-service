components:
  schemas:
    CognitiveStage:
      type: string
      description: Cognitive progression stage of a genesis entity
      enum:
      - Dormant
      - EventBrain
      - CharacterBrain
    GenesisEntityStatus:
      type: string
      description: Operational status of a genesis entity
      enum:
      - Active
      - Dormant
      - Archived
    PhysicalFormType:
      type: string
      description: Type of physical form a genesis entity can be bound to
      enum:
      - Item
      - Location
      - None
    GrowthDirection:
      type: string
      description: Which currency transaction direction drives growth for a mapping
      enum:
      - Credit
      - Debit
      - Both
    BondCardinality:
      type: string
      description: Maximum number of bonds a genesis entity template allows
      enum:
      - None
      - OptionalOne
      - RequiredOne
      - Many
    GenesisSeedConfig:
      type: object
      additionalProperties: false
      description: Seed lifecycle configuration within a genesis template
      required:
      - seedTypeCode
      - domains
      - phases
      properties:
        seedTypeCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Seed type code registered with the Seed service
        domains:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GenesisSeedDomain'
          description: Growth domains that this seed type tracks
        phases:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GenesisSeedPhase'
          description: Ordered growth phases with thresholds and cognitive stage assignments
        capabilityRules:
          type: array
          items:
            $ref: '#/components/schemas/GenesisCapabilityRule'
          description: Rules defining which capabilities unlock at which growth thresholds
    GenesisSeedDomain:
      type: object
      additionalProperties: false
      description: A growth domain tracked by the seed
      required:
      - domainCode
      - displayName
      properties:
        domainCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique domain code within the seed type
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable domain name
    GenesisSeedPhase:
      type: object
      additionalProperties: false
      description: A growth phase with threshold and cognitive stage assignment
      required:
      - phaseName
      - threshold
      - cognitiveStage
      properties:
        phaseName:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique phase name within the seed type
        threshold:
          type: number
          format: float
          minimum: 0
          description: Total growth threshold required to enter this phase
        cognitiveStage:
          $ref: '#/components/schemas/CognitiveStage'
          description: Cognitive stage assigned when entity enters this phase
        behaviorRef:
          type: string
          nullable: true
          maxLength: 500
          description: ABML behavior document reference for actor spawning at this phase. Required when cognitiveStage 
            is EventBrain or CharacterBrain.
        capabilityRules:
          type: array
          items:
            $ref: '#/components/schemas/GenesisCapabilityRule'
          description: Phase-specific capability rules (unlocked when this phase is reached)
    GenesisCapabilityRule:
      type: object
      additionalProperties: false
      description: Rule defining when a capability is unlocked based on growth domain depth
      required:
      - capabilityCode
      - domain
      - threshold
      properties:
        capabilityCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Capability code that is unlocked when conditions are met
        domain:
          type: string
          minLength: 1
          maxLength: 100
          description: Growth domain that must reach the threshold
        threshold:
          type: number
          format: float
          minimum: 0
          description: Minimum domain depth required to unlock this capability
    GenesisEconomyConfig:
      type: object
      additionalProperties: false
      description: Economy configuration within a genesis template (wallets and growth mappings)
      required:
      - wallets
      - growthMappings
      properties:
        wallets:
          type: array
          items:
            $ref: '#/components/schemas/GenesisWalletConfig'
          description: Currency wallets provisioned for each entity created from this template
        growthMappings:
          type: array
          items:
            $ref: '#/components/schemas/GenesisGrowthMapping'
          description: Mappings from wallet currency transactions to seed growth domains
    GenesisWalletConfig:
      type: object
      additionalProperties: false
      description: Currency wallet configuration within a genesis template
      required:
      - walletCode
      - currencyCode
      properties:
        walletCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique wallet code within the template (used as key in walletIds map)
        currencyCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Currency code for this wallet (must be registered with Currency service)
        autogainEnabled:
          type: boolean
          default: false
          description: Whether this wallet accumulates currency automatically over time
        autogainBaseRate:
          type: number
          format: double
          nullable: true
          description: Base rate of automatic currency gain per tick. Required when autogainEnabled is true.
        autogainCap:
          type: number
          format: double
          nullable: true
          description: Maximum balance for autogain accumulation. Required when autogainEnabled is true.
    GenesisGrowthMapping:
      type: object
      additionalProperties: false
      description: Maps a wallet currency transaction to seed growth in a specific domain
      required:
      - walletCode
      - domain
      - ratio
      - direction
      properties:
        walletCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Wallet code that triggers growth (must reference a wallet in the template)
        domain:
          type: string
          minLength: 1
          maxLength: 100
          description: Seed growth domain to apply growth to (must reference a domain in the seed config)
        ratio:
          type: number
          format: double
          minimum: 0
          description: Multiplier applied to the currency transaction amount before recording as seed growth
        direction:
          $ref: '#/components/schemas/GrowthDirection'
          description: Which transaction direction triggers this mapping
    GenesisStorageConfig:
      type: object
      additionalProperties: false
      description: Storage configuration within a genesis template (inventory containers)
      required:
      - inventories
      properties:
        inventories:
          type: array
          items:
            $ref: '#/components/schemas/GenesisInventoryConfig'
          description: Inventory containers provisioned for each entity created from this template
    GenesisInventoryConfig:
      type: object
      additionalProperties: false
      description: Inventory container configuration within a genesis template
      required:
      - inventoryCode
      - constraintModel
      - capacity
      properties:
        inventoryCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique inventory code within the template (used as key in inventoryIds map)
        constraintModel:
          type: string
          minLength: 1
          maxLength: 50
          description: Container constraint model (e.g., SlotOnly, WeightOnly, SlotAndWeight, Grid, Volumetric, 
            Unlimited). Stored in template and passed through to Inventory at entity creation.
        capacity:
          type: integer
          minimum: 0
          description: Container capacity (interpretation depends on constraintModel)
        allowedCategories:
          type: array
          nullable: true
          items:
            type: string
          description: Allowed item categories for this container (null allows all categories). Passed through to 
            Inventory at container creation.
    GenesisAwakeningConfig:
      type: object
      additionalProperties: false
      description: Awakening configuration for CharacterBrain cognitive stage transition
      required:
      - systemRealmCode
      - characterSpeciesCode
      - archiveOnDestruction
      properties:
        systemRealmCode:
          type: string
          minLength: 1
          maxLength: 100
          description: System realm code where the character is created at awakening. Must be a valid system realm.
        characterSpeciesCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Species code for the character created at awakening. Must exist in the system realm.
        initialPersonalityTraits:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/GenesisPersonalityTraitSeed'
          description: Personality trait values to seed on the character at awakening. Null if no traits should be 
            seeded.
    GenesisPersonalityTraitSeed:
      type: object
      additionalProperties: false
      description: A personality trait value to seed on a character at awakening
      required:
      - traitCode
      - value
      properties:
        traitCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Personality trait axis code to set
        value:
          type: number
          format: float
          minimum: -1.0
          maximum: 1.0
          description: Initial trait value on the bipolar axis (-1.0 to 1.0)
    GenesisBondConfig:
      type: object
      additionalProperties: false
      description: Bond configuration within a genesis template
      required:
      - enabled
      - cardinality
      properties:
        enabled:
          type: boolean
          description: Whether bonding is enabled for entities of this template
        cardinality:
          $ref: '#/components/schemas/BondCardinality'
          description: Maximum bond cardinality for entities of this template
        relationshipTypeCode:
          type: string
          nullable: true
          minLength: 1
          maxLength: 100
          description: Relationship type code used when creating Relationship at awakening. Required when enabled is 
            true.
    RegisterTemplateRequest:
      type: object
      additionalProperties: false
      description: Request to register a new genesis template
      required:
      - templateCode
      - gameServiceId
      - displayName
      - description
      - seed
      - economy
      - storage
      - awakening
      - physicalFormType
      - bond
      - archiveOnDestruction
      properties:
        templateCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique template identifier (primary key)
        gameServiceId:
          type: string
          format: uuid
          description: Game service this template is scoped to
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable template name
        description:
          type: string
          minLength: 1
          maxLength: 2000
          description: Template description
        seed:
          $ref: '#/components/schemas/GenesisSeedConfig'
          description: Seed lifecycle configuration
        economy:
          $ref: '#/components/schemas/GenesisEconomyConfig'
          description: Economy configuration (wallets and growth mappings)
        storage:
          $ref: '#/components/schemas/GenesisStorageConfig'
          description: Storage configuration (inventories)
        awakening:
          $ref: '#/components/schemas/GenesisAwakeningConfig'
          description: Awakening configuration for CharacterBrain transition
        physicalFormType:
          $ref: '#/components/schemas/PhysicalFormType'
          description: Type of physical form entities of this template can be bound to
        bond:
          $ref: '#/components/schemas/GenesisBondConfig'
          description: Bond configuration
        archiveOnDestruction:
          type: boolean
          default: true
          description: Whether to archive the character via lib-resource compression before destroying the entity
    GetTemplateRequest:
      type: object
      additionalProperties: false
      description: Request to get a genesis template by code
      required:
      - templateCode
      properties:
        templateCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Template code to retrieve
    ListTemplatesRequest:
      type: object
      additionalProperties: false
      description: Request to list genesis templates for a game service
      required:
      - gameServiceId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service to list templates for
        includeDeprecated:
          type: boolean
          default: false
          description: Whether to include deprecated templates in results
        page:
          type: integer
          default: 1
          minimum: 1
          description: Page number for pagination
        pageSize:
          type: integer
          nullable: true
          minimum: 1
          maximum: 100
          description: Number of results per page (defaults to service configuration)
    UpdateTemplateRequest:
      type: object
      additionalProperties: false
      description: Request to update a genesis template. Only provided fields are updated.
      required:
      - templateCode
      properties:
        templateCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Template code to update
        displayName:
          type: string
          nullable: true
          minLength: 1
          maxLength: 200
          description: Updated human-readable template name
        description:
          type: string
          nullable: true
          minLength: 1
          maxLength: 2000
          description: Updated template description
        seed:
          $ref: '#/components/schemas/GenesisSeedConfig'
          nullable: true
          description: Updated seed configuration
        economy:
          $ref: '#/components/schemas/GenesisEconomyConfig'
          nullable: true
          description: Updated economy configuration
        storage:
          $ref: '#/components/schemas/GenesisStorageConfig'
          nullable: true
          description: Updated storage configuration
        awakening:
          $ref: '#/components/schemas/GenesisAwakeningConfig'
          nullable: true
          description: Updated awakening configuration
        bond:
          $ref: '#/components/schemas/GenesisBondConfig'
          nullable: true
          description: Updated bond configuration
    DeprecateTemplateRequest:
      type: object
      additionalProperties: false
      description: Request to deprecate a genesis template (Category B deprecation)
      required:
      - templateCode
      properties:
        templateCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Template code to deprecate
        reason:
          type: string
          nullable: true
          maxLength: 500
          description: Optional reason for deprecation
    GenesisTemplateResponse:
      type: object
      additionalProperties: false
      description: Full genesis template with all configuration and deprecation state
      required:
      - templateCode
      - gameServiceId
      - displayName
      - description
      - seed
      - economy
      - storage
      - awakening
      - physicalFormType
      - bond
      - archiveOnDestruction
      - isDeprecated
      - createdAt
      - updatedAt
      properties:
        templateCode:
          type: string
          description: Unique template identifier
        gameServiceId:
          type: string
          format: uuid
          description: Game service this template is scoped to
        displayName:
          type: string
          description: Human-readable template name
        description:
          type: string
          description: Template description
        seed:
          $ref: '#/components/schemas/GenesisSeedConfig'
          description: Seed lifecycle configuration
        economy:
          $ref: '#/components/schemas/GenesisEconomyConfig'
          description: Economy configuration
        storage:
          $ref: '#/components/schemas/GenesisStorageConfig'
          description: Storage configuration
        awakening:
          $ref: '#/components/schemas/GenesisAwakeningConfig'
          description: Awakening configuration
        physicalFormType:
          $ref: '#/components/schemas/PhysicalFormType'
          description: Physical form type for entities of this template
        bond:
          $ref: '#/components/schemas/GenesisBondConfig'
          description: Bond configuration
        archiveOnDestruction:
          type: boolean
          description: Whether to archive the character via lib-resource compression before destroying the entity
        isDeprecated:
          type: boolean
          description: Whether this template is deprecated
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the template was deprecated (null if not deprecated)
        deprecationReason:
          type: string
          nullable: true
          description: Reason for deprecation (null if not deprecated)
        createdAt:
          type: string
          format: date-time
          description: When the template was registered
        updatedAt:
          type: string
          format: date-time
          description: When the template was last updated
    ListTemplatesResponse:
      type: object
      additionalProperties: false
      description: Paginated list of genesis templates
      required:
      - templates
      - totalCount
      - page
      - pageSize
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/GenesisTemplateResponse'
          description: Templates matching the query
        totalCount:
          type: integer
          minimum: 0
          description: Total number of matching templates
        page:
          type: integer
          minimum: 1
          description: Current page number
        pageSize:
          type: integer
          minimum: 1
          description: Results per page
    CreateEntityRequest:
      type: object
      additionalProperties: false
      description: Request to create a genesis entity from a template
      required:
      - templateCode
      - gameServiceId
      - realmId
      properties:
        templateCode:
          type: string
          minLength: 1
          description: Template code to create entity from (must not be deprecated)
        gameServiceId:
          type: string
          format: uuid
          description: Game service this entity belongs to
        realmId:
          type: string
          format: uuid
          description: Realm this entity is scoped to
        code:
          type: string
          nullable: true
          minLength: 1
          maxLength: 100
          description: Optional human-readable code, unique within gameServiceId/realmId scope
        displayName:
          type: string
          nullable: true
          minLength: 1
          maxLength: 200
          description: Optional display name for the entity
    GetEntityRequest:
      type: object
      additionalProperties: false
      description: Request to get a genesis entity by ID
      required:
      - entityId
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity ID to retrieve
        includeBalances:
          type: boolean
          nullable: true
          description: Whether to include wallet balances in the response (defaults to service configuration)
    ListEntitiesRequest:
      type: object
      additionalProperties: false
      description: Request to list genesis entities by template and realm with optional filters
      required:
      - templateCode
      - realmId
      properties:
        templateCode:
          type: string
          minLength: 1
          description: Template code to filter by
        realmId:
          type: string
          format: uuid
          description: Realm to filter by
        cognitiveStage:
          $ref: '#/components/schemas/CognitiveStage'
          nullable: true
          description: Optional cognitive stage filter
        status:
          $ref: '#/components/schemas/GenesisEntityStatus'
          nullable: true
          description: Optional status filter
        currentPhase:
          type: string
          nullable: true
          description: Optional current phase name filter
        page:
          type: integer
          default: 1
          minimum: 1
          description: Page number for pagination
        pageSize:
          type: integer
          nullable: true
          minimum: 1
          maximum: 100
          description: Number of results per page (defaults to service configuration)
    GetCapabilitiesRequest:
      type: object
      additionalProperties: false
      description: Request to get capability manifest for a genesis entity
      required:
      - entityId
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity ID to get capabilities for
    DestroyEntityRequest:
      type: object
      additionalProperties: false
      description: Request to destroy a genesis entity
      required:
      - entityId
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity ID to destroy
    BindPhysicalFormRequest:
      type: object
      additionalProperties: false
      description: Request to bind a physical form to a genesis entity
      required:
      - entityId
      - physicalFormType
      - physicalFormId
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity ID to bind the physical form to
        physicalFormType:
          $ref: '#/components/schemas/PhysicalFormType'
          description: Type of physical form being bound (must match template configuration)
        physicalFormId:
          type: string
          format: uuid
          description: ID of the physical form (item instance ID or location ID)
    CreateBondRequest:
      type: object
      additionalProperties: false
      description: Request to create a bond on a genesis entity
      required:
      - entityId
      - targetEntityType
      - targetEntityId
      properties:
        entityId:
          type: string
          format: uuid
          description: Genesis entity ID to create the bond on
        targetEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the entity to bond with
        targetEntityId:
          type: string
          format: uuid
          description: ID of the entity to bond with
    GetBondRequest:
      type: object
      additionalProperties: false
      description: Request to get bond information for a genesis entity
      required:
      - entityId
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity ID to get bond information for
    DissolveBondRequest:
      type: object
      additionalProperties: false
      description: Request to dissolve a bond on a genesis entity
      required:
      - entityId
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity ID to dissolve the bond on
    CleanupByCharacterRequest:
      type: object
      additionalProperties: false
      description: Request to cascade-delete genesis entities linked to a character (called by lib-resource)
      required:
      - characterId
      properties:
        characterId:
          type: string
          format: uuid
          description: Character ID whose genesis entities should be destroyed
    CleanupByRealmRequest:
      type: object
      additionalProperties: false
      description: Request to cascade-delete genesis entities in a realm (called by lib-resource)
      required:
      - realmId
      properties:
        realmId:
          type: string
          format: uuid
          description: Realm ID whose genesis entities should be destroyed
    GetCompressDataRequest:
      type: object
      additionalProperties: false
      description: Request to get compression archive data for genesis entities linked to a character (called by 
        lib-resource)
      required:
      - characterId
      properties:
        characterId:
          type: string
          format: uuid
          description: Character ID to gather genesis entity archive data for
    RestoreFromArchiveRequest:
      type: object
      additionalProperties: false
      description: Request to restore genesis entities from a compressed archive
      required:
      - archive
      properties:
        archive:
          $ref: '#/components/schemas/GenesisArchive'
          description: Genesis archive data to restore from
    GenesisEntityResponse:
      type: object
      additionalProperties: false
      description: Full genesis entity state including provisioned infrastructure references
      required:
      - entityId
      - templateCode
      - gameServiceId
      - realmId
      - walletIds
      - inventoryIds
      - currentPhase
      - cognitiveStage
      - physicalFormType
      - status
      - createdAt
      - updatedAt
      properties:
        entityId:
          type: string
          format: uuid
          description: Unique entity identifier
        templateCode:
          type: string
          description: Template code this entity was created from
        gameServiceId:
          type: string
          format: uuid
          description: Game service this entity belongs to
        realmId:
          type: string
          format: uuid
          description: Realm this entity is scoped to
        code:
          type: string
          nullable: true
          description: Human-readable code within gameServiceId/realmId scope
        displayName:
          type: string
          nullable: true
          description: Entity display name
        walletIds:
          type: object
          additionalProperties:
            type: string
            format: uuid
          description: Map of wallet codes to wallet IDs (walletCode to walletId)
        walletBalances:
          type: object
          nullable: true
          additionalProperties:
            type: number
            format: double
          description: Map of wallet codes to current balances (only populated when includeBalances is true)
        inventoryIds:
          type: object
          additionalProperties:
            type: string
            format: uuid
          description: Map of inventory codes to container IDs (inventoryCode to containerId)
        currentPhase:
          type: string
          description: Current growth phase name
        cognitiveStage:
          $ref: '#/components/schemas/CognitiveStage'
          description: Current cognitive progression stage
        actorId:
          type: string
          format: uuid
          nullable: true
          description: Actor ID (populated at EventBrain stage, null when Dormant)
        characterId:
          type: string
          format: uuid
          nullable: true
          description: Character ID (populated at CharacterBrain stage, null when Dormant or EventBrain)
        physicalFormType:
          $ref: '#/components/schemas/PhysicalFormType'
          description: Type of physical form bound to this entity
        physicalFormId:
          type: string
          format: uuid
          nullable: true
          description: ID of the bound physical form (null when PhysicalFormType is None or not yet bound)
        bondTargetEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Type of the bonded target entity (null when no bond)
        bondTargetEntityId:
          type: string
          format: uuid
          nullable: true
          description: ID of the bonded target entity (null when no bond)
        bondId:
          type: string
          format: uuid
          nullable: true
          description: Relationship ID for the materialized bond (null until CharacterBrain awakening)
        status:
          $ref: '#/components/schemas/GenesisEntityStatus'
          description: Operational status
        createdAt:
          type: string
          format: date-time
          description: When the entity was created
        updatedAt:
          type: string
          format: date-time
          description: When the entity was last updated
    ListEntitiesResponse:
      type: object
      additionalProperties: false
      description: Paginated list of genesis entities
      required:
      - entities
      - totalCount
      - page
      - pageSize
      properties:
        entities:
          type: array
          items:
            $ref: '#/components/schemas/GenesisEntityResponse'
          description: Entities matching the query
        totalCount:
          type: integer
          minimum: 0
          description: Total number of matching entities
        page:
          type: integer
          minimum: 1
          description: Current page number
        pageSize:
          type: integer
          minimum: 1
          description: Results per page
    GetCapabilitiesResponse:
      type: object
      additionalProperties: false
      description: Capability manifest for a genesis entity
      required:
      - entityId
      - capabilities
      - version
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity ID the capabilities belong to
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/GenesisCapability'
          description: List of capabilities with unlock status
        version:
          type: integer
          minimum: 0
          description: Capability manifest version number
    GenesisCapability:
      type: object
      additionalProperties: false
      description: A single capability with its unlock status
      required:
      - capabilityCode
      - isUnlocked
      properties:
        capabilityCode:
          type: string
          description: Capability code
        isUnlocked:
          type: boolean
          description: Whether this capability is currently unlocked
    GenesisBondResponse:
      type: object
      additionalProperties: false
      description: Bond information for a genesis entity
      required:
      - bondTargetEntityType
      - bondTargetEntityId
      properties:
        bondId:
          type: string
          format: uuid
          nullable: true
          description: Relationship ID (null if bond is pre-awakening intent only)
        bondTargetEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the bonded target entity
        bondTargetEntityId:
          type: string
          format: uuid
          description: ID of the bonded target entity
    GenesisArchive:
      allOf:
      - $ref: 'common-api.yaml#/components/schemas/ResourceArchiveBase'
      type: object
      additionalProperties: false
      x-archive-type: true
      description: |
        Archive of genesis entity state for resource compression.
        Inherits base archive properties from ResourceArchiveBase.
        The characterId field equals resourceId for convenience.
      required:
      - entities
      properties:
        entities:
          type: array
          items:
            $ref: '#/components/schemas/GenesisArchivedEntity'
          description: Archived genesis entities linked to the compressed character
    GenesisArchivedEntity:
      type: object
      additionalProperties: false
      description: Archived snapshot of a single genesis entity for compression
      required:
      - entityId
      - templateCode
      - gameServiceId
      - realmId
      - walletBalances
      - currentPhase
      - cognitiveStage
      - createdAt
      properties:
        entityId:
          type: string
          format: uuid
          description: Original entity identifier
        templateCode:
          type: string
          description: Template code the entity was created from
        gameServiceId:
          type: string
          format: uuid
          description: Game service the entity belonged to
        realmId:
          type: string
          format: uuid
          description: Realm the entity was scoped to
        code:
          type: string
          nullable: true
          description: Human-readable entity code
        displayName:
          type: string
          nullable: true
          description: Entity display name
        walletBalances:
          type: object
          additionalProperties:
            type: number
            format: double
          description: Map of wallet codes to balances at time of archival
        currentPhase:
          type: string
          description: Growth phase at time of archival
        cognitiveStage:
          $ref: '#/components/schemas/CognitiveStage'
          description: Cognitive stage at time of archival
        createdAt:
          type: string
          format: date-time
          description: When the entity was originally created
    RestoreFromArchiveResponse:
      type: object
      additionalProperties: false
      description: Result of restoring genesis entities from archive
      required:
      - restoredCount
      properties:
        restoredCount:
          type: integer
          minimum: 0
          description: Number of entities successfully restored from the archive
