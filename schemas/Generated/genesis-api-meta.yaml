        \          \"items\": {\n                        \"$ref\": \"#/$defs/GenesisCapabilityRule\"\n                   \
        \ },\n                    \"description\": \"Rules defining which capabilities unlock at which growth thresholds\"\
        \n                }\n            }\n        },\n        \"GenesisSeedDomain\": {\n            \"type\": \"object\"\
        ,\n            \"additionalProperties\": false,\n            \"description\": \"A growth domain tracked by the seed\"\
        ,\n            \"required\": [\n                \"domainCode\",\n                \"displayName\"\n            ],\n\
        \            \"properties\": {\n                \"domainCode\": {\n                    \"type\": \"string\",\n   \
