        description\"\n                },\n                \"seed\": {\n                    \"$ref\": \"#/$defs/GenesisSeedConfig\"\
        ,\n                    \"description\": \"Seed lifecycle configuration\"\n                },\n                \"economy\"\
        : {\n                    \"$ref\": \"#/$defs/GenesisEconomyConfig\",\n                    \"description\": \"Economy
