  /genesis/entity/create:
    post:
      summary: Create a genesis entity from a template
      description: |
        Provisions a complete genesis entity from a template definition: creates seed,
        currency wallets, inventories, and resource registrations. The entity starts
        at the Dormant cognitive stage and progresses automatically as currency accumulates.
      operationId: createEntity
      tags:
      - Genesis Entities
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityRequest'
      responses:
        '200':
          description: Entity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisEntityResponse'
        '400':
          description: Template deprecated or game service not found
        '404':
          description: Template not found
        '409':
          description: Entity code already in use within game/realm scope
