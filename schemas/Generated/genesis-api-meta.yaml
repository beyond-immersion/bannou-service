openapi: 3.0.4
info:
  title: Bannou Genesis Service API
  description: |
    Template-driven entity awakening lifecycle service (L2 GameFoundation). Manages entities
    that progressively grow from inert objects into autonomous agents with personalities,
    memories, and the full cognitive stack. A single CreateEntity call provisions the seed,
    currency wallets, inventories, and resource registrations from a template definition,
    then manages the Dormant to CharacterBrain cognitive progression automatically as
    currency accumulates.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-references:
  - target: character
    sourceType: genesis
    field: characterId
    onDelete: cascade
    cleanup:
      endpoint: /genesis/cleanup-by-character
      payloadTemplate: '{"characterId": "{{resourceId}}"}'
  - target: realm
    sourceType: genesis
    field: realmId
    onDelete: cascade
    cleanup:
      endpoint: /genesis/cleanup-by-realm
      payloadTemplate: '{"realmId": "{{resourceId}}"}'
  x-resource-lifecycle:
    resourceType: genesis-entity
    cleanupPolicy: BEST_EFFORT
  x-compression-callback:
    resourceType: character
    sourceType: genesis
    compressEndpoint: /genesis/get-compress-data
    compressPayloadTemplate: '{"characterId": "{{resourceId}}"}'
    priority: 10
    description: Genesis entity state (lifecycle, wallets, capabilities, cognitive stage)
    decompressEndpoint: /genesis/restore-from-archive
    decompressPayloadTemplate: '{"archive": "{{data}}"}'
x-service-layer: GameFoundation
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)
paths:
  /genesis/template/register:
    post:
      summary: Register a new genesis template
      description: |
        Registers a template that defines the full lifecycle configuration for a genesis
        entity type. Idempotent: returns existing template if templateCode already registered.
        Validates seed structure, system realm existence, and species availability.
      operationId: registerTemplate
      tags:
      - Genesis Templates
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterTemplateRequest'
      responses:
        '200':
          description: Template registered successfully (or already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenesisTemplateResponse'
        '400':
          description: Invalid template structure, system realm not found, or species not found
