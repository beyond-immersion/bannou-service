openapi: 3.0.4
info:
  title: Bannou Arbitration Service API
  description: |
    Dispute resolution orchestration composing Contract/Faction primitives for jurisdictional
    rulings. A thin orchestration layer (like Quest over Contract, Escrow over Currency/Item)
    that composes existing Bannou primitives to deliver adjudication game mechanics.
    Internal-only, never internet-facing.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-references:
  - target: character
    sourceType: arbitration-case
    field: petitionerEntityId
    onDelete: detach
    cleanup:
      endpoint: /arbitration/cleanup-by-character
      resourceIdParam: characterId
  - target: realm
    sourceType: arbitration-case
    field: locationId
    onDelete: detach
    cleanup:
      endpoint: /arbitration/cleanup-by-realm
      resourceIdParam: realmId
  - target: faction
    sourceType: arbitration-case
    field: sovereignFactionId
    onDelete: detach
    cleanup:
      endpoint: /arbitration/cleanup-by-faction
      resourceIdParam: factionId
  - target: location
    sourceType: arbitration-case
    field: locationId
    onDelete: detach
    cleanup:
      endpoint: /arbitration/cleanup-by-location
      resourceIdParam: locationId
x-service-layer: GameFeatures
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)

paths:
  # ==========================================================================
  # Case Management
  # ==========================================================================

  /arbitration/case/file:
    post:
      summary: File a new arbitration case
      description: |
        Creates a new arbitration case by resolving jurisdiction, selecting a procedural
        template from the sovereign's governance data, and creating a Contract instance
        to drive the case lifecycle. Petitioner and respondent must be valid entities.
        Returns 400 if Faction service is unavailable or no sovereign has jurisdiction.
      operationId: fileCase
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileCaseRequest'
      responses:
        '200':
          description: Case filed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCaseResponse'
        '400':
          description: Invalid request, Faction service unavailable, or no sovereign has jurisdiction for this case type
        '404':
          description: Game service, petitioner, respondent, or location not found

  /arbitration/case/get:
    post:
      summary: Get an arbitration case by ID
      description: Returns the full case record enriched with current contract milestone status.
      operationId: getCase
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCaseRequest'
      responses:
        '200':
          description: Case retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCaseInfo'
        '404':
          description: Case not found

  /arbitration/case/get-by-code:
    post:
      summary: Get an arbitration case by human-readable code
      description: Looks up a case by its sequential code (e.g., ARB-DISS-00142) within a game service scope.
      operationId: getCaseByCode
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCaseByCodeRequest'
      responses:
        '200':
          description: Case retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCaseInfo'
        '404':
          description: Case not found for the given code and game service

  /arbitration/case/list:
    post:
      summary: List arbitration cases with filtering
      description: |
        Queries cases within a game service scope with optional filters for case type,
        status, party entities, arbiter, and jurisdictional faction. Results are ordered
        by filing timestamp descending.
      operationId: listCases
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListCasesRequest'
      responses:
        '200':
          description: Cases retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCasesResponse'

  /arbitration/case/withdraw:
    post:
      summary: Withdraw an arbitration case
      description: |
        Petitioner withdraws the case. Terminates the underlying contract and closes
        the case with reason Withdrawal. Returns 409 if the case is already in a terminal state.
      operationId: withdrawCase
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawCaseRequest'
      responses:
        '200':
          description: Case withdrawn successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCaseInfo'
        '404':
          description: Case not found
        '409':
          description: Case is already in a terminal state

  /arbitration/case/dismiss:
    post:
      summary: Dismiss an arbitration case
      description: |
        Arbiter or sovereign dismisses the case with reasoning. Terminates the underlying
        contract and closes the case with reason Dismissal. Returns 409 if the case is
        already in a terminal state.
      operationId: dismissCase
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DismissCaseRequest'
      responses:
        '200':
          description: Case dismissed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCaseInfo'
        '404':
          description: Case not found
        '409':
          description: Case is already in a terminal state

  /arbitration/case/challenge-jurisdiction:
    post:
      summary: Challenge case jurisdiction
      description: |
        A party challenges the jurisdictional authority over the case. Records the
        challenge reasoning and challenging party on the case record.
        Returns 409 if the case is in a terminal state.
      operationId: challengeJurisdiction
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChallengeJurisdictionRequest'
      responses:
        '200':
          description: Jurisdiction challenge recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCaseInfo'
        '404':
          description: Case not found
        '409':
          description: Case is already in a terminal state

  /arbitration/case/get-timeline:
    post:
      summary: Get procedural timeline for a case
      description: |
        Returns the current procedural timeline including milestone deadlines,
        current phase, and days remaining. Derived from the underlying contract milestones.
      operationId: getTimeline
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetTimelineRequest'
      responses:
        '200':
          description: Timeline retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTimelineResponse'
        '404':
          description: Case not found

  # ==========================================================================
  # Evidence Management
  # ==========================================================================

  /arbitration/evidence/submit:
    post:
      summary: Submit evidence for a case
      description: |
        Submits evidence for an active case. Only petitioner or respondent may submit.
        Returns 409 if the case is not in an evidence-accepting phase or the per-party
        evidence limit has been reached.
      operationId: submitEvidence
      tags:
      - Evidence
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitEvidenceRequest'
      responses:
        '200':
          description: Evidence submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitEvidenceResponse'
        '400':
          description: Submitting party is not a valid case participant
        '404':
          description: Case not found
        '409':
          description: Case is not in an evidence-accepting phase or evidence limit reached

  /arbitration/evidence/list:
    post:
      summary: List evidence for a case
      description: Returns evidence submitted for a case with optional party filter. Ordered by submission timestamp 
        ascending.
      operationId: listEvidence
      tags:
      - Evidence
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListEvidenceRequest'
      responses:
        '200':
          description: Evidence retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEvidenceResponse'
        '404':
          description: Case not found

  /arbitration/evidence/get:
    post:
      summary: Get a specific evidence item
      operationId: getEvidence
      tags:
      - Evidence
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetEvidenceRequest'
      responses:
        '200':
          description: Evidence retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationEvidenceInfo'
        '404':
          description: Evidence not found

  # ==========================================================================
  # Arbiter Management
  # ==========================================================================

  /arbitration/arbiter/assign:
    post:
      summary: Assign an arbiter to a case
      description: |
        Assigns an arbiter to a case using the specified selection mode.
        For ExternalRequest mode, publishes an arbiter.requested event and returns
        pending=true; the external actor later calls this endpoint again with an explicit
        arbiter ID. Returns 409 if an arbiter is already assigned or caseload limit exceeded.
      operationId: assignArbiter
      tags:
      - Arbiter
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignArbiterRequest'
      responses:
        '200':
          description: Arbiter assigned or request pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignArbiterResponse'
        '400':
          description: Faction service unavailable for arbiter resolution
        '404':
          description: Case not found
        '409':
          description: Arbiter already assigned or caseload limit exceeded

  /arbitration/arbiter/recuse:
    post:
      summary: Recuse the assigned arbiter from a case
      description: |
        Removes the current arbiter from the case and decrements their caseload.
        Returns 404 if the case has no arbiter assigned. Returns 409 if the case
        is in a terminal state.
      operationId: recuseArbiter
      tags:
      - Arbiter
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecuseArbiterRequest'
      responses:
        '200':
          description: Arbiter recused successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCaseInfo'
        '404':
          description: Case not found or no arbiter assigned
        '409':
          description: Case is in a terminal state

  /arbitration/arbiter/list-qualified:
    post:
      summary: List qualified arbiters for a case type
      description: |
        Returns qualified arbiters derived from governance data for the specified
        case type and location. Results are cached with TTL. Returns 400 if Faction
        service is unavailable.
      operationId: listQualifiedArbiters
      tags:
      - Arbiter
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListQualifiedArbitersRequest'
      responses:
        '200':
          description: Qualified arbiters retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListQualifiedArbitersResponse'
        '400':
          description: Faction service unavailable

  /arbitration/arbiter/get-caseload:
    post:
      summary: Get an arbiter's active caseload
      description: Returns the arbiter's active case count and case IDs. Returns zero caseload if no record exists (not 
        404).
      operationId: getArbiterCaseload
      tags:
      - Arbiter
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetArbiterCaseloadRequest'
      responses:
        '200':
          description: Caseload retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetArbiterCaseloadResponse'

  # ==========================================================================
  # Ruling Management
  # ==========================================================================

  /arbitration/ruling/issue:
    post:
      summary: Issue a ruling for a case
      description: |
        Arbiter issues a ruling with a consequence manifest. Consequences are executed
        best-effort with per-item isolation — failed consequences are logged and tracked
        on the ruling record for retry via EnforceRuling. Returns 409 if the case is not
        in a ruling-eligible phase or a ruling already exists.
      operationId: issueRuling
      tags:
      - Ruling
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueRulingRequest'
      responses:
        '200':
          description: Ruling issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueRulingResponse'
        '404':
          description: Case not found
        '409':
          description: Case not in ruling-eligible phase or ruling already exists

  /arbitration/ruling/appeal:
    post:
      summary: Appeal a ruling
      description: |
        Appeals a ruling within the appeal window. Resets the case to the evidence phase
        for appellate review with a higher authority arbiter. Returns 409 if the case is
        not in Ruled status or the appeal window has expired.
      operationId: appealRuling
      tags:
      - Ruling
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppealRulingRequest'
      responses:
        '200':
          description: Appeal filed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCaseInfo'
        '404':
          description: Case or ruling not found
        '409':
          description: Case not in Ruled status or appeal window expired

  /arbitration/ruling/get:
    post:
      summary: Get a ruling by ID or case ID
      description: Retrieves a ruling by ruling ID or by case ID. At least one must be provided.
      operationId: getRuling
      tags:
      - Ruling
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetRulingRequest'
      responses:
        '200':
          description: Ruling retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationRulingInfo'
        '404':
          description: Ruling not found or case has no ruling

  /arbitration/ruling/enforce:
    post:
      summary: Enforce a ruling's consequences
      description: |
        Idempotent enforcement — re-executes only Failed consequences, skips Succeeded.
        When all consequences succeed, closes the case. Safe to call multiple times
        (by deadline worker, admin, or divine actor). Returns 200 if case already closed.
        Returns 409 if case is not in Ruled status.
      operationId: enforceRuling
      tags:
      - Ruling
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnforceRulingRequest'
      responses:
        '200':
          description: Enforcement executed (may be partial if some consequences still fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnforceRulingResponse'
        '404':
          description: Case or ruling not found
        '409':
          description: Case is not in Ruled status

  # ==========================================================================
  # Jurisdiction
  # ==========================================================================

  /arbitration/jurisdiction/resolve:
    post:
      summary: Resolve jurisdiction for a location and case type
      description: |
        Resolves which sovereign faction has jurisdiction over a case type at a given
        location. Uses a TTL cache. Walks the sovereignty hierarchy: delegated faction
        -> sovereign -> realm baseline. Returns 400 if Faction unavailable, 404 if no
        sovereign has jurisdiction.
      operationId: resolveJurisdiction
      tags:
      - Jurisdiction
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveJurisdictionRequest'
      responses:
        '200':
          description: Jurisdiction resolved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveJurisdictionResponse'
        '400':
          description: Faction service unavailable
        '404':
          description: Location not found or no sovereign has jurisdiction for this case type

  /arbitration/jurisdiction/get-hierarchy:
    post:
      summary: Get the jurisdictional authority hierarchy for a location
      description: Returns the full sovereignty hierarchy for a location showing all authority levels.
      operationId: getJurisdictionHierarchy
      tags:
      - Jurisdiction
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetJurisdictionHierarchyRequest'
      responses:
        '200':
          description: Hierarchy retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetJurisdictionHierarchyResponse'
        '400':
          description: Faction service unavailable
        '404':
          description: Location not found

  # ==========================================================================
  # Resource Cleanup (x-references DETACH callbacks)
  # ==========================================================================

  /arbitration/cleanup-by-character:
    post:
      summary: Cleanup arbitration data when a character is deleted
      description: |
        Resource-managed DETACH cleanup. Active cases with the deleted character as a party
        are closed; terminal cases have the character reference nullified. Per-item error
        isolation ensures one failure does not block processing of other cases.
      operationId: cleanupByCharacter
      tags:
      - Cleanup
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupByCharacterRequest'
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleanupResponse'

  /arbitration/cleanup-by-realm:
    post:
      summary: Cleanup arbitration data when a realm is deleted
      description: |
        Resource-managed DETACH cleanup. Active cases in the deleted realm's locations
        are closed; terminal cases have the location reference nullified.
      operationId: cleanupByRealm
      tags:
      - Cleanup
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupByRealmRequest'
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleanupResponse'

  /arbitration/cleanup-by-faction:
    post:
      summary: Cleanup arbitration data when a faction is deleted
      description: |
        Resource-managed DETACH cleanup. Active cases under the deleted faction's
        sovereignty are closed; terminal cases have the faction reference nullified.
        Also invalidates jurisdiction cache entries for the faction.
      operationId: cleanupByFaction
      tags:
      - Cleanup
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupByFactionRequest'
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleanupResponse'

  /arbitration/cleanup-by-location:
    post:
      summary: Cleanup arbitration data when a location is deleted
      description: |
        Resource-managed DETACH cleanup. Active cases at the deleted location are closed;
        terminal cases have the location reference nullified. Also invalidates jurisdiction
        cache entries for the location.
      operationId: cleanupByLocation
      tags:
      - Cleanup
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupByLocationRequest'
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleanupResponse'

components:
  schemas:
    # ==========================================================================
    # Enums
    # ==========================================================================

    ArbitrationCaseStatus:
      type: string
      description: Case lifecycle states managed via contract milestones
      enum:
      - Filed
      - AwaitingArbiter
      - Hearing
      - Deliberation
      - Ruled
      - Appealed
      - Closed
      - Dismissed
      - Withdrawn

    ArbitrationRulingType:
      type: string
      description: Finite set of ruling outcomes determining consequence execution logic
      enum:
      - PetitionerFavored
      - RespondentFavored
      - Split
      - Dismissed

    ArbitrationEvidenceType:
      type: string
      description: Categories of evidence affecting relevance scoring
      enum:
      - Testimony
      - Document
      - Witness
      - Physical

    ArbiterSelectionMode:
      type: string
      description: Strategies for assigning arbiters from governance data
      enum:
      - FactionLeader
      - AppointedOfficial
      - ExternalRequest
      - PeerPanel

    ConsequenceType:
      type: string
      description: Types of ruling consequences dispatched to downstream services
      enum:
      - RelationshipChange
      - AssetDivision
      - OngoingObligation
      - CustodyAssignment
      - Exile
      - Fine
      - Imprisonment
      - SovereigntyTransfer
      - NormViolationPublication
      - DivineAttention
      - OrganizationDissolution
      - SeedGrowthTransfer

    ConsequenceResultStatus:
      type: string
      description: Execution status of an individual ruling consequence
      enum:
      - Pending
      - Succeeded
      - Failed

    CaseClosedReason:
      type: string
      description: Reason a case reached a terminal closed state
      enum:
      - Withdrawal
      - Dismissal
      - RulingEnforced
      - PartyCharacterDeleted
      - RealmDeleted
      - JurisdictionVoid

    AuthorityLevel:
      type: string
      description: Faction authority level for jurisdictional determination. Matches Faction service AuthorityLevel 
        enum.
      enum:
      - Influence
      - Delegated
      - Sovereign

    # ==========================================================================
    # Shared Data Types
    # ==========================================================================

    ConsequenceManifestEntry:
      type: object
      additionalProperties: false
      description: A single consequence to execute as part of a ruling. Fields are type-specific and nullable when not 
        applicable to the consequence type.
      required:
      - consequenceType
      properties:
        consequenceType:
          $ref: '#/components/schemas/ConsequenceType'
          description: Type of consequence determining which downstream service is called
        targetEntityId:
          type: string
          format: uuid
          nullable: true
          description: Target entity for the consequence (e.g., relationship to change, character to exile)
        targetEntityType:
          $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Type of the target entity
        sourceEntityId:
          type: string
          format: uuid
          nullable: true
          description: Source entity for transfer-type consequences (e.g., custody source, seed source)
        sourceEntityType:
          $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Type of the source entity
        amount:
          type: number
          format: double
          nullable: true
          description: Monetary amount for Fine consequences
        currencyDefinitionId:
          type: string
          format: uuid
          nullable: true
          description: Currency definition for Fine consequences
        relationshipTypeId:
          type: string
          format: uuid
          nullable: true
          description: Relationship type ID for RelationshipChange consequences
        factionId:
          type: string
          format: uuid
          nullable: true
          description: Faction ID for Exile or SovereigntyTransfer consequences
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Organization ID for OrganizationDissolution consequences
        seedId:
          type: string
          format: uuid
          nullable: true
          description: Source seed ID for SeedGrowthTransfer consequences
        targetSeedId:
          type: string
          format: uuid
          nullable: true
          description: Target seed ID for SeedGrowthTransfer consequences
        proportion:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 1
          description: Transfer proportion for SeedGrowthTransfer consequences (0.0 to 1.0)
        statusTemplateId:
          type: string
          format: uuid
          nullable: true
          description: Status template ID for Imprisonment consequences
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: Human-readable description of this consequence

    ConsequenceResult:
      type: object
      additionalProperties: false
      description: Execution result of an individual ruling consequence, tracked for enforcement retry
      required:
      - consequenceType
      - status
      - attemptCount
      properties:
        consequenceType:
          $ref: '#/components/schemas/ConsequenceType'
          description: Type of consequence this result tracks
        status:
          $ref: '#/components/schemas/ConsequenceResultStatus'
          description: Current execution status
        attemptCount:
          type: integer
          minimum: 0
          description: Number of execution attempts
        lastError:
          type: string
          nullable: true
          description: Error message from the most recent failed attempt

    EvidenceContent:
      type: object
      additionalProperties: false
      description: Typed evidence content with fields applicable to different evidence types
      required:
      - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
          description: Title or summary of the evidence item
        description:
          type: string
          nullable: true
          maxLength: 5000
          description: Detailed description of the evidence
        witnessEntityId:
          type: string
          format: uuid
          nullable: true
          description: Entity ID of the witness (for Testimony and Witness evidence types)
        witnessEntityType:
          $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Entity type of the witness
        documentReference:
          type: string
          nullable: true
          maxLength: 1000
          description: Reference identifier for document evidence (for Document evidence type)
        physicalLocationDescription:
          type: string
          nullable: true
          maxLength: 1000
          description: Description of where physical evidence is located (for Physical evidence type)

    ProceduralMilestone:
      type: object
      additionalProperties: false
      description: A milestone in the procedural timeline of an arbitration case
      required:
      - name
      - status
      properties:
        name:
          type: string
          description: Milestone identifier (e.g., filing_accepted, evidence_closed, ruling_issued)
        status:
          type: string
          description: Current milestone status from Contract (e.g., Pending, Completed, Failed)
        deadline:
          type: string
          format: date-time
          nullable: true
          description: Deadline for milestone completion, null if no deadline
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: When the milestone was completed, null if not yet completed

    QualifiedArbiterInfo:
      type: object
      additionalProperties: false
      description: Information about an arbiter qualified to handle cases of a given type
      required:
      - arbiterId
      - entityType
      - activeCaseCount
      properties:
        arbiterId:
          type: string
          format: uuid
          description: Entity ID of the qualified arbiter
        entityType:
          $ref: '#/components/schemas/EntityType'
          description: Entity type of the arbiter (typically Character)
        displayName:
          type: string
          nullable: true
          description: Display name of the arbiter if available
        activeCaseCount:
          type: integer
          minimum: 0
          description: Number of active cases currently assigned to this arbiter

    JurisdictionHierarchyEntry:
      type: object
      additionalProperties: false
      description: An entry in the jurisdictional authority hierarchy for a location
      required:
      - factionId
      - authorityLevel
      properties:
        factionId:
          type: string
          format: uuid
          description: Faction exercising authority at this level
        factionName:
          type: string
          nullable: true
          description: Display name of the faction if available
        authorityLevel:
          $ref: '#/components/schemas/AuthorityLevel'
          description: Level of authority this faction exercises
        domains:
          type: array
          nullable: true
          items:
            type: string
          description: Governance domains covered by this faction at this authority level

    # ==========================================================================
    # Entity Info Types (shared response shapes)
    # ==========================================================================

    ArbitrationCaseInfo:
      type: object
      additionalProperties: false
      description: Full arbitration case record
      required:
      - caseId
      - caseCode
      - gameServiceId
      - caseType
      - status
      - contractId
      - templateCode
      - jurisdictionChallenged
      - createdAt
      properties:
        caseId:
          type: string
          format: uuid
          description: Unique identifier for the case
        caseCode:
          type: string
          description: Human-readable sequential case code (e.g., ARB-DISS-00142)
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope for this case
        caseType:
          type: string
          description: Game-configurable dispute type code (e.g., dissolution, trade_dispute, criminal)
        status:
          $ref: '#/components/schemas/ArbitrationCaseStatus'
          description: Current case lifecycle status
        locationId:
          type: string
          format: uuid
          nullable: true
          description: Location where the case was filed. Nullable due to DETACH cleanup.
        sovereignFactionId:
          type: string
          format: uuid
          nullable: true
          description: Jurisdictional sovereign faction. Nullable due to DETACH cleanup.
        petitioner:
          $ref: '#/components/schemas/EntityReference'
          nullable: true
          description: Petitioner party reference. Nullable due to DETACH cleanup of character.
        respondent:
          $ref: '#/components/schemas/EntityReference'
          nullable: true
          description: Respondent party reference. Nullable due to DETACH cleanup of character.
        arbiterEntityId:
          type: string
          format: uuid
          nullable: true
          description: Assigned arbiter entity ID, null if not yet assigned
        arbiterEntityType:
          $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Type of the assigned arbiter entity
        contractId:
          type: string
          format: uuid
          description: Underlying contract instance driving the case lifecycle
        templateCode:
          type: string
          description: Procedural template code from sovereign governance data
        rulingId:
          type: string
          format: uuid
          nullable: true
          description: Ruling ID if a ruling has been issued
        jurisdictionChallenged:
          type: boolean
          description: Whether jurisdiction has been challenged
        closedReason:
          $ref: '#/components/schemas/CaseClosedReason'
          nullable: true
          description: Reason for case closure, null if case is not closed
        governanceParametersSnapshot:
          type: object
          nullable: true
          additionalProperties: true
          description: Governance parameters snapshot from jurisdictional faction. Stored for reference; Arbitration 
            does not read or validate specific keys. These parameters are interpreted by Contract templates.
        createdAt:
          type: string
          format: date-time
          description: When the case was filed
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the case was last updated

    ArbitrationEvidenceInfo:
      type: object
      additionalProperties: false
      description: Full evidence item record
      required:
      - evidenceId
      - caseId
      - evidenceType
      - content
      - submittingParty
      - submissionTimestamp
      properties:
        evidenceId:
          type: string
          format: uuid
          description: Unique identifier for the evidence item
        caseId:
          type: string
          format: uuid
          description: Case this evidence belongs to
        evidenceType:
          $ref: '#/components/schemas/ArbitrationEvidenceType'
          description: Category of evidence
        content:
          $ref: '#/components/schemas/EvidenceContent'
          description: Typed evidence content
        submittingParty:
          $ref: '#/components/schemas/EntityReference'
          description: Entity that submitted this evidence
        submissionTimestamp:
          type: string
          format: date-time
          description: When the evidence was submitted

    ArbitrationRulingInfo:
      type: object
      additionalProperties: false
      description: Full ruling record including consequence execution results
      required:
      - rulingId
      - caseId
      - rulingType
      - consequenceManifest
      - consequenceResults
      - issuedTimestamp
      properties:
        rulingId:
          type: string
          format: uuid
          description: Unique identifier for the ruling
        caseId:
          type: string
          format: uuid
          description: Case this ruling was issued for
        arbiterEntityId:
          type: string
          format: uuid
          nullable: true
          description: Entity ID of the arbiter who issued the ruling
        arbiterEntityType:
          $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Type of the arbiter entity
        rulingType:
          $ref: '#/components/schemas/ArbitrationRulingType'
          description: Outcome of the ruling
        reasoning:
          type: string
          nullable: true
          maxLength: 5000
          description: Arbiter's reasoning for the ruling
        consequenceManifest:
          type: array
          items:
            $ref: '#/components/schemas/ConsequenceManifestEntry'
          description: Consequences to be executed as part of this ruling
        consequenceResults:
          type: array
          items:
            $ref: '#/components/schemas/ConsequenceResult'
          description: Execution status of each consequence
        appealDeadline:
          type: string
          format: date-time
          nullable: true
          description: Deadline for filing an appeal, null if no appeal window
        issuedTimestamp:
          type: string
          format: date-time
          description: When the ruling was issued

    # ==========================================================================
    # Request Types
    # ==========================================================================

    FileCaseRequest:
      type: object
      additionalProperties: false
      description: Request to file a new arbitration case
      required:
      - gameServiceId
      - petitionerEntityId
      - petitionerEntityType
      - respondentEntityId
      - respondentEntityType
      - locationId
      - caseType
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope for this case
        petitionerEntityId:
          type: string
          format: uuid
          description: Entity ID of the petitioner
        petitionerEntityType:
          $ref: '#/components/schemas/EntityType'
          description: Type of the petitioner entity
        respondentEntityId:
          type: string
          format: uuid
          description: Entity ID of the respondent
        respondentEntityType:
          $ref: '#/components/schemas/EntityType'
          description: Type of the respondent entity
        locationId:
          type: string
          format: uuid
          description: Location where the case is filed (determines jurisdiction)
        caseType:
          type: string
          minLength: 1
          maxLength: 100
          description: Game-configurable dispute type code (e.g., dissolution, trade_dispute)

    GetCaseRequest:
      type: object
      additionalProperties: false
      description: Request to get a case by ID
      required:
      - caseId
      properties:
        caseId:
          type: string
          format: uuid
          description: Unique identifier of the case

    GetCaseByCodeRequest:
      type: object
      additionalProperties: false
      description: Request to get a case by human-readable code within a game service scope
      required:
      - gameServiceId
      - caseCode
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        caseCode:
          type: string
          minLength: 1
          maxLength: 50
          description: Human-readable case code (e.g., ARB-DISS-00142)

    ListCasesRequest:
      type: object
      additionalProperties: false
      description: Request to list cases with filtering and pagination
      required:
      - gameServiceId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope (required filter)
        caseType:
          type: string
          nullable: true
          description: Filter by case type code
        status:
          $ref: '#/components/schemas/ArbitrationCaseStatus'
          nullable: true
          description: Filter by case status
        petitionerEntityId:
          type: string
          format: uuid
          nullable: true
          description: Filter by petitioner entity ID
        respondentEntityId:
          type: string
          format: uuid
          nullable: true
          description: Filter by respondent entity ID
        arbiterEntityId:
          type: string
          format: uuid
          nullable: true
          description: Filter by assigned arbiter entity ID
        jurisdictionFactionId:
          type: string
          format: uuid
          nullable: true
          description: Filter by jurisdictional sovereign faction ID
        page:
          type: integer
          nullable: true
          minimum: 1
          description: Page number (1-based)
        pageSize:
          type: integer
          nullable: true
          minimum: 1
          maximum: 100
          description: Number of items per page

    WithdrawCaseRequest:
      type: object
      additionalProperties: false
      description: Request to withdraw an arbitration case
      required:
      - caseId
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to withdraw

    DismissCaseRequest:
      type: object
      additionalProperties: false
      description: Request to dismiss an arbitration case
      required:
      - caseId
      - dismissalReasoning
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to dismiss
        dismissalReasoning:
          type: string
          minLength: 1
          maxLength: 2000
          description: Reasoning for the dismissal

    ChallengeJurisdictionRequest:
      type: object
      additionalProperties: false
      description: Request to challenge the jurisdictional authority over a case
      required:
      - caseId
      - challengingPartyEntityId
      - challengingPartyEntityType
      - challengeReasoning
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to challenge jurisdiction on
        challengingPartyEntityId:
          type: string
          format: uuid
          description: Entity ID of the party challenging jurisdiction
        challengingPartyEntityType:
          $ref: '#/components/schemas/EntityType'
          description: Entity type of the challenging party
        challengeReasoning:
          type: string
          minLength: 1
          maxLength: 2000
          description: Reasoning for the jurisdiction challenge

    GetTimelineRequest:
      type: object
      additionalProperties: false
      description: Request to get the procedural timeline for a case
      required:
      - caseId
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to get timeline for

    SubmitEvidenceRequest:
      type: object
      additionalProperties: false
      description: Request to submit evidence for a case
      required:
      - caseId
      - evidenceType
      - content
      - submittingPartyEntityId
      - submittingPartyEntityType
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to submit evidence for
        evidenceType:
          $ref: '#/components/schemas/ArbitrationEvidenceType'
          description: Category of evidence being submitted
        content:
          $ref: '#/components/schemas/EvidenceContent'
          description: Typed evidence content
        submittingPartyEntityId:
          type: string
          format: uuid
          description: Entity ID of the submitting party (must be petitioner or respondent)
        submittingPartyEntityType:
          $ref: '#/components/schemas/EntityType'
          description: Entity type of the submitting party

    ListEvidenceRequest:
      type: object
      additionalProperties: false
      description: Request to list evidence for a case
      required:
      - caseId
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to list evidence for
        partyEntityId:
          type: string
          format: uuid
          nullable: true
          description: Optional filter by submitting party entity ID
        page:
          type: integer
          nullable: true
          minimum: 1
          description: Page number (1-based)
        pageSize:
          type: integer
          nullable: true
          minimum: 1
          maximum: 100
          description: Number of items per page

    GetEvidenceRequest:
      type: object
      additionalProperties: false
      description: Request to get a specific evidence item
      required:
      - evidenceId
      properties:
        evidenceId:
          type: string
          format: uuid
          description: Evidence item to retrieve

    AssignArbiterRequest:
      type: object
      additionalProperties: false
      description: Request to assign an arbiter to a case
      required:
      - caseId
      - selectionMode
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to assign an arbiter to
        selectionMode:
          $ref: '#/components/schemas/ArbiterSelectionMode'
          description: Strategy for selecting the arbiter
        arbiterId:
          type: string
          format: uuid
          nullable: true
          description: Explicit arbiter entity ID (required for AppointedOfficial and explicit ExternalRequest response)
        arbiterEntityType:
          $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Entity type of the explicit arbiter
        requesterType:
          type: string
          nullable: true
          maxLength: 100
          description: Category of external arbiter being requested for ExternalRequest mode (e.g., divine, 
            cross-jurisdiction, player). Consumers filter on this value.

    RecuseArbiterRequest:
      type: object
      additionalProperties: false
      description: Request to recuse the assigned arbiter from a case
      required:
      - caseId
      - reason
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to recuse the arbiter from
        reason:
          type: string
          minLength: 1
          maxLength: 2000
          description: Reason for arbiter recusal

    ListQualifiedArbitersRequest:
      type: object
      additionalProperties: false
      description: Request to list arbiters qualified for a case type at a location
      required:
      - gameServiceId
      - caseType
      - locationId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        caseType:
          type: string
          minLength: 1
          maxLength: 100
          description: Case type code to find qualified arbiters for
        locationId:
          type: string
          format: uuid
          description: Location for jurisdiction determination

    GetArbiterCaseloadRequest:
      type: object
      additionalProperties: false
      description: Request to get an arbiter's active caseload
      required:
      - arbiterId
      properties:
        arbiterId:
          type: string
          format: uuid
          description: Entity ID of the arbiter

    IssueRulingRequest:
      type: object
      additionalProperties: false
      description: Request to issue a ruling for a case
      required:
      - caseId
      - rulingType
      - consequenceManifest
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to issue a ruling for
        rulingType:
          $ref: '#/components/schemas/ArbitrationRulingType'
          description: Outcome of the ruling
        reasoning:
          type: string
          nullable: true
          maxLength: 5000
          description: Arbiter's reasoning for the ruling
        consequenceManifest:
          type: array
          items:
            $ref: '#/components/schemas/ConsequenceManifestEntry'
          description: Consequences to execute as part of this ruling

    AppealRulingRequest:
      type: object
      additionalProperties: false
      description: Request to appeal a ruling
      required:
      - caseId
      - appealingPartyEntityId
      - appealingPartyEntityType
      - appealReasoning
      properties:
        caseId:
          type: string
          format: uuid
          description: Case whose ruling is being appealed
        appealingPartyEntityId:
          type: string
          format: uuid
          description: Entity ID of the appealing party
        appealingPartyEntityType:
          $ref: '#/components/schemas/EntityType'
          description: Entity type of the appealing party
        appealReasoning:
          type: string
          minLength: 1
          maxLength: 2000
          description: Reasoning for the appeal

    GetRulingRequest:
      type: object
      additionalProperties: false
      description: Request to get a ruling. At least one of rulingId or caseId must be provided; the service validates 
        this constraint. OpenAPI 3.0.4 cannot express at-least-one-of natively.
      properties:
        rulingId:
          type: string
          format: uuid
          nullable: true
          description: Direct ruling ID lookup
        caseId:
          type: string
          format: uuid
          nullable: true
          description: Look up the ruling associated with this case

    EnforceRulingRequest:
      type: object
      additionalProperties: false
      description: Request to enforce (or re-enforce) a ruling's consequences
      required:
      - caseId
      properties:
        caseId:
          type: string
          format: uuid
          description: Case whose ruling consequences should be enforced

    ResolveJurisdictionRequest:
      type: object
      additionalProperties: false
      description: Request to resolve jurisdiction for a location and case type
      required:
      - locationId
      - caseType
      properties:
        locationId:
          type: string
          format: uuid
          description: Location to determine jurisdiction for
        caseType:
          type: string
          minLength: 1
          maxLength: 100
          description: Case type code to resolve jurisdiction for

    GetJurisdictionHierarchyRequest:
      type: object
      additionalProperties: false
      description: Request to get the full sovereignty hierarchy for a location
      required:
      - locationId
      properties:
        locationId:
          type: string
          format: uuid
          description: Location to get the authority hierarchy for

    CleanupByCharacterRequest:
      type: object
      additionalProperties: false
      description: Resource cleanup request when a character is deleted
      required:
      - characterId
      properties:
        characterId:
          type: string
          format: uuid
          description: Deleted character ID

    CleanupByRealmRequest:
      type: object
      additionalProperties: false
      description: Resource cleanup request when a realm is deleted
      required:
      - realmId
      properties:
        realmId:
          type: string
          format: uuid
          description: Deleted realm ID

    CleanupByFactionRequest:
      type: object
      additionalProperties: false
      description: Resource cleanup request when a faction is deleted
      required:
      - factionId
      properties:
        factionId:
          type: string
          format: uuid
          description: Deleted faction ID

    CleanupByLocationRequest:
      type: object
      additionalProperties: false
      description: Resource cleanup request when a location is deleted
      required:
      - locationId
      properties:
        locationId:
          type: string
          format: uuid
          description: Deleted location ID

    # ==========================================================================
    # Response Types
    # ==========================================================================

    FileCaseResponse:
      type: object
      additionalProperties: false
      description: Response after filing a new arbitration case
      required:
      - caseId
      - caseCode
      - proceduralTimeline
      properties:
        caseId:
          type: string
          format: uuid
          description: Unique identifier for the created case
        caseCode:
          type: string
          description: Human-readable sequential case code
        proceduralTimeline:
          type: array
          items:
            $ref: '#/components/schemas/ProceduralMilestone'
          description: Planned milestones from the procedural template

    ListCasesResponse:
      type: object
      additionalProperties: false
      description: Paginated list of arbitration cases
      required:
      - cases
      - totalCount
      - page
      - pageSize
      properties:
        cases:
          type: array
          items:
            $ref: '#/components/schemas/ArbitrationCaseInfo'
          description: Cases matching the query filters
        totalCount:
          type: integer
          minimum: 0
          description: Total number of matching cases
        page:
          type: integer
          minimum: 1
          description: Current page number
        pageSize:
          type: integer
          minimum: 1
          description: Number of items per page

    GetTimelineResponse:
      type: object
      additionalProperties: false
      description: Procedural timeline for a case
      required:
      - milestones
      - currentPhase
      properties:
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/ProceduralMilestone'
          description: All milestones in the procedural timeline
        currentPhase:
          type: string
          description: Name of the current active milestone phase
        daysRemaining:
          type: integer
          nullable: true
          description: Days remaining until the current milestone deadline, null if no deadline

    SubmitEvidenceResponse:
      type: object
      additionalProperties: false
      description: Response after submitting evidence
      required:
      - evidenceId
      properties:
        evidenceId:
          type: string
          format: uuid
          description: Unique identifier of the submitted evidence item

    ListEvidenceResponse:
      type: object
      additionalProperties: false
      description: Paginated list of evidence items
      required:
      - evidence
      - totalCount
      - page
      - pageSize
      properties:
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ArbitrationEvidenceInfo'
          description: Evidence items matching the query
        totalCount:
          type: integer
          minimum: 0
          description: Total number of matching evidence items
        page:
          type: integer
          minimum: 1
          description: Current page number
        pageSize:
          type: integer
          minimum: 1
          description: Number of items per page

    AssignArbiterResponse:
      type: object
      additionalProperties: false
      description: Response after assigning or requesting an arbiter. A null arbiterId indicates a deferred external 
        request.
      properties:
        arbiterId:
          type: string
          format: uuid
          nullable: true
          description: Assigned arbiter entity ID, null if pending external request
        pending:
          type: boolean
          description: True if an external arbiter request was published and assignment is deferred

    ListQualifiedArbitersResponse:
      type: object
      additionalProperties: false
      description: List of arbiters qualified for a case type
      required:
      - arbiters
      properties:
        arbiters:
          type: array
          items:
            $ref: '#/components/schemas/QualifiedArbiterInfo'
          description: Qualified arbiters for the requested case type and location

    GetArbiterCaseloadResponse:
      type: object
      additionalProperties: false
      description: Active caseload for an arbiter
      required:
      - activeCaseCount
      - caseIds
      properties:
        activeCaseCount:
          type: integer
          minimum: 0
          description: Number of active cases assigned to this arbiter
        caseIds:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of active cases assigned to this arbiter

    IssueRulingResponse:
      type: object
      additionalProperties: false
      description: Response after issuing a ruling
      required:
      - rulingId
      properties:
        rulingId:
          type: string
          format: uuid
          description: Unique identifier of the issued ruling

    EnforceRulingResponse:
      type: object
      additionalProperties: false
      description: Response after attempting to enforce a ruling's consequences
      required:
      - rulingId
      - consequenceResults
      properties:
        rulingId:
          type: string
          format: uuid
          description: Ruling that was enforced
        consequenceResults:
          type: array
          items:
            $ref: '#/components/schemas/ConsequenceResult'
          description: Current execution status of each consequence

    ResolveJurisdictionResponse:
      type: object
      additionalProperties: false
      description: Resolved jurisdiction for a location and case type
      required:
      - sovereignFactionId
      - authorityLevel
      - templateCode
      properties:
        sovereignFactionId:
          type: string
          format: uuid
          description: Faction with jurisdiction
        authorityLevel:
          $ref: '#/components/schemas/AuthorityLevel'
          description: Authority level of the jurisdictional faction
        templateCode:
          type: string
          description: Procedural template code from governance data
        governanceParameters:
          type: object
          nullable: true
          additionalProperties: true
          description: Governance parameters from the jurisdictional faction. Opaque pass-through interpreted by 
            Contract templates.

    GetJurisdictionHierarchyResponse:
      type: object
      additionalProperties: false
      description: Full sovereignty hierarchy for a location
      required:
      - hierarchy
      properties:
        hierarchy:
          type: array
          items:
            $ref: '#/components/schemas/JurisdictionHierarchyEntry'
          description: Authority hierarchy ordered from lowest to highest authority level

    CleanupResponse:
      type: object
      additionalProperties: false
      description: Response from resource cleanup operations
      required:
      - processedCount
      properties:
        processedCount:
          type: integer
          minimum: 0
          description: Number of case records processed during cleanup
    EntityReference:
      type: object
      additionalProperties: false
      description: A reference to an entity by ID and type. Used across services for polymorphic entity references in 
        events, responses, and cross-service data.
      required:
      - entityId
      - entityType
      properties:
        entityId:
          type: string
          format: uuid
          description: Referenced entity identifier
        entityType:
          $ref: '#/components/schemas/EntityType'
          description: Type of the referenced entity

    # ==========================================================================
    # Permission Metadata Types
    # ==========================================================================

    EntityType:
      type: string
      description: |
        Universal entity type identifier for first-class Bannou entities.
        Used for polymorphic entity references (ownerType, entityType, partyType).

