        score (0.0 to 1.0)\"\n                },\n                \"suggestedCurrencyValue\": {\n                    \"type\"\
        : \"number\",\n                    \"format\": \"double\",\n                    \"description\": \"Suggested currency
        value based on score\"\n                },\n                \"scoringFactors\": {\n                    \"type\": \"\
        array\",\n                    \"items\": {\n                        \"$ref\": \"#/$defs/ScoringFactor\"\n        \
        \            },\n                    \"description\": \"Breakdown of factors contributing to the score\"\n       \
        \         }\n            }\n        },\n        \"ScoringFactor\": {\n            \"type\": \"object\",\n        \
