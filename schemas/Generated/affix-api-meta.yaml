        ,\n                    \"minLength\": 1,\n                    \"maxLength\": 100,\n                    \"description\"\
        : \"Item class tag (e.g., \\\"amulet\\\", \\\"ring\\\", \\\"body_armour\\\")\"\n                },\n             \
