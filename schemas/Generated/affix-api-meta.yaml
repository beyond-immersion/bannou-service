        ,\n                    \"format\": \"uuid\",\n                    \"description\": \"Game service scope for this definition\"\
        \n                },\n                \"code\": {\n                    \"type\": \"string\",\n                   \
        \ \"minLength\": 1,\n                    \"maxLength\": 200,\n                    \"description\": \"Unique definition
        code within game service\"\n                },\n                \"slotType\": {\n                    \"type\": \"\
        string\",\n                    \"minLength\": 1,\n                    \"maxLength\": 50,\n                    \"description\"\
        : \"Slot type (e.g., \\\"prefix\\\", \\\"suffix\\\", \\\"implicit\\\", \\\"enchant\\\")\"\n                },\n  \
        \              \"modGroup\": {\n                    \"type\": \"string\",\n                    \"minLength\": 1,\n\
        \                    \"maxLength\": 100,\n                    \"description\": \"Exclusivity group (one affix per
        mod group per item)\"\n                },\n                \"tier\": {\n                    \"type\": \"integer\"\
        ,\n                    \"minimum\": 1,\n                    \"description\": \"Power tier within mod group (1 = best)\"\
        \n                },\n                \"category\": {\n                    \"type\": \"string\",\n               \
        \     \"nullable\": true,\n                    \"maxLength\": 100,\n                    \"description\": \"Broad classification
        (e.g., \\\"defense\\\", \\\"offense\\\")\"\n                },\n                \"tags\": {\n                    \"\
        type\": \"array\",\n                    \"nullable\": true,\n                    \"items\": {\n                  \
        \      \"type\": \"string\"\n                    },\n                    \"description\": \"Generation tags for pool
        filtering\"\n                },\n                \"statGrants\": {\n                    \"type\": \"array\",\n   \
        \                 \"items\": {\n                        \"$ref\": \"#/$defs/StatGrant\"\n                    },\n\
        \                    \"description\": \"Stat contributions from this affix (minimum 1)\"\n                },\n   \
