        \    \"deprecated\": false,\n    \"operationId\": \"cleanupByGameService\"\n}"
components:
  schemas:
    StatGrant:
      type: object
      additionalProperties: false
      description: A single stat contribution from an affix definition
      required:
      - statCode
      - minValue
      - maxValue
      properties:
        statCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Stat identifier (e.g., "maximum_life", "fire_resistance")
        minValue:
          type: number
          format: double
          description: Minimum rolled value for this stat
        maxValue:
          type: number
          format: double
          description: Maximum rolled value for this stat
    SpawnTagModifier:
      type: object
      additionalProperties: false
      description: Per-tag weight multiplier for affix generation pool filtering
      required:
      - tag
      - weightMultiplier
      properties:
        tag:
          type: string
          minLength: 1
          maxLength: 100
          description: Item class tag (e.g., "amulet", "ring", "body_armour")
        weightMultiplier:
          type: integer
          minimum: 0
          description: Weight multiplier (0 = cannot appear, 1000 = normal, 1500 = more likely)
    AffixSlotData:
      type: object
      additionalProperties: false
      description: A single applied affix slot on an item instance
      required:
      - definitionId
      - definitionCode
      - modGroup
      - rolledValues
      - isFractured
      properties:
        definitionId:
          type: string
          format: uuid
          description: Applied affix definition ID
        definitionCode:
          type: string
          description: Denormalized definition code for display
        modGroup:
          type: string
          description: Denormalized mod group for exclusivity validation
        rolledValues:
          type: array
          items:
            type: number
            format: double
          description: Rolled values for each stat grant in the definition
        isFractured:
          type: boolean
          description: Whether this affix is permanently locked (cannot be removed)
    AffixStates:
      type: object
      additionalProperties: false
      description: Boolean state flags on an item's affix instance
      required:
      - isCorrupted
      - isMirrored
      - isSplit
      - isIdentified
      - isSynthesized
      properties:
        isCorrupted:
          type: boolean
          description: Item is corrupted — rejects apply/remove/reroll operations
        isMirrored:
          type: boolean
          description: Item is mirrored — rejects all modification operations
        isSplit:
          type: boolean
          description: Item is split — gates further split operations
        isIdentified:
          type: boolean
          description: Whether affixes are visible in queries
        isSynthesized:
          type: boolean
          description: Allows multiple implicit slots
    WeightModifier:
      type: object
      additionalProperties: false
      description: External weight modifier applied during affix generation
      required:
      - definitionId
      - multiplier
      properties:
        definitionId:
          type: string
          format: uuid
          description: Target definition to modify weight for
        multiplier:
          type: number
          format: double
          minimum: 0
          description: Weight multiplier (0 = exclude, 1.0 = unchanged, 2.0 = double)
    AffixPoolEntry:
      type: object
      additionalProperties: false
      description: A single entry in a generated affix pool with effective weight
      required:
      - definitionId
      - definitionCode
      - modGroup
      - tier
      - effectiveWeight
      - statGrants
      properties:
        definitionId:
          type: string
          format: uuid
          description: Affix definition ID
        definitionCode:
          type: string
          description: Human-readable definition code
        modGroup:
          type: string
          description: Mod group for exclusivity checks
        tier:
          type: integer
          description: Tier within mod group (1 = best)
        effectiveWeight:
          type: integer
          description: Computed weight after tag modifiers and external modifiers
        statGrants:
          type: array
          items:
            $ref: '#/components/schemas/StatGrant'
          description: Stat grant ranges for this definition
    StatValue:
      type: object
      additionalProperties: false
      description: A single computed stat contribution
      required:
      - statCode
      - value
      properties:
        statCode:
          type: string
          description: Stat identifier
        value:
          type: number
          format: double
          description: Computed value (after quality modifier if applicable)
    StatDiff:
      type: object
      additionalProperties: false
      description: Per-stat comparison between two items
      required:
      - statCode
      - valueA
      - valueB
      - delta
      properties:
        statCode:
          type: string
          description: Stat identifier
        valueA:
          type: number
          format: double
          description: Value on item A
        valueB:
          type: number
          format: double
          description: Value on item B
        delta:
          type: number
          format: double
          description: Difference (valueA - valueB, positive means A is better)
        winner:
          type: string
          nullable: true
          description: '"A", "B", or null if equal'
    ScoringFactor:
      type: object
      additionalProperties: false
      description: Breakdown of a single factor in item value estimation
      required:
      - name
      - score
      - weight
      properties:
        name:
          type: string
          description: Factor name (e.g., "tierPercentile", "rollPercentile", "quality")
        score:
          type: number
          format: double
          description: Raw score for this factor (0-1 range)
        weight:
          type: number
          format: double
          description: Weight applied to this factor in the aggregate score
    ItemBreakdown:
      type: object
      additionalProperties: false
      description: Per-item stat breakdown within equipment computation
      required:
      - itemInstanceId
      - stats
      properties:
        itemInstanceId:
          type: string
          format: uuid
          description: Item instance ID
        stats:
          type: array
          items:
            $ref: '#/components/schemas/StatValue'
          description: Stats contributed by this item
    ModGroupSummary:
      type: object
      additionalProperties: false
      description: Mod group summary with definition count
      required:
      - code
      - definitionCount
      properties:
        code:
          type: string
          description: Mod group code
        definitionCount:
          type: integer
          description: Number of definitions in this mod group
    EnrichedAffixSlot:
      type: object
      additionalProperties: false
      description: Affix slot enriched with definition display data
      required:
      - definitionId
      - definitionCode
      - modGroup
      - isFractured
      properties:
        definitionId:
          type: string
          format: uuid
          description: Applied affix definition ID
        definitionCode:
          type: string
          description: Definition code
        modGroup:
          type: string
          description: Mod group code
        displayName:
          type: string
          nullable: true
          description: Human-readable display name from definition
        tier:
          type: integer
          nullable: true
          description: Tier within mod group (null if unidentified)
        category:
          type: string
          nullable: true
          description: Broad classification from definition
        rolledValues:
          type: array
          nullable: true
          items:
            type: number
            format: double
          description: Rolled values (null if unidentified)
        statGrants:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/StatGrant'
          description: Stat grant ranges from definition (null if unidentified)
        isFractured:
          type: boolean
          description: Whether this affix is permanently locked
    AffixSetItemRequest:
      type: object
      additionalProperties: false
      description: Parameters for generating an affix set for a single item in a batch
      required:
      - gameServiceId
      - itemTemplateCode
      - itemClass
      - itemLevel
      - targetRarity
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        itemTemplateCode:
          type: string
          description: Item template code for implicit mapping lookup
        itemClass:
          type: string
          description: Item class for pool filtering
        itemLevel:
          type: integer
          minimum: 1
          description: Item level for tier gating
        targetRarity:
          type: string
          description: Target effective rarity (e.g., "magic", "rare")
        influences:
          type: array
          nullable: true
          items:
            type: string
          description: Influence types for exclusive pool access
        weightModifiers:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/WeightModifier'
          description: External weight modifiers for generation bias
        valuePercentileTarget:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 1
          description: Bias roll toward this percentile (0-1, null for uniform random)
    ImplicitDefinitionRef:
      type: object
      additionalProperties: false
      description: Reference to an implicit definition with optional value override ranges
      required:
      - definitionId
      properties:
        definitionId:
          type: string
          format: uuid
          description: Implicit affix definition ID
        minValueOverride:
          type: number
          format: double
          nullable: true
          description: Override minimum value for rolling (null uses definition default)
        maxValueOverride:
          type: number
          format: double
          nullable: true
          description: Override maximum value for rolling (null uses definition default)
    RolledSlot:
      type: object
      additionalProperties: false
      description: Result of rolling implicit values for one slot
      required:
      - definitionId
      - definitionCode
      - rolledValues
      properties:
        definitionId:
          type: string
          format: uuid
          description: Implicit definition ID
        definitionCode:
          type: string
          description: Implicit definition code
        rolledValues:
          type: array
          items:
            type: number
            format: double
          description: Rolled values for each stat grant
    SeedDefinitionEntry:
      type: object
      additionalProperties: false
      description: A single definition entry for bulk seeding
      required:
      - code
      - slotType
      - modGroup
      - tier
      - statGrants
      - spawnWeight
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 200
          description: Unique definition code within game service
        slotType:
          type: string
          minLength: 1
          maxLength: 50
          description: Slot type for this definition (e.g., "prefix", "suffix", "implicit")
        modGroup:
          type: string
          minLength: 1
          maxLength: 100
          description: Exclusivity group
        tier:
          type: integer
          minimum: 1
          description: Power tier within mod group (1 = best)
        category:
          type: string
          nullable: true
          maxLength: 100
          description: Broad classification
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Generation tags for pool filtering
        statGrants:
          type: array
          items:
            $ref: '#/components/schemas/StatGrant'
          description: Stat contributions from this affix
        spawnWeight:
          type: integer
          minimum: 0
          description: Base weight for weighted random selection
        spawnTagModifiers:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SpawnTagModifier'
          description: Per-tag weight multipliers
        requiredItemLevel:
          type: integer
          minimum: 0
          default: 0
          description: Minimum item level to spawn
        requiredInfluences:
          type: array
          nullable: true
          items:
            type: string
          description: Required influence types (empty = no requirement)
        validItemClasses:
          type: array
          nullable: true
          items:
            type: string
          description: Item classes this definition can appear on
        displayName:
          type: string
          nullable: true
          maxLength: 200
          description: Human-readable display name
        displayOrder:
          type: integer
          default: 0
          description: Sorting priority within slot type
    SeedImplicitMappingEntry:
      type: object
      additionalProperties: false
      description: A single implicit mapping entry for bulk seeding
      required:
      - itemTemplateCode
      - implicitDefinitionIds
      properties:
        itemTemplateCode:
          type: string
          minLength: 1
          maxLength: 200
          description: Item template code to map
        implicitDefinitionIds:
          type: array
          items:
            type: string
            format: uuid
          description: Implicit affix definition IDs to map to this template
    ChangedFlag:
      type: object
      additionalProperties: false
      description: A single state flag change
      required:
      - flagName
      - oldValue
      - newValue
      properties:
        flagName:
          type: string
          description: Name of the state flag that changed
        oldValue:
          type: boolean
          description: Previous value of the flag
        newValue:
          type: boolean
          description: New value of the flag
    CreateDefinitionRequest:
      type: object
      additionalProperties: false
      description: Request to create a new affix definition
      required:
      - gameServiceId
      - code
      - slotType
      - modGroup
      - tier
      - statGrants
      - spawnWeight
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope for this definition
        code:
          type: string
          minLength: 1
          maxLength: 200
          description: Unique definition code within game service
        slotType:
          type: string
          minLength: 1
          maxLength: 50
          description: Slot type (e.g., "prefix", "suffix", "implicit", "enchant")
        modGroup:
          type: string
          minLength: 1
          maxLength: 100
          description: Exclusivity group (one affix per mod group per item)
        tier:
          type: integer
          minimum: 1
          description: Power tier within mod group (1 = best)
        category:
          type: string
          nullable: true
          maxLength: 100
          description: Broad classification (e.g., "defense", "offense")
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Generation tags for pool filtering
        statGrants:
          type: array
          items:
            $ref: '#/components/schemas/StatGrant'
          description: Stat contributions from this affix (minimum 1)
        spawnWeight:
          type: integer
          minimum: 0
          description: Base weight for weighted random selection
        spawnTagModifiers:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SpawnTagModifier'
          description: Per-tag weight multipliers
        requiredItemLevel:
          type: integer
          minimum: 0
          default: 0
          description: Minimum item level to spawn this definition
        requiredInfluences:
          type: array
          nullable: true
          items:
            type: string
          description: Required influence types (empty = no requirement)
        validItemClasses:
          type: array
          nullable: true
          items:
            type: string
          description: Item classes this definition can appear on
        displayName:
          type: string
          nullable: true
          maxLength: 200
          description: Human-readable display name (e.g., "Blazing", "of the Godslayer")
        displayOrder:
          type: integer
          default: 0
          description: Sorting priority within slot type
    GetDefinitionRequest:
      type: object
      additionalProperties: false
      description: Request to get a definition by ID or by gameServiceId + code
      properties:
        definitionId:
          type: string
          format: uuid
          nullable: true
          description: Definition ID (takes precedence over code lookup)
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Game service scope (required for code lookup)
        code:
          type: string
          nullable: true
          description: Definition code (used with gameServiceId)
    ListDefinitionsRequest:
      type: object
      additionalProperties: false
      description: Request to list definitions with optional filters
      required:
      - gameServiceId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        slotType:
          type: string
          nullable: true
          description: Filter by slot type
        modGroup:
          type: string
          nullable: true
          description: Filter by mod group
        category:
          type: string
          nullable: true
          description: Filter by category
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Filter by tags (any match)
        tierMin:
          type: integer
          nullable: true
          description: Filter by minimum tier
        tierMax:
          type: integer
          nullable: true
          description: Filter by maximum tier
        requiredInfluence:
          type: string
          nullable: true
          description: Filter by required influence type
        includeDeprecated:
          type: boolean
          default: false
          description: Include deprecated definitions in results (excluded by default)
        page:
          type: integer
          default: 1
          minimum: 1
          description: Page number
        pageSize:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
          description: Items per page
    UpdateDefinitionRequest:
      type: object
      additionalProperties: false
      description: Partial update request for a definition. Identity fields cannot be changed.
      required:
      - definitionId
      properties:
        definitionId:
          type: string
          format: uuid
          description: Definition to update
        tier:
          type: integer
          nullable: true
          minimum: 1
          description: Updated tier
        category:
          type: string
          nullable: true
          description: Updated category
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Updated tags
        statGrants:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/StatGrant'
          description: Updated stat grants
        spawnWeight:
          type: integer
          nullable: true
          minimum: 0
          description: Updated spawn weight
        spawnTagModifiers:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SpawnTagModifier'
          description: Updated tag modifiers
        requiredItemLevel:
          type: integer
          nullable: true
          minimum: 0
          description: Updated required item level
        requiredInfluences:
          type: array
          nullable: true
          items:
            type: string
          description: Updated required influences
        validItemClasses:
          type: array
          nullable: true
          items:
            type: string
          description: Updated valid item classes
        displayName:
          type: string
          nullable: true
          description: Updated display name
        displayOrder:
          type: integer
          nullable: true
          description: Updated display order
    DeprecateDefinitionRequest:
      type: object
      additionalProperties: false
      description: Request to deprecate a definition (Category B — one-way, no delete)
      required:
      - definitionId
      properties:
        definitionId:
          type: string
          format: uuid
          description: Definition to deprecate
        reason:
          type: string
          nullable: true
          maxLength: 500
          description: Reason for deprecation (recommended for audit trail)
    SeedDefinitionsRequest:
      type: object
      additionalProperties: false
      description: Bulk seed request for affix definitions
      required:
      - gameServiceId
      - definitions
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        definitions:
          type: array
          items:
            $ref: '#/components/schemas/SeedDefinitionEntry'
          description: Definitions to seed (duplicates by code are skipped)
    ListModGroupsRequest:
      type: object
      additionalProperties: false
      description: Request to list mod groups for a game service
      required:
      - gameServiceId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        includeDeprecated:
          type: boolean
          default: false
          description: Include deprecated definitions in mod group counts
    CreateImplicitMappingRequest:
      type: object
      additionalProperties: false
      description: Request to map implicit affix definitions to an item template code
      required:
      - gameServiceId
      - itemTemplateCode
      - implicitDefinitionIds
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        itemTemplateCode:
          type: string
          minLength: 1
          maxLength: 200
          description: Item template code to map
        implicitDefinitionIds:
          type: array
          items:
            type: string
            format: uuid
          description: Implicit affix definition IDs (must be slotType "implicit")
    GetImplicitMappingRequest:
      type: object
      additionalProperties: false
      description: Request to get implicit mapping for a template code
      required:
      - gameServiceId
      - itemTemplateCode
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        itemTemplateCode:
          type: string
          description: Item template code to look up
    SeedImplicitMappingsRequest:
      type: object
      additionalProperties: false
      description: Bulk seed request for implicit mappings
      required:
      - gameServiceId
      - mappings
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/SeedImplicitMappingEntry'
          description: Mappings to seed (duplicates by template code are skipped)
    RollImplicitsRequest:
      type: object
      additionalProperties: false
      description: Request to roll implicit values for an item template
      required:
      - gameServiceId
      - itemTemplateCode
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        itemTemplateCode:
          type: string
          description: Item template code for implicit mapping lookup
        overrides:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ImplicitDefinitionRef'
          description: Optional value range overrides per definition
    InitializeItemAffixesRequest:
      type: object
      additionalProperties: false
      description: Request to initialize affix state for an item instance
      required:
      - itemInstanceId
      - gameServiceId
      properties:
        itemInstanceId:
          type: string
          format: uuid
          description: Item instance ID (from lib-item)
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope
        affixSetData:
          $ref: '#/components/schemas/AffixSetDataResponse'
          nullable: true
          description: Pre-generated affix set to apply (null for empty initialization)
    GetAffixInstanceRequest:
      type: object
      additionalProperties: false
      description: Request to get raw affix instance data
      required:
      - itemInstanceId
      properties:
        itemInstanceId:
          type: string
          format: uuid
          description: Item instance ID
    ApplyAffixRequest:
      type: object
      additionalProperties: false
      description: Request to apply an affix definition to an item
      required:
      - itemInstanceId
      - definitionId
      properties:
        itemInstanceId:
          type: string
          format: uuid
          description: Target item instance
        definitionId:
          type: string
