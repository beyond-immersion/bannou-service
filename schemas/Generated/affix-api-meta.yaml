openapi: 3.0.4
info:
  title: Bannou Affix Service API
  description: |
    Item modifier definition, instance management, and stat computation service.
    Owns two layers of data: definitions (modifier templates with tiers, mod groups,
    spawn weights, stat grants) and instances (per-item applied modifier state).
    Game-agnostic — PoE-style prefix/suffix tiers, Diablo-style legendary affixes,
    or simple "quality stars" are all valid configurations. Internal-only, never internet-facing.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU-DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-references:
  - target: game-service
    sourceType: affix-definition
    field: gameServiceId
    onDelete: cascade
    cleanup:
      endpoint: /affix/cleanup-by-game-service
      payloadTemplate: '{"gameServiceId": "{{resourceId}}"}'
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)
x-service-layer: GameFeatures
paths:
  /affix/definition/create:
    post:
      summary: Create a new affix definition
