  /affix/definition/list:
    post:
      summary: List affix definitions
      description: Query definitions for a game service with optional filtering by slot type, mod group, category, tags,
        tier range, influence, and deprecation status.
      operationId: listDefinitions
      tags:
      - Definition
      x-permissions:
