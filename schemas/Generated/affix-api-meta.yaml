        \    \"nullable\": true,\n                    \"maxLength\": 200,\n                    \"description\": \"Human-readable
        display name (e.g., \\\"Blazing\\\", \\\"of the Godslayer\\\")\"\n                },\n                \"displayOrder\"\
        : {\n                    \"type\": \"integer\",\n                    \"default\": 0,\n                    \"description\"\
        : \"Sorting priority within slot type\"\n                }\n            }\n        },\n        \"StatGrant\": {\n\
