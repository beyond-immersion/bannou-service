        : false,\n            \"description\": \"Request to bulk upsert entries for a single category and language\",\n  \
        \          \"required\": [\n                \"categoryId\",\n                \"language\",\n                \"entries\"\
        \n            ],\n            \"properties\": {\n                \"categoryId\": {\n                    \"type\":
        \"string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"Category for all entries
