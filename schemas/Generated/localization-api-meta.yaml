components:
  schemas:
    ValidationMode:
      type: string
      description: How the ILocalizationKeyValidator behaves for a category
      enum:
      - None
      - WarnOnMissing
      - RejectOnMissing
    RubyAnnotation:
      type: object
      additionalProperties: false
      description: CJK ruby text annotation pairing base text with phonetic reading
      required:
      - base
      - reading
      - startIndex
      properties:
        base:
          type: string
          description: Base text segment being annotated (e.g., kanji characters)
        reading:
          type: string
          description: Phonetic reading (e.g., hiragana for Japanese, pinyin for Chinese)
        startIndex:
          type: integer
          minimum: 0
          description: Character position in the translated text where this annotation begins
    CreateCategoryRequest:
      type: object
      additionalProperties: false
      description: Request to create a new runtime localization category
      required:
      - code
      - description
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z][a-z0-9._-]*$"
          description: Unique machine-readable category code (e.g., "items", "quests", "ui")
        description:
          type: string
          minLength: 1
          maxLength: 500
          description: Human-readable description of this category
        validationMode:
          $ref: '#/components/schemas/ValidationMode'
          nullable: true
          description: Validation mode for key checks (defaults to configuration DefaultValidationMode if omitted)
        defaultLanguage:
          type: string
          nullable: true
          maxLength: 35
          description: Default fallback language (BCP 47 tag, defaults to configuration DefaultLanguage if omitted)
    GetCategoryRequest:
      type: object
      additionalProperties: false
      description: Request to retrieve a category by ID or code (at least one required)
      properties:
        categoryId:
          type: string
          format: uuid
          nullable: true
          description: Unique identifier of the category to retrieve (null if using code)
        code:
          type: string
          nullable: true
          maxLength: 64
          description: Category code to retrieve (null if using categoryId)
    ListCategoriesRequest:
      type: object
      additionalProperties: false
      description: Request to list localization categories with optional filters
      properties:
        includeSchemaDefinitions:
          type: boolean
          default: true
          description: Whether to include schema-defined categories in results
        page:
          type: integer
          default: 1
          minimum: 1
          description: Page number (1-based)
        pageSize:
          type: integer
          default: 50
          minimum: 1
          maximum: 200
          description: Number of categories per page
    UpdateCategoryRequest:
      type: object
      additionalProperties: false
      description: Request to update mutable properties of a category (code and isSchemaDefinition are immutable)
      required:
      - categoryId
      properties:
        categoryId:
          type: string
          format: uuid
          description: Category to update
        description:
          type: string
          nullable: true
          maxLength: 500
          description: Updated description (null to keep unchanged)
        validationMode:
          $ref: '#/components/schemas/ValidationMode'
          nullable: true
          description: Updated validation mode (null to keep unchanged)
        defaultLanguage:
          type: string
          nullable: true
          maxLength: 35
          description: Updated default language (null to keep unchanged)
    DeleteCategoryRequest:
      type: object
      additionalProperties: false
      description: Request to delete a runtime category (schema-defined categories cannot be deleted)
      required:
      - categoryId
      properties:
        categoryId:
          type: string
          format: uuid
          description: Category to delete
    CategoryResponse:
      type: object
      additionalProperties: false
      description: Localization category details
      required:
      - categoryId
      - code
      - description
      - isSchemaDefinition
      - validationMode
      - defaultLanguage
      - entryCount
      - createdAt
      properties:
        categoryId:
          type: string
          format: uuid
          description: Unique category identifier
        code:
          type: string
          description: Machine-readable category code
        description:
          type: string
          description: Human-readable description
        isSchemaDefinition:
          type: boolean
          description: Whether this category was seeded from localization-categories.yaml (cannot be deleted)
        validationMode:
          $ref: '#/components/schemas/ValidationMode'
          description: How the ILocalizationKeyValidator behaves for this category
        defaultLanguage:
          type: string
          description: Fallback language (BCP 47 tag)
        entryCount:
          type: integer
          minimum: 0
          description: Number of translation entries in this category
        lastEntryUpdateLanguage:
          type: string
          nullable: true
          description: Language of the most recent entry mutation (null if no entries yet)
        createdAt:
          type: string
          format: date-time
          description: When this category was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When this category was last updated (null if never updated)
    DeleteCategoryResponse:
      type: object
      additionalProperties: false
      description: Empty response. HTTP 200 confirms the category and all entries were deleted.
      properties: {}
    ListCategoriesResponse:
      type: object
      additionalProperties: false
      description: Paginated list of localization categories
      required:
      - categories
      - totalCount
      - page
      - pageSize
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryResponse'
          description: Categories in the current page
        totalCount:
          type: integer
          minimum: 0
          description: Total number of categories matching the filter
        page:
          type: integer
          description: Current page number
        pageSize:
          type: integer
          description: Page size used
    SetEntryRequest:
      type: object
      additionalProperties: false
      description: Request to create or replace a single localization entry (upsert)
      required:
      - categoryId
      - key
      - language
      - text
      properties:
        categoryId:
          type: string
          format: uuid
          description: Category this entry belongs to
        key:
          type: string
          minLength: 1
          maxLength: 256
          pattern: "^[a-z][a-z0-9._-]*$"
          description: Dot-separated entry key (e.g., "direwolf.name", "rescue-princess.title")
        language:
          type: string
          minLength: 2
          maxLength: 35
          description: BCP 47 language tag (e.g., "en", "ja-JP", "fr-FR")
        text:
          type: string
          minLength: 1
          maxLength: 10000
          description: Translated text value (supports {0} parameter placeholders)
        pronunciation:
          type: string
          nullable: true
          maxLength: 500
          description: IPA phoneme transcription for TTS engines (e.g., "ˈdaɪ.ɚ.wʊlf")
        ruby:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/RubyAnnotation'
          description: CJK ruby text annotations for furigana/pinyin display
    GetEntryRequest:
      type: object
      additionalProperties: false
      description: Request to retrieve a specific localization entry
      required:
      - categoryId
      - key
      - language
      properties:
        categoryId:
          type: string
          format: uuid
          description: Category the entry belongs to
        key:
          type: string
          minLength: 1
          maxLength: 256
          description: Entry key (e.g., "direwolf.name")
        language:
          type: string
          minLength: 2
          maxLength: 35
          description: BCP 47 language tag
    ListEntriesRequest:
      type: object
      additionalProperties: false
      description: Request to list entries with filters
      required:
      - categoryId
      properties:
        categoryId:
          type: string
          format: uuid
          description: Category to list entries from
        language:
          type: string
          nullable: true
          description: Filter by language (null returns all languages)
        keyPrefix:
          type: string
          nullable: true
          maxLength: 256
          description: Filter by key prefix (e.g., "direwolf" matches "direwolf.name", "direwolf.description")
        page:
          type: integer
          default: 1
          minimum: 1
          description: Page number (1-based)
        pageSize:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
          description: Number of entries per page
    DeleteEntryRequest:
      type: object
      additionalProperties: false
      description: Request to delete a specific localization entry
      required:
      - categoryId
      - key
      - language
      properties:
        categoryId:
          type: string
          format: uuid
          description: Category the entry belongs to
        key:
          type: string
          minLength: 1
          maxLength: 256
          description: Entry key to delete
        language:
          type: string
          minLength: 2
          maxLength: 35
          description: BCP 47 language tag of the entry to delete
    BulkSetEntriesRequest:
      type: object
      additionalProperties: false
      description: Request to bulk upsert entries for a single category and language
      required:
      - categoryId
      - language
      - entries
      properties:
        categoryId:
          type: string
          format: uuid
          description: Category for all entries in this batch
        language:
          type: string
          minLength: 2
          maxLength: 35
          description: BCP 47 language tag for all entries in this batch
        entries:
          type: array
          minItems: 1
          maxItems: 5000
          items:
            $ref: '#/components/schemas/BulkEntryItem'
          description: Entries to upsert (max 5000 per batch)
    BulkEntryItem:
      type: object
      additionalProperties: false
      description: Single entry within a bulk upsert batch
      required:
      - key
      - text
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 256
          pattern: "^[a-z][a-z0-9._-]*$"
          description: Dot-separated entry key
        text:
          type: string
          minLength: 1
          maxLength: 10000
          description: Translated text value
        pronunciation:
          type: string
          nullable: true
          maxLength: 500
          description: IPA phoneme transcription
        ruby:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/RubyAnnotation'
          description: CJK ruby text annotations
    EntryResponse:
      type: object
      additionalProperties: false
      description: Localization entry details
      required:
      - entryId
      - categoryId
      - key
      - language
      - text
      - updatedAt
      properties:
        entryId:
          type: string
          format: uuid
          description: Unique entry identifier
        categoryId:
          type: string
          format: uuid
          description: Category this entry belongs to
        key:
          type: string
          description: Dot-separated entry key
        language:
          type: string
          description: BCP 47 language tag
        text:
          type: string
          description: Translated text value
        pronunciation:
          type: string
          nullable: true
          description: IPA phoneme transcription
        ruby:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/RubyAnnotation'
          description: CJK ruby text annotations
        updatedAt:
          type: string
          format: date-time
          description: When this entry was last modified
    DeleteEntryResponse:
      type: object
      additionalProperties: false
      description: Empty response. HTTP 200 confirms the entry was deleted.
      properties: {}
    BulkSetEntriesResponse:
      type: object
      additionalProperties: false
      description: Result of bulk entry upsert operation
      required:
      - succeededCount
      - failedCount
      properties:
        succeededCount:
          type: integer
          minimum: 0
          description: Number of entries successfully upserted
        failedCount:
          type: integer
          minimum: 0
          description: Number of entries that failed
    ListEntriesResponse:
      type: object
      additionalProperties: false
      description: Paginated list of localization entries
      required:
      - entries
      - totalCount
      - page
      - pageSize
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/EntryResponse'
          description: Entries in the current page
        totalCount:
          type: integer
          minimum: 0
          description: Total number of entries matching the filter
        page:
          type: integer
          description: Current page number
        pageSize:
          type: integer
          description: Page size used
    ExportRequest:
      type: object
      additionalProperties: false
      description: Request to export a compiled localization bundle
      required:
      - language
      properties:
        language:
          type: string
          minLength: 2
          maxLength: 35
          description: BCP 47 language tag to export
        categoryId:
          type: string
          format: uuid
          nullable: true
          description: Filter by category (null exports all categories)
    ExportResponse:
      type: object
      additionalProperties: false
      description: Compiled localization bundle for client-side caching
      required:
      - language
      - entryCount
      - entries
      properties:
        language:
          type: string
          description: Language of this export
        entryCount:
          type: integer
          minimum: 0
          description: Total number of entries in this export
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ExportedEntry'
          description: All entries for the requested language and category scope
    ExportedEntry:
      type: object
      additionalProperties: false
      description: A single entry in the compiled export bundle
      required:
      - categoryCode
      - key
      - text
      properties:
        categoryCode:
          type: string
          description: Category code this entry belongs to
        key:
          type: string
          description: Dot-separated entry key
        text:
          type: string
          description: Translated text value
        pronunciation:
          type: string
          nullable: true
          description: IPA phoneme transcription
        ruby:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/RubyAnnotation'
          description: CJK ruby text annotations
    ExportPlsRequest:
      type: object
      additionalProperties: false
      description: Request to export pronunciation data as W3C PLS XML
      required:
      - language
      properties:
        language:
          type: string
          minLength: 2
          maxLength: 35
          description: BCP 47 language tag to export
        categoryId:
          type: string
          format: uuid
          nullable: true
          description: Filter by category (null exports all categories)
    ExportPlsResponse:
      type: object
      additionalProperties: false
      description: W3C Pronunciation Lexicon Specification XML document
      required:
      - language
      - entryCount
      - plsXml
      properties:
        language:
          type: string
          description: Language of this lexicon
        entryCount:
          type: integer
          minimum: 0
          description: Number of pronunciation entries included
        plsXml:
          type: string
          description: Complete W3C PLS XML document as a string
