openapi: 3.0.4
info:
  title: Bannou Localization Service API
  description: |
    Multi-language translation tables with category lifecycle, pronunciation annotations,
    bulk export, and DI-based key validation for cross-service localization.
    Categories organize entries by domain (items, quests, locations, UI).
    Schema-defined categories are seeded on startup; runtime categories support L5 extensions.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
x-service-layer: AppFoundation
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)
paths:
  /localization/category/create:
    post:
      summary: Create a runtime localization category
      description: |
        Creates a new runtime category for organizing translation entries.
        Schema-defined categories (from localization-categories.yaml) are seeded on startup
        and cannot be created via this endpoint.
        Returns 409 if a category with the same code already exists.
      operationId: createCategory
      tags:
      - Category
      x-permissions:
      - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '200':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '409':
          description: Category with this code already exists
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/CreateCategoryRequest\"\
        ,\n    \"$defs\": {\n        \"CreateCategoryRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to create a new runtime localization category\",\n            \"\
        required\": [\n                \"code\",\n                \"description\"\n            ],\n            \"properties\"\
        : {\n                \"code\": {\n                    \"type\": \"string\",\n                    \"minLength\": 1,\n\
        \                    \"maxLength\": 64,\n                    \"pattern\": \"^[a-z][a-z0-9._-]*$\",\n             \
        \       \"description\": \"Unique machine-readable category code (e.g., \\\"items\\\", \\\"quests\\\", \\\"ui\\\"\
        )\"\n                },\n                \"description\": {\n                    \"type\": \"string\",\n         \
        \           \"minLength\": 1,\n                    \"maxLength\": 500,\n                    \"description\": \"Human-readable
        description of this category\"\n                },\n                \"validationMode\": {\n                    \"\
        $ref\": \"#/$defs/ValidationMode\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Validation mode for key checks (defaults to configuration DefaultValidationMode if omitted)\"\n              \
        \  },\n                \"defaultLanguage\": {\n                    \"type\": \"string\",\n                    \"nullable\"\
        : true,\n                    \"maxLength\": 35,\n                    \"description\": \"Default fallback language
        (BCP 47 tag, defaults to configuration DefaultLanguage if omitted)\"\n                }\n            }\n        },\n\
        \        \"ValidationMode\": {\n            \"type\": \"string\",\n            \"description\": \"How the ILocalizationKeyValidator
        behaves for a category\",\n            \"enum\": [\n                \"None\",\n                \"WarnOnMissing\",\n\
        \                \"RejectOnMissing\"\n            ]\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/CategoryResponse\"\
        ,\n    \"$defs\": {\n        \"CategoryResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Localization category details\",\n            \"required\": [\n         \
        \       \"categoryId\",\n                \"code\",\n                \"description\",\n                \"isSchemaDefinition\"\
        ,\n                \"validationMode\",\n                \"defaultLanguage\",\n                \"entryCount\",\n  \
        \              \"createdAt\"\n            ],\n            \"properties\": {\n                \"categoryId\": {\n \
        \                   \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"Unique category identifier\"\n                },\n                \"code\": {\n                    \"type\": \"\
        string\",\n                    \"description\": \"Machine-readable category code\"\n                },\n         \
        \       \"description\": {\n                    \"type\": \"string\",\n                    \"description\": \"Human-readable
        description\"\n                },\n                \"isSchemaDefinition\": {\n                    \"type\": \"boolean\"\
        ,\n                    \"description\": \"Whether this category was seeded from localization-categories.yaml (cannot
        be deleted)\"\n                },\n                \"validationMode\": {\n                    \"$ref\": \"#/$defs/ValidationMode\"\
        ,\n                    \"description\": \"How the ILocalizationKeyValidator behaves for this category\"\n        \
        \        },\n                \"defaultLanguage\": {\n                    \"type\": \"string\",\n                 \
        \   \"description\": \"Fallback language (BCP 47 tag)\"\n                },\n                \"entryCount\": {\n \
        \                   \"type\": \"integer\",\n                    \"minimum\": 0,\n                    \"description\"\
        : \"Number of translation entries in this category\"\n                },\n                \"lastEntryUpdateLanguage\"\
        : {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Language of the most recent entry mutation (null if no entries yet)\"\n                },\n                \"\
        createdAt\": {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n      \
        \              \"description\": \"When this category was created\"\n                },\n                \"updatedAt\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n                 \
        \   \"nullable\": true,\n                    \"description\": \"When this category was last updated (null if never
        updated)\"\n                }\n            }\n        },\n        \"ValidationMode\": {\n            \"type\": \"\
        string\",\n            \"description\": \"How the ILocalizationKeyValidator behaves for a category\",\n          \
        \  \"enum\": [\n                \"None\",\n                \"WarnOnMissing\",\n                \"RejectOnMissing\"\
        \n            ]\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Create a runtime localization category\",\n    \"description\": \"Creates
        a new runtime category for organizing translation entries.\\nSchema-defined categories (from localization-categories.yaml)
        are seeded on startup\\nand cannot be created via this endpoint.\\nReturns 409 if a category with the same code already
        exists.\\n\",\n    \"tags\": [\n        \"Category\"\n    ],\n    \"deprecated\": false,\n    \"operationId\": \"\
        createCategory\"\n}"
  /localization/category/get:
    post:
      summary: Get a localization category by ID or code
      description: |
        Retrieves a category by categoryId or code. At least one must be provided.
        Returns both schema-defined and runtime categories.
      operationId: getCategory
      tags:
      - Category
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCategoryRequest'
      responses:
        '200':
          description: Category retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          description: Neither categoryId nor code provided
        '404':
          description: Category not found
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/GetCategoryRequest\"\
        ,\n    \"$defs\": {\n        \"GetCategoryRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to retrieve a category by ID or code (at least one required)\",\n\
        \            \"properties\": {\n                \"categoryId\": {\n                    \"type\": \"string\",\n   \
        \                 \"format\": \"uuid\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Unique identifier of the category to retrieve (null if using code)\"\n                },\n                \"code\"\
        : {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n                    \"maxLength\"\
        : 64,\n                    \"description\": \"Category code to retrieve (null if using categoryId)\"\n           \
        \     }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/CategoryResponse\"\
        ,\n    \"$defs\": {\n        \"CategoryResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Localization category details\",\n            \"required\": [\n         \
        \       \"categoryId\",\n                \"code\",\n                \"description\",\n                \"isSchemaDefinition\"\
        ,\n                \"validationMode\",\n                \"defaultLanguage\",\n                \"entryCount\",\n  \
        \              \"createdAt\"\n            ],\n            \"properties\": {\n                \"categoryId\": {\n \
        \                   \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"Unique category identifier\"\n                },\n                \"code\": {\n                    \"type\": \"\
        string\",\n                    \"description\": \"Machine-readable category code\"\n                },\n         \
        \       \"description\": {\n                    \"type\": \"string\",\n                    \"description\": \"Human-readable
        description\"\n                },\n                \"isSchemaDefinition\": {\n                    \"type\": \"boolean\"\
        ,\n                    \"description\": \"Whether this category was seeded from localization-categories.yaml (cannot
        be deleted)\"\n                },\n                \"validationMode\": {\n                    \"$ref\": \"#/$defs/ValidationMode\"\
        ,\n                    \"description\": \"How the ILocalizationKeyValidator behaves for this category\"\n        \
        \        },\n                \"defaultLanguage\": {\n                    \"type\": \"string\",\n                 \
        \   \"description\": \"Fallback language (BCP 47 tag)\"\n                },\n                \"entryCount\": {\n \
        \                   \"type\": \"integer\",\n                    \"minimum\": 0,\n                    \"description\"\
        : \"Number of translation entries in this category\"\n                },\n                \"lastEntryUpdateLanguage\"\
        : {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Language of the most recent entry mutation (null if no entries yet)\"\n                },\n                \"\
        createdAt\": {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n      \
        \              \"description\": \"When this category was created\"\n                },\n                \"updatedAt\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n                 \
        \   \"nullable\": true,\n                    \"description\": \"When this category was last updated (null if never
        updated)\"\n                }\n            }\n        },\n        \"ValidationMode\": {\n            \"type\": \"\
        string\",\n            \"description\": \"How the ILocalizationKeyValidator behaves for a category\",\n          \
        \  \"enum\": [\n                \"None\",\n                \"WarnOnMissing\",\n                \"RejectOnMissing\"\
        \n            ]\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Get a localization category by ID or code\",\n    \"description\": \"Retrieves
        a category by categoryId or code. At least one must be provided.\\nReturns both schema-defined and runtime categories.\\\
        n\",\n    \"tags\": [\n        \"Category\"\n    ],\n    \"deprecated\": false,\n    \"operationId\": \"getCategory\"\
        \n}"
  /localization/category/list:
    post:
      summary: List localization categories
      description: |
        Returns a paginated list of localization categories.
        By default includes both schema-defined and runtime categories.
      operationId: listCategories
      tags:
      - Category
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListCategoriesRequest'
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCategoriesResponse'
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/ListCategoriesRequest\"\
        ,\n    \"$defs\": {\n        \"ListCategoriesRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to list localization categories with optional filters\",\n      \
        \      \"properties\": {\n                \"includeSchemaDefinitions\": {\n                    \"type\": \"boolean\"\
        ,\n                    \"default\": true,\n                    \"description\": \"Whether to include schema-defined
        categories in results\"\n                },\n                \"page\": {\n                    \"type\": \"integer\"\
        ,\n                    \"default\": 1,\n                    \"minimum\": 1,\n                    \"description\":
        \"Page number (1-based)\"\n                },\n                \"pageSize\": {\n                    \"type\": \"integer\"\
        ,\n                    \"default\": 50,\n                    \"minimum\": 1,\n                    \"maximum\": 200,\n\
        \                    \"description\": \"Number of categories per page\"\n                }\n            }\n      \
        \  }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/ListCategoriesResponse\"\
        ,\n    \"$defs\": {\n        \"ListCategoriesResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Paginated list of localization categories\",\n            \"required\": [\n\
        \                \"categories\",\n                \"totalCount\",\n                \"page\",\n                \"pageSize\"\
        \n            ],\n            \"properties\": {\n                \"categories\": {\n                    \"type\":
        \"array\",\n                    \"items\": {\n                        \"$ref\": \"#/$defs/CategoryResponse\"\n   \
        \                 },\n                    \"description\": \"Categories in the current page\"\n                },\n\
        \                \"totalCount\": {\n                    \"type\": \"integer\",\n                    \"minimum\": 0,\n\
        \                    \"description\": \"Total number of categories matching the filter\"\n                },\n   \
        \             \"page\": {\n                    \"type\": \"integer\",\n                    \"description\": \"Current
        page number\"\n                },\n                \"pageSize\": {\n                    \"type\": \"integer\",\n \
        \                   \"description\": \"Page size used\"\n                }\n            }\n        },\n        \"\
        CategoryResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\": false,\n         \
        \   \"description\": \"Localization category details\",\n            \"required\": [\n                \"categoryId\"\
        ,\n                \"code\",\n                \"description\",\n                \"isSchemaDefinition\",\n        \
        \        \"validationMode\",\n                \"defaultLanguage\",\n                \"entryCount\",\n            \
        \    \"createdAt\"\n            ],\n            \"properties\": {\n                \"categoryId\": {\n           \
        \         \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"\
        Unique category identifier\"\n                },\n                \"code\": {\n                    \"type\": \"string\"\
        ,\n                    \"description\": \"Machine-readable category code\"\n                },\n                \"\
        description\": {\n                    \"type\": \"string\",\n                    \"description\": \"Human-readable
        description\"\n                },\n                \"isSchemaDefinition\": {\n                    \"type\": \"boolean\"\
        ,\n                    \"description\": \"Whether this category was seeded from localization-categories.yaml (cannot
        be deleted)\"\n                },\n                \"validationMode\": {\n                    \"$ref\": \"#/$defs/ValidationMode\"\
        ,\n                    \"description\": \"How the ILocalizationKeyValidator behaves for this category\"\n        \
        \        },\n                \"defaultLanguage\": {\n                    \"type\": \"string\",\n                 \
        \   \"description\": \"Fallback language (BCP 47 tag)\"\n                },\n                \"entryCount\": {\n \
        \                   \"type\": \"integer\",\n                    \"minimum\": 0,\n                    \"description\"\
        : \"Number of translation entries in this category\"\n                },\n                \"lastEntryUpdateLanguage\"\
        : {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Language of the most recent entry mutation (null if no entries yet)\"\n                },\n                \"\
        createdAt\": {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n      \
        \              \"description\": \"When this category was created\"\n                },\n                \"updatedAt\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n                 \
        \   \"nullable\": true,\n                    \"description\": \"When this category was last updated (null if never
        updated)\"\n                }\n            }\n        },\n        \"ValidationMode\": {\n            \"type\": \"\
        string\",\n            \"description\": \"How the ILocalizationKeyValidator behaves for a category\",\n          \
        \  \"enum\": [\n                \"None\",\n                \"WarnOnMissing\",\n                \"RejectOnMissing\"\
        \n            ]\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"List localization categories\",\n    \"description\": \"Returns a paginated
        list of localization categories.\\nBy default includes both schema-defined and runtime categories.\\n\",\n    \"tags\"\
        : [\n        \"Category\"\n    ],\n    \"deprecated\": false,\n    \"operationId\": \"listCategories\"\n}"
  /localization/category/update:
    post:
      summary: Update a localization category
      description: |
        Updates mutable properties of a category (description, validationMode, defaultLanguage).
        Code and isSchemaDefinition are immutable. Works for both schema-defined and runtime categories.
      operationId: updateCategory
      tags:
      - Category
      x-permissions:
      - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '404':
          description: Category not found
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/UpdateCategoryRequest\"\
        ,\n    \"$defs\": {\n        \"UpdateCategoryRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to update mutable properties of a category (code and isSchemaDefinition
        are immutable)\",\n            \"required\": [\n                \"categoryId\"\n            ],\n            \"properties\"\
        : {\n                \"categoryId\": {\n                    \"type\": \"string\",\n                    \"format\"\
        : \"uuid\",\n                    \"description\": \"Category to update\"\n                },\n                \"description\"\
        : {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n                    \"maxLength\"\
        : 500,\n                    \"description\": \"Updated description (null to keep unchanged)\"\n                },\n\
        \                \"validationMode\": {\n                    \"$ref\": \"#/$defs/ValidationMode\",\n              \
        \      \"nullable\": true,\n                    \"description\": \"Updated validation mode (null to keep unchanged)\"\
        \n                },\n                \"defaultLanguage\": {\n                    \"type\": \"string\",\n        \
        \            \"nullable\": true,\n                    \"maxLength\": 35,\n                    \"description\": \"\
        Updated default language (null to keep unchanged)\"\n                }\n            }\n        },\n        \"ValidationMode\"\
        : {\n            \"type\": \"string\",\n            \"description\": \"How the ILocalizationKeyValidator behaves for
        a category\",\n            \"enum\": [\n                \"None\",\n                \"WarnOnMissing\",\n          \
        \      \"RejectOnMissing\"\n            ]\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/CategoryResponse\"\
        ,\n    \"$defs\": {\n        \"CategoryResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Localization category details\",\n            \"required\": [\n         \
        \       \"categoryId\",\n                \"code\",\n                \"description\",\n                \"isSchemaDefinition\"\
        ,\n                \"validationMode\",\n                \"defaultLanguage\",\n                \"entryCount\",\n  \
        \              \"createdAt\"\n            ],\n            \"properties\": {\n                \"categoryId\": {\n \
        \                   \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"Unique category identifier\"\n                },\n                \"code\": {\n                    \"type\": \"\
        string\",\n                    \"description\": \"Machine-readable category code\"\n                },\n         \
        \       \"description\": {\n                    \"type\": \"string\",\n                    \"description\": \"Human-readable
        description\"\n                },\n                \"isSchemaDefinition\": {\n                    \"type\": \"boolean\"\
        ,\n                    \"description\": \"Whether this category was seeded from localization-categories.yaml (cannot
        be deleted)\"\n                },\n                \"validationMode\": {\n                    \"$ref\": \"#/$defs/ValidationMode\"\
        ,\n                    \"description\": \"How the ILocalizationKeyValidator behaves for this category\"\n        \
        \        },\n                \"defaultLanguage\": {\n                    \"type\": \"string\",\n                 \
        \   \"description\": \"Fallback language (BCP 47 tag)\"\n                },\n                \"entryCount\": {\n \
        \                   \"type\": \"integer\",\n                    \"minimum\": 0,\n                    \"description\"\
        : \"Number of translation entries in this category\"\n                },\n                \"lastEntryUpdateLanguage\"\
        : {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Language of the most recent entry mutation (null if no entries yet)\"\n                },\n                \"\
        createdAt\": {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n      \
        \              \"description\": \"When this category was created\"\n                },\n                \"updatedAt\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n                 \
        \   \"nullable\": true,\n                    \"description\": \"When this category was last updated (null if never
        updated)\"\n                }\n            }\n        },\n        \"ValidationMode\": {\n            \"type\": \"\
        string\",\n            \"description\": \"How the ILocalizationKeyValidator behaves for a category\",\n          \
        \  \"enum\": [\n                \"None\",\n                \"WarnOnMissing\",\n                \"RejectOnMissing\"\
        \n            ]\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Update a localization category\",\n    \"description\": \"Updates mutable
        properties of a category (description, validationMode, defaultLanguage).\\nCode and isSchemaDefinition are immutable.
        Works for both schema-defined and runtime categories.\\n\",\n    \"tags\": [\n        \"Category\"\n    ],\n    \"\
        deprecated\": false,\n    \"operationId\": \"updateCategory\"\n}"
  /localization/category/delete:
    post:
      summary: Delete a runtime localization category
      description: |
        Deletes a runtime category and cascades all entries within it.
        Schema-defined categories (isSchemaDefinition = true) cannot be deleted and return 400.
      operationId: deleteCategory
      tags:
      - Category
      x-permissions:
      - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCategoryRequest'
      responses:
        '200':
          description: Category deleted successfully (entries cascaded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCategoryResponse'
        '400':
          description: Cannot delete a schema-defined category
        '404':
          description: Category not found
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/DeleteCategoryRequest\"\
        ,\n    \"$defs\": {\n        \"DeleteCategoryRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to delete a runtime category (schema-defined categories cannot be
        deleted)\",\n            \"required\": [\n                \"categoryId\"\n            ],\n            \"properties\"\
        : {\n                \"categoryId\": {\n                    \"type\": \"string\",\n                    \"format\"\
        : \"uuid\",\n                    \"description\": \"Category to delete\"\n                }\n            }\n     \
        \   }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/DeleteCategoryResponse\"\
        ,\n    \"$defs\": {\n        \"DeleteCategoryResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Empty response. HTTP 200 confirms the category and all entries were deleted.\"\
        ,\n            \"properties\": {}\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Delete a runtime localization category\",\n    \"description\": \"Deletes
        a runtime category and cascades all entries within it.\\nSchema-defined categories (isSchemaDefinition = true) cannot
        be deleted and return 400.\\n\",\n    \"tags\": [\n        \"Category\"\n    ],\n    \"deprecated\": false,\n    \"\
        operationId\": \"deleteCategory\"\n}"
  /localization/entry/set:
    post:
      summary: Upsert a localization entry
      description: |
        Creates or replaces a single translation entry within a category.
        Upsert semantics — creates if the key+language combination does not exist, updates if it does.
        Returns 409 if MaxEntriesPerCategory would be exceeded.
      operationId: setEntry
      tags:
      - Entry
      x-permissions:
      - role: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetEntryRequest'
      responses:
        '200':
          description: Entry created or updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryResponse'
        '404':
          description: Category not found
        '409':
          description: MaxEntriesPerCategory cap exceeded
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/SetEntryRequest\"\
        ,\n    \"$defs\": {\n        \"SetEntryRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to create or replace a single localization entry (upsert)\",\n  \
        \          \"required\": [\n                \"categoryId\",\n                \"key\",\n                \"language\"\
        ,\n                \"text\"\n            ],\n            \"properties\": {\n                \"categoryId\": {\n  \
        \                  \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"Category this entry belongs to\"\n                },\n                \"key\": {\n                    \"type\"\
        : \"string\",\n                    \"minLength\": 1,\n                    \"maxLength\": 256,\n                  \
        \  \"pattern\": \"^[a-z][a-z0-9._-]*$\",\n                    \"description\": \"Dot-separated entry key (e.g., \\\
        \"direwolf.name\\\", \\\"rescue-princess.title\\\")\"\n                },\n                \"language\": {\n     \
        \               \"type\": \"string\",\n                    \"minLength\": 2,\n                    \"maxLength\": 35,\n\
        \                    \"description\": \"BCP 47 language tag (e.g., \\\"en\\\", \\\"ja-JP\\\", \\\"fr-FR\\\")\"\n \
        \               },\n                \"text\": {\n                    \"type\": \"string\",\n                    \"\
        minLength\": 1,\n                    \"maxLength\": 10000,\n                    \"description\": \"Translated text
