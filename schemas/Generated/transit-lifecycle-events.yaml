      - code
      - name
      - description
      - baseSpeedKmPerGameHour
      - passengerCapacity
      - cargoCapacityKg
      - compatibleTerrainTypes
      - requirements
      - fatigueRatePerGameHour
      - noiseLevelNormalized
      - isDeprecated
      - modifiedAt
      - createdAt
      - updatedAt
      properties:
        eventName:
          type: string
          default: transit.mode.created
          description: 'Event type identifier: transit.mode.created'
