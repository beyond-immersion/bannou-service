      - timestamp
      - templateId
      - code
      - gameId
      - name
      - category
      - rarity
      - quantityModel
      - maxStackSize
      - scope
      - soulboundType
      - tradeable
      - destroyable
      - hasDurability
      - isActive
      - createdAt
      - updatedAt
      - isDeprecated
      properties:
        eventName:
          type: string
          default: item.template.created
          description: 'Event type identifier: item.template.created'
        templateId: &id001
          type: string
          format: uuid
          description: "Unique identifier for the item template"
        code: &id002
          type: string
          description: "Unique item code within game"
        gameId: &id003
          type: string
          description: "Game service this template belongs to"
        name: &id004
          type: string
          description: "Human-readable display name"
        description: &id005
          type: string
          nullable: true
          description: "Detailed item description"
        category: &id006
          $ref: ../item-api.yaml#/components/schemas/ItemCategory
          description: "Item classification category"
        rarity: &id007
          $ref: ../item-api.yaml#/components/schemas/ItemRarity
          description: "Item rarity tier"
        quantityModel: &id008
          $ref: ../item-api.yaml#/components/schemas/QuantityModel
          description: "How quantities are tracked"
        maxStackSize: &id009
          type: integer
          description: "Maximum stack size for this item"
        scope: &id010
          $ref: ../item-api.yaml#/components/schemas/ItemScope
          description: "Realm availability scope"
        soulboundType: &id011
          $ref: ../item-api.yaml#/components/schemas/SoulboundType
          description: "When item becomes bound to a character"
        tradeable: &id012
          type: boolean
          description: "Whether item can be traded between characters"
        destroyable: &id013
          type: boolean
          description: "Whether item can be destroyed by the owner"
        hasDurability: &id014
          type: boolean
          description: "Whether item has durability system"
        maxDurability: &id015
          type: integer
          nullable: true
          description: "Maximum durability value (if hasDurability is true)"
        isActive: &id016
          type: boolean
          description: "Whether template is currently active"
        migrationTargetId: &id017
          type: string
          format: uuid
          nullable: true
          description: "Template ID to migrate existing instances to"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the item template was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the item template was last updated (set to createdAt on creation)
        isDeprecated:
          type: boolean
          description: Whether this item template is deprecated
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the item template was deprecated (null if not deprecated)
        deprecationReason:
          type: string
