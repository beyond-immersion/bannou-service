    BondStatus:
      type: string
      description: Lifecycle status of a seed bond.
      enum:
      - PendingConfirmation
      - Active
    BondedPlayerGardenState:
      type: object
      description: Per-player garden state within a shared bond garden
      required:
      - seedId
      - accountId
      - position
      properties:
        seedId:
          type: string
          format: uuid
          description: Seed ID of the bonded player
        accountId:
          type: string
          format: uuid
          description: Account ID of the bonded player
        position:
          $ref: '#/components/schemas/Vec3'
          description: Player position in shared garden space
    BoundingBox3D:
      type: object
      additionalProperties: false
      description: Axis-aligned bounding box as flat fields in world coordinates
        (meters, Y-up, right-handed). Preferred for simple spatial containment 
        checks where individual axis access is common (e.g., location bounds).
      required:
      - minX
      - minY
      - minZ
      - maxX
      - maxY
      - maxZ
      properties:
        minX:
          type: number
          format: float
          description: Minimum X bound in world space
        minY:
          type: number
          format: float
          description: Minimum Y bound in world space
        minZ:
          type: number
          format: float
          description: Minimum Z bound in world space
        maxX:
          type: number
          format: float
          description: Maximum X bound in world space
        maxY:
          type: number
          format: float
          description: Maximum Y bound in world space
        maxZ:
          type: number
          format: float
          description: Maximum Z bound in world space
    Bounds:
      type: object
      additionalProperties: false
      description: Axis-aligned bounding box as min/max Position3D corners in 
        world coordinates (meters, Y-up, right-handed). Preferred for spatial 
        queries and operations where corners are treated as points (e.g., 
        mapping spatial indexing, affordance queries).
      required:
      - min
      - max
      properties:
        min:
          $ref: '#/components/schemas/Position3D'
          description: Minimum corner (lowest x, y, z values)
        max:
          $ref: '#/components/schemas/Position3D'
          description: Maximum corner (highest x, y, z values)
    BoundsPrecision:
      type: string
      description: Precision level of spatial bounds for a location
      enum:
      - exact
      - approximate
      - none
    BreachResponse:
      type: object
      description: Breach record details
