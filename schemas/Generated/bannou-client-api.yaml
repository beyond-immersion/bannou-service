            $ref: '#/components/schemas/DiscoveryLevel'
          description: Progressive discovery levels for bestiary-style entries
        themes:
          type: array
          nullable: true
          items:
            type: string
          description: Theme tags for content selection matching (e.g., battle, 
            peaceful, forest)
        duration:
          type: string
          nullable: true
          description: Duration of the content (ISO 8601 duration or 
            human-readable)
        loopPoint:
          type: string
          nullable: true
          description: Loop point for seamless playback (ISO 8601 duration or 
            timestamp)
        composer:
          type: string
          nullable: true
          description: Composer or creator name
    CreateFactionRequest:
      type: object
      description: Request to create a new faction
      additionalProperties: false
      required:
      - gameServiceId
      - name
      - code
      - realmId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service to scope this faction to
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: Display name for the faction
        code:
          type: string
          minLength: 1
          maxLength: 128
          description: Unique code within the game service (e.g., 
            "thieves_guild")
        description:
          type: string
          nullable: true
          maxLength: 2048
          description: Human-readable description of the faction
        realmId:
          type: string
          format: uuid
          description: Realm this faction belongs to
        parentFactionId:
          type: string
          format: uuid
          nullable: true
          description: Parent faction for hierarchy (null for top-level)
    CreateItemInstanceRequest:
      type: object
      description: Request to create a new item instance
      additionalProperties: false
      required:
      - templateId
      - containerId
      - realmId
      - quantity
      - originType
      properties:
        templateId:
          type: string
          format: uuid
          description: Template to instantiate
        containerId:
          type: string
          format: uuid
          description: Container to place the item in
        realmId:
          type: string
          format: uuid
          description: Realm this instance exists in
        quantity:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
          description: Item quantity (respects template's quantityModel)
        slotIndex:
          type: integer
          nullable: true
          description: Slot position in slot-based containers
        slotX:
          type: integer
          nullable: true
          description: X position in grid-based containers
        slotY:
          type: integer
          nullable: true
          description: Y position in grid-based containers
        rotated:
          type: boolean
          nullable: true
          description: Whether item is rotated in grid
        currentDurability:
          type: integer
          nullable: true
          description: Initial durability (defaults to template's maxDurability)
        customStats:
          type: object
          nullable: true
          description: Instance-specific stat modifications. Opaque to Bannou; 
            no plugin reads keys by convention.
        customName:
          type: string
          maxLength: 128
          nullable: true
          description: Player-assigned custom name
        instanceMetadata:
          type: object
          nullable: true
          description: Additional instance-specific data. Opaque to Bannou; no 
            plugin reads keys by convention.
        originType:
          $ref: '#/components/schemas/ItemOriginType'
          description: How this item instance was created
        originId:
          type: string
          format: uuid
          nullable: true
          description: Source entity ID (quest ID, creature ID, etc.)
        contractInstanceId:
          type: string
          format: uuid
          nullable: true
          description: |
            Bound contract instance ID. For persistent item-contract bindings (status effects,
            licenses, memberships), this references the controlling contract. NULL for items
            without persistent contract relationships.
        contractBindingType:
          $ref: '#/components/schemas/ContractBindingType'
          nullable: true
          description: |
            Type of contract binding. When contractInstanceId is provided, this indicates
            whether it's a lifecycle binding (managed externally) or session binding
            (managed by Item service). Defaults to 'lifecycle' when contractInstanceId is set.
    CreateItemTemplateRequest:
      type: object
      description: Request to create a new item template
      additionalProperties: false
      required:
      - code
      - gameId
      - name
      - category
      - quantityModel
      - maxStackSize
      - scope
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 64
          pattern: "^[a-z][a-z0-9_]{1,63}$"
          description: Unique code within the game (immutable after creation)
        gameId:
          type: string
          minLength: 1
          maxLength: 64
          description: Game service this template belongs to (immutable after 
            creation)
        name:
          type: string
          minLength: 1
          maxLength: 128
          description: Human-readable display name
        description:
          type: string
          maxLength: 1000
          nullable: true
          description: Detailed description of this item
        category:
          $ref: '#/components/schemas/ItemCategory'
          description: Item classification category
        subcategory:
          type: string
          maxLength: 64
          nullable: true
          description: Game-defined subcategory (e.g., sword, helmet)
        tags:
          type: array
          items:
            type: string
            maxLength: 32
          nullable: true
          description: Flexible filtering tags
        rarity:
          $ref: '#/components/schemas/ItemRarity'
          nullable: true
          description: Item rarity tier (defaults to config when not specified)
        quantityModel:
          $ref: '#/components/schemas/QuantityModel'
          description: How quantities are tracked for this item
        maxStackSize:
          type: integer
          minimum: 1
          description: Maximum stack size (1 for unique items)
        unitOfMeasure:
          type: string
          maxLength: 32
          nullable: true
          description: Unit for continuous quantities (e.g., liters, kg)
        weightPrecision:
          $ref: '#/components/schemas/WeightPrecision'
          nullable: true
          description: Precision for weight values (defaults to config when not 
            specified)
        weight:
          type: number
          format: double
          nullable: true
          description: Weight value (interpreted per weightPrecision)
        volume:
          type: number
          format: double
          nullable: true
          description: Volume for volumetric inventories
        gridWidth:
          type: integer
          minimum: 1
          nullable: true
          description: Width in grid-based inventories
        gridHeight:
          type: integer
          minimum: 1
          nullable: true
          description: Height in grid-based inventories
        canRotate:
          type: boolean
          nullable: true
          description: Whether item can be rotated in grid
        baseValue:
          type: number
          format: double
          nullable: true
          description: Reference price for vendors/markets
        tradeable:
          type: boolean
          default: true
          description: Whether item can be traded/auctioned
        destroyable:
          type: boolean
          default: true
          description: Whether item can be destroyed/discarded
        soulboundType:
          $ref: '#/components/schemas/SoulboundType'
          nullable: true
          description: Binding behavior when item is acquired (defaults to 
            config when not specified)
        hasDurability:
          type: boolean
          default: false
          description: Whether item has durability tracking
        maxDurability:
          type: integer
          nullable: true
          description: Maximum durability value
        scope:
          $ref: '#/components/schemas/ItemScope'
          description: Realm availability scope
        availableRealms:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: Realm IDs where this template is available (for 
            realm_specific or multi_realm)
        stats:
          type: object
          nullable: true
          description: Game-defined stats (e.g., attack, defense). Opaque to 
            Bannou; no plugin reads keys by convention.
        effects:
          type: object
          nullable: true
          description: Game-defined effects (e.g., on_use, on_equip). Opaque to 
            Bannou; no plugin reads keys by convention.
        requirements:
          type: object
          nullable: true
          description: Game-defined requirements (e.g., level, strength). Opaque
            to Bannou; no plugin reads keys by convention.
        display:
          type: object
          nullable: true
          description: Display properties (e.g., iconId, modelId). Opaque to 
            Bannou; no plugin reads keys by convention.
        metadata:
          type: object
          nullable: true
          description: Additional game-specific data. Opaque to Bannou; no 
            plugin reads keys by convention.
        useBehaviorContractTemplateId:
          type: string
          format: uuid
          nullable: true
          description: Contract template ID for executable item behavior. When 
            set, the item can be "used" via /item/use, which creates a transient
            contract instance, completes its "use" milestone (triggering 
            prebound APIs), and optionally consumes the item.
        canUseBehaviorContractTemplateId:
          type: string
          format: uuid
          nullable: true
          description: |
            Contract template for pre-use validation. When set, /item/use first executes
            this contract's "validate" milestone before proceeding. If validation fails,
            the item is NOT consumed and the main use behavior is NOT executed.
        onUseFailedBehaviorContractTemplateId:
          type: string
          format: uuid
          nullable: true
          description: |
            Contract template executed when the main use behavior fails. Enables cleanup,
            partial rollback, or consequence application. Item is NOT consumed on failure
            regardless of this template's outcome.
        itemUseBehavior:
          $ref: '#/components/schemas/ItemUseBehavior'
          nullable: true
          description: How the item should behave when used (defaults to 
            destroy_on_success)
        canUseBehavior:
          $ref: '#/components/schemas/CanUseBehavior'
          nullable: true
          description: How CanUse validation failures should be handled 
            (defaults to block)
    CreateJourneyRequest:
