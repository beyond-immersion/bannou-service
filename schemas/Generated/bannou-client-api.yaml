          type: integer
          description: Maximum number of players allowed
        matchmakingQueueCode:
          type: string
          nullable: true
          description: Matchmaking queue code for automatic grouping
        bondPreferred:
          type: boolean
          default: false
          description: Whether bonded players receive a scoring boost for this 
            scenario
    ScenarioMutation:
      type: object
      additionalProperties: false
      description: A state mutation to apply during scenario execution
      required:
      - mutationType
      properties:
        mutationType:
          $ref: '#/components/schemas/MutationType'
          description: Type of mutation to apply
        experienceType:
          type: string
          nullable: true
          description: Experience type for PersonalityEvolve (e.g., TRAUMA, 
            VICTORY)
        experienceIntensity:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          nullable: true
          description: Experience intensity for PersonalityEvolve (0.0-1.0)
        backstoryElementType:
          type: string
          nullable: true
          description: Backstory element type for BackstoryAdd (e.g., TRAUMA, 
            GOAL)
        backstoryKey:
          type: string
          nullable: true
          description: Backstory element key for BackstoryAdd
        backstoryValue:
          type: string
          nullable: true
          description: Backstory element value for BackstoryAdd
        backstoryStrength:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          nullable: true
          description: Backstory element strength for BackstoryAdd (0.0-1.0)
        relationshipTypeCode:
          type: string
          nullable: true
          description: Relationship type code for RelationshipCreate/End
        otherParticipantRole:
          type: string
          nullable: true
          description: Role name for other participant in multi-character 
            scenarios
    ScenarioPhase:
      type: object
      additionalProperties: false
      description: A phase in scenario execution
      required:
      - phaseNumber
      - name
      properties:
        phaseNumber:
          type: integer
          minimum: 1
          description: Phase sequence number (1-based)
        name:
          type: string
          description: Phase name
        description:
          type: string
          nullable: true
          description: What happens in this phase
        durationSeconds:
          type: integer
          nullable: true
          description: Expected duration in seconds (for pacing, not enforced)
        dialogueHint:
          type: string
          nullable: true
          description: Hint for dialogue generation system
        actionHint:
          type: string
          nullable: true
          description: Hint for behavior/GOAP system
    ScenarioPrerequisites:
      type: object
      description: Prerequisite requirements for entering a scenario
      properties:
        requiredDomains:
          type: object
          additionalProperties:
            type: number
            format: float
          nullable: true
          description: Minimum growth depth per domain (domain path to minimum 
            depth)
        requiredScenarios:
          type: array
          items:
            type: string
          nullable: true
          description: Scenario template codes that must be completed first
        excludedScenarios:
          type: array
          items:
            type: string
          nullable: true
          description: Scenario template codes that disqualify the player
    ScenarioQuestHook:
      type: object
      additionalProperties: false
      description: Quest to spawn on scenario completion
      required:
      - questCode
      properties:
        questCode:
          type: string
          description: Quest definition code to spawn
        delaySeconds:
          type: integer
          default: 0
          description: Delay before spawning quest (not implemented in Phase 1)
        termOverrides:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Variable overrides for quest template
    ScenarioStateResponse:
      type: object
      description: Current state of a scenario instance
      required:
      - scenarioInstanceId
      - scenarioTemplateId
      - gameSessionId
      - connectivityMode
      - status
      - createdAt
      - chainDepth
      properties:
        scenarioInstanceId:
          type: string
          format: uuid
          description: Unique identifier for this scenario instance
        scenarioTemplateId:
          type: string
          format: uuid
          description: Template this instance was created from
        gameSessionId:
          type: string
          format: uuid
          description: Backing game session ID
        connectivityMode:
          $ref: '#/components/schemas/ConnectivityMode'
          description: How this scenario connects to the game world
        status:
          $ref: '#/components/schemas/ScenarioStatus'
          description: Current lifecycle status
        createdAt:
          type: string
          format: date-time
          description: When this instance was created
        chainedFrom:
          type: string
          format: uuid
          nullable: true
          description: Previous scenario instance if this was chained
        chainDepth:
          type: integer
          default: 0
          description: Current chain depth from the initial scenario
    ScenarioStatus:
      type: string
      enum:
      - Initializing
      - Active
      - Completing
      - Completed
      - Abandoned
      description: Current lifecycle status of a scenario instance
    ScenarioTemplateResponse:
      type: object
      description: Full scenario template with all fields
      required:
      - scenarioTemplateId
      - code
      - displayName
      - description
      - category
      - domainWeights
      - connectivityMode
      - allowedPhases
      - maxConcurrentInstances
      - status
      - createdAt
      - updatedAt
      properties:
        scenarioTemplateId:
          type: string
          format: uuid
          description: Unique identifier for this template
        code:
          type: string
          description: Unique template code
        displayName:
          type: string
          description: Human-readable name
        description:
          type: string
          description: Template description
        category:
          $ref: '#/components/schemas/ScenarioCategory'
          description: Primary gameplay category
        subcategory:
          type: string
          nullable: true
          description: Subcategory within the primary category
        domainWeights:
          type: array
          items:
            $ref: '#/components/schemas/DomainWeight'
          description: Growth domain weights
        minGrowthPhase:
          type: string
          nullable: true
          description: Minimum seed growth phase
        connectivityMode:
          $ref: '#/components/schemas/ConnectivityMode'
          description: World connectivity mode
        allowedPhases:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentPhase'
          description: Deployment phases where this template is available. 
            Always contains explicit values (never empty).
        maxConcurrentInstances:
          type: integer
          description: Maximum concurrent active instances
        estimatedDurationMinutes:
          type: integer
          nullable: true
          description: Estimated scenario duration in minutes
        prerequisites:
          $ref: '#/components/schemas/ScenarioPrerequisites'
          nullable: true
          description: Entry requirements
        chaining:
          $ref: '#/components/schemas/ScenarioChaining'
          nullable: true
          description: Chaining configuration
        multiplayer:
          $ref: '#/components/schemas/ScenarioMultiplayer'
          nullable: true
          description: Multiplayer support
        content:
          $ref: '#/components/schemas/ScenarioContent'
          nullable: true
          description: Content references
        status:
          $ref: '#/components/schemas/TemplateStatus'
          description: Current lifecycle status
        createdAt:
          type: string
          format: date-time
          description: When this template was created
        updatedAt:
          type: string
          format: date-time
          description: When this template was last updated
    Scene:
      type: object
      additionalProperties: false
      description: A complete scene document with hierarchical node structure
      required:
      - sceneId
      - gameId
      - sceneType
      - name
      - version
      - root
      - schema
      - createdAt
      - updatedAt
      properties:
        schema:
          type: string
          maxLength: 200
          description: Schema identifier for validation
          default: "bannou://schemas/scene/v1"
        sceneId:
          type: string
          format: uuid
          description: Unique scene identifier
        gameId:
          type: string
          minLength: 1
          maxLength: 200
          description: |
            Game service identifier for partitioning. Treated as opaque string.
            Default is the nil UUID for unpartitioned scenes.
          default: "00000000-0000-0000-0000-000000000000"
        sceneType:
          $ref: '#/components/schemas/SceneType'
          description: Scene classification for querying and validation
        name:
          type: string
          minLength: 1
          maxLength: 500
          description: Human-readable scene name
        description:
          type: string
          nullable: true
          maxLength: 2000
          description: Optional scene description
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+$'
          maxLength: 50
          description: Semantic version (MAJOR.MINOR.PATCH)
        root:
          $ref: '#/components/schemas/SceneNode'
          description: Root node of the scene hierarchy
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Searchable tags for filtering scenes
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Client-only scene metadata (author, thumbnail, editor preferences).
            No Bannou plugin reads specific keys from this field by convention.
        createdAt:
          type: string
          format: date-time
          description: When the scene was first created
        updatedAt:
          type: string
          format: date-time
          description: When the scene was last modified
    SceneEditorType:
      type: string
      description: |
        Type of scene editor for polymorphic identification per FOUNDATION TENETS.
        Session identifies a WebSocket session (user editing via client).
        Service identifies a service or tool editing programmatically.
      enum:
      - Session
      - Service
    SceneNode:
      type: object
      additionalProperties: false
      description: |
        A node in the scene hierarchy. Nodes can contain children to form
        a tree structure. Each node has a local transform relative to its parent.
      required:
      - nodeId
      - refId
      - name
      - nodeType
      - localTransform
      properties:
        nodeId:
          type: string
          format: uuid
          description: Globally unique node identifier
        refId:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
          minLength: 1
          maxLength: 200
          description: |
            Scene-local reference identifier. Must be unique within the scene.
            Used for scripting and cross-referencing. Examples: main_door, npc_spawn_1
        parentNodeId:
          type: string
          format: uuid
          nullable: true
          description: Parent node ID. Null for the root node only.
        name:
          type: string
          minLength: 1
          maxLength: 500
          description: Human-readable display name for the node
        nodeType:
          $ref: '#/components/schemas/NodeType'
          description: The structural type of this node
        localTransform:
          $ref: '#/components/schemas/Transform'
          description: Transform relative to parent node
        asset:
          $ref: '#/components/schemas/AssetReference'
          nullable: true
          description: Optional asset binding (mesh, sound, particle effect)
        children:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SceneNode'
          description: Child nodes in the hierarchy
        enabled:
          type: boolean
          default: true
          description: Whether this node is active in the scene definition
        sortOrder:
          type: integer
          default: 0
          description: Ordering among siblings for deterministic iteration
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Arbitrary tags for consumer filtering (e.g., entrance, 
            spawn, interactive)
        annotations:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Client-only node annotations for game engines and editors.
            No Bannou plugin reads specific keys from this field by convention.
        attachmentPoints:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AttachmentPoint'
          description: |
            Predefined locations for attaching child objects.
            Used by Scene Composer for furniture decoration, wall accessories, etc.
        affordances:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Affordance'
          description: |
            Interaction capabilities of this node.
            Used by AI navigation and character controllers.
        assetSlot:
          $ref: '#/components/schemas/AssetSlot'
          nullable: true
          description: |
            Procedural asset swapping configuration.
            Defines which assets can substitute for this node's asset.
        markerType:
          $ref: '#/components/schemas/MarkerType'
          nullable: true
          description: |
            Type of marker for marker nodes.
            Only relevant when nodeType is 'marker'.
        volumeShape:
          $ref: '#/components/schemas/VolumeShape'
          nullable: true
          description: |
            Shape of volume for volume nodes.
            Only relevant when nodeType is 'volume'.
        volumeSize:
          $ref: '#/components/schemas/Vector3'
          nullable: true
          description: |
            Size/extents of the volume (interpretation depends on volumeShape).
            For box: full dimensions. For sphere: x=radius. For capsule: x=radius, y=height.
        referenceSceneId:
          type: string
          format: uuid
          nullable: true
          description: |
            Scene ID to embed for reference nodes.
            Only relevant when nodeType is 'reference'.
    SceneResponse:
      type: object
      additionalProperties: false
      description: Standard response containing a scene
      required:
      - scene
      properties:
        scene:
          $ref: '#/components/schemas/Scene'
          description: The scene document
    SceneSummary:
      type: object
      additionalProperties: false
      description: Summary of a scene for list results (excludes full node tree)
      required:
      - sceneId
      - gameId
      - sceneType
      - name
      - version
      - nodeCount
      - createdAt
      - updatedAt
      - isCheckedOut
      properties:
        sceneId:
          type: string
          format: uuid
          description: Unique scene identifier
        gameId:
          type: string
          description: Game service identifier
        sceneType:
          $ref: '#/components/schemas/SceneType'
          description: Scene classification
        name:
          type: string
          description: Scene name
        description:
          type: string
          nullable: true
          description: Scene description
        version:
          type: string
          description: Current version
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Scene tags
        nodeCount:
          type: integer
          description: Total number of nodes in scene
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        isCheckedOut:
          type: boolean
          description: Whether scene is currently checked out
    SceneType:
      type: string
      description: |
        Scene classification for querying and validation rule lookup.
        Different types may have different validation requirements per game.
        DESIGN_DECISION: Whether this should be an opaque string instead of enum
        (game-content codes vary per deployment). Tracked for future evaluation.
      enum:
      - Unknown
      - Region
      - City
      - District
      - Lot
      - Building
      - Room
      - Dungeon
      - Arena
      - Vehicle
      - Prefab
      - Cutscene
      - Other
    SchemaResponse:
      type: object
      additionalProperties: false
      description: Registered schema definition with version lineage information
      required:
      - namespace
      - schemaVersion
      - hasMigration
      - createdAt
      properties:
        namespace:
          type: string
          description: Schema namespace
        schemaVersion:
          type: string
          description: Schema version
        schema:
          type: object
          description: JSON Schema definition
        previousVersion:
          type: string
          nullable: true
          description: Previous version
        hasMigration:
          type: boolean
          description: Whether migration script is registered
        createdAt:
          type: string
          format: date-time
          description: Registration timestamp
    SearchMatchType:
      type: string
      description: Where the search match was found
      enum:
      - Name
      - Description
      - Tag
      - NodeName
    SearchMessagesRequest:
      type: object
      additionalProperties: false
      description: Request to full-text search messages in a persistent room
      required:
      - roomId
      - query
      properties:
        roomId:
          type: string
          format: uuid
          description: Room ID to search in (must be a persistent room)
        query:
          type: string
          minLength: 1
          maxLength: 500
          description: Full-text search query string
        limit:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
          description: Maximum number of results to return
    SearchMessagesResponse:
      type: object
      additionalProperties: false
      description: Full-text search results with total match count
      required:
      - messages
      - totalMatches
      properties:
        messages:
          type: array
          description: Messages matching the search query
          items:
            $ref: '#/components/schemas/ChatMessageResponse'
        totalMatches:
          type: integer
          description: Total number of matching messages
    SearchResult:
      type: object
      additionalProperties: false
      description: A single search result
      required:
      - scene
      - matchType
      properties:
        scene:
          $ref: '#/components/schemas/SceneSummary'
          description: Matching scene summary
        matchType:
          $ref: '#/components/schemas/SearchMatchType'
          description: Where the match was found
        matchContext:
          type: string
          nullable: true
          maxLength: 500
          description: Context around the match
    SearchScenesRequest:
      type: object
      additionalProperties: false
      description: Request for full-text search
      required:
      - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
          description: Search query text
        gameId:
          type: string
          nullable: true
          maxLength: 200
          description: Filter by game ID
        sceneTypes:
          type: array
          items:
            $ref: '#/components/schemas/SceneType'
          nullable: true
          description: Filter by scene types
        offset:
          type: integer
          default: 0
          minimum: 0
          description: Pagination offset
        limit:
          type: integer
          default: 50
          minimum: 1
          maximum: 100
          description: Maximum results
    SearchScenesResponse:
      type: object
      additionalProperties: false
      description: Search results
      required:
      - results
      - total
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
          description: Matching scenes
        total:
          type: integer
          description: Total matches
    SeasonDefinition:
      type: object
      additionalProperties: false
      description: A season within a calendar template year
      required:
      - code
      - name
      - ordinal
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 64
          description: Season identifier code (e.g., "winter", "spring", 
            "summer", "autumn")
        name:
          type: string
          minLength: 1
          maxLength: 128
          description: Display name for the season
        ordinal:
          type: integer
          minimum: 0
          description: Position in annual cycle (0-based)
    SeasonResponse:
      type: object
      description: Season information
      additionalProperties: false
      required:
      - leaderboardId
      - seasonNumber
      - startedAt
      - isActive
      - entryCount
      properties:
        leaderboardId:
          type: string
          description: ID of the leaderboard
        seasonNumber:
          type: integer
          description: Season number
        seasonName:
          type: string
          nullable: true
          description: Name of the season
        startedAt:
          type: string
          format: date-time
          description: When this season started
        endedAt:
          type: string
          format: date-time
          nullable: true
          description: When this season ended (null if active)
        isActive:
          type: boolean
          description: Whether this is the current season
        entryCount:
          type: integer
          format: int64
          description: Number of entries in this season
    SeasonalAvailabilityEntry:
      type: object
      additionalProperties: false
      description: Per-season availability for a connection. Season codes must 
        match the realm's Worldstate calendar template.
      required:
      - season
      - available
      properties:
        season:
          type: string
          description: Season code matching the realm's Worldstate calendar 
            template (e.g., "winter", "wet", "dry")
        available:
          type: boolean
          description: Whether the connection is open during this season
    SeasonalRouteWarning:
      type: object
      additionalProperties: false
      description: Warning about an upcoming seasonal closure on a route leg
      required:
      - connectionId
      - legIndex
      - currentSeason
      - closingSeason
      - closingSeasonIndex
      properties:
        connectionId:
          type: string
          format: uuid
          description: Connection with the seasonal risk
        connectionName:
          type: string
          nullable: true
          description: Human-readable connection name for display
        legIndex:
          type: integer
          description: Which leg in the route uses this connection
        currentSeason:
          type: string
          description: Current season code (from Worldstate)
        closingSeason:
          type: string
          description: Season code when this connection closes
        closingSeasonIndex:
          type: integer
          description: How many season transitions until closure (1 = next 
            season)
    SeedBoardTemplateRequest:
      type: object
      description: Request to bulk seed a board template with license 
        definitions
      additionalProperties: false
      required:
      - boardTemplateId
      - definitions
      properties:
        boardTemplateId:
          type: string
          format: uuid
          description: Board template to seed with definitions
        definitions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/AddLicenseDefinitionRequest'
          description: License definitions to add (boardTemplateId in each is 
            ignored, uses top-level)
    SeedBoardTemplateResponse:
      type: object
      description: Result of bulk seeding a board template
      additionalProperties: false
      required:
      - boardTemplateId
      - definitionsCreated
      - definitions
      properties:
        boardTemplateId:
          type: string
          format: uuid
          description: Board template that was seeded
        definitionsCreated:
          type: integer
          description: Number of definitions created
        definitions:
          type: array
          items:
            $ref: '#/components/schemas/LicenseDefinitionResponse'
          description: All created license definitions
    SeedCalendarRequest:
      type: object
      additionalProperties: false
      description: Request to create a calendar template for a game service
      required:
      - templateCode
      - gameServiceId
      - gameHoursPerDay
      - dayPeriods
      - months
      - seasons
      properties:
        templateCode:
          type: string
          minLength: 1
          maxLength: 128
          description: Unique identifier for this calendar template within the 
            game service
        gameServiceId:
          type: string
          format: uuid
          description: Game service this calendar belongs to
        gameHoursPerDay:
          type: integer
          minimum: 1
          description: Number of game hours in a day (day periods must cover [0,
            gameHoursPerDay) without gaps or overlaps)
        dayPeriods:
          type: array
          items:
            $ref: '#/components/schemas/DayPeriodDefinition'
          minItems: 1
          description: Named time-of-day periods (must cover [0, 
            gameHoursPerDay) without gaps or overlaps)
        months:
          type: array
          items:
            $ref: '#/components/schemas/MonthDefinition'
          minItems: 1
          description: Ordered list of months in a year (each month's seasonCode
            must reference a defined season)
        seasons:
          type: array
          items:
            $ref: '#/components/schemas/SeasonDefinition'
          minItems: 1
          description: Ordered list of seasons in a year
        eraLabels:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/EraLabel'
          description: Named time spans for display purposes (optional)
    SeedEffectEntry:
      type: object
      description: A single seed-derived passive effect entry
      additionalProperties: false
      required:
      - capabilityCode
      - domain
      - fidelity
      - seedId
      - seedTypeCode
      properties:
        capabilityCode:
          type: string
          maxLength: 128
          description: Capability code from the seed's capability manifest
        domain:
          type: string
          maxLength: 128
          description: Seed domain this capability belongs to
        fidelity:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Capability fidelity value (0.0 to 1.0)
        seedId:
          type: string
          format: uuid
          description: Seed providing this capability
        seedTypeCode:
          type: string
          maxLength: 128
          description: Type code of the seed providing this capability
    SeedEffectsResponse:
      type: object
      description: Seed-derived passive effects for an entity
      additionalProperties: false
      required:
      - entityId
      - entityType
      - effects
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity these effects belong to
        entityType:
          $ref: '#/components/schemas/EntityType'
          description: Entity type discriminator
        effects:
          type: array
          maxItems: 500
          items:
            $ref: '#/components/schemas/SeedEffectEntry'
          description: Seed-derived passive effects
    SeedEntryTemplatesRequest:
      type: object
      description: Request to bulk seed entry templates
      additionalProperties: false
      required:
      - templates
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/CreateEntryTemplateRequest'
          description: Entry templates to create (duplicates are skipped)
    SeedEntryTemplatesResponse:
      type: object
      description: Result of bulk seed operation
      additionalProperties: false
      required:
      - created
      - skipped
      properties:
        created:
          type: integer
          description: Number of entry templates successfully created
        skipped:
          type: integer
          description: Number of templates skipped (duplicates)
    SeedLocation:
      description: Location data for seeding operations, using codes instead of 
        IDs for references
      type: object
      additionalProperties: false
      required:
      - code
      - name
      - realmCode
      - locationType
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[A-Z][A-Z0-9_]*$'
          description: Unique code for the location within realm
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Display name
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Description
        realmCode:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[A-Z][A-Z0-9_]*$'
          description: Code of the realm (resolved during seeding)
        locationType:
          $ref: '#/components/schemas/LocationType'
          description: Type classification for this location
        parentLocationCode:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[A-Z][A-Z0-9_]*$'
          nullable: true
          description: Code of the parent location (resolved during seeding)
        bounds:
          allOf:
