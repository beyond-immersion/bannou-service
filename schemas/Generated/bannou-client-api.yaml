    CreateSlotRequest:
      description: Request to create a new save slot for an entity.
      type: object
      additionalProperties: false
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      - category
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-z][a-z0-9-]*$'
          description: Game identifier for namespace isolation (e.g., "game-1", 
            "game-2")
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          description: Slot name (lowercase alphanumeric with hyphens, single 
            char like "q" allowed)
        category:
          $ref: '#/components/schemas/SaveCategory'
          description: Save category determining retention and cleanup behavior
        maxVersions:
          type: integer
          nullable: true
          minimum: 1
          maximum: 100
          description: Override default max versions for this category (null = 
            use category default)
        retentionDays:
          type: integer
          nullable: true
          minimum: 1
          description: Days to retain versions (null = indefinite)
        compressionType:
          allOf:
          - $ref: '#/components/schemas/CompressionType'
          nullable: true
          description: Compression algorithm to use for save data (null = use 
            category default)
        tags:
          type: array
          nullable: true
          items:
            type: string
            maxLength: 32
          maxItems: 20
          description: Searchable tags for slot categorization (e.g., 
            "boss-fight", "chapter-3")
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Custom key-value metadata for the slot
    CreateStatusTemplateRequest:
      type: object
      description: Request to create a new status template
      additionalProperties: false
      required:
      - gameServiceId
      - code
      - displayName
      - description
      - category
      - stackable
      - itemTemplateId
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service this template is scoped to
        code:
          type: string
          maxLength: 128
          description: Unique status code within this game service
        displayName:
          type: string
          maxLength: 256
          description: Human-readable display name for this status effect
        description:
          type: string
          maxLength: 2000
          description: Detailed description of what this status effect does
        category:
          $ref: '#/components/schemas/StatusCategory'
          description: Classification of this status effect
        stackable:
          type: boolean
          description: Whether this status can stack (multiple applications)
        maxStacks:
          type: integer
          minimum: 1
          maximum: 100
          default: 1
          description: Maximum number of stacks when stackable is true
        stackBehavior:
          $ref: '#/components/schemas/StackBehavior'
          description: How multiple applications interact (defaults to ignore)
        contractTemplateId:
          type: string
          format: uuid
          nullable: true
          description: Contract template for lifecycle management (null for 
            simple TTL statuses). When set, granting this status creates a 
            contract instance with milestones matching the template's defined 
            structure. The contract template should define milestones for status
            lifecycle phases (e.g., activation, expiration). Template values 
            receive the grant request's metadata map, allowing callers to 
            parameterize contract behavior per grant.
        itemTemplateId:
          type: string
          format: uuid
          description: Item template used when granting this status as an 
            inventory item
        defaultDurationSeconds:
          type: integer
          minimum: 1
          nullable: true
          description: Default duration in seconds for non-contract TTL 
            management (null for permanent)
        iconAssetId:
          type: string
          format: uuid
          nullable: true
          description: Asset identifier for this status effect's icon
    CreateTemplateRequest:
