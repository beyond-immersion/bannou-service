      required:
      - entityId
      - connectionId
      - source
      - discoveredAt
      - isNew
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity that discovered the connection
        connectionId:
          type: string
          format: uuid
          description: Connection that was discovered
        source:
          type: string
          description: How the connection was discovered (e.g., "travel", 
            "guide", "hearsay", "map", "quest_reward")
        discoveredAt:
          type: string
          format: date-time
          description: When discovery occurred (now for new, original time if 
            already known)
        isNew:
          type: boolean
          description: Whether this was a new discovery (true) or already known 
            (false). Stored entity state needed by Collection to distinguish 
            first discovery from re-revelation.
