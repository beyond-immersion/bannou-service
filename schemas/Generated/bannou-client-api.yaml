  /worldstate/clock/initialize:
    post:
      operationId: worldstate_initializeRealmClock
      summary: Initialize a clock for a realm
      description: The primary path from "realm exists" to "realm has a clock." 
        Validates realm existence, calendar template existence, and that no 
        clock already exists. Registers reference with lib-resource.
      tags:
      - Worldstate
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitializeRealmClockRequest'
      responses:
        '200':
          description: Realm clock initialized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitializeRealmClockResponse'
        '400':
          description: Both calendarTemplateCode and DefaultCalendarTemplateCode
            config are null
        '404':
          description: Realm or calendar template not found
        '409':
          description: Clock already initialized for this realm
  /worldstate/clock/set-ratio:
    post:
      operationId: worldstate_setTimeRatio
      summary: Change the time ratio for a realm
      description: Materializes current clock state, records new ratio segment 
        in history, updates realm clock. Setting ratio to 0.0 pauses the clock.
      tags:
      - Worldstate
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTimeRatioRequest'
      responses:
        '200':
          description: Time ratio changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetTimeRatioResponse'
        '404':
          description: No clock initialized for this realm
  /worldstate/clock/advance:
    post:
      operationId: worldstate_advanceClock
      summary: Manually advance a realm's clock
      description: Advances a realm's clock by a specified amount of game time. 
        Used for testing and administrative fast-forward. Publishes all boundary
        events crossed during advancement.
      tags:
      - Worldstate
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceClockRequest'
      responses:
        '200':
          description: Clock advanced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvanceClockResponse'
        '400':
          description: No advancement amount specified
        '404':
          description: No clock initialized for this realm
  /worldstate/calendar/seed:
    post:
      operationId: worldstate_seedCalendar
      summary: Create a calendar template
      description: Creates a calendar template for a game service. Validates 
        structural consistency (day period coverage, season-month mapping, day 
        count sums). Registers reference with lib-resource for game-service 
        target.
      tags:
      - Worldstate
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeedCalendarRequest'
      responses:
        '200':
          description: Calendar template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarTemplateResponse'
        '400':
          description: Structural validation failed (period gaps, season-month 
            mismatch, etc.)
        '404':
          description: Game service not found
        '409':
          description: Template code already exists for this game service or max
            calendars exceeded
  /worldstate/calendar/update:
    post:
      operationId: worldstate_updateCalendar
      summary: Update a calendar template
      description: Partial update of a calendar template. Acquires distributed 
        lock. Validates structural consistency. Cannot change template code or 
        game service ID. Invalidates local cache and publishes 
        CalendarTemplateUpdatedEvent for cross-node invalidation.
      tags:
      - Worldstate
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCalendarRequest'
      responses:
        '200':
          description: Calendar template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarTemplateResponse'
        '400':
          description: Structural validation failed
        '404':
          description: Calendar template not found
  /worldstate/calendar/delete:
    post:
      operationId: worldstate_deleteCalendar
      summary: Delete a calendar template
      description: Deletes a calendar template. Fails with Conflict if any 
        active realm clocks reference this template. Acquires distributed lock. 
        Unregisters reference with lib-resource.
      tags:
      - Worldstate
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCalendarRequest'
      responses:
        '200':
          description: Calendar template deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCalendarResponse'
        '404':
          description: Calendar template not found
        '409':
          description: Active realm clocks reference this template
  /worldstate/realm-config/update:
    post:
      operationId: worldstate_updateRealmConfig
      summary: Update realm worldstate configuration
      description: Partial update of realm-level configuration. Acquires 
        distributed lock. Supports changing downtimePolicy and 
        calendarTemplateCode. Cannot change time ratio (use SetTimeRatio) or 
        epoch (immutable).
      tags:
      - Worldstate
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRealmConfigRequest'
      responses:
        '200':
          description: Realm configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealmConfigResponse'
        '404':
          description: No clock initialized for this realm or calendar template 
            not found
components:
  schemas:
    AbandonJourneyRequest:
      type: object
      additionalProperties: false
      description: Request to abandon a journey
      required:
      - journeyId
      - reason
      properties:
        journeyId:
          type: string
          format: uuid
          description: Journey to abandon
        reason:
          type: string
          description: Reason for abandonment
    AbandonQuestRequest:
      type: object
      description: Request to abandon an active quest
      additionalProperties: false
      required:
      - questInstanceId
      - questorCharacterId
      properties:
        questInstanceId:
          type: string
          format: uuid
          description: Quest instance to abandon
        questorCharacterId:
          type: string
          format: uuid
          description: Character abandoning
    AbandonScenarioRequest:
      type: object
      description: Request to abandon a scenario
      required:
      - sessionId
      - scenarioInstanceId
      properties:
        sessionId:
          type: string
          format: uuid
          description: WebSocket session ID of the player
        scenarioInstanceId:
          type: string
          format: uuid
          description: Scenario instance to abandon
    AbandonScenarioResponse:
      type: object
      description: Response after abandoning a scenario
      required:
      - partialGrowthAwarded
      properties:
        partialGrowthAwarded:
          type: object
          additionalProperties:
            type: number
            format: float
          description: Partial growth awarded based on time spent
    AcceptMatchRequest:
      type: object
      description: Request to accept a formed match
      additionalProperties: false
      required:
      - webSocketSessionId
      - accountId
      - matchId
      properties:
        webSocketSessionId:
          type: string
          format: uuid
          description: WebSocket session ID
        accountId:
          type: string
          format: uuid
          description: Account ID of the player
        matchId:
          type: string
          format: uuid
          description: ID of the match to accept
    AcceptMatchResponse:
      type: object
      description: Response after accepting a match
      additionalProperties: false
      required:
      - allAccepted
      properties:
        allAccepted:
          type: boolean
          description: Whether all players have accepted
        acceptedCount:
          type: integer
          nullable: true
          description: Number of players who have accepted
        totalCount:
          type: integer
          nullable: true
          description: Total players who need to accept
        gameSessionId:
          type: string
          format: uuid
          nullable: true
          description: Game session ID (set when all players accept)
    AcceptQuestRequest:
      type: object
      description: Request to accept a quest and create an active instance
      additionalProperties: false
      required:
      - questorCharacterId
      properties:
        definitionId:
          type: string
          format: uuid
          nullable: true
          description: Quest definition ID (provide either this or code)
        code:
          type: string
          nullable: true
          description: Quest code (provide either this or definitionId)
        questorCharacterId:
          type: string
          format: uuid
          description: Character accepting the quest
        questGiverCharacterId:
          type: string
          format: uuid
          nullable: true
          description: NPC offering the quest
        termOverrides:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Template variable overrides
    AccountProfile:
      description: User account information displayed on the website profile 
        page
      type: object
      additionalProperties: false
      required:
      - accountId
      - email
      - createdAt
      properties:
        accountId:
          type: string
          format: uuid
          description: Unique identifier for the account
        email:
          type: string
          format: email
          description: Email address associated with the account
        displayName:
          type: string
          nullable: true
          description: User-chosen display name
        createdAt:
          type: string
          format: date-time
          description: Date and time when the account was created
        lastLogin:
          type: string
          format: date-time
          nullable: true
          description: Date and time of the last successful login
    AccountResponse:
      type: object
      description: Account information response
      additionalProperties: false
      required:
      - accountId
      - createdAt
      - emailVerified
      - roles
      - authMethods
      properties:
        accountId:
          type: string
          format: uuid
          description: Unique identifier for the account
        email:
          type: string
          format: email
          nullable: true
          description: Email address associated with the account. Null for 
            OAuth/Steam accounts without email.
        displayName:
          type: string
          nullable: true
          description: Display name for the account
        passwordHash:
          type: string
          nullable: true
          description: BCrypt hashed password for authentication
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the account was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the account was last updated
        emailVerified:
          type: boolean
          description: Whether the email address has been verified
        roles:
          type: array
          items:
            type: string
          description: List of roles assigned to the account
        authMethods:
          type: array
          items:
            $ref: '#/components/schemas/AuthMethodInfo'
          description: List of authentication methods linked to the account
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Client-only metadata. No Bannou plugin reads specific 
            keys from this field by convention.
        mfaEnabled:
          type: boolean
          default: false
          description: Whether multi-factor authentication is enabled for this 
            account
        mfaSecret:
          type: string
          nullable: true
          description: Encrypted TOTP secret (AES-256-GCM ciphertext). Auth 
            service encrypts and decrypts. Account stores opaque ciphertext.
        mfaRecoveryCodes:
          type: array
          items:
            type: string
          nullable: true
          description: BCrypt-hashed single-use recovery codes. Auth service 
            generates and verifies. Account stores opaque hashes.
    AchievementDefinitionResponse:
      type: object
      description: Achievement definition details
      additionalProperties: false
      required:
      - gameServiceId
      - achievementId
      - displayName
      - description
      - achievementType
      - points
      - isActive
      - isDeprecated
      - earnedCount
      - createdAt
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the owning game service
        achievementId:
          type: string
          description: Unique identifier
        displayName:
          type: string
          description: Human-readable name
        description:
          type: string
          description: How to earn this achievement
        hiddenDescription:
          type: string
          nullable: true
          description: Description for hidden achievements
        achievementType:
          $ref: '#/components/schemas/AchievementType'
          description: Classification of the achievement
        category:
          type: string
          nullable: true
          description: Game-defined category for UI grouping and filtering
        entityTypes:
          type: array
          items:
            $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Allowed entity types
        progressTarget:
          type: integer
          nullable: true
          description: Target for progressive achievements
        points:
          type: integer
          description: Point value
        iconUrl:
          type: string
          nullable: true
          description: Achievement icon URL
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/Platform'
          nullable: true
          description: Available platforms
        platformMappings:
          type: array
          items:
            $ref: '#/components/schemas/PlatformMapping'
          nullable: true
          description: Platform-specific achievement ID mappings
        prerequisites:
          type: array
          items:
            type: string
          nullable: true
          description: Required achievements
        scoreType:
          type: string
          maxLength: 100
          nullable: true
          description: Score type code for matching analytics.score.updated 
            events (progressive achievements)
        milestoneType:
          type: string
          maxLength: 100
          nullable: true
          description: Milestone type code for matching 
            analytics.milestone.reached events
        milestoneValue:
          type: number
          format: double
          nullable: true
          description: Expected milestone value for matching 
            analytics.milestone.reached events
        milestoneName:
          type: string
          maxLength: 200
          nullable: true
          description: Expected milestone name for matching 
            analytics.milestone.reached events
        leaderboardId:
          type: string
          maxLength: 100
          nullable: true
          description: Leaderboard ID for matching leaderboard.rank.changed 
            events
        rankThreshold:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Rank threshold for leaderboard achievements (unlock when 
            rank <= threshold)
        isActive:
          type: boolean
          description: Whether achievement is earnable
        isDeprecated:
          type: boolean
          description: Whether this definition is deprecated and should not be 
            used for new progress
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: When deprecation occurred, null if not deprecated
        deprecationReason:
          type: string
          nullable: true
          maxLength: 500
          description: Audit reason for deprecation, null if not deprecated
        earnedCount:
          type: integer
          format: int64
          description: How many entities have earned this
        createdAt:
          type: string
          format: date-time
          description: When the achievement was created
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Client-only metadata. No Bannou plugin reads specific 
            keys from this field by convention.
    AchievementProgress:
      type: object
      description: Progress toward a single achievement
      additionalProperties: false
      required:
      - achievementId
      - displayName
      - isUnlocked
      properties:
        achievementId:
          type: string
          description: Achievement identifier
        displayName:
          type: string
          description: Achievement display name
        currentProgress:
          type: integer
          nullable: true
          description: Current progress (for progressive)
        targetProgress:
          type: integer
          nullable: true
          description: Target progress (for progressive)
        percentComplete:
          type: number
          format: double
          nullable: true
          description: Completion percentage (0-100)
        isUnlocked:
          type: boolean
          description: Whether achievement is unlocked
        unlockedAt:
          type: string
          format: date-time
          nullable: true
          description: When achievement was unlocked
    AchievementProgressResponse:
      type: object
      description: Achievement progress for an entity
      additionalProperties: false
      required:
      - entityId
      - entityType
      - progress
      - totalPoints
      - unlockedCount
      properties:
        entityId:
          type: string
          format: uuid
          description: ID of the entity
        entityType:
          $ref: '#/components/schemas/EntityType'
          description: Entity type that owns this progress summary
        progress:
          type: array
          items:
            $ref: '#/components/schemas/AchievementProgress'
          description: Progress for each achievement
        totalPoints:
          type: integer
          description: Total points from unlocked achievements
        unlockedCount:
          type: integer
          description: Number of unlocked achievements
    AchievementType:
      type: string
      description: Type of achievement
      enum:
      - Standard
      - Progressive
      - Hidden
      - Secret
    ActionEffect:
      type: object
      additionalProperties: false
      description: Effect of an action on world state
      required:
      - key
      - value
      properties:
        key:
          type: string
          description: State key to modify
        value:
          description: New value to set (any type)
        cardinality:
          $ref: '#/components/schemas/EffectCardinality'
          description: How the effect is applied
    ActionMappingResponse:
      type: object
      description: A registered mapping from a GOAP action tag to violation type
        codes
      additionalProperties: false
      required:
      - tag
      - violationTypes
      - createdAt
      properties:
        tag:
          type: string
          minLength: 1
          maxLength: 128
          description: The GOAP action tag (e.g., "steal_food", 
            "deceive_merchant")
        violationTypes:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 128
          minItems: 1
          maxItems: 20
          description: Violation type codes this tag maps to (e.g., ["theft", 
            "dishonesty"])
        description:
          type: string
          nullable: true
          maxLength: 512
          description: Human-readable description of what this mapping 
            represents
        createdAt:
          type: string
          format: date-time
          description: When this mapping was first created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When this mapping was last modified
    ActivateSeedRequest:
      type: object
      additionalProperties: false
      description: Request to activate a seed.
      required:
      - seedId
      properties:
        seedId:
          type: string
          format: uuid
          description: The seed to activate.
    ActorCapabilities:
      type: object
      description: Actor-specific capabilities that affect affordance 
        evaluation. Same location may afford different actions to different 
        actor types.
      additionalProperties: false
      properties:
        size:
          $ref: '#/components/schemas/ActorSize'
          description: Affects cover requirements and passage width
        height:
          type: number
          minimum: 0
          description: Actor height in meters (affects cover, sightlines)
          nullable: true
        canClimb:
          type: boolean
          default: false
          description: Can reach elevated positions
        canSwim:
          type: boolean
          default: false
          description: Includes water-based positions
        canFly:
          type: boolean
          default: false
          description: Includes aerial positions
        perceptionRange:
          type: number
          minimum: 0
          description: Affects sightline distance requirements
          nullable: true
        movementSpeed:
          type: number
          minimum: 0
          description: Affects escape route viability calculations
          nullable: true
        stealthRating:
          type: number
          minimum: 0
          maximum: 1
          description: Affects ambush/hidden_path affordance scoring
          nullable: true
    ActorSize:
      type: string
      description: Size classification affecting cover requirements and passage 
        width
      enum:
      - Tiny
      - Small
      - Medium
      - Large
      - Huge
      default: Medium
    ActorTemplateResponse:
      type: object
      additionalProperties: false
      description: Response containing actor template details
      required:
      - templateId
      - category
      - behaviorRef
      - tickIntervalMs
      - autoSaveIntervalSeconds
      - maxInstancesPerNode
      - createdAt
      - updatedAt
      properties:
        templateId:
          type: string
          format: uuid
          description: Unique template identifier
        category:
          type: string
          description: Category identifier
        behaviorRef:
          type: string
          description: Reference to behavior in lib-assets
        configuration:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Game-specific configuration passed to ABML behavior execution scope.
            No Bannou plugin reads specific keys from this field by convention.
        autoSpawn:
          description: Auto-spawn configuration for instantiate-on-access
          nullable: true
          $ref: '#/components/schemas/AutoSpawnConfig'
        tickIntervalMs:
          type: integer
          description: Milliseconds between behavior loop iterations
        autoSaveIntervalSeconds:
          type: integer
          description: Seconds between automatic state saves
        maxInstancesPerNode:
          type: integer
          description: Maximum actors of this category per pool node
        cognitionTemplateId:
          type: string
          nullable: true
          description: |
            Cognition template ID for this actor type. Primary source for cognition
            pipeline resolution. When null, falls back to ABML metadata, then category default.
        cognitionOverrides:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Static template-level cognition overrides (polymorphic JSON).
            Deserialized internally to CognitionOverrides type with discriminated
            subtypes.
            No Bannou plugin reads specific keys from this field by convention.
        createdAt:
          type: string
          format: date-time
          description: When the template was created
        updatedAt:
          type: string
          format: date-time
          description: When the template was last updated
    AddLicenseDefinitionRequest:
      type: object
      description: Request to add a license definition to a board template
      additionalProperties: false
      required:
      - boardTemplateId
      - code
      - position
      - lpCost
      - itemTemplateId
      properties:
        boardTemplateId:
          type: string
          format: uuid
          description: Board template to add this definition to
        code:
          type: string
          minLength: 1
          maxLength: 64
          description: Unique license code within this board template
        position:
          $ref: '#/components/schemas/GridPosition'
          description: Grid position for this license node
        lpCost:
          type: integer
          minimum: 0
          description: License Point cost to unlock this node
        itemTemplateId:
          type: string
          format: uuid
          description: Item template created when this license is unlocked
        prerequisites:
          type: array
          nullable: true
          items:
            type: string
          description: License codes that must be unlocked before this one 
            (non-adjacent requirements)
        description:
          type: string
          nullable: true
          description: Human-readable description of what this license grants
        metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: Game-specific metadata for this license node. No Bannou 
            plugin reads specific keys from this field by convention.
    AddMemberRequest:
      type: object
      description: Request to add a character to a faction
      additionalProperties: false
      required:
      - factionId
      - characterId
      properties:
        factionId:
          type: string
          format: uuid
          description: Faction to add the character to
        characterId:
          type: string
          format: uuid
          description: Character to add as a member
        role:
          $ref: '#/components/schemas/FactionMemberRole'
          nullable: true
          description: Role to assign (null uses configured default)
    AdjacencyMode:
      type: string
      description: |
        Grid traversal adjacency mode for a board template.
        - FourWay: Orthogonal only (up, down, left, right)
        - EightWay: Orthogonal + diagonal (all 8 surrounding cells)
      enum:
      - FourWay
      - EightWay
    AdvanceBatchRequest:
      type: object
      additionalProperties: false
      description: Request to advance multiple journeys in a single call
      required:
      - advances
      properties:
        advances:
          type: array
          description: Individual advance entries
          items:
            $ref: '#/components/schemas/BatchAdvanceEntry'
    AdvanceBatchResponse:
      type: object
      additionalProperties: false
      description: Response from batch advance operation with per-journey 
        results
      required:
      - results
      properties:
        results:
          type: array
          description: Per-journey advance results
          items:
            $ref: '#/components/schemas/BatchAdvanceResult'
    AdvanceClockRequest:
      type: object
      additionalProperties: false
      description: Request to manually advance a realm's clock by a specified 
        amount
      required:
      - realmId
      properties:
        realmId:
          type: string
          format: uuid
          description: Realm to advance the clock for
        gameSeconds:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Number of game-seconds to advance
        gameDays:
          type: integer
          nullable: true
          minimum: 1
          description: Number of game-days to advance
        gameMonths:
          type: integer
          nullable: true
          minimum: 1
          description: Number of game-months to advance (uses current calendar 
            structure)
        gameYears:
          type: integer
          nullable: true
          minimum: 1
          description: Number of game-years to advance (uses current calendar 
            structure)
    AdvanceClockResponse:
      type: object
      additionalProperties: false
      description: Result of manual clock advancement. Caller already knows 
        realmId from request.
      required:
      - previousTime
      - newTime
      - boundaryEventsPublished
      properties:
        previousTime:
          $ref: '#/components/schemas/GameTimeSnapshot'
          description: Game time before advancement
        newTime:
          $ref: '#/components/schemas/GameTimeSnapshot'
          description: Game time after advancement
        boundaryEventsPublished:
          type: integer
          minimum: 0
          description: Number of boundary events published during advancement
    AdvanceDiscoveryRequest:
      type: object
      description: Request to advance the discovery level of an unlocked entry
      additionalProperties: false
      required:
      - collectionId
      - entryCode
      properties:
        collectionId:
          type: string
          format: uuid
          description: Collection containing the entry
        entryCode:
          type: string
          minLength: 1
          maxLength: 128
          description: Entry code to advance discovery for
    AdvanceDiscoveryResponse:
      type: object
      description: Result of advancing discovery level
      additionalProperties: false
      required:
      - entryCode
      - newLevel
      - reveals
      properties:
        entryCode:
          type: string
          description: Entry code that was advanced
        newLevel:
          type: integer
          description: New discovery level after advancement
        reveals:
          type: array
          items:
            type: string
          description: Information keys revealed at the new level
    AdvanceJourneyRequest:
      type: object
      additionalProperties: false
      description: Request to mark arrival at the next waypoint
      required:
      - journeyId
      - arrivedAtGameTime
      properties:
        journeyId:
          type: string
          format: uuid
          description: Journey to advance
        arrivedAtGameTime:
          type: number
          format: decimal
          description: Game-time when the waypoint was reached
        incidents:
          type: array
          nullable: true
          description: Events that occurred during this leg
          items:
            $ref: '#/components/schemas/JourneyIncident'
    Affordance:
      type: object
      additionalProperties: false
      description: |
        Describes a capability or interaction mode for a node.
        Used by AI systems to understand what actions are possible and by
        character controllers for contextual animations.
      required:
      - type
      properties:
        type:
          $ref: '#/components/schemas/AffordanceType'
          description: The type of affordance
        parameters:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Game-specific affordance parameters interpreted by game engines and AI
            systems.
            No Bannou plugin reads specific keys from this field by convention.
    AffordanceFreshness:
      type: string
      description: Controls caching behavior for affordance queries
      enum:
      - Fresh
      - Cached
      - AggressiveCache
      default: Cached
    AffordanceLocation:
      type: object
      description: A location that affords the requested action
      additionalProperties: false
      required:
      - position
      - score
      properties:
        position:
          allOf:
          - $ref: '#/components/schemas/Position3D'
          description: Location position
        bounds:
          allOf:
          - $ref: '#/components/schemas/Bounds'
          description: Area bounds if affordance spans an area
          nullable: true
        score:
          type: number
          minimum: 0
          maximum: 1
          description: How well this location affords the action (0-1)
        features:
          type: object
          additionalProperties: true
          description: >-
            Game-specific features of this affordance result.
            No Bannou plugin reads specific keys from this field by convention.
          nullable: true
        objectIds:
          type: array
          items:
            type: string
            format: uuid
          description: Map objects contributing to this affordance
          nullable: true
    AffordanceQueryRequest:
      type: object
      description: Query for locations that afford a specific action
      additionalProperties: false
      required:
      - regionId
      - affordanceType
      properties:
        regionId:
          type: string
          format: uuid
          description: Region to search
        affordanceType:
          $ref: '#/components/schemas/AffordanceType'
          description: Type of affordance to search for
        customAffordance:
          $ref: '#/components/schemas/CustomAffordance'
          description: Custom affordance definition (when affordanceType=Custom)
          nullable: true
        bounds:
          allOf:
          - $ref: '#/components/schemas/Bounds'
          description: Optional bounds to search within
          nullable: true
        maxResults:
          type: integer
          minimum: 1
          default: 10
          maximum: 100
          description: Maximum locations to return
        minScore:
          type: number
          minimum: 0
          maximum: 1
          default: 0.5
          description: Minimum affordance score to include
        participantCount:
          type: integer
          minimum: 1
          description: Expected participants (affects space requirements)
          nullable: true
        excludePositions:
          type: array
          items:
            $ref: '#/components/schemas/Position3D'
          description: Positions to exclude (e.g., player current location)
          nullable: true
        actorCapabilities:
          $ref: '#/components/schemas/ActorCapabilities'
          description: Actor capabilities affecting evaluation
          nullable: true
        freshness:
          $ref: '#/components/schemas/AffordanceFreshness'
          description: Cache freshness level
        maxAgeSeconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: Max age of cached results (for Cached/AggressiveCache)
          nullable: true
    AffordanceQueryResponse:
      type: object
      description: Affordance query results
      additionalProperties: false
      required:
      - locations
      properties:
        locations:
          type: array
          items:
            $ref: '#/components/schemas/AffordanceLocation'
          description: Scored locations (highest score first)
    AffordanceType:
      type: string
      description: Well-known affordance types with predefined scoring logic. 
        Use Custom for novel affordance definitions.
      enum:
      - Ambush
      - Shelter
      - Vista
      - ChokePoint
      - GatheringSpot
      - DramaticReveal
      - HiddenPath
      - DefensiblePosition
      - Custom
    Analytics:
      description: Analytics and tracking configuration for website visitor 
        metrics
      type: object
      additionalProperties: false
      properties:
        googleAnalyticsId:
          type: string
          nullable: true
          description: Google Analytics tracking ID
        otherTrackers:
          type: object
          additionalProperties: true
          description: Configuration for other analytics trackers. No Bannou 
            plugin reads specific keys from this field by convention.
    AnswerPeerRequest:
      type: object
      additionalProperties: false
      description: |
        Request to send an SDP answer to complete a WebRTC handshake.
        Sent by clients after receiving a VoicePeerJoinedEvent with an SDP offer.
      required:
      - roomId
      - senderSessionId
      - targetSessionId
      - sdpAnswer
      properties:
        roomId:
          type: string
          format: uuid
          description: Voice room ID
        senderSessionId:
          type: string
          format: uuid
          description: Session ID of the answering peer (caller of this 
            endpoint)
        targetSessionId:
          type: string
          format: uuid
          description: Session ID of the peer whose offer we're answering
        sdpAnswer:
          type: string
          description: SDP answer generated by this client's WebRTC stack
        iceCandidates:
          type: array
          nullable: true
          items:
            type: string
          description: ICE candidates for NAT traversal (can be trickled later)
    ArcType:
      type: string
      enum:
      - RagsToRiches
      - Tragedy
      - ManInHole
      - Icarus
      - Cinderella
      - Oedipus
      description: |
        Emotional arc shapes from Reagan et al. research.
        RagsToRiches: Rise (1)
        Tragedy: Fall (2)
        ManInHole: Fall then rise (3)
        Icarus: Rise then fall (4)
        Cinderella: Rise, fall, rise (5)
        Oedipus: Fall, rise, fall (6)
    ArchiveInfo:
      description: Archive metadata including size and document count
      type: object
      additionalProperties: false
      required:
      - archiveId
      - namespace
      - createdAt
      properties:
        archiveId:
          type: string
          format: uuid
          description: Unique identifier of the archive
        namespace:
          type: string
          description: Namespace the archive belongs to
        bundleAssetId:
          type: string
          format: uuid
          nullable: true
          description: Asset ID in Asset Service (null if bundle creation 
            failed)
        description:
          type: string
          nullable: true
          description: Description of the archive
        documentCount:
          type: integer
          description: Number of documents in the archive
        sizeBytes:
          type: integer
          description: Total size of the archive in bytes
        commitHash:
          type: string
          nullable: true
          description: Git commit hash if namespace was bound at archive time
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the archive was created
        ownerType:
          $ref: '#/components/schemas/DocumentationOwnerType'
          nullable: true
          description: Type of owner for this archive (null if owner unknown)
        ownerId:
          type: string
          nullable: true
          description: |
            Owner identifier (null if owner unknown).
            For Session type: the WebSocket session ID (UUID format).
            For Service type: the service name (e.g., "orchestrator").
    ArchiveRoomRequest:
      type: object
      additionalProperties: false
      description: Request to archive a room (makes it read-only)
      required:
      - roomId
      properties:
        roomId:
          type: string
          format: uuid
          description: Room ID to archive
    ArchiveSeedRequest:
      type: object
      additionalProperties: false
      description: Request to archive a seed.
      required:
      - seedId
      properties:
        seedId:
          type: string
          format: uuid
          description: The seed to archive.
    AreaContentConfigResponse:
      type: object
      description: Area content configuration
      additionalProperties: false
      required:
      - areaConfigId
      - areaCode
      - gameServiceId
      - collectionType
      - themes
      - defaultEntryCode
      - createdAt
      properties:
        areaConfigId:
          type: string
          format: uuid
          description: Unique area config identifier
        areaCode:
          type: string
          description: Area code
        gameServiceId:
          type: string
          format: uuid
          description: Game service this area config belongs to
        collectionType:
          $ref: '#/components/schemas/CollectionType'
          description: Type of collection this config applies to
        themes:
          type: array
          items:
            type: string
          description: Theme tags for this area
        defaultEntryCode:
          type: string
          description: Default entry code
        createdAt:
          type: string
          format: date-time
          description: When this area config was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When this area config was last updated
    ArriveJourneyRequest:
      type: object
      additionalProperties: false
      description: Request to force-arrive a journey at destination (skips 
        remaining legs)
      required:
      - journeyId
      - arrivedAtGameTime
      - reason
      properties:
        journeyId:
          type: string
          format: uuid
          description: Journey to force-arrive
        arrivedAtGameTime:
          type: number
          format: decimal
          description: Game-time of arrival
        reason:
          type: string
          description: Why legs were skipped (e.g., "teleported", "fast_travel",
            "narrative")
    AssetConflict:
      type: object
      additionalProperties: false
      description: Describes a conflict when the same asset ID has different 
        content hashes
      required:
      - assetId
      - conflictingBundles
      properties:
        assetId:
          type: string
          description: The conflicting asset identifier
        conflictingBundles:
          type: array
          items:
            $ref: '#/components/schemas/ConflictingBundleEntry'
          description: Bundles with conflicting versions of this asset
    AssetMetadata:
      type: object
      additionalProperties: false
      description: Complete asset metadata including system-generated fields
      required:
      - assetId
      - contentHash
      - filename
      - contentType
      - size
      - assetType
      - realm
      - tags
      - processingStatus
      - isArchived
      - createdAt
      - updatedAt
      properties:
        assetId:
          type: string
          description: Unique asset identifier
        contentHash:
          type: string
          description: SHA256 hash of file contents
        filename:
          type: string
          description: Original filename
        contentType:
          type: string
          description: MIME content type
        size:
          type: integer
          format: int64
          description: File size in bytes
        assetType:
          $ref: '#/components/schemas/AssetType'
          description: Type classification for the asset
        realm:
          allOf:
          - $ref: '#/components/schemas/GameRealm'
          nullable: true
          description: Game realm the asset belongs to. Null for cross-realm 
            assets.
        tags:
          type: array
          items:
            type: string
          description: Searchable tags for the asset
        processingStatus:
          $ref: '#/components/schemas/ProcessingStatus'
          description: Current status of asset processing pipeline
        isArchived:
          type: boolean
          description: Whether the asset is in cold/archival storage
          default: false
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the asset was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the asset was last updated
    AssetMetadataInput:
      type: object
      additionalProperties: false
      description: User-provided metadata for asset categorization
      properties:
        assetType:
          allOf:
          - $ref: '#/components/schemas/AssetType'
          nullable: true
          description: Type classification for the asset (null to omit)
        realm:
          allOf:
          - $ref: '#/components/schemas/GameRealm'
          nullable: true
          description: Game realm the asset belongs to (null for unscoped)
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Searchable tags for the asset (null to omit)
    AssetOwnerType:
      type: string
      enum:
      - Session
      - Service
      description: |
        Type of asset owner per FOUNDATION TENETS (Account Identity Boundary).
        Session: user-initiated operation identified by WebSocket session ID (UUID).
        Service: service-initiated operation identified by service name.
    AssetReference:
      type: object
      additionalProperties: false
      description: Reference to an asset in lib-asset
      required:
      - assetId
      properties:
        bundleId:
          type: string
          format: uuid
          nullable: true
          description: Optional bundle containing the asset
        assetId:
          type: string
          format: uuid
          description: Asset identifier in lib-asset
        variantId:
          type: string
          nullable: true
          maxLength: 200
          description: Variant identifier (consumer interprets meaning)
    AssetRequirementInfo:
      type: object
      description: Information about a required asset
      additionalProperties: false
      required:
      - type
      - code
      - amount
      properties:
        type:
          type: string
          description: Asset type (currency, item, item_stack)
        code:
          type: string
          description: Currency code or item template code
        amount:
          type: number
          description: Amount or quantity required
    AssetSearchRequest:
      description: Search criteria for filtering assets with pagination
      type: object
      additionalProperties: false
      required:
      - assetType
      - realm
      properties:
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Filter by tags (assets must have all specified tags) 
            (null to skip tag filtering)
        assetType:
          $ref: '#/components/schemas/AssetType'
          description: Filter by asset type
        realm:
          $ref: '#/components/schemas/GameRealm'
          description: Filter by game realm
        contentType:
          type: string
          nullable: true
          description: MIME content type filter (null to skip content type 
            filtering)
        limit:
          type: integer
          default: 50
          minimum: 1
          description: Maximum number of results to return
        offset:
          type: integer
          default: 0
          minimum: 0
          description: Number of results to skip for pagination
    AssetSearchResult:
      description: Paginated results from an asset search query
      type: object
      additionalProperties: false
      required:
      - assets
      - total
      - limit
      - offset
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/AssetMetadata'
          description: List of matching assets
        total:
          type: integer
          description: Total number of matching assets
        limit:
          type: integer
          description: Maximum number of results returned per page
        offset:
          type: integer
          description: Number of results skipped
    AssetSlot:
      type: object
      additionalProperties: false
      description: |
        Defines acceptable asset types for procedural swapping at this node.
        Used by procedural generation systems to substitute assets while
        maintaining scene coherence.
      required:
      - slotType
      properties:
        slotType:
          type: string
          minLength: 1
          maxLength: 200
          description: |
            Category of acceptable assets.
            Examples: chair, table, wall_art, floor_lamp
        acceptsTags:
          type: array
          nullable: true
          items:
            type: string
          description: |
            Tags that acceptable assets must have.
            Used for filtering when selecting random variations.
        defaultAsset:
          $ref: '#/components/schemas/AssetReference'
          nullable: true
          description: Default asset if no specific asset is bound
        variations:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AssetReference'
          description: |
            Pre-approved asset variations for random selection.
            Procedural systems pick from this list rather than searching all assets.
    AssetType:
      type: string
      enum:
      - Texture
      - Model
      - Audio
      - Behavior
      - Bundle
      - Prefab
      - Other
      description: Type classification for assets
    AssetUsageInfo:
      type: object
      additionalProperties: false
      description: Information about asset usage
      required:
      - sceneId
      - sceneName
      - nodeId
      - nodeRefId
      properties:
        sceneId:
          type: string
          format: uuid
          description: Scene using the asset
        sceneName:
          type: string
          description: Scene name
        nodeId:
          type: string
          format: uuid
          description: Node using the asset
        nodeRefId:
          type: string
          description: refId of the node
        nodeName:
          type: string
          description: Node name
        nodeType:
          $ref: '#/components/schemas/NodeType'
          description: Type of the node
    AssetVersion:
      description: Metadata for a specific version of an asset
      type: object
      additionalProperties: false
      required:
      - createdAt
      - size
      - isArchived
      properties:
        versionId:
          type: string
          nullable: true
          description: Unique version identifier. Null when object storage 
            versioning is not enabled.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this version was created
        size:
          type: integer
          format: int64
          description: File size in bytes for this version
        isArchived:
          type: boolean
          description: Whether this version is in cold storage
    AssetVersionList:
      description: Paginated list of asset versions
      type: object
      additionalProperties: false
      required:
      - versions
      - total
      - limit
      - offset
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/AssetVersion'
          description: List of asset versions
        total:
          type: integer
          description: Total number of versions available
        limit:
          type: integer
          description: Maximum number of versions returned per page
        offset:
          type: integer
          description: Number of versions skipped
    AssetWithDownloadUrl:
      description: Asset metadata with optional pre-signed download URL
      type: object
      additionalProperties: false
      required:
      - assetId
      - versionId
      - size
      - contentHash
      - contentType
      - metadata
      properties:
        assetId:
          type: string
          description: Unique asset identifier
        versionId:
          type: string
          description: Version identifier for this specific asset version
        downloadUrl:
          type: string
          format: uri
          nullable: true
          description: Pre-signed download URL (only populated when requested)
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: When the download URL expires (only populated when 
            requested)
        size:
          type: integer
          format: int64
          description: File size in bytes
        contentHash:
          type: string
          description: SHA256 hash of file contents
        contentType:
          type: string
          description: MIME content type
        metadata:
          $ref: '#/components/schemas/AssetMetadata'
          description: Complete asset metadata
    AttachmentPoint:
      type: object
      additionalProperties: false
      description: |
        A predefined location where child objects can be attached.
        Used for decorating furniture, walls, and other objects with accessories.
        Example: A wall may have attachment points for paintings, shelves, or light fixtures.
      required:
      - name
      - localTransform
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: |
            Unique name for this attachment point within the node.
            Examples: wall_hook_left, shelf_1, lamp_socket
        localTransform:
          $ref: '#/components/schemas/Transform'
          description: Position and orientation relative to the owning node
        acceptsTags:
          type: array
          nullable: true
          items:
            type: string
          description: |
            Tags of assets that can attach here.
            Examples: wall_decoration, picture_frame, plant
        defaultAsset:
          $ref: '#/components/schemas/AssetReference'
          nullable: true
          description: Default asset to display if no specific attachment is 
            specified
        attachedNodeId:
          type: string
          format: uuid
          nullable: true
          description: ID of the node currently attached at this point (runtime 
            state)
    AuthMethodInfo:
      type: object
      description: Information about a linked authentication method
      additionalProperties: false
      required:
      - provider
      - linkedAt
      properties:
        methodId:
          type: string
          format: uuid
          nullable: true
          description: Unique identifier for the authentication method
        provider:
          allOf:
          - $ref: '#/components/schemas/AuthProvider'
          description: Authentication provider type
        externalId:
          type: string
          nullable: true
          description: External user ID from the authentication provider
        displayName:
          type: string
          nullable: true
          description: Display name from the authentication provider
        linkedAt:
          type: string
          format: date-time
          description: Timestamp when the authentication method was linked
    AuthProvider:
      type: string
      description: All authentication provider types including email. Superset 
        of OAuthProvider.
      enum:
      - Email
      - Google
      - Discord
      - Twitch
      - Steam
    AuthResponse:
      description: Successful authentication response containing tokens and 
        session information
      type: object
      additionalProperties: false
      required:
      - accountId
      - accessToken
      - refreshToken
      - expiresIn
      - connectUrl
      properties:
        accountId:
          type: string
          format: uuid
          description: Unique identifier for the authenticated account
        accessToken:
          type: string
          description: JWT access token for API authentication
        refreshToken:
          type: string
          description: Token used to obtain new access tokens when the current 
            one expires
        expiresIn:
          type: integer
          description: Seconds until access token expires
        connectUrl:
          type: string
          format: uri
          description: WebSocket endpoint for Connect service
        roles:
          type: array
          items:
            type: string
          nullable: true
          description: List of roles assigned to the authenticated user
    AuthType:
      type: string
      enum:
      - Oauth
      - Ticket
      description: Authentication mechanism type (oauth = browser redirect, 
        ticket = game client token)
    AuthoringCheckoutRequest:
      type: object
      description: Request to checkout for authoring
      additionalProperties: false
      required:
      - regionId
      - kind
      - editorId
      properties:
        regionId:
          type: string
          format: uuid
          description: Region to checkout
        kind:
          $ref: '#/components/schemas/MapKind'
          description: Map kind to checkout
        editorId:
          type: string
          minLength: 1
          maxLength: 256
          description: Identifier for the editor/user
    AuthoringCheckoutResponse:
      type: object
      description: Checkout response
      additionalProperties: false
      properties:
        authorityToken:
          type: string
          description: Token for publishing changes (if successful)
          nullable: true
        expiresAt:
          type: string
          format: date-time
          description: When the checkout expires
          nullable: true
        lockedBy:
          type: string
          description: Who has the lock (if checkout failed)
          nullable: true
        lockedAt:
          type: string
          format: date-time
          description: When the lock was acquired (if checkout failed)
          nullable: true
    AuthoringCommitRequest:
      type: object
      description: Request to commit authoring changes
      additionalProperties: false
      required:
      - regionId
      - kind
      - authorityToken
      properties:
        regionId:
          type: string
          format: uuid
          description: Region being edited
        kind:
          $ref: '#/components/schemas/MapKind'
          description: Map kind being edited
        authorityToken:
          type: string
          minLength: 1
          description: Checkout authority token
        commitMessage:
          type: string
          maxLength: 1024
          description: Optional commit message for history
          nullable: true
    AuthoringCommitResponse:
      type: object
      description: Commit response
      additionalProperties: false
      required:
      - version
      properties:
        version:
          type: integer
          format: int64
          description: Committed version number
    AuthoringReleaseRequest:
      type: object
      description: Request to release authoring checkout
      additionalProperties: false
      required:
      - regionId
      - kind
      - authorityToken
      properties:
        regionId:
          type: string
          format: uuid
          description: Region being edited
        kind:
          $ref: '#/components/schemas/MapKind'
          description: Map kind being edited
        authorityToken:
          type: string
          minLength: 1
          description: Checkout authority token
    AutoSpawnConfig:
      type: object
      additionalProperties: false
      description: Configuration for instantiate-on-access behavior
      properties:
        enabled:
          type: boolean
          default: false
          description: If true, accessing a non-existent actor creates it
        idPattern:
          type: string
          nullable: true
          description: |
            Regex pattern for actor IDs that trigger auto-spawn.
            Examples: "npc-.*" matches "npc-grok", "npc-merchant-123"
        maxInstances:
          type: integer
          nullable: true
          description: Maximum auto-spawned instances (0 = unlimited)
        characterIdCaptureGroup:
          type: integer
          minimum: 1
          nullable: true
          description: |
            1-based regex capture group index for extracting CharacterId from actor ID.
            Example: With idPattern "npc-brain-([a-f0-9-]+)" and characterIdCaptureGroup: 1,
            actor ID "npc-brain-abc-123-def" extracts "abc-123-def" as CharacterId (parsed as GUID).
        defaultRealmId:
          type: string
          format: uuid
          nullable: true
          description: |
            Default realm ID for auto-spawned actors when no CharacterId is available to resolve a realm.
            Required when characterIdCaptureGroup is not configured and auto-spawn is enabled.
    AutogainInfo:
      type: object
      description: Autogain status for a balance
      additionalProperties: false
      required:
      - lastCalculatedAt
      - nextGainAt
      - nextGainAmount
      - mode
      properties:
        lastCalculatedAt:
          type: string
          format: date-time
          description: When autogain was last calculated
        nextGainAt:
          type: string
          format: date-time
          description: When the next autogain will apply
        nextGainAmount:
          type: number
          format: double
          description: Estimated next gain amount
        mode:
          $ref: '#/components/schemas/AutogainMode'
          description: Current autogain mode
    AutogainMode:
      type: string
      description: How autogain (energy/interest) is calculated
      enum:
      - Simple
      - Compound
    BackstorySnapshot:
      type: object
      additionalProperties: false
      description: Snapshot of a backstory element
      required:
      - elementType
      - key
      properties:
        elementType:
          type: string
          description: Backstory element type (e.g., TRAUMA, GOAL)
        key:
          type: string
          description: Backstory element key
    BalanceQuery:
      type: object
      description: A single balance query
      additionalProperties: false
      required:
      - walletId
      - currencyDefinitionId
      properties:
        walletId:
          type: string
          format: uuid
          description: Wallet ID
        currencyDefinitionId:
          type: string
          format: uuid
          description: Currency definition ID
    BanParticipantRequest:
      type: object
      additionalProperties: false
      description: Request to ban a participant from a room
      required:
      - roomId
      - targetSessionId
      properties:
        roomId:
          type: string
          format: uuid
          description: Room ID
        targetSessionId:
          type: string
          format: uuid
          description: Session ID of participant to ban
        reason:
          type: string
          nullable: true
          maxLength: 500
          description: Optional reason for the ban
        durationMinutes:
          type: integer
          nullable: true
          minimum: 1
          description: Ban duration in minutes (null for permanent)
    BatchAdvanceEntry:
      type: object
      additionalProperties: false
      description: A single advance entry in a batch advance request
      required:
      - journeyId
      - arrivedAtGameTime
      properties:
        journeyId:
          type: string
          format: uuid
          description: Journey to advance
        arrivedAtGameTime:
          type: number
          format: decimal
          description: Game-time when the waypoint was reached
        incidents:
          type: array
          nullable: true
          description: Events that occurred during this leg
          items:
            $ref: '#/components/schemas/JourneyIncident'
    BatchAdvanceResult:
      type: object
      additionalProperties: false
      description: Result for a single journey in a batch advance
      required:
      - journeyId
      properties:
        journeyId:
          type: string
          format: uuid
          description: Journey that was advanced
        error:
          type: string
          nullable: true
          description: Error code on failure. Null on success.
        journey:
          allOf:
          - $ref: '#/components/schemas/TransitJourney'
          nullable: true
          description: Updated journey on success. Null on failure.
    BatchBalanceResult:
      type: object
      description: Result of a single balance query in a batch
      additionalProperties: false
      required:
      - walletId
      - currencyDefinitionId
      - amount
      - lockedAmount
      - effectiveAmount
      properties:
        walletId:
          type: string
          format: uuid
          description: Wallet ID
        currencyDefinitionId:
          type: string
          format: uuid
          description: Currency definition ID
        amount:
          type: number
          format: double
          description: Total balance
        lockedAmount:
          type: number
          format: double
          description: Amount in holds
        effectiveAmount:
          type: number
          format: double
          description: Available balance
    BatchGetBalancesRequest:
      type: object
      description: Request to get multiple balances
      additionalProperties: false
      required:
      - queries
      properties:
        queries:
          type: array
          items:
            $ref: '#/components/schemas/BalanceQuery'
          minItems: 1
          maxItems: 100
          description: Balance queries to execute
    BatchGetBalancesResponse:
      type: object
      description: Results of batch balance queries
      additionalProperties: false
      required:
      - balances
      properties:
        balances:
          type: array
          items:
            $ref: '#/components/schemas/BatchBalanceResult'
          description: Balance results (same order as queries)
    BatchGetItemInstancesRequest:
      type: object
      description: Request to get multiple item instances
      additionalProperties: false
      required:
      - instanceIds
      properties:
        instanceIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 100
          description: Instance IDs to retrieve
    BatchGetItemInstancesResponse:
      type: object
      description: Multiple item instances
      additionalProperties: false
      required:
      - items
      - notFound
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemInstanceResponse'
          description: Found items
        notFound:
          type: array
          items:
            type: string
            format: uuid
          description: Instance IDs that were not found
    BehaviorCategory:
      type: string
      description: Category for organizing behaviors
      enum:
      - Base
      - Cultural
      - Professional
      - Personal
      - Situational
      - Ambient
    BehaviorTreeData:
      type: object
      additionalProperties: false
      description: Compiled behavior tree data with bytecode or download 
        reference
      required:
      - bytecodeSize
      properties:
        bytecode:
          type: string
          nullable: true
          description: Base64-encoded compiled bytecode for the behavior tree
        bytecodeSize:
          type: integer
          minimum: 0
          description: Size of the bytecode in bytes
        downloadUrl:
          type: string
          nullable: true
          description: URL to download the compiled behavior asset
    BindItemInstanceRequest:
      type: object
      description: Request to bind an item to a character
      additionalProperties: false
      required:
      - instanceId
      - characterId
      - bindType
      properties:
        instanceId:
          type: string
          format: uuid
          description: Instance ID to bind
        characterId:
          type: string
          format: uuid
          description: Character to bind the item to
        bindType:
          $ref: '#/components/schemas/SoulboundType'
          description: Type of binding to apply
    BindRepositoryRequest:
      description: Request to bind a Git repository for automatic documentation 
        sync
      type: object
      additionalProperties: false
      required:
      - namespace
      - repositoryUrl
      - ownerType
      - ownerId
      properties:
        ownerType:
          $ref: '#/components/schemas/DocumentationOwnerType'
          description: Type of owner for this binding
        ownerId:
          type: string
          minLength: 1
          description: |
            Owner identifier.
            For Session type: the WebSocket session ID (UUID format).
            For Service type: the service name (e.g., "orchestrator").
        namespace:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 50
          description: Documentation namespace to bind
        repositoryUrl:
          type: string
          description: Git clone URL (HTTPS for public repos)
        branch:
          type: string
          default: main
          description: Branch to sync from
        syncIntervalMinutes:
          type: integer
          default: 60
          minimum: 5
          maximum: 1440
          description: How often to sync (5 min to 24 hours)
        filePatterns:
          type: array
          nullable: true
          items:
            type: string
          default:
          - "**/*.md"
          description: Glob patterns for files to include (defaults to all 
            markdown files if not provided)
        excludePatterns:
          type: array
          nullable: true
          items:
            type: string
          default:
          - ".git/**"
          - ".obsidian/**"
          - "node_modules/**"
          description: Glob patterns for files to exclude (defaults to common 
            non-content directories if not provided)
        categoryMapping:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/DocumentCategory'
          description: Map directory prefixes to categories (empty mapping if 
            not provided)
        defaultCategory:
          $ref: '#/components/schemas/DocumentCategory'
          description: Default category for documents without mapping
        archiveEnabled:
          type: boolean
          default: false
          description: Enable archive functionality
        archiveOnSync:
          type: boolean
          default: false
          description: Create archive after each sync
    BindRepositoryResponse:
      description: Response confirming repository binding creation
      type: object
      additionalProperties: false
      required:
      - bindingId
      - namespace
      - repositoryUrl
      - branch
      - status
      - createdAt
      properties:
        bindingId:
          type: string
          format: uuid
          description: Unique identifier of the repository binding
        namespace:
          type: string
          description: Namespace the repository is bound to
        repositoryUrl:
          type: string
          description: URL of the bound repository
        branch:
          type: string
          description: Branch being synced
        status:
          $ref: '#/components/schemas/BindingStatus'
          description: Current status of the binding
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the binding was created
    BindingStatus:
      type: string
      enum:
      - Pending
      - Syncing
      - Synced
      - Error
      - Disabled
      description: Status of a repository binding
    BoardNodeState:
