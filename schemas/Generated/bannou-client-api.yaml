        bundleId:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable bundle identifier to update
        name:
          type: string
          nullable: true
          description: New bundle name (null to leave unchanged)
        description:
          type: string
          nullable: true
          description: New bundle description (null to leave unchanged)
        tags:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Replace all tags with these (null to leave unchanged)
        addTags:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Tags to add (merged with existing)
        removeTags:
          type: array
          items:
            type: string
          nullable: true
          description: Tag keys to remove
        reason:
          type: string
          nullable: true
          description: Optional reason for the update (recorded in version 
            history)
