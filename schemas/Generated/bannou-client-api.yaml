        realmId:
          type: string
          format: uuid
          nullable: true
          description: Realm scope
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Game service scope
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Classification tags
        createdAt:
          type: string
          format: date-time
          description: When created
    ScenarioExecution:
      type: object
      additionalProperties: false
      description: A scenario execution instance
      required:
      - executionId
      - scenarioId
      - code
      - name
      - status
      - currentPhase
      - totalPhases
      - triggeredAt
      properties:
        executionId:
          type: string
          format: uuid
          description: Execution instance ID
        scenarioId:
          type: string
          format: uuid
          description: Scenario definition ID
        code:
          type: string
          description: Scenario code
        name:
          type: string
          description: Scenario name
        status:
          $ref: '#/components/schemas/ScenarioStatus'
          description: Current status
        currentPhase:
          type: integer
          description: Current phase number
        totalPhases:
          type: integer
          description: Total phases
        triggeredAt:
          type: string
