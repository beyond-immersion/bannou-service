        credentials
      type: object
      additionalProperties: false
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          description: Email address for authentication
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 128
          description: User password for authentication
        rememberMe:
          type: boolean
          default: false
