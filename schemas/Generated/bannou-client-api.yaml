      type: object
      additionalProperties: false
      description: Result of bundle update operation
      required:
      - version
      - previousVersion
      - changes
      properties:
        version:
          type: integer
          description: New version number after update
        previousVersion:
          type: integer
          description: Version number before update
        changes:
          type: array
          items:
