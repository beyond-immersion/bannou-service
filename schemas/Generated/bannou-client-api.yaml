      - expiresAt
      - sizeBytes
      properties:
        downloadUrl:
          type: string
          description: Pre-signed URL to download export archive
        expiresAt:
          type: string
          format: date-time
          description: When the download URL expires
        sizeBytes:
          type: integer
          format: int64
