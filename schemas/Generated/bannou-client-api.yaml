    QueueResponse:
      type: object
      description: Full configuration details of a matchmaking queue
      additionalProperties: false
      required:
      - queueId
      - gameId
      - sessionGameType
      - displayName
      - enabled
      - minCount
      - maxCount
      - countMultiple
      - intervalSeconds
      - maxIntervals
      - createdAt
      properties:
        queueId:
          type: string
          description: Unique identifier for the queue
        gameId:
          type: string
          description: Game this queue is for
        sessionGameType:
          $ref: '#/components/schemas/SessionGameType'
          description: Game type for created sessions (maps to game-session 
            service)
        displayName:
          type: string
          description: Human-readable queue name
        description:
          type: string
          nullable: true
          description: Detailed description of the queue
        enabled:
          type: boolean
          description: Whether the queue is currently accepting tickets
        minCount:
          type: integer
          minimum: 2
          description: Minimum players required for a match
        maxCount:
          type: integer
          maximum: 200
          description: Maximum players in a match
        countMultiple:
          type: integer
          minimum: 1
          description: Player count must be divisible by this (e.g., 2 for 
            pairs)
        intervalSeconds:
          type: integer
          minimum: 1
          description: Seconds between match processing intervals
        maxIntervals:
          type: integer
          minimum: 1
          description: Maximum intervals before relaxing to minCount
        skillExpansion:
          type: array
          items:
            $ref: '#/components/schemas/SkillExpansionStep'
          nullable: true
          description: Skill window expansion steps
        partySkillAggregation:
          $ref: '#/components/schemas/PartySkillAggregation'
          nullable: true
          description: How to calculate party skill rating (null if party 
            matching not configured)
        partySkillWeights:
          type: array
          items:
            type: number
          nullable: true
          description: Weights for weighted party skill aggregation
        partyMaxSize:
          type: integer
          nullable: true
          description: Maximum party size for this queue
        allowConcurrent:
          type: boolean
          default: true
          description: Whether players can be in multiple queues
        exclusiveGroup:
          type: string
          nullable: true
          description: Exclusive group name (player can only be in one queue of 
            the group)
        useSkillRating:
          type: boolean
          default: true
          description: Whether to use lib-analytics skill rating for matching
        ratingCategory:
          type: string
          nullable: true
          description: lib-analytics rating category to use
        startWhenMinimumReached:
          type: boolean
          default: false
          description: Start match with minCount after maxIntervals (for large 
            lobbies)
        requiresRegistration:
          type: boolean
          default: false
          description: Whether players must be registered for a tournament
        tournamentIdRequired:
          type: boolean
          default: false
          description: Whether a tournament ID is required to join
        matchAcceptTimeoutSeconds:
          type: integer
          default: 30
          description: Seconds players have to accept/decline a formed match
        createdAt:
          type: string
          format: date-time
          description: When the queue was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the queue was last updated
