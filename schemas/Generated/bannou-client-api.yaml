          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: Available realms
        stats:
          type: object
          nullable: true
          description: Game-defined stats. Opaque to Bannou; no plugin reads 
            keys by convention.
        effects:
          type: object
          nullable: true
          description: Game-defined effects. Opaque to Bannou; no plugin reads 
            keys by convention.
        requirements:
          type: object
          nullable: true
          description: Game-defined requirements. Opaque to Bannou; no plugin 
            reads keys by convention.
        display:
          type: object
          nullable: true
          description: Display properties. Opaque to Bannou; no plugin reads 
            keys by convention.
        metadata:
          type: object
          nullable: true
