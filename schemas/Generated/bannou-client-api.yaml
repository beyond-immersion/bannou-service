          type: boolean
          description: Whether this clause executed successfully
        failureReason:
          type: string
          nullable: true
          description: If succeeded is false, describes what went wrong
    ClauseTypeSummary:
      type: object
      description: Summary of a clause type
      additionalProperties: false
      required:
      - typeCode
      - description
      - category
      - hasValidationHandler
      - hasExecutionHandler
      - isBuiltIn
      properties:
        typeCode:
          type: string
          description: Unique identifier
        description:
          type: string
          description: Human-readable description
        category:
          $ref: '#/components/schemas/ClauseCategory'
          description: Clause category
        hasValidationHandler:
          type: boolean
          description: Whether a validation handler is registered
        hasExecutionHandler:
          type: boolean
          description: Whether an execution handler is registered
        isBuiltIn:
          type: boolean
          description: Whether this is a built-in type
    ClientCapabilitiesResponse:
      description: Response containing the client's capability manifest with 
        available API endpoints and shortcuts
      type: object
      additionalProperties: false
      required:
      - sessionId
      - capabilities
      - version
      properties:
        sessionId:
          type: string
          format: uuid
          description: Session ID this capability manifest belongs to
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/ClientCapability'
          description: Available API capabilities for this client
        shortcuts:
          type: array
          items:
            $ref: '#/components/schemas/ClientShortcut'
          description: |
            Pre-bound API calls available for this session.
            Shortcuts are invoked like normal capabilities but Connect injects
            a pre-bound payload instead of using the client's payload.
          nullable: true
        version:
          type: integer
          description: Capability manifest version (increments on changes)
        expiresAt:
          type: string
          format: date-time
          description: When these capabilities expire and need refresh
          nullable: true
    ClientCapability:
      description: A single API capability available to the client, mapping a 
        client-salted GUID to a service endpoint
      type: object
      additionalProperties: false
      required:
      - guid
      - service
      - endpoint
      - method
      properties:
        guid:
          type: string
          format: uuid
          description: Client-salted GUID for this API endpoint (unique per 
            session)
        service:
          type: string
          description: Service name (e.g., "account", "auth")
        endpoint:
          type: string
          description: API endpoint path (e.g., "/account/create")
        method:
          $ref: '#/components/schemas/HttpMethodType'
          description: HTTP method for this endpoint
        description:
          type: string
          description: Human-readable description of this capability
          nullable: true
        channel:
          type: integer
          format: uint16
          description: Preferred WebSocket channel for this capability
          default: 0
    ClientShortcut:
      type: object
      description: |
        Session shortcut information sent to clients in the capability manifest.
        Shortcuts appear as invocable capabilities but Connect injects a pre-bound
        payload when the shortcut GUID is used, replacing any client-provided payload.
      additionalProperties: false
      required:
      - guid
      - targetService
      - targetEndpoint
      - name
      properties:
        guid:
          type: string
          format: uuid
          description: |
            GUID to use in WebSocket message header when invoking this shortcut.
            Uses UUID version 7 bits to distinguish from regular service GUIDs (version 5).
        targetService:
          type: string
          description: The service this shortcut invokes (for client display 
            purposes).
        targetEndpoint:
          type: string
          description: The endpoint this shortcut invokes (for client display 
            purposes).
        name:
          type: string
          description: Machine-readable shortcut identifier (e.g., 
            "get_my_stats", "join_game").
        description:
          type: string
          description: Human-readable description of what this shortcut does.
          nullable: true
        displayName:
          type: string
          description: User-friendly name for display in client UIs.
          nullable: true
        sourceService:
          type: string
          description: The service that created this shortcut.
          nullable: true
        tags:
          type: array
          items:
            type: string
          description: Categorization tags for client-side organization.
          nullable: true
        expiresAt:
          type: string
          format: date-time
          description: When this shortcut expires (if time-limited).
          nullable: true
    CloneBoardRequest:
      type: object
      description: Request to clone a board's unlock state to a new owner 
        (developer tooling)
      additionalProperties: false
      required:
      - sourceBoardId
      - targetOwnerType
      - targetOwnerId
      properties:
        sourceBoardId:
          type: string
          format: uuid
          description: Source board instance to clone unlock state from
        targetOwnerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity to clone the board to (must be in 
            template's allowedOwnerTypes)
        targetOwnerId:
          type: string
          format: uuid
          description: ID of the target entity
        targetRealmId:
          type: string
          format: uuid
          nullable: true
          description: Realm context for the cloned board. Required for 
            character owners (auto-resolved from character). For realm owners, 
            must equal targetOwnerId. Null for realm-agnostic boards.
    CloneBoardResponse:
      type: object
      description: Result of a board clone operation
      additionalProperties: false
      required:
      - sourceBoardId
      - targetBoardId
      - targetOwnerType
      - targetOwnerId
      - targetContainerId
      - licensesCloned
      properties:
        sourceBoardId:
          type: string
          format: uuid
          description: Source board that was cloned from
        targetBoardId:
          type: string
          format: uuid
          description: New board instance created for the target
        targetOwnerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity the board was cloned to
        targetOwnerId:
          type: string
          format: uuid
          description: ID of the entity the board was cloned to
        targetContainerId:
          type: string
          format: uuid
          description: Inventory container created for the cloned board
        licensesCloned:
          type: integer
          description: Number of licenses cloned (item instances created)
    CollapseDeltasRequest:
      type: object
      additionalProperties: false
      description: Request to collapse a delta chain into a full snapshot
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-z][a-z0-9-]*$'
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: Entity ID that owns the save slot
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Name of the slot containing deltas to collapse
        versionNumber:
          type: integer
          nullable: true
          description: Version to collapse to (latest if null)
        deleteIntermediates:
          type: boolean
          default: true
          description: Delete intermediate delta versions after collapse
    CollectionDomainMapping:
      type: object
      additionalProperties: false
      description: >
        Maps a tag prefix on a collection entry to a growth domain and amount.
        When an entry is unlocked, its tags are matched against tagPrefix. Matching
        tags determine the growth domain (tagPrefix becomes the domain path) and
        the growth amount to record.
      required:
      - tagPrefix
      - baseAmount
      properties:
        tagPrefix:
          type: string
          minLength: 1
          description: >
            Tag prefix to match against entry tags. An entry tag "combat.melee.sword"
            matches prefix "combat" and "combat.melee". The full matching tag becomes
            the growth domain path.
        baseAmount:
          type: number
          format: float
          minimum: 0
          description: Base growth amount to record when a tag matches this 
            prefix.
        discoveryBonusPerLevel:
          type: number
          format: float
          nullable: true
          description: >
            Additional growth amount per discovery level of the entry.
            Total growth = baseAmount + (discoveryLevel * discoveryBonusPerLevel).
            Null or 0 means no discovery bonus.
    CollectionGrowthMapping:
      type: object
      additionalProperties: false
      description: >
        Maps a collection type to growth domain mappings. When a collection entry
        is unlocked, Seed uses these mappings to determine which growth domains
        receive growth and how much. Matched by collection type code.
      required:
      - collectionType
      - domainMappings
      properties:
        collectionType:
          type: string
          minLength: 1
          description: Collection type code to match against (e.g., "bestiary", 
            "music_library").
        domainMappings:
          type: array
          items:
            $ref: '#/components/schemas/CollectionDomainMapping'
          minItems: 1
          description: Mappings from entry tag prefixes to growth domains.
    CollectionResponse:
      type: object
      description: Collection instance with summary
      additionalProperties: false
      required:
      - collectionId
      - ownerId
      - ownerType
      - collectionType
      - gameServiceId
      - containerId
      - entryCount
      - createdAt
      properties:
        collectionId:
          type: string
          format: uuid
          description: Unique collection instance identifier
        ownerId:
          type: string
          format: uuid
          description: Entity that owns this collection
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Entity type discriminator
        collectionType:
          $ref: '#/components/schemas/CollectionType'
          description: Type of collection
        gameServiceId:
          type: string
          format: uuid
          description: Game service this collection is scoped to
        containerId:
          type: string
          format: uuid
          description: Inventory container holding unlocked entry items
        entryCount:
          type: integer
          description: Number of unlocked entries in this collection
        createdAt:
          type: string
          format: date-time
          description: When this collection was created
    CollectionType:
      type: string
      description: |
        Opaque string code identifying the type of collection content.
        Collection types are game-defined and extensible — new types can be
        registered without schema changes. Common conventions include
        voice_gallery, scene_archive, music_library, bestiary, recipe_book,
        but any string code is valid.
    CombatPreferences:
      type: object
      description: |
        Combat behavior preferences that influence tactical decisions.
        These values affect GOAP action selection, retreat conditions,
        and group coordination behavior.
      additionalProperties: false
      required:
      - style
      - preferredRange
      - groupRole
      - riskTolerance
      - retreatThreshold
      - protectAllies
      properties:
        style:
          $ref: '#/components/schemas/CombatStyle'
          description: Overall combat approach
        preferredRange:
          $ref: '#/components/schemas/PreferredRange'
          description: Preferred engagement distance
        groupRole:
          $ref: '#/components/schemas/GroupRole'
          description: Role when fighting in groups
        riskTolerance:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: |
            Willingness to take dangerous actions (0.0 = very cautious, 1.0 = reckless).
            Affects ability selection and target prioritization.
        retreatThreshold:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: |
            Health percentage at which retreat is considered (0.0 = fight to death,
            0.5 = retreat at half health, 1.0 = retreat at any damage).
        protectAllies:
          type: boolean
          description: |
            Whether to prioritize ally protection over self-preservation.
            Affects target selection and positioning decisions.
    CombatPreferencesResponse:
      type: object
      description: Combat preferences profile for behavior system consumption
      additionalProperties: false
      required:
      - characterId
      - preferences
      - version
      - createdAt
      properties:
        characterId:
          type: string
          format: uuid
          description: Character these preferences belong to
        preferences:
          $ref: '#/components/schemas/CombatPreferences'
          description: The combat preferences values
        version:
          type: integer
          description: Preferences version number (increments on each evolution)
        createdAt:
          type: string
          format: date-time
          description: When these preferences were first created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When these preferences were last modified
    CombatStyle:
      type: string
      description: |
        Overall approach to combat situations. Affects target selection,
        ability usage, and engagement decisions.
      enum:
      - Defensive
      - Balanced
      - Aggressive
      - Berserker
      - Tactical
    CommitRequest:
      type: object
      additionalProperties: false
      description: Request to commit checkout changes
      required:
      - sceneId
      - checkoutToken
      - scene
      properties:
        sceneId:
          type: string
          format: uuid
          description: Scene being committed
        checkoutToken:
          type: string
          maxLength: 200
          description: Checkout token from checkout response
        scene:
          $ref: '#/components/schemas/Scene'
          description: Updated scene document
        changesSummary:
          type: string
          nullable: true
          maxLength: 2000
          description: Optional summary of changes for audit
    CommitResponse:
      type: object
      additionalProperties: false
      description: Response confirming commit
      required:
      - newVersion
      properties:
        newVersion:
          type: string
          description: New version after commit
        scene:
          $ref: '#/components/schemas/Scene'
          nullable: true
          description: Committed scene with updated metadata
    ComparisonOperator:
      type: string
      description: Comparison operators for numeric conditions
      enum:
      - Eq
      - Ne
      - Gt
      - Gte
      - Lt
      - Lte
    CompilationOptions:
      description: Options controlling the ABML compilation process including 
        optimizations and caching
      type: object
      additionalProperties: false
      properties:
        enableOptimizations:
          type: boolean
          default: true
          description: Enable behavior tree optimizations
        cacheCompiledResult:
          type: boolean
          default: true
          description: Cache the compiled behavior for reuse
        strictValidation:
          type: boolean
          default: false
          description: Enable strict validation mode
        culturalAdaptations:
          type: boolean
          default: true
          description: Apply cultural adaptations during compilation
        goapIntegration:
          type: boolean
          default: true
          description: Generate GOAP goals from behaviors
    CompileBehaviorRequest:
      description: Request to compile an ABML behavior definition into 
        executable behavior trees
      type: object
      additionalProperties: false
      required:
      - abmlContent
      properties:
        abmlContent:
          type: string
          minLength: 1
          description: Raw ABML YAML content to compile
          example: |
            version: "1.0.0"
            metadata:
              id: "example_behavior"
              category: "basic"
            behaviors:
              example:
                triggers:
                  - condition: "true"
                actions:
                  - log:
                      message: "Hello World"
        behaviorName:
          type: string
          nullable: true
          description: |
            Optional human-readable name for the behavior.
            If not provided, extracted from ABML metadata.id or generated from content hash.
          example: "blacksmith_daily_routine"
        behaviorCategory:
          $ref: '#/components/schemas/BehaviorCategory'
          description: |
            Category for organizing behaviors (e.g., profession, cultural, situational).
            Used for filtering and grouping in bundles.
          nullable: true
          example: "Professional"
        bundleId:
          type: string
          nullable: true
          description: |
            Optional bundle identifier for grouping related behaviors.
            When specified, the compiled behavior will be added to a bundle with this ID.
            Clients can then download entire bundles for efficient bulk loading.
            If the bundle doesn't exist, it will be created.
          example: "blacksmith-behaviors-v1"
        compilationOptions:
          $ref: '#/components/schemas/CompilationOptions'
          nullable: true
          description: Options controlling the compilation process
    CompileBehaviorResponse:
      description: Response containing the results of an ABML behavior 
        compilation
      type: object
      additionalProperties: false
      required:
      - behaviorId
      - compilationTimeMs
      - isUpdate
      properties:
        behaviorId:
          type: string
          minLength: 1
          description: Unique identifier for the compiled behavior 
            (content-addressable hash)
          example: "behavior-a1b2c3d4e5f6g7h8"
        behaviorName:
          type: string
          nullable: true
          description: Human-readable name of the behavior
          example: "blacksmith_daily_routine"
        compiledBehavior:
          $ref: '#/components/schemas/CompiledBehavior'
          nullable: true
          description: The compiled behavior data including behavior tree and 
            metadata
        compilationTimeMs:
          type: integer
          minimum: 0
          description: Time taken to compile the behavior in milliseconds
        assetId:
          type: string
          nullable: true
          description: Asset service ID where the compiled bytecode is stored. 
            Null only when caching is explicitly disabled.
        isUpdate:
          type: boolean
          description: True if this replaced an existing behavior with the same 
            content hash
    CompiledBehavior:
      description: Compiled behavior containing behavior tree, context schema, 
        and GOAP integration data
      type: object
      additionalProperties: false
      required:
      - behaviorTree
      - contextSchema
      properties:
        behaviorTree:
          $ref: '#/components/schemas/BehaviorTreeData'
          description: Compiled behavior tree data with bytecode or download 
            reference
        contextSchema:
          $ref: '#/components/schemas/ContextSchemaData'
          description: Schema defining required context variables for execution
        serviceDependencies:
          type: array
          items:
            type: string
          nullable: true
          description: List of required services for this behavior
        goapGoals:
          type: array
          items:
            $ref: '#/components/schemas/GoapGoal'
          nullable: true
          description: GOAP goals extracted from the behavior
        executionMetadata:
          $ref: '#/components/schemas/ExecutionMetadata'
          nullable: true
          description: Metadata for behavior execution including performance 
            hints and resource requirements
    CompleteMilestoneRequest:
      type: object
      description: Request to complete a milestone
      additionalProperties: false
