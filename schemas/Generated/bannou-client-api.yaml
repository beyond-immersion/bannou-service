      additionalProperties: false
      required:
      - level
      - reveals
      properties:
        level:
          type: integer
          minimum: 0
          description: Discovery level number (zero-indexed)
        reveals:
          type: array
          items:
            type: string
          description: List of field or information keys revealed at this level
    DiscoveryRecord:
      type: object
