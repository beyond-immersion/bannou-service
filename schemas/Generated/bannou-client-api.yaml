      summary: Get child types for a parent type
      description: Retrieve all relationship types that have the specified type 
        as their parent
      operationId: relationship_getChildRelationshipTypes
      tags:
      - Relationship Type Management
      x-permissions:
      - role: user
        states: {}
      requestBody:
