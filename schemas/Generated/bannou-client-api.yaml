      required:
      - breachId
      - contractId
      - breachType
      - status
      - detectedAt
      properties:
        breachId:
          type: string
          format: uuid
          description: Unique breach identifier
        contractId:
          type: string
          format: uuid
          description: Contract that was breached
        breachingEntityId:
          type: string
          format: uuid
          nullable: true
          description: Entity that breached (null for system-initiated breaches 
            such as deadline enforcement)
        breachingEntityType:
          allOf:
          - $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Type of breaching entity (null for system-initiated 
            breaches)
        breachType:
          $ref: '#/components/schemas/BreachType'
          description: Type of breach
        breachedTermOrMilestone:
          type: string
          nullable: true
          description: What was breached
        description:
          type: string
          nullable: true
          description: Breach description
        status:
          $ref: '#/components/schemas/BreachStatus'
          description: Current status
        detectedAt:
          type: string
          format: date-time
          description: When breach was detected
        cureDeadline:
          type: string
          format: date-time
          nullable: true
          description: Deadline to cure breach
        curedAt:
          type: string
          format: date-time
          nullable: true
          description: When breach was cured
        consequencesAppliedAt:
          type: string
          format: date-time
          nullable: true
          description: When consequences were applied
    BreachStatus:
      type: string
      description: Current status of a breach record
      enum:
      - Detected
      - CurePeriod
      - Cured
      - ConsequencesApplied
      - Disputed
      - Forgiven
    BreachSummary:
      type: object
      description: Brief breach information
      additionalProperties: false
      required:
      - breachId
      - breachType
      - status
      properties:
        breachId:
          type: string
          format: uuid
          description: Breach ID
        breachType:
          $ref: '#/components/schemas/BreachType'
          description: Type of breach
        status:
          $ref: '#/components/schemas/BreachStatus'
          description: Current status
    BreachType:
      type: string
      description: Type of contract breach
      enum:
      - TermViolation
      - MilestoneMissed
      - MilestoneDeadline
      - UnauthorizedAction
      - NonPayment
    BroadcastConsentRequest:
      type: object
      additionalProperties: false
      description: Request to initiate broadcast consent for a voice room
      required:
      - roomId
      properties:
        roomId:
          type: string
          format: uuid
          description: Voice room to broadcast
        requestingSessionId:
          type: string
          format: uuid
          nullable: true
          description: Session ID of the participant requesting broadcast 
            (server can derive from auth context)
    BroadcastConsentResponse:
      type: object
      additionalProperties: false
      description: Response to a broadcast consent request from a participant
      required:
      - roomId
      - sessionId
      - consented
      properties:
        roomId:
          type: string
          format: uuid
          description: Voice room ID
        sessionId:
          type: string
          format: uuid
          description: Session ID of the responding participant
        consented:
          type: boolean
          description: True if participant consents to broadcasting
    BroadcastConsentState:
      type: string
      enum:
      - Inactive
      - Pending
      - Approved
      description: >
        Current state of broadcast consent for a room.
        Inactive: No broadcast request pending.
        Pending: Consent request sent, awaiting all responses.
        Approved: All participants consented. Voice treats this as terminal.
    BroadcastConsentStatus:
      type: object
      additionalProperties: false
      description: Current broadcast consent status for a voice room
      required:
      - roomId
      - state
      - consentedSessionIds
      - pendingSessionIds
      properties:
        roomId:
          type: string
          format: uuid
          description: Voice room ID
        state:
          $ref: '#/components/schemas/BroadcastConsentState'
          description: Current broadcast consent state
        requestedBySessionId:
          type: string
          format: uuid
          nullable: true
          description: Who initiated the broadcast request (null if inactive)
        consentedSessionIds:
          type: array
          items:
            type: string
            format: uuid
          description: Sessions that have consented so far
        pendingSessionIds:
          type: array
          items:
            type: string
            format: uuid
          description: Sessions that haven't responded yet
        rtpAudioEndpoint:
          type: string
          nullable: true
          description: >
            RTP audio endpoint for the room's mixed audio output. Only populated
            when room is in scaled tier. Provided to lib-broadcast so it can connect
            its RTMP output to the voice room's audio.
    BroadcastStatusRequest:
      type: object
      additionalProperties: false
      description: Request to get broadcast consent status for a voice room
      required:
      - roomId
      properties:
        roomId:
          type: string
          format: uuid
          description: Voice room ID
    BulkDeleteRequest:
      description: Request to delete multiple documents at once
      type: object
      additionalProperties: false
      required:
      - namespace
      - documentIds
      properties:
        namespace:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 50
          description: Documentation namespace containing the documents
        documentIds:
          type: array
          items:
            type: string
            format: uuid
          description: List of document IDs to delete
    BulkDeleteResponse:
      description: Response reporting bulk deletion results with success and 
        failure details
      type: object
      additionalProperties: false
      required:
      - succeeded
      - failed
      properties:
        succeeded:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of documents successfully deleted
        failed:
          type: array
          items:
            $ref: '#/components/schemas/BulkOperationFailure'
          description: Details of documents that failed to delete
    BulkGetAssetsRequest:
      type: object
      additionalProperties: false
      description: Request to retrieve metadata for multiple assets
      required:
      - assetIds
      properties:
        assetIds:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
          description: Asset IDs to retrieve (max 100)
        includeDownloadUrls:
          type: boolean
          default: false
          description: Whether to generate pre-signed download URLs
    BulkGetAssetsResponse:
      type: object
      additionalProperties: false
      description: Batch asset metadata response
      required:
      - assets
      - notFound
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/AssetWithDownloadUrl'
          description: Found assets with metadata
        notFound:
          type: array
          items:
            type: string
          description: Asset IDs that weren't found
    BulkOperationFailure:
      type: object
      description: Details of a failed bulk operation item
      additionalProperties: false
      required:
      - accountId
      - error
      properties:
        accountId:
          type: string
          format: uuid
          description: Account ID that failed
        error:
          type: string
          description: Human-readable error reason
    BulkSeedConnectionEntry:
      type: object
      additionalProperties: false
      description: A single connection entry in a bulk seed request
      required:
      - fromLocationCode
      - toLocationCode
      - bidirectional
      - distanceKm
      - terrainType
      - compatibleModes
      - baseRiskLevel
      properties:
        fromLocationCode:
          type: string
          description: Location code for the starting point (resolved via 
            Location service)
        toLocationCode:
          type: string
          description: Location code for the ending point (resolved via Location
            service)
        bidirectional:
          type: boolean
          description: Whether the connection is traversable both ways
        distanceKm:
          type: number
          format: decimal
          minimum: 0.01
          description: Distance in game-kilometers
        terrainType:
          type: string
          description: Terrain type code. Category B content code.
        compatibleModes:
          type: array
          description: Transit mode codes that can use this connection
          items:
            type: string
        seasonalAvailability:
          type: array
          nullable: true
          description: Per-season availability restrictions. Null means always 
            available.
          items:
            $ref: '#/components/schemas/SeasonalAvailabilityEntry'
        baseRiskLevel:
          type: number
          format: decimal
          minimum: 0
          maximum: 1
          description: Base risk level from 0.0 (safe) to 1.0 (extremely 
            dangerous)
        name:
          type: string
          nullable: true
          description: Human-readable connection name
        code:
          type: string
          nullable: true
          description: Unique code for lookup
        tags:
          type: array
          nullable: true
          description: Freeform classification tags
          items:
            type: string
    BulkSeedConnectionsRequest:
      type: object
      additionalProperties: false
      description: Request to seed connections from configuration
      required:
      - connections
      properties:
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Scope location code resolution to this realm. When 
            provided, replaceExisting deletes connections for this realm only.
        connections:
          type: array
          description: Connection entries to seed
          items:
            $ref: '#/components/schemas/BulkSeedConnectionEntry'
        replaceExisting:
          type: boolean
          default: false
          description: If true, delete existing connections scoped by realmId 
            before seeding
    BulkSeedConnectionsResponse:
      type: object
      additionalProperties: false
      description: Response from bulk seed operation
      required:
      - created
      - updated
      - errors
      properties:
        created:
          type: integer
          minimum: 0
          description: Number of connections created
        updated:
          type: integer
          minimum: 0
          description: Number of connections updated
        errors:
          type: array
          description: Error messages for individual entries that failed
          items:
            type: string
    BulkUpdateRequest:
      description: Request to update multiple documents at once
      type: object
      additionalProperties: false
      required:
      - namespace
      - documentIds
      properties:
        namespace:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 50
          description: Documentation namespace containing the documents
        documentIds:
          type: array
          items:
            type: string
            format: uuid
          description: List of document IDs to update
        category:
          $ref: '#/components/schemas/DocumentCategory'
          nullable: true
          description: New category to apply to all documents (null to keep 
            unchanged)
        addTags:
          type: array
          items:
            type: string
          nullable: true
          description: Tags to add to all documents (null to skip adding)
        removeTags:
          type: array
          items:
            type: string
          nullable: true
          description: Tags to remove from all documents (null to skip removing)
    BulkUpdateResponse:
      description: Response reporting bulk update results with success and 
        failure details
      type: object
      additionalProperties: false
      required:
      - succeeded
      - failed
      properties:
        succeeded:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of documents successfully updated
        failed:
          type: array
          items:
            $ref: '#/components/schemas/BulkOperationFailure'
          description: Details of documents that failed to update
    BundleFormat:
      type: string
      enum:
      - Bannou
      - Zip
      description: Bundle file format
    BundleInfo:
      type: object
      additionalProperties: false
      description: Complete metadata for an asset bundle (API response model)
      required:
      - bundleId
      - bundleType
      - version
      - metadataVersion
      - status
      - assetCount
      - createdAt
      properties:
        bundleId:
          type: string
          description: Human-readable bundle identifier (e.g., 
            "synty/polygon-adventure", "my-bundle-v1")
        bundleType:
          $ref: '#/components/schemas/BundleType'
          description: Whether source or metabundle
        version:
          type: string
          description: Bundle content version string
        metadataVersion:
          type: integer
          description: Metadata version number (increments on metadata changes)
        name:
          type: string
          nullable: true
          description: Human-readable bundle name
        description:
          type: string
          nullable: true
          description: Bundle description
        ownerType:
          allOf:
          - $ref: '#/components/schemas/AssetOwnerType'
          nullable: true
          description: Type of owner (null for system-owned bundles)
        ownerId:
          type: string
          nullable: true
          description: Owner identifier - session ID or service name (null for 
            system-owned bundles)
        realm:
          allOf:
          - $ref: '#/components/schemas/GameRealm'
          nullable: true
          description: Game realm this bundle belongs to. Null for cross-realm 
            bundles.
        tags:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Key-value tags for categorization and filtering
        status:
          $ref: '#/components/schemas/BundleLifecycle'
          description: Bundle lifecycle status
        assetCount:
          type: integer
          description: Number of assets in the bundle
        sizeBytes:
          type: integer
          format: int64
          nullable: true
          description: Bundle file size in bytes (null if not yet calculated)
        createdAt:
          type: string
          format: date-time
          description: When the bundle was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the bundle metadata was last updated
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: When the bundle was soft-deleted (null if active)
    BundleLifecycle:
      type: string
      enum:
      - Active
      - Deleted
      - Processing
      description: |
        Bundle lifecycle status:
        - active: Bundle is available for use
        - deleted: Bundle has been soft-deleted (within retention period)
        - processing: Bundle is being processed (metabundle creation)
    BundleManifestPreview:
      type: object
      additionalProperties: false
      description: Preview of bundle manifest for validation
      required:
      - bundleId
      - version
      - assetCount
      properties:
        bundleId:
          type: string
          description: Human-readable bundle identifier from the manifest
        version:
          type: string
          description: Bundle version from the manifest
        assetCount:
          type: integer
          description: Number of assets declared in the manifest
    BundleSortField:
      type: string
      enum:
      - CreatedAt
      - UpdatedAt
      - Name
      - Size
      description: Fields available for sorting bundle query results
    BundleStatus:
      type: string
      enum:
      - Queued
      - Processing
      - Ready
      - Failed
      - Cancelled
      description: |
        Bundle processing status:
        - queued: Bundle creation is queued for processing
        - processing: Bundle is being processed
        - ready: Bundle is ready for download
        - failed: Bundle creation failed
        - cancelled: Bundle creation was cancelled
    BundleSummary:
      type: object
      additionalProperties: false
      description: Summary information about a bundle
      required:
      - bundleId
      - bundleType
      - version
      - assetCount
      properties:
        bundleId:
          type: string
          description: Human-readable bundle identifier
        bundleType:
          $ref: '#/components/schemas/BundleType'
          description: Source or metabundle
        version:
          type: string
          description: Bundle version
        assetCount:
          type: integer
          description: Number of assets in bundle
        sizeBytes:
          type: integer
          format: int64
          nullable: true
          description: Bundle file size
        realm:
          allOf:
          - $ref: '#/components/schemas/GameRealm'
          nullable: true
          description: Game realm. Null for cross-realm bundles.
        createdAt:
          type: string
          format: date-time
          nullable: true
          description: When the bundle was created
    BundleType:
      type: string
      enum:
      - Source
      - Metabundle
      description: |
        Bundle category:
        - source: Original bundle (uploaded or server-created from assets)
        - metabundle: Composed from other bundles server-side
    BundleUploadRequest:
      description: Request to upload a pre-built asset bundle file
      type: object
      additionalProperties: false
      required:
      - filename
      - size
      - ownerType
      - ownerId
      properties:
        ownerType:
          $ref: '#/components/schemas/AssetOwnerType'
          description: Type of owner uploading this bundle
        ownerId:
          type: string
          description: |
            Owner identifier. For Session type: the WebSocket session ID (UUID format).
            For Service type: the service name (e.g., "behavior", "orchestrator").
        filename:
          type: string
          description: Must end with .bannou or .zip
        size:
          type: integer
          format: int64
          description: Bundle file size in bytes
        manifestPreview:
          allOf:
          - $ref: '#/components/schemas/BundleManifestPreview'
          nullable: true
          description: Optional preview of bundle manifest for validation
    BundleVersionRecord:
      type: object
      additionalProperties: false
      description: A single version record in bundle history
      required:
      - version
      - createdAt
      - createdBy
      - changes
      properties:
        version:
          type: integer
          description: Version number
        createdAt:
          type: string
          format: date-time
          description: When this version was created
        createdBy:
          type: string
          description: Session ID or service name that made the change
        changes:
          type: array
          items:
            type: string
          description: List of changes in this version
        reason:
          type: string
          nullable: true
          description: Reason provided for the change
        snapshot:
          allOf:
          - $ref: '#/components/schemas/BundleInfo'
          nullable: true
          description: Full metadata snapshot at this version (only for current 
            version)
    BundleWithDownloadUrl:
      description: Bundle metadata combined with a pre-signed download URL
      type: object
      additionalProperties: false
      required:
      - bundleId
      - version
      - downloadUrl
      - format
      - expiresAt
      - size
      - assetCount
      - fromCache
      properties:
        bundleId:
          type: string
          description: Human-readable bundle identifier (e.g., 
            "synty/polygon-adventure", "my-bundle-v1")
        version:
          type: string
          description: Bundle version string
        downloadUrl:
          type: string
          format: uri
          description: Pre-signed URL for downloading the bundle
        format:
          $ref: '#/components/schemas/BundleFormat'
          description: Format of the downloadable bundle
        expiresAt:
          type: string
          format: date-time
          description: When the download URL expires
        size:
          type: integer
          format: int64
          description: Bundle file size in bytes
        assetCount:
          type: integer
          description: Number of assets contained in the bundle
        fromCache:
          type: boolean
          description: True if ZIP format was served from conversion cache
    CadenceInfo:
      description: Information about a cadence
      type: object
      additionalProperties: false
      required:
      - type
      - position
      properties:
        type:
          $ref: '#/components/schemas/CadenceType'
          description: Cadence type
        position:
          type: integer
          description: Chord index where cadence ends
        strength:
          $ref: '#/components/schemas/CadenceStrength'
          nullable: true
          description: Cadence strength
    CadenceStrength:
      description: Strength of a cadence
      type: string
      enum:
      - Perfect
      - Imperfect
    CadenceType:
      description: Type of harmonic cadence
      type: string
      enum:
      - Authentic
      - Half
      - Plagal
      - Deceptive
    CalculateConversionRequest:
      type: object
      description: Request to preview a currency conversion
      additionalProperties: false
      required:
      - fromCurrencyId
      - toCurrencyId
      - fromAmount
      properties:
        fromCurrencyId:
          type: string
          format: uuid
          description: Source currency definition ID
        toCurrencyId:
          type: string
          format: uuid
          description: Target currency definition ID
        fromAmount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
          description: Amount to convert (must be positive)
    CalculateConversionResponse:
      type: object
      description: Conversion preview result
      additionalProperties: false
      required:
      - toAmount
      - effectiveRate
      - baseCurrency
      - conversionPath
      properties:
        toAmount:
          type: number
          format: double
          description: Amount that would be received
        effectiveRate:
          type: number
          format: double
          description: Effective conversion rate applied
        conversionPath:
          type: array
          items:
            $ref: '#/components/schemas/ConversionStep'
          description: Steps in the conversion
        baseCurrency:
          type: string
          description: Base currency used for conversion
    CalculateRouteRequest:
      type: object
      additionalProperties: false
      description: Request to calculate route options between two locations 
        (pure computation)
      required:
      - fromLocationId
      - toLocationId
      properties:
        fromLocationId:
          type: string
          format: uuid
          description: Starting location
        toLocationId:
          type: string
          format: uuid
          description: Destination location
        modeCode:
          type: string
          nullable: true
          description: Specific mode to calculate for. Null means try all modes.
        preferMultiModal:
          type: boolean
          default: false
          description: When true, selects best mode per leg
        entityId:
          type: string
          format: uuid
          nullable: true
          description: Entity for discovery filtering. When provided, 
            discoverable connections are filtered to only those this entity has 
            discovered. Null means discoverable connections are excluded 
            entirely.
        maxLegs:
          type: integer
          nullable: true
          minimum: 1
          description: Maximum legs to consider. Uses service config default if 
            null.
        sortBy:
          allOf:
          - $ref: '#/components/schemas/RouteSortBy'
          nullable: true
          description: Sort criteria for results. Defaults to fastest.
        maxOptions:
          type: integer
          nullable: true
          minimum: 1
          description: Maximum route options to return. Uses service config 
            default if null.
        includeSeasonalClosed:
          type: boolean
          default: false
          description: Whether to include currently seasonally closed routes
    CalculateRouteResponse:
      type: object
      additionalProperties: false
      description: Response containing calculated route options
      required:
      - options
      properties:
        options:
          type: array
          description: Route options ranked by sort criteria
          items:
            $ref: '#/components/schemas/TransitRouteOption'
    CalendarTemplateResponse:
      type: object
      additionalProperties: false
      description: A calendar template definition with computed summary fields
      required:
      - templateCode
      - gameServiceId
      - gameHoursPerDay
      - dayPeriods
      - months
      - seasons
      - daysPerYear
      - monthsPerYear
      - seasonsPerYear
      properties:
        templateCode:
          type: string
          minLength: 1
          maxLength: 128
          description: Calendar template identifier
        gameServiceId:
          type: string
          format: uuid
          description: Game service this calendar belongs to
        gameHoursPerDay:
          type: integer
          minimum: 1
          description: Number of game hours in a day
        dayPeriods:
          type: array
          items:
            $ref: '#/components/schemas/DayPeriodDefinition'
          description: Named time-of-day periods
        months:
          type: array
          items:
            $ref: '#/components/schemas/MonthDefinition'
          description: Ordered list of months in a year
        seasons:
          type: array
          items:
            $ref: '#/components/schemas/SeasonDefinition'
          description: Ordered list of seasons in a year
        daysPerYear:
          type: integer
          description: Computed total days per year (sum of all months' 
            daysInMonth)
        monthsPerYear:
          type: integer
          description: Computed number of months per year
        seasonsPerYear:
          type: integer
          description: Computed number of seasons per year
        eraLabels:
          type: array
