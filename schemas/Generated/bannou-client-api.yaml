      description: Request to create a new scene
      required:
      - scene
      properties:
        scene:
          $ref: '#/components/schemas/Scene'
          description: The scene document to create
    CreateSeedRequest:
      type: object
      additionalProperties: false
      description: Request to create a new seed.
      required:
      - ownerId
      - ownerType
      - seedTypeCode
      properties:
        ownerId:
          type: string
          format: uuid
          description: The entity that owns this seed.
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Owner entity type discriminator.
        seedTypeCode:
          type: string
          minLength: 1
          description: Registered seed type code (e.g., "guardian", 
            "dungeon_core").
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: >-
            Game service this seed is scoped to. Null for cross-game seed types
            that are not scoped to any single game service.
        displayName:
          type: string
          nullable: true
          description: Human-readable name. Auto-generated if omitted.
        metadata:
          type: object
          additionalProperties: true
          nullable: true
