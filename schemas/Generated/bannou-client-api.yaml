            repo is empty)
        documentsCreated:
          type: integer
          description: Number of new documents created
        documentsUpdated:
          type: integer
          description: Number of existing documents updated
        documentsDeleted:
          type: integer
          description: Number of documents deleted
        documentsFailed:
          type: integer
          description: Number of documents that failed to process
        durationMs:
          type: integer
