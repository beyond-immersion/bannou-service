            etc.)
    ThemeConfig:
      description: Visual theme configuration including colors, fonts, and 
        navigation
      type: object
      additionalProperties: false
      required:
      - themeName
      - primaryColor
      properties:
        themeName:
          type: string
          description: Name of the active theme
        primaryColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Primary brand color in hex format
        secondaryColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Secondary brand color in hex format
        backgroundColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Default background color in hex format
        textColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Default text color in hex format
        fontFamily:
          type: string
          description: Primary font family for the site
        customCSS:
          type: string
          nullable: true
          description: Additional custom CSS styles
        logo:
          description: Site logo configuration for branding
          $ref: '#/components/schemas/Logo'
        favicon:
          type: string
          format: uri
          nullable: true
          description: URL of the site favicon
        navigation:
          type: array
          items:
            $ref: '#/components/schemas/NavigationItem'
          description: Main navigation menu items
    TicketStatus:
      type: string
      description: Current status of a matchmaking ticket
      enum:
      - Searching
      - MatchFound
      - MatchAccepted
      - Cancelled
      - Expired
    TimeCommitmentType:
      type: string
      description: Type of time commitment for scheduling constraints
      enum:
      - Exclusive
      - Partial
    TimeRatioChangeReason:
      type: string
      description: Why the time ratio was changed
      enum:
      - Initial
      - AdminAdjustment
      - Event
      - Pause
      - Resume
    TimeSignatureEvent:
      x-sdk-type: BeyondImmersion.Bannou.MusicTheory.Output.TimeSignatureEvent
      description: A time signature change event
      type: object
      additionalProperties: false
      required:
      - tick
      - numerator
      - denominator
      properties:
        tick:
          type: integer
          minimum: 0
          description: Tick position
        numerator:
          type: integer
          minimum: 1
          maximum: 32
          description: Beats per measure
        denominator:
          type: integer
          minimum: 1
          maximum: 32
          description: Beat unit (4 = quarter, 8 = eighth)
    TraitAxis:
      type: string
      description: |
        Core personality trait axes. Each represents a spectrum from -1.0 to +1.0.
        Based on psychological research (Big Five + game-relevant extensions).
      enum:
      - Openness
      - Conscientiousness
      - Extraversion
      - Agreeableness
      - Neuroticism
      - Honesty
      - Aggression
      - Loyalty
    TraitSnapshot:
      type: object
      additionalProperties: false
      description: Snapshot of a personality trait
      required:
      - axis
      - value
      properties:
        axis:
          type: string
          description: Trait axis name (e.g., AGGRESSION, OPENNESS)
        value:
          type: number
          format: float
          description: Trait value (-1.0 to 1.0)
    TraitValue:
      type: object
      description: A single personality trait with its current value and 
        evolution history
      additionalProperties: false
      required:
      - axis
      - value
      properties:
        axis:
          $ref: '#/components/schemas/TraitAxis'
          description: The personality axis this value represents
        value:
          type: number
          format: float
          minimum: -1.0
          maximum: 1.0
          description: Current trait value on the spectrum (-1.0 to +1.0)
        lastChangedAt:
          type: string
          format: date-time
          nullable: true
          description: When this trait last evolved (null if never changed since
            creation)
        changeCount:
          type: integer
          default: 0
          minimum: 0
          description: Number of times this trait has evolved
    TransactionType:
      type: string
      description: Classification of the currency transaction
      enum:
      - Mint
      - QuestReward
      - LootDrop
      - VendorSale
      - Autogain
      - Refund
      - ConversionCredit
      - Burn
      - VendorPurchase
      - Fee
      - Expiration
      - CapOverflow
      - ConversionDebit
      - Transfer
      - Trade
      - Gift
      - EscrowDeposit
      - EscrowRelease
      - EscrowRefund
    TransferContractPartyRequest:
      type: object
      description: Request to transfer a party role to a new entity
      additionalProperties: false
      required:
      - contractInstanceId
      - fromEntityId
      - fromEntityType
      - toEntityId
      - toEntityType
      - guardianId
      - guardianType
      properties:
        contractInstanceId:
          type: string
          format: uuid
          description: Contract instance ID
        fromEntityId:
          type: string
          format: uuid
          description: Current party entity ID
        fromEntityType:
          $ref: '#/components/schemas/EntityType'
          description: Current party entity type
        toEntityId:
          type: string
          format: uuid
          description: New entity ID to receive the role
        toEntityType:
          $ref: '#/components/schemas/EntityType'
          description: New entity type
        guardianId:
          type: string
          format: uuid
          description: Guardian entity ID (must be current guardian)
        guardianType:
          type: string
          maxLength: 64
          description: Guardian entity type
        idempotencyKey:
          type: string
          maxLength: 64
          nullable: true
          description: Optional idempotency key for the operation
    TransferContractPartyResponse:
      type: object
      description: Response from transferring a party role. HTTP 200 confirms 
        the transfer succeeded.
      additionalProperties: false
      required:
      - contractId
      - role
      - fromEntityId
      - toEntityId
      properties:
        contractId:
          type: string
          format: uuid
          description: Contract instance ID
        role:
          type: string
          description: Role that was transferred
        fromEntityId:
          type: string
          format: uuid
          description: Previous party entity ID
        toEntityId:
          type: string
          format: uuid
          description: New party entity ID
    TransferLocationToRealmRequest:
      description: Request to transfer a location from its current realm to a 
        different realm
      type: object
      additionalProperties: false
      required:
      - locationId
      - targetRealmId
      properties:
        locationId:
          type: string
          format: uuid
          description: ID of the location to transfer
        targetRealmId:
          type: string
          format: uuid
          description: ID of the target realm to transfer the location to
    Transform:
      type: object
      additionalProperties: false
      description: Position, rotation, and scale in 3D space
      required:
      - position
      - rotation
      - scale
      properties:
        position:
          $ref: '#/components/schemas/Vector3'
          description: Position relative to parent
        rotation:
          $ref: '#/components/schemas/Quaternion'
          description: Rotation relative to parent
        scale:
          $ref: '#/components/schemas/Vector3'
          description: Scale relative to parent
    TransitConnection:
      type: object
      additionalProperties: false
      description: A connection (edge) between two locations in the transit 
        connectivity graph
      required:
      - id
      - fromLocationId
      - toLocationId
      - bidirectional
      - distanceKm
      - terrainType
      - compatibleModes
      - baseRiskLevel
      - status
      - statusChangedAt
      - discoverable
      - fromRealmId
      - toRealmId
      - crossRealm
      - createdAt
      - modifiedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this connection
        fromLocationId:
          type: string
          format: uuid
          description: Starting location (Location service entity)
        toLocationId:
          type: string
          format: uuid
          description: Ending location (Location service entity)
        bidirectional:
          type: boolean
          description: Whether this connection is traversable both ways
        distanceKm:
          type: number
          format: decimal
          minimum: 0.01
          description: Distance in game-kilometers
        terrainType:
          type: string
          description: Terrain classification (e.g., "road", "trail", "forest", 
            "mountain", "river"). Category B content code.
        compatibleModes:
          type: array
          description: Transit mode codes that can use this connection. Empty 
            means walking only.
          items:
            type: string
        seasonalAvailability:
          type: array
          nullable: true
          description: Per-season availability restrictions. Season codes must 
            match the realm's Worldstate calendar template. Null means always 
            available.
          items:
            $ref: '#/components/schemas/SeasonalAvailabilityEntry'
        baseRiskLevel:
          type: number
          format: decimal
          minimum: 0
          maximum: 1
          description: Base risk level from 0.0 (safe) to 1.0 (extremely 
            dangerous)
        riskDescription:
          type: string
          nullable: true
          description: Human-readable risk description (e.g., "Bandit 
            territory", "Avalanche prone"). Null means no specific risk.
        status:
          allOf:
          - $ref: '#/components/schemas/ConnectionStatus'
          description: Current operational status of this connection
        statusReason:
          type: string
          nullable: true
          description: Why the connection is in its current status. Null when 
            open with no special reason.
        statusChangedAt:
          type: string
          format: date-time
          description: When the status was last changed
        discoverable:
          type: boolean
          description: Whether this connection requires discovery. False means 
            common knowledge visible to all route queries.
        name:
          type: string
          nullable: true
          description: Human-readable connection name (e.g., "The King's Road", 
            "Serpent River")
        code:
          type: string
          nullable: true
          description: Unique code for lookup (e.g., "kings_road")
        tags:
          type: array
          nullable: true
          description: Freeform classification tags (e.g., "trade_route", 
            "military", "smuggler_path"). Null means no tags.
          items:
            type: string
        fromRealmId:
          type: string
          format: uuid
          description: Realm of fromLocationId (derived, not caller-specified)
        toRealmId:
          type: string
          format: uuid
          description: Realm of toLocationId (derived, not caller-specified)
        crossRealm:
          type: boolean
          description: Whether fromRealmId differs from toRealmId (derived 
            convenience flag)
        createdAt:
          type: string
          format: date-time
          description: When this connection was created
        modifiedAt:
          type: string
          format: date-time
          description: When this connection was last modified
    TransitInterruption:
      type: object
      additionalProperties: false
      description: A recorded interruption during a journey
      required:
      - legIndex
      - gameTime
      - reason
      - durationGameHours
      - resolved
      properties:
        legIndex:
          type: integer
          description: Which leg was interrupted (0-based index)
        gameTime:
          type: number
          format: decimal
          description: Game-time when the interruption occurred
        reason:
          type: string
          description: Reason for interruption (e.g., "bandit_attack", "storm", 
            "breakdown", "encounter")
        durationGameHours:
          type: number
          format: decimal
          minimum: 0
          description: How long the interruption lasted in game-hours. 0 if 
            unresolved or resolved immediately.
        resolved:
          type: boolean
          description: Whether travel resumed after this interruption. Stored 
            entity state, not derivable from durationGameHours.
    TransitJourney:
      type: object
      additionalProperties: false
      description: An active or completed transit journey tracking entity 
        movement across connections
      required:
      - id
      - entityId
      - entityType
      - legs
      - currentLegIndex
      - primaryModeCode
      - effectiveSpeedKmPerGameHour
      - plannedDepartureGameTime
      - estimatedArrivalGameTime
      - originLocationId
      - destinationLocationId
      - currentLocationId
      - status
      - interruptions
      - partySize
      - cargoWeightKg
      - createdAt
      - modifiedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this journey
        entityId:
          type: string
          format: uuid
          description: Entity that is traveling
        entityType:
          type: string
          description: Type of traveling entity (e.g., "character", "npc", 
            "caravan", "army", "creature"). Category B content code.
        legs:
          type: array
          description: Ordered list of connections to traverse
          items:
            $ref: '#/components/schemas/TransitJourneyLeg'
        currentLegIndex:
          type: integer
          description: Which leg the entity is currently on (0-based)
        primaryModeCode:
          type: string
          description: Primary transit mode for this journey
        effectiveSpeedKmPerGameHour:
          type: number
          format: decimal
          description: Current effective speed accounting for modifiers
        plannedDepartureGameTime:
          type: number
          format: decimal
          description: Game-time timestamp of planned departure
        actualDepartureGameTime:
          type: number
          format: decimal
          nullable: true
          description: Game-time timestamp of actual departure. Null if not yet 
            departed.
        estimatedArrivalGameTime:
          type: number
          format: decimal
          description: Estimated arrival game-time based on route, speed, and 
            worldstate
        actualArrivalGameTime:
          type: number
          format: decimal
          nullable: true
          description: Game-time timestamp of actual arrival. Null if not yet 
            arrived.
        originLocationId:
          type: string
          format: uuid
          description: Starting location
        destinationLocationId:
          type: string
          format: uuid
          description: Final destination
        currentLocationId:
          type: string
          format: uuid
          description: Last known position (most recently departed-from or 
            arrived-at location)
        status:
          allOf:
          - $ref: '#/components/schemas/JourneyStatus'
          description: Current journey lifecycle status
        statusReason:
          type: string
          nullable: true
          description: Reason for interruption or abandonment. Null for normal 
            status transitions.
        interruptions:
          type: array
          description: Recorded interruptions during this journey
          items:
            $ref: '#/components/schemas/TransitInterruption'
        partySize:
          type: integer
          minimum: 1
          description: Number of entities traveling together
        cargoWeightKg:
          type: number
          format: decimal
          minimum: 0
          description: Total cargo weight affecting speed on some modes
        createdAt:
          type: string
          format: date-time
          description: When this journey was created
        modifiedAt:
          type: string
          format: date-time
          description: When this journey was last modified
    TransitJourneyLeg:
      type: object
      additionalProperties: false
      description: A single leg of a journey following one connection
      required:
      - connectionId
      - fromLocationId
      - toLocationId
      - modeCode
      - distanceKm
      - terrainType
      - estimatedDurationGameHours
      - status
      properties:
        connectionId:
          type: string
          format: uuid
          description: Transit connection this leg follows
        fromLocationId:
          type: string
          format: uuid
          description: Starting location of this leg
        toLocationId:
          type: string
          format: uuid
          description: Ending location of this leg
        modeCode:
          type: string
          description: Transit mode for this leg. May differ from the journey's 
            primaryModeCode for multi-modal journeys.
        distanceKm:
          type: number
          format: decimal
          minimum: 0.01
          description: Distance in game-kilometers (copied from connection)
        terrainType:
          type: string
          description: Terrain type of this leg's connection. Category B content
            code.
        estimatedDurationGameHours:
          type: number
          format: decimal
          minimum: 0
          description: Estimated duration for this leg in game-hours
        waypointTransferTimeGameHours:
          type: number
          format: decimal
          nullable: true
          minimum: 0
          description: Delay at the waypoint before starting this leg. Models 
            intra-location transfer time (disembarking, changing mounts, 
            crossing a city). Null or 0 means no delay.
        status:
          allOf:
          - $ref: '#/components/schemas/JourneyLegStatus'
          description: Current status of this journey leg
        completedAtGameTime:
          type: number
          format: decimal
          nullable: true
          description: Game-time when this leg was completed. Null if pending or
            in_progress.
    TransitMode:
      type: object
      additionalProperties: false
      description: A transit mode defining movement capabilities (e.g., walking,
        horseback, wagon)
      required:
      - code
      - name
      - description
      - baseSpeedKmPerGameHour
      - passengerCapacity
      - cargoCapacityKg
      - compatibleTerrainTypes
      - requirements
      - fatigueRatePerGameHour
      - noiseLevelNormalized
      - isDeprecated
      - createdAt
      - modifiedAt
      properties:
        code:
          type: string
          description: Unique string identifier for this mode (e.g., "walking", 
            "horseback", "wagon")
        name:
          type: string
          description: Human-readable display name
        description:
          type: string
          description: Detailed description of this transit mode
        baseSpeedKmPerGameHour:
          type: number
          format: decimal
          minimum: 0.1
          description: Base speed in game-kilometers per game-hour. Used when no
            terrain-specific speed modifier is defined.
        terrainSpeedModifiers:
          type: array
          nullable: true
          description: Per-terrain speed multipliers. Null means base speed 
            applies uniformly across all compatible terrain.
          items:
            $ref: '#/components/schemas/TerrainSpeedModifier'
        passengerCapacity:
          type: integer
          minimum: 1
          description: How many entities can ride (1 for horse, 20 for ship)
        cargoCapacityKg:
          type: number
          format: decimal
          minimum: 0
          description: Weight capacity in game-kg (0 for walking, 500 for wagon)
        cargoSpeedPenaltyRate:
          type: number
          format: decimal
          nullable: true
          minimum: 0
          maximum: 1
          description: Per-mode cargo speed penalty rate. Overrides the 
            plugin-level DefaultCargoSpeedPenaltyRate. Null means use plugin 
            config default. 0.0 means no cargo penalty.
        compatibleTerrainTypes:
          type: array
          description: Terrain types this mode can traverse. Empty array means 
            all terrain (e.g., walking, flying).
          items:
            type: string
        validEntityTypes:
          type: array
          nullable: true
          description: Entity types allowed to use this mode. Null means no 
            entity type restriction. Characters are not exempt.
          items:
            type: string
        requirements:
          allOf:
          - $ref: '#/components/schemas/TransitModeRequirements'
          description: Requirements that must be met to use this mode
        fatigueRatePerGameHour:
          type: number
          format: decimal
          minimum: 0
          description: Stamina cost per game-hour of travel (0 = no fatigue)
        noiseLevelNormalized:
          type: number
          format: decimal
          minimum: 0
          maximum: 1
          description: Noise level from 0.0 (silent) to 1.0 (loud) affecting 
            detection risk
        realmRestrictions:
          type: array
          nullable: true
          description: Realm IDs where this mode is available. Null means 
            available in all realms.
          items:
            type: string
            format: uuid
        isDeprecated:
          type: boolean
          description: Whether this mode is deprecated
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: When deprecation occurred. Null if not deprecated.
        deprecationReason:
          type: string
          nullable: true
          description: Why this mode was deprecated. Null if not deprecated.
        tags:
          type: array
          nullable: true
          description: Freeform classification tags (e.g., "mount", "vehicle", 
            "magical", "aquatic"). Null means no tags.
          items:
            type: string
        createdAt:
          type: string
          format: date-time
          description: When this mode was registered
        modifiedAt:
          type: string
          format: date-time
          description: When this mode was last modified
    TransitModeRequirements:
      type: object
      additionalProperties: false
      description: Requirements that must be met to use a transit mode (applies 
        to character entities only)
      properties:
        requiredItemTag:
          type: string
          nullable: true
          description: Item tag required to use this mode (e.g., "mount_horse").
            Null means no item needed.
        allowedSpeciesCodes:
          type: array
          nullable: true
          description: Species codes allowed to use this mode. Null means any 
            species.
          items:
            type: string
        excludedSpeciesCodes:
          type: array
          nullable: true
          description: Species codes that cannot use this mode. Null means no 
            exclusions.
          items:
            type: string
        minimumPartySize:
          type: integer
          minimum: 1
          default: 1
          description: Minimum party size required (e.g., ocean_vessel requires 
            crew of 3)
        maximumEntitySizeCategory:
          type: string
          nullable: true
          description: Maximum entity size category allowed (e.g., "small", 
            "medium", "large"). Category B content code. Null means no size 
            restriction.
    TransitRouteOption:
      type: object
      additionalProperties: false
      description: A computed route option returned by route calculation (not 
        persisted)
      required:
      - waypoints
      - connections
      - legCount
      - primaryModeCode
      - legModes
      - totalDistanceKm
      - totalGameHours
      - totalRealMinutes
      - averageRisk
      - maxLegRisk
      - allLegsOpen
      - rank
      properties:
        waypoints:
          type: array
          description: Ordered location IDs from source to destination
          items:
            type: string
            format: uuid
        connections:
          type: array
          description: Ordered connection IDs
          items:
            type: string
            format: uuid
        legCount:
          type: integer
          description: Number of legs in this route
        primaryModeCode:
          type: string
          description: Dominant transit mode for this option
        legModes:
          type: array
          description: Per-leg mode codes (may differ from primary on 
            multi-modal routes)
          items:
            type: string
        totalDistanceKm:
          type: number
          format: decimal
          description: Sum of all leg distances in game-kilometers
        totalGameHours:
          type: number
          format: decimal
          description: Estimated total travel time in game-hours (includes 
            waypoint transfer times)
        totalRealMinutes:
          type: number
          format: decimal
          description: Approximate real-time equivalent at current time ratio 
            (may change during travel)
        averageRisk:
          type: number
          format: decimal
          description: Weighted average risk across legs
        maxLegRisk:
          type: number
          format: decimal
          description: Highest risk on any single leg
        allLegsOpen:
          type: boolean
          description: Whether all legs are currently open
        seasonalWarnings:
          type: array
          nullable: true
          description: Warnings for legs with upcoming seasonal closures. Null 
            means no warnings.
          items:
            $ref: '#/components/schemas/SeasonalRouteWarning'
        rank:
          type: integer
          description: Rank within results (1 = best option by sort criteria)
    TrashcanItem:
      description: A deleted document in the trashcan with expiration 
        information
      type: object
      additionalProperties: false
      required:
      - documentId
      - title
      - deletedAt
      - expiresAt
      properties:
        documentId:
          type: string
          format: uuid
          description: Unique identifier of the deleted document
        slug:
          type: string
          nullable: true
          description: URL-friendly slug of the deleted document (null if slug 
            was reused)
        title:
          type: string
          description: Title of the deleted document
        category:
          $ref: '#/components/schemas/DocumentCategory'
          nullable: true
          description: Category of the deleted document (null if uncategorized)
        deletedAt:
          type: string
          format: date-time
          description: Timestamp when the document was deleted
        expiresAt:
          type: string
          format: date-time
          description: Timestamp when the document will be permanently deleted
    TriggerCondition:
      type: object
      additionalProperties: false
      description: A condition that must be met for scenario triggering
      required:
      - conditionType
      properties:
        conditionType:
          $ref: '#/components/schemas/TriggerConditionType'
          description: Type of condition to evaluate
        traitAxis:
          type: string
          nullable: true
          description: Personality trait axis for TraitRange (e.g., AGGRESSION)
        traitMin:
          type: number
          format: float
          nullable: true
          description: Minimum trait value for TraitRange (-1.0 to 1.0)
        traitMax:
          type: number
          format: float
          nullable: true
          description: Maximum trait value for TraitRange (-1.0 to 1.0)
        backstoryType:
          type: string
          nullable: true
          description: Backstory element type for BackstoryElement (e.g., 
            TRAUMA)
        backstoryKey:
          type: string
          nullable: true
          description: Backstory element key for BackstoryElement
        relationshipTypeCode:
          type: string
          nullable: true
          description: Relationship type code for RelationshipExists/Missing
        otherEntityType:
          type: string
          nullable: true
          description: Type of other entity in relationship check
        ageMin:
          type: integer
          nullable: true
          description: Minimum character age for AgeRange
        ageMax:
          type: integer
          nullable: true
          description: Maximum character age for AgeRange
        locationId:
          type: string
          format: uuid
          nullable: true
          description: Required location ID for LocationAt
        timeOfDayMin:
          type: integer
          minimum: 0
          maximum: 23
          nullable: true
          description: Minimum hour of day (0-23) for TimeOfDay
        timeOfDayMax:
          type: integer
          minimum: 0
          maximum: 23
          nullable: true
          description: Maximum hour of day (0-23) for TimeOfDay
        worldStateKey:
          type: string
          nullable: true
          description: Custom state key for WorldState/Custom
        worldStateValue:
          type: string
          nullable: true
          description: Expected value for WorldState/Custom
    TriggerConditionType:
      type: string
      enum:
      - TraitRange
      - BackstoryElement
      - RelationshipExists
      - RelationshipMissing
      - AgeRange
      - LocationAt
      - TimeOfDay
      - WorldState
      - Custom
      description: |
        Types of trigger conditions for scenario activation.
        TraitRange: Character trait within value range
        BackstoryElement: Character has specific backstory element
        RelationshipExists: Relationship exists between entities
        RelationshipMissing: Relationship does not exist
        AgeRange: Character age within range
        LocationAt: Character at specific location
        TimeOfDay: In-game time within range
        WorldState: Custom world state check
