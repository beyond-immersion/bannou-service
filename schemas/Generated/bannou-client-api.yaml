    SeedTypeResponse:
      type: object
      additionalProperties: false
      description: Full seed type definition response.
      required:
      - seedTypeCode
      - displayName
      - description
      - maxPerOwner
      - allowedOwnerTypes
      - growthPhases
      - bondCardinality
      - bondPermanent
      - isDeprecated
      properties:
        seedTypeCode:
          type: string
          minLength: 1
          description: Unique type code.
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: >-
            Game service scope. Null for cross-game seed types.
        displayName:
          type: string
          minLength: 1
          description: Human-readable name.
        description:
          type: string
          minLength: 1
          description: Type description.
        maxPerOwner:
          type: integer
          description: Maximum seeds of this type per owner.
        allowedOwnerTypes:
          type: array
          items:
            $ref: '#/components/schemas/EntityType'
          description: Allowed owner entity types.
        growthPhases:
          type: array
          items:
            $ref: '#/components/schemas/GrowthPhaseDefinition'
          description: Phase definitions with thresholds.
        bondCardinality:
          type: integer
          description: Bond participant limit.
        bondPermanent:
          type: boolean
          description: Whether bonds of this type are permanent.
        capabilityRules:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityRule'
          nullable: true
          description: Capability computation rules.
        growthDecayEnabled:
          type: boolean
          nullable: true
          description: Whether unused growth domains decay over time for this 
            seed type. Null means using global config.
        growthDecayRatePerDay:
          type: number
          format: float
          nullable: true
          description: Daily decay rate for unused domains of this seed type. 
            Null means using global config.
        sameOwnerGrowthMultiplier:
          type: number
          format: float
          description: Fraction of growth applied to other seeds of the same 
            type owned by the same entity.
        collectionGrowthMappings:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/CollectionGrowthMapping'
          description: Collection-to-growth-domain mappings for this seed type. 
            Null if this type does not respond to collection unlocks.
        isDeprecated:
          type: boolean
          description: Whether this seed type is deprecated and cannot be used 
            for new seeds.
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this seed type was deprecated.
        deprecationReason:
          type: string
          nullable: true
          description: Optional reason for deprecation.
    SelectContentForAreaRequest:
