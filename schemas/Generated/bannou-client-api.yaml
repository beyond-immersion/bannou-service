      additionalProperties: false
      required:
      - relationshipTypeId
      properties:
        relationshipTypeId:
          type: string
          format: uuid
          description: ID of the relationship type to delete
    DeleteRoomRequest:
      type: object
      additionalProperties: false
      description: Request to permanently delete a room and all its messages
      required:
      - roomId
      properties:
        roomId:
          type: string
          format: uuid
          description: Room ID to delete
    DeleteSceneRequest:
      type: object
      additionalProperties: false
      description: Request to delete a scene
      required:
      - sceneId
      properties:
        sceneId:
          type: string
          format: uuid
          description: ID of the scene to delete
        reason:
          type: string
          nullable: true
          maxLength: 1000
          description: Optional reason for deletion (included in event)
    DeleteSceneResponse:
      type: object
      additionalProperties: false
      description: Response for scene deletion
      properties:
        referencingScenes:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: If deletion was blocked (409), IDs of scenes that 
            reference this one
    DeleteSeedTypeRequest:
      type: object
