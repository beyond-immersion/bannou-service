          description: Base speed in game-kilometers per game-hour
        terrainSpeedModifiers:
          type: array
          nullable: true
          description: Per-terrain speed multipliers. Null means base speed 
            applies uniformly.
          items:
            $ref: '#/components/schemas/TerrainSpeedModifier'
        passengerCapacity:
          type: integer
          minimum: 1
          description: How many entities can ride
        cargoCapacityKg:
          type: number
          format: decimal
          minimum: 0
          description: Weight capacity in game-kg
        cargoSpeedPenaltyRate:
          type: number
          format: decimal
          nullable: true
          minimum: 0
          maximum: 1
          description: Per-mode cargo speed penalty rate override. Null means 
            use plugin config default.
        compatibleTerrainTypes:
          type: array
          description: Terrain types this mode can traverse. Empty array means 
            all terrain.
          items:
            type: string
        validEntityTypes:
          type: array
          nullable: true
          description: Entity types allowed to use this mode. Null means no 
            restriction.
          items:
            type: string
        requirements:
          allOf:
          - $ref: '#/components/schemas/TransitModeRequirements'
          description: Requirements that must be met to use this mode
        fatigueRatePerGameHour:
          type: number
          format: decimal
          minimum: 0
          description: Stamina cost per game-hour of travel
        noiseLevelNormalized:
          type: number
          format: decimal
          minimum: 0
          maximum: 1
          description: Noise level from 0.0 (silent) to 1.0 (loud)
        realmRestrictions:
          type: array
          nullable: true
          description: Realm IDs where this mode is available. Null means all 
            realms.
          items:
            type: string
            format: uuid
        tags:
          type: array
          nullable: true
          description: Freeform classification tags
          items:
            type: string
    RegisterRequest:
      type: object
      description: Request to register a new user account
      additionalProperties: false
      required:
      - username
      - password
      - email
      properties:
        username:
          type: string
          description: Unique username for the account
          minLength: 3
          maxLength: 32
          pattern: '^[a-zA-Z0-9_]+$'
          example: "gameuser123"
        password:
          type: string
          description: Password for the account (will be hashed)
          minLength: 8
          maxLength: 128
          format: password
          example: "SecurePassword123!"
        email:
          type: string
          format: email
          description: Email address for account recovery and notifications
          example: "user@example.com"
    RegisterResponse:
      type: object
      description: Response from successful user registration
      additionalProperties: false
      required:
      - accountId
      - accessToken
      - connectUrl
      properties:
        accountId:
          type: string
          format: uuid
          description: Unique identifier for the newly created account
        accessToken:
          type: string
          description: JWT access token for immediate authentication
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJnYW1ldXNlcjEyMyIsImlhdCI6MTY0MDk5NTIwMCwiZXhwIjoxNjQwOTk4ODAwfQ.signature"
        refreshToken:
          type: string
          description: Refresh token for obtaining new access tokens
          nullable: true
          example: "refresh_token_abc123xyz789"
        connectUrl:
          type: string
          format: uri
          description: WebSocket endpoint for Connect service
    RegisterRoomTypeRequest:
      type: object
      additionalProperties: false
      description: Request to register a new room type definition
      required:
      - code
      - displayName
      - messageFormat
      - persistenceMode
      - allowAnonymousSenders
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[a-z][a-z0-9_]*$'
          description: Unique room type code (e.g., "text", "guild_board", 
            "trade_posting")
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable name for the room type
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: Optional description of the room type
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Game service scope (null for global types)
        messageFormat:
          $ref: '#/components/schemas/MessageFormat'
          description: Content format this room type accepts
        validatorConfig:
          allOf:
          - $ref: '#/components/schemas/ValidatorConfig'
          nullable: true
          description: Validation rules for messages (null uses format defaults)
        persistenceMode:
          $ref: '#/components/schemas/PersistenceMode'
          description: Message storage mode (ephemeral or persistent)
        defaultMaxParticipants:
          type: integer
          nullable: true
          minimum: 1
          description: Default participant limit (null uses service default)
        retentionDays:
          type: integer
          nullable: true
          minimum: 1
          description: Message retention in days (null uses service default)
        defaultContractTemplateId:
          type: string
          format: uuid
          nullable: true
          description: Default contract template for rooms of this type
        allowAnonymousSenders:
          type: boolean
          description: Whether null senderId is allowed in messages
        rateLimitPerMinute:
          type: integer
          nullable: true
          minimum: 1
          description: Messages per minute per participant (null uses service 
            default)
        metadata:
          type: string
          nullable: true
          description: Client-only metadata stored as JSON string. No Bannou 
            plugin reads specific keys from this field by convention.
    RegisterSchemaRequest:
      type: object
      additionalProperties: false
      description: Request to register a new save data schema with optional 
        migration rules
      required:
      - namespace
      - schemaVersion
      - schema
      properties:
        namespace:
          type: string
          minLength: 1
          maxLength: 64
          description: Schema namespace (e.g., game identifier)
        schemaVersion:
          type: string
          minLength: 1
          maxLength: 32
          description: Schema version identifier
        schema:
          type: object
          description: JSON Schema definition for validation
        previousVersion:
          type: string
          nullable: true
          description: Previous version this migrates from
        migrationPatch:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JsonPatchOperation'
          description: |
            JSON Patch (RFC 6902) operations to migrate from previousVersion.
            Uses JsonPatch.Net library (MIT licensed).
    RegisterSeedTypeRequest:
      type: object
      additionalProperties: false
      description: Request to register a new seed type definition.
      required:
      - seedTypeCode
      - displayName
      - description
      - maxPerOwner
      - allowedOwnerTypes
      - growthPhases
      - bondCardinality
      - bondPermanent
      properties:
        seedTypeCode:
          type: string
          minLength: 1
          description: Unique code for this seed type (e.g., "guardian", 
            "dungeon_core").
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: >-
            Game service this type is scoped to. Null for cross-game seed types
            that are not scoped to any single game service.
        displayName:
          type: string
          minLength: 1
          description: Human-readable name.
        description:
          type: string
          minLength: 1
          description: Description of what this seed type represents.
        maxPerOwner:
          type: integer
          minimum: 0
          description: Maximum seeds of this type per owner entity.
        allowedOwnerTypes:
          type: array
          items:
            $ref: '#/components/schemas/EntityType'
          minItems: 1
          description: Entity types that can own seeds of this type.
        growthPhases:
          type: array
          items:
            $ref: '#/components/schemas/GrowthPhaseDefinition'
          minItems: 1
          description: Ordered growth phase definitions with thresholds.
        bondCardinality:
          type: integer
          minimum: 0
          description: >
            Max bond participants. 0 = no bonding, 1 = pair bonds,
            N = group bonds of up to N+1 participants.
        bondPermanent:
          type: boolean
          description: >
            Whether bonds of this type are permanent (cannot be dissolved).
            True for guardian spirit pair bonds, false for dungeon-master
            bonds that can end when the contract dissolves.
          default: false
        capabilityRules:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityRule'
          nullable: true
          description: Rules for computing capabilities from growth domains.
        growthDecayEnabled:
          type: boolean
          nullable: true
          description: Whether unused growth domains decay over time for this 
            seed type. Falls back to global config if null.
        growthDecayRatePerDay:
          type: number
          format: float
          nullable: true
          description: Daily decay rate for unused domains of this seed type. 
            Falls back to global config if null.
        sameOwnerGrowthMultiplier:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
          description: Fraction of growth applied to other seeds of the same 
            type owned by the same entity. 0.0 = no sharing (default), 1.0 = 
            full mirror.
        collectionGrowthMappings:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/CollectionGrowthMapping'
          description: >
            Mappings from collection types to growth domains. When a collection entry
            is unlocked for an entity that owns seeds of this type, the entry's tags
            are matched against these mappings to determine growth contributions.
            Null means this seed type does not respond to collection unlocks.
    RelationshipListResponse:
      description: Paginated list of relationships with metadata for navigation
      type: object
      additionalProperties: false
      required:
      - relationships
      - totalCount
      - page
      - pageSize
      - hasNextPage
      - hasPreviousPage
      properties:
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/RelationshipResponse'
          description: List of relationships matching the query
        totalCount:
          type: integer
          description: Total number of relationships matching the query
        page:
          type: integer
          description: Current page number (1-based)
        pageSize:
          type: integer
          description: Number of results per page
        hasNextPage:
          type: boolean
          description: Whether there are more results on the next page
        hasPreviousPage:
          type: boolean
          description: Whether there are results on the previous page
    RelationshipResponse:
      description: Complete details of a relationship between two entities
      type: object
      additionalProperties: false
      required:
      - relationshipId
      - entity1Id
      - entity1Type
      - entity2Id
      - entity2Type
      - relationshipTypeId
      - startedAt
      - createdAt
      properties:
        relationshipId:
          type: string
          format: uuid
          description: Unique identifier of the relationship
        entity1Id:
          type: string
          format: uuid
          description: ID of the first entity in the relationship
        entity1Type:
          $ref: '#/components/schemas/EntityType'
          description: Type of the first entity in the relationship
        entity2Id:
          type: string
          format: uuid
          description: ID of the second entity in the relationship
        entity2Type:
          $ref: '#/components/schemas/EntityType'
          description: Type of the second entity in the relationship
        relationshipTypeId:
          type: string
          format: uuid
          description: Relationship type ID defining the kind of relationship
        startedAt:
          type: string
          format: date-time
          description: In-game timestamp when relationship started
        endedAt:
          type: string
          format: date-time
          nullable: true
          description: In-game timestamp when relationship ended, null if still 
            active
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Client-provided relationship data.
            No Bannou plugin reads specific keys from this field by convention.
        createdAt:
          type: string
          format: date-time
          description: System timestamp when the relationship record was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: System timestamp when the relationship record was last 
            updated
    RelationshipSnapshot:
      type: object
      additionalProperties: false
      description: Snapshot of a relationship
      required:
      - relationshipTypeCode
      - otherEntityId
      - otherEntityType
      properties:
        relationshipTypeCode:
          type: string
          description: Relationship type code
        otherEntityId:
          type: string
          format: uuid
          description: ID of other entity
        otherEntityType:
          type: string
          description: Type of other entity
    RelationshipTypeListResponse:
      description: Response containing a list of relationship types with total 
        count
      type: object
      additionalProperties: false
      required:
      - types
      - totalCount
      properties:
        types:
          type: array
          items:
            $ref: '#/components/schemas/RelationshipTypeResponse'
          description: List of relationship types matching the query
        totalCount:
          type: integer
          description: Total number of relationship types returned
    RelationshipTypeResponse:
      description: Complete representation of a relationship type including 
        hierarchy, inverse, and deprecation information
      type: object
      additionalProperties: false
      required:
      - relationshipTypeId
      - code
      - name
      - isBidirectional
      - isDeprecated
      - depth
      - createdAt
      - updatedAt
      properties:
        relationshipTypeId:
          type: string
          format: uuid
          description: Unique identifier of the relationship type
        code:
          type: string
          description: Unique code for the relationship type (e.g., "SON", 
            "MOTHER")
        name:
          type: string
          description: Human-readable display name for the relationship type
        description:
          type: string
          nullable: true
          description: Detailed description of the relationship type
        category:
          type: string
          nullable: true
          description: Category for grouping relationship types (e.g., "FAMILY",
            "SOCIAL")
        parentTypeId:
          type: string
          format: uuid
          nullable: true
          description: ID of the parent type in the hierarchy (null for root 
            types)
        parentTypeCode:
          type: string
          nullable: true
          description: Code of the parent type (for convenience)
        inverseTypeId:
          type: string
          format: uuid
          nullable: true
          description: ID of the inverse relationship type (e.g., PARENT is 
            inverse of CHILD)
        inverseTypeCode:
          type: string
          nullable: true
          description: Code of the inverse relationship type (for convenience)
        isBidirectional:
          type: boolean
          description: Whether the relationship is the same in both directions 
            (e.g., SIBLING)
        isDeprecated:
          type: boolean
          description: Whether this type is deprecated and cannot be used for 
            new relationships
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when this type was deprecated
        deprecationReason:
          type: string
          nullable: true
          description: Optional reason for deprecation
        depth:
          type: integer
          description: Depth in the hierarchy (0 for root types)
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Client-provided relationship type metadata.
            No Bannou plugin reads specific keys from this field by convention.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the relationship type was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the relationship type was last updated
    ReleaseAllocation:
      type: object
      additionalProperties: false
      description: Defines who gets what on release
      required:
      - recipientPartyId
      - recipientPartyType
      - assets
      properties:
        recipientPartyId:
          type: string
          format: uuid
          description: Party receiving assets
        recipientPartyType:
          $ref: '#/components/schemas/EntityType'
          description: Type of the recipient party
        assets:
          type: array
          items:
            $ref: '#/components/schemas/EscrowAsset'
          description: Assets this recipient should receive
        destinationWalletId:
          type: string
          format: uuid
          nullable: true
          description: Where to deliver currency
        destinationContainerId:
          type: string
          format: uuid
          nullable: true
          description: Where to deliver items
    ReleaseMode:
      type: string
      description: |
        Controls how release confirmation is handled:
        - immediate: Finalizing → Released (skip Releasing state entirely).
          ⚠️ WARNING: Use only for trusted/low-value scenarios (NPC vendors, system rewards).
          Assets are marked as released BEFORE downstream services confirm transfers.
          If downstream services fail, manual intervention may be required.
        - service_only: Wait for downstream services (currency, inventory) to confirm transfers complete.
        - party_required: Wait for all parties to call /confirm-release.
        - service_and_party: Wait for both service completion AND party confirmation.
      enum:
      - Immediate
      - ServiceOnly
      - PartyRequired
      - ServiceAndParty
    ReleaseTerritoryRequest:
      type: object
