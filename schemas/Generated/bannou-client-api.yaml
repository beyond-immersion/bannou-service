        relationshipType:
          type: string
          description: Specific relationship type (MOTHER, FATHER, SON, 
            DAUGHTER, etc.)
        isAlive:
          type: boolean
          description: Whether the related character is alive
    FamilyTreeResponse:
      description: Family relationships for a character
      type: object
      additionalProperties: false
      required:
      - parents
      - children
      - siblings
      - spouses
      - pastLives
      properties:
        parents:
          type: array
