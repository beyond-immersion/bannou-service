        realmId:
          type: string
          format: uuid
          description: Realm this location belongs to
        locationType:
          $ref: '#/components/schemas/LocationType'
          description: Type classification for this location
        parentLocationId:
          type: string
          format: uuid
          nullable: true
          description: Parent location ID for hierarchy (null for root 
            locations)
        bounds:
          allOf:
          - $ref: '#/components/schemas/BoundingBox3D'
          nullable: true
