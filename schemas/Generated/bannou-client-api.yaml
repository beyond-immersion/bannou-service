        tags:
          type: array
          nullable: true
          description: Updated tags
          items:
            type: string
    UpdateConnectionStatusRequest:
      type: object
      additionalProperties: false
      description: Request to transition a connection's operational status with 
        optimistic concurrency
      required:
      - connectionId
      - newStatus
      - reason
      properties:
        connectionId:
          type: string
          format: uuid
          description: Connection to update
        currentStatus:
          allOf:
          - $ref: '#/components/schemas/ConnectionStatus'
