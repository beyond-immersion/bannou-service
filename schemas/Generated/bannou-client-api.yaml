    CopySaveRequest:
      description: Request to copy save data from one slot to another, 
        optionally across different entities or games.
      type: object
      additionalProperties: false
      required:
      - sourceGameId
      - sourceOwnerId
      - sourceOwnerType
      - sourceSlotName
      - targetGameId
      - targetOwnerId
      - targetOwnerType
      - targetSlotName
      properties:
        sourceGameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-z][a-z0-9-]*$'
          description: Game identifier of the source save
        sourceOwnerId:
          type: string
          format: uuid
          description: Entity ID that owns the source save
        sourceOwnerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that owns the source save
        sourceSlotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Name of the source slot to copy from
        sourceVersion:
          type: integer
          nullable: true
          description: Version to copy (latest if null)
        targetGameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-z][a-z0-9-]*$'
          description: Game identifier for the target save
        targetOwnerId:
          type: string
          format: uuid
          description: Entity ID that will own the copied save
        targetOwnerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that will own the copied save
        targetSlotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Name of the target slot to copy to
        targetCategory:
          $ref: '#/components/schemas/SaveCategory'
          description: Category for new slot if auto-created
    CountItemsRequest:
      type: object
      description: Request to count items
      additionalProperties: false
      required:
      - ownerId
      - ownerType
      - templateId
      properties:
        ownerId:
          type: string
          format: uuid
          description: Owner to count for
        ownerType:
          $ref: '#/components/schemas/ContainerOwnerType'
          description: Owner type
        templateId:
          type: string
          format: uuid
          description: Template to count
    CountItemsResponse:
      type: object
      description: Count result
      additionalProperties: false
      required:
      - templateId
      - totalQuantity
      - stackCount
      properties:
        templateId:
          type: string
          format: uuid
          description: Counted template
        totalQuantity:
          type: number
          format: double
          description: Total quantity
        stackCount:
          type: integer
          description: Number of stacks
    CoverageAnalysis:
      type: object
      additionalProperties: false
      description: Statistics about asset resolution coverage
      required:
      - totalRequested
      - resolvedViaBundles
      - resolvedStandalone
      - unresolvedCount
      properties:
        totalRequested:
          type: integer
          description: Total number of assets requested
        resolvedViaBundles:
          type: integer
          description: Assets resolved through bundle downloads
        resolvedStandalone:
          type: integer
          description: Assets resolved as standalone downloads
        unresolvedCount:
          type: integer
          description: Assets that could not be found
        bundleEfficiency:
          type: number
          format: float
          nullable: true
          description: Ratio of assets provided to bundle downloads (higher is 
            better)
    CreateAchievementDefinitionRequest:
      type: object
      description: Request to create a new achievement
      additionalProperties: false
      required:
      - gameServiceId
      - achievementId
      - displayName
      - description
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service owning this achievement
        achievementId:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z0-9_-]+$"
          description: Unique identifier for this achievement (lowercase, no 
            spaces)
        displayName:
          type: string
          minLength: 1
          maxLength: 100
          description: Human-readable name
        description:
          type: string
          minLength: 1
          maxLength: 500
          description: Description of how to earn this achievement
        hiddenDescription:
          type: string
          maxLength: 500
          nullable: true
          description: Description shown before achievement is earned (for 
            hidden types)
        achievementType:
          $ref: '#/components/schemas/AchievementType'
          default: Standard
          description: Classification of the achievement (affects visibility and
            progress behavior)
        entityTypes:
          type: array
          items:
            $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Which entity types can earn this achievement
        progressTarget:
          type: integer
          nullable: true
          description: Target value for progressive achievements
        points:
          type: integer
          default: 10
          description: Point value of this achievement
        iconUrl:
          type: string
          nullable: true
          description: URL to achievement icon
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/Platform'
          nullable: true
          description: Platforms where this achievement exists
        platformMappings:
          type: array
          items:
            $ref: '#/components/schemas/PlatformMapping'
          nullable: true
          description: Platform-specific achievement ID mappings
        prerequisites:
          type: array
          items:
            type: string
          nullable: true
          description: Achievement IDs that must be unlocked first
        scoreType:
          type: string
          maxLength: 100
          nullable: true
          description: Score type code for matching analytics.score.updated 
            events (progressive achievements)
        milestoneType:
          type: string
          maxLength: 100
          nullable: true
          description: Milestone type code for matching 
            analytics.milestone.reached events
        milestoneValue:
          type: number
          format: double
          nullable: true
          description: Expected milestone value for matching 
            analytics.milestone.reached events
        milestoneName:
          type: string
          maxLength: 200
          nullable: true
          description: Expected milestone name for matching 
            analytics.milestone.reached events
        leaderboardId:
          type: string
          maxLength: 100
          nullable: true
          description: Leaderboard ID for matching leaderboard.rank.changed 
            events
        rankThreshold:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Rank threshold for leaderboard achievements (unlock when 
            rank <= threshold)
        category:
          type: string
          maxLength: 100
          nullable: true
          description: Game-defined category for UI grouping and filtering (e.g.
            Combat, Exploration, Social)
        isActive:
          type: boolean
          default: true
          description: Whether this achievement can be earned
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Client-only metadata. No Bannou plugin reads specific 
            keys from this field by convention.
    CreateActorTemplateRequest:
      type: object
      additionalProperties: false
      description: Request to create a new actor template definition
      required:
      - category
      - behaviorRef
      properties:
        category:
          type: string
          minLength: 1
          description: Category identifier (e.g., "npc-brain", "world-admin", 
            "cron-cleanup")
        behaviorRef:
          type: string
          minLength: 1
          description: Reference to behavior in lib-assets (e.g., 
            "asset://behaviors/npc-brain-v1")
        configuration:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Game-specific configuration passed to ABML behavior execution scope.
            No Bannou plugin reads specific keys from this field by convention.
            Different ABML behaviors define their own expected configuration structure.
        autoSpawn:
          description: Auto-spawn configuration for instantiate-on-access
          nullable: true
          $ref: '#/components/schemas/AutoSpawnConfig'
        tickIntervalMs:
          type: integer
          default: 1000
          description: Milliseconds between behavior loop iterations
        autoSaveIntervalSeconds:
          type: integer
          default: 60
          description: Seconds between automatic state saves (0 to disable)
        maxInstancesPerNode:
          type: integer
          default: 100
          description: Maximum actors of this category per pool node
        cognitionTemplateId:
          type: string
          nullable: true
          description: |
            Cognition template ID for this actor type. Primary source for cognition
            pipeline resolution. When null, falls back to ABML metadata, then category default.
            Examples: "humanoid-cognition-base", "creature-cognition-base", "object-cognition-base"
        cognitionOverrides:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Static template-level cognition overrides (polymorphic JSON).
            Deserialized internally to CognitionOverrides type with discriminated
            subtypes.
            Applied as the first layer in the three-layer override composition
            (template, instance, ABML metadata). Structure defined by ICognitionOverride
            interface hierarchy in bannou-service/Behavior/.
            No Bannou plugin reads specific keys from this field by convention.
    CreateArchiveRequest:
      description: Request to create a point-in-time snapshot of namespace 
        documentation
      type: object
      additionalProperties: false
      required:
      - namespace
      - ownerType
      - ownerId
      properties:
        ownerType:
          $ref: '#/components/schemas/DocumentationOwnerType'
          description: Type of owner for this archive
        ownerId:
          type: string
          minLength: 1
          description: |
            Owner identifier.
            For Session type: the WebSocket session ID (UUID format).
            For Service type: the service name (e.g., "orchestrator").
        namespace:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 50
          description: Documentation namespace to archive
        description:
          type: string
          maxLength: 500
          description: Optional description for the archive
    CreateArchiveResponse:
      description: Response containing the created archive details
      type: object
      additionalProperties: false
      required:
      - archiveId
      - namespace
      properties:
        archiveId:
          type: string
          format: uuid
          description: Unique identifier of the created archive
        namespace:
          type: string
          description: Namespace that was archived
        bundleAssetId:
          type: string
          format: uuid
          nullable: true
          description: Asset ID in Asset Service (null if bundle upload failed 
            or Asset Service unavailable)
        documentCount:
          type: integer
          description: Number of documents in the archive
        sizeBytes:
          type: integer
          description: Total size of the archive in bytes
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the archive was created
        commitHash:
          type: string
          nullable: true
          description: Git commit hash if namespace is bound
    CreateBoardRequest:
      type: object
      description: Request to create a board instance for an owner entity
      additionalProperties: false
      required:
      - ownerType
      - ownerId
      - boardTemplateId
      - gameServiceId
      properties:
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that owns this board (e.g., character, 
            account, realm, guild)
        ownerId:
          type: string
          format: uuid
          description: ID of the entity that owns this board
        boardTemplateId:
          type: string
          format: uuid
          description: Board template to instantiate
        gameServiceId:
          type: string
          format: uuid
          description: Game service context for validation
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Realm context for item creation. Required for character 
            owners (validated against character realm). For realm owners, must 
            equal ownerId. Null for realm-agnostic boards.
    CreateBoardTemplateRequest:
      type: object
      description: Request to create a new board template
      additionalProperties: false
      required:
      - gameServiceId
      - name
      - gridWidth
      - gridHeight
      - startingNodes
      - boardContractTemplateId
      - allowedOwnerTypes
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service this board template belongs to
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Display name for the board template
        description:
          type: string
          nullable: true
          description: Human-readable description of this board template
        gridWidth:
          type: integer
          minimum: 1
          maximum: 50
          description: Width of the board grid (columns)
        gridHeight:
          type: integer
          minimum: 1
          maximum: 50
          description: Height of the board grid (rows)
        startingNodes:
          type: array
          items:
            $ref: '#/components/schemas/GridPosition'
          minItems: 1
          description: Grid positions where unlocking can begin without 
            adjacency
        boardContractTemplateId:
          type: string
          format: uuid
          description: Contract template that controls unlock behavior (LP 
            deduction, ability grants)
        adjacencyMode:
          allOf:
          - $ref: '#/components/schemas/AdjacencyMode'
          nullable: true
          description: Grid traversal mode. Defaults to EightWay if not 
            specified.
        allowedOwnerTypes:
          type: array
          items:
            $ref: '#/components/schemas/EntityType'
          minItems: 1
          description: Owner types allowed to create boards from this template. 
            Each must map to a supported container owner type (e.g., character, 
            account, location, guild).
    CreateBundleRequest:
      description: Request to create a new asset bundle from multiple assets
      type: object
      additionalProperties: false
      required:
      - bundleId
      - assetIds
      - ownerType
      - ownerId
      properties:
        ownerType:
          $ref: '#/components/schemas/AssetOwnerType'
          description: Type of owner creating this bundle
        ownerId:
          type: string
          description: |
            Owner identifier. For Session type: the WebSocket session ID (UUID format).
            For Service type: the service name (e.g., "behavior", "orchestrator").
        bundleId:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable bundle identifier (e.g., 
            "synty/polygon-adventure", "my-bundle-v1")
        version:
          type: string
          default: 1.0.0
          description: Bundle version string
        realm:
          allOf:
          - $ref: '#/components/schemas/GameRealm'
          nullable: true
          description: |
            Game realm this bundle belongs to.
            Null for realm-agnostic bundles available across all realms.
        assetIds:
          type: array
          minItems: 1
          items:
            type: string
          description: List of asset IDs to include in the bundle
        compression:
          $ref: '#/components/schemas/CompressionType'
          description: Compression algorithm to use for the bundle
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Custom metadata for the bundle (null if none). No Bannou 
            plugin reads specific keys from this field by convention.
    CreateBundleResponse:
      description: Response with bundle creation status and estimated size
      type: object
      additionalProperties: false
      required:
      - bundleId
      - status
      - estimatedSize
      properties:
        bundleId:
          type: string
          description: Human-readable bundle identifier (e.g., 
            "synty/polygon-adventure", "my-bundle-v1")
        status:
          $ref: '#/components/schemas/BundleStatus'
          description: Bundle creation status
        estimatedSize:
          type: integer
          format: int64
          description: Estimated bundle size in bytes
    CreateCollectionRequest:
      type: object
      description: Request to create a collection for an owner
      additionalProperties: false
      required:
      - ownerId
      - ownerType
      - collectionType
      - gameServiceId
      properties:
        ownerId:
          type: string
          format: uuid
          description: Entity that owns this collection
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Entity type discriminator
        collectionType:
          $ref: '#/components/schemas/CollectionType'
          description: Type of collection to create
        gameServiceId:
          type: string
          format: uuid
          description: Game service this collection is scoped to
    CreateConnectionRequest:
      type: object
      additionalProperties: false
      description: Request to create a connection between two locations
      required:
      - fromLocationId
      - toLocationId
      - bidirectional
      - distanceKm
      - terrainType
      - compatibleModes
      - baseRiskLevel
      properties:
        fromLocationId:
          type: string
          format: uuid
          description: Starting location ID
        toLocationId:
          type: string
          format: uuid
          description: Ending location ID
        bidirectional:
          type: boolean
          description: Whether the connection is traversable both ways
        distanceKm:
          type: number
          format: decimal
          minimum: 0.01
          description: Distance in game-kilometers
        terrainType:
          type: string
          description: Terrain type code. Category B content code.
        compatibleModes:
          type: array
          description: Transit mode codes that can use this connection
          items:
            type: string
        seasonalAvailability:
          type: array
          nullable: true
          description: Per-season availability restrictions. Season keys 
            validated against realm's Worldstate seasons.
          items:
            $ref: '#/components/schemas/SeasonalAvailabilityEntry'
        baseRiskLevel:
          type: number
          format: decimal
          minimum: 0
          maximum: 1
          description: Base risk level from 0.0 (safe) to 1.0 (extremely 
            dangerous)
        riskDescription:
          type: string
          nullable: true
          description: Human-readable risk description
        discoverable:
          type: boolean
          default: false
          description: Whether this connection requires discovery to appear in 
            route queries
        name:
          type: string
          nullable: true
          description: Human-readable connection name
        code:
          type: string
          nullable: true
          description: Unique code for lookup
        tags:
          type: array
          nullable: true
          description: Freeform classification tags
          items:
            type: string
    CreateContainerRequest:
      type: object
      description: Request to create a new container
      additionalProperties: false
      required:
      - ownerId
      - ownerType
      - containerType
      - constraintModel
      properties:
        ownerId:
          type: string
          format: uuid
          description: ID of the entity that owns this container
        ownerType:
          $ref: '#/components/schemas/ContainerOwnerType'
          description: Type of the owning entity
        containerType:
          type: string
          maxLength: 64
          description: Game-defined container type (e.g., inventory, bank, 
            equipment_slot)
        constraintModel:
          $ref: '#/components/schemas/ContainerConstraintModel'
          description: Capacity constraint model
        isEquipmentSlot:
          type: boolean
          default: false
          description: Whether this container is an equipment slot
        equipmentSlotName:
          type: string
          maxLength: 64
          nullable: true
          description: Equipment slot name if isEquipmentSlot is true
        maxSlots:
          type: integer
          nullable: true
          minimum: 1
          description: Maximum slots for slot-based containers
        maxWeight:
          type: number
          format: double
          nullable: true
          minimum: 0
          description: Maximum weight capacity
        gridWidth:
          type: integer
          nullable: true
          minimum: 1
          description: Internal grid width for grid containers
        gridHeight:
          type: integer
          nullable: true
          minimum: 1
          description: Internal grid height for grid containers
        maxVolume:
          type: number
          format: double
          nullable: true
          minimum: 0
          description: Maximum volume for volumetric containers
        parentContainerId:
          type: string
          format: uuid
          nullable: true
          description: Parent container ID for nested containers
        canContainContainers:
          type: boolean
          default: false
          description: Whether this container can hold other containers
        maxNestingDepth:
          type: integer
          nullable: true
          minimum: 1
          description: Maximum nesting depth (null uses global default)
        selfWeight:
          type: number
          format: double
          default: 0
          minimum: 0
          description: Empty container weight
        weightContribution:
          $ref: '#/components/schemas/WeightContribution'
          description: How weight propagates to parent
        slotCost:
          type: integer
          default: 1
          minimum: 0
          description: Slots used in slot-based parent
        parentGridWidth:
          type: integer
          nullable: true
          minimum: 1
          description: Width footprint in grid-based parent
        parentGridHeight:
          type: integer
          nullable: true
          minimum: 1
          description: Height footprint in grid-based parent
        parentVolume:
          type: number
          format: double
          nullable: true
          minimum: 0
          description: Volume footprint in volumetric parent
        allowedCategories:
          type: array
          items:
            type: string
          nullable: true
          description: Allowed item categories (null allows all)
        forbiddenCategories:
          type: array
          items:
            type: string
          nullable: true
          description: Forbidden item categories
        allowedTags:
          type: array
          items:
            type: string
          nullable: true
          description: Required item tags for placement
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Realm this container belongs to (null for account-level)
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Container tags for filtering
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Game-specific container data. Client-only metadata. No 
            Bannou plugin reads specific keys from this field by convention.
    CreateContractInstanceRequest:
      type: object
      description: Request to create a contract instance
      additionalProperties: false
      required:
      - templateId
      - parties
      properties:
        templateId:
          type: string
          format: uuid
          description: Template to create instance from
        parties:
          type: array
          items:
            $ref: '#/components/schemas/ContractPartyInput'
          minItems: 2
          description: Parties to this contract
        terms:
          $ref: '#/components/schemas/ContractTerms'
          nullable: true
          description: Terms overriding template defaults
        effectiveFrom:
          type: string
          format: date-time
          nullable: true
          description: When contract becomes active (null for immediate)
        effectiveUntil:
          type: string
          format: date-time
          nullable: true
          description: When contract expires (null for perpetual)
        escrowIds:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: Related escrow IDs
        gameMetadata:
          type: object
          additionalProperties: true
          nullable: true
          description: "Client-only game metadata. No Bannou plugin reads specific
            keys from this field by convention."
    CreateDefinitionRequest:
      type: object
      description: Request to create a map definition
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: Human-readable name
        description:
          type: string
          maxLength: 2048
          description: Description of the map template
          nullable: true
        layers:
          type: array
          items:
            $ref: '#/components/schemas/LayerDefinition'
          description: Layer configurations
          nullable: true
        defaultBounds:
          allOf:
          - $ref: '#/components/schemas/Bounds'
          description: Default bounds for regions using this definition
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          description: >-
            Client-provided definition metadata.
            No Bannou plugin reads specific keys from this field by convention.
          nullable: true
    CreateDocumentRequest:
      description: Request to create a new documentation entry
      type: object
      additionalProperties: false
      required:
      - namespace
      - slug
      - title
      - category
      - content
      properties:
        namespace:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 50
          description: Documentation namespace to create document in
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 100
          description: URL-friendly unique identifier for the document
        title:
          type: string
          maxLength: 200
          description: Display title of the document
        category:
          $ref: '#/components/schemas/DocumentCategory'
          description: Category for organizing the document
        content:
          type: string
          description: Markdown content (max 500KB)
        summary:
          type: string
          maxLength: 500
          nullable: true
          description: Brief text summary of the document (null if not provided)
        voiceSummary:
          type: string
          maxLength: 200
          nullable: true
          description: Concise summary optimized for voice AI (null if not 
            provided)
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Tags for filtering and search (null to skip tagging)
        relatedDocuments:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: IDs of related documents to link (null to skip linking)
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Client-provided custom metadata.
            No Bannou plugin reads specific keys from this field by convention.
    CreateDocumentResponse:
      description: Response confirming document creation with assigned 
        identifiers
      type: object
      additionalProperties: false
      required:
      - documentId
      - slug
      - createdAt
      properties:
        documentId:
          type: string
          format: uuid
          description: Unique identifier of the created document
        slug:
          type: string
          description: URL-friendly slug of the created document
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the document was created
    CreateEncounterTypeRequest:
      type: object
      description: Request to create a new encounter type
      additionalProperties: false
      required:
      - code
      - name
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[A-Z][A-Z0-9_]*$'
          description: Unique code for the encounter type
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Display name for the encounter type
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Description of this encounter type
        defaultEmotionalImpact:
          $ref: '#/components/schemas/EmotionalImpact'
          nullable: true
          description: Suggested emotional response
        sortOrder:
          type: integer
          default: 100
          description: Display ordering (lower = first)
    CreateEntryTemplateRequest:
      type: object
      description: Request to create a new entry template
      additionalProperties: false
      required:
      - code
      - collectionType
      - gameServiceId
      - displayName
      - itemTemplateId
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 128
          description: Unique code within this collection type and game service
        collectionType:
          $ref: '#/components/schemas/CollectionType'
          description: Type of collection this entry belongs to
        gameServiceId:
          type: string
          format: uuid
          description: Game service this entry template is scoped to
        displayName:
          type: string
          minLength: 1
          maxLength: 256
          description: Human-readable display name for this entry
        category:
          type: string
          nullable: true
          description: Category within the collection type (e.g., boss, ambient,
            battle)
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Searchable tags for filtering entries
        assetId:
          type: string
          nullable: true
          description: Primary asset identifier for this entry (audio, video, 
            image)
        thumbnailAssetId:
          type: string
          nullable: true
          description: Thumbnail or preview asset identifier
        unlockHint:
          type: string
          nullable: true
          description: Hint text shown to users about how to unlock this entry
        hideWhenLocked:
          type: boolean
          default: false
          description: Whether this entry should be hidden from users until 
            unlocked (spoiler protection)
        itemTemplateId:
          type: string
