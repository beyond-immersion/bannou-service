      - Put
      - Delete
      - Patch
    ImportDocument:
      description: A single document to import with required fields
      type: object
      additionalProperties: false
      required:
      - slug
      - title
      - category
      - content
      properties:
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 100
          description: URL-friendly unique identifier for the document
        title:
          type: string
          maxLength: 200
          description: Display title of the document
        category:
          $ref: '#/components/schemas/DocumentCategory'
          description: Category for organizing the document
        content:
          type: string
          description: Markdown content of the document (max 500KB)
        summary:
          type: string
          nullable: true
          description: Brief text summary of the document (null if not provided)
        voiceSummary:
          type: string
          nullable: true
          description: Concise summary optimized for voice AI (null if not 
            provided)
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Tags for filtering and search (null to skip tagging)
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Client-provided custom metadata.
            No Bannou plugin reads specific keys from this field by convention.
    ImportDocumentationRequest:
      description: Request to import multiple documents into a namespace
      type: object
      additionalProperties: false
      required:
      - namespace
      - documents
      properties:
        namespace:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 50
          description: Documentation namespace to import into
        documents:
          type: array
          items:
            $ref: '#/components/schemas/ImportDocument'
          description: List of documents to import
        onConflict:
          $ref: '#/components/schemas/ConflictResolution'
          description: How to handle documents with existing slugs
    ImportDocumentationResponse:
      description: Response reporting import results with counts and failure 
        details
      type: object
      additionalProperties: false
      required:
      - namespace
      - created
      - updated
      - skipped
      - failed
      properties:
        namespace:
          type: string
          description: The namespace documents were imported into
        created:
          type: integer
          description: Number of new documents created
        updated:
          type: integer
          description: Number of existing documents updated
        skipped:
          type: integer
          description: Number of documents skipped due to conflicts
        failed:
          type: array
          items:
            $ref: '#/components/schemas/ImportFailure'
          description: Details of documents that failed to import
    ImportFailure:
      description: Details of a document that failed to import
      type: object
      additionalProperties: false
      required:
      - slug
      - error
      properties:
        slug:
          type: string
          description: Slug of the document that failed to import
        error:
          type: string
          description: Error message explaining the failure
    InitializeRealmClockRequest:
      type: object
      additionalProperties: false
      description: Request to initialize a clock for a realm
      required:
      - realmId
      properties:
        realmId:
          type: string
          format: uuid
          description: Realm to initialize a clock for
        calendarTemplateCode:
          type: string
          nullable: true
          maxLength: 128
          description: Calendar template code to use (falls back to 
            DefaultCalendarTemplateCode config if null; BadRequest if both are 
            null)
        epoch:
          type: string
          format: date-time
          nullable: true
          description: Real-world timestamp to use as the realm epoch (defaults 
            to current time)
        startingYear:
          type: integer
          nullable: true
          minimum: 0
          description: Game year to start at (defaults to 0)
        timeRatio:
          type: number
          format: float
          nullable: true
          minimum: 0.1
          maximum: 10000
          description: Initial game-seconds per real-second (falls back to 
            DefaultTimeRatio config)
        downtimePolicy:
          nullable: true
          description: Initial downtime handling policy (falls back to 
            DefaultDowntimePolicy config)
          allOf:
          - $ref: '#/components/schemas/DowntimePolicy'
    InitializeRealmClockResponse:
      type: object
      additionalProperties: false
      description: Resolved entity state after realm clock initialization. 
        Caller already knows realmId from request. Shows resolved values for 
        optional fields that may have fallen back to config defaults.
      required:
      - gameServiceId
      - calendarTemplateCode
      - timeRatio
      - downtimePolicy
      - epoch
      - startingYear
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service the realm belongs to (resolved from realm 
            lookup)
        calendarTemplateCode:
          type: string
          minLength: 1
          maxLength: 128
          description: Calendar template code in use (resolved from request or 
            config default)
        timeRatio:
          type: number
          format: float
          minimum: 0.1
          maximum: 10000.0
          description: Initial game-seconds per real-second (resolved from 
            request or config default)
        downtimePolicy:
          $ref: '#/components/schemas/DowntimePolicy'
          description: Downtime handling policy (resolved from request or config
            default)
        epoch:
          type: string
          format: date-time
          description: Real-world timestamp of the realm epoch (resolved from 
            request or current time)
        startingYear:
          type: integer
          minimum: 0
          description: Game year the clock started at (resolved from request or 
            default 0)
    InitiateBondRequest:
      type: object
