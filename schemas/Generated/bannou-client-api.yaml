        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: >-
            The game service scope. Null for cross-game seed types.
    DeleteSlotRequest:
      type: object
      additionalProperties: false
      description: Request to permanently delete a save slot and all its 
        versions
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: "^[a-z][a-z0-9-]*$"
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Slot name
    DeleteSlotResponse:
      type: object
      additionalProperties: false
      description: Result of a slot deletion operation with cleanup statistics
      required:
      - versionsDeleted
      - bytesFreed
      properties:
        versionsDeleted:
          type: integer
          description: Number of versions deleted
        bytesFreed:
          type: integer
          format: int64
          description: Storage freed in bytes
    DeleteStatusTemplateRequest:
      type: object
      description: Request to delete a deprecated status template
      additionalProperties: false
      required:
      - statusTemplateId
      properties:
        statusTemplateId:
          type: string
          format: uuid
          description: Status template to delete (must be deprecated first)
    DeleteVersionRequest:
      type: object
      additionalProperties: false
      description: Request to permanently delete a specific save version
      required:
      - ownerId
      - ownerType
      - slotName
      - versionNumber
      properties:
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Slot name
        versionNumber:
          type: integer
          description: Version to delete
    DeleteVersionResponse:
      type: object
      additionalProperties: false
      description: Result of a version deletion operation with storage freed
      required:
      - bytesFreed
      properties:
        bytesFreed:
          type: integer
          format: int64
          description: Storage freed in bytes
    DeletionStatus:
      type: string
      enum:
      - Deleted
      - PermanentlyDeleted
      description: |
        Result of a deletion operation:
        - deleted: Soft-deleted (within retention period, can be restored)
        - permanently_deleted: Permanently removed (unrecoverable)
    DeltaAlgorithm:
      type: string
      enum:
      - JsonPatch
      - Bsdiff
      - Xdelta
      default: JsonPatch
      description: |
        Algorithm used for delta computation.
        JSON_PATCH: RFC 6902, best for structured JSON data
        BSDIFF: Binary diff, good for general binary data
        XDELTA: RFC 3284 VCDIFF, efficient for large binary files
    DepartJourneyRequest:
      type: object
