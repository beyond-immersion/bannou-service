      description: Request to start a prepared journey
      required:
      - journeyId
      properties:
        journeyId:
          type: string
          format: uuid
          description: Journey to start
    DeploymentPhase:
      type: string
      enum:
      - Alpha
      - Beta
      - Release
      description: Current deployment phase for scenario availability gating
    DepositRequest:
      type: object
