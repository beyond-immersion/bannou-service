        realmId:
          type: string
          format: uuid
          nullable: true
          description: Realm scope (null means all realms)
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Game service scope (null means all games)
        tags:
          type: array
          items:
            type: string
          nullable: true
