      required:
      - jobId
      properties:
        jobId:
          type: string
          format: uuid
          description: Job ID from the createMetabundle response
    GetJobStatusResponse:
      type: object
      additionalProperties: false
      description: |
        Status of an async metabundle creation job.
        When status is 'ready', the response includes the full metabundle details.
      required:
      - jobId
      - metabundleId
      - status
      properties:
        jobId:
          type: string
          format: uuid
          description: Job identifier
        metabundleId:
          type: string
          description: Human-readable metabundle identifier being created
        status:
          $ref: '#/components/schemas/BundleStatus'
          description: |
            Current job status.
            - queued: Waiting for processing resources
            - processing: Actively being processed
            - ready: Completed successfully
            - failed: Creation failed
            - cancelled: Job was cancelled
        progress:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Progress percentage (0-100) when status is 'processing'
        downloadUrl:
          type: string
          format: uri
          nullable: true
          description: Pre-signed download URL (only when status is 'ready')
        assetCount:
          type: integer
          nullable: true
          description: Number of assets in metabundle (when ready)
        standaloneAssetCount:
          type: integer
          nullable: true
          description: Number of standalone assets included (when ready)
        sizeBytes:
          type: integer
          format: int64
          nullable: true
          description: Total size in bytes (when ready)
        sourceBundles:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SourceBundleReference'
          description: Provenance data (when ready)
        errorCode:
          allOf:
          - $ref: '#/components/schemas/MetabundleErrorCode'
          nullable: true
          description: Error code (when status is 'failed')
        errorMessage:
          type: string
          nullable: true
          description: Human-readable error description (when status is 
            'failed')
        createdAt:
          type: string
          format: date-time
          nullable: true
          description: When the job was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the job was last updated
        processingTimeMs:
          type: integer
          format: int64
          nullable: true
          description: Total processing time in milliseconds (when complete)
