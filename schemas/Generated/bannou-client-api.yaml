  /relationship-type/list:
    post:
      summary: List all relationship types
      description: Retrieve all relationship types with optional hierarchy 
        filtering
      operationId: relationship_listRelationshipTypes
      tags:
      - Relationship Type Management
      x-permissions:
      - role: user
        states: {}
      requestBody:
