openapi: 3.0.4
info:
  title: Bannou Client API
  description: "Consolidated client-facing API schema for Bannou services.\n\nThis
    schema contains all endpoints accessible to game clients (anonymous, user,\nauthenticated,
    developer roles). Admin-only endpoints are excluded.\n\nGenerated by generate-client-schema.py
    from individual service schemas.\n\n## WebSocket Binary Protocol\n\nAll endpoints
    can be accessed via the WebSocket binary protocol:\n- Request header: 31 bytes
    (flags, channel, sequence, serviceGuid, messageId)\n- Response header: 16 bytes
    (flags, channel, sequence, messageId, responseCode)\n- Payload: JSON (UTF-8 encoded)\n\
    \nSee the x-bannou-protocol extension for protocol details."
  version: 1.0.0
  contact:
    name: Bannou Development Team
servers:
- url: http://localhost:5012
  description: Local development server
x-bannou-protocol:
  requestHeaderSize: 31
  responseHeaderSize: 16
  headerLayout:
    request:
    - offset: 0
      size: 1
      field: flags
      type: uint8
    - offset: 1
      size: 2
      field: channel
      type: uint16_be
    - offset: 3
      size: 4
      field: sequence
      type: uint32_be
    - offset: 7
      size: 16
      field: serviceGuid
      type: guid_rfc4122
    - offset: 23
      size: 8
      field: messageId
      type: uint64_be
    response:
    - offset: 0
      size: 1
      field: flags
      type: uint8
    - offset: 1
      size: 2
      field: channel
      type: uint16_be
    - offset: 3
      size: 4
      field: sequence
      type: uint32_be
    - offset: 7
      size: 8
      field: messageId
      type: uint64_be
    - offset: 15
      size: 1
      field: responseCode
      type: uint8
  messageFlags:
    None: 0
    Binary: 1
    Encrypted: 2
    Compressed: 4
    HighPriority: 8
    Event: 16
    Client: 32
    Response: 64
    Meta: 128
  responseCodes:
    OK: 0
    RequestError: 10
    RequestTooLarge: 11
    TooManyRequests: 12
    InvalidRequestChannel: 13
    Unauthorized: 20
    ServiceNotFound: 30
    ClientNotFound: 31
    MessageNotFound: 32
    BroadcastNotAllowed: 40
    Service_BadRequest: 50
    Service_NotFound: 51
    Service_Unauthorized: 52
    Service_Conflict: 53
    Service_InternalServerError: 60
    ShortcutExpired: 70
    ShortcutTargetNotFound: 71
    ShortcutRevoked: 72
paths:
  /account/profile/update:
    post:
      summary: Update account profile
      operationId: account_updateProfile
      tags:
      - Profile Management
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          description: Account not found
  /achievement/definition/create:
    post:
      summary: Create a new achievement definition
      description: |
        Create a new achievement with specified criteria and platform mappings.
        Developer-only endpoint.
      operationId: achievement_createAchievementDefinition
      tags:
      - Definitions
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAchievementDefinitionRequest'
      responses:
        '200':
          description: Achievement created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementDefinitionResponse'
        '409':
          description: Achievement with this ID already exists
  /achievement/definition/list:
    post:
      summary: List achievement definitions
      description: List achievements for a game service with optional platform 
        filtering.
      operationId: achievement_listAchievementDefinitions
      tags:
      - Definitions
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListAchievementDefinitionsRequest'
      responses:
        '200':
          description: Achievement definitions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAchievementDefinitionsResponse'
  /achievement/definition/update:
    post:
      summary: Update achievement definition
      description: |
        Update properties of an existing achievement.
        Developer-only endpoint.
      operationId: achievement_updateAchievementDefinition
      tags:
      - Definitions
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAchievementDefinitionRequest'
      responses:
        '200':
          description: Achievement updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementDefinitionResponse'
        '404':
          description: Achievement not found
  /achievement/definition/deprecate:
    post:
      summary: Deprecate an achievement definition
      description: |
        Mark an achievement definition as deprecated (Category B per IMPLEMENTATION TENETS).
        Deprecated definitions:
        - Remain queryable for historical data and earned instances
        - Cannot be used for new progress tracking or unlocks
        - Persist forever (no delete endpoint — instances outlive template relevance)
        Idempotent: returns OK if already deprecated.
      operationId: achievement_deprecateAchievementDefinition
      tags:
      - Definitions
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateAchievementDefinitionRequest'
      responses:
        '200':
          description: Achievement definition deprecated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementDefinitionResponse'
        '404':
          description: Achievement definition not found
  /achievement/progress/get:
    post:
      summary: Get entity's achievement progress
      description: Get progress for an entity across all achievements or a 
        specific one.
      operationId: achievement_getAchievementProgress
      tags:
      - Progress
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAchievementProgressRequest'
      responses:
        '200':
          description: Progress retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementProgressResponse'
  /achievement/list-unlocked:
    post:
      summary: List unlocked achievements
      description: Get all achievements unlocked by an entity.
      operationId: achievement_listUnlockedAchievements
      tags:
      - Progress
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListUnlockedAchievementsRequest'
      responses:
        '200':
          description: Unlocked achievements retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUnlockedAchievementsResponse'
  /actor/template/create:
    post:
      operationId: actor_CreateActorTemplate
      summary: Create an actor template (category definition)
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActorTemplateRequest'
      responses:
        '200':
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActorTemplateResponse'
  /actor/template/update:
    post:
      operationId: actor_UpdateActorTemplate
      summary: Update an actor template
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActorTemplateRequest'
      responses:
        '200':
          description: Template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActorTemplateResponse'
  /actor/template/delete:
    post:
      operationId: actor_DeleteActorTemplate
      summary: Delete an actor template
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteActorTemplateRequest'
      responses:
        '200':
          description: Template deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteActorTemplateResponse'
  /assets/upload/request:
    post:
      summary: Request upload URL for a new asset
      description: |
        Generate a pre-signed URL for uploading a new asset directly to storage.
        For large files (>50MB), returns multipart upload configuration.
      operationId: asset_requestUpload
      tags:
      - Assets
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadRequest'
      responses:
        '200':
          description: Upload URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Invalid request (filename, size, or content_type)
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions
  /assets/upload/complete:
    post:
      summary: Mark upload as complete, trigger processing
      description: |
        Called after the client has uploaded the file to the pre-signed URL.
        Triggers the asset processing pipeline (texture conversion, model validation, etc.)
        and emits completion events via WebSocket.
      operationId: asset_completeUpload
      tags:
      - Assets
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteUploadRequest'
      responses:
        '200':
          description: Asset created, processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetMetadata'
        '400':
          description: Invalid upload_id or missing parts for multipart
        '404':
          description: Upload session not found or expired
  /assets/get:
    post:
      summary: Get asset metadata and download URL
      description: |
        Retrieve asset metadata and generate a pre-signed download URL.
        Specify version to download a specific version, or omit for latest.
      operationId: asset_getAsset
      tags:
      - Assets
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAssetRequest'
      responses:
        '200':
          description: Asset metadata with download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetWithDownloadUrl'
        '404':
          description: Asset not found
  /assets/list-versions:
    post:
      summary: List all versions of an asset
      description: |
        Retrieve version history for an asset with pagination.
        Includes version IDs, creation timestamps, and archive status.
      operationId: asset_listAssetVersions
      tags:
      - Assets
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListVersionsRequest'
      responses:
        '200':
          description: List of asset versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetVersionList'
        '404':
          description: Asset not found
  /assets/search:
    post:
      summary: Search assets by tags, type, or realm
      description: |
        Search assets using various filters with pagination.
        All filters are optional and combine with AND logic.
      operationId: asset_searchAssets
      tags:
      - Assets
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetSearchRequest'
      responses:
        '200':
          description: Matching assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetSearchResult'
  /bundles/create:
    post:
      summary: Create asset bundle from multiple assets
      description: |
        Create a .bannou bundle containing multiple assets.
        For large bundles, processing is delegated to the processing pool.
        Completion notification sent via WebSocket event.
      operationId: asset_createBundle
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBundleRequest'
      responses:
        '200':
          description: Bundle created immediately (small bundles)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBundleResponse'
        '202':
          description: Bundle creation queued (large bundles)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBundleResponse'
        '400':
          description: Invalid asset_ids or bundle_id
  /bundles/get:
    post:
      summary: Get bundle manifest and download URL
      description: |
        Retrieve bundle metadata and generate a pre-signed download URL.
        Supports both native .bannou format and ZIP conversion (cached).
      operationId: asset_getBundle
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetBundleRequest'
      responses:
        '200':
          description: Bundle manifest with download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleWithDownloadUrl'
        '404':
          description: Bundle not found
  /bundles/upload/request:
    post:
      summary: Request upload URL for a pre-made bundle
      description: |
        Upload a pre-built bundle (.bannou or .zip format).
        After upload, the bundle undergoes validation before registration.
      operationId: asset_requestBundleUpload
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BundleUploadRequest'
      responses:
        '200':
          description: Upload URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Invalid filename or size
  /bundles/metabundle/create:
    post:
      summary: Create metabundle from source bundles
      description: |
        Compose a metabundle by extracting and repackaging assets from multiple
        source bundles. The resulting metabundle is a complete physical copy with
        provenance metadata tracking the source bundles.

        Assets are deduplicated by content hash. If the same asset ID exists in
        multiple source bundles with different content hashes, the request fails
        with conflict details.
      operationId: asset_createMetabundle
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMetabundleRequest'
      responses:
        '200':
          description: Metabundle created or queued for creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMetabundleResponse'
        '400':
          description: Invalid request or asset conflicts detected
        '404':
          description: One or more source bundles not found
        '409':
          description: Metabundle ID already exists
  /bundles/job/status:
    post:
      summary: Get async metabundle job status
      description: |
        Poll the status of an async metabundle creation job.
        Use the jobId returned from createMetabundle when status was 'queued'.

        Clients can either poll this endpoint or wait for the
        MetabundleCreationCompleteEvent via WebSocket for completion notification.
      operationId: asset_getJobStatus
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetJobStatusRequest'
      responses:
        '200':
          description: Job status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetJobStatusResponse'
        '404':
          description: Job not found or expired
  /bundles/job/cancel:
    post:
      summary: Cancel an async metabundle job
      description: |
        Cancel a pending or processing metabundle creation job.
        Jobs that are already completed (ready or failed) cannot be cancelled.

        Successfully cancelled jobs will emit a MetabundleCreationCompleteEvent
        with status 'cancelled' via WebSocket.
      operationId: asset_cancelJob
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelJobRequest'
      responses:
        '200':
          description: Job cancellation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelJobResponse'
        '404':
          description: Job not found or expired
        '409':
          description: Job cannot be cancelled (already completed)
  /bundles/resolve:
    post:
      summary: Compute optimal bundles for requested assets
      description: |
        Given a list of asset IDs, compute the optimal set of bundles to download
        to obtain all requested assets with minimal transfers.

        The algorithm uses greedy set-cover optimization:
        1. Find all bundles containing requested assets
        2. Select bundles that cover the most uncovered assets
        3. Prefer metabundles when coverage is equal (tie-breaker)
        4. Include standalone assets for any remaining unresolved IDs

        Returns pre-signed download URLs for all selected bundles and assets.
      operationId: asset_resolveBundles
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveBundlesRequest'
      responses:
        '200':
          description: Resolution complete with download URLs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveBundlesResponse'
        '400':
          description: Invalid request
  /bundles/query/by-asset:
    post:
      summary: Find all bundles containing a specific asset
      description: |
        Query the reverse index to find all bundles (source and metabundle)
        that contain a specific asset ID. Useful for understanding asset
        distribution and debugging resolution issues.
      operationId: asset_queryBundlesByAsset
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBundlesByAssetRequest'
      responses:
        '200':
          description: Bundles containing the asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryBundlesByAssetResponse'
        '400':
          description: Invalid request
  /bundles/update:
    post:
      summary: Update bundle metadata
      description: |
        Update metadata for an existing bundle (name, description, tags).
        Does not modify bundle contents - for that, create a new bundle.

        Increments the bundle version and records the change in version history.
        Only the bundle owner or admin can update.
      operationId: asset_updateBundle
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBundleRequest'
      responses:
        '200':
          description: Bundle updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateBundleResponse'
        '400':
          description: Invalid request
        '403':
          description: Not authorized to update this bundle
        '404':
          description: Bundle not found or deleted
  /bundles/delete:
    post:
      summary: Soft-delete a bundle
      description: |
        Soft-delete a bundle, marking it as deleted but retaining data
        for the configured retention period (default 30 days).

        Deleted bundles are excluded from resolution and queries by default.
        Use permanent=true for immediate, unrecoverable deletion (admin only).

        Only the bundle owner or admin can delete.
      operationId: asset_deleteBundle
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteBundleRequest'
      responses:
        '200':
          description: Bundle deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteBundleResponse'
        '400':
          description: Invalid request
        '403':
          description: Not authorized to delete this bundle
        '404':
          description: Bundle not found
  /bundles/restore:
    post:
      summary: Restore a soft-deleted bundle
      description: |
        Restore a bundle that was soft-deleted, making it active again.
        Can only restore bundles within their retention period.

        Only the bundle owner or admin can restore.
      operationId: asset_restoreBundle
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreBundleRequest'
      responses:
        '200':
          description: Bundle restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreBundleResponse'
        '400':
          description: Invalid request or bundle not in deleted state
        '403':
          description: Not authorized to restore this bundle
        '404':
          description: Bundle not found or permanently deleted
        '410':
          description: Bundle retention period has expired
  /bundles/query:
    post:
      summary: Query bundles with advanced filters
      description: |
        Query bundles with flexible filtering options including:
        - Tag matching (exact, exists, not exists)
        - Status filtering (active, deleted)
        - Date range filtering
        - Name search (contains)
        - Owner filtering
        - Realm and bundle type filtering

        Supports pagination and sorting.
      operationId: asset_queryBundles
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBundlesRequest'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryBundlesResponse'
        '400':
          description: Invalid query parameters
  /bundles/list-versions:
    post:
      summary: List version history for a bundle
      description: |
        Get the version history for a bundle, showing all metadata changes
        over time. Each version record includes:
        - Version number
        - When the change was made
        - Who made the change
        - What changed
        - Optional reason for the change

        The current version's full metadata snapshot is always included.
      operationId: asset_listBundleVersions
      tags:
      - Bundles
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListBundleVersionsRequest'
      responses:
        '200':
          description: Version history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBundleVersionsResponse'
        '404':
          description: Bundle not found
  /assets/bulk-get:
    post:
      summary: Batch asset metadata lookup
      description: |
        Retrieve metadata for multiple assets in a single request.
        Optionally includes pre-signed download URLs.
        Maximum 100 asset IDs per request.
      operationId: asset_bulkGetAssets
      tags:
      - Assets
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkGetAssetsRequest'
      responses:
        '200':
          description: Asset metadata retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkGetAssetsResponse'
        '400':
          description: Invalid request or too many asset IDs
  /auth/login:
    post:
      summary: Login with email/password
      operationId: auth_login
      tags:
      - Authentication
      x-permissions:
      - role: anonymous
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful or MFA challenge issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
        '429':
          description: Too many login attempts
  /auth/register:
    post:
      summary: Register new user account
      operationId: auth_register
      tags:
      - Authentication
      x-permissions:
      - role: anonymous
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid request data
        '409':
          description: Username already exists
  /auth/oauth/{provider}/init:
    get:
      summary: Initialize OAuth2 flow (browser redirect)
      description: |
        Browser-facing endpoint for initiating OAuth flows. The user's browser navigates
        to this URL directly, which then redirects to the OAuth provider.

        **Note**: This endpoint uses GET with path parameters because it's a browser
        redirect flow, not a WebSocket-routed API call.
      operationId: auth_initOAuth
      tags:
      - OAuth
      x-permissions:
      - role: anonymous
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/OAuthProvider'
      - name: redirectUri
        in: query
        required: true
        schema:
          type: string
          format: uri
      - name: state
        in: query
        schema:
          type: string
      responses:
        '302':
          description: Redirect to OAuth provider
      x-controller-only: true
  /auth/oauth/{provider}/callback:
    post:
      summary: Complete OAuth2 flow (browser redirect callback)
      description: |
        Browser-facing callback endpoint for OAuth providers. The OAuth provider redirects
        the user's browser back to this URL after authentication.

        **Note**: This endpoint uses path parameters because the callback URL is registered
        with OAuth providers and cannot be changed without updating provider configurations.
      operationId: auth_completeOAuth
      tags:
      - OAuth
      x-permissions:
      - role: anonymous
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/OAuthProvider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCallbackRequest'
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/steam/verify:
    post:
      summary: Verify Steam Session Ticket
      description: |
        Validates a Steam Session Ticket obtained from the game client via ISteamUser::GetAuthTicketForWebApi().
        The server validates the ticket with Steam's Web API and retrieves the SteamID from Steam's response.
        NEVER trust client-provided SteamID - it must come from Steam's authenticated response.
      operationId: auth_verifySteamAuth
      tags:
      - Steam
      x-permissions:
      - role: anonymous
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SteamVerifyRequest'
      responses:
        '200':
          description: Steam authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired Steam ticket
        '500':
          description: Steam API unavailable or internal error
  /auth/refresh:
    post:
      summary: Refresh access token
      operationId: auth_refreshToken
      tags:
      - Tokens
      x-permissions:
      - role: user
      parameters:
      - name: jwt
        in: header
        required: true
        schema:
          type: string
        description: Current JWT access token for refresh
        x-from-authorization: bearer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/validate:
    post:
      summary: Validate access token
      operationId: auth_validateToken
      tags:
