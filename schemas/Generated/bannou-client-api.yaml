        code:
          type: string
          description: Scenario code
        name:
          type: string
          description: Scenario name
        priority:
          type: integer
          description: Scenario priority
        enabled:
          type: boolean
          description: Whether enabled
        isDeprecated:
          type: boolean
          description: Whether deprecated
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: When deprecated
        deprecationReason:
          type: string
          nullable: true
          maxLength: 500
          description: Reason for deprecation
        conditionCount:
          type: integer
          description: Number of trigger conditions
        phaseCount:
          type: integer
          description: Number of phases
        mutationCount:
          type: integer
          description: Number of mutations
        questHookCount:
          type: integer
