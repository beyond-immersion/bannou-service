          description: List of changes made (e.g., "name changed", "tag 'env' 
            added")
        updatedAt:
          type: string
          format: date-time
          description: When the update occurred
    UpdateCalendarRequest:
      type: object
      additionalProperties: false
      description: Request to partially update a calendar template (only 
        non-null fields are applied)
      required:
      - gameServiceId
      - templateCode
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service the calendar belongs to (identity, cannot be
            changed)
        templateCode:
          type: string
          minLength: 1
          maxLength: 128
          description: Calendar template code (identity, cannot be changed)
        gameHoursPerDay:
          type: integer
          nullable: true
          minimum: 1
          description: New number of game hours in a day (triggers day period 
            re-validation)
        dayPeriods:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/DayPeriodDefinition'
          minItems: 1
          description: New day period definitions (must cover [0, 
            gameHoursPerDay) without gaps or overlaps)
        months:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MonthDefinition'
          minItems: 1
          description: New month definitions (season codes must reference 
            defined seasons)
        seasons:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SeasonDefinition'
          minItems: 1
          description: New season definitions
        eraLabels:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/EraLabel'
          description: New era label definitions (null = no change, empty array 
            = clear all)
