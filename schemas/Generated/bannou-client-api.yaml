          description: New display name.
        description:
          type: string
          nullable: true
          description: New description.
        maxPerOwner:
          type: integer
          nullable: true
          description: Updated maximum per owner.
        growthPhases:
          type: array
          items:
            $ref: '#/components/schemas/GrowthPhaseDefinition'
          nullable: true
          description: Updated phase definitions.
        capabilityRules:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityRule'
          nullable: true
          description: Updated capability rules.
        growthDecayEnabled:
          type: boolean
          nullable: true
          description: Whether unused growth domains decay over time for this 
            seed type. Falls back to global config if null.
        growthDecayRatePerDay:
          type: number
          format: float
          nullable: true
          description: Daily decay rate for unused domains of this seed type. 
            Falls back to global config if null.
        sameOwnerGrowthMultiplier:
          type: number
          format: float
          nullable: true
          minimum: 0.0
          maximum: 1.0
          description: Updated fraction of growth applied to other seeds of the 
            same type owned by the same entity.
        collectionGrowthMappings:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/CollectionGrowthMapping'
          description: >
            Updated collection growth mappings. Null means no change,
            empty array removes all mappings.
    UpdateStatusTemplateRequest:
      type: object
