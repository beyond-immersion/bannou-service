      operationId: inventory_mergeStacks
      tags:
      - Inventory Operations
      summary: Merge two stacks
      description: |
        Merges two stacks of the same item template. The source stack is
        destroyed and its quantity added to the target stack.
      requestBody:
        required: true
        content:
          application/json:
