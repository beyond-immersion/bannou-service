          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListLicenseDefinitionsResponse'
        '404':
          description: Board template not found
  /license/definition/update:
    post:
      operationId: license_updateLicenseDefinition
      tags:
      - Definition
      summary: Update a license definition
      description: |
        Update mutable fields of a license definition. Position and code are immutable
        after creation.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLicenseDefinitionRequest'
      responses:
        '200':
          description: License definition updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseDefinitionResponse'
        '404':
          description: Board template or license definition not found
  /license/definition/remove:
    post:
      operationId: license_removeLicenseDefinition
      tags:
      - Definition
      summary: Remove a license definition from a board template
      description: |
        Remove a license definition from a board template. Blocked if any board
        instances have this license unlocked.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveLicenseDefinitionRequest'
      responses:
        '200':
          description: License definition removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseDefinitionResponse'
        '404':
          description: Board template or license definition not found
        '409':
          description: License is unlocked by active board instances
  /license/board/create:
    post:
      operationId: license_createBoard
      tags:
      - Board
      summary: Create a board instance for an owner
      description: |
        Create a board instance for an owner from a board template. Validates the owner type
        is in the template's allowedOwnerTypes, game service matches, and no duplicate board
        exists (one board per template per owner). For character owners, validates the character
        exists and resolves realm context. Creates an inventory container (slot_only,
        maxSlots = gridWidth * gridHeight) to hold unlocked license items.
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoardRequest'
      responses:
        '200':
          description: Board created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardResponse'
        '400':
          description: Invalid request (inactive template)
        '404':
          description: Character, game service, or board template not found
        '409':
          description: Duplicate board or max boards per character exceeded
  /license/board/get:
    post:
      operationId: license_getBoard
      tags:
      - Board
      summary: Get a board instance by ID
      description: Retrieves a board instance by its unique identifier.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetBoardRequest'
      responses:
        '200':
          description: Board retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardResponse'
        '404':
          description: Board not found
  /license/board/list-by-owner:
    post:
      operationId: license_listBoardsByOwner
      tags:
      - Board
      summary: List boards for an owner
      description: List all board instances for an owner (by ownerType + 
        ownerId), with optional game service filter.
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListBoardsByOwnerRequest'
      responses:
        '200':
          description: Boards retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBoardsByOwnerResponse'
  /license/board/delete:
    post:
      operationId: license_deleteBoard
      tags:
      - Board
      summary: Delete a board instance
      description: |
        Delete a board instance. Destroys the inventory container and all license
        items within it.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteBoardRequest'
      responses:
        '200':
          description: Board deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardResponse'
        '404':
          description: Board not found
  /license/unlock:
    post:
      operationId: license_unlockLicense
      tags:
      - Gameplay
      summary: Unlock a license on a board
      description: |
        The core operation. Validates adjacency and prerequisites, creates a contract
        instance from the board template's contract template, executes the unlock
        milestone (LP deduction, ability grants via prebound APIs), then creates an
        item instance and places it in the board container. Atomic: if contract
        execution fails, no license is placed.
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockLicenseRequest'
      responses:
        '200':
          description: License unlocked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnlockLicenseResponse'
        '400':
          description: Not adjacent, prerequisites not met, or insufficient LP
        '404':
          description: Board or license definition not found
        '409':
          description: License already unlocked
        '500':
          description: Contract execution failed
  /license/check-unlockable:
    post:
      operationId: license_checkUnlockable
      tags:
      - Gameplay
      summary: Check if a license can be unlocked
      description: |
        Check if a license can be unlocked without performing the unlock. Returns
        adjacency status, prerequisite status, and whether the character has
        sufficient LP.
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckUnlockableRequest'
      responses:
        '200':
          description: Unlockability check completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckUnlockableResponse'
        '404':
          description: Board or license definition not found
  /license/board-state:
    post:
      operationId: license_getBoardState
      tags:
      - Gameplay
      summary: Get full board state
      description: |
        Get the full board state: all defined license positions with unlock status
        (unlocked, locked, unlockable) and adjacency info. Primary endpoint for
        client UI rendering.
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardStateRequest'
      responses:
        '200':
          description: Board state retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardStateResponse'
        '404':
          description: Board not found
  /license/board-template/seed:
    post:
      operationId: license_seedBoardTemplate
      tags:
      - BoardTemplate
      summary: Bulk seed a board template with license definitions
      description: |
        Bulk seed a board template with license definitions from a JSON payload.
        Two-pass: creates definitions, then resolves prerequisite references.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeedBoardTemplateRequest'
      responses:
        '200':
          description: Board template seeded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedBoardTemplateResponse'
        '400':
          description: Invalid definitions (out of bounds, duplicates)
        '404':
          description: Board template not found
  /license/board/clone:
    post:
      operationId: license_cloneBoard
      tags:
      - Board
      summary: Clone a board's unlock state to a new owner
      description: |
        Developer-only endpoint for cloning NPC progression. Reads unlock state
        from a source board, creates a new board for the target owner, and bulk-creates
        item instances for all unlocked licenses. Skips contracts entirely (admin tooling,
        not gameplay). Publishes a single license.board.cloned event.
        Does not publish individual license.unlocked events.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneBoardRequest'
      responses:
        '200':
          description: Board cloned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloneBoardResponse'
        '400':
          description: Invalid request (owner type not allowed, missing realm 
            for character)
        '404':
          description: Source board, target owner (character), or template not 
            found
        '409':
          description: Target already has a board for this template, or max 
            boards exceeded
  /location/create:
    post:
      summary: Create new location
      operationId: location_createLocation
      tags:
      - Location Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
      responses:
        '200':
          description: Location created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '400':
          description: Invalid location data or parent realm mismatch
        '409':
          description: Location with this code already exists in this realm
  /location/update:
    post:
      summary: Update location
      operationId: location_updateLocation
      tags:
      - Location Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationRequest'
      responses:
        '200':
          description: Location updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '404':
          description: Location not found
        '400':
          description: Invalid update data
  /location/set-parent:
    post:
      summary: Set or change the parent of a location
      description: |
        Update a location's parent, moving it in the hierarchy.
        Validates that:
        - New parent exists and is in the same realm
        - No circular reference would be created
        - Updates depth for location and all descendants
      operationId: location_setLocationParent
      tags:
      - Location Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLocationParentRequest'
      responses:
        '200':
          description: Parent updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '404':
          description: Location or parent not found
        '400':
          description: Invalid parent (different realm or circular reference)
  /location/remove-parent:
    post:
      summary: Remove parent from a location (make it a root location)
      description: |
        Remove the parent of a location, making it a top-level root location
        within its realm. Updates depth for location and all descendants.
      operationId: location_removeLocationParent
      tags:
      - Location Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveLocationParentRequest'
      responses:
        '200':
          description: Parent removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '404':
          description: Location not found
  /location/delete:
    post:
      summary: Delete location
      description: |
        Hard delete a location. This will fail if the location:
        - Has child locations (must delete or reparent children first)
        - Is still referenced by other entities
        For safe removal, first deprecate the location, remove all children,
        then delete.
      operationId: location_deleteLocation
      tags:
      - Location Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteLocationRequest'
      responses:
        '200':
          description: Location deleted successfully
        '404':
          description: Location not found
        '409':
          description: Cannot delete - location has children or is in use
  /location/transfer-realm:
    post:
      summary: Transfer a location to a different realm
      description: |
        Moves a location from its current realm to a target realm.
        Updates all realm-scoped indexes (code-index, realm-index, parent/root indexes).
        The transferred location becomes a root location in the target realm (parent cleared).
        Returns Conflict if the target realm already has a location with the same code.
        Does NOT move children — caller is responsible for tree ordering.
      operationId: location_transferLocationToRealm
      tags:
      - Location Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferLocationToRealmRequest'
      responses:
        '200':
          description: Location transferred successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '404':
          description: Location or target realm not found
        '409':
          description: Target realm already has a location with the same code
  /location/deprecate:
    post:
      summary: Deprecate a location
      description: |
        Soft-delete a location by marking it as deprecated.
        Deprecated locations:
        - Remain queryable for historical data
        - Cannot be used for placing new entities
        - Can be hard-deleted after all references are removed
      operationId: location_deprecateLocation
      tags:
      - Location Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateLocationRequest'
      responses:
        '200':
          description: Location deprecated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '404':
          description: Location not found
        '409':
          description: Location is already deprecated
  /location/undeprecate:
    post:
      summary: Restore a deprecated location
      description: |
        Remove the deprecated status from a location, making it
        available for entity placement again.
      operationId: location_undeprecateLocation
      tags:
      - Location Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndeprecateLocationRequest'
      responses:
        '200':
          description: Location restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '404':
          description: Location not found
        '400':
          description: Location is not deprecated
  /location/seed:
    post:
      summary: Seed locations from configuration
      description: |
        Idempotent operation to seed locations from provided data.
        Creates locations that don't exist, optionally updates existing locations.
        Processes locations in dependency order (parents before children).
        Typically called at service startup with YAML-defined location hierarchies.
      operationId: location_seedLocations
      tags:
      - Location Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeedLocationsRequest'
      responses:
        '200':
          description: Seed operation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedLocationsResponse'
        '400':
          description: Invalid seed data
  /mapping/request-snapshot:
    post:
      summary: Request full snapshot for cold start
      description: |
        Consumers use this when starting up to get initial state.
        Returns current snapshot of requested region/kinds.
        For very large maps, payloadRef points to lib-asset storage.
      operationId: mapping_requestSnapshot
      tags:
      - Runtime
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestSnapshotRequest'
      responses:
        '200':
          description: Snapshot returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestSnapshotResponse'
        '404':
          description: Region not found
  /mapping/query/point:
    post:
      summary: Query map data at a specific point
      description: |
        Returns all map data at a point across requested kinds.
        Used by behavior stacks for contextual decisions.
        Optionally includes objects within radius.
      operationId: mapping_queryPoint
      tags:
      - Query
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryPointRequest'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryPointResponse'
  /mapping/query/bounds:
    post:
      summary: Query map data within bounds
      description: |
        Returns map data within a bounding box.
        For event actors needing region overview.
        Limited to maxObjects per kind.
      operationId: mapping_queryBounds
      tags:
      - Query
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBoundsRequest'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryBoundsResponse'
  /mapping/query/objects-by-type:
    post:
      summary: Find all objects of a type in region
      description: |
        Returns all objects matching an objectType filter.
        For event actors asking "where are all the boulder clusters?"
      operationId: mapping_queryObjectsByType
      tags:
      - Query
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryObjectsByTypeRequest'
      responses:
        '200':
          description: Matching objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryObjectsByTypeResponse'
  /mapping/query/affordance:
    post:
      summary: Find locations that afford a specific action or scene type
      description: |
        Affordance queries answer "where can I do X?" by combining
        multiple map kinds and applying game-specific scoring logic.

        Used by Event Brain for procedural scene orchestration:
        - "Find ambush locations"
        - "Find dramatic reveal spots"
        - "Find sheltered rest areas"

        Well-known types have predefined scoring; use affordanceType=custom
        with customAffordance for novel scenarios.
      operationId: mapping_queryAffordance
      tags:
      - Query
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AffordanceQueryRequest'
      responses:
        '200':
          description: Scored locations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AffordanceQueryResponse'
  /mapping/authoring/checkout:
    post:
      summary: Acquire exclusive edit lock for design-time editing
      description: |
        For level editors and design tools only.
        Game servers do NOT use this - they use create-channel for implicit authority.
        Returns authority token for publishing edits.
      operationId: mapping_checkoutForAuthoring
      tags:
      - Authoring
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthoringCheckoutRequest'
      responses:
        '200':
          description: Checkout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthoringCheckoutResponse'
        '409':
          description: Already checked out by another editor
  /mapping/authoring/commit:
    post:
      summary: Commit design-time changes
      description: |
        Commits pending changes and releases the checkout lock.
        Optionally includes a commit message for history.
      operationId: mapping_commitAuthoring
      tags:
      - Authoring
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthoringCommitRequest'
      responses:
        '200':
          description: Changes committed
          content:
            application/json:
