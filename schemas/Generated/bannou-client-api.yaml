                $ref: '#/components/schemas/RelationshipTypeListResponse'
        '404':
          description: Relationship type not found
  /relationship-type/create:
    post:
      summary: Create new relationship type
      operationId: relationship_createRelationshipType
      tags:
      - Relationship Type Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRelationshipTypeRequest'
      responses:
        '200':
          description: Relationship type created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipTypeResponse'
        '400':
          description: Invalid relationship type data
        '409':
          description: Relationship type with this code already exists
  /relationship-type/update:
    post:
      summary: Update relationship type
      operationId: relationship_updateRelationshipType
      tags:
      - Relationship Type Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRelationshipTypeRequest'
      responses:
        '200':
          description: Relationship type updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipTypeResponse'
        '404':
          description: Relationship type not found
        '400':
          description: Invalid update data
  /relationship-type/delete:
    post:
      summary: Delete relationship type
      description: |
        Hard delete a relationship type. This will fail if the type is still in use.
        For safe removal, first deprecate the type, then merge it into another type
        (or VOID), then delete. Only deprecated types with zero references can be deleted.
      operationId: relationship_deleteRelationshipType
      tags:
      - Relationship Type Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRelationshipTypeRequest'
      responses:
        '200':
          description: Relationship type deleted successfully
        '404':
          description: Relationship type not found
        '409':
          description: Cannot delete - type is in use by relationships or has 
            child types
  /relationship-type/deprecate:
    post:
      summary: Deprecate a relationship type
      description: |
        Soft-delete a relationship type by marking it as deprecated.
        Deprecated types:
        - Remain queryable for historical data
        - Cannot be used for creating new relationships
        - Can be merged into other types using the merge endpoint
        - Can be hard-deleted after all references are removed
      operationId: relationship_deprecateRelationshipType
      tags:
      - Relationship Type Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateRelationshipTypeRequest'
      responses:
        '200':
          description: Relationship type deprecated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipTypeResponse'
        '404':
          description: Relationship type not found
  /relationship-type/undeprecate:
    post:
      summary: Restore a deprecated relationship type
      description: |
        Remove the deprecated status from a relationship type, making it
        available for new relationships again.
      operationId: relationship_undeprecateRelationshipType
      tags:
      - Relationship Type Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndeprecateRelationshipTypeRequest'
      responses:
        '200':
          description: Relationship type restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipTypeResponse'
        '404':
          description: Relationship type not found
  /relationship-type/merge:
    post:
      summary: Merge a deprecated type into another type
      description: |
        Migrate all relationships using a deprecated type to a target type.
        This is the recommended way to handle type removal:
        1. Deprecate the source type
        2. Merge into the target type (or VOID for effective deletion)
        3. Optionally hard-delete the now-empty deprecated type

        The merge operation:
        - Updates all relationships using sourceTypeId to use targetTypeId
        - Publishes events for each affected relationship
        - Returns count of migrated relationships
        - Fails if source is not deprecated (safety check)
      operationId: relationship_mergeRelationshipType
      tags:
      - Relationship Type Admin
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeRelationshipTypeRequest'
      responses:
        '200':
          description: Merge completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeRelationshipTypeResponse'
        '404':
          description: Source or target relationship type not found
        '400':
          description: Source type must be deprecated before merging
        '409':
          description: Cannot merge into a deprecated type
  /save-load/slot/create:
    post:
      tags:
      - Slots
      operationId: saveLoad_CreateSlot
      summary: Create or configure a save slot
      description: |
        Creates a new save slot or updates configuration of an existing slot.
        Slots are auto-created on first save, but pre-creation allows setting
        custom configuration (max versions, retention policy, etc.).
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSlotRequest'
      responses:
        '200':
          description: Slot created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotResponse'
        '400':
          description: Invalid request
        '409':
          description: Slot already exists with different owner
  /save-load/slot/get:
    post:
      tags:
      - Slots
      operationId: saveLoad_GetSlot
      summary: Get slot metadata
      description: Returns slot configuration and version summary.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetSlotRequest'
      responses:
        '200':
          description: Slot found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotResponse'
        '404':
          description: Slot not found
  /save-load/slot/list:
    post:
      tags:
      - Slots
      operationId: saveLoad_ListSlots
      summary: List slots for owner
      description: Returns all slots owned by the specified entity.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListSlotsRequest'
      responses:
        '200':
          description: Slots listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSlotsResponse'
  /save-load/slot/delete:
    post:
      tags:
      - Slots
      operationId: saveLoad_DeleteSlot
      summary: Delete slot and all versions
      description: |
        Permanently deletes a slot and all save versions within it.
        This is irreversible. Requires owner access or admin role.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSlotRequest'
      responses:
        '200':
          description: Slot deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSlotResponse'
        '404':
          description: Slot not found
        '403':
          description: Not authorized to delete this slot
  /save-load/slot/rename:
    post:
      tags:
      - Slots
      operationId: saveLoad_RenameSlot
      summary: Rename a save slot
      description: |
        Renames an existing slot without affecting its versions or data.
        The new name must not already exist for this owner.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameSlotRequest'
      responses:
        '200':
          description: Slot renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotResponse'
        '404':
          description: Slot not found
        '409':
          description: Target name already exists
  /save-load/save:
    post:
      tags:
      - Saves
      operationId: saveLoad_Save
      summary: Save data to slot
      description: |
        Creates a new version in the specified slot with the provided data.
        If the slot doesn't exist, it's auto-created with default configuration.

        Large saves (>1MB by default) are automatically compressed.
        Rolling version cleanup is applied based on slot configuration.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveRequest'
      responses:
        '200':
          description: Save successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResponse'
        '400':
          description: Invalid request or data validation failed
        '413':
          description: Save data exceeds maximum size limit
        '403':
          description: Not authorized to save to this slot
  /save-load/load:
    post:
      tags:
      - Saves
      operationId: saveLoad_Load
      summary: Load data from slot
      description: |
        Retrieves save data from the specified slot. By default, loads the
        latest version. Optionally specify a version number or checkpoint name.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadRequest'
      responses:
        '200':
          description: Load successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadResponse'
        '404':
          description: Slot or version not found
        '403':
          description: Not authorized to load from this slot
  /save-load/save-delta:
    post:
      tags:
      - Saves
      operationId: saveLoad_SaveDelta
      summary: Save incremental changes from base version
      description: |
        Creates a new version by applying a delta (patch) to a base version.
        Significantly reduces storage for large saves with small incremental changes.

        Uses JSON Patch (RFC 6902) by default. The implementation is designed to
        allow swapping to binary diff algorithms (bsdiff/xdelta) if needed for
        specific use cases (e.g., binary game state).

        Delta versions store only the patch; full data is reconstructed on load.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveDeltaRequest'
      responses:
        '200':
          description: Delta save successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveDeltaResponse'
        '400':
          description: Invalid delta or base version not found
        '409':
          description: Base version has been deleted (cannot apply delta)
        '413':
          description: Delta too large (consider full save instead)
  /save-load/load-with-deltas:
    post:
      tags:
      - Saves
      operationId: saveLoad_LoadWithDeltas
      summary: Load save reconstructing from delta chain
      description: |
        Loads save data, automatically reconstructing from delta chain if needed.
        Returns the full reconstructed data, not the raw delta.

        For performance, the service may cache reconstructed data or collapse
        delta chains during background cleanup.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadRequest'
      responses:
        '200':
          description: Load successful (reconstructed if delta)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadResponse'
        '404':
          description: Slot or version not found
        '422':
          description: Delta chain broken (base version missing)
  /save-load/collapse-deltas:
    post:
      tags:
      - Saves
      operationId: saveLoad_CollapseDeltas
      summary: Collapse delta chain into full snapshot
      description: |
        Collapses a chain of delta versions into a single full snapshot.
        Useful for reducing load latency or before deleting base versions.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollapseDeltasRequest'
      responses:
        '200':
          description: Delta chain collapsed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResponse'
        '404':
          description: Slot or version not found
  /save-load/version/list:
    post:
      tags:
      - Versions
      operationId: saveLoad_ListVersions
      summary: List versions in slot
      description: Returns all versions in a slot with metadata.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListVersionsRequest'
      responses:
        '200':
          description: Versions listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVersionsResponse'
        '404':
          description: Slot not found
  /save-load/version/pin:
    post:
      tags:
      - Versions
      operationId: saveLoad_PinVersion
      summary: Pin a version as checkpoint
      description: |
        Pins a specific version, excluding it from rolling cleanup.
        Optionally assigns a checkpoint name for easy retrieval.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinVersionRequest'
      responses:
        '200':
          description: Version pinned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
        '404':
          description: Slot or version not found
  /save-load/version/unpin:
    post:
      tags:
      - Versions
      operationId: saveLoad_UnpinVersion
      summary: Unpin a version
      description: Removes pin from a version, making it eligible for rolling 
        cleanup.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnpinVersionRequest'
      responses:
        '200':
          description: Version unpinned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
        '404':
          description: Slot or version not found
  /save-load/version/delete:
    post:
      tags:
      - Versions
      operationId: saveLoad_DeleteVersion
      summary: Delete specific version
      description: |
        Permanently deletes a specific version from a slot.
        Cannot delete pinned versions; unpin first.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteVersionRequest'
      responses:
        '200':
          description: Version deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteVersionResponse'
        '404':
          description: Slot or version not found
        '409':
          description: Cannot delete pinned version
  /save-load/query:
    post:
      tags:
      - Query
      operationId: saveLoad_QuerySaves
      summary: Query saves with filters
      description: |
        Search and filter saves across slots. Supports filtering by owner,
        category, date range, metadata, and more. Paginated results.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuerySavesRequest'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuerySavesResponse'
  /save-load/copy:
    post:
      tags:
      - Transfer
      operationId: saveLoad_CopySave
      summary: Copy save to different slot or owner
      description: |
        Copies a save version to a different slot or owner.
        Can copy to same owner (different slot) or different owner (with admin).
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopySaveRequest'
      responses:
        '200':
          description: Save copied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResponse'
        '404':
          description: Source slot or version not found
        '403':
          description: Not authorized to copy to target
  /save-load/export:
    post:
      tags:
      - Transfer
      operationId: saveLoad_ExportSaves
      summary: Export saves for backup/portability
      description: |
        Exports one or more slots with all versions as a downloadable archive.
        Returns a pre-signed URL to download the export bundle.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportSavesRequest'
      responses:
        '200':
          description: Export prepared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportSavesResponse'
  /save-load/verify:
    post:
      tags:
      - Validation
      operationId: saveLoad_VerifyIntegrity
      summary: Verify save data integrity
      description: |
        Verifies the integrity of stored save data by comparing content hash
        against the stored SHA-256 hash. Detects corruption or tampering.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyIntegrityRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyIntegrityResponse'
        '404':
          description: Slot or version not found
  /save-load/version/promote:
    post:
      tags:
      - Versions
      operationId: saveLoad_PromoteVersion
      summary: Promote old version to latest
      description: |
        Creates a new version from an existing older version, effectively
        "promoting" it to be the latest. Useful for rollback scenarios.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteVersionRequest'
      responses:
        '200':
          description: Version promoted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResponse'
        '404':
          description: Slot or version not found
  /save-load/migrate:
    post:
      tags:
      - Migration
      operationId: saveLoad_MigrateSave
      summary: Migrate save to new schema version
      description: |
        Applies migration handlers to upgrade a save from one schema version
        to another. Creates a new version with the migrated data.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateSaveRequest'
      responses:
        '200':
          description: Migration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrateSaveResponse'
        '400':
          description: Migration failed or no path exists
        '404':
          description: Save not found
  /save-load/schema/register:
    post:
      tags:
      - Migration
      operationId: saveLoad_RegisterSchema
      summary: Register a save data schema
      description: |
        Registers a JSON schema for validation of save data.
        Optionally includes migration handlers from previous versions.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSchemaRequest'
      responses:
        '200':
          description: Schema registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'
  /save-load/schema/list:
    post:
      tags:
      - Migration
      operationId: saveLoad_ListSchemas
      summary: List registered schemas
      description: Returns all registered schemas for a game/namespace.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListSchemasRequest'
      responses:
        '200':
          description: Schemas listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSchemasResponse'
  /scene/create:
    post:
      summary: Create a new scene document
      description: |
        Creates a new scene document and stores it in lib-asset.
        Publishes scene.created event on success.
        Returns Conflict if a scene with the same sceneId already exists.
      operationId: scene_createScene
      tags:
      - Scene
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSceneRequest'
      responses:
        '200':
          description: Scene created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SceneResponse'
        '400':
          description: Invalid scene structure (validation failed)
        '409':
          description: Scene with this sceneId already exists
  /scene/get:
    post:
      summary: Retrieve a scene by ID
      description: |
        Retrieves a scene document. Optionally resolves nested scene references
        up to a configurable depth.
      operationId: scene_getScene
      tags:
      - Scene
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetSceneRequest'
      responses:
        '200':
          description: Scene retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSceneResponse'
        '404':
          description: Scene not found
  /scene/list:
    post:
      summary: List scenes with filtering
      description: |
        Lists scenes matching the provided filters. Supports pagination.
        Results are ordered by updatedAt descending (most recent first).
      operationId: scene_listScenes
      tags:
      - Scene
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListScenesRequest'
      responses:
        '200':
          description: Scenes listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListScenesResponse'
  /scene/update:
    post:
      summary: Update a scene document
      description: |
        Updates an existing scene document. Scene must not be checked out by
        another user. Increments the PATCH version automatically.
        Publishes scene.updated event on success.
      operationId: scene_updateScene
      tags:
      - Scene
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSceneRequest'
      responses:
        '200':
          description: Scene updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SceneResponse'
        '404':
          description: Scene not found
        '409':
          description: Scene is checked out by another user
        '400':
          description: Invalid scene structure
  /scene/delete:
    post:
      summary: Delete a scene
      description: |
        Soft-deletes a scene. The scene data remains recoverable via lib-asset
        for approximately 30 days. Cannot delete if other scenes reference this one.
        Publishes scene.deleted event on success.
      operationId: scene_deleteScene
      tags:
      - Scene
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSceneRequest'
      responses:
        '200':
          description: Scene deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSceneResponse'
        '404':
          description: Scene not found
        '409':
          description: Cannot delete - other scenes reference this scene
  /scene/validate:
    post:
      summary: Validate a scene structure
      description: |
        Validates a scene document without saving it. Checks structural validity
        and optionally applies game-specific validation rules.
      operationId: scene_validateScene
      tags:
      - Scene
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateSceneRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
  /scene/checkout:
    post:
      summary: Lock a scene for editing
      description: |
        Acquires an exclusive lock on the scene for editing.
        Returns a checkout token required for commit.
        Lock expires after TTL if not extended via heartbeat.
      operationId: scene_checkoutScene
      tags:
      - Versioning
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Checkout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '404':
          description: Scene not found
        '409':
          description: Scene already checked out by another user
  /scene/commit:
    post:
      summary: Save changes and release lock
      description: |
        Commits the changes made during checkout, increments version,
        and releases the lock. Publishes scene.committed event.
      operationId: scene_commitScene
      tags:
      - Versioning
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitRequest'
      responses:
        '200':
          description: Commit successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitResponse'
        '403':
          description: Invalid checkout token
        '409':
          description: Checkout expired
  /scene/discard:
    post:
      summary: Release lock without saving changes
      description: |
        Discards any changes and releases the checkout lock.
        Scene remains at its pre-checkout version.
      operationId: scene_discardCheckout
      tags:
      - Versioning
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscardRequest'
      responses:
        '200':
          description: Discard successful
        '403':
          description: Invalid checkout token
  /scene/heartbeat:
    post:
      summary: Extend checkout lock TTL
      description: |
        Extends the checkout lock TTL. Should be called periodically
        during editing to prevent lock expiration.
        Returns 409 Conflict when the extension limit has been reached.
      operationId: scene_heartbeatCheckout
      tags:
      - Versioning
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeartbeatRequest'
      responses:
        '200':
          description: Lock extended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeartbeatResponse'
        '403':
          description: Invalid checkout token
        '409':
          description: Checkout expired or extension limit reached
  /scene/history:
    post:
      summary: Get version history for a scene
      description: |
        Returns the version history for a scene, up to the configured
        retention limit per gameId.
      operationId: scene_getSceneHistory
      tags:
      - Versioning
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoryRequest'
      responses:
        '200':
          description: History retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'
        '404':
          description: Scene not found
  /scene/get-validation-rules:
    post:
      summary: Get validation rules for a gameId+sceneType
      description: |
        Retrieves the registered validation rules for a specific
        gameId and sceneType combination.
      operationId: scene_getValidationRules
      tags:
      - Validation
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetValidationRulesRequest'
      responses:
        '200':
          description: Rules retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetValidationRulesResponse'
  /scene/search:
    post:
      summary: Full-text search across scenes
      description: |
        Searches scene names, descriptions, tags, and node names
        for matching content.
      operationId: scene_searchScenes
      tags:
      - Query
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchScenesRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchScenesResponse'
  /scene/find-references:
    post:
      summary: Find scenes that reference a given scene
      description: |
        Returns all scenes that contain reference nodes pointing
        to the specified scene.
      operationId: scene_findReferences
      tags:
      - Query
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FindReferencesRequest'
      responses:
        '200':
          description: Referencing scenes found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindReferencesResponse'
  /scene/find-asset-usage:
    post:
      summary: Find scenes using a specific asset
      description: |
        Returns all scenes containing nodes that reference
        a specific asset ID.
      operationId: scene_findAssetUsage
      tags:
      - Query
      x-permissions:
      - role: user
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FindAssetUsageRequest'
      responses:
        '200':
          description: Asset usage found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindAssetUsageResponse'
  /scene/duplicate:
    post:
      summary: Duplicate a scene with a new ID
      description: |
        Creates a copy of a scene with a new sceneId and name.
        All node IDs are regenerated. Version resets to 1.0.0.
      operationId: scene_duplicateScene
      tags:
      - Scene
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateSceneRequest'
      responses:
        '200':
          description: Scene duplicated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SceneResponse'
        '404':
          description: Source scene not found
  /seed/create:
    post:
      operationId: seed_CreateSeed
      summary: Create a new seed
      description: >
        Creates a new seed bound to the specified owner. The seed type must
        be registered and the owner type must be allowed by the seed type
        definition. Returns conflict if creating this seed would exceed
        the type's MaxPerOwner limit.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSeedRequest'
      responses:
        '200':
          description: Seed created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedResponse'
  /seed/get:
    post:
      operationId: seed_GetSeed
      summary: Get seed by ID
      description: Returns the seed entity with current growth phase and summary
        data.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetSeedRequest'
      responses:
        '200':
          description: Seed found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedResponse'
  /seed/get-by-owner:
    post:
      operationId: seed_GetSeedsByOwner
      summary: Get seeds by owner ID and type
      description: >
        Returns all seeds owned by the specified entity. Optionally filter
        by seed type code and status.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetSeedsByOwnerRequest'
      responses:
        '200':
          description: Seeds found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSeedsResponse'
  /seed/list:
    post:
      operationId: seed_ListSeeds
      summary: List seeds with filtering
      description: >
        Returns seeds matching the specified filters. Supports filtering
        by seed type, owner type, growth phase, status, and game service.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListSeedsRequest'
      responses:
        '200':
          description: Seeds returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSeedsResponse'
  /seed/update:
    post:
      operationId: seed_UpdateSeed
      summary: Update seed metadata or display name
      description: Updates mutable fields of a seed. Cannot change owner or seed
        type.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSeedRequest'
      responses:
        '200':
          description: Seed updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedResponse'
  /seed/activate:
    post:
      operationId: seed_ActivateSeed
      summary: Set a seed as active
      description: >
        Activates the specified seed. Only one seed of a given type can be
        active per owner at a time. Deactivates any previously active seed
        of the same type.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateSeedRequest'
      responses:
        '200':
          description: Seed activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedResponse'
  /seed/archive:
    post:
      operationId: seed_ArchiveSeed
      summary: Archive a seed
      description: >
        Soft-deletes a seed, preserving its data but removing it from active
        rotation. Archived seeds do not count toward the MaxPerOwner limit.
        Cannot archive an active seed.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveSeedRequest'
      responses:
        '200':
          description: Seed archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedResponse'
  /seed/growth/get:
    post:
      operationId: seed_GetGrowth
      summary: Get full growth domain map
      description: >
        Returns the complete growth domain map for a seed, including all
        top-level and sub-domain entries with their current depth values.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetGrowthRequest'
      responses:
        '200':
          description: Growth data returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthResponse'
  /seed/growth/get-phase:
    post:
      operationId: seed_GetGrowthPhase
      summary: Get current growth phase
      description: >
        Returns the current computed growth phase for the seed, based on
        the seed type's configured phase thresholds.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetGrowthPhaseRequest'
      responses:
        '200':
          description: Phase returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthPhaseResponse'
  /seed/capability/get-manifest:
    post:
      operationId: seed_GetCapabilityManifest
      summary: Get current capability manifest
      description: >
        Returns the most recently computed capability manifest for the seed.
        Consumers interpret what capabilities mean (UX modules, spawning
        permissions, faction actions, etc.).
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCapabilityManifestRequest'
      responses:
        '200':
          description: Manifest returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityManifestResponse'
  /seed/type/register:
    post:
      operationId: seed_RegisterSeedType
      summary: Register a new seed type definition
      description: >
        Registers a seed type with its growth phase definitions, capability
        rules, bond cardinality, and owner type restrictions. Seed types
        are scoped to game services.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSeedTypeRequest'
      responses:
        '200':
          description: Seed type registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedTypeResponse'
  /seed/type/get:
    post:
      operationId: seed_GetSeedType
      summary: Get seed type definition
      description: Returns the full seed type definition including phases and 
        capability rules.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetSeedTypeRequest'
      responses:
        '200':
          description: Seed type found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedTypeResponse'
  /seed/type/list:
    post:
      operationId: seed_ListSeedTypes
      summary: List registered seed types
      description: Returns all seed types registered for the specified game 
        service.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListSeedTypesRequest'
      responses:
        '200':
          description: Seed types returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSeedTypesResponse'
  /seed/type/update:
    post:
      operationId: seed_UpdateSeedType
      summary: Update seed type definition
      description: >
        Updates a seed type definition. Changes to phase thresholds or
        capability rules trigger recomputation for all seeds of this type.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSeedTypeRequest'
      responses:
        '200':
          description: Seed type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedTypeResponse'
  /seed/type/deprecate:
    post:
      operationId: seed_DeprecateSeedType
      summary: Deprecate a seed type
      description: >
        Marks a seed type as deprecated. Deprecated seed types cannot be used
        to create new seeds. Existing seeds of this type remain unaffected.
        Must be deprecated before it can be deleted.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateSeedTypeRequest'
      responses:
        '200':
          description: Seed type deprecated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedTypeResponse'
        '404':
          description: Seed type not found
  /seed/type/undeprecate:
    post:
      operationId: seed_UndeprecateSeedType
      summary: Restore a deprecated seed type
      description: >
        Removes deprecated status from a seed type, allowing new seeds
        of this type to be created again.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndeprecateSeedTypeRequest'
      responses:
        '200':
          description: Seed type restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedTypeResponse'
        '404':
          description: Seed type not found
  /seed/type/delete:
    post:
      operationId: seed_DeleteSeedType
      summary: Delete a seed type
      description: >
        Hard deletes a deprecated seed type. Fails if any non-archived seeds
        of this type exist. Must deprecate first, then ensure all seeds are
        archived or deleted before calling this endpoint.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSeedTypeRequest'
      responses:
        '200':
          description: Seed type deleted
        '400':
          description: Seed type is not deprecated
        '404':
          description: Seed type not found
        '409':
          description: Non-archived seeds still exist for this type
  /seed/bond/initiate:
    post:
      operationId: seed_InitiateBond
      summary: Begin bond process between seeds
      description: >
        Initiates a bond between seeds of the same type. All participants
        must confirm for the bond to become active. Returns conflict if
        any participant already has a bond and the type's cardinality is 1.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateBondRequest'
      responses:
        '200':
          description: Bond initiated, awaiting confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondResponse'
  /seed/bond/confirm:
    post:
      operationId: seed_ConfirmBond
      summary: Confirm a pending bond
      description: >
        Confirms a pending bond. When all participants have confirmed, the
        bond becomes active. Bond permanence is determined by the seed type.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmBondRequest'
      responses:
        '200':
          description: Bond confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondResponse'
  /seed/bond/get:
    post:
      operationId: seed_GetBond
      summary: Get bond by ID
      description: Returns the bond record with all participants and status.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetBondRequest'
      responses:
        '200':
          description: Bond found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondResponse'
  /seed/bond/get-for-seed:
    post:
      operationId: seed_GetBondForSeed
      summary: Get bond for a specific seed
      description: Returns the bond that the specified seed participates in, if 
        any.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetBondForSeedRequest'
      responses:
        '200':
          description: Bond found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondResponse'
  /seed/bond/get-partners:
    post:
      operationId: seed_GetBondPartners
      summary: Get partner seed(s) public info
      description: Returns public information about the other seeds in the bond.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetBondPartnersRequest'
      responses:
        '200':
          description: Partners returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondPartnersResponse'
  /status/template/create:
    post:
      operationId: status_createStatusTemplate
      tags:
      - StatusTemplate
      summary: Create a status template
      description: |
        Create a status template defining a status effect type. Each template has
        a unique code within its game service, references an item template for
        inventory placement, and configures stacking behavior and optional contract
        integration for lifecycle management.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStatusTemplateRequest'
      responses:
        '200':
          description: Status template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusTemplateResponse'
        '400':
          description: Invalid request (validation error)
        '404':
          description: Referenced game service or item template not found
        '409':
          description: Duplicate code for this game service, or max templates 
            exceeded
  /status/template/get:
    post:
      operationId: status_getStatusTemplate
      tags:
      - StatusTemplate
      summary: Get a status template by ID
      description: Retrieves a status template by its unique identifier.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetStatusTemplateRequest'
      responses:
        '200':
          description: Status template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusTemplateResponse'
        '404':
          description: Status template not found
  /status/template/get-by-code:
    post:
      operationId: status_getStatusTemplateByCode
      tags:
      - StatusTemplate
      summary: Get a status template by code
      description: Retrieves a status template by its game service and unique 
        code.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetStatusTemplateByCodeRequest'
      responses:
        '200':
          description: Status template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusTemplateResponse'
        '404':
          description: Status template not found
  /status/template/list:
    post:
      operationId: status_listStatusTemplates
      tags:
      - StatusTemplate
      summary: List status templates
      description: Paginated list of status templates filtered by game service 
        with optional category filter.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListStatusTemplatesRequest'
      responses:
        '200':
          description: Status templates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStatusTemplatesResponse'
  /status/template/update:
    post:
      operationId: status_updateStatusTemplate
      tags:
      - StatusTemplate
      summary: Update a status template
      description: Update mutable fields of a status template. Only non-null 
        fields in the request are updated.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusTemplateRequest'
      responses:
        '200':
          description: Status template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusTemplateResponse'
        '404':
          description: Status template not found
  /status/template/seed:
    post:
      operationId: status_seedStatusTemplates
      tags:
      - StatusTemplate
      summary: Bulk seed status templates
      description: Bulk create status templates from a payload, skipping 
        duplicates. Validates item template IDs. Returns count of created 
        templates.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeedStatusTemplatesRequest'
      responses:
        '200':
          description: Seed completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedStatusTemplatesResponse'
        '400':
          description: Invalid request (validation errors)
  /status/template/deprecate:
    post:
      operationId: status_deprecateStatusTemplate
      tags:
      - StatusTemplate
      summary: Deprecate a status template
      description: |
        Mark a status template as deprecated. Deprecated templates cannot be used
        for new grants. Idempotent -- returns OK if already deprecated.
        Category A entity: deprecation is reversible via undeprecate.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateStatusTemplateRequest'
      responses:
        '200':
          description: Status template deprecated (or already deprecated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusTemplateResponse'
        '404':
          description: Status template not found
  /status/template/undeprecate:
    post:
      operationId: status_undeprecateStatusTemplate
      tags:
      - StatusTemplate
      summary: Undeprecate a status template
      description: |
        Remove deprecation from a status template, restoring it for use in grants.
        Idempotent -- returns OK if not deprecated.
        Category A entity: undeprecation is allowed.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndeprecateStatusTemplateRequest'
      responses:
        '200':
          description: Status template undeprecated (or was not deprecated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusTemplateResponse'
        '404':
          description: Status template not found
  /status/template/delete:
    post:
      operationId: status_deleteStatusTemplate
      tags:
      - StatusTemplate
      summary: Delete a deprecated status template
      description: |
        Permanently delete a status template. The template must be deprecated first.
        Returns BadRequest if the template is not deprecated.
        Category A entity: deletion requires prior deprecation.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteStatusTemplateRequest'
      responses:
        '200':
          description: Status template deleted
        '400':
          description: Template is not deprecated (must deprecate before 
            deleting)
        '404':
          description: Status template not found
  /status/grant:
    post:
      operationId: status_grantStatus
      tags:
      - Status
      summary: Grant a status effect to an entity
      description: |
        Grant a status effect to an entity. Creates an item instance in the entity's
        status container and optionally creates a contract instance for lifecycle
        management. Auto-creates the status container (and inventory container) if
        one does not exist for this entity and game service.

        Stacking behavior is determined by the template:
        - refresh_duration: resets timer, increments stack count
        - independent: creates a separate instance per application
        - increase_intensity: increments stack, resets timer
        - replace: removes existing, creates new
        - ignore: rejects if already present
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantStatusRequest'
      responses:
        '200':
          description: Status granted successfully (or 
            stacked/refreshed/replaced)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantStatusResponse'
        '404':
          description: Status template or game service not found
        '409':
          description: Grant rejected (max statuses, stack limit, ignore 
            behavior, contract/item failure)
  /status/remove:
    post:
      operationId: status_removeStatus
      tags:
      - Status
      summary: Remove a specific status instance
      description: |
        Remove a specific status instance by ID. Destroys the item via lib-item,
        cancels any associated contract, deletes the instance record, and invalidates
        the active status cache.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveStatusRequest'
      responses:
        '200':
          description: Status removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusInstanceResponse'
        '404':
          description: Status instance not found
  /status/remove-by-source:
    post:
      operationId: status_removeBySource
      tags:
      - Status
      summary: Remove all statuses from a source
      description: Remove all status instances granted by a specific source for 
        an entity. Used for cascading removal when a source entity is deleted.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveBySourceRequest'
      responses:
        '200':
          description: Statuses removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveStatusesResponse'
  /status/remove-by-category:
    post:
      operationId: status_removeByCategory
      tags:
      - Status
      summary: Remove all statuses of a category (cleanse)
      description: Remove all status instances of a given category for an 
        entity. Used for cleanse mechanics (remove all debuffs, etc.).
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveByCategoryRequest'
      responses:
        '200':
          description: Statuses cleansed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveStatusesResponse'
  /status/has:
    post:
      operationId: status_hasStatus
      tags:
      - Status
      summary: Check if an entity has a specific status
      description: Check if an entity has a specific status template code 
        active. Returns the status instance ID and stack count if found.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HasStatusRequest'
      responses:
        '200':
          description: Check completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HasStatusResponse'
  /status/list:
    post:
      operationId: status_listStatuses
      tags:
      - Status
      summary: List active statuses for an entity
      description: |
        List active status effects for an entity with optional category filter
        and seed-derived passive effect inclusion. Merges item-based statuses
        from cache with seed-derived effects when includePassive is true.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListStatusesRequest'
      responses:
        '200':
          description: Statuses retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStatusesResponse'
  /status/get:
    post:
      operationId: status_getStatus
      tags:
      - Status
      summary: Get a specific status instance
      description: Retrieves a status instance by its unique identifier with 
        full details including metadata.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetStatusRequest'
      responses:
        '200':
          description: Status instance retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusInstanceResponse'
        '404':
          description: Status instance not found
  /status/effects/get:
    post:
      operationId: status_getEffects
      tags:
      - Effects
      summary: Get unified effects for an entity
      description: |
        Get all active effects for an entity including both item-based statuses
        and seed-derived passive capabilities. Returns a unified view with source
        attribution via the effectSource field.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetEffectsRequest'
      responses:
        '200':
          description: Effects retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetEffectsResponse'
  /status/effects/get-seed:
    post:
      operationId: status_getSeedEffects
      tags:
      - Effects
      summary: Get seed-derived passive effects for an entity
      description: |
        Get seed-derived passive effects only. Queries ISeedClient for capability
        manifests across all seeds owned by the entity. Returns capabilities with
        domain, fidelity, and seed attribution.
      x-permissions:
      - role: developer
        states: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetSeedEffectsRequest'
      responses:
        '200':
          description: Seed effects retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedEffectsResponse'
  /storyline/compose:
    post:
      summary: Compose a storyline plan from archive seeds
      description: |
        Generates a storyline plan using data from compressed archives and/or
        live snapshots. The plan describes phases, actions, and entity requirements
        but does NOT create any entities - callers decide whether to instantiate.

        **Workflow**:
        1. Fetch archive/snapshot data via IResourceClient
        2. Extract world state from archive bundle
        3. Select template based on goal and constraints
        4. Run GOAP planner to generate action sequences
        5. Cache plan and publish storyline.composed event
      operationId: storyline_Compose
      tags:
      - Composition
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComposeRequest'
      responses:
        '200':
          description: Storyline plan generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComposeResponse'
        '400':
          description: Invalid request (no valid archives, incompatible 
            goal/genre)
        '404':
          description: Archive or snapshot not found
  /storyline/plan/get:
    post:
      summary: Retrieve a cached storyline plan
      description: |
        Retrieves a previously generated storyline plan by its ID.
        Returns 404 if the plan has expired from cache or doesn't exist.
      operationId: storyline_GetPlan
      tags:
      - Plans
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetPlanRequest'
      responses:
        '200':
          description: Plan retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPlanResponse'
        '404':
          description: Plan not found or expired
  /storyline/plan/list:
    post:
      summary: List cached storyline plans
      description: |
        Lists storyline plans in the cache, optionally filtered by realm.
        Plans are ordered by creation time (newest first).
      operationId: storyline_ListPlans
      tags:
      - Plans
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListPlansRequest'
      responses:
        '200':
          description: Plans listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPlansResponse'
  /storyline/scenario/create:
    post:
      summary: Create a new scenario definition
      description: |
        Creates a reusable scenario definition template.
        Scenarios are passive building blocks with triggering conditions,
        phases, mutations, and optional quest hooks.
      operationId: storyline_CreateScenarioDefinition
      tags:
      - Scenario Definitions
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScenarioDefinitionRequest'
      responses:
        '200':
          description: Scenario definition created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioDefinition'
        '400':
          description: Invalid request (validation error)
        '409':
          description: Scenario with code already exists
  /storyline/scenario/get:
    post:
      summary: Get a scenario definition by ID or code
      description: |
        Retrieves a scenario definition by its ID or code.
        Uses read-through cache for performance.
      operationId: storyline_GetScenarioDefinition
      tags:
      - Scenario Definitions
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetScenarioDefinitionRequest'
      responses:
        '200':
          description: Scenario definition retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetScenarioDefinitionResponse'
        '404':
          description: Scenario not found
  /storyline/scenario/list:
    post:
      summary: List scenario definitions
      description: |
        Lists scenario definitions with optional filtering by realm, game service, and tags.
        Results are paginated and ordered by priority (descending), then creation time.
      operationId: storyline_ListScenarioDefinitions
      tags:
      - Scenario Definitions
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListScenarioDefinitionsRequest'
      responses:
        '200':
          description: Scenarios listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListScenarioDefinitionsResponse'
  /storyline/scenario/update:
    post:
      summary: Update a scenario definition
      description: |
        Updates an existing scenario definition.
        Uses ETag for optimistic concurrency control.
      operationId: storyline_UpdateScenarioDefinition
      tags:
      - Scenario Definitions
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScenarioDefinitionRequest'
      responses:
        '200':
          description: Scenario updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioDefinition'
        '404':
          description: Scenario not found
        '409':
          description: Concurrent modification conflict
  /storyline/scenario/deprecate:
    post:
      summary: Deprecate a scenario definition
      description: |
        Soft-deletes a scenario definition by marking it deprecated.
        Deprecated scenarios are not returned by find-available.
      operationId: storyline_DeprecateScenarioDefinition
      tags:
      - Scenario Definitions
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateScenarioDefinitionRequest'
      responses:
        '200':
          description: Scenario deprecated
        '404':
          description: Scenario not found
  /storyline/scenario/test:
    post:
      summary: Dry-run scenario trigger
      description: |
        Tests whether a scenario would trigger for a character without
        actually executing it. Returns detailed condition evaluation results
        and predicted mutations.
      operationId: storyline_TestScenarioTrigger
      tags:
      - Scenario Discovery
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestScenarioRequest'
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestScenarioResponse'
        '404':
          description: Scenario not found
  /storyline/scenario/get-active:
    post:
      summary: Get active scenarios for a character
      description: |
        Returns currently executing scenarios for a character.
      operationId: storyline_GetActiveScenarios
      tags:
      - Scenario Execution
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetActiveScenariosRequest'
      responses:
        '200':
          description: Active scenarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetActiveScenariosResponse'
  /storyline/scenario/get-history:
    post:
      summary: Get scenario execution history
      description: |
        Returns historical scenario executions for a character with pagination.
      operationId: storyline_GetScenarioHistory
      tags:
      - Scenario Execution
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetScenarioHistoryRequest'
      responses:
        '200':
          description: Scenario history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetScenarioHistoryResponse'
  /storyline/get-compress-data:
    post:
      summary: Get storyline data for compression
      operationId: storyline_getCompressData
      tags:
      - Compression
      description: |
        Called by Resource service during character compression.
        Returns scenario participations, active arcs, and completion counts for archival.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCompressDataRequest'
      responses:
        '200':
          description: Compressed data returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorylineArchive'
        '404':
          description: No storyline data for character
  /subscription/cancel:
    post:
      summary: Cancel a subscription
      description: |
        Cancels a subscription. Users can cancel their own subscriptions,
        admins can cancel any subscription.
      operationId: subscription_cancelSubscription
      tags:
      - Subscription Management
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelSubscriptionRequest'
      responses:
        '200':
          description: Subscription cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionInfo'
        '404':
          description: Subscription not found
        '403':
          description: Not authorized to cancel this subscription
  /transit/mode/register:
    post:
      operationId: transit_registerMode
      summary: Register a new transit mode type
      description: |
        Register a new transit mode type with movement properties, terrain
        compatibility, entity restrictions, and requirements. Mode codes are
        unique string identifiers (e.g., "walking", "horseback", "wagon").
      tags:
      - Mode
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterModeRequest'
      responses:
        '200':
          description: Mode registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeResponse'
        '409':
          description: Mode code already exists
  /transit/mode/get:
    post:
      operationId: transit_getMode
      summary: Get a transit mode by code
      description: Retrieve a transit mode definition by its unique code.
      tags:
      - Mode
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetModeRequest'
      responses:
        '200':
          description: Mode found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeResponse'
        '404':
          description: Mode not found
  /transit/mode/list:
    post:
      operationId: transit_listModes
      summary: List all registered transit modes
      description: |
        List transit modes with optional filtering by realm availability,
        terrain compatibility, tags, and deprecation status.
      tags:
      - Mode
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListModesRequest'
      responses:
        '200':
          description: Modes listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListModesResponse'
  /transit/mode/update:
    post:
      operationId: transit_updateMode
      summary: Update a transit mode's properties
      description: |
        Update properties of an existing transit mode. Only provided fields
        are updated; null fields are left unchanged.
      tags:
      - Mode
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModeRequest'
      responses:
        '200':
          description: Mode updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeResponse'
        '404':
          description: Mode not found
  /transit/mode/deprecate:
    post:
      operationId: transit_deprecateMode
      summary: Deprecate a transit mode
      description: |
        Deprecate a transit mode. Existing journeys using this mode continue,
        but new journeys cannot use it. Sets the triple-field deprecation model:
        isDeprecated=true, deprecatedAt=now, deprecationReason=reason.
        Idempotent: returns OK if already deprecated (caller's intent is satisfied).
        Category A per IMPLEMENTATION TENETS: connections store compatibleModes
        and journeys store primaryModeCode/legModes referencing mode codes.
      tags:
      - Mode
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateModeRequest'
      responses:
        '200':
          description: Mode deprecated (or already deprecated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeResponse'
        '404':
          description: Mode not found
  /transit/mode/undeprecate:
    post:
      operationId: transit_undeprecateMode
      summary: Reverse deprecation of a transit mode
      description: |
        Reverse deprecation of a transit mode (Category A — undeprecate is required).
        Clears isDeprecated, deprecatedAt, deprecationReason.
        Idempotent: returns OK if not currently deprecated.
      tags:
      - Mode
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndeprecateModeRequest'
      responses:
        '200':
          description: Mode undeprecated (or was not deprecated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeResponse'
        '404':
          description: Mode not found
  /transit/mode/delete:
    post:
      operationId: transit_deleteMode
      summary: Delete a deprecated transit mode
      description: |
        Delete a deprecated transit mode (Category A — must be deprecated before
        deletion). Rejects if active journeys use this mode or if connections
        still list this mode in compatibleModes. Archived journeys retain the
        mode code as historical data.
      tags:
      - Mode
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteModeRequest'
      responses:
        '200':
          description: Mode deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteModeResponse'
        '400':
          description: Mode is not deprecated (must deprecate before deleting)
        '404':
          description: Mode not found
        '409':
          description: ACTIVE_JOURNEYS_EXIST (active journeys use this mode) or 
            CONNECTIONS_REFERENCE_MODE (connections list this mode in 
            compatibleModes)
  /transit/mode/check-availability:
    post:
      operationId: transit_checkModeAvailability
      summary: Check which transit modes an entity can currently use
      description: |
        Check mode availability for an entity based on item requirements,
        species restrictions, entity type restrictions, and optional location
        context. Also applies ITransitCostModifierProvider enrichment to
        compute preferenceCost and effectiveSpeed adjustments.
      tags:
      - Mode
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckModeAvailabilityRequest'
      responses:
        '200':
          description: Availability checked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckModeAvailabilityResponse'
  /transit/connection/create:
    post:
      operationId: transit_createConnection
      summary: Create a connection between two locations
      description: |
        Create a directed or bidirectional connection between two locations.
        fromRealmId, toRealmId, and crossRealm are derived from the locations
        via the Location service. Season keys in seasonalAvailability are
        validated against the realm's Worldstate season codes.
      tags:
      - Connection
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectionRequest'
      responses:
        '200':
          description: Connection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '400':
          description: Same location, invalid mode code, or invalid season key
        '404':
          description: One or both locations not found
        '409':
          description: Connection already exists between these locations
  /transit/connection/get:
    post:
      operationId: transit_getConnection
      summary: Get a connection by ID or code
      description: Retrieve a connection by its unique ID or code. One of 
        connectionId or code must be provided.
      tags:
      - Connection
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetConnectionRequest'
      responses:
        '200':
          description: Connection found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
  /transit/connection/query:
    post:
      operationId: transit_queryConnections
      summary: Query connections by location, terrain, mode, or status
      description: |
        Query connections with optional filters. All filters are optional;
        an empty request returns all connections paginated.
      tags:
      - Connection
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryConnectionsRequest'
      responses:
        '200':
          description: Connections queried
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryConnectionsResponse'
  /transit/connection/update:
    post:
      operationId: transit_updateConnection
      summary: Update a connection's properties
      description: |
        Update properties of an existing connection. Does not update status —
        use update-status for operational status changes. Only provided fields
        are updated; null fields are left unchanged.
      tags:
      - Connection
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectionRequest'
      responses:
        '200':
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
  /transit/connection/update-status:
    post:
      operationId: transit_updateConnectionStatus
      summary: Transition a connection's operational status with optimistic 
        concurrency
      description: |
        Transition a connection's operational status using optimistic concurrency.
        Caller specifies currentStatus (what they believe the status is) and
        newStatus. If the actual status does not match currentStatus, returns
        Bad Request with the actual status. Use forceUpdate=true for administrative
        overrides where currentStatus is ignored. The seasonal_closed status is
        typically only set by the Seasonal Connection Worker via forceUpdate=true.
      tags:
      - Connection
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectionStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
        '404':
          description: Connection not found
        '400':
          description: Status mismatch — actual status differs from 
            currentStatus (Bad Request forces caller to refresh and retry)
  /transit/connection/delete:
    post:
      operationId: transit_deleteConnection
      summary: Delete a connection between locations
      description: |
        Delete a connection. Rejects if active journeys are currently using
        this connection.
      tags:
      - Connection
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteConnectionRequest'
      responses:
        '200':
          description: Connection deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteConnectionResponse'
        '404':
          description: Connection not found
        '409':
          description: ACTIVE_JOURNEYS_EXIST (cannot delete while journeys are 
            using this connection)
  /transit/connection/bulk-seed:
    post:
      operationId: transit_bulkSeedConnections
      summary: Seed connections from configuration
      description: |
        Seed connections from configuration using location codes resolved via
        the Location service. Two-pass resolution: first pass creates connections
        with location code lookup, second pass validates all mode codes exist.
        When realmId is provided, location codes are resolved within that realm
        and replaceExisting deletes connections for that realm only.
      tags:
      - Connection
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSeedConnectionsRequest'
      responses:
        '200':
          description: Bulk seed completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkSeedConnectionsResponse'
  /transit/journey/create:
    post:
      operationId: transit_createJourney
      summary: Plan a journey (status preparing)
      description: |
        Plan a journey from origin to destination. Internally calls route/calculate
        to find the best path and populate legs. Checks mode compatibility via
        check-availability. Does NOT start the journey — call /transit/journey/depart
        for that. When preferMultiModal is true, each leg gets the fastest compatible
        mode the entity can use on that connection.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJourneyRequest'
      responses:
        '200':
          description: Journey planned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyResponse'
        '400':
          description: Mode deprecated, requirements not met, or entity type not
            allowed
        '404':
          description: Origin, destination, or mode not found; no route 
            available
  /transit/journey/depart:
    post:
      operationId: transit_departJourney
      summary: Start a prepared journey
      description: |
        Start a prepared journey, transitioning status from preparing to in_transit.
        Publishes transit.journey.departed event.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartJourneyRequest'
      responses:
        '200':
          description: Journey started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyResponse'
        '400':
          description: Invalid status (must be preparing) or first leg 
            connection closed
        '404':
          description: Journey not found
  /transit/journey/resume:
    post:
      operationId: transit_resumeJourney
      summary: Resume an interrupted journey
      description: |
        Resume an interrupted journey, transitioning status from interrupted
        to in_transit. Distinct from depart: depart is for initial departure
        (preparing to in_transit), resume is for continuing after interruption.
        Publishes transit.journey.resumed event.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeJourneyRequest'
      responses:
        '200':
          description: Journey resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyResponse'
        '400':
          description: Invalid status (must be interrupted) or current leg 
            connection closed
        '404':
          description: Journey not found
  /transit/journey/advance:
    post:
      operationId: transit_advanceJourney
      summary: Mark arrival at next waypoint
      description: |
        Mark arrival at the next waypoint, completing the current leg and
        starting the next. If this completes the final leg, journey status
        transitions to arrived. Publishes transit.journey.waypoint-reached
        or transit.journey.arrived accordingly.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceJourneyRequest'
      responses:
        '200':
          description: Journey advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyResponse'
        '400':
          description: Invalid status (must be in_transit) or no current leg
        '404':
          description: Journey not found
  /transit/journey/advance-batch:
    post:
      operationId: transit_advanceBatchJourneys
      summary: Advance multiple journeys in a single call
      description: |
        Advance multiple journeys in a single call for game SDK efficiency at
        NPC scale (10,000+ concurrent journeys). Each advance is processed
        independently — failure of one does not roll back others. Results
        include per-journey success/failure with error details. Ordering within
        the batch is preserved for cases where the same journeyId appears
        multiple times (advancing through multiple waypoints in a single tick).
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceBatchRequest'
      responses:
        '200':
          description: Batch processed (check individual results for per-journey
            errors)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvanceBatchResponse'
  /transit/journey/arrive:
    post:
      operationId: transit_arriveJourney
      summary: Force-arrive a journey at destination
      description: |
        Force-arrive a journey at its destination, skipping remaining legs.
        Remaining legs are marked as skipped rather than completed. Used for
        narrative fast-travel, teleportation, or game-driven skip.
        Publishes transit.journey.arrived event.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArriveJourneyRequest'
      responses:
        '200':
          description: Journey force-arrived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyResponse'
        '400':
          description: Invalid status (must be in_transit or at_waypoint)
        '404':
          description: Journey not found
  /transit/journey/interrupt:
    post:
      operationId: transit_interruptJourney
      summary: Interrupt an active journey
      description: |
        Interrupt an active journey due to combat, event, or breakdown.
        Transitions status to interrupted. To resume, call /transit/journey/resume.
        To abandon, call /transit/journey/abandon.
        Publishes transit.journey.interrupted event.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterruptJourneyRequest'
      responses:
        '200':
          description: Journey interrupted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyResponse'
        '400':
          description: Invalid status (must be in_transit)
        '404':
          description: Journey not found
  /transit/journey/abandon:
    post:
      operationId: transit_abandonJourney
      summary: Abandon a journey
      description: |
        Abandon a journey. The entity stays at its current location.
        Publishes transit.journey.abandoned event.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbandonJourneyRequest'
      responses:
        '200':
          description: Journey abandoned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyResponse'
        '400':
          description: Invalid status (must be preparing, in_transit, 
            at_waypoint, or interrupted)
        '404':
          description: Journey not found
  /transit/journey/get:
    post:
      operationId: transit_getJourney
      summary: Get a journey by ID
      description: Retrieve a journey by its unique ID.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetJourneyRequest'
      responses:
        '200':
          description: Journey found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyResponse'
        '404':
          description: Journey not found
  /transit/journey/query-by-connection:
    post:
      operationId: transit_queryJourneysByConnection
      summary: List active journeys on a specific connection
      description: |
        List active journeys currently traversing a specific connection.
        Enables queries like "who is on this road?" for encounter generation,
        bandit ambush targeting, caravan interception, and road traffic monitoring.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryJourneysByConnectionRequest'
      responses:
        '200':
          description: Journeys queried
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListJourneysResponse'
        '404':
          description: Connection not found
  /transit/journey/list:
    post:
      operationId: transit_listJourneys
      summary: List journeys for an entity or within a realm
      description: |
        List journeys with optional filtering by entity, entity type, realm,
        cross-realm status, journey status, and active-only flag.
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListJourneysRequest'
      responses:
        '200':
          description: Journeys listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListJourneysResponse'
  /transit/journey/query-archive:
    post:
      operationId: transit_queryJourneyArchive
      summary: Query archived journeys from MySQL historical store
      description: |
        Query archived (completed/abandoned) journeys from the MySQL historical
        store. Used by Trade (velocity calculations), Analytics (travel patterns),
        and Character History (travel biography generation).
      tags:
      - Journey
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryJourneyArchiveRequest'
      responses:
        '200':
          description: Archived journeys queried
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListJourneysResponse'
  /transit/route/calculate:
    post:
      operationId: transit_calculateRoute
      summary: Calculate route options between two locations
      description: |
        Calculate route options between two locations. Pure computation endpoint
        with no state mutation. Performs Dijkstra graph search over the connection
        graph filtered by mode compatibility, seasonal availability, and discovery
        status. Does NOT apply entity-specific DI cost modifiers (those are applied
        by the variable provider when GOAP evaluates the results).
      tags:
      - Route
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateRouteRequest'
      responses:
        '200':
          description: Route options calculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateRouteResponse'
        '404':
          description: Locations not found or no route available
  /transit/discovery/reveal:
    post:
      operationId: transit_revealDiscovery
      summary: Reveal a discoverable connection to an entity
      description: |
        Reveal a discoverable connection to an entity via explicit grant.
        Also called internally by journey/advance when a leg uses a discoverable
        connection. Hearsay (L4) calls this when propagating route knowledge
        via rumor. Publishes transit.discovery.revealed event for new discoveries.
      tags:
      - Discovery
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevealDiscoveryRequest'
      responses:
        '200':
          description: Discovery recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevealDiscoveryResponse'
        '400':
          description: Connection is not marked as discoverable
        '404':
          description: Connection not found
  /transit/discovery/list:
    post:
      operationId: transit_listDiscoveries
      summary: List connections an entity has discovered
      description: List all discoverable connections that an entity has 
        discovered, with optional realm filtering.
      tags:
      - Discovery
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListDiscoveriesRequest'
      responses:
        '200':
          description: Discoveries listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDiscoveriesResponse'
  /transit/discovery/check:
    post:
      operationId: transit_checkDiscoveries
      summary: Check if an entity has discovered specific connections
      description: Check whether an entity has discovered each of the specified 
        connections.
      tags:
      - Discovery
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckDiscoveriesRequest'
      responses:
        '200':
          description: Discovery status checked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckDiscoveriesResponse'
  /voice/room/join:
    post:
      summary: Join voice room and register SIP endpoint
      description: |
        Registers a participant in the voice room. If AdHocRoomsEnabled and room
        doesn't exist, auto-creates it.
        Returns connection info and current peer list for P2P mode,
        or RTP server details for scaled mode.
      operationId: voice_joinVoiceRoom
      tags:
      - Voice Rooms
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinVoiceRoomRequest'
      responses:
        '200':
          description: Successfully joined voice room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinVoiceRoomResponse'
        '404':
          description: Voice room not found
        '409':
          description: Room full or already joined
        '500':
          description: Voice tier unavailable (P2P full, scaled tier disabled)
  /voice/room/leave:
    post:
      summary: Leave voice room
      description: |
        Removes a participant from the voice room.
      operationId: voice_leaveVoiceRoom
      tags:
      - Voice Rooms
      x-permissions:
      - role: user
        states:
          voice: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveVoiceRoomRequest'
      responses:
        '200':
          description: Successfully left voice room
        '404':
          description: Voice room or participant not found
  /voice/peer/answer:
    post:
      summary: Send SDP answer to complete WebRTC handshake
      description: |
        Called by clients after receiving a VoicePeerJoinedEvent containing an SDP offer.
        The client generates an SDP answer and sends it via this endpoint.
        The answering peer is notified via VoicePeerUpdatedEvent.

        **Access Control**: This endpoint requires the `voice:ringing` state, which is
        automatically set by the Voice service when a VoicePeerJoinedEvent is sent to the client.
        The state is cleared after the answer is processed or times out.
      operationId: voice_answerPeer
      tags:
      - Voice Peers
      x-permissions:
      - role: user
        states:
          voice: ringing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerPeerRequest'
      responses:
        '200':
          description: SDP answer processed, peer notified
        '404':
          description: Peer or room not found
        '403':
          description: Not in voice:ringing state (no pending offers)
  /voice/room/broadcast/request:
    post:
      summary: Request broadcast consent from all room participants
      description: >
        Initiates the broadcast consent flow. All current room participants
        receive a VoiceBroadcastConsentRequestEvent. Broadcasting only starts
        after all participants consent. If ANY participant declines, the
        broadcast request is denied.

        This endpoint is the ONLY way to initiate voice room broadcasting.
        lib-broadcast subscribes to the resulting approval/decline events.
      operationId: voice_requestBroadcastConsent
      tags:
      - Voice Broadcasting
      x-permissions:
      - role: user
        states:
          voice: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastConsentRequest'
      responses:
        '200':
          description: Consent request sent to all participants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastConsentStatus'
        '404':
          description: Room not found
        '409':
          description: Broadcast already active or consent pending
  /voice/room/broadcast/consent:
    post:
      summary: Respond to a broadcast consent request
      description: >
        Called by each participant to consent or decline broadcasting.
        When all participants consent, lib-voice publishes
        voice.broadcast.approved. If any participant declines,
        lib-voice publishes voice.broadcast.declined.
      operationId: voice_respondBroadcastConsent
      tags:
      - Voice Broadcasting
      x-permissions:
      - role: user
        states:
          voice: consent_pending
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastConsentResponse'
      responses:
        '200':
          description: Consent response recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastConsentStatus'
        '404':
          description: Room not found or no pending consent request
  /voice/room/broadcast/stop:
    post:
      summary: Stop broadcasting from a voice room
      description: >
        Any participant can stop an active broadcast at any time.
        This is equivalent to revoking consent. Publishes
        voice.broadcast.stopped with reason ConsentRevoked.
      operationId: voice_stopBroadcast
      tags:
      - Voice Broadcasting
      x-permissions:
      - role: user
        states:
          voice: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopBroadcastConsentRequest'
      responses:
        '200':
          description: Broadcast stopped
        '404':
          description: Room not found or not broadcasting
  /voice/room/broadcast/status:
    post:
      summary: Get broadcast status for a voice room
      description: >
        Returns the current broadcast state: whether consent is pending,
        active, or inactive.
      operationId: voice_getBroadcastStatus
      tags:
      - Voice Broadcasting
      x-permissions:
      - role: user
        states:
          voice: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastStatusRequest'
      responses:
        '200':
          description: Broadcast status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastConsentStatus'
        '404':
          description: Room not found
  /website/status:
    get:
