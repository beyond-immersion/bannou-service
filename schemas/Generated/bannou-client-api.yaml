      required:
      - statusTemplateId
      properties:
        statusTemplateId:
          type: string
          format: uuid
          description: Status template to update
        displayName:
          type: string
          maxLength: 256
          nullable: true
          description: Updated display name (null means no change)
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Updated description (null means no change)
        category:
          nullable: true
          description: Updated status category (null means no change)
          allOf:
          - $ref: '#/components/schemas/StatusCategory'
        stackable:
          type: boolean
          nullable: true
          description: Updated stackable flag (null means no change)
        maxStacks:
          type: integer
          minimum: 1
          maximum: 100
          nullable: true
          description: Updated maximum stack count (null means no change)
        stackBehavior:
          nullable: true
          description: Updated stacking behavior (null means no change)
          allOf:
          - $ref: '#/components/schemas/StackBehavior'
        contractTemplateId:
          type: string
          format: uuid
          nullable: true
          description: Updated contract template reference (null means no 
            change)
        defaultDurationSeconds:
          type: integer
          minimum: 1
          nullable: true
          description: Updated default duration in seconds (null means no 
            change)
        iconAssetId:
          type: string
          format: uuid
          nullable: true
          description: Updated icon asset reference (null means no change)
    UpdateTemplateRequest:
      type: object
      description: Request to update a template (non-null fields are applied)
      required:
      - scenarioTemplateId
      properties:
        scenarioTemplateId:
          type: string
          format: uuid
          description: Template ID to update
        displayName:
          type: string
          nullable: true
          description: Updated display name
        description:
          type: string
          nullable: true
          description: Updated description
        domainWeights:
          type: array
          items:
            $ref: '#/components/schemas/DomainWeight'
          nullable: true
          description: Updated domain weights
        maxConcurrentInstances:
          type: integer
          nullable: true
          description: Updated max concurrent instances
        prerequisites:
          $ref: '#/components/schemas/ScenarioPrerequisites'
          nullable: true
          description: Updated prerequisites
        chaining:
          $ref: '#/components/schemas/ScenarioChaining'
          nullable: true
          description: Updated chaining configuration
        multiplayer:
          $ref: '#/components/schemas/ScenarioMultiplayer'
          nullable: true
          description: Updated multiplayer configuration
        content:
          $ref: '#/components/schemas/ScenarioContent'
          nullable: true
          description: Updated content references
    UploadRequest:
      description: Request to initiate an asset upload and receive a pre-signed 
        URL
      type: object
      additionalProperties: false
      required:
      - filename
      - size
      - contentType
      - ownerType
      - ownerId
      properties:
        ownerType:
          $ref: '#/components/schemas/AssetOwnerType'
          description: Type of owner initiating this upload
        ownerId:
          type: string
          minLength: 1
          description: |
            Owner identifier. For Session type: the WebSocket session ID (UUID format).
            For Service type: the service name (e.g., "behavior", "orchestrator").
        filename:
          type: string
          minLength: 1
          maxLength: 255
          description: Original filename with extension
        size:
          type: integer
          format: int64
          minimum: 1
          description: File size in bytes
        contentType:
          type: string
          minLength: 1
          description: MIME content type (e.g., image/png, model/gltf-binary)
        metadata:
          allOf:
          - $ref: '#/components/schemas/AssetMetadataInput'
          nullable: true
          description: Optional metadata for asset categorization (null to skip)
    UploadResponse:
      description: Response containing pre-signed URL and configuration for 
        uploading an asset
      type: object
      additionalProperties: false
      required:
      - uploadId
      - uploadUrl
      - expiresAt
      properties:
        uploadId:
          type: string
          format: uuid
          description: Unique upload session identifier
        uploadUrl:
          type: string
          format: uri
          description: Pre-signed URL for uploading the file
        expiresAt:
          type: string
          format: date-time
          description: When the upload URL expires
        multipart:
          $ref: '#/components/schemas/MultipartConfig'
          description: Configuration for multipart uploads if file size requires
            it
        requiredHeaders:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Headers the client must include when uploading to the 
            pre-signed URL (null if no special headers needed)
    UseItemRequest:
      type: object
      description: Request to use an item instance by executing its behavior 
        contract
      additionalProperties: false
      required:
      - instanceId
      - userId
      - userType
      properties:
        instanceId:
          type: string
          format: uuid
          description: Unique identifier of the item instance to use
        userId:
          type: string
          format: uuid
          description: Unique identifier of the entity using the item 
            (character, account, or actor)
        userType:
          $ref: '#/components/schemas/EntityType'
          description: Type of user entity performing the use action
        targetId:
          type: string
          format: uuid
          nullable: true
          description: Optional unique identifier of the target entity for 
            directional item effects
        targetType:
          $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Type of target entity when targetId is provided
        context:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Caller-provided context merged into contract gameMetadata for template
            value substitution.
            No Bannou plugin reads specific keys from this field by convention.
    UseItemResponse:
      type: object
      description: Response containing the result of an item use attempt
      additionalProperties: false
      required:
      - templateId
      - consumed
      properties:
        templateId:
          type: string
          format: uuid
          description: Unique identifier of the item template defining the used 
            item
        contractInstanceId:
          type: string
          format: uuid
          nullable: true
          description: Unique identifier of the contract instance created for 
            this use (null if creation failed)
        consumed:
          type: boolean
          description: Whether the item was consumed (quantity decremented or 
            destroyed)
        remainingQuantity:
          type: number
          format: double
          nullable: true
          description: Remaining quantity after use (null if item was fully 
            consumed or destroyed)
        failureReason:
          type: string
          nullable: true
          description: Human-readable reason for failure when success is false
    UseItemStepRequest:
      type: object
      description: Request to complete a step of a multi-step item use
      additionalProperties: false
      required:
      - instanceId
      - userId
      - userType
      - milestoneCode
      properties:
        instanceId:
          type: string
          format: uuid
          description: Item instance being used
        userId:
          type: string
          format: uuid
          description: User performing the step
        userType:
          $ref: '#/components/schemas/EntityType'
          description: Type of user entity performing the step
        milestoneCode:
          type: string
          maxLength: 64
          description: Milestone code to complete in the use behavior contract
        evidence:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Evidence data passed through to Contract milestone completion.
            No Bannou plugin reads specific keys from this field by convention.
        context:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Caller-provided context merged into contract gameMetadata for template
            value substitution.
            No Bannou plugin reads specific keys from this field by convention.
    UseItemStepResponse:
      type: object
      description: Response from completing a multi-step item use milestone
      additionalProperties: false
      required:
      - instanceId
      - contractInstanceId
      - completedMilestone
      - isComplete
      - consumed
      properties:
        instanceId:
          type: string
          format: uuid
          description: Item instance ID
        contractInstanceId:
          type: string
          format: uuid
          description: Contract instance tracking this use session
        completedMilestone:
          type: string
          description: The milestone that was completed
        remainingMilestones:
          type: array
          items:
            type: string
          nullable: true
          description: Milestones still to be completed (null if complete or 
            failed)
        isComplete:
          type: boolean
          description: Whether all required milestones are complete
        consumed:
          type: boolean
          description: Whether item was consumed (only true when all steps 
            complete per itemUseBehavior)
        failureReason:
          type: string
          nullable: true
          description: Human-readable reason for failure when success is false
    ValidateAbmlRequest:
      description: Request to validate ABML YAML content against schema and 
        semantic rules
      type: object
      additionalProperties: false
      required:
      - abmlContent
      properties:
        abmlContent:
          type: string
          minLength: 1
          description: Raw ABML YAML content to validate
        strictMode:
          type: boolean
          default: false
          description: Enable strict validation mode with enhanced checking
    ValidateAbmlResponse:
      description: Response containing the results of ABML validation including 
        errors and warnings
      type: object
      additionalProperties: false
      required:
      - isValid
      properties:
        isValid:
          type: boolean
          description: Whether the ABML definition is valid
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          nullable: true
          description: List of validation errors if invalid
        semanticWarnings:
          type: array
          items:
            type: string
          nullable: true
          description: Semantic warnings that don't prevent compilation
        schemaVersion:
          type: string
          nullable: true
          description: ABML schema version used for validation
    ValidateDepositRequest:
      type: object
      additionalProperties: false
      description: Request to validate a deposit without executing
      required:
      - escrowId
      - partyId
      - partyType
      - assets
      properties:
        escrowId:
          type: string
          format: uuid
          description: Escrow ID
        partyId:
          type: string
          format: uuid
          description: Party to validate
        partyType:
          description: Type of entity (Account, Character, etc.)
          $ref: '#/components/schemas/EntityType'
        assets:
          $ref: '#/components/schemas/EscrowAssetBundleInput'
          description: Assets to validate
    ValidateDepositResponse:
      type: object
      additionalProperties: false
      description: Response from deposit validation
      required:
      - valid
      - errors
      - warnings
      properties:
        valid:
          type: boolean
          description: Whether the deposit would be valid
        errors:
          type: array
          items:
            type: string
          description: Validation errors
        warnings:
          type: array
          items:
            type: string
          description: Validation warnings
    ValidateMidiJsonRequest:
      description: Request to validate MIDI-JSON structure
      type: object
      additionalProperties: false
      required:
      - midiJson
      properties:
        midiJson:
          $ref: '#/components/schemas/MidiJson'
          description: MIDI-JSON structure to validate
        strictMode:
          type: boolean
          default: false
          description: Enable strict validation with additional checks
    ValidateMidiJsonResponse:
      description: Response containing validation results
      type: object
      additionalProperties: false
      required:
      - isValid
      properties:
        isValid:
          type: boolean
          description: Whether the MIDI-JSON is valid
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          nullable: true
          description: Validation errors if invalid
        warnings:
          type: array
          items:
            type: string
          nullable: true
          description: Non-fatal warnings
    ValidateSceneRequest:
      type: object
      additionalProperties: false
      description: Request to validate a scene structure
      required:
      - scene
      properties:
        scene:
          $ref: '#/components/schemas/Scene'
          description: The scene to validate
        applyGameRules:
          type: boolean
          default: true
          description: Whether to apply registered game-specific validation 
            rules
    ValidateTokenResponse:
      description: Response from token validation containing associated account 
        details. HTTP 200 confirms the token is valid; 401 indicates invalid or 
        expired.
      type: object
      additionalProperties: false
      required:
      - accountId
      - sessionKey
      - remainingTime
      properties:
        accountId:
          type: string
          format: uuid
          description: Unique identifier for the account associated with the 
            token
        sessionKey:
          type: string
          format: uuid
          description: Internal session key used by Connect service for 
            WebSocket connection tracking and service routing
        roles:
          type: array
          items:
            type: string
          nullable: true
          description: List of roles assigned to the authenticated user
        authorizations:
          type: array
          items:
            type: string
          nullable: true
          description: |
            Authorization strings from active subscriptions.
            Format: "{stubName}:{state}" (e.g., "my-game:authorized")
        remainingTime:
          type: integer
          description: Seconds until expiration
    ValidationCondition:
      type: object
      description: A single condition to check against an API response
      additionalProperties: false
      required:
      - type
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/ValidationConditionType'
          description: The type of validation condition to check
        jsonPath:
          type: string
          nullable: true
          description: JsonPath expression to extract value from response 
            (required for jsonPathEquals/Exists/NotExists, e.g. "$.balance")
        expectedValue:
          type: string
          nullable: true
          description: Expected value for comparison conditions with type 
            coercion ("true"/"false" for booleans, numeric strings for numbers)
        operator:
          $ref: '#/components/schemas/ComparisonOperator'
          nullable: true
          description: Comparison operator for numeric comparisons
        statusCodes:
          type: array
          items:
            type: integer
          description: HTTP status codes for statusCodeIn condition
    ValidationConditionType:
      type: string
      description: Type of validation condition
      enum:
      - StatusCodeIn
      - JsonPathEquals
      - JsonPathNotEquals
      - JsonPathExists
      - JsonPathNotExists
      - JsonPathGreaterThan
      - JsonPathLessThan
      - JsonPathContains
    ValidationError:
      description: Detailed validation error with type, location, and message 
        information
      type: object
      additionalProperties: false
      required:
      - type
      - message
      properties:
        type:
          $ref: '#/components/schemas/ValidationErrorType'
          description: Type of validation error
        message:
          type: string
          description: Human-readable error message
        lineNumber:
          type: integer
          nullable: true
          minimum: 1
          description: Line number where the error occurred. Null if not 
            applicable.
        columnNumber:
          type: integer
          nullable: true
          minimum: 1
          description: Column number where the error occurred. Null if not 
            applicable.
        yamlPath:
          type: string
          nullable: true
          description: YAML path to the problematic element
          example: "behaviors.morning_startup.actions[0]"
    ValidationErrorType:
      type: string
      description: Type of ABML validation error
      enum:
      - Syntax
      - Semantic
      - Schema
      - Context
      - ServiceDependency
    ValidationFailure:
      type: object
      additionalProperties: false
      description: Records a validation check failure
      required:
      - detectedAt
      - assetType
      - assetDescription
      - failureType
      - affectedPartyId
      - affectedPartyType
      properties:
        detectedAt:
          type: string
          format: date-time
          description: When the failure was detected
        assetType:
          $ref: '#/components/schemas/AssetType'
          description: Type of asset affected
        assetDescription:
          type: string
          description: Description of the affected asset
        failureType:
          $ref: '#/components/schemas/ValidationFailureType'
          description: Type of validation failure
        affectedPartyId:
          type: string
          format: uuid
          description: Which party deposit is affected
        affectedPartyType:
          $ref: '#/components/schemas/EntityType'
          description: Type of the affected party
        details:
          type: object
          nullable: true
          additionalProperties: true
          description: >-
            Validation failure diagnostic details.
            No Bannou plugin reads specific keys from this field by convention.
    ValidationFailureType:
      type: string
      description: |
        Type of validation failure detected.
        - asset_missing: Asset no longer exists in escrow custody
        - asset_mutated: Asset properties changed (e.g., item durability)
        - asset_expired: Asset has a time-based expiration that triggered
        - balance_mismatch: Wallet balance does not match expected held amount
      enum:
      - AssetMissing
      - AssetMutated
      - AssetExpired
      - BalanceMismatch
    ValidationResult:
      type: object
      additionalProperties: false
      description: Result of scene validation
      required:
      - valid
      properties:
        valid:
          type: boolean
          description: Whether the scene passed all validation checks
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          nullable: true
          description: Validation errors (severity = error)
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          nullable: true
          description: Validation warnings (severity = warning)
    ValidationRule:
      type: object
      additionalProperties: false
      description: A validation rule definition
      required:
      - ruleId
      - description
      - severity
      - ruleType
      properties:
        ruleId:
          type: string
          minLength: 1
          maxLength: 200
          description: Unique rule identifier within the gameId+sceneType
        description:
          type: string
          minLength: 1
          maxLength: 2000
          description: Human-readable description of the rule
        severity:
          $ref: '#/components/schemas/ValidationSeverity'
          description: Whether violation is an error or warning
        ruleType:
          $ref: '#/components/schemas/ValidationRuleType'
          description: Type of validation check
        config:
          $ref: '#/components/schemas/ValidationRuleConfig'
          nullable: true
          description: Rule-specific configuration
    ValidationRuleConfig:
      type: object
      additionalProperties: false
      description: Configuration for a validation rule (fields are conditional 
        on rule type)
      properties:
        nodeType:
          $ref: '#/components/schemas/NodeType'
          nullable: true
          description: Filter to nodes of this type (for RequireTag, 
            RequireNodeType)
        tag:
          type: string
          nullable: true
          maxLength: 200
          description: Tag to check for
        minCount:
          type: integer
          nullable: true
          minimum: 0
          description: Minimum occurrences required
        maxCount:
          type: integer
          nullable: true
          minimum: 0
          description: Maximum occurrences allowed
        annotationPath:
          type: string
          nullable: true
          maxLength: 500
          description: JSONPath to required annotation field (for 
            RequireAnnotation)
        expression:
          type: string
          nullable: true
          maxLength: 2000
          description: Custom validation expression (for CustomExpression)
    ValidationRuleType:
      type: string
      description: Type of validation check to perform
      enum:
      - RequireTag
      - RequireNodeType
      - ForbidTag
      - RequireAnnotation
      - CustomExpression
    ValidationSeverity:
      type: string
      description: Severity level of a validation issue
      enum:
      - Error
      - Warning
    ValidatorConfig:
      type: object
      additionalProperties: false
      description: Validation rules applied to messages in rooms of this type
      properties:
        maxMessageLength:
          type: integer
          nullable: true
          description: Maximum message length in characters for text and custom 
            formats
        allowedPattern:
          type: string
          nullable: true
          description: Regex pattern for content validation
        allowedValues:
          type: array
          nullable: true
          description: Whitelist of allowed values (emoji codes, etc.)
          items:
            type: string
            description: An allowed value
        requiredFields:
          type: array
          nullable: true
          description: Required JSON fields for Custom format messages
          items:
            type: string
            description: A required field name
        jsonSchema:
          type: string
          nullable: true
          description: Full JSON Schema string for complex Custom format 
            validation
    Vec3:
      type: object
      description: Three-dimensional spatial coordinates in garden space
      required:
      - x
      - y
      - z
      properties:
        x:
          type: number
          format: float
          description: X coordinate in garden space units
        y:
          type: number
          format: float
          description: Y coordinate in garden space units
        z:
          type: number
          format: float
          description: Z coordinate in garden space units
    Vector3:
      type: object
      additionalProperties: false
      description: A point or direction in 3D space
      required:
      - x
      - y
      - z
      properties:
        x:
          type: number
          format: double
          description: X coordinate
        y:
          type: number
          format: double
          description: Y coordinate
        z:
          type: number
          format: double
          description: Z coordinate
    VerifyIntegrityRequest:
      type: object
      additionalProperties: false
      description: Request to verify data integrity of a save version via hash 
        comparison
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-z][a-z0-9-]*$'
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Name of the slot to verify
        versionNumber:
          type: integer
          nullable: true
          description: Version to verify (latest if null)
    VerifyIntegrityResponse:
      type: object
      additionalProperties: false
      description: Result of integrity verification with hash comparison details
      required:
      - valid
      - versionNumber
      - expectedHash
      properties:
        valid:
          type: boolean
          description: Whether integrity check passed
        versionNumber:
          type: integer
          description: Version that was verified
        expectedHash:
          type: string
          description: Expected SHA-256 hash
        actualHash:
          type: string
          nullable: true
          description: Actual hash (null if data unavailable)
        errorMessage:
          type: string
          nullable: true
          description: Error details if verification failed
    VersionInfo:
      type: object
      additionalProperties: false
      description: Information about a specific version
      required:
      - version
      - createdAt
      - nodeCount
      properties:
        version:
          type: string
          description: Version string
        createdAt:
          type: string
          format: date-time
          description: When this version was created
        createdBy:
          type: string
          nullable: true
          maxLength: 200
          description: Who created this version
        changesSummary:
          type: string
          nullable: true
          maxLength: 2000
          description: Summary of changes
        nodeCount:
          type: integer
          description: Node count at this version
    VersionResponse:
      type: object
      additionalProperties: false
      description: Metadata for a single save version including size and 
        checkpoint info
      required:
      - versionNumber
      - contentHash
      - sizeBytes
      - pinned
      - createdAt
      properties:
        versionNumber:
          type: integer
          description: Version number
        assetId:
          type: string
          format: uuid
          nullable: true
          description: Reference to asset in lib-asset (null if not yet uploaded
            to MinIO)
        contentHash:
          type: string
          description: SHA-256 hash
        sizeBytes:
          type: integer
          format: int64
          description: Size in bytes
        compressedSizeBytes:
          type: integer
          format: int64
          description: Compressed size if applicable
        schemaVersion:
          type: string
          nullable: true
          description: Schema version
        displayName:
          type: string
          nullable: true
          description: Human-readable name
        pinned:
          type: boolean
          description: Whether version is pinned
        checkpointName:
          type: string
          nullable: true
          description: Checkpoint name if pinned
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Custom metadata (null if none set)
    ViolationRecord:
      type: object
      description: Record of a knowing obligation violation by a character
      additionalProperties: false
      required:
      - violationId
      - characterId
      - contractId
      - clauseCode
      - violationType
      - actionTag
      - motivationScore
      - violationCost
      - breachReported
      - timestamp
      properties:
        violationId:
          type: string
          format: uuid
          description: Unique identifier for this violation record
        characterId:
          type: string
          format: uuid
          description: Character who committed the violation
        contractId:
          type: string
          format: uuid
          description: Contract that was violated
        clauseCode:
          type: string
          minLength: 1
          maxLength: 128
          description: Code of the behavioral clause that was violated
        violationType:
          type: string
          minLength: 1
          maxLength: 128
          description: Violation type code
        actionTag:
          type: string
          minLength: 1
          maxLength: 128
          description: GOAP action tag that triggered the violation
        motivationScore:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Goal urgency that overrode the obligation (0.0-1.0)
        violationCost:
          type: number
          format: float
          minimum: 0.0
          description: Total violation cost that was accepted
        breachReported:
          type: boolean
          description: Whether a breach was filed with the contract service
        breachId:
          type: string
          format: uuid
          nullable: true
          description: Breach record ID from contract service (null if breach 
            not reported)
        targetEntityId:
          type: string
          format: uuid
          nullable: true
          description: Target entity of the violating action (null if no 
            specific target)
        targetEntityType:
          $ref: '#/components/schemas/EntityType'
          nullable: true
          description: Entity type of the target
        timestamp:
          type: string
          format: date-time
          description: When the violation occurred
    VoiceCodec:
      type: string
      enum:
      - Opus
      - G711
      - G722
      description: Audio codec for voice communication
    VoiceLeadRequest:
      description: Request to apply voice leading to a chord sequence
      type: object
      additionalProperties: false
      required:
      - chords
      - voiceCount
      properties:
        chords:
          type: array
          items:
            $ref: '#/components/schemas/ChordSymbol'
          description: Chord symbols to voice
        voiceCount:
          type: integer
          minimum: 2
          maximum: 8
          description: Number of voices
        ranges:
          type: array
          items:
            $ref: '#/components/schemas/PitchRange'
          nullable: true
          description: Pitch range per voice (defaults based on voice count)
        rules:
          $ref: '#/components/schemas/VoiceLeadingRules'
          nullable: true
          description: Voice leading rules to apply
    VoiceLeadResponse:
      description: Response containing voiced chords
      type: object
      additionalProperties: false
      required:
      - voicings
      properties:
        voicings:
          type: array
          items:
            $ref: '#/components/schemas/VoicedChord'
          description: Voiced chord realizations
        violations:
          type: array
          items:
            $ref: '#/components/schemas/VoiceLeadingViolation'
          nullable: true
          description: Voice leading rule violations (warnings)
    VoiceLeadingRules:
      x-sdk-type: BeyondImmersion.Bannou.MusicTheory.Harmony.VoiceLeadingRules
      description: Rules for voice leading
      type: object
      additionalProperties: false
      properties:
        avoidParallelFifths:
          type: boolean
          default: true
          description: Avoid parallel perfect fifths
        avoidParallelOctaves:
          type: boolean
          default: true
          description: Avoid parallel octaves
        preferStepwiseMotion:
          type: boolean
          default: true
          description: Prefer stepwise voice motion
        avoidVoiceCrossing:
          type: boolean
          default: true
          description: Avoid voice crossing
        maxLeap:
          type: integer
          minimum: 1
          maximum: 12
          default: 7
          description: Maximum leap in semitones
    VoiceLeadingViolation:
      x-sdk-type: 
        BeyondImmersion.Bannou.MusicTheory.Harmony.VoiceLeadingViolation
      description: A voice leading rule violation
      type: object
      additionalProperties: false
      required:
      - type
      - position
      - voices
      - isError
      - message
      properties:
        type:
          $ref: '#/components/schemas/VoiceLeadingViolationType'
          description: Type of violation
        position:
          type: integer
          description: Position in the progression (0-based)
        voices:
          type: array
          items:
            type: integer
          description: Voice indices involved (0 = bass)
        isError:
          type: boolean
          description: Severity (true = error, false = warning)
        message:
          type: string
          description: Human-readable description
    VoiceLeadingViolationType:
      x-sdk-type: 
        BeyondImmersion.Bannou.MusicTheory.Harmony.VoiceLeadingViolationType
      description: Type of voice leading rule violation
      type: string
      enum:
      - ParallelFifths
      - ParallelOctaves
      - VoiceCrossing
      - VoiceOverlap
      - LargeLeap
      - UnresolvedLeap
      - DoubledLeadingTone
    VoicePeer:
      type: object
      additionalProperties: false
      description: Peer endpoint details for P2P connection
      required:
      - sessionId
      - sipEndpoint
      properties:
        sessionId:
          type: string
          format: uuid
          description: WebSocket session ID for this peer (ephemeral identifier)
        displayName:
          type: string
          nullable: true
          description: Display name
        sipEndpoint:
          $ref: '#/components/schemas/SipEndpoint'
          description: Peer's SIP endpoint for direct connection
    VoiceTier:
      type: string
      enum:
      - P2P
      - Scaled
      description: |
        Voice communication tier:
        - P2P: Direct peer-to-peer connections (up to 6 participants)
        - Scaled: RTP server-mediated communication (unlimited participants)
    VoicedChord:
      description: A chord with specific voice pitches
      type: object
      additionalProperties: false
      required:
      - symbol
      - pitches
      properties:
        symbol:
          $ref: '#/components/schemas/ChordSymbol'
          description: Original chord symbol
        pitches:
          type: array
          items:
            $ref: '#/components/schemas/Pitch'
          description: Pitches from lowest to highest voice
    VolumeShape:
      type: string
      description: Shape of a volume node for spatial bounds
      enum:
      - Box
      - Sphere
      - Capsule
      - Cylinder
    WatcherInfo:
      type: object
      additionalProperties: false
      description: Information about an active regional watcher
      required:
      - watcherId
      - realmId
      - watcherType
      - startedAt
      properties:
        watcherId:
          type: string
          format: uuid
          description: Unique identifier for this watcher instance
        realmId:
          type: string
          format: uuid
          description: Realm this watcher monitors
        watcherType:
          type: string
          description: Type of watcher (e.g., "regional", "dungeon", "event")
        startedAt:
          type: string
          format: date-time
          description: When this watcher was started
        behaviorRef:
          type: string
          nullable: true
          description: Behavior document reference this watcher uses
        actorId:
          type: string
          format: uuid
          nullable: true
          description: Actor instance ID running this watcher's behavior
    WeightContribution:
      type: string
      description: How container weight propagates to parent
      enum:
      - None
      - SelfOnly
      - SelfPlusContents
    WeightPrecision:
      type: string
      description: Precision for weight values (consistent with 
        CurrencyPrecision)
      enum:
      - Integer
      - Decimal1
      - Decimal2
      - Decimal3
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/login or OAuth flow
tags:
- name: ABML Behavior Management
  description: Arcadia Behavior Markup Language (ABML) API for character 
    behavior management.
- name: Actor
  description: Distributed actor management and execution for NPC brains, event 
    coordinators,
- name: Asset
  description: Asset management service for storage, versioning, and 
    distribution of large binary assets.
- name: Bannou Account
  description: Internal account management service (CRUD operations only, never 
    exposed to internet).
- name: Bannou Achievement
  description: Achievement and trophy system with progress tracking and platform
    synchronization.
- name: Bannou Auth
  description: Authentication and session management service (Internet-facing).
- name: Bannou Character
  description: Character management service for game worlds.
- name: Bannou Character Encounter
  description: Character encounter tracking service for memorable interactions 
    between characters.
- name: Bannou Character Personality
  description: Machine-readable personality traits for NPC behavior decisions.
- name: Bannou Connect
  description: Real-time communication and WebSocket connection management for 
    Bannou services.
- name: Bannou Documentation
  description: Knowledge base API for AI agents to query documentation.
- name: Bannou Faction
  description: Faction management as seed-based living entities (L4 
    GameFeatures).
- name: Bannou Game Session
  description: Minimal game session management for games.
- name: Bannou Gardener
  description: Player experience orchestration service (L4 GameFeatures) for 
    garden navigation,
- name: Bannou Leaderboard
  description: Real-time leaderboard management using Redis Sorted Sets for 
    efficient ranking.
- name: Bannou Location
  description: Location management service for game worlds.
- name: Bannou Mapping
  description: Spatial data management service for game worlds.
- name: Bannou Matchmaking
  description: Matchmaking service for competitive and casual game matching.
- name: Bannou Obligation
  description: Contract-aware obligation tracking for NPC cognition (L4 
    GameFeatures).
- name: Bannou Puppetmaster
  description: Orchestration service for dynamic behaviors, regional watchers, 
    and encounter coordination.
- name: Bannou Quest
  description: Quest system providing objective-based gameplay progression as a 
    thin orchestration
- name: Bannou Realm History
  description: Historical event participation and lore management for realms.
- name: Bannou Scene
  description: Hierarchical composition storage for game worlds.
- name: Bannou Subscription
  description: Manages user subscriptions to game services.
- name: Bannou Voice
  description: Voice room coordination service. Internal service accessed by 
    other services via lib-mesh.
- name: Bannou Website
  description: Public-facing website service for registration, information, and 
    account management.
- name: Chat
  description: 'Typed message channel service (L1 AppFoundation) providing universal
    communication primitives. Channel type determines valid message formats: text,
    sentiment, emoji, or custom-validated payloads. Supports contract- governed room
    lifecycles, Connect companion rooms, and moderation primitives. Internal-only,
    never internet-facing.'
- name: Collection
  description: Universal content unlock and archive system for collectible 
    content.
- name: Contract
  description: Binding agreements between entities with milestone-based 
    progression.
- name: Currency
  description: Multi-currency management service for game economies.
- name: Escrow
  description: Full-custody orchestration layer for multi-party asset exchanges.
- name: Inventory
  description: Container and inventory management service for games.
- name: Item
  description: Item template and instance management service.
- name: License
  description: Grid-based progression boards via itemized contracts.
- name: Music Theory Engine
  description: Pure computation music generation using formal music theory 
    rules.
- name: Relationship
  description: Relationship and relationship type management service for 
    entity-to-entity
- name: Save-Load
  description: Generic save/load system for game state persistence.
- name: Seed
  description: Generic progressive growth entity service (L2 GameFoundation). 
    Seeds are entities that start empty and grow by accumulating metadata from 
    external events, progressively gaining capabilities. Polymorphic ownership 
    allows seeds to be bound to any entity type (accounts, actors, realms, 
    characters, relationships). Growth domains are arbitrary key-value maps 
    contributed by any consuming service via events, following the same pattern 
    as Resource reference tracking. Capability manifests are computed from 
    growth domains using configurable rules per seed type. The Seed service is 
    agnostic to what seeds represent -- consumers (lib-gardener for player 
    spirits, lib-actor for dungeon cores, etc.) provide the interpretation.
- name: Status
  description: Unified entity effects query layer for temporary contract-managed
    statuses
- name: Storyline Composer
  description: Seeded narrative generation from compressed archives using the 
    storyline SDKs.
- name: Transit
  description: Geographic connectivity graph, transit mode registry, and journey
    tracking
- name: Worldstate
  description: Per-realm game time authority, calendar system, and temporal 
    event broadcasting.
