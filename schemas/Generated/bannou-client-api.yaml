    CapOverflowBehavior:
      type: string
      description: What happens when a credit would exceed the wallet cap
      enum:
      - Reject
      - CapAndLose
      - CapAndReturn
    Capability:
      type: object
      additionalProperties: false
      description: A single capability entry in the manifest.
      required:
      - capabilityCode
      - domain
      - fidelity
      - unlocked
      properties:
        capabilityCode:
          type: string
          minLength: 1
          description: >
            Unique capability identifier. Consumer-interpreted
            (e.g., UX module ID, spawning permission, faction action).
        domain:
          type: string
          minLength: 1
          description: Growth domain this capability maps to.
        fidelity:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: >
            Capability fidelity from 0.0 to 1.0. Higher values mean the
            seed has more developed capability in this area.
        unlocked:
          type: boolean
          description: Whether this capability is available at all.
    CapabilityManifestResponse:
      type: object
      additionalProperties: false
      description: Computed capability manifest for a seed.
      required:
      - seedId
      - seedTypeCode
      - computedAt
      - version
      - capabilities
      properties:
        seedId:
          type: string
          format: uuid
          description: The seed this manifest belongs to.
        seedTypeCode:
          type: string
          minLength: 1
          description: The seed type for consumer interpretation.
        computedAt:
          type: string
          format: date-time
          description: When this manifest was last computed.
        version:
          type: integer
          minimum: 0
          description: Monotonically increasing version number.
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/Capability'
          description: List of capabilities with availability and fidelity.
    CapabilityRule:
      type: object
      additionalProperties: false
      description: Maps a growth domain to a capability with unlock threshold 
        and fidelity formula.
      required:
      - capabilityCode
      - domain
      - unlockThreshold
      - fidelityFormula
      properties:
        capabilityCode:
          type: string
          minLength: 1
          description: Unique capability identifier (e.g., "combat.stance").
        domain:
          type: string
          minLength: 1
          description: Which growth domain this capability maps to.
        unlockThreshold:
          type: number
          format: float
          minimum: 0
          description: Minimum domain depth to unlock this capability.
        fidelityFormula:
          type: string
          minLength: 1
          description: >
            How domain depth maps to fidelity (0.0-1.0). Values: "linear",
            "logarithmic", "step". Consumers may define additional formulas.
    CategoryCount:
      description: Document count for a specific category
