        if code already exists for the given game service scope.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRoomTypeRequest'
      responses:
        '200':
          description: Room type registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomTypeResponse'
  /chat/type/get:
    post:
      operationId: chat_GetRoomType
      summary: Get room type by code
      description: Returns the room type definition for the specified code and 
        optional game service scope.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetRoomTypeRequest'
      responses:
        '200':
          description: Room type found
          content:
