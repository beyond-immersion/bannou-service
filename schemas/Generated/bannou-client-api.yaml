          description: Owner to search
        ownerType:
          $ref: '#/components/schemas/ContainerOwnerType'
          description: Owner type
        templateId:
          type: string
          format: uuid
          description: Item template
        quantity:
          type: number
          format: double
          default: 1
          description: Quantity to place
        preferStackable:
          type: boolean
          default: true
          description: Prefer existing stacks
    FindSpaceResponse:
      type: object
      description: Find space result
      additionalProperties: false
      required:
      - hasSpace
      - candidates
      properties:
        hasSpace:
          type: boolean
          description: Whether space found
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/SpaceCandidate'
          description: Potential placements
    FormTemplate:
      description: A musical form structure template
      type: object
      additionalProperties: false
      required:
      - name
      - sections
      properties:
        name:
          type: string
          description: Form name (e.g., "AABB", "verse-chorus")
        sections:
          type: array
          items:
            type: string
          description: Section sequence (e.g., ["A", "A", "B", "B"])
        barsPerSection:
          type: integer
          minimum: 1
          maximum: 64
          default: 8
          description: Default bars per section
    FunctionalAnalysis:
      description: Functional harmonic analysis classification
      type: string
      enum:
      - Tonic
      - Subdominant
      - Dominant
      - Predominant
    GameActionRequest:
      description: Request to perform a game action such as movement or combat
      type: object
      additionalProperties: false
      required:
      - gameType
      - actionType
      properties:
        gameType:
          $ref: '#/components/schemas/GameType'
          description: Game type for the action. Determines which lobby to apply
            the action.
        actionType:
          $ref: '#/components/schemas/GameActionType'
          description: Type of game action to perform
        actionData:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Game-specific action data.
            No Bannou plugin reads specific keys from this field by convention.
        targetId:
          type: string
          format: uuid
          nullable: true
          description: Target of the action (if applicable)
    GameActionResponse:
      description: Confirms the action was accepted and provides the action ID 
        for async result correlation. Game-specific results are delivered 
        asynchronously via client events from the processing service (L4), not 
        in this response.
      type: object
      additionalProperties: false
      required:
      - actionId
      properties:
        actionId:
          type: string
          format: uuid
          description: Unique identifier for this action instance. Use to 
            correlate with async results delivered via 
            GameActionResultClientEvent.
    GameActionType:
      type: string
      description: Opaque string code identifying the type of game action. 
        Action types are game-defined and extensible without schema changes. 
        Common conventions include move, interact, attack, cast_spell, use_item,
        but any string code is valid.
    GamePlayer:
      description: Information about a player currently participating in a game 
        session
      type: object
      additionalProperties: false
      required:
      - accountId
      - sessionId
      - joinedAt
      - role
      properties:
        accountId:
          type: string
          format: uuid
          description: Unique identifier for the player's account
        sessionId:
          type: string
          format: uuid
          description: WebSocket session ID that joined the game. Chat and 
            events are delivered to this specific session only.
        displayName:
          type: string
          nullable: true
          description: Display name shown to other players
        role:
          $ref: '#/components/schemas/PlayerRole'
          description: Role of the player in the game session
        joinedAt:
          type: string
          format: date-time
          description: Timestamp when the player joined the session
        characterData:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Game-specific character data for this player.
            No Bannou plugin reads specific keys from this field by convention.
    GameRealm:
      type: string
      minLength: 1
      description: |
        Realm stub name (lowercase string identifier) that this asset belongs to.
        Use the realm's stub_name property (e.g., "realm-1", "realm-2") from the Realm service.
        Null for assets that are available across all realms.
    GameSessionResponse:
      description: Complete details of a game session including players and 
        settings
      type: object
      additionalProperties: false
      required:
      - sessionId
      - gameType
      - status
      - createdAt
      - sessionType
      properties:
        sessionId:
          type: string
          format: uuid
          description: Unique identifier for the game session
        gameType:
          $ref: '#/components/schemas/GameType'
          description: Type of game for this session
        sessionType:
          $ref: '#/components/schemas/SessionType'
          description: Type of session - lobby or matchmade
        sessionName:
          type: string
          nullable: true
          description: Display name for the session
        status:
          $ref: '#/components/schemas/SessionStatus'
          description: Current status of the game session
        maxPlayers:
          type: integer
          description: Maximum number of players allowed in the session
        currentPlayers:
          type: integer
          description: Current number of players in the session
        isPrivate:
          type: boolean
          description: Whether the session requires a password to join
        owner:
          type: string
          format: uuid
          nullable: true
          description: Account ID of the session owner (null for system-owned 
            lobby sessions)
        players:
          type: array
          items:
            $ref: '#/components/schemas/GamePlayer'
          description: List of players currently in the session
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the session was created
        gameSettings:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Game-specific configuration settings.
            No Bannou plugin reads specific keys from this field by convention.
        reservations:
          type: array
          items:
            $ref: '#/components/schemas/ReservationInfo'
          nullable: true
          description: For matchmade sessions - reservation tokens for expected 
            players
        reservationExpiresAt:
          type: string
          format: date-time
          nullable: true
          description: For matchmade sessions - when reservations expire
    GameTimeSnapshot:
      type: object
      additionalProperties: false
      description: Complete point-in-time game time state for a realm, used in 
        responses and boundary events
      required:
      - realmId
      - gameServiceId
      - year
      - monthIndex
      - monthCode
      - dayOfMonth
      - dayOfYear
      - hour
      - minute
      - period
      - isDaylight
      - season
      - seasonIndex
      - seasonProgress
      - totalGameSecondsSinceEpoch
      - timeRatio
      - timestamp
      properties:
        realmId:
          type: string
          format: uuid
          description: Realm this snapshot belongs to
        gameServiceId:
          type: string
          format: uuid
          description: Game service the realm belongs to
        year:
          type: integer
          minimum: 0
          description: Current game year (0-based from realm epoch)
        monthIndex:
          type: integer
          minimum: 0
          description: 0-based index into calendar months
        monthCode:
          type: string
          minLength: 1
          maxLength: 64
          description: Month code from calendar template (e.g., "greenleaf")
        dayOfMonth:
          type: integer
          minimum: 1
          description: 1-based day within current month
        dayOfYear:
          type: integer
          minimum: 1
          description: 1-based day within current year
        hour:
          type: integer
          minimum: 0
          description: Current game hour (0 to gameHoursPerDay-1)
        minute:
          type: integer
          minimum: 0
          maximum: 59
          description: Current game minute (0-59)
        period:
          type: string
          minLength: 1
          maxLength: 64
          description: Current day period code from calendar (e.g., "dawn", 
            "morning")
        isDaylight:
          type: boolean
          description: True if current period's isDaylight flag is set in the 
            calendar template
        season:
          type: string
          minLength: 1
          maxLength: 64
          description: Current season code from calendar (e.g., "spring")
        seasonIndex:
          type: integer
          minimum: 0
          description: Current season ordinal (0-based)
        seasonProgress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: 0.0-1.0 progress through the current season, computed 
            from day-of-season / days-in-season
        totalGameSecondsSinceEpoch:
          type: integer
          format: int64
          description: Absolute game-seconds since realm epoch
        timeRatio:
          type: number
          format: float
          description: Current game-seconds per real-second
        timestamp:
          type: string
          format: date-time
          description: Real-world UTC timestamp of this snapshot
    GameType:
      type: string
      description: Game service stub name for this session. Use the game 
        service's stubName property (e.g., "my-game"). Use "generic" for 
        non-game-specific sessions.
    GardenStateResponse:
      type: object
      description: Current garden instance state for a player
      required:
      - gardenInstanceId
      - seedId
      - accountId
      - position
      - activePois
      properties:
        gardenInstanceId:
          type: string
          format: uuid
          description: Unique identifier for this garden instance
        seedId:
          type: string
          format: uuid
          description: Active seed for this garden session
        accountId:
          type: string
          format: uuid
          description: Account in the garden
        position:
          $ref: '#/components/schemas/Vec3'
          description: Current player position
        activePois:
          type: array
          items:
            $ref: '#/components/schemas/PoiSummary'
          description: Currently active POIs in this garden instance
    GenerateCompositionRequest:
      description: Request to generate a complete musical composition
      type: object
      additionalProperties: false
      required:
      - styleId
      properties:
        styleId:
          type: string
          description: ID of the style to use for generation
          example: "celtic"
        durationBars:
          type: integer
          minimum: 4
          maximum: 256
          default: 32
          description: Target duration in bars
        key:
          $ref: '#/components/schemas/KeySignature'
          nullable: true
          description: Key signature (random if not specified)
        tempo:
          type: integer
          minimum: 40
          maximum: 240
          nullable: true
          description: Tempo in BPM (uses style default if not specified)
        mood:
          $ref: '#/components/schemas/Mood'
          nullable: true
          description: Mood constraint for generation
        tuneType:
          type: string
          nullable: true
          description: Style-specific tune type (e.g., "reel", "jig" for Celtic)
          example: "reel"
        seed:
          type: integer
          nullable: true
          description: Random seed for reproducible generation
        narrative:
          $ref: '#/components/schemas/NarrativeOptions'
          nullable: true
          description: |
            Narrative/emotional arc options for storyteller-driven composition.
            If omitted, narrative is inferred from mood. When provided, enables
            fine-grained control over emotional journey and tension curves.
    GenerateCompositionResponse:
      description: Response containing the generated composition
      type: object
      additionalProperties: false
      required:
      - compositionId
      - midiJson
      properties:
        compositionId:
          type: string
          format: uuid
          description: Unique identifier for the composition
        midiJson:
          $ref: '#/components/schemas/MidiJson'
          description: Generated MIDI-JSON output
        metadata:
          $ref: '#/components/schemas/CompositionMetadata'
          nullable: true
          description: Metadata about the generation
        narrativeUsed:
          type: string
          nullable: true
          description: ID of the narrative template used for composition
        emotionalJourney:
          type: array
          items:
            $ref: '#/components/schemas/EmotionalStateSnapshot'
          nullable: true
          description: Emotional state at each section boundary
        tensionCurve:
          type: array
          items:
            type: number
          nullable: true
          description: Tension values at bar boundaries (0-1 scale)
    GenerateMelodyRequest:
      description: Request to generate a melody over harmony
      type: object
      additionalProperties: false
      required:
      - harmony
      properties:
        harmony:
          type: array
          items:
            $ref: '#/components/schemas/ChordEvent'
          description: Chord progression to generate melody over
        styleId:
          type: string
          nullable: true
          description: Style for melodic preferences
        range:
          $ref: '#/components/schemas/PitchRange'
          nullable: true
