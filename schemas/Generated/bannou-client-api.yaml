            type: string
          description: Filtering tags
        rarity:
          $ref: '#/components/schemas/ItemRarity'
          description: Item rarity tier
        quantityModel:
          $ref: '#/components/schemas/QuantityModel'
          description: How quantities are tracked
        maxStackSize:
          type: integer
          description: Maximum stack size
