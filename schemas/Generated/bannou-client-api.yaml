    GrantResult:
      type: string
      description: |
        How a successful status grant was resolved.
        - granted: new status applied (no prior instance)
        - stacked: stack count increased on existing instance
        - refreshed: timer reset on existing instance
        - replaced: existing instance removed and new one created
      enum:
      - Granted
      - Stacked
      - Refreshed
      - Replaced
    GrantStatusRequest:
      type: object
      description: Request to grant a status effect to an entity
      additionalProperties: false
      required:
      - entityId
      - entityType
      - gameServiceId
      - statusTemplateCode
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity to receive the status effect
        entityType:
          $ref: '#/components/schemas/EntityType'
          description: Entity type discriminator (e.g., character, account)
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope for template lookup
        statusTemplateCode:
          type: string
          maxLength: 128
          description: Status template code to grant
        sourceId:
          type: string
          format: uuid
          nullable: true
          description: What granted this status (for cascading removal via 
            remove-by-source)
        durationOverrideSeconds:
          type: integer
          minimum: 1
          nullable: true
          description: Override the template's default duration in seconds
        metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: "Arbitrary key-value data passed to contract template values
            and stored on the status instance. Opaque to Status -- callers define
            their own semantics."
    GrantStatusResponse:
      type: object
      description: Result of a successful status grant operation
      additionalProperties: false
      required:
      - statusInstanceId
      - statusTemplateCode
      - stackCount
      - itemInstanceId
      - grantedAt
      - grantResult
      properties:
        statusInstanceId:
          type: string
          format: uuid
          description: Status instance that was created or updated
        statusTemplateCode:
          type: string
          maxLength: 128
          description: Status template code that was granted
        stackCount:
          type: integer
          description: Current stack count after grant
        contractInstanceId:
          type: string
          format: uuid
          nullable: true
          description: Contract instance managing this status lifecycle (null if
            not contract-managed)
        itemInstanceId:
          type: string
          format: uuid
          description: Item instance created in the status container
        grantedAt:
          type: string
          format: date-time
          description: When this status was granted
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: When this status expires (null for permanent statuses)
        grantResult:
          $ref: '#/components/schemas/GrantResult'
          description: How the grant was resolved (granted, stacked, refreshed, 
            replaced)
