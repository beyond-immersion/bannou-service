              schema:
                $ref: '#/components/schemas/ChatRoomResponse'
  /chat/room/leave:
    post:
      operationId: chat_LeaveRoom
      summary: Leave a chat room
      description: Removes the caller from the room. If the owner leaves, 
        promotes the next moderator or oldest member.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveRoomRequest'
      responses:
        '200':
          description: Left room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomResponse'
  /chat/room/participants:
    post:
      operationId: chat_ListParticipants
      summary: List room participants
      description: Returns all current participants in the room with their roles
        and status.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListParticipantsRequest'
      responses:
        '200':
          description: Participants returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantsResponse'
  /chat/room/participant/kick:
    post:
      operationId: chat_KickParticipant
      summary: Remove a participant from the room
      description: Kicks a participant from the room. Caller must be Owner or 
        Moderator with higher role than target.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KickParticipantRequest'
      responses:
        '200':
          description: Participant kicked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomResponse'
  /chat/room/participant/ban:
    post:
      operationId: chat_BanParticipant
      summary: Ban a participant from the room
      description: Bans a participant. If currently in the room, they are kicked
        first. Optionally set a duration; null means permanent.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanParticipantRequest'
      responses:
        '200':
          description: Participant banned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomResponse'
  /chat/room/participant/unban:
    post:
      operationId: chat_UnbanParticipant
      summary: Unban a participant
      description: Removes a ban record for a participant. Caller must be Owner 
        or Moderator.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnbanParticipantRequest'
      responses:
        '200':
          description: Participant unbanned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomResponse'
  /chat/room/participant/mute:
    post:
      operationId: chat_MuteParticipant
      summary: Mute a participant
      description: Mutes a participant, preventing them from sending messages. 
        Optionally set a duration; null means permanent.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MuteParticipantRequest'
      responses:
        '200':
          description: Participant muted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomResponse'
  /chat/room/participant/unmute:
    post:
      operationId: chat_UnmuteParticipant
      summary: Unmute a participant
      description: Removes a mute from a participant, allowing them to send 
        messages again. Caller must be Owner or Moderator.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnmuteParticipantRequest'
      responses:
        '200':
          description: Participant unmuted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomResponse'
  /chat/room/participant/change-role:
    post:
      operationId: chat_ChangeParticipantRole
      summary: Change a participant's role
      description: >
        Changes a participant's role within a chat room. Only the room Owner can change
        roles.
        Cannot change own role or promote to Owner (ownership transfer happens automatically
        when the owner leaves via LeaveRoom).
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeParticipantRoleRequest'
      responses:
        '200':
          description: Role changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomResponse'
  /chat/message/send:
    post:
      operationId: chat_SendMessage
      summary: Send a message to a room
      description: >
        Sends a message to the specified room. Content is validated against
        the room type's message format and validator config. For AutoJoinLazy
        companion rooms, the room is created and the sender auto-joined if
        the room does not yet exist.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageResponse'
  /chat/message/history:
    post:
      operationId: chat_GetMessageHistory
      summary: Get message history
      description: Returns paginated message history for a room, ordered by 
        timestamp descending. Uses cursor-based pagination.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageHistoryRequest'
      responses:
        '200':
          description: Messages returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageHistoryResponse'
  /chat/message/delete:
    post:
      operationId: chat_DeleteMessage
      summary: Delete a message
      description: Deletes a specific message. Caller must be the message 
        sender, room Owner, or Moderator.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteMessageRequest'
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageResponse'
  /chat/message/pin:
    post:
      operationId: chat_PinMessage
      summary: Pin a message
      description: Pins a message in the room. Caller must be Owner or 
        Moderator. Returns conflict if max pinned messages reached.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinMessageRequest'
      responses:
        '200':
          description: Message pinned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageResponse'
  /chat/message/unpin:
    post:
      operationId: chat_UnpinMessage
      summary: Unpin a message
      description: Unpins a previously pinned message. Caller must be Owner or 
        Moderator.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnpinMessageRequest'
      responses:
        '200':
          description: Message unpinned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageResponse'
  /chat/message/search:
    post:
      operationId: chat_SearchMessages
      summary: Full-text search in persistent rooms
      description: Searches message content in persistent rooms using MySQL 
        full-text search. Not available for ephemeral rooms.
      x-permissions:
      - role: user
        states:
          chat: in_room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMessagesRequest'
      responses:
        '200':
          description: Search results returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMessagesResponse'
  /collection/entry-template/create:
    post:
      operationId: collection_createEntryTemplate
      tags:
      - EntryTemplate
      summary: Create an entry template
      description: |
        Create an entry template defining a collectible content item. Each template
        has a unique code within its collection type and game service, references
        an item template for inventory placement, and includes display/metadata fields.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntryTemplateRequest'
      responses:
        '200':
          description: Entry template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryTemplateResponse'
        '400':
          description: Invalid request (validation error)
        '404':
          description: Referenced game service or item template not found
        '409':
          description: Duplicate code for this collection type and game service
  /collection/entry-template/get:
    post:
      operationId: collection_getEntryTemplate
      tags:
      - EntryTemplate
      summary: Get an entry template by ID
      description: Retrieves an entry template by its unique identifier.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetEntryTemplateRequest'
      responses:
        '200':
          description: Entry template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryTemplateResponse'
        '404':
          description: Entry template not found
  /collection/entry-template/list:
    post:
      operationId: collection_listEntryTemplates
      tags:
      - EntryTemplate
      summary: List entry templates
      description: Paginated list of entry templates filtered by collection 
        type, game service, and optional category.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListEntryTemplatesRequest'
      responses:
        '200':
          description: Entry templates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEntryTemplatesResponse'
  /collection/entry-template/update:
    post:
      operationId: collection_updateEntryTemplate
      tags:
      - EntryTemplate
      summary: Update an entry template
      description: Update mutable fields of an entry template (displayName, 
        tags, assets, unlockHint, themes, music metadata).
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntryTemplateRequest'
      responses:
        '200':
          description: Entry template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryTemplateResponse'
        '404':
          description: Entry template not found
  /collection/entry-template/deprecate:
    post:
      operationId: collection_deprecateEntryTemplate
      tags:
      - EntryTemplate
      summary: Deprecate an entry template
      description: |
        Marks an entry template as deprecated. Deprecated templates cannot be used
        to grant new entries, but existing unlocked entries remain valid.
        Category B deprecation (per IMPLEMENTATION TENETS): one-way, no undeprecate,
        no delete. Idempotent — returns OK if already deprecated.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateEntryTemplateRequest'
      responses:
        '200':
          description: Entry template deprecated successfully (or already 
            deprecated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryTemplateResponse'
        '404':
          description: Entry template not found
  /collection/entry-template/seed:
    post:
      operationId: collection_seedEntryTemplates
      tags:
      - EntryTemplate
      summary: Bulk seed entry templates
      description: Bulk create entry templates from a payload, skipping 
        duplicates. Validates item template IDs. Returns count of created 
        templates.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeedEntryTemplatesRequest'
      responses:
        '200':
          description: Seed completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedEntryTemplatesResponse'
        '400':
          description: Invalid request (validation errors)
  /collection/create:
    post:
      operationId: collection_createCollection
      tags:
      - Collection
      summary: Create a collection for an owner
      description: |
        Create a collection instance for an owner entity. One collection per type
        per game service per owner (ownerId + ownerType). Creates an inventory
        container (unlimited type) to hold unlocked entry items.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
      responses:
        '200':
          description: Collection created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponse'
        '404':
          description: Referenced game service not found
        '409':
          description: Duplicate collection type for this owner and game 
            service, or max collections exceeded
  /collection/get:
    post:
      operationId: collection_getCollection
      tags:
      - Collection
      summary: Get a collection with unlocked entry summary
      description: Retrieves a collection instance with its unlocked entry 
        count.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCollectionRequest'
      responses:
        '200':
          description: Collection retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponse'
        '404':
          description: Collection not found
  /collection/list:
    post:
      operationId: collection_listCollections
      tags:
      - Collection
      summary: List all collections for an owner
      description: List all collection instances for an owner entity, with 
        optional game service filter.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListCollectionsRequest'
      responses:
        '200':
          description: Collections retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollectionsResponse'
  /collection/delete:
    post:
      operationId: collection_deleteCollection
      tags:
      - Collection
      summary: Delete a collection and its inventory container
      description: Delete a collection instance, destroying its inventory 
        container and all contained entry items.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCollectionRequest'
      responses:
        '200':
          description: Collection deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponse'
        '404':
          description: Collection not found
  /collection/grant:
    post:
      operationId: collection_grantEntry
      tags:
      - Entry
      summary: Grant/unlock an entry (idempotent)
      description: |
        Grant an entry to a collection. Idempotent: returns existing if already
        unlocked. Auto-creates collection instance (and inventory container)
        if one does not exist for this owner+type+game. Creates an item instance
        and places it in the collection container.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantEntryRequest'
      responses:
        '200':
          description: Entry granted (or already unlocked)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantEntryResponse'
        '404':
          description: Entry template not found
        '409':
          description: Max entries reached or item creation failed
  /collection/has:
    post:
      operationId: collection_hasEntry
      tags:
      - Entry
      summary: Check if owner has a specific entry
      description: Check if an owner has a specific entry unlocked in their 
        collection.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HasEntryRequest'
      responses:
        '200':
          description: Check completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HasEntryResponse'
  /collection/query:
    post:
      operationId: collection_queryEntries
      tags:
      - Entry
      summary: Query unlocked entries with filtering
      description: Query unlocked entries in a collection with optional 
        filtering by category, tags, and metadata.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryEntriesRequest'
      responses:
        '200':
          description: Entries retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryEntriesResponse'
        '404':
          description: Collection not found
  /collection/update-metadata:
    post:
      operationId: collection_updateEntryMetadata
      tags:
      - Entry
      summary: Update entry instance metadata
      description: Update metadata for an unlocked entry (play count, kill 
        count, favorites, discovery level, custom data).
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntryMetadataRequest'
      responses:
        '200':
          description: Metadata updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnlockedEntryResponse'
        '404':
          description: Collection or entry not found
  /collection/stats:
    post:
      operationId: collection_getCompletionStats
      tags:
      - Entry
      summary: Get completion statistics per collection type
      description: Get completion statistics for a collection including total 
        entries, unlocked count, percentage, and breakdown by category.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCompletionStatsRequest'
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionStatsResponse'
        '404':
          description: Collection not found
  /collection/content/select-for-area:
    post:
      operationId: collection_selectContentForArea
      tags:
      - Content
      summary: Select content for an area based on unlocked library
      description: |
        Select a content entry for an area based on the owner's unlocked collection
        and area theme configuration. Uses weighted random selection based on theme overlap.
        Falls back to the area's default entry if no matches are found.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectContentForAreaRequest'
      responses:
        '200':
          description: Content selected successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentSelectionResponse'
        '404':
          description: Area config not found or no matching collection exists
  /collection/content/area-config/set:
    post:
      operationId: collection_setAreaContentConfig
      tags:
      - Content
      summary: Set area-to-theme mapping
      description: Create or update an area content configuration that maps an 
        area code to themes and a default entry.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAreaContentConfigRequest'
      responses:
        '200':
          description: Area content config saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaContentConfigResponse'
        '404':
          description: Game service or default entry template not found
  /collection/content/area-config/get:
    post:
      operationId: collection_getAreaContentConfig
      tags:
      - Content
      summary: Get area content config
      description: Get the content configuration for a specific area and game 
        service.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAreaContentConfigRequest'
      responses:
        '200':
          description: Area content config retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaContentConfigResponse'
        '404':
          description: Area content config not found
  /collection/content/area-config/list:
    post:
      operationId: collection_listAreaContentConfigs
      tags:
      - Content
      summary: List area configs for a game service
      description: List all area content configurations for a game service.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListAreaContentConfigsRequest'
      responses:
        '200':
          description: Area content configs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAreaContentConfigsResponse'
  /collection/content/area-config/delete:
    post:
      operationId: collection_deleteAreaContentConfig
      tags:
      - Content
      summary: Delete an area content config
      description: Delete an area content configuration. Area configs are 
        configuration singletons with no deprecation lifecycle — immediate hard 
        delete.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAreaContentConfigRequest'
      responses:
        '200':
          description: Area content config deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaContentConfigResponse'
        '404':
          description: Area content config not found
  /collection/discovery/advance:
    post:
      operationId: collection_advanceDiscovery
      tags:
      - Discovery
      summary: Advance progressive discovery level
      description: |
        Advance the discovery level of an unlocked entry (bestiary-style progressive
        reveal). Each level reveals additional information about the entry as defined
        in the entry template's discovery levels.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceDiscoveryRequest'
      responses:
        '200':
          description: Discovery level advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvanceDiscoveryResponse'
        '404':
          description: Collection or entry not found, or entry not unlocked
        '409':
          description: Already at max discovery level
  /client-capabilities:
    post:
      summary: Get client capability manifest (GUID → API mappings)
      operationId: connect_getClientCapabilities
      tags:
      - Client Capabilities
      x-permissions:
      - role: user
      description: |
        Returns the capability manifest for the authenticated client's session.
        Maps client-salted GUIDs to available API endpoints based on the client's
        current permissions and session state.

        **Security**: Each client receives unique GUIDs for the same API endpoints.
        This prevents cross-session exploitation and enables per-client rate limiting.

        **Dynamic Updates**: Capabilities may change during a session when:
        - Role changes occur (admin promotion, etc.)
        - Subscription status changes
        - Session state transitions

        Clients should listen for capability update events via WebSocket to stay current.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetClientCapabilitiesRequest'
      responses:
        '200':
          description: Client capabilities retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCapabilitiesResponse'
        '401':
          description: Not authenticated - requires valid session
        '500':
          description: Error retrieving capabilities
  /contract/template/get:
    post:
      operationId: contract_getContractTemplate
      tags:
      - Templates
      summary: Get template by ID or code
      description: |
        Retrieves a contract template by its unique ID or code.
        At least one of templateId or code must be provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetContractTemplateRequest'
      responses:
        '200':
          description: Template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractTemplateResponse'
        '400':
          description: Neither templateId nor code provided
        '404':
          description: Template not found
      x-permissions:
      - role: user
        states: {}
  /contract/template/list:
    post:
      operationId: contract_listContractTemplates
      tags:
      - Templates
      summary: List templates with filters
      description: |
        Lists contract templates with optional filtering by realm, active status,
        and search term.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListContractTemplatesRequest'
      responses:
        '200':
          description: Templates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListContractTemplatesResponse'
      x-permissions:
      - role: user
        states: {}
  /contract/instance/create:
    post:
      operationId: contract_createContractInstance
      tags:
      - Instances
      summary: Create contract instance from template
      description: |
        Creates a new contract instance from a template. The instance starts
        in 'draft' status and must be proposed to parties before activation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractInstanceRequest'
      responses:
        '200':
          description: Instance created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractInstanceResponse'
        '400':
          description: Invalid request (missing required parties, invalid terms)
        '404':
          description: Template not found
      x-permissions:
      - role: user
        states: {}
  /contract/instance/propose:
    post:
      operationId: contract_proposeContractInstance
      tags:
      - Instances
      summary: Propose contract to parties (starts consent flow)
      description: |
        Moves a draft contract to 'proposed' status and notifies parties.
        Parties must consent before the contract becomes active.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposeContractInstanceRequest'
      responses:
        '200':
          description: Contract proposed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractInstanceResponse'
        '400':
          description: Contract not in draft status
        '404':
          description: Contract not found
      x-permissions:
      - role: user
        states: {}
  /contract/instance/consent:
    post:
      operationId: contract_consentToContract
      tags:
      - Instances
      summary: Party consents to contract
      description: |
        Records a party's consent to a proposed contract. When all required
        parties consent, the contract moves to 'accepted' then 'active' status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentToContractRequest'
      responses:
        '200':
          description: Consent recorded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractInstanceResponse'
        '400':
          description: Party not part of this contract or already consented
        '404':
          description: Contract not found
      x-permissions:
      - role: user
        states: {}
  /contract/instance/get:
    post:
      operationId: contract_getContractInstance
      tags:
      - Instances
      summary: Get instance by ID
      description: Retrieves a contract instance by its unique ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetContractInstanceRequest'
      responses:
        '200':
          description: Instance retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractInstanceResponse'
        '404':
          description: Instance not found
      x-permissions:
      - role: user
        states: {}
  /contract/instance/query:
    post:
      operationId: contract_queryContractInstances
      tags:
      - Instances
      summary: Query instances by party, template, status
      description: |
        Queries contract instances with various filters. At least one filter
        must be provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryContractInstancesRequest'
      responses:
        '200':
          description: Instances retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryContractInstancesResponse'
        '400':
          description: No filter criteria provided
      x-permissions:
      - role: user
        states: {}
  /contract/instance/terminate:
    post:
      operationId: contract_terminateContractInstance
      tags:
      - Instances
      summary: Request early termination
      description: |
        Requests early termination of an active contract. Depending on the
        contract's termination policy, this may require mutual consent or
        incur penalties.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminateContractInstanceRequest'
      responses:
        '200':
          description: Termination processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractInstanceResponse'
        '400':
          description: Contract cannot be terminated (policy violation)
        '404':
          description: Contract not found
      x-permissions:
      - role: user
        states: {}
  /contract/instance/delete:
    post:
      operationId: contract_deleteContractInstance
      tags:
      - Instances
      summary: Hard-delete a terminal contract instance
      description: |
        Permanently deletes a contract instance that has reached a terminal state
        (Fulfilled, Terminated, Expired, or Declined). Removes the instance record
        and all associated index entries. Breach records associated with the
        contract are also deleted. This is a hard delete per T31 (instances use
        immediate deletion, not deprecation).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteContractInstanceRequest'
      responses:
        '200':
          description: Instance deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteContractInstanceResponse'
        '400':
          description: Contract is not in a terminal state and cannot be deleted
        '404':
          description: Contract not found
      x-permissions:
      - role: developer
        states: {}
  /contract/instance/get-status:
    post:
      operationId: contract_getContractInstanceStatus
      tags:
      - Instances
      summary: Get current status and milestone progress
      description: |
        Gets the current status of a contract including milestone progress,
        pending consents, and any active breaches.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetContractInstanceStatusRequest'
      responses:
        '200':
          description: Status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractInstanceStatusResponse'
        '404':
          description: Contract not found
      x-permissions:
      - role: user
        states: {}
  /contract/milestone/complete:
    post:
      operationId: contract_completeMilestone
      tags:
      - Milestones
      summary: External system reports milestone completed
      description: |
        Called by external systems to report that a milestone's conditions
        have been met. Triggers onComplete prebound APIs and may advance
        contract status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteMilestoneRequest'
      responses:
        '200':
          description: Milestone completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MilestoneResponse'
        '400':
          description: Milestone not in valid state for completion
        '404':
          description: Contract or milestone not found
      x-permissions:
      - role: developer
        states: {}
  /contract/milestone/fail:
    post:
      operationId: contract_failMilestone
      tags:
      - Milestones
      summary: External system reports milestone failed
      description: |
        Called by external systems to report that a milestone has failed
        (e.g., deadline passed, conditions cannot be met). Triggers onExpire
        prebound APIs and may record a breach.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FailMilestoneRequest'
      responses:
        '200':
          description: Milestone failure recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MilestoneResponse'
        '400':
          description: Milestone not in valid state for failure
        '404':
          description: Contract or milestone not found
      x-permissions:
      - role: developer
        states: {}
  /contract/milestone/get:
    post:
      operationId: contract_getMilestone
      tags:
      - Milestones
      summary: Get milestone details and status
      description: Gets the current state of a specific milestone.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetMilestoneRequest'
      responses:
        '200':
          description: Milestone retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MilestoneResponse'
        '404':
          description: Contract or milestone not found
      x-permissions:
      - role: user
        states: {}
  /contract/breach/report:
    post:
      operationId: contract_reportBreach
      tags:
      - Breaches
      summary: Report a contract breach
      description: |
        Reports a breach of contract terms. This can be called by parties
        or external systems. The breach enters a grace period for cure
        if configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportBreachRequest'
      responses:
        '200':
          description: Breach reported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreachResponse'
        '400':
          description: Invalid breach report
        '404':
          description: Contract not found
      x-permissions:
      - role: user
        states: {}
  /contract/breach/cure:
    post:
      operationId: contract_cureBreach
      tags:
      - Breaches
      summary: Mark breach as cured (system/admin action)
      description: |
        Marks a breach as cured within the grace period. This prevents
        consequences from being applied. Called by systems that verify
        the breach has been remedied.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CureBreachRequest'
      responses:
        '200':
          description: Breach cured successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreachResponse'
        '400':
          description: Breach not in curable state
        '404':
          description: Breach not found
      x-permissions:
      - role: developer
        states: {}
  /contract/breach/get:
    post:
      operationId: contract_getBreach
      tags:
      - Breaches
      summary: Get breach details
      description: Retrieves details of a specific breach record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetBreachRequest'
      responses:
        '200':
          description: Breach retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreachResponse'
        '404':
          description: Breach not found
      x-permissions:
      - role: user
        states: {}
  /contract/metadata/update:
    post:
      operationId: contract_updateContractMetadata
      tags:
      - Metadata
      summary: Update game metadata on instance
      description: |
        Updates game-specific metadata on a contract instance without
        touching contract state. Used by higher-level systems (quests, etc.)
        to store additional context.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContractMetadataRequest'
      responses:
        '200':
          description: Metadata updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractMetadataResponse'
        '404':
          description: Contract not found
      x-permissions:
      - role: developer
        states: {}
  /contract/metadata/get:
    post:
      operationId: contract_getContractMetadata
      tags:
      - Metadata
      summary: Get game metadata
      description: Retrieves game-specific metadata from a contract instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetContractMetadataRequest'
      responses:
        '200':
          description: Metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractMetadataResponse'
        '404':
