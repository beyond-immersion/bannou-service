        x-from-authorization: bearer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminateSessionRequest'
      responses:
        '200':
          description: Session terminated
        '404':
          description: Session not found
  /auth/password/reset:
    post:
      summary: Request password reset
      operationId: auth_requestPasswordReset
      tags:
      - Password
      x-permissions:
      - role: anonymous
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Reset email sent if account exists
  /auth/password/confirm:
    post:
      summary: Confirm password reset with token
      operationId: auth_confirmPasswordReset
      tags:
      - Password
      x-permissions:
      - role: anonymous
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Password reset successfully
  /auth/providers:
    post:
      summary: List available authentication providers
      description: |
        Returns a list of available OAuth and authentication providers based on server configuration.
        Providers are only listed if their client credentials are configured.
        Steam authentication uses session tickets, not OAuth, but is included for completeness.
      operationId: auth_listProviders
      tags:
      - Authentication
      x-permissions:
      - role: anonymous
      responses:
        '200':
          description: List of available providers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvidersResponse'
  /auth/mfa/setup:
    post:
      summary: Initialize MFA setup
      description: |
        Generates a TOTP secret and 10 recovery codes. Returns an otpauth:// URI for QR
        code scanning and the recovery codes in plain text (shown only once). The setup is
        not active until confirmed via /auth/mfa/enable with a valid TOTP code.
      operationId: auth_setupMfa
      tags:
      - MFA
      x-permissions:
      - role: user
      parameters:
      - name: jwt
        in: header
        required: true
        schema:
          type: string
        description: JWT access token
        x-from-authorization: bearer
      responses:
        '200':
          description: MFA setup initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaSetupResponse'
        '409':
          description: MFA already enabled for this account
  /auth/mfa/enable:
    post:
      summary: Confirm MFA setup with TOTP code
      description: |
        Verifies a TOTP code against the pending setup secret to prove the authenticator
        app is correctly configured. On success, persists MFA settings to the account and
        MFA is active for all subsequent password logins.
      operationId: auth_enableMfa
      tags:
      - MFA
      x-permissions:
      - role: user
      parameters:
      - name: jwt
        in: header
        required: true
        schema:
          type: string
        description: JWT access token
        x-from-authorization: bearer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaEnableRequest'
      responses:
        '200':
          description: MFA enabled successfully
        '400':
          description: Invalid TOTP code or expired setup token
        '409':
          description: MFA already enabled
  /auth/mfa/disable:
    post:
      summary: Disable MFA for current account
      description: |
        Disables MFA for the authenticated account. Requires a valid TOTP code or
        recovery code to prevent unauthorized disable. Clears the TOTP secret and
        recovery codes from the account.
      operationId: auth_disableMfa
      tags:
      - MFA
      x-permissions:
      - role: user
      parameters:
      - name: jwt
        in: header
        required: true
        schema:
          type: string
        description: JWT access token
        x-from-authorization: bearer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaDisableRequest'
      responses:
        '200':
          description: MFA disabled successfully
        '400':
          description: Invalid TOTP code or recovery code
        '404':
          description: MFA not enabled for this account
  /auth/mfa/verify:
    post:
      summary: Verify MFA code during login
      description: |
        Completes the MFA challenge issued during login by verifying a TOTP code or
        recovery code. On success, returns full authentication tokens (same as a
        non-MFA login would). The challenge token is single-use and has a configurable
        TTL (default 5 minutes).
      operationId: auth_verifyMfa
      tags:
      - MFA
      x-permissions:
      - role: anonymous
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA verified, tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid TOTP code or recovery code
        '401':
          description: Challenge token not found, expired, or already used
  /compile:
    post:
      summary: Compile ABML behavior definition
      description: |
        Compiles a YAML-based ABML behavior definition into executable behavior trees.
        Handles stackable behavior sets, cultural adaptations, and context variable resolution.
      operationId: behavior_CompileAbmlBehavior
      tags:
      - ABML
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              type: string
              description: Raw ABML YAML content
            example: |
              version: "1.0.0"
              metadata:
                id: "blacksmith_daily_routine"
                category: "profession"
                priority: 60
                description: "Daily routine for a master blacksmith NPC"

              context:
                variables:
                  energy_level: "${npc.stats.energy}"
                  skill_level: "${npc.skills.blacksmithing}"
                  shop_reputation: "${npc.reputation.local}"

                services:
                  - name: "crafting_service"
                    required: true
                  - name: "economy_service"
                    required: true

              behaviors:
                morning_startup:
                  triggers:
                    - time_range: "06:00-09:00"
                    - condition: "${context.energy_level > 0.7}"
                  actions:
                    - wake_up:
                        animation: "stretch_and_yawn"
                        duration: 3
                        energy_cost: -0.05
          application/json:
            schema:
              $ref: '#/components/schemas/CompileBehaviorRequest'
      responses:
        '200':
          description: ABML behavior compiled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompileBehaviorResponse'
        '400':
          description: Invalid ABML definition or compilation error
        '403':
          description: Forbidden - insufficient permissions
        '500':
          description: Internal server error
  /validate:
    post:
      summary: Validate ABML definition
      description: |
        Validates ABML YAML against schema and checks for semantic correctness.
        Includes context variable validation and service dependency checking.
      operationId: behavior_ValidateAbml
      tags:
      - Validation
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              type: string
              description: Raw ABML YAML content to validate
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAbmlRequest'
      responses:
        '200':
          description: Validation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateAbmlResponse'
