          description: Maximum number of bundles to return (optimization limit)
    ResolveBundlesResponse:
      type: object
      additionalProperties: false
      description: Optimal bundle set for requested assets
      required:
      - bundles
      - standaloneAssets
      - coverage
      properties:
        bundles:
          type: array
          items:
            $ref: '#/components/schemas/ResolvedBundle'
          description: Bundles to download
        standaloneAssets:
          type: array
          items:
            $ref: '#/components/schemas/ResolvedAsset'
          description: Individual assets to download
        coverage:
          $ref: '#/components/schemas/CoverageAnalysis'
          description: Coverage statistics
        unresolved:
          type: array
          items:
            type: string
          nullable: true
          description: Asset IDs that couldn't be found (null if all resolved)
    ResolvedAsset:
      type: object
      additionalProperties: false
      description: A standalone asset selected for download
      required:
      - assetId
      - downloadUrl
      - expiresAt
      - size
      properties:
        assetId:
          type: string
          description: Asset identifier
        downloadUrl:
          type: string
          format: uri
          description: Pre-signed download URL
        expiresAt:
          type: string
          format: date-time
          description: When the download URL expires
        size:
          type: integer
          format: int64
          description: Asset file size in bytes
        contentHash:
          type: string
          nullable: true
          description: SHA256 hash of asset content
    ResolvedBundle:
      type: object
      additionalProperties: false
      description: A bundle selected for download in resolution
      required:
      - bundleId
      - bundleType
      - downloadUrl
      - expiresAt
      - size
      - assetsProvided
      properties:
        bundleId:
          type: string
          description: Human-readable bundle identifier
        bundleType:
          $ref: '#/components/schemas/BundleType'
          description: Whether source or metabundle
        version:
          type: string
          nullable: true
          description: Bundle version
        downloadUrl:
          type: string
          format: uri
          description: Pre-signed download URL
        expiresAt:
          type: string
          format: date-time
          description: When the download URL expires
        size:
          type: integer
          format: int64
          description: Bundle file size in bytes
        assetsProvided:
          type: array
          items:
            type: string
          description: Which of the requested assets this bundle provides
    ResolvedReference:
      type: object
      additionalProperties: false
      description: A successfully resolved scene reference
      required:
      - nodeId
      - refId
      - referencedSceneId
      - scene
      - depth
      properties:
        nodeId:
          type: string
          format: uuid
          description: Node ID containing the reference
        refId:
          type: string
          description: refId of the referencing node
        referencedSceneId:
          type: string
          format: uuid
          description: ID of the referenced scene
        referencedVersion:
          type: string
          nullable: true
          description: Version that was resolved
        scene:
          $ref: '#/components/schemas/Scene'
          description: The resolved scene content
        depth:
          type: integer
          minimum: 0
          description: Depth level of this reference
    ResourceArchiveBase:
      type: object
      description: |
        Base schema for all resource archives that can be stored in
        the resource service's archive bundles and consumed by the
        storyline SDK's ArchiveExtractor.

        Archives implementing this base schema are marked with
        x-archive-type: true and are automatically collected by
        the archive generation script for SDK model generation.
      required:
      - resourceId
      - resourceType
      - archivedAt
      - schemaVersion
      properties:
        resourceId:
          type: string
          format: uuid
          description: Unique identifier of the archived resource
        resourceType:
          type: string
          description: Type identifier (e.g., "character", 
            "character-personality", "realm-history")
        archivedAt:
          type: string
          format: date-time
          description: When this archive was created
        schemaVersion:
          type: integer
          minimum: 1
          description: Schema version for forward compatibility migration
        nestedArchives:
          type: array
          description: Child archives from dependent resources (populated by 
            lib-resource compression)
          items:
            $ref: '#/components/schemas/ResourceArchiveBase'
    ResponseValidation:
      type: object
      description: Validation rules for API responses with three-outcome model 
        (success, permanent failure, transient failure)
      additionalProperties: false
      properties:
        successConditions:
          type: array
          items:
            $ref: '#/components/schemas/ValidationCondition'
          description: Conditions that must ALL pass for success; if any fail, 
            checks permanent failure conditions
        permanentFailureConditions:
          type: array
          items:
            $ref: '#/components/schemas/ValidationCondition'
          description: Conditions that indicate permanent failure (clause 
            violated); checked when success conditions fail
        transientFailureStatusCodes:
          type: array
          items:
            type: integer
          description: HTTP status codes indicating transient failure for retry 
            (default 408, 429, 502, 503, 504)
    RestoreArchiveRequest:
      description: Request to restore documents from an archive
      type: object
      additionalProperties: false
      required:
      - archiveId
      properties:
        archiveId:
          type: string
          format: uuid
          description: Unique identifier of the archive to restore
        targetNamespace:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 50
          nullable: true
          description: Namespace to restore to (null restores to original 
            namespace)
    RestoreArchiveResponse:
      description: Response containing restore operation results
      type: object
      additionalProperties: false
      required:
      - namespace
      - documentsRestored
      properties:
        namespace:
          type: string
          description: Namespace documents were restored to
        documentsRestored:
          type: integer
          description: Number of documents restored from archive
        previousDocumentsDeleted:
          type: integer
          description: Number of existing documents deleted before restore
    RestoreBundleRequest:
      type: object
      additionalProperties: false
      description: Request to restore a soft-deleted bundle
      required:
      - bundleId
      properties:
        bundleId:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable bundle identifier to restore
        reason:
          type: string
          nullable: true
          description: Optional reason for restoration (recorded in version 
            history)
    RestoreBundleResponse:
      type: object
      additionalProperties: false
      description: Result of bundle restoration
      required:
      - status
      - restoredFromVersion
      properties:
        status:
          $ref: '#/components/schemas/BundleLifecycle'
          description: Current bundle lifecycle status after restoration (should
            be "active")
        restoredFromVersion:
          type: integer
          description: Version number the bundle was restored from
    ResumeJourneyRequest:
      type: object
      additionalProperties: false
      description: Request to resume an interrupted journey
      required:
      - journeyId
      properties:
        journeyId:
          type: string
          format: uuid
          description: Journey to resume
    RevealDiscoveryRequest:
      type: object
      additionalProperties: false
      description: Request to reveal a discoverable connection to an entity
      required:
      - entityId
      - connectionId
      - source
      properties:
        entityId:
          type: string
          format: uuid
          description: Entity to reveal the connection to
        connectionId:
          type: string
          format: uuid
          description: Discoverable connection to reveal
        source:
          type: string
          description: How the connection was discovered (e.g., "travel", 
            "guide", "hearsay", "map", "quest_reward")
    RevealDiscoveryResponse:
      type: object
      additionalProperties: false
      description: Response containing the discovery record
      required:
      - discovery
      properties:
        discovery:
          allOf:
          - $ref: '#/components/schemas/DiscoveryRecord'
          description: The discovery record
    RewardDefinition:
      type: object
      description: Reward granted when a quest is completed
      additionalProperties: false
      required:
      - type
      properties:
        type:
          description: Type of reward
          $ref: '#/components/schemas/RewardType'
        currencyCode:
          type: string
          nullable: true
          description: Currency code for CURRENCY rewards
        amount:
          type: integer
          nullable: true
          minimum: 1
          description: Amount for CURRENCY/EXPERIENCE rewards
        itemCode:
          type: string
          nullable: true
          description: Item code for ITEM rewards
        quantity:
          type: integer
          nullable: true
          minimum: 1
          description: Quantity for ITEM rewards
        factionCode:
          type: string
          nullable: true
          description: Faction code for REPUTATION rewards
    RewardType:
      type: string
      enum:
      - Currency
      - Item
      - Experience
      - Reputation
      description: Type of reward granted on quest completion
    RoomTypeResponse:
      type: object
      additionalProperties: false
      description: Room type definition with current configuration and status
      required:
      - code
      - displayName
      - messageFormat
      - persistenceMode
      - allowAnonymousSenders
      - status
      - createdAt
      properties:
        code:
          type: string
          description: Unique room type code
        displayName:
          type: string
          description: Human-readable name
        description:
          type: string
          nullable: true
          description: Room type description
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Game service scope (null for global)
        messageFormat:
          $ref: '#/components/schemas/MessageFormat'
          description: Content format accepted by this room type
        validatorConfig:
          allOf:
          - $ref: '#/components/schemas/ValidatorConfig'
          nullable: true
          description: Active validation rules
        persistenceMode:
          $ref: '#/components/schemas/PersistenceMode'
          description: Message storage mode
        defaultMaxParticipants:
          type: integer
          nullable: true
          description: Default participant limit
        retentionDays:
          type: integer
          nullable: true
          description: Message retention in days
        defaultContractTemplateId:
          type: string
          format: uuid
          nullable: true
          description: Default contract template ID
        allowAnonymousSenders:
          type: boolean
          description: Whether anonymous senders are allowed
        rateLimitPerMinute:
          type: integer
          nullable: true
          description: Messages per minute limit
        metadata:
          type: string
          nullable: true
          description: Client-only metadata stored as JSON string. No Bannou 
            plugin reads specific keys from this field by convention.
        status:
          $ref: '#/components/schemas/RoomTypeStatus'
          description: Current lifecycle status of the room type
        createdAt:
          type: string
          format: date-time
          description: When the room type was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the room type was last updated
    RoomTypeStatus:
      type: string
      description: Lifecycle status of a room type definition
      enum:
      - Active
      - Deprecated
    RouteSortBy:
      type: string
      description: Sort criteria for route calculation results
      enum:
      - Fastest
      - Safest
      - Shortest
    SEOMetadata:
      description: Search engine optimization and social media sharing metadata
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          nullable: true
          description: Meta description for search engines
        keywords:
          type: array
          items:
            type: string
          description: Keywords for search engine indexing
        ogTitle:
          type: string
          nullable: true
          description: Open Graph title for social media sharing
        ogDescription:
          type: string
          nullable: true
          description: Open Graph description for social media sharing
        ogImage:
          type: string
          format: uri
          nullable: true
          description: Open Graph image URL for social media sharing
    SaveCategory:
      type: string
      enum:
      - QuickSave
      - AutoSave
      - ManualSave
      - Checkpoint
      - StateSnapshot
      description: |
        Category of save with predefined behaviors.
        QUICK_SAVE: Single-slot fast save, overwritten frequently (max 1 version).
        AUTO_SAVE: System-triggered periodic saves (max 5 versions, rolling).
        MANUAL_SAVE: User-initiated named saves (max 10 versions, no auto-cleanup).
        CHECKPOINT: Progress markers (max 20 versions, rolling).
        STATE_SNAPSHOT: Full state captures for debugging (max 3 versions, rolling).
    SaveDeltaRequest:
      type: object
      additionalProperties: false
      description: Request to save incremental changes as a delta from a base 
        version
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      - baseVersion
      - delta
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-z][a-z0-9-]*$'
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Name of the slot to save the delta to
        baseVersion:
          type: integer
          description: Version number this delta is based on
        delta:
          type: string
          format: byte
          description: |
            Base64-encoded delta/patch data.
            For JSON_PATCH: Array of RFC 6902 operations
            For BSDIFF/XDELTA: Binary patch data
        algorithm:
          allOf:
          - $ref: '#/components/schemas/DeltaAlgorithm'
          nullable: true
          description: Delta computation algorithm to use (defaults to 
            JSON_PATCH)
        schemaVersion:
          type: string
          nullable: true
          description: Schema version of this save for migration tracking
        displayName:
          type: string
          nullable: true
          description: Human-readable name for this delta save
        deviceId:
          type: string
          nullable: true
          description: Device identifier for cross-device sync conflict 
            detection
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Custom key-value metadata for this delta version
    SaveDeltaResponse:
      type: object
      additionalProperties: false
      description: Result of delta save operation with size and chain 
        information
      required:
      - slotId
      - versionNumber
      - baseVersion
      - deltaSizeBytes
      - estimatedFullSizeBytes
      - chainLength
      - compressionSavings
      - createdAt
      properties:
        slotId:
          type: string
          format: uuid
          description: Unique identifier of the save slot
        versionNumber:
          type: integer
          description: New version number
        baseVersion:
          type: integer
          description: Base version this delta is relative to
        deltaSizeBytes:
          type: integer
          format: int64
          description: Size of stored delta
        estimatedFullSizeBytes:
          type: integer
          format: int64
          description: Estimated size when reconstructed
        chainLength:
          type: integer
          description: Number of deltas in chain to base snapshot
        compressionSavings:
          type: number
          format: double
          description: Storage savings vs full snapshot (0-1)
        createdAt:
          type: string
          format: date-time
          description: When the delta version was created
    SaveRequest:
      type: object
      additionalProperties: false
      description: Request to save game state data to a slot with optional 
        compression and metadata
      required:
      - gameId
      - ownerId
      - ownerType
      - slotName
      - data
      properties:
        gameId:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-z][a-z0-9-]*$'
          description: Game identifier for namespace isolation
        ownerId:
          type: string
          format: uuid
          description: ID of the owning entity
        ownerType:
          $ref: '#/components/schemas/EntityType'
          description: Type of entity that owns this save slot
        slotName:
          type: string
          minLength: 1
          maxLength: 64
          description: Slot name (auto-created if doesn't exist)
        category:
          allOf:
          - $ref: '#/components/schemas/SaveCategory'
          nullable: true
          description: Category for auto-created slots (defaults to MANUAL_SAVE)
        data:
          type: string
          format: byte
          description: Base64-encoded save data
        schemaVersion:
          type: string
          nullable: true
          description: Schema version identifier for migration tracking
        displayName:
          type: string
          nullable: true
          maxLength: 128
          description: Human-readable name for this save
        thumbnail:
          type: string
          format: byte
          nullable: true
          description: |
            Optional preview image (JPEG/WebP). Max size configurable
            (default 256KB). Used for save slot previews in game UI.
        deviceId:
          type: string
          maxLength: 64
          nullable: true
          description: |
            Optional device identifier for cloud save conflict detection.
            When provided, saves are prefixed/tagged with device info,
            enabling opt-in cross-device sync with collision awareness.
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Custom metadata (e.g., level, playtime, location)
        pinAsCheckpoint:
          type: string
          nullable: true
          maxLength: 64
          description: If provided, pin this version with checkpoint name
    SaveResponse:
      type: object
      additionalProperties: false
      description: Result of a save operation including version info and 
        conflict detection
      required:
      - slotId
      - versionNumber
      - contentHash
      - sizeBytes
      - pinned
      - conflictDetected
      - versionsCleanedUp
      - uploadPending
      - createdAt
      properties:
        slotId:
          type: string
          format: uuid
          description: Slot identifier
        versionNumber:
          type: integer
          description: Assigned version number
        contentHash:
          type: string
          description: SHA-256 hash of save data
        sizeBytes:
          type: integer
          format: int64
          description: Size of save data in bytes
        compressedSizeBytes:
          type: integer
          format: int64
          description: Compressed size (if compression applied)
        compressionRatio:
          type: number
          format: double
          description: Compression ratio (0-1)
        pinned:
          type: boolean
          description: Whether version was pinned
        checkpointName:
          type: string
          nullable: true
          description: Checkpoint name if pinned
        thumbnailUrl:
          type: string
          nullable: true
          description: Pre-signed URL to retrieve thumbnail (if provided)
        conflictDetected:
          type: boolean
          description: |
            True if this save overwrote a version from a different device.
            Only relevant when deviceId is used for cloud sync.
        conflictingDeviceId:
          type: string
          nullable: true
          description: Device ID of the overwritten version (if conflict)
        conflictingVersion:
          type: integer
          nullable: true
          description: Version number that was overwritten (if conflict)
        createdAt:
          type: string
          format: date-time
          description: Save timestamp
        versionsCleanedUp:
          type: integer
          description: Number of old versions cleaned up by rolling policy
        uploadPending:
          type: boolean
          description: |
            True if async upload is enabled and data is queued for MinIO upload.
            Save is immediately loadable from Redis cache, but not yet durable.
    SaveSortField:
      type: string
      enum:
      - CreatedAt
      - Size
      - VersionNumber
      description: Field to sort save query results by
    ScenarioCategory:
      type: string
      enum:
      - Combat
      - Crafting
      - Social
      - Trade
      - Exploration
      - Magic
      - Survival
