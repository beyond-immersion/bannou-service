        startChord:
          type: string
          nullable: true
          description: Starting chord (roman numeral, e.g., "I")
        endChord:
          type: string
          nullable: true
          description: Ending chord (roman numeral, e.g., "I")
        cadenceType:
          $ref: '#/components/schemas/CadenceType'
          nullable: true
          description: Cadence type for ending
        allowSecondaryDominants:
          type: boolean
