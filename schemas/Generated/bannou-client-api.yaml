        role:
          $ref: '#/components/schemas/FactionMemberRole'
          description: Member's role in the faction
        joinedAt:
          type: string
          format: date-time
          description: When the character joined the faction
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the membership was last updated (role change)
    FactionMemberRole:
      type: string
      description: Role hierarchy for faction membership
      enum:
      - Leader
      - Officer
      - Member
      - Recruit
    FactionResponse:
      type: object
      description: Complete faction entity with seed growth status
      additionalProperties: false
      required:
      - factionId
      - gameServiceId
      - name
      - code
      - realmId
      - isRealmBaseline
      - status
      - memberCount
      - createdAt
      - updatedAt
      properties:
        factionId:
          type: string
          format: uuid
          description: Unique identifier for the faction
        gameServiceId:
          type: string
          format: uuid
          description: Game service this faction belongs to
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: Display name of the faction
        code:
          type: string
          minLength: 1
          maxLength: 128
          description: Unique code within the game service (e.g., 
            "thieves_guild")
        description:
          type: string
          nullable: true
          maxLength: 2048
          description: Human-readable description of the faction
        realmId:
          type: string
          format: uuid
          description: Realm this faction belongs to
        isRealmBaseline:
          type: boolean
          description: Whether this faction is the realm's baseline cultural 
            faction
        parentFactionId:
          type: string
          format: uuid
          nullable: true
          description: Parent faction in hierarchy (null for top-level factions)
        seedId:
          type: string
          format: uuid
          nullable: true
          description: Associated seed for growth tracking (null if seed 
            creation failed)
        status:
          $ref: '#/components/schemas/FactionStatus'
          description: Current lifecycle status
        currentPhase:
          type: string
          nullable: true
          maxLength: 64
          description: Current seed growth phase (denormalized from lib-seed for
            convenience)
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: When this faction was deprecated (null if not deprecated)
        deprecationReason:
          type: string
          nullable: true
          maxLength: 1024
          description: Reason for deprecation (null if not deprecated)
        memberCount:
          type: integer
          minimum: 0
          description: Current number of members in this faction
        createdAt:
          type: string
          format: date-time
          description: When this faction was created
        updatedAt:
          type: string
          format: date-time
          description: When this faction was last updated
    FactionStatus:
      type: string
      description: Lifecycle status of a faction entity
      enum:
      - Active
      - Deprecated
      - Dissolved
    FailMilestoneRequest:
      type: object
