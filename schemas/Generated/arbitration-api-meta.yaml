      - proceduralTimeline
      properties:
        caseId:
          type: string
          format: uuid
          description: Unique identifier for the created case
        caseCode:
          type: string
          description: Human-readable sequential case code
        proceduralTimeline:
          type: array
          items:
            $ref: '#/components/schemas/ProceduralMilestone'
          description: Planned milestones from the procedural template
    ListCasesResponse:
      type: object
      additionalProperties: false
      description: Paginated list of arbitration cases
      required:
      - cases
      - totalCount
      - page
      - pageSize
      properties:
        cases:
          type: array
          items:
            $ref: '#/components/schemas/ArbitrationCaseInfo'
          description: Cases matching the query filters
        totalCount:
          type: integer
          minimum: 0
          description: Total number of matching cases
        page:
          type: integer
          minimum: 1
          description: Current page number
        pageSize:
          type: integer
          minimum: 1
          description: Number of items per page
    GetTimelineResponse:
      type: object
      additionalProperties: false
      description: Procedural timeline for a case
      required:
      - milestones
      - currentPhase
      properties:
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/ProceduralMilestone'
          description: All milestones in the procedural timeline
        currentPhase:
          type: string
          description: Name of the current active milestone phase
        daysRemaining:
          type: integer
          nullable: true
          description: Days remaining until the current milestone deadline, null if no deadline
    SubmitEvidenceResponse:
      type: object
      additionalProperties: false
      description: Response after submitting evidence
      required:
      - evidenceId
      properties:
        evidenceId:
          type: string
          format: uuid
          description: Unique identifier of the submitted evidence item
    ListEvidenceResponse:
      type: object
      additionalProperties: false
      description: Paginated list of evidence items
      required:
      - evidence
      - totalCount
      - page
      - pageSize
      properties:
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ArbitrationEvidenceInfo'
          description: Evidence items matching the query
        totalCount:
          type: integer
          minimum: 0
          description: Total number of matching evidence items
        page:
          type: integer
          minimum: 1
          description: Current page number
        pageSize:
          type: integer
          minimum: 1
          description: Number of items per page
