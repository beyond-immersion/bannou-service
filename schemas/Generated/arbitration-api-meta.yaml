components:
  schemas:
    ArbitrationCaseStatus:
      type: string
      description: Case lifecycle states managed via contract milestones
      enum:
      - Filed
      - AwaitingArbiter
      - Hearing
      - Deliberation
      - Ruled
      - Appealed
      - Closed
      - Dismissed
      - Withdrawn
    ArbitrationRulingType:
      type: string
      description: Finite set of ruling outcomes determining consequence execution logic
      enum:
      - PetitionerFavored
      - RespondentFavored
      - Split
      - Dismissed
    ArbitrationEvidenceType:
      type: string
      description: Categories of evidence affecting relevance scoring
      enum:
      - Testimony
      - Document
      - Witness
      - Physical
    ArbiterSelectionMode:
      type: string
      description: Strategies for assigning arbiters from governance data
      enum:
      - FactionLeader
      - AppointedOfficial
      - ExternalRequest
      - PeerPanel
    ConsequenceType:
      type: string
      description: Types of ruling consequences dispatched to downstream services
      enum:
      - RelationshipChange
      - AssetDivision
      - OngoingObligation
      - CustodyAssignment
      - Exile
      - Fine
      - Imprisonment
      - SovereigntyTransfer
      - NormViolationPublication
      - DivineAttention
      - OrganizationDissolution
      - SeedGrowthTransfer
    ConsequenceResultStatus:
      type: string
      description: Execution status of an individual ruling consequence
      enum:
      - Pending
      - Succeeded
      - Failed
    CaseClosedReason:
      type: string
      description: Reason a case reached a terminal closed state
      enum:
      - Withdrawal
      - Dismissal
      - RulingEnforced
      - PartyCharacterDeleted
      - RealmDeleted
      - JurisdictionVoid
    AuthorityLevel:
      type: string
      description: Faction authority level for jurisdictional determination. Matches Faction service AuthorityLevel 
        enum.
      enum:
      - Influence
      - Delegated
      - Sovereign
    ConsequenceManifestEntry:
      type: object
      additionalProperties: false
      description: A single consequence to execute as part of a ruling. Fields are type-specific and nullable when not 
        applicable to the consequence type.
      required:
      - consequenceType
      properties:
        consequenceType:
          $ref: '#/components/schemas/ConsequenceType'
          description: Type of consequence determining which downstream service is called
        targetEntityId:
          type: string
          format: uuid
          nullable: true
          description: Target entity for the consequence (e.g., relationship to change, character to exile)
        targetEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Type of the target entity
        sourceEntityId:
          type: string
          format: uuid
          nullable: true
          description: Source entity for transfer-type consequences (e.g., custody source, seed source)
        sourceEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Type of the source entity
        amount:
          type: number
          format: double
          nullable: true
          description: Monetary amount for Fine consequences
        currencyDefinitionId:
          type: string
          format: uuid
          nullable: true
          description: Currency definition for Fine consequences
        relationshipTypeId:
          type: string
          format: uuid
          nullable: true
          description: Relationship type ID for RelationshipChange consequences
        factionId:
          type: string
          format: uuid
          nullable: true
          description: Faction ID for Exile or SovereigntyTransfer consequences
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Organization ID for OrganizationDissolution consequences
        seedId:
          type: string
          format: uuid
          nullable: true
          description: Source seed ID for SeedGrowthTransfer consequences
        targetSeedId:
          type: string
          format: uuid
          nullable: true
          description: Target seed ID for SeedGrowthTransfer consequences
        proportion:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 1
          description: Transfer proportion for SeedGrowthTransfer consequences (0.0 to 1.0)
        statusTemplateId:
          type: string
          format: uuid
          nullable: true
          description: Status template ID for Imprisonment consequences
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: Human-readable description of this consequence
    ConsequenceResult:
      type: object
      additionalProperties: false
      description: Execution result of an individual ruling consequence, tracked for enforcement retry
      required:
      - consequenceType
      - status
      - attemptCount
      properties:
        consequenceType:
          $ref: '#/components/schemas/ConsequenceType'
          description: Type of consequence this result tracks
        status:
          $ref: '#/components/schemas/ConsequenceResultStatus'
          description: Current execution status
        attemptCount:
          type: integer
          minimum: 0
          description: Number of execution attempts
        lastError:
          type: string
          nullable: true
          description: Error message from the most recent failed attempt
    EvidenceContent:
      type: object
      additionalProperties: false
      description: Typed evidence content with fields applicable to different evidence types
      required:
      - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
          description: Title or summary of the evidence item
        description:
          type: string
          nullable: true
          maxLength: 5000
          description: Detailed description of the evidence
        witnessEntityId:
          type: string
          format: uuid
          nullable: true
          description: Entity ID of the witness (for Testimony and Witness evidence types)
        witnessEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Entity type of the witness
        documentReference:
          type: string
          nullable: true
          maxLength: 1000
          description: Reference identifier for document evidence (for Document evidence type)
        physicalLocationDescription:
          type: string
          nullable: true
          maxLength: 1000
          description: Description of where physical evidence is located (for Physical evidence type)
    ProceduralMilestone:
      type: object
      additionalProperties: false
      description: A milestone in the procedural timeline of an arbitration case
      required:
      - name
      - status
      properties:
        name:
          type: string
          description: Milestone identifier (e.g., filing_accepted, evidence_closed, ruling_issued)
        status:
          type: string
          description: Current milestone status from Contract (e.g., Pending, Completed, Failed)
        deadline:
          type: string
          format: date-time
          nullable: true
          description: Deadline for milestone completion, null if no deadline
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: When the milestone was completed, null if not yet completed
    QualifiedArbiterInfo:
      type: object
      additionalProperties: false
      description: Information about an arbiter qualified to handle cases of a given type
      required:
      - arbiterId
      - entityType
      - activeCaseCount
      properties:
        arbiterId:
          type: string
          format: uuid
          description: Entity ID of the qualified arbiter
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type of the arbiter (typically Character)
        displayName:
          type: string
          nullable: true
          description: Display name of the arbiter if available
        activeCaseCount:
          type: integer
          minimum: 0
          description: Number of active cases currently assigned to this arbiter
    JurisdictionHierarchyEntry:
      type: object
      additionalProperties: false
      description: An entry in the jurisdictional authority hierarchy for a location
      required:
      - factionId
      - authorityLevel
      properties:
        factionId:
          type: string
          format: uuid
          description: Faction exercising authority at this level
        factionName:
          type: string
          nullable: true
          description: Display name of the faction if available
        authorityLevel:
          $ref: '#/components/schemas/AuthorityLevel'
          description: Level of authority this faction exercises
        domains:
          type: array
          nullable: true
          items:
            type: string
          description: Governance domains covered by this faction at this authority level
    ArbitrationCaseInfo:
      type: object
      additionalProperties: false
      description: Full arbitration case record
      required:
      - caseId
      - caseCode
      - gameServiceId
      - caseType
      - status
      - contractId
      - templateCode
      - jurisdictionChallenged
      - createdAt
      properties:
        caseId:
          type: string
          format: uuid
          description: Unique identifier for the case
        caseCode:
          type: string
          description: Human-readable sequential case code (e.g., ARB-DISS-00142)
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope for this case
        caseType:
          type: string
          description: Game-configurable dispute type code (e.g., dissolution, trade_dispute, criminal)
        status:
          $ref: '#/components/schemas/ArbitrationCaseStatus'
          description: Current case lifecycle status
        locationId:
          type: string
          format: uuid
          nullable: true
          description: Location where the case was filed. Nullable due to DETACH cleanup.
        sovereignFactionId:
          type: string
          format: uuid
          nullable: true
          description: Jurisdictional sovereign faction. Nullable due to DETACH cleanup.
        petitionerEntityId:
          type: string
          format: uuid
          nullable: true
          description: Petitioner entity ID. Nullable due to DETACH cleanup of character.
        petitionerEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Type of the petitioner entity
        respondentEntityId:
          type: string
          format: uuid
          nullable: true
          description: Respondent entity ID. Nullable due to DETACH cleanup of character.
        respondentEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Type of the respondent entity
        arbiterEntityId:
          type: string
          format: uuid
          nullable: true
          description: Assigned arbiter entity ID, null if not yet assigned
        arbiterEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Type of the assigned arbiter entity
        contractId:
          type: string
          format: uuid
          description: Underlying contract instance driving the case lifecycle
        templateCode:
          type: string
          description: Procedural template code from sovereign governance data
        rulingId:
          type: string
          format: uuid
          nullable: true
          description: Ruling ID if a ruling has been issued
        jurisdictionChallenged:
          type: boolean
          description: Whether jurisdiction has been challenged
        closedReason:
          $ref: '#/components/schemas/CaseClosedReason'
          nullable: true
          description: Reason for case closure, null if case is not closed
        governanceParametersSnapshot:
          type: object
          nullable: true
          additionalProperties: true
          description: Governance parameters snapshot from jurisdictional faction. Stored for reference; Arbitration 
            does not read or validate specific keys. These parameters are interpreted by Contract templates.
        createdAt:
          type: string
          format: date-time
          description: When the case was filed
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the case was last updated
    ArbitrationEvidenceInfo:
      type: object
      additionalProperties: false
      description: Full evidence item record
      required:
      - evidenceId
      - caseId
      - evidenceType
      - content
      - submittingPartyEntityId
      - submittingPartyEntityType
      - submissionTimestamp
      properties:
        evidenceId:
          type: string
          format: uuid
          description: Unique identifier for the evidence item
        caseId:
          type: string
          format: uuid
          description: Case this evidence belongs to
        evidenceType:
          $ref: '#/components/schemas/ArbitrationEvidenceType'
          description: Category of evidence
        content:
          $ref: '#/components/schemas/EvidenceContent'
          description: Typed evidence content
        submittingPartyEntityId:
          type: string
          format: uuid
          description: Entity ID of the party that submitted this evidence
        submittingPartyEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the submitting party entity
        submissionTimestamp:
          type: string
          format: date-time
          description: When the evidence was submitted
    ArbitrationRulingInfo:
      type: object
      additionalProperties: false
      description: Full ruling record including consequence execution results
      required:
      - rulingId
      - caseId
      - rulingType
      - consequenceManifest
      - consequenceResults
      - issuedTimestamp
      properties:
        rulingId:
          type: string
          format: uuid
          description: Unique identifier for the ruling
        caseId:
          type: string
          format: uuid
          description: Case this ruling was issued for
        arbiterEntityId:
          type: string
          format: uuid
          nullable: true
          description: Entity ID of the arbiter who issued the ruling
        arbiterEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          nullable: true
          description: Type of the arbiter entity
        rulingType:
          $ref: '#/components/schemas/ArbitrationRulingType'
          description: Outcome of the ruling
        reasoning:
          type: string
          nullable: true
          maxLength: 5000
          description: Arbiter's reasoning for the ruling
        consequenceManifest:
          type: array
          items:
            $ref: '#/components/schemas/ConsequenceManifestEntry'
          description: Consequences to be executed as part of this ruling
        consequenceResults:
          type: array
          items:
            $ref: '#/components/schemas/ConsequenceResult'
          description: Execution status of each consequence
        appealDeadline:
          type: string
          format: date-time
          nullable: true
          description: Deadline for filing an appeal, null if no appeal window
        issuedTimestamp:
          type: string
          format: date-time
          description: When the ruling was issued
    FileCaseRequest:
      type: object
      additionalProperties: false
      description: Request to file a new arbitration case
      required:
      - gameServiceId
      - petitionerEntityId
      - petitionerEntityType
      - respondentEntityId
      - respondentEntityType
      - locationId
      - caseType
      properties:
        gameServiceId:
          type: string
          format: uuid
          description: Game service scope for this case
        petitionerEntityId:
          type: string
          format: uuid
          description: Entity ID of the petitioner
        petitionerEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of the petitioner entity
        respondentEntityId:
          type: string
          format: uuid
          description: Entity ID of the respondent
        respondentEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
