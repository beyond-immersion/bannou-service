      required:
      - caseId
      - dismissalReasoning
      properties:
        caseId:
          type: string
          format: uuid
          description: Case to dismiss
        dismissalReasoning:
          type: string
          minLength: 1
          maxLength: 2000
          description: Reasoning for the dismissal
    ChallengeJurisdictionRequest:
      type: object
      additionalProperties: false
      description: Request to challenge the jurisdictional authority over a case
      required:
      - caseId
      - challengingPartyEntityId
      - challengingPartyEntityType
      - challengeReasoning
      properties:
        caseId:
          type: string
          format: uuid
