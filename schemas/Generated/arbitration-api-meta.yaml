    GetJurisdictionHierarchyResponse:
      type: object
      additionalProperties: false
      description: Full sovereignty hierarchy for a location
      required:
      - hierarchy
      properties:
        hierarchy:
          type: array
          items:
            $ref: '#/components/schemas/JurisdictionHierarchyEntry'
          description: Authority hierarchy ordered from lowest to highest authority level
    CleanupResponse:
      type: object
      additionalProperties: false
      description: Response from resource cleanup operations
      required:
      - processedCount
      properties:
        processedCount:
          type: integer
          minimum: 0
          description: Number of case records processed during cleanup
