  /arbitration/case/list:
    post:
      summary: List arbitration cases with filtering
      description: |
        Queries cases within a game service scope with optional filters for case type,
        status, party entities, arbiter, and jurisdictional faction. Results are ordered
        by filing timestamp descending.
      operationId: listCases
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListCasesRequest'
      responses:
        '200':
          description: Cases retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCasesResponse'
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/ListCasesRequest\"\
        ,\n    \"$defs\": {\n        \"ListCasesRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to list cases with filtering and pagination\",\n            \"required\"\
        : [\n                \"gameServiceId\"\n            ],\n            \"properties\": {\n                \"gameServiceId\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"\
        description\": \"Game service scope (required filter)\"\n                },\n                \"caseType\": {\n   \
        \                 \"type\": \"string\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Filter by case type code\"\n                },\n                \"status\": {\n                    \"$ref\": \"\
        #/$defs/ArbitrationCaseStatus\",\n                    \"nullable\": true,\n                    \"description\": \"\
        Filter by case status\"\n                },\n                \"petitionerEntityId\": {\n                    \"type\"\
        : \"string\",\n                    \"format\": \"uuid\",\n                    \"nullable\": true,\n              \
        \      \"description\": \"Filter by petitioner entity ID\"\n                },\n                \"respondentEntityId\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"\
        nullable\": true,\n                    \"description\": \"Filter by respondent entity ID\"\n                },\n \
        \               \"arbiterEntityId\": {\n                    \"type\": \"string\",\n                    \"format\"\
        : \"uuid\",\n                    \"nullable\": true,\n                    \"description\": \"Filter by assigned arbiter
        entity ID\"\n                },\n                \"jurisdictionFactionId\": {\n                    \"type\": \"string\"\
        ,\n                    \"format\": \"uuid\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Filter by jurisdictional sovereign faction ID\"\n                },\n                \"page\": {\n           \
        \         \"type\": \"integer\",\n                    \"nullable\": true,\n                    \"minimum\": 1,\n \
        \                   \"description\": \"Page number (1-based)\"\n                },\n                \"pageSize\":
        {\n                    \"type\": \"integer\",\n                    \"nullable\": true,\n                    \"minimum\"\
        : 1,\n                    \"maximum\": 100,\n                    \"description\": \"Number of items per page\"\n \
        \               }\n            }\n        },\n        \"ArbitrationCaseStatus\": {\n            \"type\": \"string\"\
        ,\n            \"description\": \"Case lifecycle states managed via contract milestones\",\n            \"enum\":
        [\n                \"Filed\",\n                \"AwaitingArbiter\",\n                \"Hearing\",\n              \
        \  \"Deliberation\",\n                \"Ruled\",\n                \"Appealed\",\n                \"Closed\",\n   \
        \             \"Dismissed\",\n                \"Withdrawn\"\n            ]\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/ListCasesResponse\"\
        ,\n    \"$defs\": {\n        \"ListCasesResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Paginated list of arbitration cases\",\n            \"required\": [\n   \
        \             \"cases\",\n                \"totalCount\",\n                \"page\",\n                \"pageSize\"\
        \n            ],\n            \"properties\": {\n                \"cases\": {\n                    \"type\": \"array\"\
        ,\n                    \"items\": {\n                        \"$ref\": \"#/$defs/ArbitrationCaseInfo\"\n         \
        \           },\n                    \"description\": \"Cases matching the query filters\"\n                },\n  \
        \              \"totalCount\": {\n                    \"type\": \"integer\",\n                    \"minimum\": 0,\n\
        \                    \"description\": \"Total number of matching cases\"\n                },\n                \"page\"\
        : {\n                    \"type\": \"integer\",\n                    \"minimum\": 1,\n                    \"description\"\
