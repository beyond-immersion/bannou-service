      summary: Cleanup arbitration data when a character is deleted
      description: |
        Resource-managed DETACH cleanup. Active cases with the deleted character as a party
        are closed; terminal cases have the character reference nullified. Per-item error
        isolation ensures one failure does not block processing of other cases.
