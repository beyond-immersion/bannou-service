openapi: 3.0.4
info:
  title: Bannou Arbitration Service API
  description: |
    Dispute resolution orchestration composing Contract/Faction primitives for jurisdictional
    rulings. A thin orchestration layer (like Quest over Contract, Escrow over Currency/Item)
    that composes existing Bannou primitives to deliver adjudication game mechanics.
    Internal-only, never internet-facing.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-references:
  - target: character
    sourceType: arbitration-case
    field: petitionerEntityId
    onDelete: detach
    cleanup:
      endpoint: /arbitration/cleanup-by-character
      resourceIdParam: characterId
  - target: realm
    sourceType: arbitration-case
    field: locationId
    onDelete: detach
    cleanup:
      endpoint: /arbitration/cleanup-by-realm
      resourceIdParam: realmId
  - target: faction
    sourceType: arbitration-case
    field: sovereignFactionId
    onDelete: detach
    cleanup:
      endpoint: /arbitration/cleanup-by-faction
      resourceIdParam: factionId
  - target: location
    sourceType: arbitration-case
    field: locationId
    onDelete: detach
    cleanup:
      endpoint: /arbitration/cleanup-by-location
      resourceIdParam: locationId
x-service-layer: GameFeatures
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)
paths:
  /arbitration/case/file:
    post:
      summary: File a new arbitration case
      description: |
        Creates a new arbitration case by resolving jurisdiction, selecting a procedural
        template from the sovereign's governance data, and creating a Contract instance
        to drive the case lifecycle. Petitioner and respondent must be valid entities.
        Returns 400 if Faction service is unavailable or no sovereign has jurisdiction.
      operationId: fileCase
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileCaseRequest'
      responses:
        '200':
          description: Case filed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCaseResponse'
        '400':
          description: Invalid request, Faction service unavailable, or no sovereign has jurisdiction for this case type
        '404':
          description: Game service, petitioner, respondent, or location not found
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/FileCaseRequest\"\
        ,\n    \"$defs\": {\n        \"FileCaseRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to file a new arbitration case\",\n            \"required\": [\n\
        \                \"gameServiceId\",\n                \"petitionerEntityId\",\n                \"petitionerEntityType\"\
        ,\n                \"respondentEntityId\",\n                \"respondentEntityType\",\n                \"locationId\"\
        ,\n                \"caseType\"\n            ],\n            \"properties\": {\n                \"gameServiceId\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"\
        description\": \"Game service scope for this case\"\n                },\n                \"petitionerEntityId\": {\n\
        \                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"Entity ID of the petitioner\"\n                },\n                \"petitionerEntityType\": {\n             \
        \       \"type\": \"object\",\n                    \"description\": \"Type of the petitioner entity\"\n          \
        \      },\n                \"respondentEntityId\": {\n                    \"type\": \"string\",\n                \
        \    \"format\": \"uuid\",\n                    \"description\": \"Entity ID of the respondent\"\n               \
        \ },\n                \"respondentEntityType\": {\n                    \"type\": \"object\",\n                   \
        \ \"description\": \"Type of the respondent entity\"\n                },\n                \"locationId\": {\n    \
        \                \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\"\
        : \"Location where the case is filed (determines jurisdiction)\"\n                },\n                \"caseType\"\
        : {\n                    \"type\": \"string\",\n                    \"minLength\": 1,\n                    \"maxLength\"\
        : 100,\n                    \"description\": \"Game-configurable dispute type code (e.g., dissolution, trade_dispute)\"\
        \n                }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/FileCaseResponse\"\
        ,\n    \"$defs\": {\n        \"FileCaseResponse\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Response after filing a new arbitration case\",\n            \"required\"\
        : [\n                \"caseId\",\n                \"caseCode\",\n                \"proceduralTimeline\"\n        \
        \    ],\n            \"properties\": {\n                \"caseId\": {\n                    \"type\": \"string\",\n\
        \                    \"format\": \"uuid\",\n                    \"description\": \"Unique identifier for the created
        case\"\n                },\n                \"caseCode\": {\n                    \"type\": \"string\",\n         \
        \           \"description\": \"Human-readable sequential case code\"\n                },\n                \"proceduralTimeline\"\
        : {\n                    \"type\": \"array\",\n                    \"items\": {\n                        \"$ref\"\
        : \"#/$defs/ProceduralMilestone\"\n                    },\n                    \"description\": \"Planned milestones
        from the procedural template\"\n                }\n            }\n        },\n        \"ProceduralMilestone\": {\n\
        \            \"type\": \"object\",\n            \"additionalProperties\": false,\n            \"description\": \"\
        A milestone in the procedural timeline of an arbitration case\",\n            \"required\": [\n                \"\
        name\",\n                \"status\"\n            ],\n            \"properties\": {\n                \"name\": {\n\
        \                    \"type\": \"string\",\n                    \"description\": \"Milestone identifier (e.g., filing_accepted,
        evidence_closed, ruling_issued)\"\n                },\n                \"status\": {\n                    \"type\"\
        : \"string\",\n                    \"description\": \"Current milestone status from Contract (e.g., Pending, Completed,
        Failed)\"\n                },\n                \"deadline\": {\n                    \"type\": \"string\",\n      \
        \              \"format\": \"date-time\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Deadline for milestone completion, null if no deadline\"\n                },\n                \"completedAt\"\
        : {\n                    \"type\": \"string\",\n                    \"format\": \"date-time\",\n                 \
        \   \"nullable\": true,\n                    \"description\": \"When the milestone was completed, null if not yet
        completed\"\n                }\n            }\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"File a new arbitration case\",\n    \"description\": \"Creates a new arbitration
        case by resolving jurisdiction, selecting a procedural\\ntemplate from the sovereign's governance data, and creating
        a Contract instance\\nto drive the case lifecycle. Petitioner and respondent must be valid entities.\\nReturns 400
        if Faction service is unavailable or no sovereign has jurisdiction.\\n\",\n    \"tags\": [\n        \"Case Management\"\
        \n    ],\n    \"deprecated\": false,\n    \"operationId\": \"fileCase\"\n}"
  /arbitration/case/get:
    post:
      summary: Get an arbitration case by ID
      description: Returns the full case record enriched with current contract milestone status.
      operationId: getCase
      tags:
      - Case Management
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCaseRequest'
      responses:
        '200':
          description: Case retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationCaseInfo'
        '404':
          description: Case not found
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/GetCaseRequest\"\
        ,\n    \"$defs\": {\n        \"GetCaseRequest\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Request to get a case by ID\",\n            \"required\": [\n           \
        \     \"caseId\"\n            ],\n            \"properties\": {\n                \"caseId\": {\n                 \
        \   \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"Unique
        identifier of the case\"\n                }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/ArbitrationCaseInfo\"\
        ,\n    \"$defs\": {\n        \"ArbitrationCaseInfo\": {\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"description\": \"Full arbitration case record\",\n            \"required\": [\n          \
        \      \"caseId\",\n                \"caseCode\",\n                \"gameServiceId\",\n                \"caseType\"\
        ,\n                \"status\",\n                \"contractId\",\n                \"templateCode\",\n             \
        \   \"jurisdictionChallenged\",\n                \"createdAt\"\n            ],\n            \"properties\": {\n  \
        \              \"caseId\": {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\"\
        ,\n                    \"description\": \"Unique identifier for the case\"\n                },\n                \"\
        caseCode\": {\n                    \"type\": \"string\",\n                    \"description\": \"Human-readable sequential
        case code (e.g., ARB-DISS-00142)\"\n                },\n                \"gameServiceId\": {\n                   \
        \ \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"Game service
        scope for this case\"\n                },\n                \"caseType\": {\n                    \"type\": \"string\"\
        ,\n                    \"description\": \"Game-configurable dispute type code (e.g., dissolution, trade_dispute, criminal)\"\
        \n                },\n                \"status\": {\n                    \"$ref\": \"#/$defs/ArbitrationCaseStatus\"\
        ,\n                    \"description\": \"Current case lifecycle status\"\n                },\n                \"\
        locationId\": {\n                    \"type\": \"string\",\n                    \"format\": \"uuid\",\n          \
        \          \"nullable\": true,\n                    \"description\": \"Location where the case was filed. Nullable
        due to DETACH cleanup.\"\n                },\n                \"sovereignFactionId\": {\n                    \"type\"\
        : \"string\",\n                    \"format\": \"uuid\",\n                    \"nullable\": true,\n              \
        \      \"description\": \"Jurisdictional sovereign faction. Nullable due to DETACH cleanup.\"\n                },\n\
        \                \"petitionerEntityId\": {\n                    \"type\": \"string\",\n                    \"format\"\
        : \"uuid\",\n                    \"nullable\": true,\n                    \"description\": \"Petitioner entity ID.
        Nullable due to DETACH cleanup of character.\"\n                },\n                \"petitionerEntityType\": {\n\
        \                    \"type\": \"object\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Type of the petitioner entity\"\n                },\n                \"respondentEntityId\": {\n             \
        \       \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"nullable\": true,\n\
        \                    \"description\": \"Respondent entity ID. Nullable due to DETACH cleanup of character.\"\n   \
        \             },\n                \"respondentEntityType\": {\n                    \"type\": \"object\",\n       \
        \             \"nullable\": true,\n                    \"description\": \"Type of the respondent entity\"\n      \
        \          },\n                \"arbiterEntityId\": {\n                    \"type\": \"string\",\n               \
        \     \"format\": \"uuid\",\n                    \"nullable\": true,\n                    \"description\": \"Assigned
        arbiter entity ID, null if not yet assigned\"\n                },\n                \"arbiterEntityType\": {\n    \
        \                \"type\": \"object\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Type of the assigned arbiter entity\"\n                },\n                \"contractId\": {\n               \
        \     \"type\": \"string\",\n                    \"format\": \"uuid\",\n                    \"description\": \"Underlying
        contract instance driving the case lifecycle\"\n                },\n                \"templateCode\": {\n        \
        \            \"type\": \"string\",\n                    \"description\": \"Procedural template code from sovereign
        governance data\"\n                },\n                \"rulingId\": {\n                    \"type\": \"string\",\n\
        \                    \"format\": \"uuid\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Ruling ID if a ruling has been issued\"\n                },\n                \"jurisdictionChallenged\": {\n \
        \                   \"type\": \"boolean\",\n                    \"description\": \"Whether jurisdiction has been challenged\"\
        \n                },\n                \"closedReason\": {\n                    \"$ref\": \"#/$defs/CaseClosedReason\"\
        ,\n                    \"nullable\": true,\n                    \"description\": \"Reason for case closure, null if
        case is not closed\"\n                },\n                \"governanceParametersSnapshot\": {\n                  \
        \  \"type\": \"object\",\n                    \"nullable\": true,\n                    \"additionalProperties\": true,\n\
        \                    \"description\": \"Governance parameters snapshot from jurisdictional faction. Stored for reference;
        Arbitration does not read or validate specific keys. These parameters are interpreted by Contract templates.\"\n \
        \               },\n                \"createdAt\": {\n                    \"type\": \"string\",\n                \
        \    \"format\": \"date-time\",\n                    \"description\": \"When the case was filed\"\n              \
        \  },\n                \"updatedAt\": {\n                    \"type\": \"string\",\n                    \"format\"\
        : \"date-time\",\n                    \"nullable\": true,\n                    \"description\": \"When the case was
        last updated\"\n                }\n            }\n        },\n        \"ArbitrationCaseStatus\": {\n            \"\
        type\": \"string\",\n            \"description\": \"Case lifecycle states managed via contract milestones\",\n   \
        \         \"enum\": [\n                \"Filed\",\n                \"AwaitingArbiter\",\n                \"Hearing\"\
        ,\n                \"Deliberation\",\n                \"Ruled\",\n                \"Appealed\",\n                \"\
        Closed\",\n                \"Dismissed\",\n                \"Withdrawn\"\n            ]\n        },\n        \"CaseClosedReason\"\
        : {\n            \"type\": \"string\",\n            \"description\": \"Reason a case reached a terminal closed state\"\
        ,\n            \"enum\": [\n                \"Withdrawal\",\n                \"Dismissal\",\n                \"RulingEnforced\"\
        ,\n                \"PartyCharacterDeleted\",\n                \"RealmDeleted\",\n                \"JurisdictionVoid\"\
        \n            ]\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Get an arbitration case by ID\",\n    \"description\": \"Returns the full
        case record enriched with current contract milestone status.\",\n    \"tags\": [\n        \"Case Management\"\n  \
        \  ],\n    \"deprecated\": false,\n    \"operationId\": \"getCase\"\n}"
