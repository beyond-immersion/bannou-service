        petitionerEntityId:
          type: string
          format: uuid
          nullable: true
          description: Filter by petitioner entity ID
        respondentEntityId:
          type: string
          format: uuid
          nullable: true
          description: Filter by respondent entity ID
        arbiterEntityId:
          type: string
          format: uuid
          nullable: true
          description: Filter by assigned arbiter entity ID
        jurisdictionFactionId:
          type: string
          format: uuid
          nullable: true
          description: Filter by jurisdictional sovereign faction ID
        page:
          type: integer
          nullable: true
          minimum: 1
          description: Page number (1-based)
        pageSize:
          type: integer
          nullable: true
          minimum: 1
          maximum: 100
          description: Number of items per page
    WithdrawCaseRequest:
      type: object
      additionalProperties: false
