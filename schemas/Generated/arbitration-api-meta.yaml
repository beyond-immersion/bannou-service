        challengingPartyEntityId:
          type: string
          format: uuid
          description: Entity ID of the party challenging jurisdiction
        challengingPartyEntityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Entity type of the challenging party
        challengeReasoning:
          type: string
          minLength: 1
          maxLength: 2000
          description: Reasoning for the jurisdiction challenge
    GetTimelineRequest:
      type: object
      additionalProperties: false
