        activeCaseCount:
          type: integer
          minimum: 0
          description: Number of active cases assigned to this arbiter
        caseIds:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of active cases assigned to this arbiter
    IssueRulingResponse:
      type: object
      additionalProperties: false
      description: Response after issuing a ruling
      required:
      - rulingId
      properties:
        rulingId:
          type: string
          format: uuid
          description: Unique identifier of the issued ruling
    EnforceRulingResponse:
      type: object
      additionalProperties: false
      description: Response after attempting to enforce a ruling's consequences
      required:
      - rulingId
      - allEnforced
      - consequenceResults
      properties:
        rulingId:
          type: string
          format: uuid
          description: Ruling that was enforced
        allEnforced:
          type: boolean
          description: True if all consequences have been successfully executed
        consequenceResults:
          type: array
          items:
            $ref: '#/components/schemas/ConsequenceResult'
          description: Current execution status of each consequence
    ResolveJurisdictionResponse:
      type: object
      additionalProperties: false
      description: Resolved jurisdiction for a location and case type
      required:
      - sovereignFactionId
      - authorityLevel
      - templateCode
      properties:
        sovereignFactionId:
          type: string
          format: uuid
          description: Faction with jurisdiction
        authorityLevel:
          $ref: '#/components/schemas/AuthorityLevel'
          description: Authority level of the jurisdictional faction
        templateCode:
          type: string
          description: Procedural template code from governance data
        governanceParameters:
          type: object
          nullable: true
          additionalProperties: true
