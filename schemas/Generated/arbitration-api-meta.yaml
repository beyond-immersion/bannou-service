  /arbitration/jurisdiction/resolve:
    post:
      summary: Resolve jurisdiction for a location and case type
      description: |
        Resolves which sovereign faction has jurisdiction over a case type at a given
        location. Uses a TTL cache. Walks the sovereignty hierarchy: delegated faction
        -> sovereign -> realm baseline. Returns 400 if Faction unavailable, 404 if no
        sovereign has jurisdiction.
      operationId: resolveJurisdiction
      tags:
      - Jurisdiction
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveJurisdictionRequest'
      responses:
        '200':
          description: Jurisdiction resolved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveJurisdictionResponse'
        '400':
          description: Faction service unavailable
        '404':
          description: Location not found or no sovereign has jurisdiction for this case type
