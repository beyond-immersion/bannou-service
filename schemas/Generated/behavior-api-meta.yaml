openapi: 3.0.4
info:
  title: ABML Behavior Management API
  version: 3.0.0
  description: |
    Arcadia Behavior Markup Language (ABML) API for character behavior management.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    This API handles:
    - YAML-based behavior definition parsing and compilation
    - Stackable behavior set management with priority resolution
    - GOAP (Goal-Oriented Action Planning) integration
    - Cultural adaptation and context-aware behavior modification
    - Real-time behavior state management and caching
    - Integration with Bannou mesh for distributed character agents

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)
x-service-layer: GameFeatures
paths:
  /compile:
    post:
      summary: Compile ABML behavior definition
      description: |
        Compiles a YAML-based ABML behavior definition into executable behavior trees.
        Handles stackable behavior sets, cultural adaptations, and context variable resolution.
      operationId: CompileAbmlBehavior
      tags:
      - ABML
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              type: string
              description: Raw ABML YAML content
            example: |
              version: "1.0.0"
              metadata:
                id: "blacksmith_daily_routine"
                category: "profession"
                priority: 60
                description: "Daily routine for a master blacksmith NPC"

              context:
                variables:
                  energy_level: "${npc.stats.energy}"
                  skill_level: "${npc.skills.blacksmithing}"
                  shop_reputation: "${npc.reputation.local}"

                services:
                  - name: "crafting_service"
                    required: true
                  - name: "economy_service"
                    required: true

              behaviors:
                morning_startup:
                  triggers:
                    - time_range: "06:00-09:00"
                    - condition: "${context.energy_level > 0.7}"
                  actions:
                    - wake_up:
                        animation: "stretch_and_yawn"
                        duration: 3
                        energy_cost: -0.05
          application/json:
            schema:
              $ref: '#/components/schemas/CompileBehaviorRequest'
      responses:
        '200':
          description: ABML behavior compiled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompileBehaviorResponse'
        '400':
          description: Invalid ABML definition or compilation error
        '403':
          description: Forbidden - insufficient permissions
        '500':
          description: Internal server error
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/CompileBehaviorRequest\"\
        ,\n    \"$defs\": {\n        \"CompileBehaviorRequest\": {\n            \"description\": \"Request to compile an ABML
        behavior definition into executable behavior trees\",\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"required\": [\n                \"abmlContent\"\n            ],\n            \"properties\"\
        : {\n                \"abmlContent\": {\n                    \"type\": \"string\",\n                    \"minLength\"\
        : 1,\n                    \"description\": \"Raw ABML YAML content to compile\",\n                    \"example\"\
        : \"version: \\\"1.0.0\\\"\\nmetadata:\\n  id: \\\"example_behavior\\\"\\n  category: \\\"basic\\\"\\nbehaviors:\\\
        n  example:\\n    triggers:\\n      - condition: \\\"true\\\"\\n    actions:\\n      - log:\\n          message: \\\
        \"Hello World\\\"\\n\"\n                },\n                \"behaviorName\": {\n                    \"type\": \"\
        string\",\n                    \"nullable\": true,\n                    \"description\": \"Optional human-readable
        name for the behavior.\\nIf not provided, extracted from ABML metadata.id or generated from content hash.\\n\",\n\
        \                    \"example\": \"blacksmith_daily_routine\"\n                },\n                \"behaviorCategory\"\
        : {\n                    \"$ref\": \"#/$defs/BehaviorCategory\",\n                    \"description\": \"Category
        for organizing behaviors (e.g., profession, cultural, situational).\\nUsed for filtering and grouping in bundles.\\\
        n\",\n                    \"nullable\": true,\n                    \"example\": \"Professional\"\n               \
        \ },\n                \"bundleId\": {\n                    \"type\": \"string\",\n                    \"nullable\"\
        : true,\n                    \"description\": \"Optional bundle identifier for grouping related behaviors.\\nWhen
        specified, the compiled behavior will be added to a bundle with this ID.\\nClients can then download entire bundles
        for efficient bulk loading.\\nIf the bundle doesn't exist, it will be created.\\n\",\n                    \"example\"\
        : \"blacksmith-behaviors-v1\"\n                },\n                \"compilationOptions\": {\n                   \
        \ \"$ref\": \"#/$defs/CompilationOptions\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"Options controlling the compilation process\"\n                }\n            }\n        },\n        \"BehaviorCategory\"\
        : {\n            \"type\": \"string\",\n            \"description\": \"Category for organizing behaviors\",\n    \
        \        \"enum\": [\n                \"Base\",\n                \"Cultural\",\n                \"Professional\",\n\
        \                \"Personal\",\n                \"Situational\",\n                \"Ambient\"\n            ]\n   \
        \     },\n        \"CompilationOptions\": {\n            \"description\": \"Options controlling the ABML compilation
        process including optimizations and caching\",\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"properties\": {\n                \"enableOptimizations\": {\n                    \"type\"\
        : \"boolean\",\n                    \"default\": true,\n                    \"description\": \"Enable behavior tree
        optimizations\"\n                },\n                \"cacheCompiledResult\": {\n                    \"type\": \"\
        boolean\",\n                    \"default\": true,\n                    \"description\": \"Cache the compiled behavior
        for reuse\"\n                },\n                \"strictValidation\": {\n                    \"type\": \"boolean\"\
        ,\n                    \"default\": false,\n                    \"description\": \"Enable strict validation mode\"\
        \n                },\n                \"culturalAdaptations\": {\n                    \"type\": \"boolean\",\n   \
        \                 \"default\": true,\n                    \"description\": \"Apply cultural adaptations during compilation\"\
        \n                },\n                \"goapIntegration\": {\n                    \"type\": \"boolean\",\n       \
        \             \"default\": true,\n                    \"description\": \"Generate GOAP goals from behaviors\"\n  \
        \              }\n            }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/CompileBehaviorResponse\"\
        ,\n    \"$defs\": {\n        \"CompileBehaviorResponse\": {\n            \"description\": \"Response containing the
        results of an ABML behavior compilation\",\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"required\": [\n                \"behaviorId\",\n                \"compilationTimeMs\",\n \
        \               \"isUpdate\"\n            ],\n            \"properties\": {\n                \"behaviorId\": {\n \
        \                   \"type\": \"string\",\n                    \"minLength\": 1,\n                    \"description\"\
        : \"Unique identifier for the compiled behavior (content-addressable hash)\",\n                    \"example\": \"\
        behavior-a1b2c3d4e5f6g7h8\"\n                },\n                \"behaviorName\": {\n                    \"type\"\
        : \"string\",\n                    \"nullable\": true,\n                    \"description\": \"Human-readable name
        of the behavior\",\n                    \"example\": \"blacksmith_daily_routine\"\n                },\n          \
        \      \"compiledBehavior\": {\n                    \"$ref\": \"#/$defs/CompiledBehavior\",\n                    \"\
        nullable\": true,\n                    \"description\": \"The compiled behavior data including behavior tree and metadata\"\
        \n                },\n                \"compilationTimeMs\": {\n                    \"type\": \"integer\",\n     \
        \               \"minimum\": 0,\n                    \"description\": \"Time taken to compile the behavior in milliseconds\"\
        \n                },\n                \"assetId\": {\n                    \"type\": \"string\",\n                \
        \    \"nullable\": true,\n                    \"description\": \"Asset service ID where the compiled bytecode is stored.
        Null only when caching is explicitly disabled.\"\n                },\n                \"isUpdate\": {\n          \
        \          \"type\": \"boolean\",\n                    \"description\": \"True if this replaced an existing behavior
        with the same content hash\"\n                }\n            }\n        },\n        \"CompiledBehavior\": {\n    \
        \        \"description\": \"Compiled behavior containing behavior tree, context schema, and GOAP integration data\"\
        ,\n            \"type\": \"object\",\n            \"additionalProperties\": false,\n            \"required\": [\n\
        \                \"behaviorTree\",\n                \"contextSchema\"\n            ],\n            \"properties\"\
        : {\n                \"behaviorTree\": {\n                    \"$ref\": \"#/$defs/BehaviorTreeData\",\n          \
        \          \"description\": \"Compiled behavior tree data with bytecode or download reference\"\n                },\n\
        \                \"contextSchema\": {\n                    \"$ref\": \"#/$defs/ContextSchemaData\",\n            \
        \        \"description\": \"Schema defining required context variables for execution\"\n                },\n     \
        \           \"serviceDependencies\": {\n                    \"type\": \"array\",\n                    \"items\": {\n\
        \                        \"type\": \"string\"\n                    },\n                    \"nullable\": true,\n \
        \                   \"description\": \"List of required services for this behavior\"\n                },\n       \
        \         \"goapGoals\": {\n                    \"type\": \"array\",\n                    \"items\": {\n         \
        \               \"$ref\": \"#/$defs/GoapGoal\"\n                    },\n                    \"nullable\": true,\n\
        \                    \"description\": \"GOAP goals extracted from the behavior\"\n                },\n           \
        \     \"executionMetadata\": {\n                    \"$ref\": \"#/$defs/ExecutionMetadata\",\n                   \
        \ \"nullable\": true,\n                    \"description\": \"Metadata for behavior execution including performance
        hints and resource requirements\"\n                }\n            }\n        },\n        \"BehaviorTreeData\": {\n\
        \            \"type\": \"object\",\n            \"additionalProperties\": false,\n            \"description\": \"\
        Compiled behavior tree data with bytecode or download reference\",\n            \"required\": [\n                \"\
        bytecodeSize\"\n            ],\n            \"properties\": {\n                \"bytecode\": {\n                 \
        \   \"type\": \"string\",\n                    \"nullable\": true,\n                    \"description\": \"Base64-encoded
        compiled bytecode for the behavior tree\"\n                },\n                \"bytecodeSize\": {\n             \
        \       \"type\": \"integer\",\n                    \"minimum\": 0,\n                    \"description\": \"Size of
        the bytecode in bytes\"\n                },\n                \"downloadUrl\": {\n                    \"type\": \"\
        string\",\n                    \"nullable\": true,\n                    \"description\": \"URL to download the compiled
        behavior asset\"\n                }\n            }\n        },\n        \"ContextSchemaData\": {\n            \"type\"\
        : \"object\",\n            \"description\": \"Schema defining required context variables for behavior execution.\\
        nStructure is compiler-generated from ABML context declarations.\\nKeys are variable names, values describe expected
        types and sources.\\nNo Bannou service reads specific keys by convention \\u2014\\nthis schema is consumed by the
        ActorRunner interpreter at runtime.\\n\",\n            \"additionalProperties\": true\n        },\n        \"GoapGoal\"\
        : {\n            \"description\": \"Goal definition for GOAP planning with conditions and priority\",\n          \
        \  \"type\": \"object\",\n            \"additionalProperties\": false,\n            \"required\": [\n            \
        \    \"name\",\n                \"conditions\",\n                \"priority\"\n            ],\n            \"properties\"\
        : {\n                \"name\": {\n                    \"type\": \"string\",\n                    \"description\":
        \"Name of the goal\",\n                    \"example\": \"satisfy_hunger\"\n                },\n                \"\
        description\": {\n                    \"type\": \"string\",\n                    \"nullable\": true,\n           \
        \         \"description\": \"Human-readable description of the goal\"\n                },\n                \"conditions\"\
        : {\n                    \"type\": \"object\",\n                    \"additionalProperties\": {\n                \
        \        \"type\": \"string\"\n                    },\n                    \"description\": \"World state conditions
        that satisfy this goal (literal conditions)\",\n                    \"example\": {\n                        \"hunger\"\
        : \"<= 0.3\",\n                        \"gold\": \">= 50\"\n                    }\n                },\n          \
        \      \"priority\": {\n                    \"type\": \"integer\",\n                    \"minimum\": 1,\n        \
        \            \"maximum\": 100,\n                    \"description\": \"Priority of this goal relative to others\"\n\
        \                },\n                \"preconditions\": {\n                    \"type\": \"object\",\n           \
        \         \"additionalProperties\": {\n                        \"type\": \"string\"\n                    },\n    \
        \                \"nullable\": true,\n                    \"description\": \"World state conditions required to pursue
        this goal\"\n                }\n            }\n        },\n        \"ExecutionMetadata\": {\n            \"type\"\
        : \"object\",\n            \"additionalProperties\": false,\n            \"description\": \"Metadata about behavior
        execution requirements including timing, resources, and interrupt conditions\",\n            \"properties\": {\n \
        \               \"estimatedDuration\": {\n                    \"type\": \"integer\",\n                    \"description\"\
        : \"Estimated execution time in seconds\"\n                },\n                \"resourceRequirements\": {\n     \
        \               \"type\": \"object\",\n                    \"additionalProperties\": {\n                        \"\
        type\": \"number\"\n                    },\n                    \"nullable\": true,\n                    \"description\"\
        : \"Resource requirements for behavior execution\"\n                },\n                \"interruptConditions\": {\n\
        \                    \"type\": \"array\",\n                    \"items\": {\n                        \"type\": \"\
        string\"\n                    },\n                    \"nullable\": true,\n                    \"description\": \"\
        Conditions that can interrupt behavior execution\"\n                }\n            }\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Compile ABML behavior definition\",\n    \"description\": \"Compiles a
        YAML-based ABML behavior definition into executable behavior trees.\\nHandles stackable behavior sets, cultural adaptations,
        and context variable resolution.\\n\",\n    \"tags\": [\n        \"ABML\"\n    ],\n    \"deprecated\": false,\n  \
        \  \"operationId\": \"CompileAbmlBehavior\"\n}"
  /validate:
    post:
      summary: Validate ABML definition
      description: |
        Validates ABML YAML against schema and checks for semantic correctness.
        Includes context variable validation and service dependency checking.
      operationId: ValidateAbml
      tags:
      - Validation
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              type: string
              description: Raw ABML YAML content to validate
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAbmlRequest'
      responses:
        '200':
          description: Validation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateAbmlResponse'
      x-request-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/ValidateAbmlRequest\"\
        ,\n    \"$defs\": {\n        \"ValidateAbmlRequest\": {\n            \"description\": \"Request to validate ABML YAML
        content against schema and semantic rules\",\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"required\": [\n                \"abmlContent\"\n            ],\n            \"properties\"\
        : {\n                \"abmlContent\": {\n                    \"type\": \"string\",\n                    \"minLength\"\
        : 1,\n                    \"description\": \"Raw ABML YAML content to validate\"\n                },\n           \
        \     \"strictMode\": {\n                    \"type\": \"boolean\",\n                    \"default\": false,\n   \
        \                 \"description\": \"Enable strict validation mode with enhanced checking\"\n                }\n \
        \           }\n        }\n    }\n}"
      x-response-schema-json: "{\n    \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n    \"$ref\": \"#/$defs/ValidateAbmlResponse\"\
        ,\n    \"$defs\": {\n        \"ValidateAbmlResponse\": {\n            \"description\": \"Response containing the results
        of ABML validation including errors and warnings\",\n            \"type\": \"object\",\n            \"additionalProperties\"\
        : false,\n            \"required\": [\n                \"isValid\"\n            ],\n            \"properties\": {\n\
        \                \"isValid\": {\n                    \"type\": \"boolean\",\n                    \"description\":
        \"Whether the ABML definition is valid\"\n                },\n                \"validationErrors\": {\n          \
        \          \"type\": \"array\",\n                    \"items\": {\n                        \"$ref\": \"#/$defs/ValidationError\"\
        \n                    },\n                    \"nullable\": true,\n                    \"description\": \"List of
        validation errors if invalid\"\n                },\n                \"semanticWarnings\": {\n                    \"\
        type\": \"array\",\n                    \"items\": {\n                        \"type\": \"string\"\n             \
        \       },\n                    \"nullable\": true,\n                    \"description\": \"Semantic warnings that
        don't prevent compilation\"\n                },\n                \"schemaVersion\": {\n                    \"type\"\
        : \"string\",\n                    \"nullable\": true,\n                    \"description\": \"ABML schema version
        used for validation\"\n                }\n            }\n        },\n        \"ValidationError\": {\n            \"\
        description\": \"Detailed validation error with type, location, and message information\",\n            \"type\":
        \"object\",\n            \"additionalProperties\": false,\n            \"required\": [\n                \"type\",\n\
        \                \"message\"\n            ],\n            \"properties\": {\n                \"type\": {\n       \
        \             \"$ref\": \"#/$defs/ValidationErrorType\",\n                    \"description\": \"Type of validation
        error\"\n                },\n                \"message\": {\n                    \"type\": \"string\",\n         \
        \           \"description\": \"Human-readable error message\"\n                },\n                \"lineNumber\"\
        : {\n                    \"type\": \"integer\",\n                    \"nullable\": true,\n                    \"minimum\"\
        : 1,\n                    \"description\": \"Line number where the error occurred. Null if not applicable.\"\n   \
        \             },\n                \"columnNumber\": {\n                    \"type\": \"integer\",\n              \
        \      \"nullable\": true,\n                    \"minimum\": 1,\n                    \"description\": \"Column number
        where the error occurred. Null if not applicable.\"\n                },\n                \"yamlPath\": {\n       \
        \             \"type\": \"string\",\n                    \"nullable\": true,\n                    \"description\"\
        : \"YAML path to the problematic element\",\n                    \"example\": \"behaviors.morning_startup.actions[0]\"\
        \n                }\n            }\n        },\n        \"ValidationErrorType\": {\n            \"type\": \"string\"\
        ,\n            \"description\": \"Type of ABML validation error\",\n            \"enum\": [\n                \"Syntax\"\
        ,\n                \"Semantic\",\n                \"Schema\",\n                \"Context\",\n                \"ServiceDependency\"\
        \n            ]\n        }\n    }\n}"
      x-endpoint-info-json: "{\n    \"summary\": \"Validate ABML definition\",\n    \"description\": \"Validates ABML YAML
        against schema and checks for semantic correctness.\\nIncludes context variable validation and service dependency
        checking.\\n\",\n    \"tags\": [\n        \"Validation\"\n    ],\n    \"deprecated\": false,\n    \"operationId\"\
        : \"ValidateAbml\"\n}"
  /cache/get:
