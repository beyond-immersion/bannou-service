openapi: 3.0.4
info:
  title: Save-Load Service Events
  version: 1.0.0
  description: |
    Events published by the Save-Load service.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.

  x-event-subscriptions: []  # Save-Load service doesn't subscribe to external events
  x-event-publications:
    # SaveSlot lifecycle events (auto-generated from x-lifecycle)
    - topic: save-load.save-slot.created
      event: SaveSlotCreatedEvent
      description: Published when a new save slot is created
    - topic: save-load.save-slot.updated
      event: SaveSlotUpdatedEvent
      description: Published when a save slot is updated
    - topic: save-load.save-slot.deleted
      event: SaveSlotDeletedEvent
      description: Published when a save slot is deleted
    # Custom save events
    - topic: save-load.save.created
      event: SaveCreatedEvent
      description: Published when a new save version is created
    - topic: save-load.save.loaded
      event: SaveLoadedEvent
      description: Published when a save is loaded
    - topic: save-load.save.migrated
      event: SaveMigratedEvent
      description: Published when a save is migrated to a new schema version
    - topic: save-load.version.pinned
      event: VersionPinnedEvent
      description: Published when a version is pinned as checkpoint
    - topic: save-load.version.unpinned
      event: VersionUnpinnedEvent
      description: Published when a version is unpinned
    - topic: save-load.version.deleted
      event: VersionDeletedEvent
      description: Published when a version is deleted
    - topic: save-load.cleanup.completed
      event: CleanupCompletedEvent
      description: Published when automatic cleanup completes
    # Async upload events
    - topic: save-load.upload.queued
      event: SaveQueuedEvent
      description: Published when a save is queued for async upload
    - topic: save-load.upload.completed
      event: SaveUploadCompletedEvent
      description: Published when async upload to MinIO completes
    - topic: save-load.upload.failed
      event: SaveUploadFailedEvent
      description: Published when async upload fails
    - topic: save-load.circuit-breaker.state-changed
      event: CircuitBreakerStateChangedEvent
      description: Published when storage circuit breaker changes state

paths: {}  # Events don't have HTTP paths

# Lifecycle events auto-generated from this definition
# Output: schemas/Generated/save-load-lifecycle-events.yaml
x-lifecycle:
  topic_prefix: save-load
  SaveSlot:
    model:
      slotId: { type: string, format: uuid, primary: true, required: true, description: "Unique slot identifier" }
      gameId: { type: string, required: true, description: "Game identifier for namespace isolation" }
      ownerId: { type: string, format: uuid, required: true, description: "ID of the owning entity" }
      ownerType: { $ref: 'common-api.yaml#/components/schemas/EntityType', required: true, description: "Type of entity that owns this save slot" }
      slotName: { type: string, required: true, description: "Slot name" }
      category: { $ref: 'save-load-api.yaml#/components/schemas/SaveCategory', required: true, description: "Save category determining retention and cleanup behavior" }
      maxVersions: { type: integer, required: true, description: "Maximum versions to retain" }
      retentionDays: { type: integer, nullable: true, description: "Days to retain versions (null = indefinite)" }
      compressionType: { $ref: 'save-load-api.yaml#/components/schemas/CompressionType', required: true, description: "Compression algorithm used for save data" }
      versionCount: { type: integer, required: true, description: "Current number of versions in slot" }
      latestVersion: { type: integer, nullable: true, description: "Latest version number (null if empty)" }
      totalSizeBytes: { type: integer, format: int64, required: true, description: "Total storage used by all versions" }
      createdAt: { type: string, format: date-time, required: true, description: "Slot creation timestamp" }
      updatedAt: { type: string, format: date-time, required: true, description: "Last modification timestamp" }
    sensitive: []

components:
  schemas:
    # Custom events beyond lifecycle (SaveSlot lifecycle events auto-generated)

    SaveCreatedEvent:
      type: object
      additionalProperties: false
      description: Published when a new save version is created
      required:
        - eventId
        - timestamp
        - slotId
        - versionNumber
        - ownerId
        - ownerType
        - sizeBytes
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the save was created
        slotId:
          type: string
          format: uuid
          description: Slot identifier
        slotName:
          type: string
          nullable: true
          description: Slot name
        versionNumber:
          type: integer
          description: New version number
        ownerId:
          type: string
          format: uuid
          description: Owner entity ID
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Owner entity type
        category:
          $ref: 'save-load-api.yaml#/components/schemas/SaveCategory'
          description: Save category
        sizeBytes:
          type: integer
          format: int64
          description: Save size in bytes
        schemaVersion:
          type: string
          nullable: true
          description: Schema version if specified
        pinned:
          type: boolean
          default: false
          description: Whether version is pinned
        checkpointName:
          type: string
          nullable: true
          description: Checkpoint name if pinned

    SaveLoadedEvent:
      type: object
      additionalProperties: false
      description: Published when a save is loaded
      required:
        - eventId
        - timestamp
        - slotId
        - versionNumber
        - ownerId
        - ownerType
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the save was loaded
        slotId:
          type: string
          format: uuid
          description: Slot identifier
        slotName:
          type: string
          nullable: true
          description: Slot name
        versionNumber:
          type: integer
          description: Loaded version number
        ownerId:
          type: string
          format: uuid
          description: Owner entity ID
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Owner entity type

    SaveMigratedEvent:
      type: object
      additionalProperties: false
      description: Published when a save is migrated to a new schema version
      required:
        - eventId
        - timestamp
        - slotId
        - fromSchemaVersion
        - toSchemaVersion
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the migration occurred
        slotId:
          type: string
          format: uuid
          description: Slot identifier
        slotName:
          type: string
          nullable: true
          description: Slot name
        originalVersionNumber:
          type: integer
          nullable: true
          description: Original version that was migrated
        newVersionNumber:
          type: integer
          nullable: true
          description: New version with migrated data
        fromSchemaVersion:
          type: string
          description: Original schema version
        toSchemaVersion:
          type: string
          description: Target schema version
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Owner entity ID
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Owner entity type

    VersionPinnedEvent:
      type: object
      additionalProperties: false
      description: Published when a version is pinned as checkpoint
      required:
        - eventId
        - timestamp
        - slotId
        - versionNumber
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the version was pinned
        slotId:
          type: string
          format: uuid
          description: Slot identifier
        slotName:
          type: string
          nullable: true
          description: Slot name
        versionNumber:
          type: integer
          description: Pinned version number
        checkpointName:
          type: string
          nullable: true
          description: Checkpoint name if assigned
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Owner entity ID
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Owner entity type

    VersionUnpinnedEvent:
      type: object
      additionalProperties: false
      description: Published when a version is unpinned
      required:
        - eventId
        - timestamp
        - slotId
        - versionNumber
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the version was unpinned
        slotId:
          type: string
          format: uuid
          description: Slot identifier
        slotName:
          type: string
          nullable: true
          description: Slot name
        versionNumber:
          type: integer
          description: Unpinned version number
        previousCheckpointName:
          type: string
          nullable: true
          description: Previous checkpoint name before unpinning
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Owner entity ID
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Owner entity type

    VersionDeletedEvent:
      type: object
      additionalProperties: false
      description: Published when a version is deleted
      required:
        - eventId
        - timestamp
        - slotId
        - versionNumber
        - bytesFreed
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the version was deleted
        slotId:
          type: string
          format: uuid
          description: Slot identifier
        slotName:
          type: string
          nullable: true
          description: Slot name
        versionNumber:
          type: integer
          description: Deleted version number
        bytesFreed:
          type: integer
          format: int64
          description: Storage freed in bytes
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Owner entity ID
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Owner entity type

    CleanupCompletedEvent:
      type: object
      additionalProperties: false
      description: Published when automatic cleanup completes
      required:
        - eventId
        - timestamp
        - versionsDeleted
        - bytesFreed
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the cleanup completed
        versionsDeleted:
          type: integer
          description: Number of versions cleaned up
        slotsDeleted:
          type: integer
          nullable: true
          description: Number of empty slots removed
        bytesFreed:
          type: integer
          format: int64
          description: Storage freed in bytes
        durationMs:
          type: integer
          nullable: true
          description: Cleanup duration in milliseconds

    # ═══════════════════════════════════════════════════════════════════════════
    # ASYNC UPLOAD EVENTS
    # ═══════════════════════════════════════════════════════════════════════════

    SaveQueuedEvent:
      type: object
      additionalProperties: false
      description: Published when a save is queued for async upload. The save data is in Redis and immediately loadable, but not yet in MinIO.
      required:
        - eventId
        - timestamp
        - slotId
        - versionNumber
        - ownerId
        - ownerType
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the save was queued
        slotId:
          type: string
          format: uuid
          description: Save slot identifier
        slotName:
          type: string
          nullable: true
          description: Human-readable slot name
        versionNumber:
          type: integer
          description: Version number that was queued
        ownerId:
          type: string
          format: uuid
          description: Owner entity ID
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns this save
        sizeBytes:
          type: integer
          format: int64
          nullable: true
          description: Size of the queued save data in bytes
        queueDepth:
          type: integer
          nullable: true
          description: Current number of pending uploads in queue

    SaveUploadCompletedEvent:
      type: object
      additionalProperties: false
      description: Published when async upload to MinIO completes successfully
      required:
        - eventId
        - timestamp
        - slotId
        - versionNumber
        - assetId
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the upload completed
        slotId:
          type: string
          format: uuid
          description: Save slot identifier
        slotName:
          type: string
          nullable: true
          description: Human-readable slot name
        versionNumber:
          type: integer
          description: Version number that was uploaded
        assetId:
          type: string
          format: uuid
          description: Asset ID in MinIO
        uploadDurationMs:
          type: integer
          nullable: true
          description: Time from queue to upload completion
        queueWaitMs:
          type: integer
          nullable: true
          description: Time spent waiting in queue

    SaveUploadFailedEvent:
      type: object
      additionalProperties: false
      description: Published when async upload fails after all retry attempts. The save data may still be in Redis hot cache but will expire.
      required:
        - eventId
        - timestamp
        - slotId
        - versionNumber
        - errorMessage
        - retryCount
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the upload failure was recorded
        slotId:
          type: string
          format: uuid
          description: Save slot identifier
        slotName:
          type: string
          nullable: true
          description: Human-readable slot name
        versionNumber:
          type: integer
          description: Version number that failed to upload
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Owner entity ID
        ownerType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity that owns this save
        errorMessage:
          type: string
          description: Last error message
        retryCount:
          type: integer
          description: Number of retry attempts made
        willRetry:
          type: boolean
          default: false
          description: Whether more retries will be attempted

    CircuitBreakerStateChangedEvent:
      type: object
      additionalProperties: false
      description: Published when storage circuit breaker changes state
      required:
        - eventId
        - timestamp
        - previousState
        - newState
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event
        timestamp:
          type: string
          format: date-time
          description: When the state transition occurred
        previousState:
          $ref: 'save-load-api.yaml#/components/schemas/CircuitBreakerState'
          description: Previous circuit breaker state before the transition
        newState:
          $ref: 'save-load-api.yaml#/components/schemas/CircuitBreakerState'
          description: New circuit breaker state after the transition
        failureCount:
          type: integer
          nullable: true
          description: Consecutive failures (when opening)
        successCount:
          type: integer
          nullable: true
          description: Successful probes (when closing from half-open)
        pendingUploads:
          type: integer
          nullable: true
          description: Current queue depth when state changed
