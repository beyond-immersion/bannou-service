openapi: 3.0.4
info:
  title: Resource Lifecycle Service Configuration
  description: |
    Configuration schema for Resource service.
    Properties are bound to environment variables with BANNOU_ prefix.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
paths: {}
x-service-configuration:
  properties:
    # === Grace Period Configuration ===
    DefaultGracePeriodSeconds:
      type: integer
      env: RESOURCE_DEFAULT_GRACE_PERIOD_SECONDS
      default: 604800
      minimum: 0
      description: Default grace period in seconds before cleanup eligible (7 days default)

    # === Cleanup Callback Configuration ===
    CleanupCallbackTimeoutSeconds:
      type: integer
      env: RESOURCE_CLEANUP_CALLBACK_TIMEOUT_SECONDS
      default: 30
      minimum: 5
      maximum: 300
      description: Timeout for each cleanup callback execution

    # NOTE: Retry configuration is handled by lib-mesh (MESH_MAX_RETRIES, MESH_RETRY_DELAY_MILLISECONDS)
    # at the infrastructure level. Per-service retry config was removed as redundant.

    # === Distributed Lock Configuration ===
    CleanupLockExpirySeconds:
      type: integer
      env: RESOURCE_CLEANUP_LOCK_EXPIRY_SECONDS
      default: 300
      minimum: 60
      maximum: 3600
      description: Distributed lock timeout during cleanup execution

    # === Default Cleanup Policy ===
    DefaultCleanupPolicy:
      $ref: 'resource-api.yaml#/components/schemas/CleanupPolicy'
      env: RESOURCE_DEFAULT_CLEANUP_POLICY
      default: BestEffort
      description: Default cleanup policy when not specified per-resource-type

    # === Compression Configuration ===
    DefaultCompressionPolicy:
      $ref: 'resource-api.yaml#/components/schemas/CompressionPolicy'
      env: RESOURCE_DEFAULT_COMPRESSION_POLICY
      default: AllRequired
      description: Default compression policy when not specified per-request

    CompressionCallbackTimeoutSeconds:
      type: integer
      env: RESOURCE_COMPRESSION_CALLBACK_TIMEOUT_SECONDS
      default: 60
      minimum: 10
      maximum: 600
      description: Timeout for each compression callback execution

    CompressionLockExpirySeconds:
      type: integer
      env: RESOURCE_COMPRESSION_LOCK_EXPIRY_SECONDS
      default: 600
      minimum: 120
      maximum: 3600
      description: Distributed lock timeout during compression execution

    # === Snapshot Configuration ===
    SnapshotDefaultTtlSeconds:
      type: integer
      env: RESOURCE_SNAPSHOT_DEFAULT_TTL_SECONDS
      default: 3600
      minimum: 60
      maximum: 86400
      description: Default TTL for snapshots when not specified in request (1 hour default)

    SnapshotMinTtlSeconds:
      type: integer
      env: RESOURCE_SNAPSHOT_MIN_TTL_SECONDS
      default: 60
      minimum: 1
      maximum: 3600
      description: Minimum allowed TTL for snapshots (1 minute default)

    SnapshotMaxTtlSeconds:
      type: integer
      env: RESOURCE_SNAPSHOT_MAX_TTL_SECONDS
      default: 86400
      minimum: 3600
      maximum: 604800
      description: Maximum allowed TTL for snapshots (24 hours default, max 7 days)

    # === Transaction Recovery Worker Configuration ===
    TransactionRecoveryWorkerIntervalSeconds:
      type: integer
      env: RESOURCE_TRANSACTION_RECOVERY_WORKER_INTERVAL_SECONDS
      default: 30
      minimum: 5
      maximum: 300
      description: How often the worker scans for transactions needing recovery (TTL expiry, commit resume, compensation retry)

    TransactionRecoveryWorkerStartupDelaySeconds:
      type: integer
      env: RESOURCE_TRANSACTION_RECOVERY_WORKER_STARTUP_DELAY_SECONDS
      default: 15
      minimum: 0
      maximum: 120
      description: Delay before first recovery cycle after startup

    TransactionCompensationMaxRetries:
      type: integer
      env: RESOURCE_TRANSACTION_COMPENSATION_MAX_RETRIES
      default: 10
      minimum: 1
      maximum: 50
      description: Maximum compensation retry attempts per provision before giving up

    TransactionCompensationBackoffBaseSeconds:
      type: integer
      env: RESOURCE_TRANSACTION_COMPENSATION_BACKOFF_BASE_SECONDS
      default: 5
      minimum: 1
      maximum: 60
      description: Base delay for exponential backoff between compensation retries

    TransactionCommitMaxRetries:
      type: integer
      env: RESOURCE_TRANSACTION_COMMIT_MAX_RETRIES
      default: 10
      minimum: 1
      maximum: 50
      description: Maximum retries for reference registration during Committing state recovery

    TransactionValidationMaxRetries:
      type: integer
      env: RESOURCE_TRANSACTION_VALIDATION_MAX_RETRIES
      default: 5
      minimum: 1
      maximum: 20
      description: Maximum validation check attempts before escalating to admin (transaction remains Active for manual intervention)

    TransactionRetentionDays:
      type: integer
      env: RESOURCE_TRANSACTION_RETENTION_DAYS
      default: 7
      minimum: 1
      maximum: 90
      description: Days to retain completed or aborted transaction metadata before purging

    TransactionDefaultTtlSeconds:
      type: integer
      env: RESOURCE_TRANSACTION_DEFAULT_TTL_SECONDS
      default: 120
      minimum: 10
      maximum: 600
      description: Default TTL for transactions when the caller does not specify one

    TransactionMaxTtlSeconds:
      type: integer
      env: RESOURCE_TRANSACTION_MAX_TTL_SECONDS
      default: 600
      minimum: 60
      maximum: 3600
      description: Maximum allowed TTL — BeginTransaction clamps requested TTL to this value
