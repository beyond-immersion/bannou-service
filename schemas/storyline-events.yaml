openapi: 3.0.4
info:
  title: Storyline Service Events
  version: 1.0.0
  description: |
    Event subscription and publication declarations for Storyline service.
    Lifecycle events are auto-generated from x-lifecycle definition.

    **Data Flow**:
    - Publishes: storyline.scenario-definition.created, storyline.scenario-definition.updated, storyline.plan.composed, storyline.scenario.triggered/phase-completed/completed/failed/available

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.

  x-event-subscriptions: []

  x-event-publications:
    # Scenario definition lifecycle events (auto-generated from x-lifecycle)
    - topic: storyline.scenario-definition.created
      event: ScenarioDefinitionCreatedEvent
      description: Published when a new scenario definition is created
    - topic: storyline.scenario-definition.updated
      event: ScenarioDefinitionUpdatedEvent
      description: Published when a scenario definition is updated (including deprecation via changedFields)
    - topic: storyline.scenario-definition.deleted
      event: ScenarioDefinitionDeletedEvent
      description: Unused Category B infrastructure — exists for future safe deletion pattern. Never published today.

    # Composition events
    - topic: storyline.plan.composed
      event: StorylinePlanComposedEvent
      description: Published when a storyline plan is generated
    # Scenario execution events
    - topic: storyline.scenario.triggered
      event: ScenarioTriggeredEvent
      description: Published when a scenario starts executing for a character
    - topic: storyline.scenario.phase-completed
      event: ScenarioPhaseCompletedEvent
      description: Published when a phase within a multi-phase scenario completes
    - topic: storyline.scenario.completed
      event: ScenarioCompletedEvent
      description: Published when a scenario finishes successfully
    - topic: storyline.scenario.failed
      event: ScenarioFailedEvent
      description: Published when a scenario fails during execution
    - topic: storyline.scenario.available
      event: ScenarioAvailableEvent
      description: Published when new scenarios become available for a character

# Lifecycle events auto-generated from this definition.
# ScenarioDefinition is Category B: deprecation published via "updated" with changedFields (per IMPLEMENTATION TENETS).
# The auto-generated *.deleted variant exists in Generated/ but is never published (Category B infrastructure).
x-lifecycle:
  topic_prefix: storyline
  ScenarioDefinition:
    deprecation: true
    model:
      scenarioId: { type: string, format: uuid, primary: true, required: true, description: "Unique scenario definition identifier" }
      code: { type: string, required: true, description: "Human-readable scenario code" }
      name: { type: string, required: true, description: "Display name for the scenario" }
      description: { type: string, nullable: true, description: "Detailed scenario description" }
      priority: { type: integer, required: true, description: "Higher priority scenarios are checked first" }
      enabled: { type: boolean, required: true, description: "Whether scenario can be triggered" }
      realmId: { type: string, format: uuid, nullable: true, description: "Realm scope (null means all realms)" }
      gameServiceId: { type: string, format: uuid, nullable: true, description: "Game service scope (null means all games)" }
    sensitive: []

paths: {}

components:
  schemas:
    StorylinePlanComposedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a storyline plan is generated
      x-event-template:
        name: storyline_plan_composed
        topic: storyline.plan.composed
      required:
        - eventName
        - eventId
        - timestamp
        - planId
        - goal
        - arcType
        - confidence
        - cached
        - composedAt
      properties:
        eventName:
          type: string
          default: storyline.plan.composed
          description: 'Event type identifier: storyline.plan.composed'
        planId:
          type: string
          format: uuid
          description: Unique identifier for the composed plan
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Realm where storyline is anchored (if any)
        goal:
          $ref: 'storyline-api.yaml#/components/schemas/StorylineGoal'
          description: Storyline goal type used for arc selection
        arcType:
          $ref: 'storyline-api.yaml#/components/schemas/ArcType'
          description: Emotional arc type used
        primarySpectrum:
          $ref: 'storyline-api.yaml#/components/schemas/SpectrumType'
          nullable: true
          description: Primary Life Value spectrum
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Plan viability score
        genre:
          type: string
          nullable: true
          description: Inferred or specified genre
        archiveIds:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: Archive IDs used as seeds
        snapshotIds:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: Snapshot IDs used as seeds
        phaseCount:
          type: integer
          nullable: true
          description: Number of phases in the plan
        entityCount:
          type: integer
          nullable: true
          description: Number of entities required by the plan
        generationTimeMs:
          type: integer
          nullable: true
          description: Time taken to generate in milliseconds
        cached:
          type: boolean
          description: Whether this was returned from cache
        seed:
          type: integer
          nullable: true
          description: Random seed used (if deterministic)
        composedAt:
          type: string
          format: date-time
          description: When the plan was composed

    # Scenario Events

    ScenarioTriggeredEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a scenario starts executing for a character
      required:
        - eventName
        - eventId
        - timestamp
        - executionId
        - scenarioId
        - scenarioCode
        - primaryCharacterId
        - triggeredAt
      properties:
        eventName:
          type: string
          default: storyline.scenario.triggered
          description: 'Event type identifier: storyline.scenario.triggered'
        executionId:
          type: string
          format: uuid
          description: Unique identifier for this scenario execution instance
        scenarioId:
          type: string
          format: uuid
          description: ID of the scenario definition being executed
        scenarioCode:
          type: string
          maxLength: 100
          description: Human-readable code of the scenario definition
        primaryCharacterId:
          type: string
          format: uuid
          description: Character for whom the scenario was triggered
        additionalParticipantIds:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: Additional characters participating in the scenario
        orchestratorId:
          type: string
          format: uuid
          nullable: true
          description: Actor ID of the Regional Watcher that triggered this (if any)
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Realm context for this scenario execution
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Game service context for this scenario execution
        fitScore:
          type: number
          format: double
          nullable: true
          description: Calculated fit score at trigger time (0.0 to 1.0)
        phaseCount:
          type: integer
          nullable: true
          description: Total number of phases in this scenario
        triggeredAt:
          type: string
          format: date-time
          description: When the scenario was triggered

    ScenarioPhaseCompletedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a phase within a multi-phase scenario completes
      required:
        - eventName
        - eventId
        - timestamp
        - executionId
        - scenarioId
        - primaryCharacterId
        - phaseIndex
        - phaseName
        - totalPhases
        - isLastPhase
        - completedAt
      properties:
        eventName:
          type: string
          default: storyline.scenario.phase-completed
          description: 'Event type identifier: storyline.scenario.phase-completed'
        executionId:
          type: string
          format: uuid
          description: Unique identifier for this scenario execution instance
        scenarioId:
          type: string
          format: uuid
          description: ID of the scenario definition being executed
        primaryCharacterId:
          type: string
          format: uuid
          description: Character for whom the scenario is executing
        phaseIndex:
          type: integer
          minimum: 0
          description: Zero-based index of the completed phase
        phaseName:
          type: string
          maxLength: 200
          description: Name of the completed phase
        totalPhases:
          type: integer
          minimum: 1
          description: Total number of phases in the scenario
        mutationsApplied:
          type: integer
          nullable: true
          description: Number of mutations applied in this phase
        questsSpawned:
          type: integer
          nullable: true
          description: Number of quests spawned in this phase
        isLastPhase:
          type: boolean
          description: Whether this was the final phase
        completedAt:
          type: string
          format: date-time
          description: When the phase completed

    ScenarioCompletedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a scenario finishes successfully
      required:
        - eventName
        - eventId
        - timestamp
        - executionId
        - scenarioId
        - scenarioCode
        - primaryCharacterId
        - startedAt
        - completedAt
      properties:
        eventName:
          type: string
          default: storyline.scenario.completed
          description: 'Event type identifier: storyline.scenario.completed'
        executionId:
          type: string
          format: uuid
          description: Unique identifier for this scenario execution instance
        scenarioId:
          type: string
          format: uuid
          description: ID of the scenario definition that was executed
        scenarioCode:
          type: string
          maxLength: 100
          description: Human-readable code of the scenario definition
        primaryCharacterId:
          type: string
          format: uuid
          description: Character for whom the scenario executed
        additionalParticipantIds:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: Additional characters who participated
        orchestratorId:
          type: string
          format: uuid
          nullable: true
          description: Actor ID of the Regional Watcher that triggered this (if any)
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Realm context for this scenario execution
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Game service context for this scenario execution
        phasesCompleted:
          type: integer
          nullable: true
          description: Number of phases completed
        totalMutationsApplied:
          type: integer
          nullable: true
          description: Total number of mutations applied across all phases
        totalQuestsSpawned:
          type: integer
          nullable: true
          description: Total number of quests spawned
        questIds:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: IDs of quests that were spawned
        durationMs:
          type: integer
          nullable: true
          description: Total execution duration in milliseconds
        startedAt:
          type: string
          format: date-time
          description: When the scenario execution started
        completedAt:
          type: string
          format: date-time
          description: When the scenario execution completed

    ScenarioFailedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a scenario fails during execution
      required:
        - eventName
        - eventId
        - timestamp
        - executionId
        - scenarioId
        - scenarioCode
        - primaryCharacterId
        - failureReason
        - failedAt
      properties:
        eventName:
          type: string
          default: storyline.scenario.failed
          description: 'Event type identifier: storyline.scenario.failed'
        executionId:
          type: string
          format: uuid
          description: Unique identifier for this scenario execution instance
        scenarioId:
          type: string
          format: uuid
          description: ID of the scenario definition that failed
        scenarioCode:
          type: string
          maxLength: 100
          description: Human-readable code of the scenario definition
        primaryCharacterId:
          type: string
          format: uuid
          description: Character for whom the scenario was executing
        orchestratorId:
          type: string
          format: uuid
          nullable: true
          description: Actor ID of the Regional Watcher that triggered this (if any)
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Realm context for this scenario execution
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Game service context for this scenario execution
        failureReason:
          type: string
          maxLength: 1000
          description: Human-readable description of why the scenario failed
        failedAtPhase:
          type: integer
          nullable: true
          description: Phase index where failure occurred (if during phase execution)
        failedAtPhaseName:
          type: string
          maxLength: 200
          nullable: true
          description: Name of phase where failure occurred
        partialMutationsApplied:
          type: integer
          nullable: true
          description: Number of mutations that were applied before failure
        isRecoverable:
          type: boolean
          nullable: true
          description: Whether this failure may be recoverable with retry
        failedAt:
          type: string
          format: date-time
          description: When the scenario execution failed

    ScenarioAvailableEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when new scenarios become available for a character
      required:
        - eventName
        - eventId
        - timestamp
        - characterId
        - availableScenarioIds
        - detectedAt
      properties:
        eventName:
          type: string
          default: storyline.scenario.available
          description: 'Event type identifier: storyline.scenario.available'
        characterId:
          type: string
          format: uuid
          description: Character for whom scenarios are available
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Realm context for availability check
        gameServiceId:
          type: string
          format: uuid
          nullable: true
          description: Game service context for availability check
        availableScenarioIds:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of scenarios now available
        availableScenarioCodes:
          type: array
          items:
            type: string
          nullable: true
          description: Codes of scenarios now available (parallel to IDs)
        topFitScore:
          type: number
          format: double
          nullable: true
          description: Highest fit score among available scenarios
        triggerRecommended:
          type: boolean
          nullable: true
          description: Whether immediate trigger is recommended based on fit scores
        detectedAt:
          type: string
          format: date-time
          description: When availability was detected
