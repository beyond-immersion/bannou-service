openapi: 3.0.4
info:
  title: Asset Service Events
  description: |
    Event models for Asset service RabbitMQ pub/sub via MassTransit.
    Contains asset-specific service-to-service events for upload tracking,
    processing coordination, and asset lifecycle management.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-event-subscriptions:
    - topic: asset.metabundle.job.queued
      event: MetabundleJobQueuedEvent
      description: Self-consumed for async metabundle job processing
  x-event-publications:
    # Upload lifecycle events
    - topic: asset.upload.requested
      event: AssetUploadRequestedEvent
      description: Published when a new upload is initiated
    - topic: asset.upload.completed
      event: AssetUploadCompletedEvent
      description: Published when an upload is completed and validated
    # Processing events
    - topic: asset.processing.queued
      event: AssetProcessingQueuedEvent
      description: Published when an asset is queued for processing
    - topic: asset.processing.completed
      event: AssetProcessingCompletedEvent
      description: Published when asset processing completes (success or failure)
    # Asset ready events
    - topic: asset.ready
      event: AssetReadyEvent
      description: Published when an asset is fully processed and available
    # Bundle events
    - topic: asset.bundle.created
      event: BundleCreatedEvent
      description: Published when a bundle is successfully created
    - topic: asset.metabundle.created
      event: MetabundleCreatedEvent
      description: Published when a metabundle is successfully composed from source bundles
    # Bundle management events
    - topic: asset.bundle.updated
      event: BundleUpdatedEvent
      description: Published when bundle metadata is updated
    - topic: asset.bundle.deleted
      event: BundleDeletedEvent
      description: Published when a bundle is soft-deleted or permanently deleted
    - topic: asset.bundle.restored
      event: BundleRestoredEvent
      description: Published when a soft-deleted bundle is restored
    # Processing pool dispatch events
    - topic: "asset.processing.job.{poolType}"
      event: AssetProcessingJobDispatchedEvent
      description: Published when a processing job is dispatched to a pool-type-specific topic (e.g., asset.processing.job.audio)
    - topic: asset.processing.retry
      event: AssetProcessingRetryEvent
      description: Published when processing needs to be retried after no processors are available
    # Bundle creation job events
    - topic: asset.bundle.create
      event: BundleCreationJobQueuedEvent
      description: Published when a bundle creation job is queued for processing pool
    # Metabundle job events
    - topic: asset.metabundle.job.queued
      event: MetabundleJobQueuedEvent
      description: Published when a metabundle creation job is queued for async processing

paths: {}  # Events don't have HTTP paths

components:
  schemas:
    # ==========================================================================
    # Upload Events
    # ==========================================================================

    AssetUploadRequestedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a new upload is initiated via requestUpload API
      required:
        - eventName
        - eventId
        - timestamp
        - uploadId
        - ownerType
        - ownerId
        - filename
        - size
        - contentType
      properties:
        eventName:
          type: string
          default: asset.upload.requested
          description: 'Event type identifier: asset.upload.requested'
        uploadId:
          type: string
          format: uuid
          description: Upload session identifier
        ownerType:
          $ref: 'asset-api.yaml#/components/schemas/AssetOwnerType'
          description: Type of owner initiating this upload
        ownerId:
          type: string
          description: |
            Owner identifier. For Session type: the WebSocket session ID (UUID format).
            For Service type: the service name (e.g., "behavior", "orchestrator").
        filename:
          type: string
          description: Original filename
        size:
          type: integer
          format: int64
          description: Expected file size in bytes
        contentType:
          type: string
          description: MIME content type
        assetType:
          $ref: 'asset-api.yaml#/components/schemas/AssetType'
          description: Category of asset being uploaded
        realm:
          allOf:
            - $ref: 'asset-api.yaml#/components/schemas/GameRealm'
          nullable: true
          description: Game realm the asset belongs to. Null for cross-realm assets.
        isMultipart:
          type: boolean
          default: false
          description: Whether this is a multipart upload

    AssetUploadCompletedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when an upload is completed and file is stored
      required:
        - eventName
        - eventId
        - timestamp
        - assetId
        - uploadId
        - ownerType
        - ownerId
        - bucket
        - key
        - size
        - contentHash
      properties:
        eventName:
          type: string
          default: asset.upload.completed
          description: 'Event type identifier: asset.upload.completed'
        assetId:
          type: string
          description: Assigned asset identifier
        uploadId:
          type: string
          format: uuid
          description: Upload session identifier
        ownerType:
          $ref: 'asset-api.yaml#/components/schemas/AssetOwnerType'
          description: Type of owner for this upload
        ownerId:
          type: string
          description: |
            Owner identifier. For Session type: the WebSocket session ID (UUID format).
            For Service type: the service name (e.g., "behavior", "orchestrator").
        bucket:
          type: string
          description: Storage bucket name
        key:
          type: string
          description: Storage object key
        size:
          type: integer
          format: int64
          description: Actual file size in bytes
        contentHash:
          type: string
          description: SHA256 hash of the file contents
        contentType:
          type: string
          nullable: true  # NRT: Optional property MUST be nullable
          description: MIME content type

    # ==========================================================================
    # Processing Events
    # ==========================================================================

    AssetProcessingQueuedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when an asset is queued for processing
      required:
        - eventName
        - eventId
        - timestamp
        - assetId
        - processingType
      properties:
        eventName:
          type: string
          default: asset.processing.queued
          description: 'Event type identifier: asset.processing.queued'
        assetId:
          type: string
          description: Asset identifier
        processingType:
          $ref: 'asset-api.yaml#/components/schemas/ProcessingType'
          description: Type of processing to be performed on the asset
        priority:
          type: integer
          default: 5
          description: Processing priority (1=highest, 10=lowest)
        processorAppId:
          type: string
          nullable: true
          description: Assigned processor app-id (if delegated to pool)
        estimatedDurationMs:
          type: integer
          nullable: true
          description: Estimated processing duration

    AssetProcessingCompletedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when asset processing completes
      required:
        - eventName
        - eventId
        - timestamp
        - assetId
        - processingType
        - success
      properties:
        eventName:
          type: string
          default: asset.processing.completed
          description: 'Event type identifier: asset.processing.completed'
        assetId:
          type: string
          description: Asset identifier
        processingType:
          $ref: 'asset-api.yaml#/components/schemas/ProcessingType'
          description: Type of processing that was performed
        success:
          type: boolean
          description: Whether processing completed successfully
        errorMessage:
          type: string
          nullable: true
          description: Error message on failure
        outputs:
          type: array
          nullable: true
          description: Generated derivative assets from processing
          items:
            $ref: 'asset-api.yaml#/components/schemas/ProcessingOutput'
        durationMs:
          type: integer
          nullable: true
          description: Actual processing duration in milliseconds

    # ==========================================================================
    # Asset Ready Events
    # ==========================================================================

    AssetReadyEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when an asset is fully processed and available
      required:
        - eventName
        - eventId
        - timestamp
        - assetId
        - bucket
        - key
        - contentHash
      properties:
        eventName:
          type: string
          default: asset.ready
          description: 'Event type identifier: asset.ready'
        assetId:
          type: string
          description: Asset identifier
        versionId:
          type: string
          nullable: true
          description: Version ID in storage
        bucket:
          type: string
          description: Storage bucket name
        key:
          type: string
          description: Storage object key
        contentHash:
          type: string
          description: SHA256 hash of the file contents
        size:
          type: integer
          format: int64
          nullable: true  # NRT: Optional property MUST be nullable
          description: File size in bytes
        contentType:
          type: string
          nullable: true  # NRT: Optional property MUST be nullable
          description: MIME content type
        assetType:
          $ref: 'asset-api.yaml#/components/schemas/AssetType'
          description: Category of the asset
        realm:
          allOf:
            - $ref: 'asset-api.yaml#/components/schemas/GameRealm'
          nullable: true
          description: Game realm the asset belongs to. Null for cross-realm assets.

    # ==========================================================================
    # Bundle Events
    # ==========================================================================

    BundleCreatedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a bundle is successfully created
      required:
        - eventName
        - eventId
        - timestamp
        - bundleId
        - version
        - bucket
        - key
        - assetCount
      properties:
        eventName:
          type: string
          default: asset.bundle.created
          description: 'Event type identifier: asset.bundle.created'
        bundleId:
          type: string
          description: Human-readable bundle identifier
        version:
          type: string
          description: Bundle version string
        bucket:
          type: string
          description: Storage bucket name
        key:
          type: string
          description: Storage object key
        size:
          type: integer
          format: int64
          nullable: true  # NRT: Optional property MUST be nullable
          description: Bundle file size in bytes
        assetCount:
          type: integer
          description: Number of assets in the bundle
        compression:
          $ref: 'asset-api.yaml#/components/schemas/CompressionType'
          description: Compression algorithm used for the bundle
        ownerType:
          allOf:
            - $ref: 'asset-api.yaml#/components/schemas/AssetOwnerType'
          nullable: true
          description: Type of owner (null for system-owned bundles)
        ownerId:
          type: string
          nullable: true
          description: Owner identifier - session ID or service name (null for system-owned bundles)

    MetabundleCreatedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a metabundle is successfully created from source bundles
      required:
        - eventName
        - eventId
        - timestamp
        - metabundleId
        - version
        - sourceBundleCount
        - assetCount
        - bucket
        - key
      properties:
        eventName:
          type: string
          default: asset.metabundle.created
          description: 'Event type identifier: asset.metabundle.created'
        metabundleId:
          type: string
          description: Human-readable metabundle identifier
        version:
          type: string
          description: Metabundle version string
        realm:
          allOf:
            - $ref: 'asset-api.yaml#/components/schemas/GameRealm'
          nullable: true
          description: Game realm for this metabundle. Null for cross-realm metabundles.
        sourceBundleCount:
          type: integer
          description: Number of source bundles composed
        sourceBundleIds:
          type: array
          nullable: true
          items:
            type: string
          description: List of human-readable source bundle IDs that were composed
        assetCount:
          type: integer
          description: Number of unique assets in the metabundle
        standaloneAssetCount:
          type: integer
          nullable: true
          description: Number of standalone assets included directly (not from bundles)
        bucket:
          type: string
          description: Storage bucket name
        key:
          type: string
          description: Storage object key
        sizeBytes:
          type: integer
          format: int64
          nullable: true
          description: Metabundle file size in bytes
        ownerType:
          allOf:
            - $ref: 'asset-api.yaml#/components/schemas/AssetOwnerType'
          nullable: true
          description: Type of owner (null for system-owned metabundles)
        ownerId:
          type: string
          nullable: true
          description: Owner identifier - session ID or service name (null for system-owned metabundles)

    BundleUpdatedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when bundle metadata is updated
      required:
        - eventName
        - eventId
        - timestamp
        - bundleId
        - version
        - previousVersion
        - changes
        - updatedBy
      properties:
        eventName:
          type: string
          default: asset.bundle.updated
          description: 'Event type identifier: asset.bundle.updated'
        bundleId:
          type: string
          description: Human-readable bundle identifier
        version:
          type: integer
          description: New metadata version number after update
        previousVersion:
          type: integer
          description: Previous metadata version number
        changes:
          type: array
          items:
            type: string
          description: List of changes made (e.g., "name changed", "tag 'env' added")
        reason:
          type: string
          nullable: true
          description: Reason provided for the update
        updatedBy:
          type: string
          description: Session ID or service name that performed the update
        realm:
          allOf:
            - $ref: 'asset-api.yaml#/components/schemas/GameRealm'
          nullable: true
          description: Game realm of the bundle. Null for cross-realm bundles.

    BundleDeletedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a bundle is soft-deleted or permanently deleted
      required:
        - eventName
        - eventId
        - timestamp
        - bundleId
        - permanent
        - deletedBy
      properties:
        eventName:
          type: string
          default: asset.bundle.deleted
          description: 'Event type identifier: asset.bundle.deleted'
        bundleId:
          type: string
          description: Human-readable bundle identifier
        permanent:
          type: boolean
          description: True if permanently deleted, false for soft-delete
        retentionUntil:
          type: string
          format: date-time
          nullable: true
          description: When soft-deleted bundle will be permanently removed (null for permanent deletes)
        reason:
          type: string
          nullable: true
          description: Reason provided for the deletion
        deletedBy:
          type: string
          description: Session ID or service name that performed the deletion
        realm:
          allOf:
            - $ref: 'asset-api.yaml#/components/schemas/GameRealm'
          nullable: true
          description: Game realm of the bundle. Null for cross-realm bundles.

    BundleRestoredEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a soft-deleted bundle is restored
      required:
        - eventName
        - eventId
        - timestamp
        - bundleId
        - restoredFromVersion
        - restoredBy
      properties:
        eventName:
          type: string
          default: asset.bundle.restored
          description: 'Event type identifier: asset.bundle.restored'
        bundleId:
          type: string
          description: Human-readable bundle identifier
        restoredFromVersion:
          type: integer
          description: Metadata version the bundle was restored from
        reason:
          type: string
          nullable: true
          description: Reason provided for the restoration
        restoredBy:
          type: string
          description: Session ID or service name that performed the restoration
        realm:
          allOf:
            - $ref: 'asset-api.yaml#/components/schemas/GameRealm'
          nullable: true
          description: Game realm of the bundle. Null for cross-realm bundles.

    # ==========================================================================
    # Processing Pool Events
    # ==========================================================================

    AssetProcessingJobDispatchedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: |
        Event published when an asset processing job is dispatched to a processor
        in a specific pool. Topic includes pool type suffix (e.g., asset.processing.job.audio).
      required:
        - eventName
        - eventId
        - timestamp
        - jobId
        - assetId
        - storageKey
        - contentType
        - sizeBytes
        - poolType
        - processorId
        - appId
        - expiresAt
      properties:
        eventName:
          type: string
          default: "asset.processing.job.{poolType}"
          description: 'Event type identifier: asset.processing.job.{poolType}'
        jobId:
          type: string
          format: uuid
          description: Unique processing job identifier
        assetId:
          type: string
          description: Asset identifier (SHA-256 hex string)
        storageKey:
          type: string
          description: Storage key for the asset file
        contentType:
          type: string
          description: MIME content type of the asset
        sizeBytes:
          type: integer
          format: int64
          description: Asset file size in bytes
        filename:
          type: string
          nullable: true
          description: Original filename
        ownerType:
          allOf:
            - $ref: 'asset-api.yaml#/components/schemas/AssetOwnerType'
          nullable: true
          description: Type of owner (null for system-initiated processing)
        ownerId:
          type: string
          nullable: true
          description: Owner identifier - session ID or service name (null for system-initiated processing)
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Game realm the asset belongs to. Null for cross-realm assets.
        tags:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Key-value tags associated with the asset
        processingOptions:
          type: object
          nullable: true
          additionalProperties: true
          description: Content-type-specific processing options (opaque pass-through to processor)
        poolType:
          type: string
          description: Processing pool type (e.g., "audio", "texture", "model")
        processorId:
          type: string
          description: Assigned processor instance identifier
        appId:
          type: string
          description: Assigned processor app-id for routing
        leaseId:
          type: string
          format: uuid
          nullable: true
          description: Processor lease identifier for tracking
        expiresAt:
          type: string
          format: date-time
          description: When the processor lease expires

    AssetProcessingRetryEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when asset processing needs to be retried after no processors are available
      required:
        - eventName
        - eventId
        - timestamp
        - assetId
        - storageKey
        - contentType
        - poolType
        - retryCount
        - maxRetries
        - retryDelaySeconds
      properties:
        eventName:
          type: string
          default: asset.processing.retry
          description: 'Event type identifier: asset.processing.retry'
        assetId:
          type: string
          description: Asset identifier
        storageKey:
          type: string
          description: Storage key for the asset file
        contentType:
          type: string
          description: MIME content type of the asset
        poolType:
          type: string
          description: Processing pool type that was unavailable
        retryCount:
          type: integer
          description: Current retry attempt number
        maxRetries:
          type: integer
          description: Maximum number of retry attempts
        retryDelaySeconds:
          type: integer
          description: Delay in seconds before retry

    # ==========================================================================
    # Bundle Job Events
    # ==========================================================================

    BundleCreationJobQueuedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a bundle creation job is queued for the processing pool
      required:
        - eventName
        - eventId
        - timestamp
        - jobId
        - bundleId
        - version
        - assetIds
        - compression
      properties:
        eventName:
          type: string
          default: asset.bundle.create
          description: 'Event type identifier: asset.bundle.create'
        jobId:
          type: string
          format: uuid
          description: Unique job identifier
        bundleId:
          type: string
          description: Target bundle identifier
        version:
          type: string
          description: Bundle version string
        assetIds:
          type: array
          items:
            type: string
          description: Asset IDs to include in the bundle
        compression:
          $ref: 'asset-api.yaml#/components/schemas/CompressionType'
          description: Compression type to use

    MetabundleJobQueuedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Event published when a metabundle creation job is queued for async processing
      required:
        - eventName
        - eventId
        - timestamp
        - jobId
        - metabundleId
        - sourceBundleCount
        - assetCount
        - estimatedSizeBytes
      properties:
        eventName:
          type: string
          default: asset.metabundle.job.queued
          description: 'Event type identifier: asset.metabundle.job.queued'
        jobId:
          type: string
          format: uuid
          description: Unique job identifier
        metabundleId:
          type: string
          description: The metabundle ID being created
        sourceBundleCount:
          type: integer
          description: Number of source bundles to merge
        assetCount:
          type: integer
          description: Total number of assets in the metabundle
        estimatedSizeBytes:
          type: integer
          format: int64
          description: Estimated total size in bytes
        requesterSessionId:
          type: string
          format: uuid
          nullable: true
          description: Session ID of the requester for completion notification

    # ==========================================================================
    # Supporting Types
    # NOTE: Canonical types are defined in asset-api.yaml and referenced via $ref
    # per IMPLEMENTATION TENETS (mandatory type reuse)
    # ==========================================================================
