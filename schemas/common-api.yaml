openapi: 3.0.4
info:
  title: Common API Types
  description: |
    Shared type definitions used across multiple Bannou services.
    These types are not owned by any specific plugin and provide
    system-wide consistency for cross-service concepts.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0

# No paths - this schema only defines shared types
paths: {}

components:
  schemas:
    # ==========================================================================
    # Shared Enums
    # ==========================================================================

    EntityType:
      type: string
      description: |
        Universal entity type identifier for first-class Bannou entities.
        Used for polymorphic entity references (ownerType, entityType, partyType).

        NOT for game-configurable content type codes (use opaque strings) or
        service-specific roles that include non-entity values (use service-specific enums).
        See IMPLEMENTATION TENETS polymorphic type field classification for guidance.
      enum:
        - System
        - Account
        - Character
        - Actor
        - Guild
        - Organization
        - Government
        - Faction
        - Location
        - Realm
        - Item
        - Monster
        - Relationship
        - Session
        - Deity
        - Dungeon
        - Custom
        - Other

    ServiceHealthStatus:
      type: string
      enum: [Healthy, Degraded, Unavailable]
      description: Health status for individual services and components. Used by heartbeat events and orchestrator health monitoring. Subset of InstanceHealthStatus (3 of 5 values). mesh-api EndpointStatus is a separate 4-value subset with different granularity.

    InstanceHealthStatus:
      type: string
      enum: [Healthy, Degraded, Overloaded, ShuttingDown, Unavailable]
      description: Operational status for app instances. Superset of ServiceHealthStatus with instance-level states (Overloaded, ShuttingDown). mesh-api EndpointStatus is a separate subset excluding Overloaded.

    SentimentCategory:
      type: string
      description: >
        Standardized sentiment categories for anonymous audience and reaction data.
        Used by lib-chat for sentiment room messages and lib-stream for platform
        audience processing. Designed for privacy-safe communication where text
        content is inappropriate or unnecessary.
      enum:
        - Excited
        - Supportive
        - Critical
        - Curious
        - Surprised
        - Amused
        - Bored
        - Hostile

    OAuthProvider:
      type: string
      description: OAuth provider types (excludes email). Subset of AuthProvider.
      enum: [Google, Discord, Twitch, Steam]

    AuthProvider:
      type: string
      description: All authentication provider types including email. Superset of OAuthProvider.
      enum: [Email, Google, Discord, Twitch, Steam]

    # ==========================================================================
    # Permission Metadata Types
    # ==========================================================================

    ServiceEndpoint:
      type: object
      additionalProperties: false
      description: |
        Individual API endpoint with permission requirements.
        Extracted from OpenAPI schema x-permissions sections.
      required:
        - path
        - method
        - permissions
      properties:
        path:
          type: string
          description: API endpoint path (e.g., "/account/{id}")
        method:
          type: string
          enum: [Get, Post, Put, Delete, Patch]
          description: HTTP method for this endpoint
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionRequirement'
          description: Permission requirements for this endpoint
        description:
          type: string
          nullable: true  # NRT: Optional property MUST be nullable
          description: Human-readable endpoint description
        category:
          type: string
          nullable: true  # NRT: Optional property MUST be nullable
          description: API category (auth, account, game, social, etc.)

    PermissionRequirement:
      type: object
      additionalProperties: false
      description: |
        Permission requirement mapping role and state to endpoint access.
        Defines which roles can access an endpoint in which states.
      required:
        - role
        - requiredStates
      properties:
        role:
          type: string
          description: Role that can access this endpoint (e.g., "user", "admin", "npc")
        requiredStates:
          type: object
          additionalProperties:
            type: string
          description: |
            Map of service states required for access.
            Key: service_id, Value: required_state
            Example: {"game-session": "in_game", "character": "selected"}
        description:
          type: string
          nullable: true  # NRT: Optional property MUST be nullable
          description: Optional human-readable permission description

    # ==========================================================================
    # Spatial Types
    # ==========================================================================

    Position3D:
      type: object
      additionalProperties: false
      description: Position in world coordinates (meters, Y-up, right-handed)
      required:
        - x
        - y
        - z
      properties:
        x:
          type: number
          format: float
          description: X coordinate in world space (meters)
        y:
          type: number
          format: float
          description: Y coordinate (up axis) in world space (meters)
        z:
          type: number
          format: float
          description: Z coordinate in world space (meters)

    BoundingBox3D:
      type: object
      additionalProperties: false
      description: Axis-aligned bounding box as flat fields in world coordinates (meters, Y-up, right-handed). Preferred for simple spatial containment checks where individual axis access is common (e.g., location bounds).
      required:
        - minX
        - minY
        - minZ
        - maxX
        - maxY
        - maxZ
      properties:
        minX:
          type: number
          format: float
          description: Minimum X bound in world space
        minY:
          type: number
          format: float
          description: Minimum Y bound in world space
        minZ:
          type: number
          format: float
          description: Minimum Z bound in world space
        maxX:
          type: number
          format: float
          description: Maximum X bound in world space
        maxY:
          type: number
          format: float
          description: Maximum Y bound in world space
        maxZ:
          type: number
          format: float
          description: Maximum Z bound in world space

    Bounds:
      type: object
      additionalProperties: false
      description: Axis-aligned bounding box as min/max Position3D corners in world coordinates (meters, Y-up, right-handed). Preferred for spatial queries and operations where corners are treated as points (e.g., mapping spatial indexing, affordance queries).
      required:
        - min
        - max
      properties:
        min:
          $ref: '#/components/schemas/Position3D'
          description: Minimum corner (lowest x, y, z values)
        max:
          $ref: '#/components/schemas/Position3D'
          description: Maximum corner (highest x, y, z values)

    # ==========================================================================
    # Archive Base Types
    # ==========================================================================

    ResourceArchiveBase:
      type: object
      description: |
        Base schema for all resource archives that can be stored in
        the resource service's archive bundles and consumed by the
        storyline SDK's ArchiveExtractor.

        Archives implementing this base schema are marked with
        x-archive-type: true and are automatically collected by
        the archive generation script for SDK model generation.
      required:
        - resourceId
        - resourceType
        - archivedAt
        - schemaVersion
      properties:
        resourceId:
          type: string
          format: uuid
          description: Unique identifier of the archived resource
        resourceType:
          type: string
          description: Type identifier (e.g., "character", "character-personality", "realm-history")
        archivedAt:
          type: string
          format: date-time
          description: When this archive was created
        schemaVersion:
          type: integer
          minimum: 1
          description: Schema version for forward compatibility migration
        nestedArchives:
          type: array
          description: Child archives from dependent resources (populated by lib-resource compression)
          items:
            $ref: '#/components/schemas/ResourceArchiveBase'

    # ==========================================================================
    # Deprecation Fields
    # ==========================================================================

    DeprecationFields:
      type: object
      description: |
        Standard deprecation fields for template and definition entities.
        Compose into response models via allOf. Both Category A (world-building
        definitions with undeprecate/delete) and Category B (content templates,
        deprecate-only) use the same three-field model.
      required:
        - isDeprecated
      properties:
        isDeprecated:
          type: boolean
          description: Whether this entity is deprecated
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the entity was deprecated (null if not deprecated)
        deprecationReason:
          type: string
          nullable: true
          maxLength: 500
          description: Reason for deprecation (null if not deprecated)

    CleanDeprecatedRequest:
      type: object
      description: |
        Shared request for Category B deprecation cleanup sweep. Iterates all
        deprecated entities of the target type and removes those with zero remaining
        instances, subject to an optional grace period. Used by all Category B
        services via their clean-deprecated endpoint.
      additionalProperties: false
      properties:
        gracePeriodDays:
          type: integer
          default: 0
          minimum: 0
          description: >
            Minimum days since deprecation before cleanup is eligible.
            0 = immediate cleanup of any deprecated entity with zero instances.
        dryRun:
          type: boolean
          default: false
          description: >
            If true, report what would be cleaned without actually deleting.
            Useful for admin panel preview before committing to cleanup.

    CleanDeprecatedResponse:
      type: object
      description: |
        Result summary from a Category B deprecation cleanup sweep.
        Returned by all Category B clean-deprecated endpoints.
      additionalProperties: false
      required:
        - cleaned
        - remaining
        - errors
      properties:
        cleaned:
          type: integer
          description: Number of deprecated entities removed (or eligible, if dryRun)
        remaining:
          type: integer
          description: Number of deprecated entities still having active instances or within grace period
        errors:
          type: integer
          description: Number of entities that failed during cleanup processing
        cleanedIds:
          type: array
          description: IDs of successfully cleaned (or eligible) entities
          items:
            type: string
            format: uuid

    CleanDeprecatedStringKeyResponse:
      type: object
      description: |
        Result summary from a Category B deprecation cleanup sweep for
        entities with developer-assigned string identifiers (e.g., achievement
        and leaderboard definitions). Identical to CleanDeprecatedResponse
        except cleanedIds are plain strings rather than UUIDs.
      additionalProperties: false
      required:
        - cleaned
        - remaining
        - errors
      properties:
        cleaned:
          type: integer
          description: Number of deprecated entities removed (or eligible, if dryRun)
        remaining:
          type: integer
          description: Number of deprecated entities still having active instances or within grace period
        errors:
          type: integer
          description: Number of entities that failed during cleanup processing
        cleanedIds:
          type: array
          description: IDs of successfully cleaned (or eligible) entities
          items:
            type: string

    MergeDeprecatedRequest:
      type: object
      description: |
        Shared request for Category A deprecation merge. Migrates all referencing
        entities from a deprecated source definition to a non-deprecated target definition.
        Used by all Category A services via their merge endpoint.

        **SCHEMA MODIFICATION GATE**: Before modifying, read docs/reference/SCHEMA-RULES.md.
      additionalProperties: false
      required:
        - sourceEntityId
        - targetEntityId
      properties:
        sourceEntityId:
          type: string
          format: uuid
          description: ID of the deprecated entity to merge from (must be deprecated)
        targetEntityId:
          type: string
          format: uuid
          description: ID of the entity to merge into (must not be deprecated)
        deleteAfterMerge:
          type: boolean
          default: false
          description: >
            If true, hard-delete the source entity after successful merge.
            Skipped automatically on partial failure (any failedEntityIds).

    MergeDeprecatedResponse:
      type: object
      description: |
        Result summary from a Category A deprecation merge operation.
        Returned by all Category A merge endpoints. Services with multi-entity-type
        migration may compose this via allOf to add per-type breakdowns.
      additionalProperties: false
      required:
        - totalMigrated
        - totalFailed
        - sourceDeleted
      properties:
        totalMigrated:
          type: integer
          description: Total number of referencing entities successfully migrated to the target
        totalFailed:
          type: integer
          description: Total number of referencing entities that failed to migrate
        sourceDeleted:
          type: boolean
          description: Whether the source entity was hard-deleted after merge (skipped on partial failure)
        failedEntityIds:
          type: array
          description: IDs of entities that failed migration (limited to first 100), null when no failures
          items:
            type: string
            format: uuid
          nullable: true

    CapabilityUpdateType:
      type: string
      enum:
      - Full
      - Delta
      description: Type of capability update — full capabilities or delta changes

    CapabilityUpdateReason:
      type: string
      enum:
      - SessionCreated
      - SessionStateChanged
      - RoleChanged
      - ServiceRegistered
      - ManualRefresh
      description: Reason for the capability update
