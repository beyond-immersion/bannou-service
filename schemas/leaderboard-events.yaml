openapi: 3.0.4
info:
  title: Leaderboard Service Events
  description: |
    Event subscription and publication declarations for Leaderboard service.

    **Data Flow**: Leaderboard subscribes to analytics events and publishes rank changes:
    - Subscribes to analytics.score.updated for automatic score updates
    - Publishes leaderboard.rank.changed for clients/achievements to consume

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-event-subscriptions:
    # Analytics events for automatic score updates
    - topic: analytics.score.updated
      event: AnalyticsScoreUpdatedEvent
      handler: HandleScoreUpdated
    - topic: analytics.rating.updated
      event: AnalyticsRatingUpdatedEvent
      handler: HandleRatingUpdated
  x-event-publications:
    # Lifecycle events (auto-generated from x-lifecycle)
    - topic: leaderboard.definition.created
      event: LeaderboardDefinitionCreatedEvent
      description: Published when a new leaderboard definition is created
    - topic: leaderboard.definition.updated
      event: LeaderboardDefinitionUpdatedEvent
      description: Published when a leaderboard definition is updated (including deprecation via changedFields)
    - topic: leaderboard.definition.deleted
      event: LeaderboardDefinitionDeletedEvent
      description: Unused Category B infrastructure (leaderboard definitions are never deleted)

    # Entry lifecycle events (auto-generated from x-lifecycle)
    - topic: leaderboard.entry.created
      event: LeaderboardEntryCreatedEvent
      description: Published when a new entry is added to a leaderboard
    - topic: leaderboard.entry.updated
      event: LeaderboardEntryUpdatedEvent
      description: Published when a leaderboard entry is updated (score change)
    - topic: leaderboard.entry.deleted
      event: LeaderboardEntryDeletedEvent
      description: "Unused Category B infrastructure — entry deletion enables clean-deprecated sweep instance count tracking"

    # Published when an entity's rank changes
    - topic: leaderboard.rank.changed
      event: LeaderboardRankChangedEvent
      description: Published when an entity's rank changes on a leaderboard
    # Published when an entity enters a leaderboard for the first time
    - topic: leaderboard.entry.added
      event: LeaderboardEntryAddedEvent
      description: Published when a new entity joins a leaderboard
    # Published when a new season starts
    - topic: leaderboard.season.started
      event: LeaderboardSeasonStartedEvent
      description: Published when a new leaderboard season begins

x-lifecycle:
  topic_prefix: leaderboard
  LeaderboardDefinition:
    deprecation: true
    instanceEntity: LeaderboardEntry
    model:
      gameServiceId: { type: string, format: uuid, required: true, description: "ID of the owning game service" }
      leaderboardId: { type: string, primary: true, required: true, description: "Unique identifier for this leaderboard" }
      displayName: { type: string, required: true, description: "Human-readable name" }
      sortOrder: { $ref: 'leaderboard-api.yaml#/components/schemas/SortOrder', required: true, description: "Score sort order" }
      updateMode: { $ref: 'leaderboard-api.yaml#/components/schemas/UpdateMode', required: true, description: "Score update mode" }
      isSeasonal: { type: boolean, required: true, description: "Whether the leaderboard is seasonal" }
      isPublic: { type: boolean, required: true, description: "Whether the leaderboard is publicly visible" }
    sensitive: []

  LeaderboardEntry:
    model:
      entryId: { type: string, format: uuid, primary: true, required: true, description: "Unique identifier for this leaderboard entry" }
      gameServiceId: { type: string, format: uuid, required: true, description: "ID of the owning game service" }
      leaderboardId: { type: string, required: true, description: "Leaderboard this entry belongs to" }
      entityId: { type: string, format: uuid, required: true, description: "ID of the ranked entity" }
      entityType: { $ref: 'common-api.yaml#/components/schemas/EntityType', required: true, description: "Type of the ranked entity" }
      score: { type: number, format: double, required: true, description: "Current score value" }
      seasonNumber: { type: integer, nullable: true, description: "Season number if this entry is in a seasonal leaderboard" }
    sensitive: []

paths: {}  # Events don't have HTTP paths

components:
  schemas:
    # ============================================
    # Published Events
    # ============================================
    LeaderboardRankChangedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when an entity's rank changes on a leaderboard
      required:
        - eventName
        - eventId
        - timestamp
        - gameServiceId
        - leaderboardId
        - entityId
        - entityType
        - previousRank
        - newRank
        - currentScore
        - rankChange
        - previousScore
      properties:
        eventName:
          type: string
          default: leaderboard.rank.changed
          description: 'Event type identifier: leaderboard.rank.changed'
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        leaderboardId:
          type: string
          description: ID of the leaderboard
        entityId:
          type: string
          format: uuid
          description: ID of the entity whose rank changed
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity
        previousRank:
          type: integer
          format: int64
          description: Previous rank (1-based)
        newRank:
          type: integer
          format: int64
          description: New rank (1-based)
        rankChange:
          type: integer
          format: int64
          description: Change in rank (positive = improved)
        previousScore:
          type: number
          format: double
          description: Previous score
        currentScore:
          type: number
          format: double
          description: Current score

    LeaderboardEntryAddedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when a new entity joins a leaderboard
      required:
        - eventName
        - eventId
        - timestamp
        - gameServiceId
        - leaderboardId
        - entityId
        - entityType
        - score
        - rank
      properties:
        eventName:
          type: string
          default: leaderboard.entry.added
          description: 'Event type identifier: leaderboard.entry.added'
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        leaderboardId:
          type: string
          description: ID of the leaderboard
        entityId:
          type: string
          format: uuid
          description: ID of the new entity
        entityType:
          $ref: 'common-api.yaml#/components/schemas/EntityType'
          description: Type of entity
        score:
          type: number
          format: double
          description: Initial score
        rank:
          type: integer
          format: int64
          description: Initial rank (1-based)
        totalEntries:
          type: integer
          format: int64
          description: Total entries after addition

    LeaderboardSeasonStartedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when a new leaderboard season begins
      required:
        - eventName
        - eventId
        - timestamp
        - gameServiceId
        - leaderboardId
        - seasonNumber
      properties:
        eventName:
          type: string
          default: leaderboard.season.started
          description: 'Event type identifier: leaderboard.season.started'
        gameServiceId:
          type: string
          format: uuid
          description: ID of the game service
        leaderboardId:
          type: string
          description: ID of the leaderboard
        seasonNumber:
          type: integer
          description: New season number
        seasonName:
          type: string
          nullable: true
          description: Name of the new season
        previousSeasonNumber:
          type: integer
          nullable: true
          description: Previous season number (null if first)
