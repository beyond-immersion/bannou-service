openapi: 3.0.4
info:
  title: Character History Service Configuration
  description: |
    Configuration schema for Character History service.
    Properties are bound to environment variables with CHARACTER_HISTORY_ prefix.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
paths: {}
x-service-configuration:
  properties:
    # Cache Configuration
    BackstoryCacheTtlMinutes:
      type: integer
      minimum: 1
      description: TTL in minutes for backstory cache entries. Backstory data is nearly immutable, so longer TTLs are appropriate.
      default: 10
      env: CHARACTER_HISTORY_BACKSTORY_CACHE_TTL_MINUTES
    # Element Limits
    MaxBackstoryElements:
      type: integer
      minimum: 1
      description: Maximum number of backstory elements allowed per character. Prevents unbounded growth from repeated AddBackstoryElement or SetBackstory calls. Returns BadRequest when limit would be exceeded.
      default: 100
      env: CHARACTER_HISTORY_MAX_BACKSTORY_ELEMENTS
    # Compression Limits
    MaxCompressBackstoryPoints:
      type: integer
      minimum: 1
      description: Maximum number of backstory points to include in compression archive summaries. Controls narrative fidelity vs archive size during character archival.
      default: 10
      env: CHARACTER_HISTORY_MAX_COMPRESS_BACKSTORY_POINTS
    MaxCompressLifeEvents:
      type: integer
      minimum: 1
      description: Maximum number of life events to include in compression archive summaries. Controls narrative fidelity vs archive size during character archival.
      default: 10
      env: CHARACTER_HISTORY_MAX_COMPRESS_LIFE_EVENTS
    # Batch Event Configuration
    ParticipationEventBatchIntervalSeconds:
      type: integer
      minimum: 1
      description: Interval in seconds between participation batch event flushes. Controls how frequently accumulated participation recordings and deletions are published as batch events.
      default: 5
      env: CHARACTER_HISTORY_PARTICIPATION_EVENT_BATCH_INTERVAL_SECONDS
    ParticipationEventBatchStartupDelaySeconds:
      type: integer
      minimum: 0
      description: Delay in seconds before the participation event batcher starts its first flush cycle after startup.
      default: 10
      env: CHARACTER_HISTORY_PARTICIPATION_EVENT_BATCH_STARTUP_DELAY_SECONDS
    # Concurrency Control
    IndexLockTimeoutSeconds:
      type: integer
      minimum: 1
      description: Timeout in seconds for distributed locks during index and backstory write operations. Matches established patterns in Currency, Inventory, and Contract services.
      default: 15
      env: CHARACTER_HISTORY_INDEX_LOCK_TIMEOUT_SECONDS
