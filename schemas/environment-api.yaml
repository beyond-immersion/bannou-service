openapi: 3.0.4
info:
  title: Bannou Environment Service API
  description: |
    Weather simulation, temperature modeling, atmospheric conditions, and ecological resource
    availability for game worlds. Consumes temporal data from Worldstate (L2) and translates
    it into environmental conditions that affect NPC behavior, production, trade, and player
    experience. Internal-only, never internet-facing.

    **POST-Only API Pattern**: This API uses POST for all operations to support zero-copy
    WebSocket routing. Path parameters are passed in request bodies instead of URLs.
    See docs/BANNOU_DESIGN.md for architectural rationale.

    **SCHEMA MODIFICATION GATE**: STOP. Before modifying this schema, you MUST:
    1. Read docs/reference/SCHEMA-RULES.md
    2. State which section applies to your change
    3. Only then proceed with edits
    Edits without stating the applicable rule are FORBIDDEN.
  version: 1.0.0
  x-references:
    - target: realm
      sourceType: environment
      field: realmId
      onDelete: cascade
      cleanup:
        endpoint: /environment/cleanup-by-realm
        payloadTemplate: '{"realmId": "{{resourceId}}"}'
    - target: game-service
      sourceType: environment
      field: gameServiceId
      onDelete: cascade
      cleanup:
        endpoint: /environment/cleanup-by-game-service
        payloadTemplate: '{"gameServiceId": "{{resourceId}}"}'
    - target: location
      sourceType: environment
      field: locationId
      onDelete: cascade
      cleanup:
        endpoint: /environment/cleanup-by-location
        payloadTemplate: '{"locationId": "{{resourceId}}"}'
x-service-layer: GameFeatures
servers:
- url: http://localhost:5012
  description: Bannou service endpoint (internal only)

paths:
  # ===========================================================================
  # Conditions (4 endpoints) — user-facing condition queries
  # ===========================================================================

  /environment/conditions/get:
    post:
      operationId: getConditions
      tags:
      - Conditions
      summary: Get environmental conditions at a location
      description: Returns the full condition snapshot for a location, computing on cache miss.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetConditionsRequest'
      responses:
        '200':
          description: Condition snapshot retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConditionSnapshotResponse'
        '404':
          description: No resolvable climate template for this location

  /environment/conditions/get-by-code:
    post:
      operationId: getConditionsByCode
      tags:
      - Conditions
      summary: Get conditions by realm and location codes
      description: Resolves location by code pair, then returns the condition snapshot.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetConditionsByCodeRequest'
      responses:
        '200':
          description: Condition snapshot retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConditionSnapshotResponse'
        '404':
          description: Location not found or no resolvable climate template

  /environment/conditions/batch-get:
    post:
      operationId: batchGetConditions
      tags:
      - Conditions
      summary: Get conditions for multiple locations
      description: Returns condition snapshots for a batch of locations, grouped by realm for efficiency.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchGetConditionsRequest'
      responses:
        '200':
          description: Batch condition snapshots retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchConditionSnapshotResponse'

  /environment/conditions/get-temperature:
    post:
      operationId: getTemperature
      tags:
      - Conditions
      summary: Get temperature at a location
      description: Returns temperature data only, lighter than full condition snapshot.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetTemperatureRequest'
      responses:
        '200':
          description: Temperature data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemperatureResponse'
        '404':
          description: No resolvable climate template for this location

  # ===========================================================================
  # Climate Templates (8 endpoints) — developer content authoring
  # ===========================================================================

  /environment/climate/seed:
    post:
      operationId: seedClimate
      tags:
      - ClimateTemplate
      summary: Create a climate template for a biome
      description: Seeds a new climate template defining weather, temperature, and ecology for a biome type within a game service.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeedClimateRequest'
      responses:
        '200':
          description: Climate template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClimateTemplateResponse'
        '400':
          description: Validation failed or at capacity
        '404':
          description: Game service not found
        '409':
          description: Template already exists for this biome or lock contention

  /environment/climate/get:
    post:
      operationId: getClimate
      tags:
      - ClimateTemplate
      summary: Get a climate template
      description: Retrieves a climate template by ID or by game service and biome code.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetClimateRequest'
      responses:
        '200':
          description: Climate template retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClimateTemplateResponse'
        '404':
          description: Climate template not found

  /environment/climate/list:
    post:
      operationId: listClimates
      tags:
      - ClimateTemplate
      summary: List climate templates for a game service
      description: Returns a paged list of climate templates, optionally including deprecated.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListClimatesRequest'
      responses:
        '200':
          description: Climate templates listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedClimateTemplateResponse'

  /environment/climate/update:
    post:
      operationId: updateClimate
      tags:
      - ClimateTemplate
      summary: Update a climate template
      description: Partially updates a climate template. Invalidates affected condition caches.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClimateRequest'
      responses:
        '200':
          description: Climate template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClimateTemplateResponse'
        '400':
          description: Validation failed
        '404':
          description: Climate template not found
        '409':
          description: ETag conflict or lock contention

  /environment/climate/deprecate:
    post:
      operationId: deprecateClimate
      tags:
      - ClimateTemplate
      summary: Deprecate a climate template
      description: Marks a climate template as deprecated. Idempotent — returns OK if already deprecated.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateClimateRequest'
      responses:
        '200':
          description: Climate template deprecated (or already deprecated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClimateTemplateResponse'
        '404':
          description: Climate template not found

  /environment/climate/undeprecate:
    post:
      operationId: undeprecateClimate
      tags:
      - ClimateTemplate
      summary: Undeprecate a climate template
      description: Removes deprecation from a climate template. Idempotent — returns OK if not deprecated.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndeprecateClimateRequest'
      responses:
        '200':
          description: Climate template undeprecated (or already not deprecated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClimateTemplateResponse'
        '404':
          description: Climate template not found

  /environment/climate/delete:
    post:
      operationId: deleteClimate
      tags:
      - ClimateTemplate
      summary: Delete a climate template
      description: Deletes a deprecated climate template and cascades to all referencing bindings.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteClimateRequest'
      responses:
        '200':
          description: Climate template deleted
        '400':
          description: Template is not deprecated (must deprecate first)
        '404':
          description: Climate template not found

  /environment/climate/bulk-seed:
    post:
      operationId: bulkSeedClimates
      tags:
      - ClimateTemplate
      summary: Bulk seed climate templates
      description: Creates or updates multiple climate templates for a game service in a single operation.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSeedClimatesRequest'
      responses:
        '200':
          description: Bulk seed completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkSeedClimatesResponse'
        '400':
          description: Game service not found

  # ===========================================================================
  # Weather Events (6 endpoints) — divine/admin weather manipulation
  # ===========================================================================

  /environment/weather-event/create:
    post:
      operationId: createWeatherEvent
      tags:
      - WeatherEvent
      summary: Create a weather event
      description: Registers a bounded weather override affecting a realm, location, or location subtree.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWeatherEventRequest'
      responses:
        '200':
          description: Weather event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWeatherEventResponse'
        '400':
          description: At capacity or validation failed
        '404':
          description: Scope target not found
        '409':
          description: Lock contention

  /environment/weather-event/get:
    post:
      operationId: getWeatherEvent
      tags:
      - WeatherEvent
      summary: Get a weather event
      description: Retrieves a weather event by ID.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetWeatherEventRequest'
      responses:
        '200':
          description: Weather event retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherEventResponse'
        '404':
          description: Weather event not found

  /environment/weather-event/list:
    post:
      operationId: listWeatherEvents
      tags:
      - WeatherEvent
      summary: List weather events for a scope
      description: Returns a paged list of weather events for a given scope, with optional filters.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListWeatherEventsRequest'
      responses:
        '200':
          description: Weather events listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedWeatherEventResponse'

  /environment/weather-event/cancel:
    post:
      operationId: cancelWeatherEvent
      tags:
      - WeatherEvent
      summary: Cancel an active weather event
      description: Deactivates a weather event and invalidates affected condition caches.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelWeatherEventRequest'
      responses:
        '200':
          description: Weather event cancelled
        '400':
          description: Weather event is already inactive
        '404':
          description: Weather event not found
        '409':
          description: Lock contention

  /environment/weather-event/extend:
    post:
      operationId: extendWeatherEvent
      tags:
      - WeatherEvent
      summary: Extend a weather event duration
      description: Extends the end time of an active weather event. Cannot shorten.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtendWeatherEventRequest'
      responses:
        '200':
          description: Weather event extended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherEventResponse'
        '400':
          description: Event is inactive or new end time is not later than current
        '404':
          description: Weather event not found

  /environment/weather-event/cancel-by-source:
    post:
      operationId: cancelWeatherEventsBySource
      tags:
      - WeatherEvent
      summary: Cancel all weather events from a source
      description: Cancels all active weather events created by a specific source (e.g., divine actor cleanup).
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelWeatherEventsBySourceRequest'
      responses:
        '200':
          description: Events cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelWeatherEventsBySourceResponse'

  # ===========================================================================
  # Weather Summary (2 endpoints) — developer operational views
  # ===========================================================================

  /environment/weather/realm-summary:
    post:
      operationId: getRealmWeatherSummary
      tags:
      - WeatherSummary
      summary: Get weather summary for a realm
      description: Aggregates weather conditions across all locations in a realm.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetRealmWeatherSummaryRequest'
      responses:
        '200':
          description: Realm weather summary retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealmWeatherSummaryResponse'
        '404':
          description: Realm not found

  /environment/weather/by-region:
    post:
      operationId: getWeatherByRegion
      tags:
      - WeatherSummary
      summary: Get weather grouped by region
      description: Returns weather conditions for a location and its descendants, grouped by weather code.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetWeatherByRegionRequest'
      responses:
        '200':
          description: Regional weather retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherByRegionResponse'
        '404':
          description: Location not found

  # ===========================================================================
  # Resources (2 endpoints) — user-facing resource availability
  # ===========================================================================

  /environment/resource/get-availability:
    post:
      operationId: getResourceAvailability
      tags:
      - Resources
      summary: Get resource availability at a location
      description: Returns the composite resource abundance level with breakdown of contributing factors.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetResourceAvailabilityRequest'
      responses:
        '200':
          description: Resource availability retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceAvailabilityResponse'
        '404':
          description: No resolvable climate template for this location

  /environment/resource/realm-summary:
    post:
      operationId: getRealmResourceSummary
      tags:
      - Resources
      summary: Get resource summary for a realm
      description: Aggregates resource availability across all locations in a realm, grouped by biome.
      x-permissions:
      - role: user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetRealmResourceSummaryRequest'
      responses:
        '200':
          description: Realm resource summary retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealmResourceSummaryResponse'
        '404':
          description: Realm not found

  # ===========================================================================
  # Climate Bindings (5 endpoints) — developer location-to-biome mapping
  # ===========================================================================

  /environment/climate-binding/create:
    post:
      operationId: createClimateBinding
      tags:
      - ClimateBinding
      summary: Bind a location to a climate template
      description: Creates a location-climate binding. Validates location exists and biome has an active template.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClimateBindingRequest'
      responses:
        '200':
          description: Climate binding created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClimateBindingResponse'
        '400':
          description: Referenced climate template is deprecated
        '404':
          description: Location or climate template not found
        '409':
          description: Binding already exists for this location

  /environment/climate-binding/get:
    post:
      operationId: getClimateBinding
      tags:
      - ClimateBinding
      summary: Get a climate binding for a location
      description: Returns the explicit climate binding for a location.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetClimateBindingRequest'
      responses:
        '200':
          description: Climate binding retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClimateBindingResponse'
        '404':
          description: No explicit binding for this location

  /environment/climate-binding/update:
    post:
      operationId: updateClimateBinding
      tags:
      - ClimateBinding
      summary: Update a climate binding
      description: Updates binding properties. Invalidates affected condition caches.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClimateBindingRequest'
      responses:
        '200':
          description: Climate binding updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClimateBindingResponse'
        '400':
          description: Referenced climate template is deprecated
        '404':
          description: Binding or new climate template not found

  /environment/climate-binding/delete:
    post:
      operationId: deleteClimateBinding
      tags:
      - ClimateBinding
      summary: Delete a climate binding
      description: Removes the explicit binding. Inheriting children fall back to next ancestor or realm default.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteClimateBindingRequest'
      responses:
        '200':
          description: Climate binding deleted
        '404':
          description: No binding for this location

  /environment/climate-binding/bulk-seed:
    post:
      operationId: bulkSeedBindings
      tags:
      - ClimateBinding
      summary: Bulk seed climate bindings
      description: Creates or updates multiple location-climate bindings in a single operation.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSeedBindingsRequest'
      responses:
        '200':
          description: Bulk seed completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkSeedBindingsResponse'

  # ===========================================================================
  # Realm Config (2 endpoints) — developer per-realm defaults
  # ===========================================================================

  /environment/realm-config/set:
    post:
      operationId: setRealmConfig
      tags:
      - RealmConfig
      summary: Set per-realm environment configuration
      description: Sets the default biome code for a realm. Idempotent — creates or updates.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRealmConfigRequest'
      responses:
        '200':
          description: Realm config set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealmEnvironmentConfigResponse'
        '400':
          description: Biome code not found or deprecated
        '404':
          description: Realm not found

  /environment/realm-config/get:
    post:
      operationId: getRealmConfig
      tags:
      - RealmConfig
      summary: Get per-realm environment configuration
      description: Returns the explicitly set realm environment config. Does not return global fallback.
      x-permissions:
      - role: developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetRealmConfigRequest'
      responses:
        '200':
          description: Realm config retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealmEnvironmentConfigResponse'
        '404':
          description: No explicit config set for this realm

  # ===========================================================================
  # Cleanup (3 endpoints) — service-to-service resource cleanup
  # ===========================================================================

  /environment/cleanup-by-realm:
    post:
      operationId: cleanupByRealm
      tags:
      - Cleanup
      summary: Cleanup all environment data for a deleted realm
      description: Called by lib-resource CASCADE callback. Removes events, conditions, bindings, and realm config.
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupByRealmRequest'
      responses:
        '200':
          description: Cleanup completed

  /environment/cleanup-by-game-service:
    post:
      operationId: cleanupByGameService
      tags:
      - Cleanup
      summary: Cleanup all environment data for a deleted game service
      description: Called by lib-resource CASCADE callback. Removes climate templates and derived bindings.
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupByGameServiceRequest'
      responses:
        '200':
          description: Cleanup completed

  /environment/cleanup-by-location:
    post:
      operationId: cleanupByLocation
      tags:
      - Cleanup
      summary: Cleanup all environment data for a deleted location
      description: Called by lib-resource CASCADE callback. Removes binding, weather events, and cached conditions.
      x-permissions: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupByLocationRequest'
      responses:
        '200':
          description: Cleanup completed

components:
  schemas:
    # =========================================================================
    # Enums
    # =========================================================================

    TemperatureCurveShape:
      type: string
      description: Shape of the intra-day temperature curve for hourly interpolation
      enum: [Sinusoidal, Plateau, Spike]

    PrecipitationType:
      type: string
      description: Form of precipitation. Temperature crossover rules apply (Rain below 0C becomes Snow, Snow above 5C becomes Rain, between 0-5C becomes Sleet)
      enum: [None, Rain, Snow, Sleet, Hail]

    WeatherEventScopeType:
      type: string
      description: Scope level of a weather event override, determining geographic reach and precedence
      enum: [Realm, Location, LocationSubtree]

    WeatherEventSourceType:
      type: string
      description: Origin type of a weather event, tracking who or what created it
      enum: [Divine, Scheduled, GameEvent, Admin]

    ConditionRefreshMode:
      type: string
      description: Strategy for the background worker's per-realm condition refresh cycle
      enum: [AllLocations, ActiveOnly]

    WeatherEventEndReason:
      type: string
      description: Reason a weather event ended
      enum: [Cancelled, SourceRemoved, Expired]

    # =========================================================================
    # Climate Template Sub-Types
    # =========================================================================

    TemperatureCurve:
      type: object
      additionalProperties: false
      description: Seasonal temperature curve definition controlling base min/max temperature and intra-day variation
      required:
      - seasonCode
      - baseMinTemp
      - baseMaxTemp
      properties:
        seasonCode:
          type: string
          minLength: 1
          maxLength: 64
          description: References a Worldstate calendar season code (game-configurable)
        baseMinTemp:
          type: number
          format: double
          description: Minimum daily temperature in abstract units (typically Celsius-like)
        baseMaxTemp:
          type: number
          format: double
          description: Maximum daily temperature in abstract units
        hourlyShape:
          $ref: '#/components/schemas/TemperatureCurveShape'
          nullable: true
          description: Curve shape for intra-day variation (null defaults to Sinusoidal)
        peakHour:
          type: integer
          default: 14
          minimum: 0
          maximum: 23
          description: Game-hour of maximum temperature
        troughHour:
          type: integer
          default: 4
          minimum: 0
          maximum: 23
          description: Game-hour of minimum temperature

    WeatherPattern:
      type: object
      additionalProperties: false
      description: Individual weather pattern definition within a seasonal distribution
      required:
      - weatherCode
      - weight
      - durationGameHours
      - temperatureModifier
      - visibilityMultiplier
      - precipitationIntensity
      - precipitationType
      - cloudCover
      - resourceImpactModifier
      properties:
        weatherCode:
          type: string
          minLength: 1
          maxLength: 64
          description: Weather pattern code (e.g., clear, cloudy, storm, fog)
        weight:
          type: number
          format: double
          minimum: 0
          description: Relative probability weight for this season
        durationGameHours:
          type: integer
          minimum: 1
          description: Typical duration in game-hours before re-rolling
        temperatureModifier:
          type: number
          format: double
          description: Additive temperature modifier while this weather is active
        visibilityMultiplier:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Visibility multiplier (1.0 = normal, 0.1 = blizzard)
        precipitationIntensity:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Precipitation intensity (0.0 = none, 1.0 = maximum)
        precipitationType:
          $ref: '#/components/schemas/PrecipitationType'
          description: Form of precipitation for this weather pattern
        cloudCover:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Cloud coverage (0.0 = clear sky, 1.0 = fully overcast)
        resourceImpactModifier:
          type: number
          format: double
          description: Additive impact on resource availability (rain=+0.05, storm=-0.15, drought=-0.3)

    WeatherDistributionSeason:
      type: object
      additionalProperties: false
      description: Seasonal weather distribution containing weighted patterns for a season
      required:
      - seasonCode
      - patterns
      properties:
        seasonCode:
          type: string
          minLength: 1
          maxLength: 64
          description: References a Worldstate calendar season code
        patterns:
          type: array
          items:
            $ref: '#/components/schemas/WeatherPattern'
          description: Weighted weather patterns for this season

    AtmosphericBaselineSeason:
      type: object
      additionalProperties: false
      description: Seasonal atmospheric baseline values for humidity, wind, and wind direction
      required:
      - seasonCode
      - baseHumidity
      - baseWindSpeed
      - windDirectionBias
      - windVariance
      properties:
        seasonCode:
          type: string
          minLength: 1
          maxLength: 64
          description: References a Worldstate calendar season code
        baseHumidity:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Baseline humidity (0.0-1.0)
        baseWindSpeed:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Normalized baseline wind speed (0.0-1.0)
        windDirectionBias:
          type: number
          format: double
          minimum: 0
          maximum: 360
          description: Prevailing wind direction in degrees
        windVariance:
          type: number
          format: double
          minimum: 0
          maximum: 360
          description: Degrees of random deviation from prevailing wind direction

    ResourceAvailabilitySeason:
      type: object
      additionalProperties: false
      description: Seasonal resource availability values for ecological abundance
      required:
      - seasonCode
      - abundanceLevel
      - forageModifier
      - huntModifier
      properties:
        seasonCode:
          type: string
          minLength: 1
          maxLength: 64
          description: References a Worldstate calendar season code
        abundanceLevel:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Base ecological abundance (0.0 = barren, 1.0 = abundant)
        forageModifier:
          type: number
          format: double
          minimum: 0
          description: Multiplier for forageable resource generation
        huntModifier:
          type: number
          format: double
          minimum: 0
          description: Multiplier for wildlife activity

    # =========================================================================
