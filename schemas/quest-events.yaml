openapi: 3.0.4
info:
  title: Quest Service Events
  description: |
    Event subscription and publication declarations for Quest service.

    **Data Flow**:
    - Subscribes to: contract.milestone.completed, contract.fulfilled, contract.terminated
    - Publishes: quest.definition.created, quest.definition.updated, quest.accepted, quest.objective.progressed, quest.completed, quest.failed, quest.abandoned
    - Lifecycle events: auto-generated from x-lifecycle definition (quest.definition.created/updated/deleted)
  version: 1.0.0

  x-event-subscriptions:
    - topic: contract.milestone.completed
      event: ContractMilestoneCompletedEvent
      handler: HandleContractMilestoneCompleted
      description: Update quest state when Contract milestone completes
    - topic: contract.fulfilled
      event: ContractFulfilledEvent
      handler: HandleContractFulfilled
      description: Handle quest completion when contract is fulfilled
    - topic: contract.terminated
      event: ContractTerminatedEvent
      handler: HandleContractTerminated
      description: Handle quest failure/abandonment when contract terminates

  x-event-publications:
    # Definition lifecycle events (auto-generated from x-lifecycle)
    - topic: quest.definition.created
      event: QuestDefinitionCreatedEvent
      description: Published when a new quest definition is created
    - topic: quest.definition.updated
      event: QuestDefinitionUpdatedEvent
      description: Published when a quest definition is updated (including deprecation via changedFields)
    - topic: quest.definition.deleted
      event: QuestDefinitionDeletedEvent
      description: Unused Category B infrastructure — exists for future safe deletion pattern. Never published today.

    # Quest instance events
    - topic: quest.accepted
      event: QuestAcceptedEvent
      description: Published when a character accepts a quest
    - topic: quest.objective.progressed
      event: QuestObjectiveProgressedEvent
      description: Published when objective progress changes
    - topic: quest.completed
      event: QuestCompletedEvent
      description: Published when quest is completed successfully
    - topic: quest.failed
      event: QuestFailedEvent
      description: Published when quest fails (deadline, breach)
    - topic: quest.abandoned
      event: QuestAbandonedEvent
      description: Published when quest is voluntarily abandoned

# Lifecycle events auto-generated from this definition.
# QuestDefinition is Category B: deprecation published via "updated" with changedFields (per IMPLEMENTATION TENETS).
# The auto-generated *.deleted variant exists in Generated/ but is never published (Category B infrastructure).
x-lifecycle:
  topic_prefix: quest
  QuestDefinition:
    model:
      definitionId: { type: string, format: uuid, primary: true, required: true, description: "Unique identifier for the quest definition" }
      contractTemplateId: { type: string, format: uuid, required: true, description: "Underlying contract template ID" }
      code: { type: string, required: true, description: "Unique quest code within game" }
      name: { type: string, required: true, description: "Human-readable quest name" }
      description: { type: string, nullable: true, description: "Quest description" }
      category: { $ref: 'quest-api.yaml#/components/schemas/QuestCategory', required: true, description: "Quest category for organization" }
      difficulty: { $ref: 'quest-api.yaml#/components/schemas/QuestDifficulty', required: true, description: "Difficulty rating of the quest" }
      levelRequirement: { type: integer, nullable: true, description: "Minimum level required" }
      repeatable: { type: boolean, required: true, description: "Whether repeatable" }
      cooldownSeconds: { type: integer, nullable: true, description: "Cooldown for repeatable quests" }
      deadlineSeconds: { type: integer, nullable: true, description: "Time limit" }
      maxQuestors: { type: integer, required: true, description: "Max party size" }
      isDeprecated: { type: boolean, required: true, description: "Whether definition is deprecated" }
      deprecatedAt: { type: string, format: date-time, nullable: true, description: "When the definition was deprecated" }
      deprecationReason: { type: string, nullable: true, description: "Reason for deprecation" }
      createdAt: { type: string, format: date-time, required: true, description: "Creation timestamp" }
      gameServiceId: { type: string, format: uuid, required: true, description: "Game service this definition belongs to" }
    sensitive: []

paths: {}

components:
  schemas:
    # === PUBLISHED EVENTS ===
    QuestAcceptedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when a character accepts a quest
      required:
        - eventName
        - eventId
        - timestamp
        - questInstanceId
        - definitionId
        - questCode
        - questorCharacterIds
        - gameServiceId
      properties:
        eventName:
          type: string
          default: quest.accepted
          description: 'Event type identifier: quest.accepted'
        questInstanceId:
          type: string
          format: uuid
          description: Quest instance ID
        definitionId:
          type: string
          format: uuid
          description: Quest definition ID
        questCode:
          type: string
          description: Quest code
        questorCharacterIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
          description: Characters who accepted
        gameServiceId:
          type: string
          format: uuid
          description: Game service ID

    QuestObjectiveProgressedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when objective progress changes
      x-event-template:
        name: quest_objective_progressed
        topic: quest.objective.progressed
      required:
        - eventName
        - eventId
        - timestamp
        - questInstanceId
        - questCode
        - objectiveCode
        - currentCount
        - requiredCount
        - isComplete
      properties:
        eventName:
          type: string
          default: quest.objective.progressed
          description: 'Event type identifier: quest.objective.progressed'
        questInstanceId:
          type: string
          format: uuid
          description: Quest instance ID
        questCode:
          type: string
          description: Quest code
        objectiveCode:
          type: string
          description: Objective code
        currentCount:
          type: integer
          minimum: 0
          description: Current progress
        requiredCount:
          type: integer
          minimum: 1
          description: Required for completion
        isComplete:
          type: boolean
          description: Whether objective is now complete

    QuestCompletedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when quest is completed successfully
      required:
        - eventName
        - eventId
        - timestamp
        - questInstanceId
        - definitionId
        - questCode
        - questorCharacterIds
        - gameServiceId
      properties:
        eventName:
          type: string
          default: quest.completed
          description: 'Event type identifier: quest.completed'
        questInstanceId:
          type: string
          format: uuid
          description: Quest instance ID
        definitionId:
          type: string
          format: uuid
          description: Quest definition ID
        questCode:
          type: string
          description: Quest code
        questorCharacterIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
          description: Characters who completed
        gameServiceId:
          type: string
          format: uuid
          description: Game service ID

    QuestFailedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when quest fails
      required:
        - eventName
        - eventId
        - timestamp
        - questInstanceId
        - questCode
        - questorCharacterIds
        - reason
      properties:
        eventName:
          type: string
          default: quest.failed
          description: 'Event type identifier: quest.failed'
        questInstanceId:
          type: string
          format: uuid
          description: Quest instance ID
        questCode:
          type: string
          description: Quest code
        questorCharacterIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
          description: Characters who failed
        reason:
          type: string
          minLength: 1
          description: Failure reason

    QuestAbandonedEvent:
      allOf:
        - $ref: 'common-events.yaml#/components/schemas/BaseServiceEvent'
      type: object
      additionalProperties: false
      description: Published when quest is voluntarily abandoned
      required:
        - eventName
        - eventId
        - timestamp
        - questInstanceId
        - questCode
        - abandoningCharacterId
      properties:
        eventName:
          type: string
          default: quest.abandoned
          description: 'Event type identifier: quest.abandoned'
        questInstanceId:
          type: string
          format: uuid
          description: Quest instance ID
        questCode:
          type: string
          description: Quest code
        abandoningCharacterId:
          type: string
          format: uuid
          description: Character who abandoned

    # === SUBSCRIBED EVENTS (from Contract) ===
    # NOTE: Contract event types (ContractMilestoneCompletedEvent, ContractFulfilledEvent,
    # ContractTerminatedEvent) are defined in contract-events.yaml and generated to
    # ContractEventsModels.cs. Do not duplicate them here - the x-event-subscriptions
    # above reference them by name and the generator resolves to the Contract namespace.
